<div id="location-modal-overlay" class="modal-overlay" style="display: none; z-index: 7000;">
  <div class="modal" style="width: 600px; max-width: 95%;">
    <h3 class="modal-title">Set Project Location</h3>
    <div style="display:flex; gap:10px; margin-bottom: 15px; position:relative;">
       <input type="text" id="modal-location-input" placeholder="Type an address, venue, or click the map..." style="flex:1; padding:12px; padding-right:35px; background:#1a1a1e; color:#fff; border:1px solid #333; border-radius:6px; box-sizing:border-box;" onkeydown="if(event.key === 'Enter') window.updateMapPreview()">
       <button onclick="document.getElementById('modal-location-input').value=''; if(window.leafletMarker && window.leafletMap) { window.leafletMap.removeLayer(window.leafletMarker); window.leafletMarker = null; }" style="position:absolute; right: 95px; top: 50%; transform: translateY(-50%); background:transparent; border:none; color:#888; cursor:pointer; font-weight:bold; font-size:16px;" title="Clear Address">X</button>
       <button id="map-search-btn" class="btn-outline" style="margin:0; width:80px;" onclick="window.updateMapPreview()">SEARCH</button>
    </div>
    <div id="modal-leaflet-map" style="width:100%; height:400px; background:#111; border:1px solid #333; border-radius:6px; overflow:hidden; position:relative; z-index:1;">
       <div id="modal-map-placeholder" style="position:absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; color:#555; pointer-events:none; font-weight:bold; z-index: 999; background: #111;">Loading Map Engine...</div>
    </div>
    <div style="display:flex; justify-content:flex-end; gap:12px; margin-top: 15px;">
       <button class="btn-close" onclick="window.closeLocationModal()">CANCEL</button>
       <button class="btn-main" onclick="window.saveLocationModal()">APPLY TO PROJECT</button>
    </div>
  </div>
</div>

<script>
/**
 * 02_Project_Editor_Map.html
 * Domain: Location Geocoding Map & 14-Day Weather Forecast Widget.
 */

// ==========================================
// --- LOCATION & WEATHER ENGINE ---
// ==========================================
// @INDEX: MAP_ENGINE -> Leaflet Geocoding & Weather

window.leafletMap = null;
window.leafletMarker = null;

window.WAREHOUSE_ORIGIN = { lat: 42.665702, lng: 23.256019 };
window.SOFIA_RING_ROAD_POLYGON = [
    [42.7533, 23.3241], // North (Iliyantsi)
    [42.7300, 23.4116], // Northeast (Vrazhdebna)
    [42.6680, 23.4270], // East (Kazichene)
    [42.6250, 23.3850], // Southeast (Mladost / Lozen)
    [42.6050, 23.3361], // South (Bistritsa junction)
    [42.6280, 23.2820], // Southwest (Boyana)
    [42.6620, 23.2320], // West (Gorna Banya / Knyazhevo)
    [42.7110, 23.2180], // Northwest (Lyulin)
    [42.7483, 23.2671]  // North Northwest (Obelya)
];

window.isPointInPolygon = function(lat, lng, polygon) {
    let x = lng, y = lat;
    let inside = false;
    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        let xi = polygon[i][1], yi = polygon[i][0];
        let xj = polygon[j][1], yj = polygon[j][0];
        let intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
    }
    return inside;
};

/** Approximate Bulgaria bounds for zone label (warehouse ops). */
window.isPointInBulgaria = function(lat, lng) {
    return lat >= 41.235 && lat <= 44.22 && lng >= 22.35 && lng <= 28.62;
};

window.resolveProjectRegionZone = function(lat, lng) {
    if (lat == null || lng == null || lat === '' || lng === '') return 'sofia';
    const la = parseFloat(lat);
    const ln = parseFloat(lng);
    if (isNaN(la) || isNaN(ln)) return 'sofia';
    if (window.isPointInPolygon(la, ln, window.SOFIA_RING_ROAD_POLYGON)) return 'sofia';
    if (window.isPointInBulgaria(la, ln)) return 'outside_sofia';
    return 'outside_bulgaria';
};

window.getProjectRegionLabelText = function(zone) {
    if (zone === 'outside_bulgaria') return 'OUTSIDE BULGARIA';
    if (zone === 'outside_sofia') return 'OUTSIDE SOFIA';
    return 'IN SOFIA';
};

window.applyProjectDistanceFieldVisibility = function() {
    const inSofiaEl = document.getElementById('edit-proj-in-sofia');
    const inSofia = inSofiaEl ? inSofiaEl.checked : true;
    const distCont = document.getElementById('edit-proj-distance-container');
    const locCol = document.querySelector('.pe-location-col');
    if (distCont) {
        distCont.style.display = inSofia ? 'none' : 'flex';
    }
    if (locCol) {
        locCol.classList.toggle('pe-location-col--in-sofia', inSofia);
    }
};

window.updateLocationRegionLabel = function() {
    const label = document.getElementById('pe-location-region-label');
    const zoneHidden = document.getElementById('edit-proj-region-zone');
    const inSofiaCb = document.getElementById('edit-proj-in-sofia');
    if (!label) return;

    let zone = zoneHidden && zoneHidden.value ? zoneHidden.value : 'sofia';
    const lat = document.getElementById('edit-proj-lat') ? document.getElementById('edit-proj-lat').value : '';
    const lng = document.getElementById('edit-proj-lng') ? document.getElementById('edit-proj-lng').value : '';
    if (lat && lng) {
        zone = window.resolveProjectRegionZone(lat, lng);
        if (zoneHidden) zoneHidden.value = zone;
    } else if (inSofiaCb) {
        zone = inSofiaCb.checked ? 'sofia' : 'outside_sofia';
        if (zoneHidden) zoneHidden.value = zone;
    }

    label.innerText = window.getProjectRegionLabelText(zone);
    label.className = 'pe-location-region-label pe-location-region-label--' + zone.replace(/_/g, '-');
    if (inSofiaCb) inSofiaCb.checked = (zone === 'sofia');
    window.applyProjectDistanceFieldVisibility();
};

/** Short display name from Nominatim (avoids full Russian postal strings in the toolbar). */
window.formatShortLocationName = function(nominatimData) {
    if (!nominatimData) return '';
    const a = nominatimData.address || {};
    const parts = [];
    const venue = a.amenity || a.building || a.tourism || a.leisure || a.shop || a.house || '';
    const street = a.road || a.pedestrian || a.footway || '';
    const city = a.city || a.town || a.village || a.municipality || a.hamlet || a.suburb || '';
    const region = a.state || a.region || a.county || '';
    const country = a.country || '';
    if (venue) parts.push(venue);
    else if (street) parts.push(street);
    if (city && parts.indexOf(city) === -1) parts.push(city);
    else if (region && !city) parts.push(region);
    if (country) parts.push(country);
    if (parts.length) return parts.join(', ');
    const dn = String(nominatimData.display_name || '');
    if (dn.length > 72) {
        return dn.split(',').slice(0, 3).map(function(s) { return s.trim(); }).filter(Boolean).join(', ');
    }
    return dn;
};

window.calculateDistanceAndZone = async function(lat, lng) {
    let inSofiaCheckbox = document.getElementById('edit-proj-in-sofia');
    let distanceInput = document.getElementById('edit-proj-distance');
    let zoneHidden = document.getElementById('edit-proj-region-zone');
    if (!inSofiaCheckbox || !distanceInput) return;

    const zone = window.resolveProjectRegionZone(lat, lng);
    const inSofia = (zone === 'sofia');
    inSofiaCheckbox.checked = inSofia;
    if (zoneHidden) zoneHidden.value = zone;
    window.isProjectDirty = true;
    
    if (inSofia) {
        distanceInput.value = '';
        distanceInput.placeholder = 'km';
    } else {
        distanceInput.value = '';
        distanceInput.placeholder = '…';
        try {
            let osrmUrl = `https://router.project-osrm.org/route/v1/driving/${window.WAREHOUSE_ORIGIN.lng},${window.WAREHOUSE_ORIGIN.lat};${lng},${lat}?overview=false`;
            let res = await fetch(osrmUrl);
            let data = await res.json();
            if (data.routes && data.routes.length > 0) {
                let distanceMeters = data.routes[0].distance;
                distanceInput.value = (distanceMeters / 1000).toFixed(1);
            } else {
                distanceInput.value = '';
                distanceInput.placeholder = 'km';
            }
        } catch (e) {
            console.error("OSRM Routing failed:", e);
            distanceInput.value = '';
            distanceInput.placeholder = 'km';
        }
    }
    
    if (typeof updateLocationRegionLabel === 'function') updateLocationRegionLabel();
};

window.updateMapPreview = async function() {
    let val = document.getElementById('modal-location-input').value.trim();
    if (!val || !window.leafletMap) return;
    
    let searchBtn = document.getElementById('map-search-btn');
    if (searchBtn) searchBtn.innerText = "WAIT";

    try {
        let res = await fetch("https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(val) + "&limit=1");
        let data = await res.json();
        
        if (data && data.length > 0) {
            let lat = parseFloat(data[0].lat);
            let lon = parseFloat(data[0].lon);
            
            window.leafletMap.setView([lat, lon], 16);
            if (window.leafletMarker) {
                window.leafletMarker.setLatLng([lat, lon]);
            } else {
                window.leafletMarker = L.marker([lat, lon]).addTo(window.leafletMap);
            }
            document.getElementById('modal-location-input').value = window.formatShortLocationName(data[0]) || data[0].display_name;
            window.calculateDistanceAndZone(lat, lon);
        } else {
            alert("Location not found. Try a different search term.");
        }
    } catch(e) {
        console.error("Map search error: ", e);
    }
    if (searchBtn) searchBtn.innerText = "SEARCH";
};

window.openLocationMap = function() {
    const loc = document.getElementById('edit-proj-location').value;
    document.getElementById('modal-location-input').value = loc;
    document.getElementById('location-modal-overlay').style.display = 'flex';
    
    if (!window.leafletMap) {
        setTimeout(() => {
            window.leafletMap = L.map('modal-leaflet-map').setView([51.505, -0.09], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap' }).addTo(window.leafletMap);
            document.getElementById('modal-map-placeholder').style.display = 'none';

            window.leafletMap.on('click', async function(e) {
                let lat = e.latlng.lat; let lng = e.latlng.lng;
                if (window.leafletMarker) window.leafletMarker.setLatLng([lat, lng]);
                else window.leafletMarker = L.marker([lat, lng]).addTo(window.leafletMap);
                
                window.calculateDistanceAndZone(lat, lng);
                
                document.getElementById('modal-location-input').value = "Locating...";
                try {
                    let res = await fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lng);
                    let data = await res.json();
                    if (data && data.display_name) {
                        document.getElementById('modal-location-input').value = window.formatShortLocationName(data) || data.display_name;
                    } else document.getElementById('modal-location-input').value = lat.toFixed(5) + ", " + lng.toFixed(5);
                } catch(err) { document.getElementById('modal-location-input').value = lat.toFixed(5) + ", " + lng.toFixed(5); }
            });
            
            if (loc.trim() !== "") window.updateMapPreview();
        }, 200);
    } else {
        setTimeout(() => {
            window.leafletMap.invalidateSize();
            if (loc.trim() !== "") window.updateMapPreview();
            else if (window.leafletMarker) { window.leafletMap.removeLayer(window.leafletMarker); window.leafletMarker = null; }
        }, 200);
    }
};

window.closeLocationModal = function() {
    document.getElementById('location-modal-overlay').style.display = 'none';
};

window.saveLocationModal = function() {
    let val = document.getElementById('modal-location-input').value.trim();
    let mainInput = document.getElementById('edit-proj-location');
    if (window.leafletMarker) {
        let pos = window.leafletMarker.getLatLng();
        document.getElementById('edit-proj-lat').value = pos.lat;
        document.getElementById('edit-proj-lng').value = pos.lng;
    }
    if (mainInput.value !== val) {
        mainInput.value = val;
        mainInput.title = val;
        window.isProjectDirty = true;
    }
    window.closeLocationModal();
    if (typeof updateLocationRegionLabel === 'function') updateLocationRegionLabel();
    if(window.updateLiveWeatherWidget) window.updateLiveWeatherWidget();
};

window.weatherCondEmoji = function(cond) {
    if (cond === 'CLOUD') return '☁️';
    if (cond === 'FOG') return '🌫️';
    if (cond === 'RAIN') return '🌧️';
    if (cond === 'SNOW') return '❄️';
    if (cond === 'STORM') return '⛈️';
    return '☀️';
};

window.weatherCondLabel = function(cond) {
    if (cond === 'STORM') return 'STORM';
    if (cond === 'SNOW') return 'SNOW';
    if (cond === 'RAIN') return 'RAIN';
    if (cond === 'FOG') return 'FOG';
    if (cond === 'CLOUD') return 'CLOUD';
    return 'DRY';
};

window.weatherCondSeverity = function(cond) {
    if (cond === 'STORM') return 6;
    if (cond === 'SNOW') return 5;
    if (cond === 'RAIN') return 4;
    if (cond === 'FOG') return 3;
    if (cond === 'CLOUD') return 2;
    return 1;
};

window.weatherWorstCond = function(days) {
    let worstCond = 'CLR';
    let worstRank = 1;
    for (let i = 0; i < days.length; i++) {
        let rank = window.weatherCondSeverity(days[i].cond);
        if (rank > worstRank) {
            worstRank = rank;
            worstCond = days[i].cond;
        }
    }
    let hasRainy = days.some(function(d) { return d.rainProb > 50; });
    if (hasRainy && window.weatherCondSeverity('RAIN') > worstRank) {
        worstCond = 'RAIN';
    }
    return worstCond;
};

window.updateLiveWeatherWidget = async function() {
    let isOutdoor = document.getElementById('edit-proj-outdoor').checked;
    let wrap = document.getElementById('weather-widget-wrap');
    let summary = document.getElementById('weather-widget-summary');
    let detail = document.getElementById('weather-widget-detail');
    if (!wrap || !summary || !detail) return;

    function scrollWeatherDetail(e) {
        if (detail.scrollWidth <= detail.clientWidth) return;
        e.preventDefault();
        detail.scrollLeft += e.deltaY;
    }

    if (!detail.hasWheelListener) {
        detail.addEventListener('wheel', scrollWeatherDetail, { passive: false });
        detail.hasWheelListener = true;
    }
    if (!wrap.hasWheelListener) {
        wrap.addEventListener('wheel', scrollWeatherDetail, { passive: false });
        wrap.hasWheelListener = true;
    }

    function syncDetailMaxWidth() {
        let miniCal = document.getElementById('mini-project-calendar');
        let cap = miniCal && miniCal.offsetWidth > 0 ? miniCal.offsetWidth : 400;
        detail.style.maxWidth = Math.min(cap, window.innerWidth * 0.8) + 'px';
    }

    if (!isOutdoor) {
        wrap.style.display = 'none';
        return;
    }

    wrap.style.display = 'block';
    syncDetailMaxWidth();

    let lat = document.getElementById('edit-proj-lat').value;
    let lng = document.getElementById('edit-proj-lng').value;
    let locText = document.getElementById('edit-proj-location').value.trim();

    let sDateStr = document.getElementById('edit-proj-date') ? document.getElementById('edit-proj-date').value : '';
    let eDateStr = document.getElementById('edit-proj-end-date') ? document.getElementById('edit-proj-end-date').value : sDateStr;

    if ((!lat || !lng) && locText && sDateStr) {
        try {
            let res = await fetch("https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(locText) + "&limit=1");
            let data = await res.json();
            if (data && data.length > 0) {
                lat = parseFloat(data[0].lat);
                lng = parseFloat(data[0].lon);
                document.getElementById('edit-proj-lat').value = lat;
                document.getElementById('edit-proj-lng').value = lng;
                if (!window.currentReadinessState) window.currentReadinessState = {};
                window.currentReadinessState.coords = { lat: lat, lng: lng };
            }
        } catch(e) { console.error("Auto-geocode failed:", e); }
    }

    if (!lat || !lng || !sDateStr) {
        summary.innerHTML = '<div class="ww-line ww-line--muted">SET LOC & DATE</div>';
        detail.innerHTML = '';
        return;
    }

    summary.innerHTML = '<div class="ww-line ww-line--muted">FETCHING...</div>';
    detail.innerHTML = '';

    try {
        let url = "https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lng + "&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max,precipitation_probability_max&timezone=auto&forecast_days=14";
        let res = await fetch(url);
        let data = await res.json();

        if (!data || !data.daily) throw new Error("No data");

        let daily = data.daily;
        let sDate = new Date(sDateStr + "T00:00:00Z");
        let eDate = new Date(eDateStr + "T23:59:59Z");
        let days = [];

        for (let i = 0; i < daily.time.length; i++) {
            let dStr = daily.time[i];
            let dObj = new Date(dStr + "T12:00:00Z");

            if (dObj >= sDate && dObj <= eDate) {
                let code = daily.weathercode[i];
                let maxT = daily.temperature_2m_max[i];
                let minT = daily.temperature_2m_min[i];
                let wind = daily.windspeed_10m_max[i];
                let rainProb = daily.precipitation_probability_max[i] || 0;

                let cond = 'CLR';
                if (code == null) { cond = 'CLR'; }
                else if (code >= 1 && code <= 3) { cond = 'CLOUD'; }
                else if (code >= 45 && code <= 48) { cond = 'FOG'; }
                else if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) { cond = 'RAIN'; }
                else if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86)) { cond = 'SNOW'; }
                else if (code >= 95) { cond = 'STORM'; }

                days.push({
                    dObj: dObj,
                    maxT: maxT,
                    minT: minT,
                    wind: wind,
                    rainProb: rainProb,
                    cond: cond
                });
            }
        }

        if (!days.length) {
            summary.innerHTML = '<div class="ww-line ww-line--muted">OUTSIDE 14D</div>';
            detail.innerHTML = '';
            return;
        }

        let hasRainy = days.some(function(d) { return d.rainProb > 50; });
        let eventMin = Math.min.apply(null, days.map(function(d) { return d.minT; }));
        let eventMax = Math.max.apply(null, days.map(function(d) { return d.maxT; }));
        let peakWind = Math.max.apply(null, days.map(function(d) { return d.wind; }));

        let worstCond = window.weatherWorstCond(days);
        let condLabel = window.weatherCondLabel(worstCond);
        let condAlert = worstCond === 'RAIN' || worstCond === 'SNOW' || worstCond === 'STORM' || worstCond === 'FOG';
        let tempAlert = eventMin < 5 || eventMax > 35;
        let windAlert = peakWind > 40;

        summary.innerHTML =
            '<div class="ww-line ww-line--cond' + (condAlert ? ' ww-line--alert' : '') + '">' + condLabel + '</div>' +
            '<div class="ww-line' + (tempAlert ? ' ww-line--alert' : '') + '">' + Math.round(eventMin) + '° – ' + Math.round(eventMax) + '°C</div>' +
            '<div class="ww-line' + (windAlert ? ' ww-line--alert' : '') + '">' + Math.round(peakWind) + ' km/h</div>';

        let detailHtml = '';
        for (let j = 0; j < days.length; j++) {
            let d = days[j];
            let dayAlert = d.maxT > 35 || d.minT < 5 || d.wind > 40 || d.rainProb > 50;
            let dayName = d.dObj.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', timeZone: 'UTC' });
            let emoji = window.weatherCondEmoji(d.cond);

            detailHtml += '<div class="weather-widget-day' + (dayAlert ? ' weather-widget-day--alert' : '') + '">' +
                '<div class="weather-widget-day__date">' + dayName + '</div>' +
                '<div class="weather-widget-day__cond" title="' + d.cond + '">' + emoji + '</div>' +
                '<div class="weather-widget-day__stats">' +
                    '<div class="ww-temp">' + Math.round(d.maxT) + '° <span style="color:#888;font-weight:600;">' + Math.round(d.minT) + '°</span></div>' +
                    '<div class="ww-wind">' + Math.round(d.wind) + ' km/h</div>' +
                    '<div class="ww-rain">' + d.rainProb + '%</div>' +
                '</div>' +
            '</div>';
        }

        detail.innerHTML = detailHtml;
        syncDetailMaxWidth();
    } catch (e) {
        summary.innerHTML = '<div class="ww-line ww-line--alert">FAILED</div>';
        detail.innerHTML = '';
    }
};
</script>
