<script>
/**
 * 03f_Timeline_Mobile.html
 * Mobile timeline — MY SHIFTS list + full crew grid with pinch zoom.
 * @INDEX: MOBILE -> Timeline Mobile Views
 */

window.mobileTimelineView = 'grid';
var mobileTimelinePinch = { scale: 0.34, min: 0.22, max: 1.25 };
var mobileTimelineUxReady = false;

function getMobileTimelineBaseDate() {
    var el = document.getElementById('edit-proj-start');
    if (el && el.value) {
        var pts = String(el.value).split('-');
        if (pts.length >= 3) return new Date(parseInt(pts[0], 10), parseInt(pts[1], 10) - 1, parseInt(pts[2], 10));
    }
    var p = window.mobileCrewHubProject;
    if (p && p.start) {
        var d = new Date(p.start);
        if (!isNaN(d.getTime())) return d;
    }
    return new Date();
}

function shiftDayLabelForMobile(shift, baseDate) {
    var dayOff = Math.floor(Number(shift.start) / 24);
    var d = new Date(baseDate.getTime());
    d.setDate(d.getDate() + dayOff);
    return d.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
}

function shiftEndDayLabelForMobile(shift, baseDate) {
    var endHr = Number(shift.start) + Number(shift.duration);
    var dayOff = Math.floor(endHr / 24);
    var d = new Date(baseDate.getTime());
    d.setDate(d.getDate() + dayOff);
    return d.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short' });
}

function rosterNameForShift(shift) {
    var uid = String(shift.user_uid || shift.email || '');
    if (!uid || typeof activeRoster === 'undefined') return '';
    var person = activeRoster.find(function(c) { return String(c.uid) === uid; });
    return person ? (person.name || '') : '';
}

function isMyMobileShift(shift) {
    var myUid = (typeof ACTIVE_USER_UID !== 'undefined' && ACTIVE_USER_UID) ? String(ACTIVE_USER_UID).trim() : '';
    var myName = (typeof ACTIVE_USER_NAME !== 'undefined' && ACTIVE_USER_NAME) ? String(ACTIVE_USER_NAME).trim().toLowerCase() : '';
    var uid = String(shift.user_uid || shift.email || '');
    if (myUid && uid === myUid) return true;
    var nm = rosterNameForShift(shift).toLowerCase();
    return !!(myName && nm && nm === myName);
}

window.buildMobileShiftStripMarkup = function(shift, meta) {
    meta = meta || {};
    if (!shift) return '';
    var fmt = (typeof formatShiftTime === 'function') ? formatShiftTime : function(h) { return String(h); };
    var isArrow = (shift.hasArrow === true || shift.hasArrow === 'true');
    var isOpen = (shift.hasArrow === 'open');
    var displayTime = isOpen ? 'OPEN SHIFT' : (fmt(shift.start) + ' – ' + fmt(shift.start + Number(shift.duration)));
    var arrowIcon = isOpen
        ? '<span class="tt-mobile-strip-arrow">?</span>'
        : ((Number(shift.duration) > 12 || isArrow) ? '<span class="tt-mobile-strip-arrow">▶</span>' : '');
    var endHr = Number(shift.start) + Number(shift.duration);
    var moonIcon = ((shift.start % 24) < 6 || (endHr % 24) > 23.5 || endHr % 24 === 0)
        ? '<span class="tt-mobile-strip-moon">🌙</span>' : '';
    var bg = shift.color || '#86efac';
    var txt = shift.textCol || '#064e3b';
    var whStyle = shift.isWh ? ' tt-mobile-strip--wh' : '';
    var base = getMobileTimelineBaseDate();
    var dayStart = meta.dayLabel || shiftDayLabelForMobile(shift, base);
    var dayEnd = shiftEndDayLabelForMobile(shift, base);
    var dayLine = (dayStart === dayEnd) ? dayStart : (dayStart + ' → ' + dayEnd);
    var person = meta.personName != null ? meta.personName : rosterNameForShift(shift);
    var role = shift.role || 'Technician';
    var note = shift.note ? '<div class="tt-mobile-strip-note">' + String(shift.note).replace(/</g, '&lt;') + '</div>' : '';
    var personLine = (meta.showPerson !== false && person)
        ? '<div class="tt-mobile-strip-person">' + String(person).replace(/</g, '&lt;') + '</div>' : '';

    return ''
        + '<div class="tt-mobile-shift-strip' + whStyle + '" style="--strip-bg:' + bg + ';--strip-fg:' + txt + ';">'
        + '<div class="tt-mobile-strip-top">'
        + '<div class="tt-mobile-strip-day">' + dayLine + '</div>'
        + '<div class="tt-mobile-strip-icons">' + moonIcon + arrowIcon + '</div>'
        + '</div>'
        + '<div class="tt-mobile-strip-time">' + displayTime + '</div>'
        + '<div class="tt-mobile-strip-role">' + String(role).replace(/</g, '&lt;') + '</div>'
        + personLine
        + note
        + '</div>';
};

function ensureMobileTimelineChrome() {
    var layer = document.getElementById('shift-layer');
    if (!layer || document.getElementById('tt-mobile-chrome')) return;

    var chrome = document.createElement('div');
    chrome.id = 'tt-mobile-chrome';
    chrome.innerHTML =
        '<div id="tt-mobile-view-bar">'
        + '<button type="button" class="btn-tab" data-view="list" onclick="setMobileTimelineView(\'list\')">MY SHIFTS</button>'
        + '<button type="button" class="btn-tab active" data-view="grid" onclick="setMobileTimelineView(\'grid\')">TIMELINE</button>'
        + '</div>';

    var listPane = document.createElement('div');
    listPane.id = 'tt-mobile-list-pane';
    listPane.innerHTML = '<div id="tt-mobile-list-scroll"></div>';

    layer.insertBefore(chrome, layer.firstChild);
    layer.insertBefore(listPane, layer.querySelector('.tt-workspace'));
}

function ensureMobilePinchHost() {
    var workspace = document.querySelector('#shift-layer .tt-workspace');
    var canvas = document.querySelector('#shift-layer .tt-canvas');
    if (!workspace || !canvas) return null;
    var host = document.getElementById('tt-mobile-pinch-host');
    if (!host) {
        host = document.createElement('div');
        host.id = 'tt-mobile-pinch-host';
        host.className = 'tt-mobile-pinch-host';
        workspace.insertBefore(host, canvas);
        host.appendChild(canvas);
    }
    return host;
}

function measureCanvasNaturalSize(canvas) {
    var prevTransform = canvas.style.transform;
    var prevZoom = canvas.style.zoom;
    canvas.style.transform = '';
    canvas.style.zoom = '';
    var size = { w: canvas.scrollWidth, h: canvas.scrollHeight };
    canvas.style.transform = prevTransform;
    canvas.style.zoom = prevZoom;
    return size;
}

window.setMobileTimelineView = function(view) {
    if (typeof isMobileViewport !== 'function' || !isMobileViewport()) return;
    window.mobileTimelineView = view === 'list' ? 'list' : 'grid';
    var layer = document.getElementById('shift-layer');
    if (!layer) return;
    layer.classList.toggle('tt-mobile-list-view', window.mobileTimelineView === 'list');
    layer.classList.toggle('tt-mobile-grid-view', window.mobileTimelineView === 'grid');
    var bar = document.getElementById('tt-mobile-view-bar');
    if (bar) {
        bar.querySelectorAll('button[data-view]').forEach(function(btn) {
            btn.classList.toggle('active', btn.getAttribute('data-view') === window.mobileTimelineView);
        });
    }
    if (window.mobileTimelineView === 'list') {
        renderMobileTimelineList();
    } else {
        applyMobileTimelineGridDefaults();
    }
};

window.renderMobileTimelineList = function() {
    var host = document.getElementById('tt-mobile-list-scroll');
    if (!host) return;
    if (typeof shifts === 'undefined' || !Array.isArray(shifts)) {
        host.innerHTML = '<div class="tt-mobile-list-empty">No shift data loaded.</div>';
        return;
    }
    var mine = shifts.filter(isMyMobileShift).sort(function(a, b) {
        return Number(a.start) - Number(b.start);
    });
    if (!mine.length) {
        host.innerHTML = '<div class="tt-mobile-list-empty">You have no shifts on this project yet.</div>';
        return;
    }
    var html = '';
    mine.forEach(function(s) {
        html += buildMobileShiftStripMarkup(s, { showPerson: false });
    });
    host.innerHTML = html;
};

function collapseAllTimelineDeptsMobile() {
    document.querySelectorAll('[id^="icon-tt-"]').forEach(function(icon) {
        if ((icon.innerText || '').trim() === '▼' && typeof toggleDept === 'function') {
            toggleDept(icon.id.replace('icon-tt-', ''), 'tt');
        }
    });
}

function applyMobileTimelineGridDefaults() {
    collapseAllTimelineDeptsMobile();
    mobileTimelinePinch.scale = 0.34;
    applyMobilePinchTransform();
}

function applyMobilePinchTransform() {
    var canvas = document.querySelector('#shift-layer .tt-canvas');
    var host = ensureMobilePinchHost();
    if (!canvas || !host) return;
    var z = mobileTimelinePinch.scale;
    var natural = measureCanvasNaturalSize(canvas);
    canvas.style.zoom = z;
    canvas.style.transform = '';
    host.style.width = Math.max(Math.ceil(natural.w * z), 1) + 'px';
    host.style.height = Math.max(Math.ceil(natural.h * z), 1) + 'px';
}

function pinchDistance(touches) {
    var dx = touches[0].clientX - touches[1].clientX;
    var dy = touches[0].clientY - touches[1].clientY;
    return Math.hypot(dx, dy);
}

function initMobileTimelinePinchZoom() {
    var workspace = document.querySelector('#shift-layer .tt-workspace');
    if (!workspace || workspace._mobilePinchBound) return;
    workspace._mobilePinchBound = true;
    var lastDist = 0;

    workspace.addEventListener('touchstart', function(e) {
        if (window.mobileTimelineView !== 'grid') return;
        if (e.touches.length === 2) {
            lastDist = pinchDistance(e.touches);
            e.preventDefault();
        }
    }, { passive: false });

    workspace.addEventListener('touchmove', function(e) {
        if (window.mobileTimelineView !== 'grid' || e.touches.length !== 2) return;
        var dist = pinchDistance(e.touches);
        if (!lastDist) lastDist = dist;
        var ratio = dist / lastDist;
        lastDist = dist;
        mobileTimelinePinch.scale = Math.max(
            mobileTimelinePinch.min,
            Math.min(mobileTimelinePinch.max, mobileTimelinePinch.scale * ratio)
        );
        applyMobilePinchTransform();
        e.preventDefault();
    }, { passive: false });

    workspace.addEventListener('touchend', function() {
        lastDist = 0;
    });
}

function attachMobileShiftTapHandlers() {
    /* Mobile timeline grid: read-only — no shift detail popup on tap */
}

window.showMobileTimelineFooterStrip = function() {};
window.clearMobileTimelineFooterStrip = function() {};
window.openMobileShiftDetailSheet = function() {};
window.closeMobileShiftDetailSheet = function() {};

function syncMobileTimelineChromeVisibility() {
    var mobile = typeof isMobileViewport === 'function' && isMobileViewport();
    var layer = document.getElementById('shift-layer');
    var chrome = document.getElementById('tt-mobile-chrome');
    var listPane = document.getElementById('tt-mobile-list-pane');
    if (layer) layer.classList.toggle('tt-mobile-mode', mobile);
    if (chrome) chrome.style.display = mobile ? 'block' : 'none';
    if (listPane) listPane.style.display = mobile ? '' : 'none';
    if (!mobile) teardownMobileTimelineUX();
}

function teardownMobileTimelineUX() {
    var layer = document.getElementById('shift-layer');
    if (layer) {
        layer.classList.remove('tt-mobile-mode', 'tt-mobile-list-view', 'tt-mobile-grid-view');
    }
    var canvas = document.querySelector('#shift-layer .tt-canvas');
    if (canvas) {
        canvas.style.transform = '';
        canvas.style.zoom = '';
    }
    var host = document.getElementById('tt-mobile-pinch-host');
    if (host) {
        host.style.width = '';
        host.style.height = '';
    }
    mobileTimelinePinch.scale = 0.34;
    var oldBar = document.getElementById('tt-mobile-zoom-bar');
    if (oldBar) oldBar.remove();
}

window.initMobileTimelineUX = function() {
    if (typeof isMobileViewport !== 'function' || !isMobileViewport()) {
        syncMobileTimelineChromeVisibility();
        return;
    }
    ensureMobileTimelineChrome();
    syncMobileTimelineChromeVisibility();
    initMobileTimelinePinchZoom();
    setMobileTimelineView(window.mobileTimelineView || 'grid');
    mobileTimelineUxReady = true;
};

(function hookTimelineGrid() {
    var orig = window.rebuildTimelineGrid;
    if (typeof orig !== 'function') return;
    window.rebuildTimelineGrid = function() {
        orig.apply(this, arguments);
        setTimeout(function() {
            if (document.getElementById('shift-layer') && document.getElementById('shift-layer').style.display !== 'none') {
                initMobileTimelineUX();
            }
        }, 80);
    };
})();

(function hookDrawShifts() {
    var orig = window.drawShifts;
    if (typeof orig !== 'function') return;
    window.drawShifts = function() {
        orig.apply(this, arguments);
        if (typeof isMobileViewport === 'function' && isMobileViewport()) {
            if (window.mobileTimelineView === 'grid') {
                requestAnimationFrame(function() { applyMobilePinchTransform(); });
            }
        }
    };
})();

(function hookTimelineClose() {
    var orig = window.cancelShifts;
    if (typeof orig !== 'function') return;
    window.cancelShifts = function() {
        teardownMobileTimelineUX();
        orig.apply(this, arguments);
        if (window.mobileCrewHubProjectId && typeof isMobileViewport === 'function' && isMobileViewport()) {
            document.getElementById('mobile-crew-hub-overlay').style.display = 'flex';
        }
    };
})();

window.addEventListener('resize', function() {
    syncMobileTimelineChromeVisibility();
});

</script>
