<script>
/**
 * 03d_Timeline_Crew.html
 * Domain: Crew Manager modal, department overrides, and row visibility toggles.
 */

// ==========================================
// --- TIMELINE_CREW -> Crew Manager Modal ---
// ==========================================
function openCrewManager() {
    backupGlobalAssignedArr = [...globalAssignedArr];
    backupLocalDeptOverrides = JSON.parse(JSON.stringify(localDeptOverrides));
    document.getElementById('crew-manager-modal').style.display = 'flex';
    renderCrewManagerBody();
}

function cancelCrewManager() {
    var beforeOverrides = localDeptOverrides || {};
    globalAssignedArr = [...backupGlobalAssignedArr];
    localDeptOverrides = JSON.parse(JSON.stringify(backupLocalDeptOverrides));
    var changed = false;
    var noteUids = {};
    Object.keys(beforeOverrides).forEach(function(u) { noteUids[u] = 1; });
    Object.keys(localDeptOverrides || {}).forEach(function(u) { noteUids[u] = 1; });
    Object.keys(noteUids).forEach(function(uid) {
      if ((beforeOverrides[uid] || '') === (localDeptOverrides[uid] || '')) return;
      changed = true;
      if (typeof window.dalTlNoteOverrideTouch_ === 'function') window.dalTlNoteOverrideTouch_(uid);
    });
    
    document.querySelectorAll('.internal-cb').forEach(cb => {
        cb.checked = globalAssignedArr.includes(cb.value);
    });
    
    rebuildTimelineGrid();
    document.getElementById('crew-manager-modal').style.display = 'none';
    if (changed) {
      window.isTimelineDirty = true;
      if (typeof dalFlushTimelineIfCollabOpen_ === 'function') dalFlushTimelineIfCollabOpen_();
    }
}

/** DONE — keep modal edits; flush any pending override touches once. */
function doneCrewManager() {
    document.getElementById('crew-manager-modal').style.display = 'none';
    if (typeof window.dalTlHasPendingMutations_ === 'function' && window.dalTlHasPendingMutations_()) {
      window.isTimelineDirty = true;
      if (typeof dalFlushTimelineIfCollabOpen_ === 'function') dalFlushTimelineIfCollabOpen_();
    }
}

function renderCrewManagerBody() {
    let allDepts = typeof SYSTEM_DEPARTMENTS !== 'undefined' && SYSTEM_DEPARTMENTS.length > 0
        ? SYSTEM_DEPARTMENTS.map(d => ({uid: d.uid, name: d.name}))
        : [{uid: 'dept_lighting', name: 'Lighting'}, {uid: 'dept_trucks', name: 'Trucks'}, {uid: 'dept_rigging', name: 'Rigging'}, {uid: 'dept_video', name: 'Video'}, {uid: 'dept_audio', name: 'Audio'}];

    let grouped = {};
    activeRoster.forEach(c => {
        let rawDept = c.department;
        if (rawDept === "[object Object]") rawDept = "dept_lighting";
        let defaultDept = (c.isVehicle || isTruck(c.uid)) ? 'dept_trucks' : (rawDept || 'dept_lighting');
        
        let currentDept = localDeptOverrides[c.uid] || defaultDept;
        
        if (!grouped[currentDept]) grouped[currentDept] = [];
        grouped[currentDept].push(c);
    });

    Object.keys(grouped).forEach(dUid => { if (!allDepts.some(d => d.uid === dUid)) allDepts.push({uid: dUid, name: getDeptObj(dUid).name}); });

    let html = '';
    Object.keys(grouped).sort((a,b) => getDeptObj(a).name.localeCompare(getDeptObj(b).name)).forEach(deptUid => {
        let deptName = getDeptObj(deptUid).name;
        html += `
        <div style="background: #252529; border: 1px solid #444; border-radius: 6px; padding: 12px;">
            <h3 style="color: #a855f7; margin: 0 0 12px 0; font-size: 14px; border-bottom: 1px solid #444; padding-bottom: 6px; font-weight: 900;">${deptName.toUpperCase()}</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px;">`;

        grouped[deptUid].sort((a,b) => a.name.localeCompare(b.name)).forEach(c => {
            let isAssigned = globalAssignedArr.includes(c.uid) || globalAssignedArr.includes(c.email);
            let deptOptions = allDepts.map(d => `<option value="${d.uid}" ${d.uid === deptUid ? 'selected' : ''}>${d.name}</option>`).join('');

            html += `
            <div style="display: flex; align-items: center; background: #1a1a1e; padding: 6px 10px; border-radius: 4px; border: 1px solid #333; gap: 12px;">
                <input type="checkbox" ${isAssigned ? 'checked' : ''} onchange="toggleCrewModalAssign('${c.uid}', this.checked)" style="transform: scale(1.3); margin: 0; cursor: pointer; flex-shrink: 0; width: 16px; height: 16px;">
                <span style="color: #fff; font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;" title="${c.name}">${c.name}</span>
                <select onchange="changeCrewModalDept('${c.uid}', this.value)" style="background: #111; color: #aaa; border: 1px solid #444; border-radius: 3px; padding: 4px; font-size: 11px; width: 110px; flex-shrink: 0; cursor: pointer;">
                    ${deptOptions}
                </select>
            </div>`;
        });
        html += `</div></div>`;
    });
    document.getElementById('crew-manager-body').innerHTML = html;
}

function toggleCrewModalAssign(uid, isChecked) {
    if (isChecked) {
        if (!globalAssignedArr.includes(uid)) globalAssignedArr.push(uid);
    } else {
        globalAssignedArr = globalAssignedArr.filter(e => e !== uid);
    }

    let hiddenCb = document.querySelector(`.crew-cb[value="${uid}"]`);
    if (hiddenCb) hiddenCb.checked = isChecked;
    if (typeof rebuildTimelineGrid === 'function') rebuildTimelineGrid();
}

function changeCrewModalDept(uid, newDept) {
    localDeptOverrides[uid] = newDept;
    if (typeof window.dalTlNoteOverrideTouch_ === 'function') window.dalTlNoteOverrideTouch_(uid);
    let hiddenCb = document.querySelector(`.crew-cb[value="${uid}"]`);
    if (hiddenCb) hiddenCb.dataset.dept = newDept;
    renderCrewManagerBody(); 
    if (typeof rebuildTimelineGrid === 'function') rebuildTimelineGrid();
    window.isTimelineDirty = true;
    // Defer flush to DONE/CANCEL so mid-modal cancel cannot race an in-flight write clear.
}
</script>
