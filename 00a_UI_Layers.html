<!-- GLOBAL AVAILABILITY & FLEET MODAL -->
<div id="availability-modal-overlay" style="display: none; position: fixed; top: 0; left: 60px; width: calc(100vw - 60px); height: 100vh; z-index: 4000; background: var(--bg-dark);">
  <div style="display: flex; flex-direction: column; width: 100%; height: 100%; overflow: hidden; box-sizing: border-box;">
     <!-- Header -->
     <div class="view-header">
        <h2 class="view-header-title" style="margin:0;">EQUIPMENT TRACKER</h2>
        <div class="view-header-actions">
            <div style="position: relative;" onmouseenter="document.getElementById('tracker-watchlist-dropdown').style.display='flex'" onmouseleave="document.getElementById('tracker-watchlist-dropdown').style.display='none'">
                <input type="text" id="tracker-search-input" class="input-compact" placeholder="Add to Watchlist..." style="width:180px;" onkeydown="if(typeof handleTrackerWatchlistInput === 'function') handleTrackerWatchlistInput(event)">
                <div id="tracker-watchlist-dropdown" style="display:none; position:absolute; top:100%; right:0; background:#1a1a1e; border:1px solid #333; border-radius:6px; padding:10px; z-index:100; flex-direction:column; gap:8px; margin-top:4px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); min-width: 220px;">
                    <div class="input-label" style="border-bottom:1px solid #333; padding-bottom:6px; margin-bottom:0; display:flex; justify-content:space-between; align-items:center;">
                        <span>Active Watchlist</span>
                        <button id="tracker-clear-btn" class="btn-ghost" style="display:none;" onclick="if(typeof clearWatchlist === 'function') clearWatchlist()">CLEAR ALL</button>
                    </div>
                    <div id="tracker-watchlist-pills" style="display:flex; flex-direction:column; gap:4px; max-height: 250px; overflow-y:auto;">
                        <div style="color:#555; font-size:11px; font-style:italic;">Watchlist is empty.</div>
                    </div>
                </div>
            </div>
            <div style="width:1px; height:20px; background:#333; margin:0 5px;"></div>
            <button class="btn-outline btn-sm" style="margin:0;" onclick="if(typeof changeTrackerDate === 'function') changeTrackerDate(-1)">PREV</button>
            <input type="date" id="tracker-start-date" class="input-compact" onchange="if(typeof applyTrackerCustomDates === 'function') applyTrackerCustomDates()">
            <span style="color:#888; font-size:12px; font-weight:500;">to</span>
            <input type="date" id="tracker-end-date" class="input-compact" onchange="if(typeof applyTrackerCustomDates === 'function') applyTrackerCustomDates()">
            <button class="btn-outline btn-sm" style="margin:0;" onclick="if(typeof changeTrackerDate === 'function') changeTrackerDate(1)">NEXT</button>
            <button class="btn-outline btn-sm" style="margin:0; margin-left:8px; border-color:#f59e0b; color:#f59e0b;" onclick="if(typeof forceTrackerSync === 'function') forceTrackerSync()">↻ REFRESH</button>
        </div>
     </div>
     <!-- Unified Matrix Body -->
     <div id="tracker-canvas-inner" style="flex: 1; overflow: auto; position: relative; background: #111; display: flex; flex-direction: column;">
         <div style="padding: 40px; text-align: center; color: #888; font-style: italic;">Unified Equipment Matrix loading...</div>
     </div>
  </div>
</div>

<div id="shift-layer" style="display: none; position: fixed; top: 0; left: 60px; width: calc(100vw - 60px); height: 100vh; background: var(--bg-dark); z-index: 2000; flex-direction: column;">
  <div id="dal-timeline-session-banner" style="display:none !important;" aria-hidden="true"></div>
  <div class="tt-workspace" style="flex: 1; display: flex; overflow: hidden; position: relative;">
    <div class="tt-sidebar" style="display: none;">
      <div id="dept-override-panel"></div>
      <div class="tt-sidebar-list" id="shift-crew-list"></div>
    </div>
    <div class="tt-canvas" style="flex: 1; display: flex; overflow: hidden; position: relative;">
      <div class="tt-axis-y" style="display: flex; flex-direction: column; background: var(--bg-sidebar); border-right: 1px solid #333; z-index: 50; position: relative;">
        <div class="tt-header-corner" style="display: flex; flex-direction: column; justify-content: center; padding: 6px; border-bottom: 1px solid #333; background: #1a1a1e; gap: 8px; box-sizing: border-box; flex-shrink: 0;">
            <div id="timeline-local-project-name" style="display: none;"></div> 
            <div id="tt-title" style="color: #fff; font-size: 13px; font-weight: 900; line-height: 1.1; text-shadow: 0px 2px 4px rgba(0,0,0,0.5); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">LOADING...</div>
        </div>
        <div id="tt-y-crew" style="flex: 1; overflow: hidden;"></div>
        <!-- Timeline SYNC — mini header above bottom bar (crew column); click expands roster -->
        <div id="tl-sync-panel" class="tl-sync-panel" data-expanded="0" style="display:none; flex-shrink:0; box-sizing:border-box; background:#0a0a0c; border:1px solid #3b82f6; border-left:none; border-right:none; border-bottom:none; overflow:hidden; flex-direction:column; z-index:60;">
          <div id="tl-sync-header" onclick="window.dalToggleTlSyncPanel_ && window.dalToggleTlSyncPanel_()" style="cursor:pointer; flex-shrink:0; background:#1d4ed8; color:#dbeafe; padding:6px 8px; display:flex; align-items:center; justify-content:space-between; gap:6px; user-select:none;">
            <div style="display:flex; align-items:center; gap:6px; min-width:0; flex:1;">
              <span style="font-weight:900; font-size:10px; letter-spacing:0.08em;">SYNC</span>
              <span id="tl-sync-status" style="font-weight:700; font-size:9px; color:#93c5fd; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></span>
            </div>
            <span id="tl-sync-chevron" style="font-size:9px; color:#93c5fd; flex-shrink:0;">▲</span>
          </div>
          <div id="tl-sync-roster" style="display:none; max-height:28vh; overflow-y:auto; padding:8px; background:#0a0a0c; font-size:11px; line-height:1.4;"></div>
        </div>
      </div>
      <div class="tt-grid-wrapper" id="tt-grid-wrap" onscroll="document.getElementById('tt-y-crew').scrollTop = this.scrollTop;">
        <div class="tt-header-x-container">
          <div class="tt-header-days" id="tt-x-days"></div>
          <div class="tt-header-hours" id="tt-x-hours"></div>
        </div>
        <div id="tt-rows-container"></div>
      </div>
    </div>
  </div> 
  <div class="tt-bottom-actions">
      <button onclick="openCrewManager()" class="btn-blue" style="margin: 0; width: auto;">EDIT CREW</button>
      <button id="dal-timeline-start-btn" class="btn-outline" style="margin: 0; width: auto; border-color:#3b82f6; color:#3b82f6; display:none;" onclick="openDalTimelineCollabSession()">START COLLAB</button>
      <button id="dal-timeline-end-btn" class="btn-outline" style="margin: 0; width: auto; border-color:#ef4444; color:#ef4444; display:none;" onclick="closeDalTimelineCollabSession()">END COLLAB</button>
      <div id="dal-timeline-commit-retry-banner" style="display:none; align-items:center; gap:10px; padding:6px 10px; background:#450a0a; border:1px solid #ef4444; border-radius:6px; color:#fecaca; font-size:11px; font-weight:700; max-width:420px;">
        <span id="dal-timeline-commit-retry-msg" style="flex:1; min-width:0;">Timeline commit not finished.</span>
        <button type="button" id="dal-timeline-commit-retry-btn" class="btn-outline btn-sm" style="border-color:#fca5a5; color:#fecaca; margin:0; flex-shrink:0;" onclick="window.dalRetryFailedCommitUi_ && window.dalRetryFailedCommitUi_('timeline')">RETRY</button>
      </div>
      <div style="flex: 1;"></div>
      <label id="tt-crew-finished-wrap" style="display:flex; align-items:center; gap:8px; cursor:pointer; margin-right:15px; color:#10b981; font-weight:bold; font-size:12px; background:#18181b; padding:8px 15px; border-radius:6px; border:1px solid #10b981;">
          <input type="checkbox" id="tt-crew-finished-cb" style="width:16px; height:16px; margin:0; accent-color:#10b981;" onchange="window.isTimelineDirty = true;"> CREW FINISHED
      </label>
      <button id="tt-cancel-btn" class="btn-close" style="margin: 0; width: auto;" onclick="cancelShifts()">CANCEL (ESC)</button>
      <button id="tt-save-btn" class="btn-main" style="margin: 0; width: auto;" onclick="saveAndCloseShifts()">SAVE SHIFTS</button>
  </div>
</div>

<div id="month-roster-layer" style="display: none; position: fixed; top: 0; left: 60px; width: calc(100vw - 60px); height: 100vh; z-index: 2500; background: var(--bg-dark);">
  <div style="display: flex; flex-direction: column; width: 100%; height: 100%; overflow: hidden; box-sizing: border-box;">
    <div class="view-header">
      <h2 class="view-header-title" style="margin:0;">Master Month Roster</h2>
      <div class="view-header-actions">
        <button class="btn-outline btn-sm" style="margin:0; width:auto;" onclick="changeRosterMonth(-1)">PREV</button>
        <div id="mr-month-label" style="color:#fff; font-weight:800; font-size:14px; min-width:160px; text-align:center; text-transform:uppercase;">Month</div>
        <button class="btn-outline btn-sm" style="margin:0; width:auto;" onclick="changeRosterMonth(1)">NEXT</button>
      </div>
          <div style="width: 16px;"></div> 
    </div>
    <div id="mr-canvas-inner" style="flex: 1; overflow: auto; position: relative; background: #111;"></div>
  </div>
</div>
