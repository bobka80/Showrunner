<script>
/**
 * 06_System_Admin.html
 * Domain: Global configurations, UI styling editors, and external integrations.
 */

let globalClients = [];
let globalVehicles = [];

function updateClientDropdowns() {
    let datalist = document.getElementById('edit-proj-client-list');
    if (datalist) {
        let html = '';
        globalClients.forEach(c => { html += `<option value="${c.name}"></option>`; });
        datalist.innerHTML = html;
    }
    let sel = document.getElementById('edit-proj-client');
    if (sel && sel.tagName === 'SELECT') {
        let currentVal = sel.value;
        sel.innerHTML = '<option value="">Select Client...</option>';
        globalClients.forEach(c => { sel.innerHTML += `<option value="${c.name}">${c.name}</option>`; });
        if (currentVal) sel.value = currentVal;
    }
    
    // Also update the Master Settings Client List if it's open
    let listContainer = document.getElementById('client-list-container');
    if (listContainer) {
        listContainer.innerHTML = globalClients.map(c => `
            <div style="background:#1a1a1e; border:1px solid #333; padding:15px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; transition:0.2s;" onmouseover="this.style.borderColor='#3b82f6'" onmouseout="this.style.borderColor='#333'">
                <div>
                    <div style="color:#fff; font-weight:900; font-size:15px; margin-bottom:4px;">${c.name}</div>
                    <div style="color:#888; font-size:12px;">${c.email || 'No email'} | ${c.phone || 'No phone'}</div>
                </div>
                <button class="btn-outline btn-sm" style="margin:0; border-color:#3b82f6; color:#3b82f6;" onclick="openEditClientModal('${c.uid || c.id || c.name.replace(/'/g, "\\'")}')">EDIT</button>
            </div>
        `).join('');
        if (globalClients.length === 0) listContainer.innerHTML = '<div style="color:#888; text-align:center; padding:20px;">No clients found.</div>';
    }
}

function openClientModal() {
    if (document.getElementById('client-modal-title')) document.getElementById('client-modal-title').innerText = '🤝 Provision New Client';
    if (document.getElementById('client-uid')) document.getElementById('client-uid').value = '';
    document.getElementById('client-name').value = '';
    document.getElementById('client-email').value = '';
    document.getElementById('client-phone').value = '';
    document.getElementById('client-notes').value = '';
    if (document.getElementById('btn-del-client')) document.getElementById('btn-del-client').style.display = 'none';
    document.getElementById('client-modal-overlay').style.display = 'flex';
}

function openEditClientModal(uid) {
    let client = globalClients.find(c => c.uid === uid || c.id === uid || c.name === uid);
    if (!client) return;
    
    if (document.getElementById('client-modal-title')) document.getElementById('client-modal-title').innerText = '🤝 Edit Client';
    if (document.getElementById('client-uid')) document.getElementById('client-uid').value = client.uid || client.id || client.name;
    document.getElementById('client-name').value = client.name || '';
    document.getElementById('client-email').value = client.email || '';
    document.getElementById('client-phone').value = client.phone || '';
    document.getElementById('client-notes').value = client.notes || '';
    
    if (document.getElementById('btn-del-client')) document.getElementById('btn-del-client').style.display = 'block';
    document.getElementById('client-modal-overlay').style.display = 'flex';
}

function saveClient() {
    let name = document.getElementById('client-name').value.trim();
    if (!name) return alert("Client name is required.");
    
    let btn = document.getElementById('btn-save-client');
    let origText = btn.innerText;
    btn.innerText = "SAVING..."; btn.disabled = true;
    
    let uid = document.getElementById('client-uid').value;

    let payload = {
        uid: uid,
        name: name,
        email: document.getElementById('client-email').value.trim(),
        phone: document.getElementById('client-phone').value.trim(),
        notes: document.getElementById('client-notes').value.trim()
    };
    
    google.script.run.withSuccessHandler(res => {
        btn.innerText = origText; btn.disabled = false;
        if (res.success) {
            document.getElementById('client-modal-overlay').style.display = 'none';
            if (uid) {
                let existing = globalClients.find(c => c.uid === uid || c.id === uid || c.name === uid);
                if (existing) {
                    existing.name = payload.name;
                    existing.email = payload.email;
                    existing.phone = payload.phone;
                    existing.notes = payload.notes;
                }
            } else {
                if (res.uid) payload.uid = res.uid;
                globalClients.push(payload); 
            }
            try { localStorage.setItem('sm_clients_cache', JSON.stringify(globalClients)); } catch(e) {}
            updateClientDropdowns();
            
            let projClientSel = document.getElementById('edit-proj-client');
            if (projClientSel) projClientSel.value = payload.name;
        } else {
            alert(res.message || res.error);
        }
    }).withFailureHandler(err => {
        btn.innerText = origText; btn.disabled = false;
        alert("Error: " + err.message);
    }).provisionNewClient(ACTIVE_USER_NAME, payload);
}

function deleteClient() {
    let uid = document.getElementById('client-uid').value;
    if (!uid) return;
    if (!confirm("Are you sure you want to delete this client?")) return;
    
    let btn = document.getElementById('btn-del-client');
    let origText = btn.innerText;
    btn.innerText = "DELETING..."; btn.disabled = true;
    
    google.script.run.withSuccessHandler(res => {
        btn.innerText = origText; btn.disabled = false;
        if (res.success) {
            document.getElementById('client-modal-overlay').style.display = 'none';
            globalClients = globalClients.filter(c => c.uid !== uid && c.id !== uid && c.name !== uid);
            try { localStorage.setItem('sm_clients_cache', JSON.stringify(globalClients)); } catch(e) {}
            updateClientDropdowns();
        } else {
            alert(res.message || res.error);
        }
    }).withFailureHandler(err => {
        btn.innerText = origText; btn.disabled = false;
        alert("Error: " + err.message);
    }).deleteClientVault(ACTIVE_USER_NAME, uid);
}

// ==========================================
// --- GLOBAL SEARCH ENGINE ---
// ==========================================
function applyGlobalSearch() {
    if (document.getElementById('tab-content-assets') && document.getElementById('tab-content-assets').style.display === 'flex') {
        if (typeof renderAssetRegistry === 'function') renderAssetRegistry();
    }
    if (document.getElementById('tab-content-crew') && document.getElementById('tab-content-crew').style.display === 'flex') {
        if (typeof renderRosterList === 'function') renderRosterList();
    }
}

// ==========================================
// --- RESOURCE HUB TAB LOGIC ---
// ==========================================
// @INDEX: ADMIN -> Resource Hub Tab Router
function switchResourceTab(tabId) {
    // Hide all panels
    document.getElementById('tab-content-crew').style.display = 'none';
    document.getElementById('tab-content-assets').style.display = 'none';
    document.getElementById('tab-content-vehicles').style.display = 'none';
    document.getElementById('tab-content-warehouse').style.display = 'none';
    if (document.getElementById('tab-content-clients')) document.getElementById('tab-content-clients').style.display = 'none';
    if (document.getElementById('tab-content-database')) document.getElementById('tab-content-database').style.display = 'none';
    
    // Reset all buttons to unselected state
    const btnIds = ['crew', 'assets', 'vehicles', 'warehouse', 'clients', 'database'];
    btnIds.forEach(id => {
        const btn = document.getElementById('tab-btn-' + id);
        if (btn) btn.classList.remove('active');
    });
    
    // Show active panel
    if (document.getElementById('tab-content-' + tabId)) document.getElementById('tab-content-' + tabId).style.display = 'flex';
    
    // Highlight active button
    const activeBtn = document.getElementById('tab-btn-' + tabId);
    if (activeBtn) activeBtn.classList.add('active');
    
    // Toggle footer buttons dynamically
    const btnAddMember = document.getElementById('btn-add-member');
    const btnAddAsset = document.getElementById('btn-add-asset');
    const btnAddVehicle = document.getElementById('btn-add-vehicle');
    const btnSaveWarehouse = document.getElementById('btn-save-warehouse');
    const btnAddClient = document.getElementById('btn-add-client');
    
    if (document.getElementById('footer-left-crew')) document.getElementById('footer-left-crew').style.display = (tabId === 'crew') ? 'flex' : 'none';
    if (document.getElementById('footer-left-assets')) document.getElementById('footer-left-assets').style.display = (tabId === 'assets') ? 'flex' : 'none';
    if (document.getElementById('footer-left-clients')) document.getElementById('footer-left-clients').style.display = (tabId === 'clients') ? 'flex' : 'none';
    if (btnAddMember) btnAddMember.style.setProperty('display', (tabId === 'crew') ? 'inline-flex' : 'none');
    if (btnAddAsset) btnAddAsset.style.setProperty('display', (tabId === 'assets') ? 'inline-flex' : 'none');
    if (btnAddVehicle) btnAddVehicle.style.setProperty('display', (tabId === 'vehicles') ? 'inline-flex' : 'none');
    if (btnSaveWarehouse) btnSaveWarehouse.style.setProperty('display', (tabId === 'warehouse') ? 'inline-flex' : 'none');
    if (btnAddClient) btnAddClient.style.setProperty('display', (tabId === 'clients') ? 'inline-flex' : 'none');

    const searchName = document.getElementById('search-name');
    const searchTag = document.getElementById('search-tag');
    const searchWarn = document.getElementById('search-filter-warning');
    if (searchName && searchName.parentElement && searchName.parentElement.parentElement) {
        searchName.parentElement.parentElement.style.display = (tabId === 'database') ? 'none' : '';
    }
    if (searchWarn) searchWarn.style.display = 'none';
    
    // Clear global search bars when swapping tabs
    if (searchName) searchName.value = '';
    if (searchTag) searchTag.value = '';
    
    if (tabId === 'warehouse') {
        // 🚀 LAZY LOAD WAREHOUSE DATA
        let needsFetch = false;
        let isCachedRendered = false;

        if (!globalWhRoots || globalWhRoots.length === 0) {
            needsFetch = true;
            try {
                let cachedRaw = localStorage.getItem('sm_wh_cache');
                if (cachedRaw) {
                    let cachedObj = JSON.parse(cachedRaw);
                    globalWhRoots = cachedObj.roots || [];
                    globalWhZones = cachedObj.zones || [];
                    globalWhAreas = cachedObj.areas || [];
                    if (globalWhRoots.length > 0) {
                        initWarehouseDrawer();
                        isCachedRendered = true;
                    }
                }
            } catch(e) {}
        }

        if (needsFetch) {
            if (!isCachedRendered) {
                document.querySelector('.wh-root-list').innerHTML = '<div style="padding: 30px 15px; text-align: center; color: #10b981; font-size: 11px; font-weight: 800; text-transform: uppercase;">Loading Warehouse Grid...</div>';
            }
            google.script.run.withSuccessHandler(res => {
                globalWhRoots = res.roots || [];
                globalWhZones = res.zones || [];
                globalWhAreas = res.areas || [];
                try { localStorage.setItem('sm_wh_cache', JSON.stringify({roots: globalWhRoots, zones: globalWhZones, areas: globalWhAreas})); } catch(e) {}
                initWarehouseDrawer();
            }).getWarehouseData();
        } else {
            initWarehouseDrawer();
        }
    } else if (tabId === 'assets') {
        if (typeof loadAssetRegistry === 'function') loadAssetRegistry();
    } else if (tabId === 'vehicles') {
        loadVehicles();
    } else if (tabId === 'database') {
        if (typeof loadDatabaseOpsPanel === 'function') loadDatabaseOpsPanel();
    }
}
</script>
