<script>
/**
 * 01b_Calendar_Tasks.html
 * Domain: Tasks and Notification monitoring and modals.
 */

// @INDEX: TASKS -> Render & Notifs

function findProjectByNotifName_(name) {
    const nLower = String(name || '').toLowerCase().trim();
    if (!nLower) return null;
    if (typeof calendar !== 'undefined' && calendar && typeof calendar.getEvents === 'function') {
        const events = calendar.getEvents();
        for (let i = 0; i < events.length; i++) {
            const ev = events[i];
            const title = String(ev.title || '').replace(/\s+WH$/i, '').toLowerCase().trim();
            if (title === nLower) return { type: 'project', id: ev.id };
        }
    }
    try {
        const phantom = JSON.parse(localStorage.getItem('sm_phantom_payload') || '{}');
        const list = phantom.projects || [];
        for (let i = 0; i < list.length; i++) {
            const p = list[i];
            const title = String(p.title || p.fullTitle || '').toLowerCase().trim();
            if (title === nLower) return { type: 'project', id: p.id };
        }
    } catch (e) { /* ignore */ }
    return null;
}

function resolveNotifNavigation(n) {
    if (!n) return null;
    const linkType = String(n.linkType || '').toLowerCase().trim();
    const linkId = String(n.linkId || '').trim();
    if (linkType && linkId) return { type: linkType, id: linkId };

    const msg = String(n.message || '');
    let m = msg.match(/assigned to task:\s*(.+)$/i) || msg.match(/Task deleted:\s*(.+)$/i);
    if (m) {
        const title = m[1].trim();
        const task = (globalTasks || []).find(function(t) { return String(t.title || '').trim() === title; });
        if (task) return { type: 'task', id: task.id };
    }
    m = msg.match(/(?:for|from):\s*(.+)$/i) || msg.match(/WEATHER ALERT for\s+([^:]+):/i);
    if (m) return findProjectByNotifName_(m[1].trim());
    return null;
}

function buildNotifCardHtml(n, opts) {
    opts = opts || {};
    const mobile = !!opts.mobile;
    let ts = new Date(n.timestamp).getTime();
    if (ts > new Date().getTime()) return { html: '', unread: false };

    let read = (typeof isNotifRead === 'function') ? isNotifRead(n.isRead) : !!n.isRead;
    let bg = read ? 'transparent' : 'rgba(244, 63, 94, 0.1)';
    let border = read ? '#333' : '#f43f5e';
    let dateStr = new Date(n.timestamp).toLocaleDateString();
    const nav = resolveNotifNavigation(n);
    const navHint = nav ? ' title="Open ' + (nav.type === 'task' ? 'task' : 'event') + '"' : '';
    const cardClass = 'notif-card' + (mobile ? ' notif-card--mobile' : '');

    const html = '<div id="notif-card-' + n.id + '" class="' + cardClass + '" data-read="' + read + '"' + navHint +
        ' onclick="openNotifTarget(\'' + n.id + '\')" style="background:' + bg + '; border:1px solid ' + border + ';">' +
        '<button type="button" class="notif-dismiss-btn" onclick="event.stopPropagation(); dismissNotif(\'' + n.id + '\')" title="Dismiss" aria-label="Dismiss">×</button>' +
        '<div class="notif-card-message">' + escapeHTML(n.message) + '</div>' +
        '<div class="notif-card-date">' + dateStr + '</div>' +
        '</div>';
    return { html: html, unread: !read };
}

function renderNotifCardsHtml(notifs, opts) {
    opts = opts || {};
    let html = '';
    let unreadCount = 0;
    (notifs || []).forEach(function(n) {
        const card = buildNotifCardHtml(n, opts);
        if (!card.html) return;
        if (card.unread) unreadCount++;
        html += card.html;
    });
    if (html === '') html = '<div style="color:#888; font-size:13px; text-align:center; padding:20px;">All caught up!</div>';
    return { html: html, unreadCount: unreadCount };
}

window.renderNotifCardsHtml = renderNotifCardsHtml;

function openNotifTarget(id) {
    markNotifReadLocally(id);
    const n = (globalNotifs || []).find(function(x) { return String(x.id) === String(id); });
    const nav = resolveNotifNavigation(n);
    if (!nav || !nav.id) return;

    if (typeof closeNotifDrawer === 'function') closeNotifDrawer();
    const mobileNotifView = document.getElementById('mobile-view-notifs');
    if (mobileNotifView && mobileNotifView.style.display !== 'none') {
        document.querySelectorAll('.mobile-view').forEach(function(el) { el.style.display = 'none'; });
        const home = document.getElementById('mobile-view-home');
        if (home) home.style.display = 'flex';
        if (typeof setMobileHeaderHome === 'function') setMobileHeaderHome();
    }

    if (nav.type === 'task') {
        if (typeof openTaskModal === 'function') openTaskModal(nav.id);
        return;
    }
    if (nav.type === 'project') {
        if (window.innerWidth <= 768 && typeof openMobileCrewHub === 'function') {
            openMobileCrewHub(nav.id);
        } else if (typeof goToEventTimeline === 'function') {
            goToEventTimeline(nav.id, 'main');
        }
    }
}

window.openNotifTarget = openNotifTarget;

function renderTasksAndNotifs(payload) {
    globalTasks = payload.tasks || [];
    globalNotifs = payload.notifs || [];
    
    let tHtml = '';
    const canGlobal = (typeof canViewAllGlobalTasks === 'function') && canViewAllGlobalTasks();
    globalTasks.forEach(t => {
        // Server already filters tasks per user; trust payload (avoids hiding UID-assigned tasks).
        let priority = t.priority || 'Medium';
        let color = priority === 'High' ? '#ef4444' : (priority === 'Low' ? '#3b82f6' : '#f59e0b');
        let statusBadge = t.status === 'Finished' ? '<span style="color:#10b981; font-weight:900; margin-left:5px;">✓</span>' : '';
        let numAssignees = t.assignees ? t.assignees.length : 0;
        tHtml += `
        <div class="project-card" onclick="openTaskModal('${t.id}')" style="border-left: 4px solid ${color};">
            <div style="display:flex; justify-content:space-between; margin-bottom:4px; align-items: center;">
                <b style="font-size:13px; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHTML(t.title)} ${statusBadge}</b>
                <span style="font-size:9px; font-weight:900; color:${color}; border:1px solid ${color}; padding:2px 4px; border-radius:4px; flex-shrink:0;">${priority.toUpperCase()}</span>
            </div>
            <div style="font-size:10px; color:#888;">${numAssignees} Assignees • Status: ${escapeHTML(t.status)}</div>
        </div>`;
    });
    if (tHtml === '' && tasksNotifsLoading) {
        tHtml = '<div style="color:#888; font-size:12px; text-align:center; padding:16px;">Loading tasks…</div>';
    } else if (tHtml === '') {
        tHtml = '<div style="color:#888; font-size:12px; text-align:center; padding:16px;">No tasks assigned to you.</div>';
    }
    document.getElementById('tasks-list').innerHTML = tHtml;

    const notifRender = renderNotifCardsHtml(globalNotifs, { mobile: window.innerWidth <= 768 });
    let notifListEl = document.getElementById('notif-dropdown-list');
    if (notifListEl) notifListEl.innerHTML = notifRender.html;
    let mobileNotifEl = document.getElementById('mobile-notifs-container');
    if (mobileNotifEl) mobileNotifEl.innerHTML = notifRender.html;
    const unreadCount = notifRender.unreadCount;
    let badge = document.getElementById('floating-notif-badge');
    if(badge) {
        let lip = document.getElementById('notif-lip');
        if(unreadCount > 0) { 
            badge.innerText = unreadCount; 
            badge.style.display = 'block'; 
            if(lip) lip.style.background = '#ef4444';
        } else {
            badge.style.display = 'none';
            if(lip) lip.style.background = '#3f3f46';
        }
    }

    let mBadge = document.getElementById('mobile-notif-badge');
    if (mBadge) {
        if (unreadCount > 0) {
            mBadge.innerText = unreadCount;
            mBadge.style.display = 'block';
        } else {
            mBadge.style.display = 'none';
        }
    }
    if (typeof renderMobileTasksList === 'function') renderMobileTasksList();
}

let foregroundPushRefreshTimer = null;

function syncPhantomTasksNotifs(tasks, notifs) {
    try {
        let phantom = JSON.parse(localStorage.getItem('sm_phantom_payload') || '{}');
        if (tasks !== undefined) phantom.tasks = tasks;
        if (notifs !== undefined) phantom.notifs = notifs;
        localStorage.setItem('sm_phantom_payload', JSON.stringify(phantom));
    } catch (e) { /* ignore */ }
}

const TASKS_NOTIFS_CACHE_MS = 30 * 60 * 1000;
let tasksNotifsLoading = false;

function loadTasksNotifsCache() {
    try {
        const raw = localStorage.getItem('sm_tasks_notifs_cache');
        if (!raw) return null;
        const c = JSON.parse(raw);
        if (!c || c.crew !== ACTIVE_USER_NAME) return null;
        if (Date.now() - (c.fetchedAt || 0) > TASKS_NOTIFS_CACHE_MS) return null;
        return c;
    } catch (e) { return null; }
}

function saveTasksNotifsCache(tasks, notifs) {
    try {
        localStorage.setItem('sm_tasks_notifs_cache', JSON.stringify({
            crew: ACTIVE_USER_NAME,
            fetchedAt: Date.now(),
            tasks: tasks || [],
            notifs: notifs || []
        }));
    } catch (e) { /* ignore */ }
}

function setTasksListLoading(loading) {
    tasksNotifsLoading = !!loading;
    const el = document.getElementById('tasks-list');
    if (!el || !loading) return;
  if (!globalTasks || globalTasks.length === 0) {
        el.innerHTML = '<div style="color:#888; font-size:12px; text-align:center; padding:16px;">Loading tasks…</div>';
    }
    const mobileEl = document.getElementById('mobile-tasks-list');
    if (mobileEl && loading && (!globalTasks || globalTasks.length === 0)) {
        mobileEl.innerHTML = '<div style="color:#888; text-align:center; padding:24px;">Loading tasks…</div>';
    }
}

function bootTasksAndNotifs() {
    const cached = loadTasksNotifsCache();
    if (cached && ((cached.tasks && cached.tasks.length) || (cached.notifs && cached.notifs.length))) {
        renderTasksAndNotifs({ tasks: cached.tasks || [], notifs: cached.notifs || [] });
    } else {
        setTasksListLoading(true);
    }
    refreshTasksAndNotifs({ retriesLeft: 2 });
}

window.bootTasksAndNotifs = bootTasksAndNotifs;

/** Fast refresh — tasks + notification list only (not full calendar payload). */
function refreshTasksAndNotifs(opts) {
    opts = opts || {};
    if (typeof ACTIVE_USER_NAME === 'undefined' || !ACTIVE_USER_NAME) return;
    const hadCache = (globalTasks && globalTasks.length > 0) || !!(loadTasksNotifsCache() && loadTasksNotifsCache().tasks && loadTasksNotifsCache().tasks.length);
    google.script.run
        .withFailureHandler(function(err) {
            console.warn('Tasks/notifs refresh:', err && err.message);
            setTasksListLoading(false);
        })
        .withSuccessHandler(function(extras) {
            if (!extras) return;
            const tasks = extras.tasks || [];
            const notifs = extras.notifs || [];
            if (tasks.length === 0 && hadCache && opts.retriesLeft > 0) {
                setTimeout(function() {
                    refreshTasksAndNotifs({ retriesLeft: opts.retriesLeft - 1 });
                }, 2000);
                return;
            }
            setTasksListLoading(false);
            renderTasksAndNotifs({ tasks: tasks, notifs: notifs });
            saveTasksNotifsCache(tasks, notifs);
            syncPhantomTasksNotifs(tasks, notifs);
        })
        .getTasksNotifsPayload(ACTIVE_USER_NAME);
}

window.refreshTasksAndNotifs = refreshTasksAndNotifs;

function showPushToast(title, body, durationMs) {
    let container = document.getElementById('push-toast-container');
    if (!container) return;
    let toast = document.createElement('div');
    toast.className = 'push-toast';
    let safeTitle = typeof escapeHTML === 'function' ? escapeHTML(title || 'Showrunner') : (title || 'Showrunner');
    let safeBody = typeof escapeHTML === 'function' ? escapeHTML(body || '') : (body || '');
    toast.innerHTML = '<div class="push-toast-brand">SHOWRUNNER</div><div class="push-toast-title">' + safeTitle + '</div>' +
        (safeBody ? '<div class="push-toast-body">' + safeBody + '</div>' : '');
    container.appendChild(toast);
    let holdMs = Number(durationMs);
    if (!isFinite(holdMs) || holdMs < 1000) holdMs = 5000;
    setTimeout(function() {
        toast.classList.add('push-toast--out');
        setTimeout(function() {
            if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 280);
    }, holdMs);
}

function handleForegroundPush(data) {
    showPushToast(data && data.title, data && data.body);
    if (foregroundPushRefreshTimer) clearTimeout(foregroundPushRefreshTimer);
    foregroundPushRefreshTimer = setTimeout(function() {
        foregroundPushRefreshTimer = null;
        if (typeof refreshTasksAndNotifs === 'function') refreshTasksAndNotifs();
        else if (typeof refreshData === 'function') refreshData();
    }, 350);
}

window.handleForegroundPush = handleForegroundPush;

// Notification Interaction Controls
function openNotifDrawer() {
    let wrapper = document.getElementById('notif-drawer-wrapper');
    if (wrapper) wrapper.style.display = 'flex';
}

function closeNotifDrawer() {
    let wrapper = document.getElementById('notif-drawer-wrapper');
    if (wrapper) wrapper.style.display = 'none';
}

function toggleNotifDropdown() {
    let wrapper = document.getElementById('notif-drawer-wrapper');
    if (wrapper) {
        wrapper.style.display = (wrapper.style.display === 'flex') ? 'none' : 'flex';
    }
}

function dismissNotif(id) {
    document.querySelectorAll('#notif-card-' + id).forEach(card => {
        card.style.display = 'none';
        card.dataset.read = 'true';
    });
    globalNotifs = (globalNotifs || []).filter(function(n) { return String(n.id) !== String(id); });
    syncPhantomTasksNotifs(globalTasks, globalNotifs);
    google.script.run.deleteNotification(id);
    updateBadgeLocally();
}

function postponeNotif(id) {
    document.querySelectorAll('#notif-card-' + id).forEach(card => {
        card.style.display = 'none';
        card.dataset.read = 'true';
    });
    globalNotifs = (globalNotifs || []).filter(function(n) { return String(n.id) !== String(id); });
    syncPhantomTasksNotifs(globalTasks, globalNotifs);
    google.script.run.postponeNotification(id);
    updateBadgeLocally();
}

function clearAllNotifs() {
    globalNotifs = [];
    let emptyHtml = '<div style="color:#888; font-size:13px; text-align:center; padding:20px;">All caught up!</div>';
    let notifListEl = document.getElementById('notif-dropdown-list');
    if (notifListEl) notifListEl.innerHTML = emptyHtml;
    let mobileNotifEl = document.getElementById('mobile-notifs-container');
    if (mobileNotifEl) mobileNotifEl.innerHTML = emptyHtml;
    syncPhantomTasksNotifs(globalTasks, []);
    updateBadgeLocally();
    google.script.run
        .withFailureHandler(function(err) {
            console.warn('Clear notifications:', err && err.message);
            if (typeof refreshTasksAndNotifs === 'function') refreshTasksAndNotifs();
        })
        .withSuccessHandler(function() {
            syncPhantomTasksNotifs(globalTasks, []);
        })
        .clearAllNotifications(ACTIVE_USER_NAME);
    closeNotifDrawer();
}

function markNotifReadLocally(id) {
    let cards = document.querySelectorAll('#notif-card-' + id);
    let updated = false;
    cards.forEach(card => {
        if (card.dataset.read !== 'true') {
            card.dataset.read = 'true';
            card.style.background = 'transparent';
            card.style.borderColor = '#333';
            updated = true;
        }
    });
    if (updated) {
        google.script.run.markSingleNotifRead(id);
        updateBadgeLocally();
    }
}

function updateBadgeLocally() {
    let unreadCount = document.querySelectorAll('#notif-dropdown-list > div[data-read="false"]').length;
    if (unreadCount === 0 && document.getElementById('mobile-notifs-container')) {
        unreadCount = document.querySelectorAll('#mobile-notifs-container > div[data-read="false"]').length;
    }
    
    let badge = document.getElementById('floating-notif-badge');
    let mBadge = document.getElementById('mobile-notif-badge');
    
    if (badge) {
        if (unreadCount > 0) { 
            badge.innerText = unreadCount; 
            badge.style.display = 'block'; 
        } else {
            badge.style.display = 'none';
        }
    }
    if (mBadge) {
        if (unreadCount > 0) {
            mBadge.innerText = unreadCount;
            mBadge.style.display = 'block';
        } else {
            mBadge.style.display = 'none';
        }
    }
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
    let bell = document.getElementById('nav-notif-container');
    if (bell && !bell.contains(e.target)) {
        if (typeof closeNotifDrawer === 'function') closeNotifDrawer();
    }
});

function applyTaskModalMode(personalOnly) {
    const overlay = document.getElementById('task-modal-overlay');
    if (!overlay) return;
    overlay.classList.toggle('task-personal-only', !!personalOnly);
    const saveBtn = document.getElementById('btn-save-task');
    if (saveBtn) saveBtn.innerText = personalOnly ? 'SAVE PROGRESS' : 'SAVE TASK';
}

function openTaskModal(id) {
    const creating = !id;
    if (creating && typeof canManageGlobalTasks === 'function' && !canManageGlobalTasks()) {
        return alert('🛑 Permission Denied: Only managers can create global tasks.');
    }

    let task = id ? globalTasks.find(t => t.id === id) : null;
    if (task && typeof canManageGlobalTasks === 'function' && !canManageGlobalTasks()) {
        if (typeof isTaskAssignedToMe === 'function' && !isTaskAssignedToMe(task)) {
            return alert('🛑 Permission Denied: This task is not assigned to you.');
        }
    }

    const personalOnly = !!task && typeof canManageGlobalTasks === 'function' && !canManageGlobalTasks();
    document.getElementById('task-id').value = task ? task.id : '';
    document.getElementById('task-title').value = task ? task.title : '';
    document.getElementById('task-priority').value = task ? (task.priority || 'Medium') : 'Medium';
    document.getElementById('task-status').value = task ? task.status : 'Pending';
    document.getElementById('task-notes').value = task ? task.notes : '';
    
    window.currentTaskTodos = task && task.todos ? JSON.parse(JSON.stringify(task.todos)) : [];
    renderTaskTodos();
    document.getElementById('task-new-todo').value = '';

    let assignees = task && task.assignees ? task.assignees : [];
    document.getElementById('task-assignees-hidden').value = JSON.stringify(assignees);
    renderTaskCrewPills(assignees);

    let assets = task && task.assets ? task.assets : [];
    document.getElementById('task-assets-hidden').value = JSON.stringify(assets);
    renderTaskAssets(assets);
    
    document.getElementById('btn-delete-task').style.display = (task && !personalOnly) ? 'block' : 'none';
    applyTaskModalMode(personalOnly);
    document.getElementById('task-modal-overlay').style.display = 'flex';
}

function renderTaskTodos() {
    const safeEscape = (str) => typeof escapeHTML === 'function' ? escapeHTML(str) : String(str || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    let html = window.currentTaskTodos.map((td, i) => `
       <div style="display:flex; align-items:center; gap:8px; background:#18181b; padding:6px 10px; border-radius:4px; border:1px solid #333;">
          <input type="checkbox" ${td.done ? 'checked' : ''} onchange="toggleTaskTodo(${i})" style="margin:0; width:16px; height:16px; cursor:pointer;">
          <span style="flex:1; color:${td.done ? '#71717a' : '#fff'}; text-decoration:${td.done ? 'line-through' : 'none'}; font-size:12px;">${safeEscape(td.text)}</span>
          <button class="btn-delete btn-sm" style="padding:4px 8px; margin:0;" onclick="removeTaskTodo(${i})">X</button>
       </div>
    `).join('');
    if(html === '') html = '<div style="color:#888; font-size:10px; font-style:italic;">No to-do items.</div>';
    document.getElementById('task-todos').innerHTML = html;
}

function addTaskTodo() {
    let val = document.getElementById('task-new-todo').value.trim();
    if(!val) return;
    window.currentTaskTodos.push({ text: val, done: false });
    document.getElementById('task-new-todo').value = '';
    renderTaskTodos();
}

function toggleTaskTodo(index) {
    window.currentTaskTodos[index].done = !window.currentTaskTodos[index].done;
    renderTaskTodos();
}

function removeTaskTodo(index) {
    window.currentTaskTodos.splice(index, 1);
    renderTaskTodos();
}

function openTaskCrewModal() {
    let rosterToUse = (typeof getTaskCrewRoster === 'function') ? getTaskCrewRoster() : ((globalRosterData && globalRosterData.roster) ? globalRosterData.roster : activeRoster);
    let currentStr = document.getElementById('task-assignees-hidden').value;
    let assignees = currentStr ? JSON.parse(currentStr) : [];
    
    let html = rosterToUse.map(c => {
        const checked = (typeof isAssigneeSelected === 'function')
            ? (isAssigneeSelected(c.email, assignees) || isAssigneeSelected(c.uid, assignees))
            : assignees.includes(c.email);
        const safeEmail = typeof escapeHTML === 'function' ? escapeHTML(c.email) : c.email;
        const safeName = typeof escapeHTML === 'function' ? escapeHTML(c.name) : c.name;
        return `<label style="display:flex; align-items:center; gap:8px; padding:6px 10px; color:#fff; font-size:12px; cursor:pointer; border-bottom: 1px solid #222;">
          <input type="checkbox" class="task-crew-cb" value="${safeEmail}" ${checked ? 'checked' : ''} style="margin:0; width:16px; height:16px;">
          ${safeName}
       </label>`;
    }).join('');
    
    document.getElementById('task-crew-checkboxes').innerHTML = html;
    document.getElementById('task-crew-modal-overlay').style.display = 'flex';
}

function confirmTaskCrew() {
    let selected = Array.from(document.querySelectorAll('.task-crew-cb:checked')).map(cb => cb.value);
    document.getElementById('task-assignees-hidden').value = JSON.stringify(selected);
    renderTaskCrewPills(selected);
    document.getElementById('task-crew-modal-overlay').style.display = 'none';
}

function renderTaskCrewPills(assignees) {
    let html = assignees.map(function(id, idx) {
        let name = (typeof resolveCrewDisplayLabel === 'function') ? resolveCrewDisplayLabel(id) : id;
        let safeName = typeof escapeHTML === 'function' ? escapeHTML(name) : String(name).replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return `<div style="background:#27272a; border:1px solid #3f3f46; color:#e4e4e7; padding:4px 8px; border-radius:4px; font-size:10px; font-weight:bold; display:flex; align-items:center; gap:6px;">${safeName} <span style="cursor:pointer; color:#ef4444;" onclick="removeTaskCrewAt(${idx})">✖</span></div>`;
    }).join('');
    if(html === '') html = '<div style="color:#888; font-size:10px; font-style:italic; padding-top:4px;">No crew assigned.</div>';
    document.getElementById('task-assigned-crew-list').innerHTML = html;
}

function removeTaskCrewAt(index) {
    let assignees = JSON.parse(document.getElementById('task-assignees-hidden').value || '[]');
    assignees.splice(index, 1);
    document.getElementById('task-assignees-hidden').value = JSON.stringify(assignees);
    renderTaskCrewPills(assignees);
}

function renderTaskAssets(assets) {
    let html = assets.map(a => `
        <div style="background:#27272a; border:1px solid #f97316; color:#fdba74; padding:4px 8px; border-radius:4px; font-size:10px; font-weight:bold;">${typeof escapeHTML === 'function' ? escapeHTML(a.name) : a.name.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
    `).join('');
    if(html === '') html = 'No assets assigned';
    document.getElementById('task-assigned-assets-list').innerHTML = html;
}

function saveTask() {
    const btn = document.getElementById('btn-save-task');
    const title = document.getElementById('task-title').value;
    const personalOnly = document.getElementById('task-modal-overlay').classList.contains('task-personal-only');
    if (!personalOnly && !title) return alert("A task title is required.");
    btn.innerText = "SAVING..."; btn.disabled = true;
    
    let safetyTimer = setTimeout(() => {
        btn.innerText = "SAVE TASK"; btn.disabled = false;
        alert("Network Timeout: Server did not respond. Please check your connection.");
    }, 15000);
    
    let assignees = JSON.parse(document.getElementById('task-assignees-hidden').value || '[]');
    let assets = JSON.parse(document.getElementById('task-assets-hidden').value || '[]');
    
    let taskObj = {
        id: document.getElementById('task-id').value,
        title: title,
        priority: document.getElementById('task-priority').value,
        status: document.getElementById('task-status').value,
        assignees: assignees,
        todos: window.currentTaskTodos,
        assets: assets,
        notes: document.getElementById('task-notes').value
    };
    
    google.script.run
        .withFailureHandler(err => {
            clearTimeout(safetyTimer);
            btn.innerText = "SAVE TASK"; btn.disabled = false;
            alert("Error: " + err.message);
        })
        .withSuccessHandler(() => {
            clearTimeout(safetyTimer);
            document.getElementById('task-modal-overlay').style.display = 'none';
            btn.innerText = "SAVE TASK"; btn.disabled = false;
            if (typeof refreshTasksAndNotifs === 'function') refreshTasksAndNotifs();
            else if (typeof refreshData === 'function') refreshData();
        }).saveTaskData(taskObj, ACTIVE_USER_NAME);
}

function deleteTask() {
    if (typeof canManageGlobalTasks === 'function' && !canManageGlobalTasks()) {
        return alert('🛑 Permission Denied: Cannot delete tasks.');
    }
    if(!confirm("Are you sure you want to delete this task permanently?")) return;
    const btn = document.getElementById('btn-delete-task');
    btn.innerText = "DELETING..."; btn.disabled = true;
    
    let safetyTimer = setTimeout(() => {
        btn.innerText = "DELETE"; btn.disabled = false;
        alert("Network Timeout: Server did not respond. Please check your connection.");
    }, 15000);
    
    google.script.run
        .withFailureHandler(err => {
            clearTimeout(safetyTimer);
            btn.innerText = "DELETE"; btn.disabled = false;
            alert("Error: " + err.message);
        })
        .withSuccessHandler(() => {
            clearTimeout(safetyTimer);
            document.getElementById('task-modal-overlay').style.display = 'none';
            btn.innerText = "DELETE"; btn.disabled = false;
            if (typeof refreshTasksAndNotifs === 'function') refreshTasksAndNotifs();
            else if (typeof refreshData === 'function') refreshData();
        }).deleteTaskData(document.getElementById('task-id').value, ACTIVE_USER_NAME);
}
</script>
