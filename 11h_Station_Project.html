<!-- @INDEX: STATION -> Project picker markup -->
<div id="station-project-picker" aria-label="Pick a project">
  <div class="station-settings-header">
    <div class="station-settings-header__title">Open a project</div>
    <button type="button" class="btn-outline btn-sm" style="margin:0;" onclick="stationCloseProjectPicker()">Cancel</button>
  </div>
  <div class="station-project-picker__body">
    <div id="station-project-picker-status" class="station-shell-status" style="text-align:center;">Loading projects…</div>
    <div id="station-project-picker-list" class="station-project-picker__list"></div>
  </div>
</div>
