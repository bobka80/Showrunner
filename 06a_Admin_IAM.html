<script>
/**
 * 06a_Admin_IAM.html
 * Domain: Identity & Access Management (IAM), Crew Roster, Roles & Security logic.
 */

let globalRoles = [];
let globalIamDirectory = [];

// Checkbox ids in the Role Matrix form (must match 00c_UI_Forms.html — no db_delete_assets; derived on save)
const IAM_ROLE_FORM_KEYS = [
  'Is_Tunneling', 'db_view_assets', 'db_edit_assets', 'db_view_vehicles', 'db_view_warehouses',
  'db_view_clients', 'fin_view_roi', 'fin_view_internal', 'hr_view_rates',
  'event_create_standard', 'event_create_crossrent', 'event_edit_timeline',
  'event_assets_window', 'event_view_pricing', 'view_month_roster',
  'view_logistics', 'task_manage_global', 'task_manage_personal'
];

function isPermTruthy(val) {
  return val === true || val === 'true' || val === 'TRUE' || val === 1 || val === '1';
}

function setRoleFormCheckbox(key, checked) {
  const el = document.getElementById(key);
  if (el && el.type === 'checkbox') el.checked = !!checked;
}

function findRoleBySelectValue(val) {
  if (!val || val === 'NEW' || !globalRoles || !globalRoles.length) return null;
  return globalRoles.find(function(r) {
    return isMatch(getRoleOptionValue(r), val)
      || isMatch(r.id, val)
      || isMatch(r.key, val)
      || isMatch(r.name, val);
  }) || null;
}

function populateRoleEditorForm(role) {
  const keys = IAM_ROLE_FORM_KEYS;
  const nameInput = document.getElementById('role-name');
  const sysAccessInput = document.getElementById('role-sysAccess');
  const delBtn = document.getElementById('btn-delete-role');
  const dupBtn = document.getElementById('btn-duplicate-role');

  if (!role) {
    if (nameInput) nameInput.value = '';
    if (sysAccessInput) sysAccessInput.value = 'CREW';
    if (delBtn) delBtn.style.display = 'none';
    if (dupBtn) dupBtn.style.display = 'none';
    keys.forEach(function(k) { setRoleFormCheckbox(k, false); });
    return;
  }

  if (nameInput) nameInput.value = role.name || role.id || '';
  if (sysAccessInput) sysAccessInput.value = normalizeAccessTier(role.sysAccess || 'CREW');
  if (delBtn) delBtn.style.display = 'inline-flex';
  if (dupBtn) dupBtn.style.display = 'inline-flex';
  keys.forEach(function(k) { setRoleFormCheckbox(k, isPermTruthy(role[k])); });
}

function populateRoleSelectDropdown(preferredValue) {
  const select = document.getElementById('role-select');
  if (!select) return;

  select.innerHTML = '<option value="NEW" style="display:none;">---</option>';
  if (globalRoles && globalRoles.length > 0) {
    globalRoles.forEach(function(r) {
      const val = getRoleOptionValue(r);
      const txt = getRoleOptionLabel(r);
      select.innerHTML += '<option value="' + val + '">' + txt + '</option>';
    });
    const match = preferredValue && findRoleBySelectValue(preferredValue);
    select.value = match ? getRoleOptionValue(match) : getRoleOptionValue(globalRoles[0]);
  } else {
    select.value = 'NEW';
  }
  handleRoleSelectionChange();
}

// Helper: Aggressively cleans objects and hidden spaces
function safeText(val) {
    if (val === null || val === undefined) return "";
    if (typeof val === 'object') {
        let extracted = val.value || val.name || val.text || val[Object.keys(val)[0]] || "";
        return extracted.toString().trim();
    }
    return String(val).trim();
}

// Helper: Forces perfect dropdown matching regardless of spaces/casing
function isMatch(val1, val2) {
    if (!val1 && !val2) return true;
    return safeText(val1).toLowerCase() === safeText(val2).toLowerCase();
}

function getRoleOptionValue(r) {
    if (typeof r === 'string') return safeText(r);
    return safeText(r.key || r.id);
}

function getRoleOptionLabel(r) {
    if (typeof r === 'string') return safeText(r);
    return safeText(r.name || r.key || r.id);
}

function userMatchesRole(user, r) {
    if (!user || !r) return false;
    let val = getRoleOptionValue(r);
    let label = getRoleOptionLabel(r);
    let rid = typeof r === 'string' ? r : safeText(r.id);
    return isMatch(user.roleId, val)
        || isMatch(user.roleId, rid)
        || isMatch(user.roleId, label)
        || isMatch(user.roleName, label)
        || isMatch(user.roleName, val);
}

function resolveRoleDisplayName(roleRef, resolvedName) {
    let resolved = safeText(resolvedName);
    if (resolved) return resolved;

    let ref = safeText(roleRef);
    if (!ref) return 'None';
    if (globalRoles && globalRoles.length) {
        const hit = globalRoles.find(r => userMatchesRole({ roleId: ref, roleName: '' }, r) || isMatch(ref, getRoleOptionLabel(r)));
        if (hit) return getRoleOptionLabel(hit);
    }
    return ref;
}

function openAddMemberModal() {
    document.getElementById('add-member-modal-overlay').style.display = 'flex';
    
    document.getElementById('add-member-name').value = '';
    document.getElementById('add-member-email').value = '';
    document.getElementById('add-member-pass').value = '';
    document.getElementById('add-member-mult').value = '1.0';
    document.getElementById('add-member-mult').value = '1.0';

    const roleSelect = document.getElementById('add-member-role');
    roleSelect.innerHTML = '<option value="">Select Logic Key...</option>';
    if (typeof globalRoles !== 'undefined') globalRoles.forEach(r => {
        let val = getRoleOptionValue(r);
        let label = getRoleOptionLabel(r);
        roleSelect.innerHTML += `<option value="${val}">${label}</option>`;
    });

    const assignSelect = document.getElementById('add-member-assign');
    assignSelect.innerHTML = '<option value="">Select Assignment...</option>';
    if (typeof ROLE_COLORS !== 'undefined') Object.keys(ROLE_COLORS).forEach(a => assignSelect.innerHTML += `<option value="${safeText(a)}">${safeText(a)}</option>`);

    const deptSelect = document.getElementById('add-member-dept');
    deptSelect.innerHTML = '<option value="">Select Dept...</option>';
    if (typeof SYSTEM_DEPARTMENTS !== 'undefined') SYSTEM_DEPARTMENTS.forEach(d => { deptSelect.innerHTML += `<option value="${d.uid || d.name}">${d.name}</option>`; });

    const mealSelect = document.getElementById('add-member-meal');
    mealSelect.innerHTML = '<option value="">Select Meal...</option>';
    if (typeof SYSTEM_MEALS !== 'undefined') SYSTEM_MEALS.forEach(m => { let c = safeText(m); mealSelect.innerHTML += `<option value="${c}">${c}</option>`; });
}

function submitNewMember() {
    const payload = {
        name: document.getElementById('add-member-name').value,
        email: document.getElementById('add-member-email').value,
        passcode: document.getElementById('add-member-pass').value,
        payrollMultiplier: document.getElementById('add-member-mult').value,
        jobTitle: document.getElementById('add-member-assign').value,
        department: document.getElementById('add-member-dept').value,
        meal: document.getElementById('add-member-meal').value,
        roleId: document.getElementById('add-member-role').value
    };
    
    if(!payload.name || !payload.email || payload.passcode.length !== 6 || !payload.roleId) {
        return alert("Name, Email, 6-char Passcode, and Role are required.");
    }

    const btn = document.getElementById('btn-submit-member');
    btn.innerText = "SAVING TO VAULT..."; 
    btn.disabled = true;

    let safetyTimer = setTimeout(() => {
        btn.innerText = "STILL SAVING..."; 
    }, 15000);

    let hardFailTimer = setTimeout(() => {
        btn.innerText = "ADD TO ROSTER"; btn.disabled = false;
        alert("Network Timeout: The server is taking an unusually long time. Please check your roster to see if the user was added before trying again.");
    }, 45000);

    google.script.run.withSuccessHandler(res => {
        clearTimeout(safetyTimer);
        clearTimeout(hardFailTimer);
        btn.innerText = "ADD TO ROSTER"; 
        btn.disabled = false;
        if(res.success) {
            document.getElementById('add-member-modal-overlay').style.display = 'none';
            openMasterSettings(); 
        } else alert(res.error);
    }).withFailureHandler(err => {
        clearTimeout(safetyTimer);
        clearTimeout(hardFailTimer);
        btn.innerText = "ADD TO ROSTER"; 
        btn.disabled = false;
        alert("Server Error: " + err.message);
    }).provisionNewUser(ACTIVE_USER_NAME, payload);
}

function openMasterSettings(targetTab = null) { 
  if (typeof closeModals === 'function') {
      if (!closeModals()) return;
  }
  document.getElementById('master-settings-overlay').style.display='flex'; 
  if (typeof updateActiveNav === 'function') updateActiveNav('nav-btn-master');

  const hasPerm = (typeof window.userHasPerm === 'function')
    ? window.userHasPerm
    : function(key) { const v = USER_PERMISSIONS[key]; return v === true || v === 'true'; };

  const isRoot = (typeof USER_ACCESS !== 'undefined' && USER_ACCESS === 'ROOT');
  const isAdmin = (typeof accessTierAtLeast === 'function') ? accessTierAtLeast('ADMIN') : isRoot;
  const isManagerOnly = (typeof accessTierAtLeast === 'function')
    ? (accessTierAtLeast('MANAGER') && !accessTierAtLeast('ADMIN'))
    : false;

  const canSeeDbTab = function(permKey) {
    if (isRoot || isAdmin) return true;
    if (isManagerOnly) return hasPerm(permKey);
    return hasPerm(permKey);
  };

  const tabDefs = [
    { id: 'crew', btn: 'tab-btn-crew', visible: isRoot },
    { id: 'assets', btn: 'tab-btn-assets', visible: canSeeDbTab('db_view_assets') },
    { id: 'vehicles', btn: 'tab-btn-vehicles', visible: canSeeDbTab('db_view_vehicles') },
    { id: 'warehouse', btn: 'tab-btn-warehouse', visible: canSeeDbTab('db_view_warehouses') },
    { id: 'clients', btn: 'tab-btn-clients', visible: canSeeDbTab('db_view_clients') },
    { id: 'database', btn: 'tab-btn-database', visible: isRoot }
  ];

  const visibleTabs = [];
  tabDefs.forEach(function(t) {
    const el = document.getElementById(t.btn);
    if (el) el.style.display = t.visible ? 'inline-block' : 'none';
    if (t.visible) visibleTabs.push(t.id);
  });

  if (!targetTab || visibleTabs.indexOf(targetTab) === -1) {
    targetTab = visibleTabs[0] || 'assets';
  }
  switchResourceTab(targetTab);

  const rosterEl = document.getElementById('roster-list-container');
  if (isRoot && rosterEl) {
    rosterEl.innerHTML = '<div style="color:#10b981; padding:40px; text-align:center; font-weight:bold; font-size:16px;">Decrypting Vault Data...</div>';
    google.script.run
      .withFailureHandler(function(error) {
         rosterEl.innerHTML = `<div style="color:#ef4444; padding:40px; text-align:center; font-weight:bold; font-size:16px;">Server Error:<br>${error.message}</div>`;
      })
      .withSuccessHandler(function(response) {
         if (response && response.error) {
            rosterEl.innerHTML = `<div style="color:#ef4444; padding:40px; text-align:center; font-weight:bold; font-size:16px;">Access Denied:<br>${response.error}</div>`;
            return;
         }
         globalRoles = response.roles || [];
         globalIamDirectory = response.crew || [];
         renderRosterList();
      }).getSecureIamDirectory(ACTIVE_USER_NAME);
  } else if (rosterEl) {
    rosterEl.innerHTML = '';
  }
}

// @INDEX: IAM -> Handle Role Selection Change
function handleRoleSelectionChange() {
  const val = document.getElementById('role-select').value;

  if (val === 'NEW') {
    populateRoleEditorForm(null);
    return;
  }

  populateRoleEditorForm(findRoleBySelectValue(val));
}

// @INDEX: IAM -> Delete Role Configuration
function deleteRole() {
  const val = document.getElementById('role-select').value;
  if (val === 'NEW') return;
  
  const roleObj = findRoleBySelectValue(val);
  const displayName = roleObj ? (roleObj.name || roleObj.id) : val;

  if (!confirm(`Are you sure you want to completely delete the role "${displayName}"? This may break permissions for users currently assigned to it.`)) return;
  
  const btn = document.getElementById('btn-delete-role');
  btn.innerText = "DELETING...";
  
  google.script.run.withSuccessHandler(res => {
    alert(res.message);
    btn.innerText = "DELETE ROLE";
    openMasterSettings(); // Refresh dropdowns in background
    document.getElementById('iam-modal-overlay').style.display='none';
  }).deleteRoleConfig(ACTIVE_USER_NAME, val);
}

// @INDEX: IAM -> Duplicate Role Configuration
function duplicateRole() {
  const val = document.getElementById('role-select').value;
  if (val === 'NEW') return;
  
  // Set dropdown to NEW so it saves as a brand new role
  document.getElementById('role-select').value = 'NEW';
  
  // Windows-style duplication naming: "Role Name (1)"
  const nameInput = document.getElementById('role-name');
  let baseName = nameInput.value.replace(/\s\(\d+\)$/, '');
  let counter = 1;
  let newName = `${baseName} (${counter})`;
  
  // Check if name exists
  while(globalRoles.find(r => (r.name||r.id) === newName)) {
      counter++;
      newName = `${baseName} (${counter})`;
  }
  
  nameInput.value = newName;
  
  // Hide delete/duplicate since this is now an unsaved 'NEW' role state
  document.getElementById('btn-delete-role').style.display = 'none';
  document.getElementById('btn-duplicate-role').style.display = 'none';
}

// @INDEX: IAM -> Open Role Editor & Populate Dropdown
function openIamDashboard() {
  document.getElementById('iam-modal-overlay').style.display = 'flex';

  const select = document.getElementById('role-select');
  if (select) {
    select.innerHTML = '<option value="">Loading roles...</option>';
    select.disabled = true;
  }

  google.script.run
    .withFailureHandler(function(err) {
      if (select) select.disabled = false;
      alert('Could not load roles: ' + err.message);
    })
    .withSuccessHandler(function(response) {
      if (select) select.disabled = false;
      if (response && response.error) {
        alert(response.error);
        return;
      }
      globalRoles = response.roles || [];
      globalIamDirectory = response.crew || globalIamDirectory;
      populateRoleSelectDropdown();
    })
    .getSecureIamDirectory(ACTIVE_USER_NAME);
}

// @INDEX: IAM -> Save Role Configuration
function submitRole() {
  const keys = IAM_ROLE_FORM_KEYS;

  const payload = {
      id: document.getElementById('role-select').value,
      name: document.getElementById('role-name').value,
      sysAccess: document.getElementById('role-sysAccess').value
  };

  if (!payload.name) return alert("Role Name is required.");

  keys.forEach(function(k) {
    const el = document.getElementById(k);
    payload[k] = el && el.type === 'checkbox' ? el.checked : false;
  });

  if (payload.db_edit_assets) payload.db_view_assets = true;
  if (!payload.db_view_assets) payload.db_edit_assets = false;
  payload.db_delete_assets = !!payload.db_edit_assets;

  const btn = document.getElementById('btn-save-role');
  btn.innerText = "SAVING TO DATABASE...";

  google.script.run.withSuccessHandler(function(res) {
    alert(res.message);
    btn.innerText = "SAVE ROLE";
    google.script.run
      .withSuccessHandler(function(response) {
        if (response && !response.error) {
          globalRoles = response.roles || [];
          globalIamDirectory = response.crew || globalIamDirectory;
        }
        openMasterSettings();
        document.getElementById('iam-modal-overlay').style.display = 'none';
      })
      .withFailureHandler(function() {
        openMasterSettings();
        document.getElementById('iam-modal-overlay').style.display = 'none';
      })
      .getSecureIamDirectory(ACTIVE_USER_NAME);
  }).saveRoleConfig(ACTIVE_USER_NAME, payload);
}

// ==========================================
// --- MASTER ROSTER LOGIC ---
// ==========================================
// @INDEX: IAM -> Render Directory
function renderRosterList() {
  const container = document.getElementById('roster-list-container');
  container.innerHTML = "";
  
  let nameQuery = document.getElementById('search-name') ? document.getElementById('search-name').value.toLowerCase() : '';
  let tagQuery = document.getElementById('search-tag') ? document.getElementById('search-tag').value.toLowerCase() : '';

  globalIamDirectory.forEach((user, index) => {
     let match = true;
     if (nameQuery && !safeText(user.name).toLowerCase().includes(nameQuery) && !safeText(user.email).toLowerCase().includes(nameQuery)) match = false;
     if (tagQuery) {
        let dObj = getDeptObj(user.dept);
        let deptName = dObj ? dObj.name.toLowerCase() : '';
        if (!deptName.includes(tagQuery) && !(user.jobTitle && user.jobTitle.toLowerCase().includes(tagQuery))) match = false;
     }
     if (!match) return; 

     let sysAcc = safeText(user.sysAccess).toUpperCase();
     let rId = safeText(user.roleId).toLowerCase();

     let uAssign = safeText(user.jobTitle) || 'None';
     let uDeptObj = getDeptObj(user.dept);
     let uDept = safeText(uDeptObj.name) || 'None';
     let uDeptVal = safeText(user.dept) || 'None';
     let uMeal = safeText(user.meal) || 'None';

     // roleOptions is no longer needed since we just print the text
     let assignOptions = `<option value="${uAssign}">${uAssign}</option>`;
     let deptOptions = `<option value="${uDeptVal}">${uDept}</option>`;
     let mealOptions = `<option value="${uMeal}">${uMeal}</option>`;

     let rowHtml = `
        <div style="display:flex; gap:10px; align-items:center; padding:12px 0; border-bottom:1px solid #27272a;">
           <div style="flex:2; overflow:hidden;">
              <div style="color:#fff; font-weight:bold; font-size:13px; white-space:nowrap; text-overflow:ellipsis;">${user.name}</div>
              <div style="color:#71717a; font-size:11px; white-space:nowrap; text-overflow:ellipsis;">${user.email || 'No email provided'}</div>
           </div>
           <div style="flex:1;">
              <select disabled style="width:100%; padding:8px; background:#18181b; border:1px solid #27272a; color:#a1a1aa; border-radius:4px;">${assignOptions}</select>
           </div>
           <div style="flex:1;">
              <select disabled style="width:100%; padding:8px; background:#18181b; border:1px solid #27272a; color:#a1a1aa; border-radius:4px;">${deptOptions}</select>
           </div>
           <div style="flex:1;">
              <select disabled style="width:100%; padding:8px; background:#18181b; border:1px solid #27272a; color:#a1a1aa; border-radius:4px;">${mealOptions}</select>
           </div>
           <div style="flex:1;">
              <input type="text" disabled value="${resolveRoleDisplayName(user.roleId, user.roleName)}" style="width:100%; padding:8px; background:#18181b; border:1px solid #27272a; color:#a1a1aa; border-radius:4px; text-align:center; box-sizing:border-box;">
           </div>
           <div style="flex:1;">
              <input type="password" disabled value="${user.passcode}" style="width:100%; padding:8px; background:#18181b; border:1px solid #27272a; color:#a1a1aa; border-radius:4px; text-align:center;">
           </div>
           <div style="width:70px; text-align:center;">
              <button class="btn-blue" style="width:100%; margin:0;" onclick="openEditMemberModal(${index})">EDIT</button>
           </div>
        </div>
     `;
     container.innerHTML += rowHtml;
  });
}

// ==========================================
// --- EDIT MEMBER LOGIC ---
// ==========================================
function openEditMemberModal(userIndex) {
    // Instantly grab the user by their row number (no searching required)
    const user = globalIamDirectory[userIndex];
    if(!user) return;

    document.getElementById('edit-member-uid').value = user.uid;
    document.getElementById('edit-member-name').value = user.name;
    document.getElementById('edit-member-email').value = user.email;
    document.getElementById('edit-member-pass').value = user.passcode;
    document.getElementById('edit-member-mult').value = user.payrollMultiplier || 1.0;

    const sRole = document.getElementById('edit-member-role');
    sRole.innerHTML = '<option value="">None</option>';
    if(globalRoles) {
        globalRoles.forEach(r => {
            let val = getRoleOptionValue(r);
            let label = getRoleOptionLabel(r);
            let isSelected = userMatchesRole(user, r) ? 'selected' : '';
            sRole.innerHTML += `<option value="${val}" ${isSelected}>${label}</option>`;
        });
    }

    const sAssign = document.getElementById('edit-member-assign');
    sAssign.innerHTML = '<option value="">None</option>';
    if(ROLE_COLORS) Object.keys(ROLE_COLORS).forEach(a => { let c = safeText(a); sAssign.innerHTML += `<option value="${c}" ${isMatch(user.jobTitle, c)?'selected':''}>${c}</option>`; });

    const sDept = document.getElementById('edit-member-dept');
    sDept.innerHTML = '<option value="">None</option>';
    if(SYSTEM_DEPARTMENTS) SYSTEM_DEPARTMENTS.forEach(d => { let uid = d.uid || d.name; sDept.innerHTML += `<option value="${uid}" ${isMatch(user.dept, uid) || isMatch(user.dept, d.name)?'selected':''}>${d.name}</option>`; });

    const sMeal = document.getElementById('edit-member-meal');
    sMeal.innerHTML = '<option value="">None</option>';
    if(SYSTEM_MEALS) SYSTEM_MEALS.forEach(m => { let c = safeText(m); sMeal.innerHTML += `<option value="${c}" ${isMatch(user.meal, c)?'selected':''}>${c}</option>`; });

    document.getElementById('edit-member-modal-overlay').style.display = 'flex';
}

function submitEditMember() {
    const payload = {
        uid: document.getElementById('edit-member-uid').value,
        name: document.getElementById('edit-member-name').value,
        passcode: document.getElementById('edit-member-pass').value,
        payrollMultiplier: document.getElementById('edit-member-mult').value,
        jobTitle: document.getElementById('edit-member-assign').value,
        dept: document.getElementById('edit-member-dept').value,
        meal: document.getElementById('edit-member-meal').value,
        roleId: document.getElementById('edit-member-role').value
    };

    if (!safeText(payload.name)) {
        return alert('Full name is required.');
    }
    if (!payload.passcode || String(payload.passcode).trim().length !== 6) {
        return alert('Passcode must be exactly 6 characters.');
    }

    const btn = document.getElementById('btn-submit-edit');
    btn.innerText = "SAVING..."; btn.disabled = true;

    let safetyTimer = setTimeout(() => {
        btn.innerText = "SAVE PROFILE"; btn.disabled = false;
        alert("Network Timeout: Update failed.");
    }, 15000);

    google.script.run
        .withFailureHandler(err => {
            clearTimeout(safetyTimer);
            btn.innerText = "SAVE PROFILE"; btn.disabled = false;
            alert("Error: " + err.message);
        })
        .withSuccessHandler(res => {
            clearTimeout(safetyTimer);
            btn.innerText = "SAVE PROFILE"; btn.disabled = false;
            if (res && res.success === false) {
                alert("Update Failed: " + (res.message || res.error));
                return;
            }
            document.getElementById('edit-member-modal-overlay').style.display = 'none';
            openMasterSettings();
        }).saveDirectoryUpdate(ACTIVE_USER_NAME, [payload]);
}

function deleteUserFromEdit() {
    const uid = document.getElementById('edit-member-uid').value;
    if(!confirm(`PERMANENT WARNING: Delete this user from the Vault?`)) return;
    
    document.getElementById('edit-member-modal-overlay').style.display = 'none';
    document.getElementById('roster-list-container').innerHTML = '<div style="color:#ef4444; padding:40px; text-align:center; font-weight:bold;">Deleting User...</div>';
    
    google.script.run.withSuccessHandler(res => {
        if (res && res.success === false) {
            alert("Delete Failed: " + (res.message || res.error));
            return;
        }
        openMasterSettings(); 
    }).deleteUserFromVault(ACTIVE_USER_NAME, uid);
}

// ==========================================
// --- PASSWORD TOGGLE LOGIC ---
// ==========================================
function togglePassVisibility(inputId, btnElement) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";
        btnElement.innerText = "🙈"; // Hide icon
    } else {
        input.type = "password";
        btnElement.innerText = "👁️"; // Show icon
    }
}
</script>
