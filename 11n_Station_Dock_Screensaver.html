<!-- @INDEX: STATION -> Dock bulletin / screensaver (desktop only) -->
<div id="station-dock-screensaver" class="station-dock-screensaver" style="display:none;" aria-hidden="true">
  <div class="station-dock-ss-bg" aria-hidden="true">
    <svg class="station-dock-ss-filters" aria-hidden="true" focusable="false">
      <defs>
        <filter id="station-dock-ss-sandy" x="-12%" y="-30%" width="124%" height="160%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" seed="8" result="noise"/>
          <feColorMatrix in="noise" type="saturate" values="0" result="grain"/>
          <feDisplacementMap in="SourceGraphic" in2="grain" scale="2.2" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
          <feGaussianBlur in="displaced" stdDeviation="0.35" result="soft"/>
          <feBlend in="soft" in2="SourceGraphic" mode="normal"/>
        </filter>
      </defs>
    </svg>
    <div class="station-dock-ss-hero">
      <svg class="station-dock-ss-hero-a" viewBox="80 0 50 42" aria-hidden="true"><path fill="#eb1c24" d="M117.97.96v9.82c0,.05-.67.72-.72.72h-7.43l13.91,30.17h-31.65l3.84-9.1h13.91l-8.87-17.71-12.71,26.81h-10.07l13.91-30.17h-7.67V.96h33.57Z"/></svg>
    </div>
    <div id="station-dock-ss-bus-lanes" class="station-dock-ss-bus-lanes"></div>
  </div>
  <div class="station-dock-ss-left" aria-hidden="false">
    <div class="station-dock-ss-clock-panel">
      <div id="station-dock-ss-clock" class="station-dock-ss-clock"></div>
    </div>
  </div>
  <aside class="station-dock-ss-right" aria-label="Weather bulletin">
    <div class="station-dock-ss-bulletin-panel">
      <div class="station-dock-ss-slot-body">
        <div id="station-dock-ss-event-title" class="station-dock-ss-event-title">Loading forecasts…</div>
        <div class="station-dock-ss-credits-viewport">
          <div id="station-dock-ss-credits-track" class="station-dock-ss-credits-track"></div>
        </div>
      </div>
    </div>
  </aside>
  <button type="button" class="station-dock-ss-exit" onclick="stationDockCloseScreensaver_()" title="Exit screensaver (Esc)">Exit</button>
</div>

<script>
(function stationDockScreensaverInit_() {
  if (!window.IS_STATION_DEVICE) return;

  var STAGE_MASTERS_LOGO_SVG_SS = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 513.6 42.4"><path fill="#fff" d="M513.6,31.13c-3.06,10.13-12.85,11.85-22.29,11.01-7.67-.68-14.2-5.48-14.64-13.64-.05-.99-.01-.62.71-.72,1.55-.21,11.33-.87,11.75-.45s-.11,4.28,3.43,5.91c6.18,2.85,11.7-3.31,6.84-6.35-6.26-3.92-20.29-2.14-21.24-13.78-1.24-15.2,26.77-16.88,32.49-6.56.77,1.4,2.72,5.94.32,6.39-2.89.54-7.32-.33-10.5.51-.46-.13-.51-1.87-.88-2.56-3.38-6.26-14.36-.64-7.22,2.42s18.41,2.07,21.24,12.07v5.75Z"/><path fill="#fff" d="M227.55.96l6.71,22.99,6.24-22.99h16.54v39.98c0,.05-.67.72-.72.72h-9.59c-.05,0-.72-.67-.72-.72V14.37l-7.26,27.23-9.21.08-7.99-29.23v29.21h-10.55V.96h16.54Z"/><path fill="#fff" d="M461.09.96c11.86,1.4,14.22,16.26,4.03,21.74-.94.51-2.48.41-2.83,1.24l2.38.74c4.84,4.59,7.08,11.17,10.09,16.98h-14.15c-2.74-3.02-6.76-14.95-10.28-16.07-.95-.3-1.93-.24-2.9-.21v16.28h-12.23c-.05,0-.72-.67-.72-.72V1.68c0-.13.56-.48.72-.72,8.18.7,17.91-.95,25.9,0ZM447.42,17.24c3.83,0,12.83.94,10.93-5.41-.19-.63-2.11-2.25-2.54-2.25h-8.39v7.66Z"/><path fill="#fff" d="M164.01,35.91c-13.58,9.21-37.16,10.51-41.11-9.47-1.75-8.87,1.02-19.8,9.76-23.99,7.45-3.57,22.59-3.72,27.99,3.53.62.83,3.24,5.29,2.12,6.04-.49.33-10.93,2.29-11.5,2.19s-1.66-4.16-5.71-4.65c-8.23-.98-10.58,5.72-10.32,12.69.33,8.59,5.27,12.73,13.79,9.96,3.41-1.11,3.84-1.58,3.46-5.4h-8.15v-8.62h19.66v17.72Z"/><path fill="#fff" d="M205.25.96v8.38c0,.05-.67.72-.72.72h-19.9v5.75h19.18v8.62h-19.18v7.66h21.1v9.58h-33.81c-.05,0-.72-.67-.72-.72V1.68c0-.05.67-.72.72-.72h33.33Z"/><path fill="#fff" d="M406.18,10.06v5.75h19.18v8.62h-19.18v7.66h21.58v8.86c0,.05-.67.72-.72.72h-33.81V.96h33.33c.05,0,.72.67.72.72v7.66c0,.05-.67.72-.72.72h-20.38Z"/><path fill="#fff" d="M308.83,27.77c2.2.37,10.53-1.32,11.93-.42.28.18.57,2.45.92,3.15,3.1,6.24,13.88,3.05,11.07-1.95-2.57-4.57-16.17-3.16-20.96-10.68-4.1-6.44-.17-13.91,6.5-16.34,9.2-3.35,25.77-1.67,25.83,10.93-.64.87-9.54.29-11.48.88-.97-.34-.74-2.41-1.73-3.55-2.43-2.84-10.12-2.33-8.57,2.33.46,1.37,13.43,3.95,16.22,5.35,11.68,5.86,8.13,20.96-3.82,23.94-11,2.74-25.8.22-25.9-13.65Z"/><path fill="#fff" d="M262.32,41.66l15.09-40.24c1.17-1.19,11.14-.05,13.46-.5l15.57,40.74h-12.71c-1.25-1.89-1.94-4.46-2.18-6.68l-14.07-.05-2.45,6.73h-12.71ZM280.06,25.86h8.63c-1.13-1.5-3.43-12.74-4.08-12.93-.97-.29-.66.51-.84,1.05-1.31,3.93-2.08,8.06-3.71,11.88Z"/><path fill="#fff" d="M387.48.96v9.82c0,.05-.67.72-.72.72h-11.75v29.45c0,.05-.67.72-.72.72h-12.23V11.49h-12.23c-.05,0-.72-.67-.72-.72V.96h38.36Z"/><path fill="#eb1c24" d="M117.97.96v9.82c0,.05-.67.72-.72.72h-7.43l13.91,30.17h-31.65l3.84-9.1h13.91l-8.87-17.71-12.71,26.81h-10.07l13.91-30.17h-7.67V.96h33.57Z"/><path fill="#fff" d="M23.56,13.34c-.62-2.85-1.94-4.88-5.09-5.21-5-.52-7.58,3.67-2.54,5.41,6.66,2.3,16.86,2.33,20.05,10.15,3.85,9.43-4.13,17.44-13.26,18.39-10.99,1.14-22.24-1.33-22.72-14.31,2.2.37,10.53-1.32,11.93-.42.21.14.69,3.13,1.96,4.51,4.25,4.59,12.85.94,9.83-3.59S6.26,25.66,2.31,16.61C-1.24,8.45,5.09,2.07,12.83.6,18.95-.56,28.71,0,32.81,5.31c1.13,1.46,4.14,7.13,1.48,7.62-2.9.53-7.52-.21-10.72.41Z"/><path fill="#fff" d="M78.65.96v9.82c0,.05-.67.72-.72.72h-11.75v29.45c0,.05-.67.72-.72.72h-12.23V11.49h-12.23c-.05,0-.72-.67-.72-.72V.96h38.36Z"/></svg>';

  var ssActive = false;
  var ssClockTimer = null;
  var ssRotateTimer = null;
  var ssEvents = [];
  var ssSlots = [];
  var ssSlotIndex = 0;
  var ssWeatherById = {};
  var ssSofiaDays = null;
  var SS_FADE_MS = 500;
  var SS_ROTATE_MS = 15000;
  var SS_SLOT_FADE_MS = 1000;
  var SS_SCROLL_SEC_PER_DAY = 14;
  var SS_DIM_PAD = 25;
  var SS_DIM_FADE = 50;
  var SS_SOFIA = { lat: 42.6977, lng: 23.3219, label: 'Sofia' };

  function ssIsDock_() {
    return document.documentElement.classList.contains('station-dock-root');
  }

  function ssBusOpacity_(widthStr) {
    var w = parseFloat(widthStr) || 80;
    var t = (Math.max(72, Math.min(280, w)) - 72) / (280 - 72);
    return +(0.15 - t * (0.15 - 0.04)).toFixed(3);
  }

  function ssBuildBuses_() {
    var lanes = document.getElementById('station-dock-ss-bus-lanes');
    if (!lanes || lanes.dataset.built === 'v1') return;
    lanes.dataset.built = 'v1';
    var configs = [
      { top: '6%',  width: '280%', dur: 56,  delay: 0,   dir: 'ltr' },
      { top: '14%', width: '95%',  dur: 108, delay: -14, dir: 'rtl' },
      { top: '22%', width: '170%', dur: 62,  delay: -28, dir: 'ltr' },
      { top: '30%', width: '115%', dur: 80,  delay: -8,  dir: 'rtl' },
      { top: '38%', width: '265%', dur: 52,  delay: -3,  dir: 'ltr' },
      { top: '46%', width: '85%',  dur: 130, delay: -52, dir: 'rtl' },
      { top: '54%', width: '150%', dur: 54,  delay: -20, dir: 'ltr' },
      { top: '62%', width: '310%', dur: 54,  delay: -1,  dir: 'rtl' },
      { top: '70%', width: '98%',  dur: 92,  delay: -62, dir: 'ltr' },
      { top: '78%', width: '180%', dur: 56,  delay: -12, dir: 'rtl' },
      { top: '86%', width: '128%', dur: 68,  delay: -36, dir: 'ltr' },
      { top: '50%', width: '275%', dur: 52,  delay: -6,  dir: 'rtl' }
    ];
    var html = '';
    configs.forEach(function(cfg) {
      var op = ssBusOpacity_(cfg.width);
      var blurred = Math.random() < 0.45;
      var blurCls = blurred ? ' station-dock-ss-bus--blur' : '';
      var blurPx = blurred ? (0.7 + Math.random() * 4.8).toFixed(2) : '0';
      var sandScale = blurred ? (1.2 + Math.random() * 2.8).toFixed(2) : '0';
      html += '<div class="station-dock-ss-bus station-dock-ss-bus--' + cfg.dir + blurCls + '" style="' +
        'top:' + cfg.top + ';width:' + cfg.width + ';' +
        '--bus-o:' + op + ';--bus-blur:' + blurPx + 'px;--bus-sand:' + sandScale + ';' +
        'animation-duration:' + cfg.dur + 's;animation-delay:' + cfg.delay + 's;">' +
        STAGE_MASTERS_LOGO_SVG_SS + '</div>';
    });
    lanes.innerHTML = html;
  }

  function ssSyncClockDim_() {
    var clock = document.getElementById('station-dock-ss-clock');
    var panel = clock && clock.closest('.station-dock-ss-clock-panel');
    if (!clock || !panel) return;
    var w = clock.offsetWidth;
    var h = clock.offsetHeight;
    if (!w || !h) return;
    panel.style.setProperty('--lock-dim-w', (w + SS_DIM_PAD * 2) + 'px');
    panel.style.setProperty('--lock-dim-h', (h + SS_DIM_PAD * 2) + 'px');
    panel.style.setProperty('--lock-fade-out', SS_DIM_FADE + 'px');
    panel.style.setProperty('--lock-dim-radius', Math.round((h + SS_DIM_PAD * 2) / 3) + 'px');
  }

  function ssBuildClockFace_(el, str) {
    el.textContent = '';
    var digitIndex = 0;
    for (var i = 0; i < str.length; i++) {
      var ch = str[i];
      if (/\d/.test(ch)) {
        var slot = document.createElement('span');
        slot.className = 'station-dock-ss-clock-slot';
        if (digitIndex === 1) slot.classList.add('station-dock-ss-clock-slot--accent');
        var digit = document.createElement('span');
        digit.className = 'station-dock-ss-clock-digit';
        digit.textContent = ch;
        slot.appendChild(digit);
        el.appendChild(slot);
        digitIndex++;
      } else {
        var sep = document.createElement('span');
        sep.className = 'station-dock-ss-clock-sep';
        sep.textContent = ch;
        el.appendChild(sep);
      }
    }
  }

  function ssCrossfadeDigit_(slot, newChar) {
    var active = slot.querySelector('.station-dock-ss-clock-digit:not(.is-leaving)');
    if (!active) {
      var d = document.createElement('span');
      d.className = 'station-dock-ss-clock-digit';
      d.textContent = newChar;
      slot.appendChild(d);
      return;
    }
    if (active.textContent === newChar) return;
    active.classList.add('is-leaving');
    var incoming = document.createElement('span');
    incoming.className = 'station-dock-ss-clock-digit is-entering';
    incoming.textContent = newChar;
    slot.appendChild(incoming);
    setTimeout(function() {
      slot.querySelectorAll('.is-leaving').forEach(function(n) { n.remove(); });
      var enter = slot.querySelector('.is-entering');
      if (enter) enter.classList.remove('is-entering');
    }, 650);
  }

  function ssUpdateClock_() {
    var el = document.getElementById('station-dock-ss-clock');
    if (!el) return;
    var str = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    var prev = el.dataset.clockStr || '';
    var slots = el.querySelectorAll('.station-dock-ss-clock-slot');
    if (!prev || !slots.length) {
      ssBuildClockFace_(el, str);
      el.dataset.clockStr = str;
      requestAnimationFrame(ssSyncClockDim_);
      return;
    }
    if (prev === str) return;
    var slotIdx = 0;
    for (var i = 0; i < str.length; i++) {
      if (!/\d/.test(str[i])) continue;
      var slot = slots[slotIdx++];
      if (slot && str[i] !== prev[i]) ssCrossfadeDigit_(slot, str[i]);
    }
    el.dataset.clockStr = str;
    requestAnimationFrame(ssSyncClockDim_);
  }

  function ssIsOutdoor_(p) {
    if (typeof stationProjectIsOutdoor_ === 'function') return stationProjectIsOutdoor_(p);
    if (typeof projectIsOutdoorMobile === 'function') return projectIsOutdoorMobile(p);
    return !!(p && p.readinessState && (p.readinessState.isOutdoor || p.readinessState.outdoor));
  }

  function ssInForecastWindow_(p) {
    if (!p || !p.start) return false;
    var now = new Date();
    now.setHours(0, 0, 0, 0);
    var horizon = new Date(now);
    horizon.setDate(horizon.getDate() + 14);
    var start = new Date(String(p.start) + 'T00:00:00');
    var end = new Date(String(p.end || p.start) + 'T23:59:59');
    return start <= horizon && end >= now;
  }

  function ssCollectOutdoorEvents_() {
    var projects = window.stationProjectsCache || [];
    return projects.filter(function(p) {
      var st = String(p.status || 'Draft').toUpperCase();
      if (st === 'TRASHED' || st === 'CANCELLED') return false;
      return ssIsOutdoor_(p) && ssInForecastWindow_(p);
    }).sort(function(a, b) {
      return String(a.start || '').localeCompare(String(b.start || ''));
    });
  }

  function ssCondLabel_(cond) {
    if (typeof weatherCondLabel === 'function') return weatherCondLabel(cond);
    return cond || '';
  }

  function ssCondEmoji_(cond) {
    if (typeof weatherCondEmoji === 'function') return weatherCondEmoji(cond);
    return '☀️';
  }

  function ssBuildCreditsHtml_(days) {
    if (!days || !days.length) {
      return '<div class="station-dock-ss-credit-line station-dock-ss-credit-line--muted">No forecast available</div>';
    }
    return days.map(function(d) {
      var dayName = d.dObj.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', timeZone: 'UTC' });
      var alert = d.maxT > 35 || d.minT < 5 || d.wind > 40 || d.rainProb > 50;
      return '<div class="station-dock-ss-credit-line' + (alert ? ' station-dock-ss-credit-line--alert' : '') + '">' +
        '<div class="station-dock-ss-credit-head">' +
        '<span class="station-dock-ss-credit-day">' + dayName + '</span>' +
        '<span class="station-dock-ss-credit-emoji" aria-hidden="true">' + ssCondEmoji_(d.cond) + '</span>' +
        '</div>' +
        '<span class="station-dock-ss-credit-stats">' + Math.round(d.maxT) + '° / ' + Math.round(d.minT) + '° · ' +
        Math.round(d.wind) + ' km/h · ' + d.rainProb + '% rain</span></div>';
    }).join('');
  }

  function ssRestartCreditsAnim_(dayCount) {
    var track = document.getElementById('station-dock-ss-credits-track');
    if (!track) return;
    var count = Math.max(1, dayCount || 1);
    var sec = Math.max(90, count * SS_SCROLL_SEC_PER_DAY);
    track.style.setProperty('--ss-scroll-duration', sec + 's');
    track.style.animation = 'none';
    void track.offsetHeight;
    track.style.animation = '';
  }

  function ssSlotBody_() {
    return document.querySelector('.station-dock-ss-slot-body');
  }

  function ssFadeSlotBody_(show, done) {
    var body = ssSlotBody_();
    if (!body) {
      if (done) done();
      return;
    }
    if (show) body.classList.remove('is-ss-hidden');
    else body.classList.add('is-ss-hidden');
    if (!done) return;
    setTimeout(done, SS_SLOT_FADE_MS);
  }

  function ssBuildSlots_() {
    ssSlots = [{ kind: 'sofia', title: SS_SOFIA.label + ' · 14-day outlook' }];
    ssEvents.forEach(function(p) {
      var cached = ssWeatherById[p.id];
      var days = (cached && cached.days) ? cached.days : [];
      if (!days.length) return;
      var when = p.start ? new Date(p.start).toLocaleDateString() : '';
      ssSlots.push({
        kind: 'event',
        project: p,
        title: (p.title || p.name || 'Untitled') + (when ? (' · ' + when) : '')
      });
    });
    if (ssSlotIndex >= ssSlots.length) ssSlotIndex = 0;
  }

  function ssSofiaStubProject_() {
    var now = new Date();
    now.setHours(0, 0, 0, 0);
    var end = new Date(now);
    end.setDate(end.getDate() + 13);
    function iso(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    return {
      id: '__sofia_bulletin__',
      title: SS_SOFIA.label,
      start: iso(now),
      end: iso(end),
      readinessState: { coords: { lat: SS_SOFIA.lat, lng: SS_SOFIA.lng }, isOutdoor: true }
    };
  }

  function ssFetchSofiaWeather_() {
    if (ssSofiaDays) return Promise.resolve(ssSofiaDays);
    if (typeof fetchMobileWeatherDaysForProject !== 'function') {
      return Promise.resolve([]);
    }
    return fetchMobileWeatherDaysForProject(ssSofiaStubProject_()).then(function(result) {
      ssSofiaDays = (result && result.days) ? result.days : [];
      return ssSofiaDays;
    }).catch(function() {
      ssSofiaDays = [];
      return ssSofiaDays;
    });
  }

  function ssRenderSlotAt_(idx) {
    var titleEl = document.getElementById('station-dock-ss-event-title');
    var track = document.getElementById('station-dock-ss-credits-track');
    if (!titleEl || !track || !ssSlots.length) return;

    ssSlotIndex = ((idx % ssSlots.length) + ssSlots.length) % ssSlots.length;
    var slot = ssSlots[ssSlotIndex];
    titleEl.textContent = slot.title;

    var days = [];
    if (slot.kind === 'sofia') {
      days = ssSofiaDays || [];
    } else if (slot.project) {
      var cached = ssWeatherById[slot.project.id];
      days = (cached && cached.days) ? cached.days : [];
    }

    var block = ssBuildCreditsHtml_(days);
    track.innerHTML = block + block;
    ssRestartCreditsAnim_(days.length);
  }

  function ssAdvanceSlot_() {
    if (!ssActive || ssSlots.length <= 1) return;
    ssFadeSlotBody_(false, function() {
      if (!ssActive || ssSlots.length <= 1) return;
      ssRenderSlotAt_(ssSlotIndex + 1);
      requestAnimationFrame(function() {
        ssFadeSlotBody_(true, function() {
          if (!ssActive || ssSlots.length <= 1) return;
          ssRotateTimer = setTimeout(ssAdvanceSlot_, SS_ROTATE_MS);
        });
      });
    });
  }

  function ssPrefetchWeather_(done) {
    ssEvents = ssCollectOutdoorEvents_();
    ssWeatherById = {};

    var pending = 1;
    var finished = false;
    function finishPrefetch_() {
      pending--;
      if (pending > 0 || finished) return;
      finished = true;
      ssBuildSlots_();
      if (done) done();
    }

    setTimeout(function() {
      if (finished) return;
      finished = true;
      ssBuildSlots_();
      if (done) done();
    }, 15000);

    ssFetchSofiaWeather_().then(function() {
      finishPrefetch_();
    }).catch(function() {
      finishPrefetch_();
    });

    if (ssEvents.length && typeof fetchMobileWeatherDaysForProject === 'function') {
      pending += ssEvents.length;
      ssEvents.forEach(function(p) {
        fetchMobileWeatherDaysForProject(p).then(function(result) {
          ssWeatherById[p.id] = result || { days: [] };
          finishPrefetch_();
        }).catch(function() {
          ssWeatherById[p.id] = { days: [] };
          finishPrefetch_();
        });
      });
    }
  }

  function ssStartRotate_() {
    if (ssRotateTimer) clearTimeout(ssRotateTimer);
    ssRotateTimer = null;
    if (ssSlots.length <= 1) return;
    ssRotateTimer = setTimeout(ssAdvanceSlot_, SS_ROTATE_MS);
  }

  function ssStopTimers_() {
    if (ssClockTimer) { clearInterval(ssClockTimer); ssClockTimer = null; }
    if (ssRotateTimer) { clearTimeout(ssRotateTimer); ssRotateTimer = null; }
  }

  window.stationDockOpenScreensaver_ = function() {
    if (!ssIsDock_()) return;
    var overlay = document.getElementById('station-dock-screensaver');
    if (!overlay || ssActive) return;

    var host = (typeof stationReadHostSession_ === 'function') ? stationReadHostSession_() : null;
    if (typeof stationPreloadProjects_ === 'function' && host && host.name) {
      stationPreloadProjects_(host.name);
    }
    if ((!window.stationProjectsCache || !window.stationProjectsCache.length) &&
        typeof stationPreloadWarehouseProjects_ === 'function') {
      stationPreloadWarehouseProjects_();
    }

    ssBuildBuses_();
    ssUpdateClock_();
    ssActive = true;
    ssSofiaDays = null;
    ssWeatherById = {};
    ssSlotIndex = 0;
    document.body.classList.add('station-dock-screensaver-active');
    overlay.style.display = 'grid';
    overlay.setAttribute('aria-hidden', 'false');
    requestAnimationFrame(function() {
      overlay.classList.add('is-mounted');
      requestAnimationFrame(function() { overlay.classList.add('is-visible'); });
    });

    ssClockTimer = setInterval(ssUpdateClock_, 1000);

    var titleEl = document.getElementById('station-dock-ss-event-title');
    if (titleEl) titleEl.textContent = 'Loading outdoor forecasts…';

    ssPrefetchWeather_(function() {
      if (!ssActive) return;
      var body = ssSlotBody_();
      if (body) body.classList.remove('is-ss-hidden');
      ssSlotIndex = 0;
      ssRenderSlotAt_(0);
      ssStartRotate_();
    });
  };

  window.stationDockCloseScreensaver_ = function() {
    var overlay = document.getElementById('station-dock-screensaver');
    if (!overlay || !ssActive) return;

    function teardown_() {
      ssActive = false;
      ssStopTimers_();
      var body = ssSlotBody_();
      if (body) {
        body.classList.remove('is-ss-hidden');
      }
      overlay.classList.remove('is-visible', 'is-leaving', 'is-mounted');
      overlay.style.display = 'none';
      overlay.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('station-dock-screensaver-active');
    }

    overlay.classList.remove('is-visible');
    overlay.classList.add('is-leaving');
    var done = false;
    function onFade_() {
      if (done) return;
      done = true;
      overlay.removeEventListener('transitionend', onFade_);
      teardown_();
    }
    overlay.addEventListener('transitionend', onFade_);
    setTimeout(onFade_, SS_FADE_MS + 80);
  };

  document.addEventListener('keydown', function(ev) {
    if (!ssActive) return;
    if (ev.key === 'Escape') {
      ev.preventDefault();
      stationDockCloseScreensaver_();
    }
  });
})();
</script>
