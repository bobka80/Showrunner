<!-- DAL Phase 6 — Cache Coordinator (client). Public API: check / set / invalidate / registerPolicy -->
<script>
(function () {
  var STORAGE_PREFIX = 'sm_cc_';
  var LEGACY_PA_PREFIX = 'sm_pa_cache_';

  /** Logical key → legacy localStorage key (migration bridge). */
  var LEGACY_MAP = {
    'pa:': null, // handled via LEGACY_PA_PREFIX + projectId
    'calendar:phantom': 'sm_phantom_payload',
    'clients': 'sm_clients_cache',
    'fleet': 'sm_fleet_cache',
    'vault:assets': 'sm_vault_cache',
    'warehouse': 'sm_wh_cache',
    'tracker': 'sm_tracker_cache'
  };

  var policies = {};
  var memory = {};
  /** @type {Object.<string, string[]>} */
  var keyToTags = {};
  /** @type {Object.<string, string[]>} */
  var tagToKeys = {};

  function nowMs() { return Date.now(); }

  function storageKey_(key) {
    return STORAGE_PREFIX + String(key || '');
  }

  function legacyKeyFor_(key) {
    key = String(key || '');
    if (LEGACY_MAP[key]) return LEGACY_MAP[key];
    if (key.indexOf('pa:') === 0) return LEGACY_PA_PREFIX + key.slice(3);
    return null;
  }

  function ttlMs_(policy) {
    if (!policy) return 5 * 60 * 1000;
    if (typeof policy.ttlMs === 'number') return policy.ttlMs;
    var hot = String(policy.freshness || policy.tier || '').toLowerCase();
    if (hot === 'hot') return 15 * 1000;
    if (hot === 'warm') return 5 * 60 * 1000;
    if (hot === 'cold') return 30 * 60 * 1000;
    if (hot === 'none' || hot === 'network') return 0;
    return 5 * 60 * 1000;
  }

  function isExpired_(entry, policy) {
    if (!entry) return true;
    var ttl = ttlMs_(policy);
    if (ttl <= 0) return true;
    return (nowMs() - (entry.savedAt || 0)) > ttl;
  }

  function rememberTags_(key, tags) {
    var list = (tags || []).map(String).filter(Boolean);
    var prev = keyToTags[key] || [];
    prev.forEach(function (t) {
      tagToKeys[t] = (tagToKeys[t] || []).filter(function (k) { return k !== key; });
    });
    keyToTags[key] = list;
    list.forEach(function (t) {
      if (!tagToKeys[t]) tagToKeys[t] = [];
      if (tagToKeys[t].indexOf(key) === -1) tagToKeys[t].push(key);
    });
  }

  function dropKey_(key) {
    delete memory[key];
    try { localStorage.removeItem(storageKey_(key)); } catch (e1) { /* ignore */ }
    var leg = legacyKeyFor_(key);
    if (leg) {
      try { localStorage.removeItem(leg); } catch (e2) { /* ignore */ }
    }
    var tags = keyToTags[key] || [];
    tags.forEach(function (t) {
      tagToKeys[t] = (tagToKeys[t] || []).filter(function (k) { return k !== key; });
    });
    delete keyToTags[key];
  }

  function registerPolicy(name, rules) {
    if (!name) return;
    policies[String(name)] = rules || {};
  }

  /**
   * @returns {{ hit: boolean, data?: *, source?: string, stale?: boolean }}
   */
  function check(key, policyName) {
    key = String(key || '');
    if (!key) return { hit: false };
    var policy = policies[policyName] || policies.default || {};
    var mem = memory[key];
    if (mem && !isExpired_(mem, policy)) {
      return { hit: true, data: mem.data, source: 'memory', stale: false };
    }
    if (mem && policy.staleWhileRevalidate) {
      return { hit: true, data: mem.data, source: 'memory', stale: true };
    }
    try {
      var raw = localStorage.getItem(storageKey_(key));
      if (raw) {
        var parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object' && parsed.data !== undefined) {
          memory[key] = { data: parsed.data, savedAt: parsed.savedAt || 0 };
          if (!isExpired_(memory[key], policy)) {
            return { hit: true, data: parsed.data, source: 'local', stale: false };
          }
          if (policy.staleWhileRevalidate) {
            return { hit: true, data: parsed.data, source: 'local', stale: true };
          }
        }
      }
    } catch (eRead) { /* miss */ }

    // Legacy bridge read
    var leg = legacyKeyFor_(key);
    if (leg) {
      try {
        var legacy = localStorage.getItem(leg);
        if (legacy) {
          var legacyObj = JSON.parse(legacy);
          return { hit: true, data: legacyObj, source: 'legacy', stale: true };
        }
      } catch (eLeg) { /* miss */ }
    }
    return { hit: false };
  }

  function set(key, data, policyName, tags) {
    key = String(key || '');
    if (!key) return false;
    var policy = policies[policyName] || policies.default || {};
    if (ttlMs_(policy) <= 0 && !policy.forceStore) return false;
    var entry = { data: data, savedAt: nowMs(), policy: policyName || 'default' };
    memory[key] = entry;
    rememberTags_(key, tags || policy.tags || []);
    try {
      localStorage.setItem(storageKey_(key), JSON.stringify(entry));
    } catch (eSet) {
      // Quota — keep memory only
    }
    // Mirror legacy key for older readers during migration
    var leg = legacyKeyFor_(key);
    if (leg) {
      try {
        localStorage.setItem(leg, JSON.stringify(data));
      } catch (eLegSet) { /* ignore */ }
    }
    return true;
  }

  /** Invalidate by tag (surgical). Tag '*' clears everything tracked + known legacy keys. */
  function invalidate(tag) {
    tag = String(tag || '');
    if (!tag) return 0;
    var removed = 0;
    if (tag === '*' || tag === 'global') {
      Object.keys(keyToTags).forEach(function (k) {
        dropKey_(k);
        removed++;
      });
      memory = {};
      keyToTags = {};
      tagToKeys = {};
      Object.keys(LEGACY_MAP).forEach(function (k) {
        if (LEGACY_MAP[k]) {
          try { localStorage.removeItem(LEGACY_MAP[k]); } catch (eG) { /* ignore */ }
        }
      });
      return removed;
    }
    var keys = (tagToKeys[tag] || []).slice();
    keys.forEach(function (k) {
      dropKey_(k);
      removed++;
    });
    // Domain tag also clears legacy PA key: project:{id}:pa
    var m = /^project:([^:]+):pa$/.exec(tag);
    if (m) {
      try { localStorage.removeItem(LEGACY_PA_PREFIX + m[1]); } catch (e3) { /* ignore */ }
      dropKey_('pa:' + m[1]);
    }
    // Named domain tags — drop logical keys even if never registered in this session
    if (tag === 'vault') {
      dropKey_('vault:assets');
      dropKey_('warehouse');
      removed++;
    }
    if (tag === 'calendar') {
      dropKey_('calendar:phantom');
      removed++;
    }
    if (tag === 'clients') {
      dropKey_('clients');
      removed++;
    }
    if (tag === 'fleet') {
      dropKey_('fleet');
      removed++;
    }
    if (tag === 'tracker') {
      dropKey_('tracker');
      removed++;
    }
    return removed;
  }

  function tagPa(projectId) { return 'project:' + String(projectId || '') + ':pa'; }
  function tagTimeline(projectId) { return 'project:' + String(projectId || '') + ':timeline'; }

  // Built-in policies (design lock §4 / data-cache-engine)
  registerPolicy('default', { freshness: 'warm', ttlMs: 5 * 60 * 1000 });
  registerPolicy('pa-hot', { freshness: 'hot', ttlMs: 15 * 1000, staleWhileRevalidate: true });
  registerPolicy('timeline-hot', { freshness: 'hot', ttlMs: 15 * 1000, staleWhileRevalidate: true });
  registerPolicy('vault-cold', { freshness: 'cold', ttlMs: 30 * 60 * 1000 });
  registerPolicy('warehouse-cold', { freshness: 'cold', ttlMs: 30 * 60 * 1000 });
  registerPolicy('fleet-cold', { freshness: 'cold', ttlMs: 30 * 60 * 1000 });
  registerPolicy('clients-cold', { freshness: 'cold', ttlMs: 30 * 60 * 1000 });
  registerPolicy('calendar-warm', { freshness: 'warm', ttlMs: 5 * 60 * 1000, staleWhileRevalidate: true });
  registerPolicy('tracker-warm', { freshness: 'warm', ttlMs: 5 * 60 * 1000, staleWhileRevalidate: true });
  registerPolicy('logistics-none', { freshness: 'none', ttlMs: 0 });

  window.CacheCoordinator = {
    check: check,
    set: set,
    invalidate: invalidate,
    registerPolicy: registerPolicy,
    tagPa: tagPa,
    tagTimeline: tagTimeline
  };

  /** Helpers used by modules during migration. */
  window.dalCacheGetPa_ = function (projectId) {
    var r = check('pa:' + projectId, 'pa-hot');
    return r.hit ? r.data : null;
  };
  window.dalCacheSetPa_ = function (projectId, data) {
    return set('pa:' + projectId, data, 'pa-hot', [tagPa(projectId)]);
  };
  window.dalCacheInvalidatePa_ = function (projectId) {
    return invalidate(tagPa(projectId));
  };
  window.dalCacheInvalidateTimeline_ = function (projectId) {
    return invalidate(tagTimeline(projectId));
  };

  window.dalCacheGetPhantom_ = function () {
    var r = check('calendar:phantom', 'calendar-warm');
    return r.hit ? r.data : null;
  };
  window.dalCacheSetPhantom_ = function (data) {
    return set('calendar:phantom', data, 'calendar-warm', ['calendar']);
  };

  window.dalCacheGetClients_ = function () {
    var r = check('clients', 'clients-cold');
    return r.hit ? r.data : null;
  };
  window.dalCacheSetClients_ = function (data) {
    return set('clients', data, 'clients-cold', ['clients', 'directory']);
  };

  window.dalCacheGetFleet_ = function () {
    var r = check('fleet', 'fleet-cold');
    return r.hit ? r.data : null;
  };
  window.dalCacheSetFleet_ = function (data) {
    return set('fleet', data, 'fleet-cold', ['fleet']);
  };

  window.dalCacheGetVault_ = function () {
    var r = check('vault:assets', 'vault-cold');
    return r.hit ? r.data : null;
  };
  window.dalCacheSetVault_ = function (data) {
    return set('vault:assets', data, 'vault-cold', ['vault']);
  };
  window.dalCacheInvalidateVault_ = function () {
    return invalidate('vault');
  };

  window.dalCacheGetWarehouse_ = function () {
    var r = check('warehouse', 'warehouse-cold');
    return r.hit ? r.data : null;
  };
  window.dalCacheSetWarehouse_ = function (data) {
    return set('warehouse', data, 'warehouse-cold', ['vault', 'warehouse']);
  };

  window.dalCacheGetTracker_ = function () {
    var r = check('tracker', 'tracker-warm');
    return r.hit ? r.data : null;
  };
  window.dalCacheSetTracker_ = function (data) {
    return set('tracker', data, 'tracker-warm', ['tracker', 'calendar']);
  };
  window.dalCacheInvalidateTracker_ = function () {
    return invalidate('tracker');
  };
})();
</script>
