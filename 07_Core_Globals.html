<script>
/**
 * 07_Core_Globals.html
 * Domain: System-wide state management, shared utilities, and boot sequence.
 */
let calendar = null, miniCalendar = null, templates = [], activeRoster = [];
let globalTasks = [], globalNotifs = [];
let globalDirectoryCrew = [];
let SYSTEM_TAGS = [];
let globalRosterData = null;
let globalAssets = [];
let SYSTEM_ALIASES = { 's':'SOCA', 'd':'DISTRO', 'e':'EXTENDER', 'b':'BREAKOUT', 'c':'CABLE', '3x':'3XLR', '5x':'5XLR', 'x3':'3XLR', 'x5':'5XLR' };

window.returnToHome = function() {
    if (window.activeProjectContext) {
        if (typeof cancelProjectEditor === 'function') {
            if (cancelProjectEditor() === false) return; 
        }
    }
    if (typeof closeModals === 'function') closeModals();
};

// ==========================================
// --- SECURITY UTILITIES ---
// ==========================================
function escapeHTML(str) {
    if (typeof str !== 'string') return str;
    return str.replace(/[&<>'"]/g, function(tag) {
        const charsToReplace = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
        return charsToReplace[tag] || tag;
    });
}

// ==========================================
// --- RBAC HELPERS (Phase 1) ---
// ==========================================
const IMPLICIT_MANAGER_IAM_KEYS = [
  'event_create_standard', 'event_create_crossrent', 'event_edit_timeline', 'event_assets_window',
  'event_view_pricing', 'task_manage_global', 'task_manage_personal'
];

window.effectiveHasPerm = function(key) {
  if (!key) return false;
  if (typeof USER_ACCESS !== 'undefined' && USER_ACCESS === 'ROOT') return true;
  if (key === 'task_manage_personal') return true;
  if (typeof userHasPerm === 'function' && userHasPerm(key)) return true;
  if (IMPLICIT_MANAGER_IAM_KEYS.indexOf(key) !== -1 && typeof accessTierAtLeast === 'function' && accessTierAtLeast('MANAGER')) {
    return true;
  }
  return false;
};

window.hasExplicitPerm = function(key) {
  if (!key) return false;
  if (typeof userHasPerm === 'function') return userHasPerm(key);
  return false;
};

window.canCreateStandard = function() {
  return effectiveHasPerm('event_create_standard');
};

window.canCreateCrossRent = function() {
  return effectiveHasPerm('event_create_crossrent');
};

window.canCreateOnCalendar = function() {
  return canCreateStandard() || canCreateCrossRent();
};

window.isCrossRentOnlyCreator = function() {
  return hasExplicitPerm('event_create_crossrent') && !hasExplicitPerm('event_create_standard');
};

window.canPaintMiniCalendar = function(projectId) {
  if (typeof isBriefingMode === 'function' && isBriefingMode(projectId)) return false;
  if (canDrawPhases()) return true;
  if (isCrossRentOnlyCreator()) return true;
  return false;
};

window.allowedMiniCalPhases = function() {
  if (isCrossRentOnlyCreator()) return ['wh', 'recovery'];
  return ['main', 'show', 'wh', 'recovery', 'transit'];
};

window.defaultMiniCalPhase = function() {
  const allowed = allowedMiniCalPhases();
  return allowed.indexOf('wh') !== -1 ? 'wh' : allowed[0];
};

window.canDrawPhases = function() {
  return effectiveHasPerm('event_edit_timeline');
};

window.canEditAssets = function() {
  return effectiveHasPerm('event_assets_window');
};

window.canUseAssetCheckout = function() {
  return canEditAssets();
};

window.canOpenDalPrep = function() {
  if (typeof USER_ACCESS !== 'undefined' && USER_ACCESS === 'ROOT') return true;
  if (typeof accessTierAtLeast === 'function' && accessTierAtLeast('MANAGER')) return true;
  return typeof userHasPerm === 'function' && userHasPerm('view_logistics');
};

/** Part B — freelancer/tunneling never see live forks (Sheets path only). */
window.dalIsLiveForkExcluded_ = function() {
  if (window.IS_FREELANCER || window.IS_TUNNELING) return true;
  // Station page-load flags are the device login — use the hosted crew member's flags.
  if (window.IS_STATION_DEVICE && typeof window.stationHostActive_ === 'function'
      && window.stationHostActive_() && window.stationHostSession) {
    var h = window.stationHostSession;
    if (h.isFreelancer || h.tunneling) return true;
  }
  return false;
};

/**
 * Part B surface: station | phone (incl. tablet) | desktop.
 * Tablets follow phone rules (PA button-only; timeline join-only).
 */
window.dalSessionSurface_ = function() {
  if (window.IS_STATION_DEVICE) return 'station';
  try {
    if (typeof isMobileViewport === 'function' && isMobileViewport()) return 'phone';
  } catch (e0) { /* ignore */ }
  try {
    var ua = navigator.userAgent || '';
    if (/Android|iPhone|iPad|iPod|Mobile/i.test(ua)) return 'phone';
    if (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) return 'phone';
  } catch (e1) { /* ignore */ }
  return 'desktop';
};

/** Phone / station: fixed bottom SYNC bar (desktop keeps in-vault / crew-column panels). */
window.dalEnsureSurfaceForkSyncBar_ = function() {
  var bar = document.getElementById('surface-fork-sync-bar');
  if (bar) return bar;
  bar = document.createElement('div');
  bar.id = 'surface-fork-sync-bar';
  bar.className = 'surface-fork-sync-bar';
  bar.setAttribute('aria-live', 'polite');
  bar.innerHTML =
    '<span class="surface-fork-sync-bar__label">SYNC</span>' +
    '<span id="surface-fork-sync-status" class="surface-fork-sync-bar__status"></span>';
  document.body.appendChild(bar);
  return bar;
};

window.dalPaintSurfaceForkSyncBar_ = function() {
  var surface = typeof window.dalSessionSurface_ === 'function' ? window.dalSessionSurface_() : 'desktop';
  var bar = window.dalEnsureSurfaceForkSyncBar_();
  var statusEl = document.getElementById('surface-fork-sync-status');
  var hide = function() {
    bar.classList.remove('surface-fork-sync-bar--visible', 'surface-fork-sync-bar--pa', 'surface-fork-sync-bar--tl');
    document.body.classList.remove('surface-fork-sync-bar-pad');
  };
  if (surface === 'desktop') {
    hide();
    return;
  }

  var paOv = document.getElementById('project-assets-modal-overlay');
  var paView = false;
  try {
    paView = !!(paOv && (paOv.style.display === 'flex' || window.getComputedStyle(paOv).display === 'flex'));
  } catch (e0) { paView = !!(paOv && paOv.style.display === 'flex'); }

  var tlLayer = document.getElementById('shift-layer');
  var tlView = false;
  try {
    tlView = !!(tlLayer && (tlLayer.style.display === 'flex' || window.getComputedStyle(tlLayer).display === 'flex'));
  } catch (e1) { tlView = !!(tlLayer && tlLayer.style.display === 'flex'); }

  var mode = '';
  var text = '';
  if (paView && (window.dalPrepUiOpen || window.dalPrepOpeningUi_ || window.dalPrepClosingUi_)) {
    mode = 'pa';
    var paSrc = document.getElementById('pa-prep-live-status');
    text = (paSrc && String(paSrc.textContent || '').trim()) || 'Live';
  } else if (tlView && (window.dalTimelineSessionOpen || window.dalTlOpeningUi_ || window.dalTlClosingUi_)) {
    mode = 'tl';
    var tlSrc = document.getElementById('tl-sync-status');
    text = (tlSrc && String(tlSrc.textContent || '').trim()) || 'Live';
  }

  if (!mode) {
    hide();
    return;
  }

  // Hide cramped in-panel SYNC on phone/station — screen-bottom bar is the surface.
  var paPanel = document.getElementById('pa-prep-live-panel');
  var tlPanel = document.getElementById('tl-sync-panel');
  if (mode === 'pa' && paPanel) paPanel.style.display = 'none';
  if (mode === 'tl' && tlPanel) tlPanel.style.display = 'none';

  bar.classList.add('surface-fork-sync-bar--visible');
  bar.classList.toggle('surface-fork-sync-bar--pa', mode === 'pa');
  bar.classList.toggle('surface-fork-sync-bar--tl', mode === 'tl');
  if (statusEl) statusEl.textContent = text;
  document.body.classList.add('surface-fork-sync-bar-pad');
};

/** Manual START button allowed (creds ∩ surface ∩ not freelancer). */
window.dalMayManualStartFork_ = function(domain) {
  if (window.dalIsLiveForkExcluded_()) return false;
  var surface = window.dalSessionSurface_();
  var d = String(domain || '');
  if (d === 'timeline' || d === 'timelineCollab') {
    if (surface !== 'desktop') return false;
    if (typeof currentIsReadOnly !== 'undefined' && currentIsReadOnly) return false;
    return typeof canDrawPhases === 'function' && canDrawPhases();
  }
  if (d === 'prep') {
    if (surface === 'station') {
      if (typeof window.stationHostActive_ === 'function' && window.stationHostActive_()) return true;
      return typeof canOpenDalPrep === 'function' && canOpenDalPrep();
    }
    return typeof canOpenDalPrep === 'function' && canOpenDalPrep();
  }
  return false;
};

/** Auto-start when entering the view (never phone PA; never phone/station timeline). */
window.dalMayAutoStartFork_ = function(domain) {
  if (!window.dalMayManualStartFork_(domain)) return false;
  var surface = window.dalSessionSurface_();
  var d = String(domain || '');
  if (d === 'timeline' || d === 'timelineCollab') return surface === 'desktop';
  if (d === 'prep') return surface === 'desktop' || surface === 'station';
  return false;
};

/** Soft-join / pull-in latch allowed (not freelancer). */
window.dalMayJoinLiveFork_ = function() {
  return !window.dalIsLiveForkExcluded_();
};

/**
 * Part B5 — shared fork lifecycle status copy (PA + timeline SYNC strips).
 * opts: closing, opening, openingFrozen, joining, idleWarn, mode, pending, failReason, connecting
 */
window.dalForkPhaseStatusText_ = function(opts) {
  opts = opts || {};
  if (opts.idleWarn) return 'Session closing — tap to keep open';
  if (opts.closing) return 'Closing — committing…';
  if (opts.opening) {
    return opts.openingFrozen ? 'Opening — frozen' : 'Opening — you can edit';
  }
  if (opts.joining) return 'Live — joining…';
  var mode = String(opts.mode || '');
  if (mode === 'blocked' || mode === 'gas') {
    var why = opts.failReason ? (' — ' + String(opts.failReason).slice(0, 60)) : '';
    return 'Live — DOWN' + why;
  }
  if (opts.connecting || mode === 'connecting') return 'Live — connecting…';
  if (opts.pending) return 'Live — pending…';
  if (mode === 'firestore') return 'Live';
  return 'Live';
};

/** Part B4 — room idle eject (timeline 45m / prep 75m; warn at T−5). */
window.DAL_IDLE_TL_MS_ = 45 * 60 * 1000;
window.DAL_IDLE_PREP_MS_ = 75 * 60 * 1000;
window.DAL_IDLE_WARN_BEFORE_MS_ = 5 * 60 * 1000;
window.DAL_PRESENCE_PING_MS_ = 45 * 1000;
window.DAL_PRESENCE_STALE_MS_ = 150 * 1000;
window.DAL_IDLE_TICK_MS_ = 15 * 1000;

window.dalRoomIdleState_ = {
  prep: { lastTouch: 0, timer: null, ejecting: false },
  timeline: { lastTouch: 0, timer: null, ejecting: false }
};

window.dalPrepLastLeavePending_ = false;
window.dalTlLastLeavePending_ = false;
window.dalPrepLastLeaveSeq_ = 0;
window.dalTlLastLeaveSeq_ = 0;
window.dalPrepLeaveIntent_ = false;
window.dalTlLeaveIntent_ = false;

window.dalPresenceProjectId_ = function() {
  if (typeof activePresenceProject !== 'undefined' && activePresenceProject) {
    return String(activePresenceProject);
  }
  if (window.dalPaSessionWatchProjectId) return String(window.dalPaSessionWatchProjectId);
  if (window.mobileCrewHubProjectId) return String(window.mobileCrewHubProjectId);
  var el = document.getElementById('edit-folder-id');
  return el && el.value && el.value !== 'NEW' ? String(el.value) : '';
};

/** Best-effort project id for prep close / last-leave (station teardown may clear edit-folder-id). */
window.dalResolvePrepProjectId_ = function(explicitId) {
  var id = explicitId != null ? String(explicitId) : '';
  if (id && id !== 'NEW') return id;
  var el = document.getElementById('edit-folder-id');
  if (el && el.value && el.value !== 'NEW') return String(el.value);
  if (window.dalPaSessionWatchProjectId) return String(window.dalPaSessionWatchProjectId);
  if (window.dalSessionState && window.dalSessionState.projectId) {
    return String(window.dalSessionState.projectId);
  }
  if (window.mobileCrewHubProjectId) return String(window.mobileCrewHubProjectId);
  if (typeof window.dalPresenceProjectId_ === 'function') {
    return String(window.dalPresenceProjectId_() || '');
  }
  return '';
};

/** Presence identity must match startPresencePing (ACTIVE_USER_NAME), not station host actor. */
window.dalPresenceActor_ = function() {
  return (typeof ACTIVE_USER_NAME !== 'undefined' && ACTIVE_USER_NAME)
    ? String(ACTIVE_USER_NAME)
    : 'Unknown';
};

window.dalPresenceSubMode_ = function() {
  var sub = window.activePresencePaMode || '';
  if (window.IS_STATION_DEVICE) sub = sub ? (sub + '|station') : 'station';
  return sub;
};

/** Start presence only if not already pinging this project (restart wipes occupants sync). */
window.dalEnsurePresencePing_ = function(projectId) {
  if (!projectId || typeof startPresencePing !== 'function') return;
  if (typeof activePresenceProject !== 'undefined' && activePresenceProject &&
      String(activePresenceProject) === String(projectId)) {
    return;
  }
  startPresencePing(projectId);
};

/** Count peers still in a live module from a fresh presence payload. */
window.dalCountFreshModulePeers_ = function(othersObj, moduleName) {
  othersObj = othersObj || {};
  var me = String(window.dalPresenceActor_() || '').toLowerCase();
  var hosted = '';
  if (typeof window.dalActorName_ === 'function') {
    try { hosted = String(window.dalActorName_() || '').toLowerCase(); } catch (e0) { /* ignore */ }
  }
  var count = 0;
  var list = [];
  for (var name in othersObj) {
    if (!othersObj[name] || othersObj[name].module !== moduleName) continue;
    var n = String(name || '').toLowerCase();
    if (n && (n === me || (hosted && n === hosted))) continue;
    count++;
    list.push({ name: name, mode: othersObj[name].subMode || 'design' });
  }
  return { count: count, list: list };
};

window.dalPrepIdleBlockedByStation_ = function() {
  if (window.IS_STATION_DEVICE) {
    if (typeof window.stationHostActive_ === 'function' && window.stationHostActive_()) return true;
    if (window.dalPrepUiOpen) return true;
  }
  var list = window.paPrepOccupants || [];
  for (var i = 0; i < list.length; i++) {
    if (list[i] && /station/i.test(String(list[i].mode || ''))) return true;
  }
  return false;
};

window.dalClearRoomIdle_ = function(domain) {
  var d = domain === 'timeline' ? 'timeline' : 'prep';
  var st = window.dalRoomIdleState_[d];
  if (st.timer) {
    try { clearInterval(st.timer); } catch (e0) { /* ignore */ }
    st.timer = null;
  }
  st.lastTouch = 0;
  st.ejecting = false;
  if (d === 'prep') window.dalPrepIdleWarn_ = false;
  else window.dalTlIdleWarn_ = false;
};

window.dalTouchRoomIdle_ = function(domain) {
  var d = domain === 'timeline' ? 'timeline' : 'prep';
  var live = d === 'prep' ? !!window.dalPrepUiOpen : !!window.dalTimelineSessionOpen;
  if (!live) return;
  var st = window.dalRoomIdleState_[d];
  st.lastTouch = Date.now();
  if (d === 'prep') window.dalPrepIdleWarn_ = false;
  else window.dalTlIdleWarn_ = false;
  if (typeof window.dalUpdateRemotePendingBanner_ === 'function' && d === 'prep') {
    window.dalUpdateRemotePendingBanner_();
  }
  if (typeof window.dalUpdateTimelineLiveBanner_ === 'function' && d === 'timeline') {
    window.dalUpdateTimelineLiveBanner_();
  }
  window.dalArmRoomIdle_(d);
};

window.dalKeepOpenRoomIdle_ = function(domain) {
  window.dalTouchRoomIdle_(domain);
};

window.dalArmRoomIdle_ = function(domain) {
  var d = domain === 'timeline' ? 'timeline' : 'prep';
  var live = d === 'prep' ? !!window.dalPrepUiOpen : !!window.dalTimelineSessionOpen;
  if (!live) {
    window.dalClearRoomIdle_(d);
    return;
  }
  var st = window.dalRoomIdleState_[d];
  if (!st.lastTouch) st.lastTouch = Date.now();
  if (st.timer) return;
  st.timer = setInterval(function() {
    window.dalTickRoomIdle_(d);
  }, window.DAL_IDLE_TICK_MS_ || 15000);
  window.dalBindForkIdleKeepOpenClicks_();
};

window.dalTickRoomIdle_ = function(domain) {
  var d = domain === 'timeline' ? 'timeline' : 'prep';
  var live = d === 'prep' ? !!window.dalPrepUiOpen : !!window.dalTimelineSessionOpen;
  if (!live) {
    window.dalClearRoomIdle_(d);
    return;
  }
  // Peers still in the room → not idle.
  if (d === 'prep' && (window.paPrepOccupants || []).length > 0) {
    window.dalTouchRoomIdle_('prep');
    return;
  }
  if (d === 'timeline' && (window.timelineOccupants || []).length > 0) {
    window.dalTouchRoomIdle_('timeline');
    return;
  }
  if (d === 'prep' && window.dalPrepIdleBlockedByStation_()) {
    window.dalTouchRoomIdle_('prep');
    return;
  }
  var st = window.dalRoomIdleState_[d];
  if (!st.lastTouch || st.ejecting) return;
  var limit = d === 'prep'
    ? (window.DAL_IDLE_PREP_MS_ || (75 * 60 * 1000))
    : (window.DAL_IDLE_TL_MS_ || (45 * 60 * 1000));
  var warnBefore = window.DAL_IDLE_WARN_BEFORE_MS_ || (5 * 60 * 1000);
  var age = Date.now() - st.lastTouch;
  if (age >= limit) {
    st.ejecting = true;
    if (d === 'prep') {
      window.dalPrepIdleWarn_ = false;
      if (typeof window.closeDalPrepSession === 'function') {
        var idlePid = typeof window.dalResolvePrepProjectId_ === 'function'
          ? window.dalResolvePrepProjectId_()
          : '';
        window.closeDalPrepSession({ auto: true, reason: 'idle', projectId: idlePid });
      }
    } else {
      window.dalTlIdleWarn_ = false;
      if (typeof window.closeDalTimelineCollabSession === 'function') {
        window.closeDalTimelineCollabSession({ auto: true, reason: 'idle' });
      }
    }
    return;
  }
  if (age >= (limit - warnBefore)) {
    if (d === 'prep' && !window.dalPrepIdleWarn_) {
      window.dalPrepIdleWarn_ = true;
      if (typeof window.dalUpdateRemotePendingBanner_ === 'function') {
        window.dalUpdateRemotePendingBanner_();
      }
    }
    if (d === 'timeline' && !window.dalTlIdleWarn_) {
      window.dalTlIdleWarn_ = true;
      if (typeof window.dalUpdateTimelineLiveBanner_ === 'function') {
        window.dalUpdateTimelineLiveBanner_();
      }
    }
  }
};

window.dalBindForkIdleKeepOpenClicks_ = function() {
  var bind = function(el, domain) {
    if (!el || el.getAttribute('data-dal-idle-bound') === '1') return;
    el.setAttribute('data-dal-idle-bound', '1');
    el.addEventListener('click', function() {
      var warn = domain === 'prep' ? window.dalPrepIdleWarn_ : window.dalTlIdleWarn_;
      if (!warn) return;
      window.dalKeepOpenRoomIdle_(domain);
    });
  };
  bind(document.getElementById('pa-prep-live-status'), 'prep');
  bind(document.getElementById('tl-sync-status'), 'timeline');
  bind(document.getElementById('surface-fork-sync-status'), 'prep');
  var surf = document.getElementById('surface-fork-sync-status');
  if (surf && surf.getAttribute('data-dal-idle-bound-tl') !== '1') {
    surf.setAttribute('data-dal-idle-bound-tl', '1');
    surf.addEventListener('click', function() {
      if (window.dalTlIdleWarn_) window.dalKeepOpenRoomIdle_('timeline');
      else if (window.dalPrepIdleWarn_) window.dalKeepOpenRoomIdle_('prep');
    });
  }
};

/**
 * Part B4 last-leave — do not trust the cached roster (up to ~45s stale).
 * Ping self as `main` first, then commit only when no fresh peers remain in that module.
 * null presence payload = lock miss (not an empty room).
 */
window.dalMaybeLastLeaveClosePrep_ = function() {
  if (!window.dalPrepUiOpen || window.dalPrepClosing || window.dalPrepOpeningUi_) return;
  if (window.dalPrepLastLeavePending_) return;
  var projectId = window.dalPresenceProjectId_();
  if (!projectId) return;

  window.dalPrepLastLeavePending_ = true;
  window.dalPrepLeaveIntent_ = true;
  window.dalPrepLastLeaveSeq_ = (window.dalPrepLastLeaveSeq_ || 0) + 1;
  var leaveSeq = window.dalPrepLastLeaveSeq_;
  window.activePresenceModule = 'main';

  var ensureLeftAssetsModule_ = function() {
    try {
      google.script.run.reportProjectPresence(
        projectId,
        window.dalPresenceActor_(),
        'ping',
        'main',
        window.dalPresenceSubMode_()
      );
    } catch (eBump) { /* ignore */ }
  };

  var leaveStillWanted_ = function() {
    return leaveSeq === window.dalPrepLastLeaveSeq_ && !!window.dalPrepLeaveIntent_;
  };

  var fallbackPresenceUnknown_ = function() {
    if (!leaveStillWanted_()) {
      window.dalPrepLastLeavePending_ = false;
      return;
    }
    // Lock miss / RPC fail — do NOT guess-close, and do NOT clearLatch (keeps idle eject alive).
    ensureLeftAssetsModule_();
    if (typeof window.stopDalPaLiveSync_ === 'function') window.stopDalPaLiveSync_();
    window.dalPrepLeaveIntent_ = false;
    window.dalEnsurePresencePing_(projectId);
  };

  var decide_ = function(othersObj) {
    window.dalPrepLastLeavePending_ = false;
    if (!leaveStillWanted_()) return;
    if (othersObj == null) {
      fallbackPresenceUnknown_();
      return;
    }
    var peers = window.dalCountFreshModulePeers_(othersObj, 'assets');
    window.paPrepOccupants = peers.list;
    if (peers.count > 0) {
      // Real peer or presence ghost — detach live sync only. Keep dalPrepUiOpen so idle
      // eject can still commit after ghosts expire (clearLatch would orphan the fork).
      if (typeof window.stopDalPaLiveSync_ === 'function') window.stopDalPaLiveSync_();
      window.dalPrepLeaveIntent_ = false;
      window.dalEnsurePresencePing_(projectId);
      return;
    }
    if (window.dalPrepClosing) return;
    if (typeof window.closeDalPrepSession === 'function') {
      window.closeDalPrepSession({ auto: true, reason: 'last-leave', projectId: projectId });
    }
  };

  google.script.run
    .withFailureHandler(function() {
      window.dalPrepLastLeavePending_ = false;
      fallbackPresenceUnknown_();
    })
    .withSuccessHandler(decide_)
    .reportProjectPresence(
      projectId,
      window.dalPresenceActor_(),
      'ping',
      'main',
      window.dalPresenceSubMode_()
    );
};

window.dalMaybeLastLeaveCloseTimeline_ = function() {
  if (!window.dalTimelineSessionOpen || window.dalTlClosingUi_ || window.dalTlOpeningUi_) return;
  if (window.dalTlLastLeavePending_) return;
  var projectId = window.dalPresenceProjectId_() ||
    (typeof targetFolderId !== 'undefined' ? String(targetFolderId || '') : '');
  if (!projectId) return;

  window.dalTlLastLeavePending_ = true;
  window.dalTlLeaveIntent_ = true;
  window.dalTlLastLeaveSeq_ = (window.dalTlLastLeaveSeq_ || 0) + 1;
  var leaveSeq = window.dalTlLastLeaveSeq_;
  window.activePresenceModule = 'main';

  var ensureLeftTimelineModule_ = function() {
    try {
      google.script.run.reportProjectPresence(
        projectId,
        window.dalPresenceActor_(),
        'ping',
        'main',
        window.dalPresenceSubMode_()
      );
    } catch (eBump) { /* ignore */ }
  };

  var leaveStillWanted_ = function() {
    return leaveSeq === window.dalTlLastLeaveSeq_ && !!window.dalTlLeaveIntent_;
  };

  var fallbackPresenceUnknown_ = function() {
    if (!leaveStillWanted_()) {
      window.dalTlLastLeavePending_ = false;
      return;
    }
    // Lock miss / RPC fail — do NOT guess empty from stale local roster.
    ensureLeftTimelineModule_();
    if (typeof window.stopDalTimelineSessionWatcher === 'function') {
      window.stopDalTimelineSessionWatcher();
    }
    window.dalEnsurePresencePing_(projectId);
  };

  var decide_ = function(othersObj) {
    window.dalTlLastLeavePending_ = false;
    if (!leaveStillWanted_()) return;
    if (othersObj == null) {
      fallbackPresenceUnknown_();
      return;
    }
    var peers = window.dalCountFreshModulePeers_(othersObj, 'timeline');
    window.timelineOccupants = peers.list.map(function(p) { return p.name; });
    if (peers.count > 0) {
      if (typeof window.stopDalTimelineSessionWatcher === 'function') {
        window.stopDalTimelineSessionWatcher();
      }
      window.dalTlLeaveIntent_ = false;
      window.dalEnsurePresencePing_(projectId);
      return;
    }
    if (window.dalTlClosingUi_) return;
    if (typeof window.closeDalTimelineCollabSession === 'function') {
      window.closeDalTimelineCollabSession({ auto: true, reason: 'last-leave' });
    }
  };

  google.script.run
    .withFailureHandler(function() {
      window.dalTlLastLeavePending_ = false;
      fallbackPresenceUnknown_();
    })
    .withSuccessHandler(decide_)
    .reportProjectPresence(
      projectId,
      window.dalPresenceActor_(),
      'ping',
      'main',
      window.dalPresenceSubMode_()
    );
};

window.isTaskAssignedToMe = function(task) {
  if (!task || !Array.isArray(task.assignees)) return false;
  const email = (typeof ACTIVE_USER_EMAIL !== 'undefined' && ACTIVE_USER_EMAIL) ? String(ACTIVE_USER_EMAIL).toLowerCase().trim() : '';
  const uid = (typeof ACTIVE_USER_UID !== 'undefined' && ACTIVE_USER_UID) ? String(ACTIVE_USER_UID).trim() : '';
  const name = (typeof ACTIVE_USER_NAME !== 'undefined' && ACTIVE_USER_NAME) ? String(ACTIVE_USER_NAME).toLowerCase().trim() : '';
  return task.assignees.some(function(a) {
    const val = String(a || '').trim();
    const valLower = val.toLowerCase();
    if ((email && valLower === email) || (uid && val === uid) || (name && valLower === name)) return true;
    const crew = typeof findCrewMemberByIdentifier === 'function' ? findCrewMemberByIdentifier(val) : null;
    if (!crew) return false;
    if (uid && crew.uid && crew.uid === uid) return true;
    if (email && crew.email && crew.email.toLowerCase() === email) return true;
    if (name && crew.name && crew.name.toLowerCase().trim() === name) return true;
    return false;
  });
};

/** Crew pools for task assignee labels (uid / email / name). */
window.getTaskCrewRoster = function() {
  const seen = {};
  const out = [];
  const pools = [];
  if (typeof globalDirectoryCrew !== 'undefined' && globalDirectoryCrew && globalDirectoryCrew.length) pools.push(globalDirectoryCrew);
  if (typeof globalRosterData !== 'undefined' && globalRosterData && globalRosterData.roster) pools.push(globalRosterData.roster);
  if (typeof activeRoster !== 'undefined' && activeRoster && activeRoster.length) pools.push(activeRoster);
  for (let p = 0; p < pools.length; p++) {
    for (let i = 0; i < pools[p].length; i++) {
      const c = pools[p][i];
      const key = (c.uid || c.email || c.name || '').toString().toLowerCase();
      if (!key || seen[key]) continue;
      seen[key] = true;
      out.push(c);
    }
  }
  return out;
};

window.findCrewMemberByIdentifier = function(identifier) {
  const id = String(identifier || '').trim();
  if (!id) return null;
  const idLower = id.toLowerCase();
  const roster = getTaskCrewRoster();
  for (let i = 0; i < roster.length; i++) {
    const c = roster[i];
    if (c.uid && String(c.uid).trim() === id) return c;
    if (c.email && String(c.email).toLowerCase().trim() === idLower) return c;
    if (c.name && String(c.name).toLowerCase().trim() === idLower) return c;
  }
  return null;
};

window.resolveCrewDisplayLabel = function(identifier) {
  const crew = findCrewMemberByIdentifier(identifier);
  if (crew && crew.name) return crew.name;
  const id = String(identifier || '').trim();
  if (id.indexOf('UID_') === 0) return 'Crew member';
  if (id.indexOf('@') > 0) return id.split('@')[0];
  return id || 'Unknown';
};

window.crewIdentifiersMatch = function(a, b) {
  const sa = String(a || '').trim();
  const sb = String(b || '').trim();
  if (!sa || !sb) return false;
  if (sa === sb || sa.toLowerCase() === sb.toLowerCase()) return true;
  const ca = findCrewMemberByIdentifier(sa);
  const cb = findCrewMemberByIdentifier(sb);
  if (ca && cb) {
    if (ca.uid && cb.uid && ca.uid === cb.uid) return true;
    if (ca.email && cb.email && ca.email.toLowerCase() === cb.email.toLowerCase()) return true;
  }
  return false;
};

window.isAssigneeSelected = function(assigneeId, selectedList) {
  return (selectedList || []).some(function(sel) {

// ==========================================
function personalHubCrewKey(name) {
    let crew = name || (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : '');
    return String(crew).toLowerCase().trim().replace(/\s+/g, '_');
}

function isDesktopBrowserContext() {
    try { return window.matchMedia('(min-width: 769px)').matches; } catch (e) { return true; }
}

function desktopAutoLoginStorageKey(crewKey) {
    return 'sm_auto_login_off_' + (crewKey || personalHubCrewKey());
}

function isDesktopAutoLoginDisabled(crewKey) {
    if (!isDesktopBrowserContext()) return false;
    try {
        return localStorage.getItem(desktopAutoLoginStorageKey(crewKey)) === '1';
    } catch (e) { return false; }
}

function setDesktopAutoLoginDisabled(disabled, crewKey) {
    let key = desktopAutoLoginStorageKey(crewKey);
    try {
        if (disabled) localStorage.setItem(key, '1');
        else localStorage.removeItem(key);
    } catch (e) { /* ignore */ }
}

function syncDesktopAutoLoginButton() {
    let btn = document.getElementById('btn-disable-desktop-auto-login');
    if (!btn) return;
    let show = isDesktopBrowserContext() && !isDesktopAutoLoginDisabled();
    btn.style.display = show ? '' : 'none';
    btn.disabled = false;
    btn.innerText = 'DISABLE AUTO-LOGIN';
}

function disableDesktopAutoLogin() {
    if (!isDesktopBrowserContext()) return;
    let crew = (typeof ACTIVE_USER_NAME !== 'undefined') ? ACTIVE_USER_NAME : '';
    let crewKey = personalHubCrewKey(crew);
    setDesktopAutoLoginDisabled(true, crewKey);

    let btn = document.getElementById('btn-disable-desktop-auto-login');
    if (btn) { btn.disabled = true; btn.innerText = 'DISABLING…'; }

    if (typeof closePersonalHub === 'function') closePersonalHub();

    let token = getActiveSessionToken();

    function finishDisableRedirect() {
        try {
            localStorage.removeItem('sm_session_token');
            localStorage.removeItem('sm_session_expires');
        } catch (e) { /* ignore */ }

        let inHostedShell = window.parent && window.parent !== window;
        if (inHostedShell) {
            try {
                window.parent.postMessage({ type: 'SHOWRUNNER_NAVIGATE_LOGIN_GATE' }, '*');
                window.parent.postMessage({ type: 'SHOWRUNNER_SESSION_CLEAR' }, '*');
                window.parent.postMessage({ type: 'SHOWRUNNER_LOGIN_STATE', loggedIn: false, clearSession: true }, '*');
            } catch (e) { /* ignore */ }
            return;
        }

        let url = getScriptLoginUrl();
        if (url) window.location.replace(url);
        else window.location.reload();
    }

    if (!token || !crew) {
        finishDisableRedirect();
        return;
    }

    google.script.run
        .withSuccessHandler(function() { finishDisableRedirect(); })
        .withFailureHandler(function() { finishDisableRedirect(); })
        .apiLogoutSession(crew, token);
}

function getActiveSessionToken() {
    try {
        let t = localStorage.getItem('sm_session_token');
        if (t && String(t).trim().length >= 20) return String(t).trim();
    } catch (e) { /* ignore */ }
    let meta = document.querySelector('meta[name="session-token"]');
    if (meta && meta.content && String(meta.content).trim().length >= 20) return String(meta.content).trim();
    return '';
}

function getScriptLoginUrl() {
    try {
        return window.location.href.split('?')[0];
    } catch (e) {
        return '';

}

    let btn = document.getElementById('btn-personal-logout') || document.getElementById('mobile-btn-personal-logout');

    function finishLocalLogout() {
        try {
            localStorage.removeItem('sm_session_token');
            localStorage.removeItem('sm_session_expires');
          localStorage.removeItem('sm_crew_pass');
          localStorage.removeItem('sm_crew_timestamp');
          localStorage.removeItem('sm_lock_prefix_' + String(crew || '').toLowerCase().trim().replace(/\s+/g, '_'));
          sessionStorage.removeItem('sm_lock_prefix_' + String(crew || '').toLowerCase().trim().replace(/\s+/g, '_'));
        } catch (e) { /* ignore */ }

        let inHostedShell = window.parent && window.parent !== window;
        if (inHostedShell) {
            try {
                window.parent.postMessage({ type: 'SHOWRUNNER_NAVIGATE_LOGIN_GATE' }, '*');
                window.parent.postMessage({ type: 'SHOWRUNNER_SESSION_CLEAR' }, '*');
                window.parent.postMessage({ type: 'SHOWRUNNER_LOGIN_STATE', loggedIn: false, clearSession: true }, '*');
            } catch (e) { /* ignore */ }
            return;
        }

        let url = getScriptLoginUrl();
        if (url) window.location.replace(url);
        else window.location.reload();
    }

    if (!token || !crew) {
        finishLocalLogout();
        return;
    }

    google.script.run
        .withSuccessHandler(function() { finishLocalLogout(); })
        .withFailureHandler(function() { finishLocalLogout(); })
        .apiLogoutSession(crew, token);

function sanitizePinInput(el) {
    if (!el) return;
    el.value = String(el.value || '').replace(/[^a-zA-Z0-9]/g, '').slice(0, 6);
}

function submitPasscodeChange() {
    let currentEl = document.getElementById('personal-pin-current');
    let newEl = document.getElementById('personal-pin-new');
    let confirmEl = document.getElementById('personal-pin-confirm');
    let msgEl = document.getElementById('personal-pin-msg');
    let btn = document.getElementById('btn-personal-pin-save');

    let current = currentEl ? String(currentEl.value || '').trim() : '';
    let next = newEl ? String(newEl.value || '').trim() : '';
    let confirmPin = confirmEl ? String(confirmEl.value || '').trim() : '';

    function showPinMsg(text, ok) {
        if (!msgEl) return;
        msgEl.textContent = text;
        msgEl.style.color = ok ? '#10b981' : '#ef4444';
    }

    if (!/^[a-zA-Z0-9]{6}$/.test(current)) {
        showPinMsg('Enter your current 6-character PIN.', false);
        return;
    }
    if (!/^[a-zA-Z0-9]{6}$/.test(next)) {
        showPinMsg('New PIN must be exactly 6 letters or numbers.', false);
        return;
    }
    if (next !== confirmPin) {
        showPinMsg('New PIN and confirmation do not match.', false);
        return;
    }

    let token = getActiveSessionToken();
    let crew = (typeof ACTIVE_USER_NAME !== 'undefined') ? ACTIVE_USER_NAME : '';
    if (!token || !crew) {
        showPinMsg('Session expired. Please log in again.', false);
        return;
    }

    if (btn) { btn.disabled = true; btn.innerText = 'SAVING…'; }

    google.script.run
        .withSuccessHandler(function(res) {
            if (btn) { btn.disabled = false; btn.innerText = 'UPDATE PIN'; }
            if (!res || !res.success) {
                showPinMsg((res && res.message) ? res.message : 'Could not update PIN.', false);
                return;
            }
            showPinMsg(res.message || 'PIN updated.', true);
            if (currentEl) currentEl.value = '';
            if (newEl) newEl.value = '';
            if (confirmEl) confirmEl.value = '';
            setTimeout(function() { closePersonalPinModal(); }, 800);
        })
        .withFailureHandler(function(err) {
            if (btn) { btn.disabled = false; btn.innerText = 'UPDATE PIN'; }
            showPinMsg('Error: ' + (err && err.message ? err.message : String(err)), false);
        })
        .changeMyPasscode(crew, token, current, next);
}

function getTagObj(id, nodes = SYSTEM_TAGS) {
    if (!id || !nodes) return null;
    if (typeof id === 'object') return id; // LEGACY FALLBACK
    for (let n of nodes) {
        if (n.id === id) return n;
        if (n.children) {
            let found = getTagObj(id, n.children);
            if (found) return found;
        }
    }
    return null;
}

function getTagPathById(id, nodes = SYSTEM_TAGS, currentPath = []) {
    if (!id || !nodes) return null;
    if (typeof id === 'object') return [id]; // LEGACY FALLBACK
    for (let n of nodes) {
        let newPath = [...currentPath, n.id];
        if (n.id === id) return newPath;
        if (n.children) {
            let res = getTagPathById(id, n.children, newPath);
            if (res) return res;
        }
    }
    return null;
}

function getTagDepthById(id, nodes = SYSTEM_TAGS, depth = 0) {
    if (!id || !nodes) return -1;
    if (typeof id === 'object') return 0; // LEGACY FALLBACK
    for (let n of nodes) {
        if (n.id === id) return depth;
        if (n.children) {
            let d = getTagDepthById(id, n.children, depth + 1);
            if (d > -1) return d;
        }
    }
    return -1;
}

// @INDEX: GLOBALS -> Live Tag Lexicon Parser
function getLiveTagColor(tagName, fallbackColor) {
    if (typeof SYSTEM_TAGS === 'undefined') return fallbackColor !== undefined ? fallbackColor : '#a855f7';
    let target = String(tagName).toLowerCase().trim();
    let cleanTarget = target.replace(/[^a-z0-9]/g, '');
    if (!cleanTarget) return fallbackColor !== undefined ? fallbackColor : '#a855f7';
    
    let targetWords = target.split(/[\s\-\/_]+/).filter(w => w.length > 0);
    let bestMatch = null;
    let bestScore = -1;

    const findT = (nodes) => {
        for (let n of nodes) {
            let nName = String(n.name).toLowerCase().trim();
            let nClean = nName.replace(/[^a-z0-9]/g, '');
            let nWords = nName.split(/[\s\-\/_]+/).filter(w => w.length > 0);
            let score = -1;
            
            if (nName === target) score = 100;
            else if (typeof SYSTEM_ALIASES !== 'undefined' && SYSTEM_ALIASES[nName] && SYSTEM_ALIASES[nName].toLowerCase() === target) score = 100;
            else if (typeof SYSTEM_ALIASES !== 'undefined' && SYSTEM_ALIASES[target] && SYSTEM_ALIASES[target].toLowerCase() === nName) score = 100;
            else if (nClean === cleanTarget) score = 90;
            else {
                let wordMatches = 0;
                targetWords.forEach(tw => {
                    nWords.forEach(nw => {
                        if (tw === nw) wordMatches += 2;
                        else if (tw.length >= 3 && nw.length >= 3 && (tw.includes(nw) || nw.includes(tw))) wordMatches += 1;
                    });
                });
                
                if (wordMatches > 0) score = 60 + wordMatches;
                else if (cleanTarget.length >= 3 && nClean.length >= 3 && (nClean.includes(cleanTarget) || cleanTarget.includes(nClean))) score = 50;
                else if (cleanTarget.length >= 3 && nClean.length >= 3 && (nClean.startsWith(cleanTarget) || cleanTarget.startsWith(nClean))) score = 40;
            }

            if (score > bestScore && score > 0) { bestScore = score; bestMatch = n; }
            if (n.children) findT(n.children);
        }
    };
    findT(SYSTEM_TAGS);
    return (bestMatch && bestMatch.color) ? bestMatch.color : (fallbackColor !== undefined ? fallbackColor : '#a855f7');
}

function buildTagPathsHtml(tagIds, badgeFs = 8) {
    if (!tagIds || !Array.isArray(tagIds) || tagIds.length === 0) return '-';

    const idSet = new Set(tagIds);
    if (idSet.size === 0) return '-';

    // 1. Find all "leaf" nodes within the provided tagIds.
    // A leaf is a tag that is not a parent to any other tag in the list.
    const leafIds = tagIds.filter(id => {
        const node = getTagObj(id);
        if (!node || !node.children || node.children.length === 0) return true;
        return !node.children.some(child => idSet.has(child.id));
    });

    // Fallback for corrupted data where a parent is present without its child, or if no leaves are found for some reason.
    if (leafIds.length === 0 && tagIds.length > 0) {
        return tagIds.map(tId => {
            const tObj = getTagObj(tId);
            if (!tObj) return '';
            let dispName = tObj.name;
            if (dispName.toLowerCase() === 'cable') dispName = 'CBL';
            const c = tObj.color || '#a855f7';
            return `<span style="border:1px solid ${c}; color:${c}; padding:2px 4px; border-radius:4px; font-size:${badgeFs}px; margin-right:4px; text-transform:uppercase;">${dispName}</span>`;
        }).join('');
    }

    // 2. For each leaf, get its full path and render it as a breadcrumb.
    const pathHtmls = leafIds.map(leafId => {
        const pathIds = getTagPathById(leafId);
        if (!pathIds) return '';
        const pathPills = pathIds.map(pId => {
            const tObj = getTagObj(pId);
            if (!tObj) return '';
            let dispName = tObj.name;
            if (dispName.toLowerCase() === 'cable') dispName = 'CBL';
            const c = tObj.color || '#a855f7';
            return `<span style="border:1px solid ${c}; color:${c}; padding:2px 4px; border-radius:4px; font-size:${badgeFs}px; text-transform:uppercase;">${dispName}</span>`;
        }).join('');
        
        return `<div style="display:flex; align-items:center; gap: 1px; margin-bottom:2px; white-space:nowrap;">${pathPills}</div>`;
    });

    return pathHtmls.join('');
}

          } else if (confirm("Are you sure you want to delete this leave?")) {
                      google.script.run.deleteLeave(selectedLeaveId, ACTIVE_USER_NAME);
              if (globalRosterData && globalRosterData.leaves) {
                  globalRosterData.leaves = globalRosterData.leaves.filter(x => x.id !== selectedLeaveId);
              }
              selectedLeaveId = null;
              if(typeof renderMonthGrid === 'function') renderMonthGrid();
          }
      }
  }
});

function updateActiveNav(activeId) {
    ['nav-btn-dashboard', 'nav-btn-availability', 'nav-btn-roster', 'nav-btn-manager', 'nav-btn-master', 'nav-btn-financials'].forEach(id => {

            else btn.classList.remove('nav-active');
        }
    });
}

// ==========================================
// --- DATABASE BACKUP ENGINE (CLIENT-SIDE) ---
// ==========================================
// @INDEX: GLOBALS -> Database Backup Engine
window.DATABASE_BACKUP_IN_PROGRESS = false;
window._dbBackupCountdownTimer = null;

window.isDatabaseBackupLocked = function() {
  return !!window.DATABASE_BACKUP_IN_PROGRESS;
};

window.setDatabaseBackupLock = function(active) {
  window.DATABASE_BACKUP_IN_PROGRESS = !!active;
  document.body.classList.toggle('db-backup-locked', !!active);
  const panel = document.getElementById('db-ops-panel');
  if (panel) panel.style.pointerEvents = active ? 'none' : '';
  if (panel) panel.style.opacity = active ? '0.45' : '';
};

window.guardDatabaseBackupLock = function(actionLabel) {
  if (!window.isDatabaseBackupLocked()) return false;
  alert('Database backup in progress — ' + (actionLabel || 'save') + ' is blocked until backup finishes.');
  return true;
};

function waitForPendingSavesBeforeBackup_(callback) {
  const maxWait = 45000;
  const start = Date.now();
  (function poll() {
    if (!window.isBackgroundSyncing || Date.now() - start > maxWait) {
      callback();
      return;
    }
    setTimeout(poll, 400);
  })();
}

function releaseDatabaseBackupSession_(overlay, onComplete) {
  window.setDatabaseBackupLock(false);
  google.script.run
    .withFailureHandler(function() {})
    .endDatabaseBackupLock(ACTIVE_USER_NAME);
  if (typeof onComplete === 'function') onComplete();
}

function runDatabaseBackupJob_(mainText, subText, onComplete) {
  const finish = function(success, message) {
    mainText.innerHTML = success
      ? '<span style="font-size: 24px; font-weight: 900; color: #10b981;">SUCCESS</span>'
      : '<span style="font-size: 24px; font-weight: 900; color: #ef4444;">ERROR</span>';
    subText.innerText = message;
    const overlay = document.getElementById('backup-modal-overlay');
    setTimeout(function() {
      if (overlay) overlay.style.display = 'none';
      releaseDatabaseBackupSession_(null, onComplete);
    }, success ? 3000 : 5000);
  };

  google.script.run
    .withSuccessHandler(function(res) { finish(true, res); })
    .withFailureHandler(function(err) { finish(false, err.message); })
    .runNightlyBackup(true, ACTIVE_USER_NAME);
}

function triggerDatabaseBackup(onComplete) {
  if (window.isDatabaseBackupLocked()) {
    alert('A database backup is already in progress.');
    return;
  }

  const overlay = document.getElementById('backup-modal-overlay');
  const subText = document.getElementById('backup-modal-sub');
  const mainText = document.getElementById('backup-modal-text');
  if (!overlay || !subText || !mainText) return;

  overlay.style.display = 'flex';
  overlay.style.pointerEvents = 'none';
  overlay.style.background = 'transparent';
  overlay.style.backdropFilter = 'none';

  let count = 20;
  let phase = 1;

  mainText.innerHTML = 'Engine + Vault backup starts in <br><span id="backup-countdown" style="font-size: 48px; font-weight: 900; color: #ef4444;">' + count + '</span><br> seconds.';
  subText.innerText = 'Please save your work. The interface will lock soon.';

  if (window._dbBackupCountdownTimer) clearInterval(window._dbBackupCountdownTimer);

  window._dbBackupCountdownTimer = setInterval(function() {
    count--;
    const newCountdownEl = document.getElementById('backup-countdown');
    if (newCountdownEl) newCountdownEl.innerText = count;

    if (count <= 0) {
      if (phase === 1) {
        phase = 2;
        count = 10;
        window.setDatabaseBackupLock(true);
        google.script.run
          .withFailureHandler(function() {})
          .beginDatabaseBackupLock(ACTIVE_USER_NAME);
        overlay.style.pointerEvents = 'auto';
        overlay.style.background = 'rgba(0,0,0,0.8)';
        overlay.style.backdropFilter = 'blur(8px)';
        mainText.innerHTML = 'Interface locked. Safety buffer: <br><span id="backup-countdown" style="font-size: 48px; font-weight: 900; color: #f59e0b;">' + count + '</span><br> seconds.';
        subText.innerText = 'Waiting for pending background saves to complete...';
      } else if (phase === 2) {
        clearInterval(window._dbBackupCountdownTimer);
        window._dbBackupCountdownTimer = null;
        mainText.innerHTML = '<span style="font-size: 24px; font-weight: 900; color: #10b981;">BACKING UP NOW...</span>';
        subText.innerText = 'Copying Engine + Vault to 05_DATABASE/BACKUPS. Please wait.';
        waitForPendingSavesBeforeBackup_(function() {
          runDatabaseBackupJob_(mainText, subText, onComplete);
        });
      }
    }
  }, 1000);
}

// Root-only: warn on login if Drive backups are stale (file-based check, not function return)
function showGlobalBackupHealthBanner(health) {
  if (!health || health.healthy) return;
  let el = document.getElementById('backup-health-global-banner');
  if (!el) {
    el = document.createElement('div');
    el.id = 'backup-health-global-banner';
    el.style.cssText = 'position:fixed; top:60px; left:60px; right:0; z-index:2400; background:#450a0a; border-bottom:2px solid #ef4444; color:#fff; padding:10px 20px; font-size:12px; font-weight:bold; display:flex; align-items:center; justify-content:space-between; gap:12px; box-sizing:border-box;';
    document.body.appendChild(el);
  }
  el.innerHTML = '<span style="flex:1; line-height:1.4;">⚠️ DATABASE BACKUP: ' + (health.warning || 'Last night\'s backup may have failed.') + ' Open Resources → DATABASE.</span>'
    + '<button type="button" onclick="document.getElementById(\'backup-health-global-banner\').style.display=\'none\'" style="background:transparent; border:1px solid #ef4444; color:#fca5a5; padding:4px 10px; border-radius:4px; cursor:pointer; font-size:11px; flex-shrink:0;">DISMISS</button>';
  el.style.display = 'flex';
}

if (typeof accessTierAtLeast === 'function' && accessTierAtLeast('ROOT')) {
  google.script.run
    .withFailureHandler(function() {})
    .withSuccessHandler(showGlobalBackupHealthBanner)
    .getDatabaseBackupHealth(ACTIVE_USER_NAME);
}
