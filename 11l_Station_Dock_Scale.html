<!-- @INDEX: STATION -> Dock panel per-pane zoom (left + right) -->
<script>
(function stationDockScaleInit_() {
  var KEY_LEFT = 'sm_station_dock_zoom_left';
  var KEY_RIGHT = 'sm_station_dock_zoom_right';
  var PRESETS = { '100': 1, '125': 1.25, '150': 1.5, '175': 1.75 };

  function dockSkin_() {
    return typeof window.stationActiveUiSkin_ === 'function' && window.stationActiveUiSkin_() === 'dock_panel';
  }

  function readPreset_(key) {
    try {
      var v = localStorage.getItem(key);
      return (v && PRESETS[v]) ? v : '100';
    } catch (e) { return '100'; }
  }

  function scaleCss_(preset) {
    var n = PRESETS[String(preset || '100')];
    return n && n !== 1 ? String(n) : '';
  }

  window.stationDockZoomLeftPreset_ = function() { return readPreset_(KEY_LEFT); };
  window.stationDockZoomRightPreset_ = function() { return readPreset_(KEY_RIGHT); };

  window.stationDockApplyZoomLeft_ = function(preset) {
    var p = String(preset || '100');
    if (!PRESETS[p]) p = '100';
    try { localStorage.setItem(KEY_LEFT, p); } catch (e) { /* ignore */ }
    var ws = document.getElementById('station-dock-workspace');
    var z = scaleCss_(p);
    if (ws) {
      ws.setAttribute('data-dock-scale', p);
      ws.style.zoom = z;
    }
    document.documentElement.style.setProperty('--dock-left-zoom', PRESETS[p] || 1);
    var sel = document.getElementById('station-dock-zoom-left');
    if (sel) sel.value = p;
  };

  window.stationDockApplyZoomRight_ = function(preset) {
    var p = String(preset || '100');
    if (!PRESETS[p]) p = '100';
    try { localStorage.setItem(KEY_RIGHT, p); } catch (e) { /* ignore */ }
    var rail = document.getElementById('station-dock-scan-rail');
    var z = scaleCss_(p);
    if (rail) {
      rail.setAttribute('data-dock-scale', p);
      rail.style.zoom = z;
    }
    var sel = document.getElementById('station-dock-zoom-right');
    if (sel) sel.value = p;
  };

  window.stationDockApplyAllZoom_ = function() {
    if (!dockSkin_()) return;
    window.stationDockApplyZoomLeft_(window.stationDockZoomLeftPreset_());
    window.stationDockApplyZoomRight_(window.stationDockZoomRightPreset_());
  };

  window.stationDockToggleAppSettings_ = function(force) {
    var panel = document.getElementById('station-dock-app-settings');
    if (!panel) return;
    var show = (force === true) ? true : (force === false) ? false : panel.style.display === 'none';
    panel.style.display = show ? 'flex' : 'none';
    panel.setAttribute('aria-hidden', show ? 'false' : 'true');
    if (show) {
      var l = document.getElementById('station-dock-zoom-left');
      var r = document.getElementById('station-dock-zoom-right');
      if (l) l.value = window.stationDockZoomLeftPreset_();
      if (r) r.value = window.stationDockZoomRightPreset_();
    }
  };

  if (window.IS_STATION_DEVICE) {
    document.addEventListener('DOMContentLoaded', function() {
      window.stationDockApplyAllZoom_();
    });
  }
})();
</script>
