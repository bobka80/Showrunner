<script>
/**
 * 06g_Admin_Database.html
 * Root-only Database Operations — sub-tabs:
 *   BACKUP & ARCHIVE | OPS & NOTIFICATIONS
 */

let _dbOpsCache = [];
let _dbLiveStatus = null;
let _dbActiveSubTab = 'backup';

function switchDatabaseSubTab(tabId) {
  _dbActiveSubTab = tabId === 'ops' ? 'ops' : 'backup';
  const backupBtn = document.getElementById('db-subtab-btn-backup');
  const opsBtn = document.getElementById('db-subtab-btn-ops');
  const backupPane = document.getElementById('db-subtab-backup');
  const opsPane = document.getElementById('db-subtab-ops');
  if (backupBtn) backupBtn.classList.toggle('active', _dbActiveSubTab === 'backup');
  if (opsBtn) opsBtn.classList.toggle('active', _dbActiveSubTab === 'ops');
  if (backupPane) backupPane.style.display = _dbActiveSubTab === 'backup' ? 'flex' : 'none';
  if (opsPane) opsPane.style.display = _dbActiveSubTab === 'ops' ? 'flex' : 'none';
  if (_dbLiveStatus) {
    if (_dbActiveSubTab === 'ops') renderDatabaseOpsTab(_dbLiveStatus);
    else renderDatabaseBackupArchiveTab(_dbLiveStatus);
  } else if (_dbActiveSubTab === 'ops') {
    loadDatabaseOpsPanel();
  }
}

function refreshDatabasePanel() {
  loadDatabaseOpsPanel();
}

function loadDatabaseOpsPanel() {
  const backupPanel = document.getElementById('db-ops-panel');
  const opsPanel = document.getElementById('db-ops-notifications-panel');
  const loadingHtml = '<div style="color:#f59e0b; padding:40px; text-align:center; font-weight:bold;">Loading database status...</div>';
  if (_dbActiveSubTab === 'backup' && backupPanel) {
    backupPanel.innerHTML = loadingHtml;
  } else if (opsPanel) {
    opsPanel.innerHTML = loadingHtml;
  }

  google.script.run
    .withFailureHandler(function(err) {
      const errHtml = '<div style="color:#ef4444; padding:40px; text-align:center;">' + err.message + '</div>';
      if (backupPanel) backupPanel.innerHTML = errHtml;
      if (opsPanel) opsPanel.innerHTML = errHtml;
    })
    .withSuccessHandler(function(res) {
      try {
        _dbLiveStatus = res;
        _dbOpsCache = (res && res.operations) ? res.operations : [];
        if (_dbActiveSubTab === 'backup') {
          renderDatabaseBackupArchiveTab(res);
        } else {
          renderDatabaseOpsTab(res);
        }
      } catch (err) {
        const errHtml = '<div style="color:#ef4444; padding:40px; text-align:center;">'
          + escapePushHtml((err && err.message) ? err.message : String(err)) + '</div>';
        if (backupPanel) backupPanel.innerHTML = errHtml;
        if (opsPanel) opsPanel.innerHTML = errHtml;
      }
    })
    .getLiveDatabaseStatus(ACTIVE_USER_NAME);
}

function toggleDbOpsLogRow(stepId) {
  const body = document.getElementById('db-ops-body-' + stepId);
  const chev = document.getElementById('db-ops-chev-' + stepId);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (chev) chev.textContent = open ? '▸' : '▾';
}

function buildInfoCell(label, valueHtml, valueClass) {
  const cls = 'info-cell-value' + (valueClass ? ' ' + valueClass : '');
  return '<div class="info-cell">'
    + '<div class="info-cell-label">' + label + '</div>'
    + '<div class="' + cls + '">' + valueHtml + '</div>'
    + '</div>';
}

function buildInfoGridRow(cellsHtml) {
  return '<div class="pill-info-grid">' + cellsHtml + '</div>';
}

function buildOpsLogListHtml(ops) {
  if (!ops || !ops.length) {
    return '<div class="admin-panel-muted" style="padding:8px 4px;">No operations logged yet.</div>';
  }
  let html = '';
  ops.forEach(function(op) {
    const canRevert = op.operation === 'RESTORE' && op.status === 'ACTIVE';
    const badge = op.status === 'ACTIVE' ? '#10b981' : (op.status === 'REVERTED' ? '#6b7280' : '#a855f7');
    html += '<div class="admin-card" style="margin-bottom:8px; padding:10px 12px;">'
      + '<div onclick="toggleDbOpsLogRow(\'' + op.step_id + '\')" style="display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none;">'
      + '<span id="db-ops-chev-' + op.step_id + '" class="admin-panel-muted" style="width:14px;">▸</span>'
      + '<span class="admin-card-title" style="flex:1; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">'
      + '#' + op.step_id + ' ' + op.file_type + ' ' + op.operation
      + '</span>'
      + '<span style="color:' + badge + '; font-size:11px; font-weight:800;">' + op.status + '</span>'
      + '</div>'
      + '<div id="db-ops-body-' + op.step_id + '" style="display:none; padding:8px 0 0 22px; border-top:1px solid #333; margin-top:8px;">'
      + '<div class="admin-panel-muted">' + op.timestamp + '</div>'
      + '<div class="admin-panel-body" style="margin-top:6px;">' + (op.notes || '—') + '</div>';
    if (canRevert) {
      html += '<button class="btn-outline btn-sm" style="margin-top:10px; border-color:#3b82f6; color:#3b82f6;" onclick="event.stopPropagation(); revertDatabaseStep(\'' + op.step_id + '\')">REVERT</button>';
    }
    html += '</div></div>';
  });
  return html;
}

function renderFolderLinksCells(driveFolders) {
  if (!driveFolders) return '';
  const keys = ['backups', 'replaced', 'archives'];
  let html = '';
  keys.forEach(function(k) {
    const f = driveFolders[k];
    if (!f || !f.url) return;
    html += buildInfoCell(f.label, '<a class="admin-panel-link" href="' + f.url + '" target="_blank" style="margin-top:0;">Open ↗</a>');
  });
  return html;
}

function renderLiveFileTicket(label, file, accentClass) {
  if (!file) return '';
  const layoutHtml = file.layoutOk
    ? '<span class="admin-status-ok">✓ ' + escapePushHtml(file.expectedPath) + '</span>'
    : '<span class="admin-status-warn">⚠ ' + escapePushHtml(file.expectedPath) + '</span>';
  const locationHtml = file.parentFolderName
    ? '<strong style="color:#e4e4e7;">' + escapePushHtml(file.parentFolderName + '/' + file.name) + '</strong>'
    : '—';
  const factoryHtml = file.isOriginalFactoryFile
    ? 'Factory original — never restored'
    : 'Active file differs from factory original';
  const linkHtml = file.url
    ? '<a class="admin-panel-link" href="' + file.url + '" target="_blank" style="margin-top:0;">Open live file ↗</a>'
    : '—';

  return '<div class="info-pill ' + accentClass + '">'
    + buildInfoGridRow(
      buildInfoCell(label, escapePushHtml(file.name), 'info-cell-value--title')
      + buildInfoCell('Expected', layoutHtml)
      + buildInfoCell('Now', locationHtml)
      + buildInfoCell('Modified', escapePushHtml(file.modifiedLabel || '—'))
    )
    + buildInfoGridRow(
      buildInfoCell('Factory', factoryHtml)
      + buildInfoCell('Drive', linkHtml)
    )
    + '</div>';
}

function buildCanonicalFolderPill(res, repairBtnHtml) {
  const dbName = res.canonicalFolder ? res.canonicalFolder.name : '05_DATABASE';
  const folderLink = (res.canonicalFolder && res.canonicalFolder.url)
    ? '<a class="admin-panel-link" href="' + res.canonicalFolder.url + '" target="_blank" style="margin-top:0;">Open folder ↗</a>'
    : '—';
  const folderLinks = renderFolderLinksCells(res.driveFolders);
  let html = '<div class="info-pill info-pill--slate">'
    + buildInfoGridRow(
      buildInfoCell('Live folder', escapePushHtml(dbName), 'info-cell-value--title')
      + buildInfoCell('Live files', 'SM_Showrunner_ENGINE + SM_Showrunner_VAULT')
      + buildInfoCell('Drive', folderLink)
      + (repairBtnHtml ? buildInfoCell('Layout', repairBtnHtml) : '')
    );
  if (folderLinks) {
    html += buildInfoGridRow(folderLinks);
  }
  html += '</div>';
  return html;
}

function buildRestorePill(label, selectId, fileType, optionsHtml) {
  return '<div class="info-pill" style="border-left:3px solid #ef4444;">'
    + buildInfoGridRow(
      buildInfoCell('Restore', label, 'info-cell-value--title')
      + '<div class="info-cell" style="grid-column: span 2;">'
      + '<div class="info-cell-label">Backup</div>'
      + '<select id="' + selectId + '" style="width:100%; padding:8px 10px; font-size:12px; background:#1a1a1e; color:#fff; border:1px solid #444; border-radius:4px; box-sizing:border-box;">' + optionsHtml + '</select>'
      + '</div>'
      + '<div class="info-cell">'
      + '<div class="info-cell-label">&nbsp;</div>'
      + '<button class="btn-outline btn-sm" style="margin:0; width:100%; border-color:#ef4444; color:#ef4444; justify-content:center;" onclick="runDbRestore(\'' + fileType + '\')">RESTORE</button>'
      + '</div>'
    )
    + '</div>';
}

function buildBackupHealthBannerHtml(health) {
  if (!health) return '';
  if (health.healthy) {
    return '<div class="admin-banner-ok" style="margin-bottom:10px;">'
      + '✓ Backup OK — last Engine+Vault pair: <strong>' + (health.lastPairedDate || '—') + '</strong>'
      + ' · ' + health.fileCount + ' files in BACKUPS</div>';
  }
  return '<div class="admin-banner-warn" style="margin-bottom:10px;">'
    + '⚠️ <strong>BACKUP FAILSAFE:</strong> ' + (health.warning || 'Backup unhealthy') + '</div>';
}

function renderDatabaseBackupArchiveTab(res) {
  const panel = document.getElementById('db-ops-panel');
  if (!panel || !res) return;

  const engOpts = (res.backups.engine || []).map(function(b) {
    return '<option value="' + b.id + '">' + b.name + ' — ' + b.modifiedLabel + '</option>';
  }).join('') || '<option value="">No engine backups</option>';

  const vaultOpts = (res.backups.vault || []).map(function(b) {
    return '<option value="' + b.id + '">' + b.name + ' — ' + b.modifiedLabel + '</option>';
  }).join('') || '<option value="">No vault backups</option>';

  const layoutOk = res.engine && res.engine.layoutOk && res.vault && res.vault.layoutOk;
  const repairBtnHtml = layoutOk
    ? '<span class="admin-status-ok">✓ In canonical folder</span>'
    : '<button class="btn-outline btn-sm" style="margin:0; width:100%; border-color:#f59e0b; color:#f59e0b; justify-content:center;" onclick="runDbRepairLayout()">REPAIR LAYOUT</button>';

  const colStyle = 'flex:1; min-width:0; display:flex; flex-direction:column; border-right:1px solid #333; min-height:0;';
  const colLast = 'flex:1; min-width:0; display:flex; flex-direction:column; min-height:0;';

  panel.innerHTML = ''
    + '<div style="display:flex; flex:1; min-height:0; width:100%;">'

    + '<div style="' + colStyle + '">'
    + '<div style="padding:12px 14px 8px; border-bottom:1px solid #333; flex-shrink:0;">'
    + '<div style="color:#f59e0b; font-weight:900; font-size:11px; letter-spacing:1px;">BACKUP COLUMN</div>'
    + '</div>'
    + '<div style="flex:1; min-height:0; display:flex; flex-direction:column; padding:10px 14px; overflow:hidden;">'
    + buildBackupHealthBannerHtml(res.health)
    + buildCanonicalFolderPill(res, repairBtnHtml)
    + '<div style="flex-shrink:0;">'
    + '<div class="info-cell-label" style="margin-bottom:6px;">LIVE FILES</div>'
    + renderLiveFileTicket('Engine', res.engine, 'info-pill--amber')
    + renderLiveFileTicket('Vault', res.vault, 'info-pill--green')
    + '</div>'
    + '<div style="flex-shrink:0; margin-top:4px;">'
    + '<div class="info-cell-label" style="margin-bottom:6px; color:#ef4444;">RESTORE FROM BACKUP</div>'
    + buildRestorePill('Engine', 'db-restore-engine-select', 'ENGINE', engOpts)
    + buildRestorePill('Vault', 'db-restore-vault-select', 'VAULT', vaultOpts)
    + '</div>'
    + '<div style="flex:1; min-height:0; display:flex; flex-direction:column; margin-top:10px; overflow:hidden;">'
    + '<div class="info-cell-label" style="margin-bottom:6px; color:#3b82f6;">OPERATIONS LOG</div>'
    + '<div style="flex:1; min-height:0; overflow-y:auto; padding-right:4px;">'
    + buildOpsLogListHtml(_dbOpsCache)
    + '</div>'
    + '</div>'
    + '<div style="flex-shrink:0; margin-top:10px; padding-top:10px; border-top:1px solid #333;">'
    + '<div class="info-cell-label" style="margin-bottom:6px; color:#10b981;">CREATE BACKUP</div>'
    + '<div class="admin-backup-actions">'
    + '<button id="db-backup-btn-engine" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="runDbBackupQuick(\'ENGINE\')">ENGINE</button>'
    + '<button id="db-backup-btn-vault" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="runDbBackupQuick(\'VAULT\')">VAULT</button>'
    + '<button id="db-backup-btn-both" class="btn-outline btn-sm" style="margin:0; border:2px solid #f59e0b; color:#f59e0b;" title="Countdown + UI lock" onclick="runDbBackupBoth()">BOTH</button>'
    + '</div>'
    + '<div class="admin-panel-muted" style="margin-top:6px; text-align:center;">05_DATABASE/BACKUPS · BOTH = countdown + lock</div>'
    + '</div>'
    + '</div></div>'

    + '<div style="' + colLast + '">'
    + '<div style="padding:12px 14px 8px; border-bottom:1px solid #333; flex-shrink:0;">'
    + '<div style="color:#a855f7; font-weight:900; font-size:11px; letter-spacing:1px;">ARCHIVE COLUMN</div>'
    + '</div>'
    + '<div style="flex:1; display:flex; flex-direction:column; padding:14px; min-height:0; overflow:auto;">'
    + '<div class="info-pill" style="border-left:3px solid #a855f7;">'
    + buildInfoGridRow(
      buildInfoCell('Archives', 'Engine cold-archive and audit log archives.')
      + (res.driveFolders && res.driveFolders.archives && res.driveFolders.archives.url
        ? buildInfoCell('Drive', '<a class="admin-panel-link" href="' + res.driveFolders.archives.url + '" target="_blank" style="margin-top:0;">Open ARCHIVES ↗</a>')
        : '')
      + buildInfoCell('Status', 'Maintenance tools coming soon.')
    )
    + '</div>'
    + '</div></div>'

    + '</div>';
}

function escapePushHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
}

function renderDatabaseOpsTab(res) {
  const panel = document.getElementById('db-ops-notifications-panel');
  if (!panel) return;

  const colStyle = 'flex:1; min-width:0; display:flex; flex-direction:column; border-right:1px solid #333; min-height:0;';
  const colLast = 'flex:1; min-width:0; display:flex; flex-direction:column; min-height:0; overflow:auto;';

  panel.innerHTML = ''
    + '<div style="display:flex; flex:1; min-height:0; width:100%;">'
    + '<div style="' + colStyle + '">'
    + '<div style="padding:12px 14px 8px; border-bottom:1px solid #333; flex-shrink:0;">'
    + '<div style="color:#3b82f6; font-weight:900; font-size:11px; letter-spacing:1px;">SOFTWARE LOG HUB</div>'
    + '</div>'
    + '<div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center;">'
    + '<div style="font-size:28px; margin-bottom:12px; opacity:0.4;">🔍</div>'
    + '<div style="color:#3b82f6; font-weight:800; font-size:12px; margin-bottom:8px;">Query &amp; Diagnostics</div>'
    + '<p style="color:#52525b; font-size:11px; line-height:1.5; max-width:260px; margin:0;">What broke, who broke it, and how to get back to a stable state — searchable audit queries and device registry coming here.</p>'
    + '</div></div>'
    + '<div style="' + colLast + '">'
    + '<div style="padding:12px 14px 8px; border-bottom:1px solid #333; flex-shrink:0;">'
    + '<div style="color:#10b981; font-weight:900; font-size:11px; letter-spacing:1px;">PUSH NOTIFICATIONS</div>'
    + '</div>'
    + '<div style="flex:1; min-height:0; overflow:hidden; padding:10px 14px; display:flex; flex-direction:column;">'
    + '<div id="push-admin-panel" style="flex:1; min-height:0; display:flex; flex-direction:column;"></div>'
    + '</div></div>'
    + '</div>';

  if (typeof renderPushAdminPanel === 'function') {
    try {
      renderPushAdminPanel('push-admin-panel');
    } catch (err) {
      panel.innerHTML = '<div style="color:#ef4444; padding:20px; font-size:12px;">Push panel failed: '
        + escapePushHtml((err && err.message) ? err.message : String(err)) + '</div>';
    }
  }
}

/** @deprecated use renderDatabaseBackupArchiveTab */
function renderDatabaseOpsPanel(res) {
  _dbLiveStatus = res;
  _dbOpsCache = (res && res.operations) ? res.operations : [];
  if (_dbActiveSubTab === 'ops') {
    renderDatabaseOpsTab(res);
  } else {
    renderDatabaseBackupArchiveTab(res);
  }
}

function runDbBackupQuick(type) {
  if (window.isDatabaseBackupLocked && window.isDatabaseBackupLocked()) {
    alert('Full BOTH backup in progress — wait for countdown to finish.');
    return;
  }
  const btn = document.getElementById('db-backup-btn-' + type.toLowerCase());
  const orig = btn ? btn.innerText : type;
  if (btn) { btn.disabled = true; btn.innerText = '...'; }

  google.script.run
    .withFailureHandler(function(err) {
      if (btn) { btn.disabled = false; btn.innerText = orig; }
      alert('Backup failed: ' + err.message);
    })
    .withSuccessHandler(function(msg) {
      if (btn) {
        btn.innerText = 'OK';
        setTimeout(function() { btn.disabled = false; btn.innerText = orig; }, 2000);
      }
      loadDatabaseOpsPanel();
    })
    .backupDatabaseFile(ACTIVE_USER_NAME, type);
}

function runDbBackupBoth() {
  if (typeof triggerDatabaseBackup === 'function') {
    triggerDatabaseBackup(loadDatabaseOpsPanel);
    return;
  }
  alert('Backup engine not loaded. Refresh the app.');
}

function runDbRestore(fileType) {
  const sel = document.getElementById('db-restore-' + fileType.toLowerCase() + '-select');
  const backupId = sel ? sel.value : '';
  if (!backupId) return alert('Select a ' + fileType + ' backup first.');

  if (!confirm('RESTORE ' + fileType + '?\n\nCurrent live file will be renamed and moved to the Replaced folder. The selected backup becomes the new live database.\n\nProceed?')) return;
  if (!confirm('Final confirmation: type-level restore for ' + fileType + '. Continue?')) return;

  google.script.run
    .withFailureHandler(function(err) { alert('Restore failed: ' + err.message); })
    .withSuccessHandler(function(msg) {
      alert(msg);
      loadDatabaseOpsPanel();
    })
    .restoreDatabaseFromBackup(ACTIVE_USER_NAME, fileType, backupId);
}

function revertDatabaseStep(stepId) {
  if (!confirm('Revert restore step #' + stepId + '?\n\nThis promotes the Replaced live file back and moves the mistaken live file aside.')) return;

  google.script.run
    .withFailureHandler(function(err) { alert('Revert failed: ' + err.message); })
    .withSuccessHandler(function(msg) {
      alert(msg);
      loadDatabaseOpsPanel();
    })
    .revertDatabaseOperation(ACTIVE_USER_NAME, stepId);
}

function runDbRepairLayout() {
  const folderLabel = (_dbLiveStatus && _dbLiveStatus.canonicalFolder && _dbLiveStatus.canonicalFolder.name)
    ? _dbLiveStatus.canonicalFolder.name : '05_DATABASE';
  if (!confirm('Move live Engine and Vault into ' + folderLabel + ' and rename to SM_Showrunner_ENGINE / SM_Showrunner_VAULT?\n\nOnly folder location and file names change — no spreadsheet data is copied.')) return;

  google.script.run
    .withFailureHandler(function(err) { alert('Repair failed: ' + err.message); })
    .withSuccessHandler(function(res) {
      alert(res.message || res);
      loadDatabaseOpsPanel();
    })
    .repairLiveDatabaseLayout(ACTIVE_USER_NAME);
}
</script>
