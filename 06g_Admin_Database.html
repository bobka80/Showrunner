<script>
/**
 * 06g_Admin_Database.html
 * Root-only Database Operations — sub-tabs:
 *   BACKUP & ARCHIVE | OPS & NOTIFICATIONS | ERROR LOGS
 */

let _dbOpsCache = [];
let _dbLiveStatus = null;
let _dbActiveSubTab = 'backup';
let _dbErrorReportsCache = [];
let _dbErrorSelectedId = null; // detail focus (last clicked)
let _dbErrorCheckedIds = {}; // handover selection map
let _dbErrorAnchorId = null; // shift-range anchor

function switchDatabaseSubTab(tabId) {
  if (tabId === 'ops') _dbActiveSubTab = 'ops';
  else if (tabId === 'errors') _dbActiveSubTab = 'errors';
  else _dbActiveSubTab = 'backup';

  const backupBtn = document.getElementById('db-subtab-btn-backup');
  const opsBtn = document.getElementById('db-subtab-btn-ops');
  const errorsBtn = document.getElementById('db-subtab-btn-errors');
  const backupPane = document.getElementById('db-subtab-backup');
  const opsPane = document.getElementById('db-subtab-ops');
  const errorsPane = document.getElementById('db-subtab-errors');

  if (backupBtn) backupBtn.classList.toggle('active', _dbActiveSubTab === 'backup');
  if (opsBtn) opsBtn.classList.toggle('active', _dbActiveSubTab === 'ops');
  if (errorsBtn) errorsBtn.classList.toggle('active', _dbActiveSubTab === 'errors');
  if (backupPane) backupPane.style.display = _dbActiveSubTab === 'backup' ? 'flex' : 'none';
  if (opsPane) opsPane.style.display = _dbActiveSubTab === 'ops' ? 'flex' : 'none';
  if (errorsPane) errorsPane.style.display = _dbActiveSubTab === 'errors' ? 'flex' : 'none';

  if (_dbActiveSubTab === 'errors') {
    loadErrorLogsPanel();
    return;
  }
  if (_dbLiveStatus) {
    if (_dbActiveSubTab === 'ops') renderDatabaseOpsTab(_dbLiveStatus);
    else renderDatabaseBackupArchiveTab(_dbLiveStatus);
  } else if (_dbActiveSubTab === 'ops') {
    loadDatabaseOpsPanel();
  }
}

function refreshDatabasePanel() {
  if (_dbActiveSubTab === 'errors') {
    loadErrorLogsPanel();
    return;
  }
  loadDatabaseOpsPanel();
}

function loadDatabaseOpsPanel() {
  const backupPanel = document.getElementById('db-ops-panel');
  const opsPanel = document.getElementById('db-ops-notifications-panel');
  const loadingHtml = '<div style="color:#f59e0b; padding:40px; text-align:center; font-weight:bold;">Loading database status...</div>';
  if (_dbActiveSubTab === 'backup' && backupPanel) {
    backupPanel.innerHTML = loadingHtml;
  } else if (opsPanel) {
    opsPanel.innerHTML = loadingHtml;
  }

  google.script.run
    .withFailureHandler(function(err) {
      const errHtml = '<div style="color:#ef4444; padding:40px; text-align:center;">' + err.message + '</div>';
      if (backupPanel) backupPanel.innerHTML = errHtml;
      if (opsPanel) opsPanel.innerHTML = errHtml;
    })
    .withSuccessHandler(function(res) {
      try {
        _dbLiveStatus = res;
        _dbOpsCache = (res && res.operations) ? res.operations : [];
        if (_dbActiveSubTab === 'backup') {
          renderDatabaseBackupArchiveTab(res);
        } else if (_dbActiveSubTab === 'ops') {
          renderDatabaseOpsTab(res);
        }
      } catch (err) {
        const errHtml = '<div style="color:#ef4444; padding:40px; text-align:center;">'
          + escapePushHtml((err && err.message) ? err.message : String(err)) + '</div>';
        if (backupPanel) backupPanel.innerHTML = errHtml;
        if (opsPanel) opsPanel.innerHTML = errHtml;
      }
    })
    .getLiveDatabaseStatus(ACTIVE_USER_NAME);
}

function toggleDbOpsLogRow(stepId) {
  const body = document.getElementById('db-ops-body-' + stepId);
  const chev = document.getElementById('db-ops-chev-' + stepId);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (chev) chev.textContent = open ? '▸' : '▾';
}

function buildInfoCell(label, valueHtml, valueClass) {
  const cls = 'info-cell-value' + (valueClass ? ' ' + valueClass : '');
  return '<div class="info-cell">'
    + '<div class="info-cell-label">' + label + '</div>'
    + '<div class="' + cls + '">' + valueHtml + '</div>'
    + '</div>';
}

function buildInfoGridRow(cellsHtml) {
  return '<div class="pill-info-grid">' + cellsHtml + '</div>';
}

function buildOpsLogListHtml(ops) {
  if (!ops || !ops.length) {
    return '<div class="admin-panel-muted" style="padding:8px 4px;">No operations logged yet.</div>';
  }
  let html = '';
  ops.forEach(function(op) {
    const canRevert = op.operation === 'RESTORE' && op.status === 'ACTIVE';
    const badge = op.status === 'ACTIVE' ? '#10b981' : (op.status === 'REVERTED' ? '#6b7280' : '#a855f7');
    html += '<div class="admin-card" style="margin-bottom:8px; padding:10px 12px;">'
      + '<div onclick="toggleDbOpsLogRow(\'' + op.step_id + '\')" style="display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none;">'
      + '<span id="db-ops-chev-' + op.step_id + '" class="admin-panel-muted" style="width:14px;">▸</span>'
      + '<span class="admin-card-title" style="flex:1; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">'
      + '#' + op.step_id + ' ' + op.file_type + ' ' + op.operation
      + '</span>'
      + '<span style="color:' + badge + '; font-size:11px; font-weight:800;">' + op.status + '</span>'
      + '</div>'
      + '<div id="db-ops-body-' + op.step_id + '" style="display:none; padding:8px 0 0 22px; border-top:1px solid #333; margin-top:8px;">'
      + '<div class="admin-panel-muted">' + op.timestamp + '</div>'
      + '<div class="admin-panel-body" style="margin-top:6px;">' + (op.notes || '—') + '</div>';
    if (canRevert) {
      html += '<button class="btn-outline btn-sm" style="margin-top:10px; border-color:#3b82f6; color:#3b82f6;" onclick="event.stopPropagation(); revertDatabaseStep(\'' + op.step_id + '\')">REVERT</button>';
    }
    html += '</div></div>';
  });
  return html;
}

function renderFolderLinksCells(driveFolders) {
  if (!driveFolders) return '';
  const keys = ['database', 'replaced', 'archives'];
  let html = '';
  keys.forEach(function(k) {
    const f = driveFolders[k];
    if (!f || !f.url) return;
    html += buildInfoCell(f.label, '<a class="admin-panel-link" href="' + f.url + '" target="_blank" style="margin-top:0;">Open ↗</a>');
  });
  return html;
}

function renderLiveFileTicket(label, file, accentClass) {
  if (!file) return '';
  const layoutHtml = file.layoutOk
    ? '<span class="admin-status-ok">✓ ' + escapePushHtml(file.expectedPath) + '</span>'
    : '<span class="admin-status-warn">⚠ ' + escapePushHtml(file.expectedPath) + '</span>';
  const locationHtml = file.parentFolderName
    ? '<strong style="color:#e4e4e7;">' + escapePushHtml(file.parentFolderName + '/' + file.name) + '</strong>'
    : '—';
  const factoryHtml = file.isOriginalFactoryFile
    ? 'Factory original — never restored'
    : 'Active file differs from factory original';
  const linkHtml = file.url
    ? '<a class="admin-panel-link" href="' + file.url + '" target="_blank" style="margin-top:0;">Open live file ↗</a>'
    : '—';

  return '<div class="info-pill ' + accentClass + '">'
    + buildInfoGridRow(
      buildInfoCell(label, escapePushHtml(file.name), 'info-cell-value--title')
      + buildInfoCell('Expected', layoutHtml)
      + buildInfoCell('Now', locationHtml)
      + buildInfoCell('Modified', escapePushHtml(file.modifiedLabel || '—'))
    )
    + buildInfoGridRow(
      buildInfoCell('Factory', factoryHtml)
      + buildInfoCell('Drive', linkHtml)
    )
    + '</div>';
}

function buildCanonicalFolderPill(res, repairBtnHtml) {
  const dbName = res.canonicalFolder ? res.canonicalFolder.name : '05_DATABASE';
  const folderLink = (res.canonicalFolder && res.canonicalFolder.url)
    ? '<a class="admin-panel-link" href="' + res.canonicalFolder.url + '" target="_blank" style="margin-top:0;">Open folder ↗</a>'
    : '—';
  const backups = res.driveFolders && res.driveFolders.backups;
  const backupPath = backups && backups.path ? backups.path : '05_DATABASE/BACKUPS';
  const backupLink = backups && backups.url
    ? '<a class="admin-panel-link" href="' + backups.url + '" target="_blank" style="margin-top:0;">Open BACKUPS ↗</a>'
    : (backups && backups.error ? escapePushHtml(backups.error) : '—');
  const folderLinks = renderFolderLinksCells(res.driveFolders);
  let html = '<div class="info-pill info-pill--slate">'
    + buildInfoGridRow(
      buildInfoCell('Live folder', escapePushHtml(dbName), 'info-cell-value--title')
      + buildInfoCell('Live files', 'SM_Showrunner_ENGINE + SM_Showrunner_VAULT')
      + buildInfoCell('Backups', escapePushHtml(backupPath))
      + buildInfoCell('Backup drive', backupLink)
    );
  if (repairBtnHtml) {
    html += buildInfoGridRow(buildInfoCell('Layout', repairBtnHtml));
  }
  if (folderLinks) {
    html += buildInfoGridRow(folderLinks);
  }
  html += '</div>';
  return html;
}

function buildRestorePill(label, selectId, fileType, optionsHtml) {
  return '<div class="info-pill" style="border-left:3px solid #ef4444;">'
    + buildInfoGridRow(
      buildInfoCell('Restore', label, 'info-cell-value--title')
      + '<div class="info-cell" style="grid-column: span 2;">'
      + '<div class="info-cell-label">Backup</div>'
      + '<select id="' + selectId + '" style="width:100%; padding:8px 10px; font-size:12px; background:#1a1a1e; color:#fff; border:1px solid #444; border-radius:4px; box-sizing:border-box;">' + optionsHtml + '</select>'
      + '</div>'
      + '<div class="info-cell">'
      + '<div class="info-cell-label">&nbsp;</div>'
      + '<button class="btn-outline btn-sm" style="margin:0; width:100%; border-color:#ef4444; color:#ef4444; justify-content:center;" onclick="runDbRestore(\'' + fileType + '\')">RESTORE</button>'
      + '</div>'
    )
    + '</div>';
}

function buildBackupHealthBannerHtml(health, backupFolders) {
  if (!health) return '';
  const writePath = (backupFolders && backupFolders.writeFolder && backupFolders.writeFolder.path)
    ? backupFolders.writeFolder.path
    : (health.backupFolderPath || '05_DATABASE/BACKUPS');
  if (health.healthy) {
    return '<div class="admin-banner-ok" style="margin-bottom:10px;">'
      + '✓ Backup OK — last Engine+Vault pair: <strong>' + (health.lastPairedDate || '—') + '</strong>'
      + ' · ' + health.fileCount + ' backup files · write folder: <strong>' + escapePushHtml(writePath) + '</strong></div>';
  }
  let extra = '';
  if (backupFolders && backupFolders.writeError) {
    extra = ' Write folder error: ' + escapePushHtml(backupFolders.writeError);
  } else if (backupFolders && backupFolders.scannedFolders && backupFolders.scannedFolders.length) {
    extra = ' Scanned: ' + backupFolders.scannedFolders.map(function(f) { return f.path; }).join(', ') + '.';
  }
  return '<div class="admin-banner-warn" style="margin-bottom:10px;">'
    + '⚠️ <strong>BACKUP FAILSAFE:</strong> ' + (health.warning || 'Backup unhealthy') + extra + '</div>';
}

function renderDatabaseBackupArchiveTab(res) {
  const panel = document.getElementById('db-ops-panel');
  if (!panel || !res) return;

  const engOpts = (res.backups.engine || []).map(function(b) {
    return '<option value="' + b.id + '">' + b.name + ' — ' + b.modifiedLabel + '</option>';
  }).join('') || '<option value="">No engine backups</option>';

  const vaultOpts = (res.backups.vault || []).map(function(b) {
    return '<option value="' + b.id + '">' + b.name + ' — ' + b.modifiedLabel + '</option>';
  }).join('') || '<option value="">No vault backups</option>';

  const layoutOk = res.engine && res.engine.layoutOk && res.vault && res.vault.layoutOk;
  const repairBtnHtml = layoutOk
    ? '<span class="admin-status-ok">✓ In canonical folder</span>'
    : '<button class="btn-outline btn-sm" style="margin:0; width:100%; border-color:#f59e0b; color:#f59e0b; justify-content:center;" onclick="runDbRepairLayout()">REPAIR LAYOUT</button>';

  const colStyle = 'flex:1; min-width:0; display:flex; flex-direction:column; border-right:1px solid #333; min-height:0;';
  const colLast = 'flex:1; min-width:0; display:flex; flex-direction:column; min-height:0;';

  panel.innerHTML = ''
    + '<div style="display:flex; flex:1; min-height:0; width:100%;">'

    + '<div style="' + colStyle + '">'
    + '<div style="padding:12px 14px 8px; border-bottom:1px solid #333; flex-shrink:0;">'
    + '<div style="color:#f59e0b; font-weight:900; font-size:11px; letter-spacing:1px;">BACKUP COLUMN</div>'
    + '</div>'
    + '<div style="flex:1; min-height:0; display:flex; flex-direction:column; padding:10px 14px; overflow:hidden;">'
    + buildBackupHealthBannerHtml(res.health, res.backupFolders)
    + buildCanonicalFolderPill(res, repairBtnHtml)
    + '<div style="flex-shrink:0;">'
    + '<div class="info-cell-label" style="margin-bottom:6px;">LIVE FILES</div>'
    + renderLiveFileTicket('Engine', res.engine, 'info-pill--amber')
    + renderLiveFileTicket('Vault', res.vault, 'info-pill--green')
    + '</div>'
    + '<div style="flex-shrink:0; margin-top:4px;">'
    + '<div class="info-cell-label" style="margin-bottom:6px; color:#ef4444;">RESTORE FROM BACKUP</div>'
    + buildRestorePill('Engine', 'db-restore-engine-select', 'ENGINE', engOpts)
    + buildRestorePill('Vault', 'db-restore-vault-select', 'VAULT', vaultOpts)
    + '</div>'
    + '<div style="flex:1; min-height:0; display:flex; flex-direction:column; margin-top:10px; overflow:hidden;">'
    + '<div class="info-cell-label" style="margin-bottom:6px; color:#3b82f6;">OPERATIONS LOG</div>'
    + '<div style="flex:1; min-height:0; overflow-y:auto; padding-right:4px;">'
    + buildOpsLogListHtml(_dbOpsCache)
    + '</div>'
    + '</div>'
    + '<div style="flex-shrink:0; margin-top:10px; padding-top:10px; border-top:1px solid #333;">'
    + '<div class="info-cell-label" style="margin-bottom:6px; color:#10b981;">CREATE BACKUP</div>'
    + '<div class="admin-backup-actions">'
    + '<button id="db-backup-btn-engine" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="runDbBackupQuick(\'ENGINE\')">ENGINE</button>'
    + '<button id="db-backup-btn-vault" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="runDbBackupQuick(\'VAULT\')">VAULT</button>'
    + '<button id="db-backup-btn-both" class="btn-outline btn-sm" style="margin:0; border:2px solid #f59e0b; color:#f59e0b;" title="Countdown + UI lock" onclick="runDbBackupBoth()">BOTH</button>'
    + '</div>'
    + '<div class="admin-panel-muted" style="margin-top:6px; text-align:center;">05_DATABASE/BACKUPS · BOTH = countdown + lock</div>'
    + '</div>'
    + '</div></div>'

    + '<div style="' + colLast + '">'
    + '<div style="padding:12px 14px 8px; border-bottom:1px solid #333; flex-shrink:0;">'
    + '<div style="color:#a855f7; font-weight:900; font-size:11px; letter-spacing:1px;">ARCHIVE COLUMN</div>'
    + '</div>'
    + '<div style="flex:1; display:flex; flex-direction:column; padding:14px; min-height:0; overflow:auto;">'
    + '<div class="info-pill" style="border-left:3px solid #a855f7;">'
    + buildInfoGridRow(
      buildInfoCell('Archives', 'Engine cold-archive and audit log archives.')
      + (res.driveFolders && res.driveFolders.archives && res.driveFolders.archives.url
        ? buildInfoCell('Drive', '<a class="admin-panel-link" href="' + res.driveFolders.archives.url + '" target="_blank" style="margin-top:0;">Open ARCHIVES ↗</a>')
        : '')
      + buildInfoCell('Status', 'Maintenance tools coming soon.')
    )
    + '</div>'
    + '</div></div>'

    + '</div>';
}

function escapePushHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
}

function renderDatabaseOpsTab(res) {
  const panel = document.getElementById('db-ops-notifications-panel');
  if (!panel) return;

  const colStyle = 'flex:1; min-width:0; display:flex; flex-direction:column; border-right:1px solid #333; min-height:0;';
  const colLast = 'flex:1; min-width:0; display:flex; flex-direction:column; min-height:0; overflow:auto;';

  panel.innerHTML = ''
    + '<div style="display:flex; flex:1; min-height:0; width:100%;">'
    + '<div style="' + colStyle + '">'
    + '<div style="padding:12px 14px 8px; border-bottom:1px solid #333; flex-shrink:0;">'
    + '<div style="color:#3b82f6; font-weight:900; font-size:11px; letter-spacing:1px;">SOFTWARE LOG HUB</div>'
    + '</div>'
    + '<div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center;">'
    + '<div style="font-size:28px; margin-bottom:12px; opacity:0.4;">🔍</div>'
    + '<div style="color:#3b82f6; font-weight:800; font-size:12px; margin-bottom:8px;">Query &amp; Diagnostics</div>'
    + '<p style="color:#52525b; font-size:11px; line-height:1.5; max-width:260px; margin:0;">What broke, who broke it, and how to get back to a stable state — searchable audit queries and device registry coming here.</p>'
    + '</div></div>'
    + '<div style="' + colLast + '">'
    + '<div style="padding:12px 14px 8px; border-bottom:1px solid #333; flex-shrink:0;">'
    + '<div style="color:#10b981; font-weight:900; font-size:11px; letter-spacing:1px;">PUSH NOTIFICATIONS</div>'
    + '</div>'
    + '<div style="flex:1; min-height:0; overflow:hidden; padding:10px 14px; display:flex; flex-direction:column;">'
    + '<div id="push-admin-panel" style="flex:1; min-height:0; display:flex; flex-direction:column;"></div>'
    + '</div></div>'
    + '</div>';

  if (typeof renderPushAdminPanel === 'function') {
    try {
      renderPushAdminPanel('push-admin-panel');
    } catch (err) {
      panel.innerHTML = '<div style="color:#ef4444; padding:20px; font-size:12px;">Push panel failed: '
        + escapePushHtml((err && err.message) ? err.message : String(err)) + '</div>';
    }
  }
}

// ==========================================
// --- ERROR LOGS (Sheet inbox → Cursor pack) ---
// ==========================================

function escErrHtml_(s) {
  if (typeof escapePushHtml === 'function') return escapePushHtml(s);
  if (typeof escapeHTML === 'function') return escapeHTML(s);
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function loadErrorLogsPanel() {
  const panel = document.getElementById('db-error-logs-panel');
  if (!panel) return;
  panel.innerHTML = '<div style="color:#f43f5e; padding:40px; text-align:center; font-weight:bold;">Loading error logs inbox...</div>';

  google.script.run
    .withFailureHandler(function (err) {
      panel.innerHTML = '<div style="color:#ef4444; padding:40px; text-align:center;">'
        + escErrHtml_((err && err.message) ? err.message : String(err)) + '</div>';
    })
    .withSuccessHandler(function (res) {
      _dbErrorReportsCache = (res && res.reports) ? res.reports : [];
      _dbErrorCheckedIds = {};
      _dbErrorAnchorId = null;
      if (!_dbErrorSelectedId && _dbErrorReportsCache.length) {
        _dbErrorSelectedId = _dbErrorReportsCache[0].reportId;
      } else if (_dbErrorSelectedId) {
        var still = _dbErrorReportsCache.some(function (r) { return r.reportId === _dbErrorSelectedId; });
        if (!still) _dbErrorSelectedId = _dbErrorReportsCache.length ? _dbErrorReportsCache[0].reportId : null;
      }
      renderErrorLogsPanel();
    })
    .listErrorReports(ACTIVE_USER_NAME);
}

function getErrorLogFilterValues_() {
  const viewEl = document.getElementById('db-err-filter-view');
  const surfaceEl = document.getElementById('db-err-filter-surface');
  const qEl = document.getElementById('db-err-filter-q');
  return {
    view: viewEl ? String(viewEl.value || '').trim().toLowerCase() : '',
    surface: surfaceEl ? String(surfaceEl.value || '').trim().toLowerCase() : '',
    q: qEl ? String(qEl.value || '').trim().toLowerCase() : ''
  };
}

function filteredErrorReports_() {
  const f = getErrorLogFilterValues_();
  return (_dbErrorReportsCache || []).filter(function (r) {
    if (f.view && String(r.view || '').toLowerCase().indexOf(f.view) === -1) return false;
    if (f.surface && String(r.surface || '').toLowerCase() !== f.surface) return false;
    if (f.q) {
      const blob = [
        r.description, r.userName, r.view, r.projectId, r.forkId, r.reportId, r.appVersion, r.surface
      ].join(' ').toLowerCase();
      if (blob.indexOf(f.q) === -1) return false;
    }
    return true;
  });
}

function isErrorChecked_(reportId) {
  return !!(_dbErrorCheckedIds && _dbErrorCheckedIds[reportId]);
}

function selectedErrorReportIds_() {
  const ids = [];
  (_dbErrorReportsCache || []).forEach(function (r) {
    if (_dbErrorCheckedIds && _dbErrorCheckedIds[r.reportId]) ids.push(r.reportId);
  });
  return ids;
}

function applyErrorRangeSelect_(toId) {
  const rows = filteredErrorReports_();
  const ids = rows.map(function (r) { return r.reportId; });
  const anchor = _dbErrorAnchorId && ids.indexOf(_dbErrorAnchorId) >= 0 ? _dbErrorAnchorId : toId;
  const a = ids.indexOf(anchor);
  const b = ids.indexOf(toId);
  if (a < 0 || b < 0) {
    _dbErrorCheckedIds[toId] = true;
    return;
  }
  const lo = Math.min(a, b);
  const hi = Math.max(a, b);
  for (var i = lo; i <= hi; i++) _dbErrorCheckedIds[ids[i]] = true;
}

/** Explorer-style: click / Ctrl+click / Shift+click */
function handleErrorLogRowClick_(reportId, ev) {
  if (!_dbErrorCheckedIds) _dbErrorCheckedIds = {};
  const ctrl = !!(ev && (ev.ctrlKey || ev.metaKey));
  const shift = !!(ev && ev.shiftKey);

  if (shift) {
    applyErrorRangeSelect_(reportId);
  } else if (ctrl) {
    if (_dbErrorCheckedIds[reportId]) delete _dbErrorCheckedIds[reportId];
    else _dbErrorCheckedIds[reportId] = true;
    _dbErrorAnchorId = reportId;
  } else {
    _dbErrorCheckedIds = {};
    _dbErrorCheckedIds[reportId] = true;
    _dbErrorAnchorId = reportId;
  }

  _dbErrorSelectedId = reportId;
  renderErrorLogsPanel();
}

function renderErrorLogsPanel() {
  const panel = document.getElementById('db-error-logs-panel');
  if (!panel) return;

  const fBefore = getErrorLogFilterValues_();
  const rows = filteredErrorReports_();
  const surfaces = {};
  (_dbErrorReportsCache || []).forEach(function (r) {
    const s = String(r.surface || '').trim();
    if (s) surfaces[s] = true;
  });

  let surfaceOpts = '<option value="">All surfaces</option>';
  Object.keys(surfaces).sort().forEach(function (s) {
    const sel = (fBefore.surface === s.toLowerCase()) ? ' selected' : '';
    surfaceOpts += '<option value="' + escErrHtml_(s) + '"' + sel + '>' + escErrHtml_(s) + '</option>';
  });

  let listHtml = '';
  if (!rows.length) {
    listHtml = '<div class="admin-panel-muted" style="padding:12px 8px; font-size:12px;">No error reports in the Sheet inbox'
      + ((_dbErrorReportsCache && _dbErrorReportsCache.length) ? ' (filters hid all rows).' : '.')
      + '</div>';
  } else {
    rows.forEach(function (r) {
      const focused = r.reportId === _dbErrorSelectedId;
      const checked = isErrorChecked_(r.reportId);
      const person = r.userName || r.userId || '—';
      const view = r.view || '—';
      const platform = r.surface || '—';
      listHtml += '<div class="db-err-row" data-id="' + escErrHtml_(r.reportId) + '" tabindex="0" '
        + 'style="display:flex; align-items:center; gap:8px; height:28px; padding:0 8px; margin:0; cursor:pointer; '
        + 'border-bottom:1px solid #222; user-select:none; font-size:12px; line-height:28px; '
        + (checked ? 'background:rgba(244,63,94,0.18);' : 'background:transparent;')
        + (focused ? ' outline:1px solid #f43f5e; outline-offset:-1px;' : '') + '">'
        + '<span style="flex:1.1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#fafafa; font-weight:600;">'
        + escErrHtml_(person) + '</span>'
        + '<span style="flex:1.4; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#a1a1aa;" title="'
        + escErrHtml_(view) + '">' + escErrHtml_(view) + '</span>'
        + '<span style="flex:0.7; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#e4e4e7; text-align:right;">'
        + escErrHtml_(platform) + '</span>'
        + '</div>';
    });
  }

  const selected = (_dbErrorReportsCache || []).find(function (r) { return r.reportId === _dbErrorSelectedId; }) || null;
  let detailHtml = '<div class="admin-panel-muted" style="padding:16px;">Select a report to inspect.</div>';
  if (selected) {
    detailHtml = ''
      + '<div style="padding:12px 14px; border-bottom:1px solid #333; flex-shrink:0;">'
      + '<div style="color:#f43f5e; font-weight:900; font-size:11px; letter-spacing:1px;">REPORT DETAIL</div>'
      + '<div class="admin-panel-muted" style="margin-top:4px; font-size:11px;">' + escErrHtml_(selected.reportId) + '</div>'
      + '</div>'
      + '<div style="flex:1; overflow:auto; padding:12px 14px; font-size:12px; line-height:1.45; color:#e4e4e7;">'
      + '<div><b>When</b> ' + escErrHtml_(selected.timestamp) + '</div>'
      + '<div style="margin-top:6px;"><b>Who</b> ' + escErrHtml_(selected.userName) + ' (' + escErrHtml_(selected.userId) + ') · ' + escErrHtml_(selected.roleDept) + '</div>'
      + '<div style="margin-top:6px;"><b>View</b> ' + escErrHtml_(selected.view) + '</div>'
      + '<div style="margin-top:6px;"><b>Platform</b> ' + escErrHtml_(selected.surface || '—') + '</div>'
      + '<div style="margin-top:6px;"><b>Project / Fork</b> ' + escErrHtml_(selected.projectId || '—') + ' / ' + escErrHtml_(selected.forkId || '—') + '</div>'
      + '<div style="margin-top:6px;"><b>Sync</b> ' + escErrHtml_(selected.syncMode || '—') + '</div>'
      + '<div style="margin-top:6px;"><b>App</b> ' + escErrHtml_(selected.appVersion || '—') + '</div>'
      + '<div style="margin-top:10px;"><b>Description</b><div style="margin-top:4px; white-space:pre-wrap;">' + escErrHtml_(selected.description || '') + '</div></div>'
      + (selected.diagRef ? '<div style="margin-top:10px;"><b>Diag_Ref</b> <a href="' + escErrHtml_(selected.diagRef) + '" target="_blank" rel="noopener" style="color:#60a5fa;">Open Drive</a></div>' : '')
      + '<div style="margin-top:10px;"><b>Diag_JSON</b><pre style="margin:6px 0 0; padding:10px; background:#09090b; border:1px solid #3f3f46; border-radius:8px; white-space:pre-wrap; word-break:break-word; max-height:220px; overflow:auto; color:#a1a1aa;">'
      + escErrHtml_(selected.diagJson || '') + '</pre></div>'
      + '</div>';
  }

  panel.innerHTML = ''
    + '<div style="display:flex; flex-direction:column; flex:1; min-height:0; width:100%;">'
    + '<div style="padding:10px 14px; border-bottom:1px solid #333; flex-shrink:0; display:flex; flex-wrap:wrap; gap:8px; align-items:center;">'
    + '<div style="color:#f43f5e; font-weight:900; font-size:11px; letter-spacing:1px; margin-right:4px;">ERROR LOGS INBOX</div>'
    + '<input id="db-err-filter-q" type="text" placeholder="Search…" value="' + escErrHtml_(fBefore.q) + '" '
    + 'style="width:140px; margin:0; padding:6px 8px; background:#09090b; border:1px solid #3f3f46; color:#fff; border-radius:6px; font-size:12px;" '
    + 'oninput="renderErrorLogsPanel()">'
    + '<input id="db-err-filter-view" type="text" placeholder="View…" value="' + escErrHtml_(fBefore.view) + '" '
    + 'style="width:110px; margin:0; padding:6px 8px; background:#09090b; border:1px solid #3f3f46; color:#fff; border-radius:6px; font-size:12px;" '
    + 'oninput="renderErrorLogsPanel()">'
    + '<select id="db-err-filter-surface" style="margin:0; padding:6px 8px; background:#09090b; border:1px solid #3f3f46; color:#fff; border-radius:6px; font-size:12px;" '
    + 'onchange="renderErrorLogsPanel()">' + surfaceOpts + '</select>'
    + '<button type="button" class="btn-outline btn-sm" style="margin:0;" onclick="selectAllErrorLogs_(true)" title="Select every ticket in the inbox">SELECT ALL</button>'
    + '<button type="button" class="btn-outline btn-sm" style="margin:0;" onclick="selectAllErrorLogs_(false)">CLEAR</button>'
    + '<div style="flex:1;"></div>'
    + '<button type="button" id="db-err-handover-btn" class="btn-main btn-sm" style="margin:0; background:#f43f5e !important; border-color:#f43f5e;" '
    + 'onclick="handoverSelectedErrorLogs_()">HAND OVER TO CURSOR (<span id="db-err-handover-count">0</span>)</button>'
    + '</div>'
    + '<div class="admin-panel-muted" style="padding:6px 14px; border-bottom:1px solid #222; font-size:11px; flex-shrink:0;">'
    + 'Tickets: person · view · platform. Click / Ctrl+click / Shift+click like Explorer. Hand over copies pack then deletes inbox rows.'
    + '</div>'
    + '<div style="display:flex; flex:1; min-height:0;">'
    + '<div style="flex:1.05; min-width:220px; max-width:420px; border-right:1px solid #333; display:flex; flex-direction:column; min-height:0;">'
    + '<div style="display:flex; gap:8px; padding:4px 8px; border-bottom:1px solid #222; flex-shrink:0; font-size:10px; color:#71717a; letter-spacing:0.04em; text-transform:uppercase;">'
    + '<span style="flex:1.1;">Person</span><span style="flex:1.4;">View</span><span style="flex:0.7; text-align:right;">Platform</span>'
    + '</div>'
    + '<div id="db-err-list" style="flex:1; min-height:0; overflow-y:auto; overflow-x:hidden;">' + listHtml + '</div>'
    + '</div>'
    + '<div style="flex:1; min-width:0; display:flex; flex-direction:column; min-height:0;">' + detailHtml + '</div>'
    + '</div></div>';

  const list = document.getElementById('db-err-list');
  if (list) {
    list.onmousedown = function (ev) {
      if (ev.shiftKey) ev.preventDefault();
    };
    list.onclick = function (ev) {
      var row = ev.target && ev.target.closest ? ev.target.closest('.db-err-row') : null;
      if (!row) return;
      var id = row.getAttribute('data-id');
      if (id) handleErrorLogRowClick_(id, ev);
    };
  }

  updateErrorHandoverCount_();
}

function selectAllErrorLogs_(on) {
  if (!_dbErrorCheckedIds) _dbErrorCheckedIds = {};
  if (on) {
    (_dbErrorReportsCache || []).forEach(function (r) { _dbErrorCheckedIds[r.reportId] = true; });
    if (_dbErrorReportsCache.length) {
      _dbErrorAnchorId = _dbErrorReportsCache[0].reportId;
      if (!_dbErrorSelectedId) _dbErrorSelectedId = _dbErrorReportsCache[0].reportId;
    }
  } else {
    _dbErrorCheckedIds = {};
    _dbErrorAnchorId = null;
  }
  renderErrorLogsPanel();
}

function updateErrorHandoverCount_() {
  const n = selectedErrorReportIds_().length;
  const el = document.getElementById('db-err-handover-count');
  if (el) el.textContent = String(n);
  const btn = document.getElementById('db-err-handover-btn');
  if (btn) btn.disabled = n < 1;
}

function copyTextToClipboard_(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  return new Promise(function (resolve, reject) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      resolve();
    } catch (e) {
      reject(e);
    }
  });
}

function handoverSelectedErrorLogs_() {
  const ids = selectedErrorReportIds_();
  if (!ids.length) {
    alert('Select at least one error log.');
    return;
  }
  if (!confirm('Hand over ' + ids.length + ' log(s) to Cursor?\n\nThis will copy the pack, then remove those rows from the Error_Reports inbox.')) {
    return;
  }

  const btn = document.getElementById('db-err-handover-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'HANDING OVER…'; }

  google.script.run
    .withFailureHandler(function (err) {
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = 'HAND OVER TO CURSOR (<span id="db-err-handover-count">' + ids.length + '</span>)';
      }
      alert('Handover failed: ' + ((err && err.message) ? err.message : String(err)));
    })
    .withSuccessHandler(function (res) {
      if (!res || !res.ok) {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = 'HAND OVER TO CURSOR (<span id="db-err-handover-count">0</span>)';
        }
        alert((res && res.error) ? res.error : 'Handover failed.');
        return;
      }
      copyTextToClipboard_(res.packText || '')
        .then(function () {
          if (typeof showPushToast === 'function') {
            showPushToast('Error pack copied', (res.deletedCount || 0) + ' row(s) removed from inbox.');
          } else {
            alert('Pack copied to clipboard. Deleted ' + (res.deletedCount || 0) + ' row(s).');
          }
          _dbErrorSelectedId = null;
          loadErrorLogsPanel();
        })
        .catch(function () {
          // Pack was deleted server-side already — show pack for manual copy
          prompt('Clipboard blocked. Copy this pack manually (already deleted from Sheet):', res.packText || '');
          _dbErrorSelectedId = null;
          loadErrorLogsPanel();
        });
    })
    .handoverErrorReports(ACTIVE_USER_NAME, ids);
}

/** @deprecated use renderDatabaseBackupArchiveTab */
function renderDatabaseOpsPanel(res) {
  _dbLiveStatus = res;
  _dbOpsCache = (res && res.operations) ? res.operations : [];
  if (_dbActiveSubTab === 'ops') {
    renderDatabaseOpsTab(res);
  } else if (_dbActiveSubTab === 'errors') {
    loadErrorLogsPanel();
  } else {
    renderDatabaseBackupArchiveTab(res);
  }
}

function runDbBackupQuick(type) {
  if (window.isDatabaseBackupLocked && window.isDatabaseBackupLocked()) {
    alert('Full BOTH backup in progress — wait for countdown to finish.');
    return;
  }
  const btn = document.getElementById('db-backup-btn-' + type.toLowerCase());
  const orig = btn ? btn.innerText : type;
  if (btn) { btn.disabled = true; btn.innerText = '...'; }

  google.script.run
    .withFailureHandler(function(err) {
      if (btn) { btn.disabled = false; btn.innerText = orig; }
      alert('Backup failed: ' + err.message);
    })
    .withSuccessHandler(function(msg) {
      if (btn) {
        btn.innerText = 'OK';
        setTimeout(function() { btn.disabled = false; btn.innerText = orig; }, 2000);
      }
      loadDatabaseOpsPanel();
    })
    .backupDatabaseFile(ACTIVE_USER_NAME, type);
}

function runDbBackupBoth() {
  if (typeof triggerDatabaseBackup === 'function') {
    triggerDatabaseBackup(loadDatabaseOpsPanel);
    return;
  }
  alert('Backup engine not loaded. Refresh the app.');
}

function runDbRestore(fileType) {
  const sel = document.getElementById('db-restore-' + fileType.toLowerCase() + '-select');
  const backupId = sel ? sel.value : '';
  if (!backupId) return alert('Select a ' + fileType + ' backup first.');

  if (!confirm('RESTORE ' + fileType + '?\n\nCurrent live file will be renamed and moved to the Replaced folder. The selected backup becomes the new live database.\n\nProceed?')) return;
  if (!confirm('Final confirmation: type-level restore for ' + fileType + '. Continue?')) return;

  google.script.run
    .withFailureHandler(function(err) { alert('Restore failed: ' + err.message); })
    .withSuccessHandler(function(msg) {
      alert(msg);
      loadDatabaseOpsPanel();
    })
    .restoreDatabaseFromBackup(ACTIVE_USER_NAME, fileType, backupId);
}

function revertDatabaseStep(stepId) {
  if (!confirm('Revert restore step #' + stepId + '?\n\nThis promotes the Replaced live file back and moves the mistaken live file aside.')) return;

  google.script.run
    .withFailureHandler(function(err) { alert('Revert failed: ' + err.message); })
    .withSuccessHandler(function(msg) {
      alert(msg);
      loadDatabaseOpsPanel();
    })
    .revertDatabaseOperation(ACTIVE_USER_NAME, stepId);
}

function runDbRepairLayout() {
  const folderLabel = (_dbLiveStatus && _dbLiveStatus.canonicalFolder && _dbLiveStatus.canonicalFolder.name)
    ? _dbLiveStatus.canonicalFolder.name : '05_DATABASE';
  if (!confirm('Move live Engine and Vault into ' + folderLabel + ' and rename to SM_Showrunner_ENGINE / SM_Showrunner_VAULT?\n\nOnly folder location and file names change — no spreadsheet data is copied.')) return;

  google.script.run
    .withFailureHandler(function(err) { alert('Repair failed: ' + err.message); })
    .withSuccessHandler(function(res) {
      alert(res.message || res);
      loadDatabaseOpsPanel();
    })
    .repairLiveDatabaseLayout(ACTIVE_USER_NAME);
}
</script>
