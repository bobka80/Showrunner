<!-- @INDEX: MOBILE -> Crew Hub Shell -->
<div id="mobile-crew-hub-overlay">
    <div class="mch-header">
        <button type="button" class="mch-back-btn" onclick="closeMobileCrewHub()">⬅ BACK</button>
        <div class="mch-header-main">
            <div class="mch-title-row">
                <h2 class="mch-title" id="mch-title">Project</h2>
                <div id="mch-weather-widget-host" class="mch-weather-widget-host" style="display:none;"></div>
            </div>
            <div class="mch-meta-row">
                <span class="mch-badge mch-badge--type" id="mch-type-badge">EVENT</span>
                <span class="mch-badge mch-badge--status" id="mch-status-badge">DRAFT</span>
                <span class="mch-badge" id="mch-region-badge">IN SOFIA</span>
            </div>
            <div class="mch-location" id="mch-location"></div>
        </div>
    </div>
    <div class="mch-body">
        <div id="mch-subevents-host"></div>
    </div>
    <div class="mch-footer">
        <button type="button" class="btn-outline btn-outline-purple mch-footer-btn" onclick="mobileCrewOpenTimeline()">TIMELINE</button>
        <button type="button" class="btn-outline btn-outline-orange mch-footer-btn req-event_assets_window" onclick="mobileCrewOpenAssets()">ASSETS</button>
        <button type="button" class="btn-close mch-footer-btn" onclick="closeMobileCrewHub()">CANCEL</button>
    </div>
</div>

<div id="mobile-weather-popup" class="mobile-weather-popup" aria-hidden="true">
    <div class="mobile-weather-popup__backdrop" onclick="closeMobileWeatherPopup()"></div>
    <div class="mobile-weather-popup__panel">
        <div class="mobile-weather-popup__head">
            <span>WEATHER FORECAST</span>
            <button type="button" class="mobile-weather-popup__close" onclick="closeMobileWeatherPopup()">✕</button>
        </div>
        <div id="mobile-weather-popup-detail" class="mobile-weather-popup__detail"></div>
    </div>
</div>

<script>
/**
 * 01e_Mobile_Crew_Hub.html
 * Mobile crew briefing — read-only event hub (no mini calendar on phone).
 * @INDEX: MOBILE -> Crew Hub Logic
 */

window.mobileCrewHubProjectId = null;
window.mobileCrewHubProject = null;
window._mobileWeatherDetailCache = window._mobileWeatherDetailCache || {};

window.isMobileViewport = function() {
    return window.innerWidth <= 768;
};

window.resolveMobileProject = function(pId) {
    let p = null;
    try {
        const phantom = JSON.parse(localStorage.getItem('sm_phantom_payload') || '{}');
        if (phantom && phantom.projects) p = phantom.projects.find(function(x) { return x.id === pId; });
    } catch (e) { /* ignore */ }
    if (!p && typeof calendar !== 'undefined' && calendar) {
        let ev = calendar.getEventById(pId);
        if (!ev) {
            ev = calendar.getEvents().find(function(e) {
                return e.id === pId || (e.extendedProps && e.extendedProps.rawDbData && e.extendedProps.rawDbData.id === String(pId));
            });
        }
        if (ev && ev.extendedProps && ev.extendedProps.rawDbData) p = ev.extendedProps.rawDbData;
    }
    return p;
};

window.projectIsOutdoorMobile = function(p) {
    if (!p) return false;
    const rs = p.readinessState || {};
    return !!(rs.isOutdoor || rs.outdoor || p.outdoor);
};

window.mobileWeatherCondFromCode = function(code) {
    if (code == null) return 'CLR';
    if (code >= 1 && code <= 3) return 'CLOUD';
    if (code >= 45 && code <= 48) return 'FOG';
    if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return 'RAIN';
    if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86)) return 'SNOW';
    if (code >= 95) return 'STORM';
    return 'CLR';
};

window.fetchMobileWeatherDaysForProject = async function(p) {
    if (!p) return { days: [], error: 'no project' };
    const cacheKey = String(p.id || '') + '|' + (p.start || '') + '|' + (p.end || '');
    if (window._mobileWeatherDetailCache[cacheKey]) return window._mobileWeatherDetailCache[cacheKey];

    let lat = (p.readinessState && p.readinessState.coords) ? p.readinessState.coords.lat : (p.lat || '');
    let lng = (p.readinessState && p.readinessState.coords) ? p.readinessState.coords.lng : (p.lng || '');
    const locText = (p.locationUrl || '').trim();
    const sDateStr = p.start || '';
    const eDateStr = p.end || p.start || '';

    if ((!lat || !lng) && locText) {
        try {
            const res = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(locText) + '&limit=1');
            const data = await res.json();
            if (data && data.length > 0) {
                lat = parseFloat(data[0].lat);
                lng = parseFloat(data[0].lon);
            }
        } catch (e) { /* ignore */ }
    }

    if (!lat || !lng || !sDateStr) {
        return { days: [], error: 'missing loc/date' };
    }

    try {
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng +
            '&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max,precipitation_probability_max&timezone=auto&forecast_days=14';
        const res = await fetch(url);
        const data = await res.json();
        if (!data || !data.daily) throw new Error('no data');

        const daily = data.daily;
        const sDate = new Date(sDateStr + 'T00:00:00Z');
        const eDate = new Date(eDateStr + 'T23:59:59Z');
        const days = [];

        for (let i = 0; i < daily.time.length; i++) {
            const dObj = new Date(daily.time[i] + 'T12:00:00Z');
            if (dObj < sDate || dObj > eDate) continue;
            days.push({
                dObj: dObj,
                maxT: daily.temperature_2m_max[i],
                minT: daily.temperature_2m_min[i],
                wind: daily.windspeed_10m_max[i],
                rainProb: daily.precipitation_probability_max[i] || 0,
                cond: window.mobileWeatherCondFromCode(daily.weathercode[i])
            });
        }

        const out = { days: days, error: days.length ? null : 'outside' };
        window._mobileWeatherDetailCache[cacheKey] = out;
        return out;
    } catch (e) {
        return { days: [], error: 'fetch failed' };
    }
};

window.buildMobileWeatherSummaryInnerHtml = function(days) {
    if (!days || !days.length) {
        return '<div class="ww-line ww-line--muted">N/A</div>';
    }
    const worstFn = window.weatherWorstCond || function(ds) {
        return ds[0] ? ds[0].cond : 'CLR';
    };
    const labelFn = window.weatherCondLabel || function(c) { return c; };
    const eventMin = Math.min.apply(null, days.map(function(d) { return d.minT; }));
    const eventMax = Math.max.apply(null, days.map(function(d) { return d.maxT; }));
    const peakWind = Math.max.apply(null, days.map(function(d) { return d.wind; }));
    const worstCond = worstFn(days);
    const condLabel = labelFn(worstCond);
    const condAlert = worstCond === 'RAIN' || worstCond === 'SNOW' || worstCond === 'STORM' || worstCond === 'FOG';
    const tempAlert = eventMin < 5 || eventMax > 35;
    const windAlert = peakWind > 40;
    return ''
        + '<div class="ww-line ww-line--cond' + (condAlert ? ' ww-line--alert' : '') + '">' + condLabel + '</div>'
        + '<div class="ww-line' + (tempAlert ? ' ww-line--alert' : '') + '">' + Math.round(eventMin) + '° – ' + Math.round(eventMax) + '°C</div>'
        + '<div class="ww-line' + (windAlert ? ' ww-line--alert' : '') + '">' + Math.round(peakWind) + ' km/h</div>';
};

window.buildMobileWeatherDetailHtml = function(days) {
    if (!days || !days.length) return '<div class="ww-line ww-line--muted">No forecast for project dates.</div>';
    const emojiFn = window.weatherCondEmoji || function() { return '☀️'; };
    let html = '';
    days.forEach(function(d) {
        const dayAlert = d.maxT > 35 || d.minT < 5 || d.wind > 40 || d.rainProb > 50;
        const dayName = d.dObj.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', timeZone: 'UTC' });
        const emoji = emojiFn(d.cond);
        html += '<div class="weather-widget-day' + (dayAlert ? ' weather-widget-day--alert' : '') + '">'
            + '<div class="weather-widget-day__date">' + dayName + '</div>'
            + '<div class="weather-widget-day__cond" title="' + d.cond + '">' + emoji + '</div>'
            + '<div class="weather-widget-day__stats">'
            + '<div class="ww-temp">' + Math.round(d.maxT) + '° <span style="color:#888;font-weight:600;">' + Math.round(d.minT) + '°</span></div>'
            + '<div class="ww-wind">' + Math.round(d.wind) + ' km/h</div>'
            + '<div class="ww-rain">' + d.rainProb + '%</div>'
            + '</div></div>';
    });
    return html;
};

window.renderMobileWeatherSummaryBadge = function(hostEl, p, opts) {
    opts = opts || {};
    if (!hostEl) return;
    if (!projectIsOutdoorMobile(p)) {
        hostEl.style.display = 'none';
        hostEl.innerHTML = '';
        return;
    }
    hostEl.style.display = 'block';
    hostEl.innerHTML = '<div class="weather-widget-summary mch-weather-summary-badge"><div class="ww-line ww-line--muted">…</div></div>';
    if (opts.interactive) {
        hostEl.classList.add('mch-weather-widget-host--tap');
        hostEl.onclick = function() { openMobileWeatherPopupForProject(p); };
    } else {
        hostEl.classList.remove('mch-weather-widget-host--tap');
        hostEl.onclick = null;
        hostEl.style.pointerEvents = 'none';
    }
    fetchMobileWeatherDaysForProject(p).then(function(result) {
        const inner = hostEl.querySelector('.weather-widget-summary') || hostEl;
        if (result.error && !result.days.length) {
            inner.innerHTML = '<div class="ww-line ww-line--muted">WEATHER</div>';
            return;
        }
        inner.innerHTML = buildMobileWeatherSummaryInnerHtml(result.days);
        if (opts.interactive) {
            window._mobileWeatherDetailCache['_popup_' + p.id] = result.days;
        }
    });
};

window.openMobileWeatherPopupForProject = function(p) {
    const popup = document.getElementById('mobile-weather-popup');
    const detail = document.getElementById('mobile-weather-popup-detail');
    if (!popup || !detail || !p) return;
    popup.classList.add('open');
    popup.setAttribute('aria-hidden', 'false');
    detail.innerHTML = '<div class="ww-line ww-line--muted">Loading…</div>';
    const cached = window._mobileWeatherDetailCache['_popup_' + p.id];
    if (cached && cached.length) {
        detail.innerHTML = buildMobileWeatherDetailHtml(cached);
        return;
    }
    fetchMobileWeatherDaysForProject(p).then(function(result) {
        window._mobileWeatherDetailCache['_popup_' + p.id] = result.days;
        detail.innerHTML = buildMobileWeatherDetailHtml(result.days);
    });
};

window.closeMobileWeatherPopup = function() {
    const popup = document.getElementById('mobile-weather-popup');
    if (popup) {
        popup.classList.remove('open');
        popup.setAttribute('aria-hidden', 'true');
    }
};

function applyMobileHubStatusStyle(statusRaw) {
    const el = document.getElementById('mch-status-badge');
    if (!el) return;
    const s = String(statusRaw || 'Draft').toUpperCase();
    el.innerText = s;
    let border = '#10b981';
    let color = '#10b981';
    if (s === 'DRAFT') { border = '#a1a1aa'; color = '#a1a1aa'; }
    else if (s.indexOf('NOT') >= 0) { border = '#f97316'; color = '#f97316'; }
    else if (s === 'APPROVED') { border = '#10b981'; color = '#10b981'; }
    else if (s === 'CANCELLED') { border = '#ef4444'; color = '#ef4444'; }
    el.style.borderColor = border;
    el.style.color = color;
}

window.syncProjectEditorHiddenFields = function(p, pId) {
    if (!p) return;
    const setVal = function(id, val) {
        const el = document.getElementById(id);
        if (el) el.value = val != null ? val : '';
    };
    setVal('edit-folder-id', pId);
    setVal('edit-proj-version', p.lastUpdated || '');
    setVal('edit-proj-name', p.title || p.fullTitle || '');
    setVal('edit-proj-date', p.start || '');
    setVal('edit-proj-end-date', p.end || p.start || '');
    setVal('edit-proj-type', p.type || 'Event');
    setVal('edit-proj-client', p.client || '');
    setVal('edit-proj-location', p.locationUrl || '');
    setVal('edit-proj-lat', (p.readinessState && p.readinessState.coords) ? p.readinessState.coords.lat : (p.lat || ''));
    setVal('edit-proj-lng', (p.readinessState && p.readinessState.coords) ? p.readinessState.coords.lng : (p.lng || ''));
    const outdoor = document.getElementById('edit-proj-outdoor');
    if (outdoor) outdoor.checked = projectIsOutdoorMobile(p);
    const statusEl = document.getElementById('display-event-status');
    if (statusEl) statusEl.innerText = String(p.status || 'Draft').toUpperCase();
    const typeEl = document.getElementById('display-event-type');
    if (typeEl) typeEl.innerText = String(p.type || 'Event').toUpperCase();
    if (typeof applyProjectEditorMode === 'function') applyProjectEditorMode(pId);
};

window.openMobileCrewHub = function(pId) {
    const p = resolveMobileProject(pId);
    if (!p) return alert('Could not load event details.');

    window.mobileCrewHubProjectId = pId;
    window.mobileCrewHubProject = p;
    window.isProjectDirty = false;
    window.activeProjectContext = pId;
    if (typeof setDashboardIcon === 'function') setDashboardIcon('project');

    syncProjectEditorHiddenFields(p, pId);
    if (typeof startPresencePing === 'function') startPresencePing(pId);

    document.getElementById('mch-title').innerText = p.title || p.fullTitle || 'Project';
    document.getElementById('mch-type-badge').innerText = String(p.type || 'Event').toUpperCase();
    applyMobileHubStatusStyle(p.status);

    const loc = (p.locationUrl || '').trim();
    const locEl = document.getElementById('mch-location');
    const regionBadge = document.getElementById('mch-region-badge');
    if (regionBadge) {
        let zone = (p.readinessState && p.readinessState.regionZone) ? p.readinessState.regionZone : (p.readinessState && p.readinessState.inSofia === false ? 'outside_sofia' : 'sofia');
        const lat = (p.readinessState && p.readinessState.coords) ? p.readinessState.coords.lat : p.lat;
        const lng = (p.readinessState && p.readinessState.coords) ? p.readinessState.coords.lng : p.lng;
        if (lat && lng && typeof resolveProjectRegionZone === 'function') zone = resolveProjectRegionZone(lat, lng);
        const label = (typeof getProjectRegionLabelText === 'function') ? getProjectRegionLabelText(zone) : 'IN SOFIA';
        regionBadge.innerText = label;
        regionBadge.style.borderColor = zone === 'outside_bulgaria' ? '#ef4444' : (zone === 'outside_sofia' ? '#f59e0b' : '#10b981');
        regionBadge.style.color = regionBadge.style.borderColor;
    }
    if (loc) {
        const displayLoc = loc.length > 80 ? loc.split(',').slice(0, 3).join(',').trim() + '…' : loc;
        const isUrl = /^https?:\/\//i.test(loc) || loc.indexOf('maps') !== -1 || loc.indexOf('goo.gl') !== -1;
        const mapsHref = isUrl ? loc : 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(loc);
        locEl.innerHTML = '📍 <a href="' + mapsHref.replace(/"/g, '&quot;') + '" target="_blank" rel="noopener">' + (typeof escapeHTML === 'function' ? escapeHTML(displayLoc) : displayLoc) + '</a>';
    } else {
        locEl.innerHTML = '<span style="color:#52525b;">No location set</span>';
    }

    if (typeof renderMobilePhaseList === 'function') {
        renderMobilePhaseList(document.getElementById('mch-subevents-host'), p.fragments || []);
    }

    renderMobileWeatherSummaryBadge(document.getElementById('mch-weather-widget-host'), p, { interactive: true });

    document.getElementById('mobile-crew-hub-overlay').style.display = 'flex';
};

window.closeMobileCrewHub = function() {
    closeMobileWeatherPopup();
    document.getElementById('mobile-crew-hub-overlay').style.display = 'none';
    window.mobileCrewHubProjectId = null;
    window.mobileCrewHubProject = null;
    if (typeof stopPresencePing === 'function') stopPresencePing();
};

window.mobileCrewOpenTimeline = function() {
    const pId = window.mobileCrewHubProjectId;
    if (!pId) return;
    syncProjectEditorHiddenFields(window.mobileCrewHubProject, pId);
    document.getElementById('mobile-crew-hub-overlay').style.display = 'none';
    if (typeof launchMasterTimeline === 'function') launchMasterTimeline();
};

window.mobileCrewOpenAssets = function() {
    const pId = window.mobileCrewHubProjectId;
    if (!pId) return;
    if (typeof openMobileProjectAssets === 'function') {
        openMobileProjectAssets(pId);
    } else if (typeof openProjectAssetsModal === 'function') {
        syncProjectEditorHiddenFields(window.mobileCrewHubProject, pId);
        openProjectAssetsModal();
    }
};
</script>
