<!-- @INDEX: STATION -> Settings + gun config sync -->
<script>
function stationApplyGunSetting_(key, value) {
  var method = null;
  var args = [];
  if (key === 'power') { method = 'setPower'; args = [parseInt(value, 10)]; }
  else if (key === 'scanMode') { method = 'setScanMode'; args = [String(value)]; }
  else if (key === 'pollMs') { method = 'setPollMs'; args = [parseInt(value, 10)]; }
  else if (key === 'beep') { method = 'setBeep'; args = [!!value]; }

  var b = stationNativeBridge_();
  if (b && method) {
    try {
      if (method === 'setPower' && typeof b.setPower === 'function') b.setPower(args[0]);
      else if (method === 'setScanMode' && typeof b.setScanMode === 'function') b.setScanMode(args[0]);
      else if (method === 'setPollMs' && typeof b.setPollMs === 'function') b.setPollMs(args[0]);
      else if (method === 'setBeep' && typeof b.setBeep === 'function') b.setBeep(args[0]);
    } catch (e) { /* ignore */ }
  }

  // Desktop nested GAS iframe: mirror every setting change to hosting shell → native COM.
  if (method && (window.__srDesktopBridge || /ShowrunnerStation/i.test(navigator.userAgent || ''))) {
    stationRelayGunCommandToTop_(method, args);
  }
  stationPostToHosting_({ type: 'SHOWRUNNER_STATION_CONFIG_SET', key: key, value: value });
}

/**
 * Direct native bridge when injected in-frame (Android APK). On desktop WebView2 the GAS iframe
 * is cross-origin so AndroidStation lives on the hosting parent — use postMessage relay stubs.
 */
function stationGunBridge_() {
  var b = stationNativeBridge_();
  if (b) return b;
  if (!window.IS_STATION_DEVICE) return null;
  return {
    sleepGun: function() { stationInvokeGunNative_('sleepGun'); },
    reconnectGun: function() { stationInvokeGunNative_('reconnectGun'); },
    pollScans: function() { return '[]'; },
    getConfig: function() { return '{}'; }
  };
}

function stationNativeBridge_() {
  try {
    var b = window.AndroidStation;
    if (b && typeof b.getConfig === 'function' && typeof b.setScanMode === 'function') return b;
  } catch (e) { /* ignore */ }
  // Desktop cache shim without chrome.webview in this frame — use hosting relay for settings.
  if (window.__srDesktopBridge) {
    var hasPost = false;
    try { hasPost = !!(window.chrome && window.chrome.webview && window.chrome.webview.postMessage); } catch (e0) { /* ignore */ }
    if (!hasPost) {
      try {
        hasPost = !!(window.top && window.top.chrome && window.top.chrome.webview && window.top.chrome.webview.postMessage);
      } catch (e1) { /* ignore */ }
    }
    if (!hasPost) return null;
  }
  try {
    var h = chrome && chrome.webview && chrome.webview.hostObjects &&
      chrome.webview.hostObjects.sync && chrome.webview.hostObjects.sync.androidStation;
    if (h && typeof h.getConfig === 'function' && typeof h.setScanMode === 'function') {
      return {
        getConfig: function() { return h.getConfig(); },
        setPower: function(p) { h.setPower(p); },
        setScanMode: function(m) { h.setScanMode(m); },
        setBeep: function(b) { h.setBeep(b); },
        setPollMs: function(ms) { h.setPollMs(ms); },
        pollScans: function() { return h.pollScans(); },
        reconnectGun: function() { h.reconnectGun(); },
        sleepGun: function() { h.sleepGun(); },
        shellReady: function() { try { h.shellReady(); } catch (e) { /* ignore */ } },
        loginNeeded: function() { try { h.loginNeeded(); } catch (e) { /* ignore */ } },
        saveSession: function(t, e) { h.saveSession(t, e); },
        getSavedSession: function() { return h.getSavedSession(); }
      };
    }
  } catch (e2) { /* ignore */ }
  return null;
}

/**
 * Retired diagnostic hook — kept as no-op so old cached shells don't throw.
 */
function stationDebug_(msg) { /* retired */ }

window.stationOpenSettings = function() {
  const panel = document.getElementById('station-settings');
  if (!panel) return;
  if (panel.classList.contains('is-open')) {
    stationCloseSettings();
    return;
  }
  stationCloseScanPanel();
  panel.classList.add('is-open');
  var ctrls = document.getElementById('station-device-controls');
  if (ctrls) ctrls.style.display = 'none';
  const ejectEl = document.getElementById('station-set-eject');
  if (ejectEl) ejectEl.value = String(stationEjectMinutes_());
  const savedEl = document.getElementById('station-eject-saved');
  if (savedEl) savedEl.textContent = '';
  stationPopulateGunControlsFromStorage_();
  stationSyncGunSleepButton_();
  stationRequestGunConfig_();
};

window.stationCloseSettings = function() {
  const panel = document.getElementById('station-settings');
  if (panel) panel.classList.remove('is-open');
  var ctrls = document.getElementById('station-device-controls');
  if (ctrls && document.documentElement.classList.contains('station-device-root')) {
    ctrls.style.display = 'flex';
  }
};

function stationRequestGunConfig_() {
  var b = stationNativeBridge_();
  if (b) {
    try {
      var cfg = JSON.parse(b.getConfig());
      stationApplyGunConfig_(cfg);
      stationDebug_('config ←native');
      return;
    } catch (e) { stationDebug_('direct getConfig ERR'); }
  }
  stationPostToHosting_({ type: 'SHOWRUNNER_STATION_CONFIG_GET' });
  stationDebug_('config req →relay');
}

function stationSpeedLabel_(ms) {
  var n = parseInt(ms, 10);
  if (isNaN(n)) return '—';
  return n + ' ms';
}

function stationUpdateSpeedVisibility_() {
  var modeEl = document.getElementById('station-set-mode');
  var field = document.getElementById('station-speed-field');
  if (field) field.style.display = (modeEl && modeEl.value === 'continuous') ? 'block' : 'none';
}

/** Reflect the stored (web source-of-truth) gun settings in the controls. */
function stationPopulateGunControlsFromStorage_() {
  var powerEl = document.getElementById('station-set-power');
  var powerOut = document.getElementById('station-set-power-out');
  var modeEl = document.getElementById('station-set-mode');
  var speedEl = document.getElementById('station-set-speed');
  var speedOut = document.getElementById('station-set-speed-out');
  var beepEl = document.getElementById('station-set-beep');

  var storedPower = stationStoredSetting_(STATION_POWER_KEY);
  if (powerEl && storedPower != null) powerEl.value = storedPower;
  stationSyncPowerControls_(powerEl ? powerEl.value : null);

  var storedMode = stationStoredSetting_(STATION_MODE_KEY);
  if (modeEl && storedMode) modeEl.value = storedMode;

  var storedPoll = stationStoredSetting_(STATION_POLL_KEY);
  if (speedEl && storedPoll != null) speedEl.value = storedPoll;
  if (speedOut && speedEl && speedEl.value) speedOut.textContent = stationSpeedLabel_(speedEl.value);

  var storedBeep = stationStoredSetting_(STATION_BEEP_KEY);
  if (beepEl && storedBeep != null) beepEl.checked = (storedBeep === '1');

  stationUpdateSpeedVisibility_();
  stationSyncPanelReadModeUI_();
}

/** Push the stored settings down to the native gun (screen ↔ gun stay in sync). */
function stationSyncSettingsToGun_() {
  var mode = stationNormalizeScanMode_(stationStoredSetting_(STATION_MODE_KEY));
  if (mode) stationApplyGunSetting_('scanMode', mode);
  var poll = stationStoredSetting_(STATION_POLL_KEY);
  if (poll != null) stationApplyGunSetting_('pollMs', parseInt(poll, 10));
  var power = stationStoredSetting_(STATION_POWER_KEY);
  if (power != null) stationApplyGunSetting_('power', parseInt(power, 10));
  var beep = stationStoredSetting_(STATION_BEEP_KEY);
  if (beep != null) stationApplyGunSetting_('beep', (beep === '1'));
  if (typeof stationGunCap_ === 'function' && stationGunCap_('appSleep')) stationArmGunSleepTimer_();
}

function stationApplyGunConfig_(cfg) {
  const unavailable = document.getElementById('station-gun-unavailable');
  const powerEl = document.getElementById('station-set-power');
  const powerOut = document.getElementById('station-set-power-out');
  const modeEl = document.getElementById('station-set-mode');
  const speedEl = document.getElementById('station-set-speed');
  const speedOut = document.getElementById('station-set-speed-out');
  const beepEl = document.getElementById('station-set-beep');
  const connEl = document.getElementById('station-info-conn');
  const battEl = document.getElementById('station-info-battery');
  const fwEl = document.getElementById('station-info-fw');
  const gunControls = [powerEl, modeEl, speedEl, beepEl];

  if (!cfg) {
    if (unavailable) unavailable.style.display = 'block';
    gunControls.forEach(function(el) { if (el) el.disabled = true; });
    if (connEl) connEl.textContent = 'App not detected';
    return;
  }
  if (unavailable) unavailable.style.display = 'none';
  gunControls.forEach(function(el) { if (el) el.disabled = false; });

  // Power — web value wins if set, otherwise seed from the gun.
  if (powerEl) {
    if (cfg.powerMin != null) powerEl.min = cfg.powerMin;
    if (cfg.powerMax != null) powerEl.max = cfg.powerMax;
    var storedPower = stationStoredSetting_(STATION_POWER_KEY);
    var pv = (storedPower != null) ? storedPower : cfg.power;
    if (pv != null) powerEl.value = pv;
    if (storedPower == null && cfg.power != null) stationSetStoredSetting_(STATION_POWER_KEY, cfg.power);
    stationSyncPowerControls_(powerEl.value);
  }

  // Scan mode — normalize retired "hold" so the select always shows a real option (incl. continuous).
  var storedMode = stationStoredSetting_(STATION_MODE_KEY);
  var mv = stationNormalizeScanMode_(storedMode || cfg.scanMode);
  if (modeEl && mv) modeEl.value = mv;
  if (storedMode == null && cfg.scanMode) {
    stationSetStoredSetting_(STATION_MODE_KEY, stationNormalizeScanMode_(cfg.scanMode));
  } else if (storedMode && mv !== storedMode) {
    stationSetStoredSetting_(STATION_MODE_KEY, mv);
    stationApplyGunSetting_('scanMode', mv);
  }

  // Continuous speed
  if (speedEl) {
    if (cfg.pollMin != null) speedEl.min = cfg.pollMin;
    if (cfg.pollMax != null) speedEl.max = cfg.pollMax;
    var storedPoll = stationStoredSetting_(STATION_POLL_KEY);
    var sv = (storedPoll != null) ? storedPoll : cfg.pollMs;
    if (sv != null) speedEl.value = sv;
    if (storedPoll == null && cfg.pollMs != null) stationSetStoredSetting_(STATION_POLL_KEY, cfg.pollMs);
    if (speedOut && speedEl.value) speedOut.textContent = stationSpeedLabel_(speedEl.value);
  }
  stationUpdateSpeedVisibility_();

  // Beeper
  if (beepEl) {
    var storedBeep = stationStoredSetting_(STATION_BEEP_KEY);
    beepEl.checked = (storedBeep != null) ? (storedBeep === '1') : (cfg.beep !== false);
    if (storedBeep == null) stationSetStoredSetting_(STATION_BEEP_KEY, (cfg.beep !== false) ? '1' : '0');
  }

  if (connEl) {
    var connLabel = 'Not connected';
    if (cfg.linkState === 'live' || (cfg.connected && !cfg.linkState)) connLabel = 'Connected';
    else if (cfg.linkState === 'connecting' || cfg.linkState === 'reconnecting') connLabel = 'Connecting…';
    else if (cfg.linkState === 'zombie') connLabel = 'Link stale — reconnecting';
    else if (cfg.linkState === 'asleep') connLabel = 'Asleep — pull trigger + Reconnect';
    connEl.textContent = connLabel;
  }
  var liveNow = !!(cfg.connected || cfg.linkState === 'live');
  if (typeof window.stationLastGunConnected === 'undefined') window.stationLastGunConnected = null;
  if (window.stationLastGunConnected !== null && window.stationLastGunConnected !== liveNow) {
    stationToast_(liveNow ? 'RFID gun connected' : 'RFID gun disconnected', liveNow ? 'ok' : 'error');
  }
  window.stationLastGunConnected = liveNow;
  if (liveNow && typeof stationGunCap_ === 'function' && stationGunCap_('appSleep') &&
      !window.stationGunIdleTimer && stationGunSleepMinutes_()) {
    stationArmGunSleepTimer_();
  }
  if (battEl) battEl.textContent = (cfg.battery != null && cfg.battery >= 0) ? (cfg.battery + '%') : '—';
  if (fwEl) fwEl.textContent = cfg.firmware || '—';
  stationSyncPanelReadModeUI_();
}

/** Keep the Settings power slider in sync with the gun. */
function stationSyncPowerControls_(val) {
  const setEl = document.getElementById('station-set-power');
  const setOut = document.getElementById('station-set-power-out');
  if (val != null && setEl) setEl.value = val;
  const shown = (setEl && setEl.value) || val || '';
  if (setOut) setOut.textContent = shown ? (shown + ' dBm') : '—';
}

window.stationOnPowerInput = function() {
  const powerEl = document.getElementById('station-set-power');
  if (powerEl) stationSyncPowerControls_(powerEl.value);
};

window.stationSavePower = function() {
  const powerEl = document.getElementById('station-set-power');
  if (!powerEl) return;
  stationSetStoredSetting_(STATION_POWER_KEY, powerEl.value);
  stationSyncPowerControls_(powerEl.value);
  stationApplyGunSetting_('power', parseInt(powerEl.value, 10));
};

window.stationSaveScanMode = function() {
  const modeEl = document.getElementById('station-set-mode');
  if (!modeEl) return;
  var mode = stationNormalizeScanMode_(modeEl.value);
  if (modeEl.value !== mode) modeEl.value = mode;
  stationSetStoredSetting_(STATION_MODE_KEY, mode);
  stationUpdateSpeedVisibility_();
  stationApplyGunSetting_('scanMode', mode);
  stationSyncPanelReadModeUI_();
};

window.stationOnSpeedInput = function() {
  const speedEl = document.getElementById('station-set-speed');
  const speedOut = document.getElementById('station-set-speed-out');
  if (speedEl && speedOut) speedOut.textContent = stationSpeedLabel_(speedEl.value);
};

window.stationSaveSpeed = function() {
  const speedEl = document.getElementById('station-set-speed');
  if (!speedEl) return;
  stationSetStoredSetting_(STATION_POLL_KEY, speedEl.value);
  stationApplyGunSetting_('pollMs', parseInt(speedEl.value, 10));
};

window.stationSaveBeep = function() {
  const beepEl = document.getElementById('station-set-beep');
  if (!beepEl) return;
  stationSetStoredSetting_(STATION_BEEP_KEY, beepEl.checked ? '1' : '0');
  stationApplyGunSetting_('beep', !!beepEl.checked);
};

window.stationSaveEjectMinutes = function() {
  const ejectEl = document.getElementById('station-set-eject');
  const savedEl = document.getElementById('station-eject-saved');
  if (!ejectEl) return;
  let mins = parseInt(ejectEl.value, 10);
  if (STATION_EJECT_CHOICES.indexOf(mins) === -1) mins = STATION_HOST_IDLE_DEFAULT_MIN;
  ejectEl.value = String(mins);
  stationSetStoredSetting_(STATION_EJECT_STORAGE_KEY, mins);
  if (stationReadHostSession_()) stationResetHostIdleTimer_();
  if (savedEl) {
    savedEl.textContent = 'Saved — host ejects after ' + mins + ' min.';
    setTimeout(function() { if (savedEl) savedEl.textContent = ''; }, 2500);
  }
};

window.stationSaveGunSleepMinutes = function() {
  const el = document.getElementById('station-set-gunsleep');
  if (!el) return;
  let mins = parseInt(el.value, 10);
  if (STATION_GUNSLEEP_CHOICES.indexOf(mins) === -1) mins = STATION_GUNSLEEP_DEFAULT_MIN;
  el.value = String(mins);
  stationSetStoredSetting_(STATION_GUNSLEEP_STORAGE_KEY, mins);
  stationArmGunSleepTimer_();
  const savedEl = document.getElementById('station-eject-saved');
  if (savedEl) {
    savedEl.textContent = mins ? ('Saved — gun sleeps after ' + mins + ' min idle.') : 'Saved — gun stays on.';
    setTimeout(function() { if (savedEl) savedEl.textContent = ''; }, 2500);
  }
};

window.stationSaveNoHostGraceMinutes = function() {
  const el = document.getElementById('station-set-no-host-grace');
  if (!el) return;
  let mins = parseInt(el.value, 10);
  if (STATION_NO_HOST_GRACE_CHOICES.indexOf(mins) === -1) mins = STATION_NO_HOST_GRACE_DEFAULT_MIN;
  el.value = String(mins);
  stationSetStoredSetting_(STATION_NO_HOST_GRACE_KEY, mins);
  if (!stationReadHostSession_() && typeof stationGunCap_ === 'function' && stationGunCap_('autoSdkPark')) {
    stationArmNoHostParkDeadline_();
  }
  const savedEl = document.getElementById('station-eject-saved');
  if (savedEl) {
    savedEl.textContent = 'Saved — gun stays connected ' + mins + ' min between hosts.';
    setTimeout(function() { if (savedEl) savedEl.textContent = ''; }, 2500);
  }
};

window.stationSaveGunParkDelayMinutes = function() {
  const el = document.getElementById('station-set-gun-park-delay');
  if (!el) return;
  let mins = parseInt(el.value, 10);
  if (STATION_GUN_PARK_DELAY_CHOICES.indexOf(mins) === -1) mins = STATION_GUN_PARK_DELAY_DEFAULT_MIN;
  el.value = String(mins);
  stationSetStoredSetting_(STATION_GUN_PARK_DELAY_KEY, mins);
  if (!stationReadHostSession_() && typeof stationGunCap_ === 'function' && stationGunCap_('autoSdkPark')) {
    stationArmNoHostParkDeadline_();
  }
  const savedEl = document.getElementById('station-eject-saved');
  if (savedEl) {
    savedEl.textContent = mins
      ? ('Saved — disconnect ' + mins + ' min after grace ends.')
      : 'Saved — disconnect as soon as grace ends.';
    setTimeout(function() { if (savedEl) savedEl.textContent = ''; }, 2500);
  }
};
</script>
