<script>
(function() {
  const STAGE_MASTERS_LOGO_SVG_LOCK = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 513.6 42.4"><path fill="#fff" d="M513.6,31.13c-3.06,10.13-12.85,11.85-22.29,11.01-7.67-.68-14.2-5.48-14.64-13.64-.05-.99-.01-.62.71-.72,1.55-.21,11.33-.87,11.75-.45s-.11,4.28,3.43,5.91c6.18,2.85,11.7-3.31,6.84-6.35-6.26-3.92-20.29-2.14-21.24-13.78-1.24-15.2,26.77-16.88,32.49-6.56.77,1.4,2.72,5.94.32,6.39-2.89.54-7.32-.33-10.5.51-.46-.13-.51-1.87-.88-2.56-3.38-6.26-14.36-.64-7.22,2.42s18.41,2.07,21.24,12.07v5.75Z"/><path fill="#fff" d="M227.55.96l6.71,22.99,6.24-22.99h16.54v39.98c0,.05-.67.72-.72.72h-9.59c-.05,0-.72-.67-.72-.72V14.37l-7.26,27.23-9.21.08-7.99-29.23v29.21h-10.55V.96h16.54Z"/><path fill="#fff" d="M461.09.96c11.86,1.4,14.22,16.26,4.03,21.74-.94.51-2.48.41-2.83,1.24l2.38.74c4.84,4.59,7.08,11.17,10.09,16.98h-14.15c-2.74-3.02-6.76-14.95-10.28-16.07-.95-.3-1.93-.24-2.9-.21v16.28h-12.23c-.05,0-.72-.67-.72-.72V1.68c0-.13.56-.48.72-.72,8.18.7,17.91-.95,25.9,0ZM447.42,17.24c3.83,0,12.83.94,10.93-5.41-.19-.63-2.11-2.25-2.54-2.25h-8.39v7.66Z"/><path fill="#fff" d="M164.01,35.91c-13.58,9.21-37.16,10.51-41.11-9.47-1.75-8.87,1.02-19.8,9.76-23.99,7.45-3.57,22.59-3.72,27.99,3.53.62.83,3.24,5.29,2.12,6.04-.49.33-10.93,2.29-11.5,2.19s-1.66-4.16-5.71-4.65c-8.23-.98-10.58,5.72-10.32,12.69.33,8.59,5.27,12.73,13.79,9.96,3.41-1.11,3.84-1.58,3.46-5.4h-8.15v-8.62h19.66v17.72Z"/><path fill="#fff" d="M205.25.96v8.38c0,.05-.67.72-.72.72h-19.9v5.75h19.18v8.62h-19.18v7.66h21.1v9.58h-33.81c-.05,0-.72-.67-.72-.72V1.68c0-.05.67-.72.72-.72h33.33Z"/><path fill="#fff" d="M406.18,10.06v5.75h19.18v8.62h-19.18v7.66h21.58v8.86c0,.05-.67.72-.72.72h-33.81V.96h33.33c.05,0,.72.67.72.72v7.66c0,.05-.67.72-.72.72h-20.38Z"/><path fill="#fff" d="M308.83,27.77c2.2.37,10.53-1.32,11.93-.42.28.18.57,2.45.92,3.15,3.1,6.24,13.88,3.05,11.07-1.95-2.57-4.57-16.17-3.16-20.96-10.68-4.1-6.44-.17-13.91,6.5-16.34,9.2-3.35,25.77-1.67,25.83,10.93-.64.87-9.54.29-11.48.88-.97-.34-.74-2.41-1.73-3.55-2.43-2.84-10.12-2.33-8.57,2.33   let desktopLockActive = false;
  let desktopLockRequireFull = false;
  let desktopLockVerifying = false;
  let desktopLockIdleTimer = null;
  let desktopLockClockTimer = null;
  let desktopLockCachedPrefix = '';
  const DESKTOP_LOCK_FADE_MS = 500;

  function desktopLockPrefixStorageKey() {
    return 'sm_lock_prefix_' + desktopLockCrewKey();
  }

  function readStoredLockPrefix() {
    let key = desktopLockPrefixStorageKey();
    try {
      let v = sessionStorage.getItem(key) || localStorage.getItem(key);
      if (v && String(v).length >= 2) return String(v).substring(0, 2);
    } catch (e) { /* ignore */ }
    return '';
  }

  function storeLockPrefix(prefix) {
    let p = String(prefix || '').substring(0, 2);
    if (p.length < 2) return;
    desktopLockCachedPrefix = p;
    let key = desktopLockPrefixStorageKey();
    try {
      sessionStorage.setItem(key, p);
      localStorage.setItem(key, p);
    } catch (e) { /* ignore */ }
  }

  function getDesktopLockExpectedPrefix() {
    if (desktopLockCachedPrefix && desktopLockCachedPrefix.length === 2) return desktopLockCachedPrefix;
    let stored = readStoredLockPrefix();
    if (stored) desktopLockCachedPrefix = stored;
    return stored;
  }

  function prefetchDesktopLockPrefix() {
    let stored = readStoredLockPrefix();
    if (stored) {
      desktopLockCachedPrefix = stored;
      return;
    }
    let crew = (typeof ACTIVE_USER_NAME !== 'undefined' && ACTIVE_USER_NAME) ? ACTIVE_USER_NAME : '';
    if (!crew) return;
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.prefix && String(res.prefix).length >= 2) {
          storeLockPrefix(res.prefix);
        }
      })
      .withFailureHandler(function() { /* ignore */ })
      .getDesktopLockPrefix(crew);
  }

  function desktopLockCrewKey() {
    let crew = (typeof ACTIVE_USER_NAME !== 'undefined' && ACTIVE_USER_NAME) ? ACTIVE_USER_NAME : 'default';
    return String(crew).toLowerCase().trim().replace(/\s+/g, '_');
  }

  window.getDesktopLockIdleMinutes = function() {
    let key = 'sm_lock_idle_min_' + desktopLockCrewKey();
    let v = 5;
    try { v = parseInt(localStorage.getItem(key), 10); } catch (e) { /* ignore */ }
    if (!v || isNaN(v) || v < 5) return 5;
    if (v > 30) return 30;
    return Math.round(v / 5) * 5;
  };

  window.setDesktopLockIdleMinutes = function(minutes) {
    let m = parseInt(minutes, 10);
    if (!m || isNaN(m)) m = 5;
    m = Math.max(5, Math.min(30, Math.round(m / 5) * 5));
    try { localStorage.setItem('sm_lock_idle_min_' + desktopLockCrewKey(), String(m)); } catch (e) { /* ignore */ }
    syncDesktopLockIdleSelect();
    resetDesktopLockIdleTimer();
  };

  window.syncDesktopLockIdleSelect = function() {
    let mins = getDesktopLockIdleMinutes();
    ['desktop-lock-idle-select'].forEach(function(id) {
      let sel = document.getElementById(id);
      if (sel) sel.value = String(mins);
    });
  };

  function isDesktopLockEligible() {
    if (!window.matchMedia('(min-width: 769px)').matches) return false;
    return !!(typeof ACTIVE_USER_NAME !== 'undefined' && ACTIVE_USER_NAME);
  }

  function busOpacityForWidth(widthStr) {
    const w = parseFloat(widthStr) || 80;
    const minW = 72;
    const maxW = 280;
    const clamped = Math.max(minW, Math.min(maxW, w));
    const t = (clamped - minW) / (maxW - minW);
    const maxO = 0.15;
    const minO = 0.04;
    return +(maxO - t * (maxO - minO)).toFixed(3);
  }

  const DESKTOP_LOCK_DIM_PAD = 25;
  const DESKTOP_LOCK_DIM_FADE = 50;

  function syncDesktopLockClockDim() {
    let clock = document.getElementById('desktop-lock-clock');
    let panel = clock && clock.closest('.desktop-lock-clock-panel');
    if (!clock || !panel) return;
    let w = clock.offsetWidth;
    let h = clock.offsetHeight;
    if (!w || !h) return;
    let coreW = w + DESKTOP_LOCK_DIM_PAD * 2;
    let coreH = h + DESKTOP_LOCK_DIM_PAD * 2;
    panel.style.setProperty('--lock-dim-w', coreW + 'px');
    panel.style.setProperty('--lock-dim-h', coreH + 'px');
    panel.style.setProperty('--lock-fade-out', DESKTOP_LOCK_DIM_FADE + 'px');
    panel.style.setProperty('--lock-dim-radius', Math.round(coreH / 3) + 'px');
  }

  function buildDesktopLockBuses() {
    let lanes = document.getElementById('desktop-lock-bus-lanes');
    if (!lanes || lanes.dataset.built === 'v7') return;
    lanes.dataset.built = 'v7';
    let html = '';
    const configs = [
      { top: '6%',  width: '250vw', dur: 56,  delay: 0,   dir: 'ltr', soft: true },
      { top: '14%', width: '80vw',  dur: 108, delay: -14, dir: 'rtl', soft: false },
      { top: '22%', width: '152vw', dur: 62,  delay: -28, dir: 'ltr', soft: true },
      { top: '30%', width: '104vw', dur: 80,  delay: -8,  dir: 'rtl', soft: false },
      { top: '38%', width: '240vw', dur: 52,  delay: -3,  dir: 'ltr', soft: true },
      { top: '46%', width: '72vw',  dur: 130, delay: -52, dir: 'rtl', soft: false },
      { top: '54%', width: '136vw', dur: 54,  delay: -20, dir: 'ltr', soft: true },
      { top: '62%', width: '280vw', dur: 54,  delay: -1,  dir: 'rtl', soft: false },
      { top: '70%', width: '88vw',  dur: 92,  delay: -62, dir: 'ltr', soft: true },
      { top: '78%', width: '164vw', dur: 56,  delay: -12, dir: 'rtl', soft: false },
      { top: '86%', width: '116vw', dur: 68,  delay: -36, dir: 'ltr', soft: true },
      { top: '50%', width: '245vw', dur: 52,  delay: -6,  dir: 'rtl', soft: false }
    ];
    configs.forEach(function(cfg) {
      const op = busOpacityForWidth(cfg.width);
      const softCls = cfg.soft ? ' desktop-lock-bus--soft' : '';
      html += '<div class="desktop-lock-bus desktop-lock-bus--' + cfg.dir + softCls + '" style="' +
        'top:' + cfg.top + ';width:' + cfg.width + ';' +
        '--bus-o:' + op + ';' +
        'animation-duration:' + cfg.dur + 's;animation-delay:' + cfg.delay + 's;">' +
        STAGE_MASTERS_LOGO_SVG_LOCK + '</div>';
    });
    lanes.innerHTML = html;
  }

  const DESKTOP_LOCK_DIGIT_FADE_MS = 300;

  function buildDesktopLockClockFace(el, str) {
    el.textContent = '';
    for (let i = 0; i < str.length; i++) {
      let ch = str[i];
      if (/\d/.test(ch)) {
        let slot = document.createElement('span');
        slot.className = 'desktop-lock-clock-slot';
        let digit = document.createElement('span');
        digit.className = 'desktop-lock-clock-digit';
        digit.textContent = ch;
        slot.appendChild(digit);
        el.appendChild(slot);
      } else {
        let sep = document.createElement('span');
        sep.className = 'desktop-lock-clock-sep';
        sep.textContent = ch;
        el.appendChild(sep);
      }
    }
  }

  function crossfadeClockDigit(slot, newChar) {
    let active = slot.querySelector('.desktop-lock-clock-digit:not(.is-leaving)');
    if (!active) {
      let d = document.createElement('span');
      d.className = 'desktop-lock-clock-digit';
      d.textContent = newChar;
      slot.appendChild(d);
      return;
    }
    if (active.textContent === newChar) return;

    if (slot.dataset.fadeTimer) {
      clearTimeout(parseInt(slot.dataset.fadeTimer, 10));
      delete slot.dataset.fadeTimer;
    }
    slot.querySelectorAll('.is-leaving').forEach(function(n) { n.remove(); });

    active.classList.add('is-leaving');

    let incoming = document.createElement('span');
    incoming.className = 'desktop-lock-clock-digit is-entering';
    incoming.textContent = newChar;
    slot.appendChild(incoming);

    let t = setTimeout(function() {
      slot.querySelectorAll('.is-leaving').forEach(function(n) { n.remove(); });
      let enter = slot.querySelector('.is-entering');
      if (enter) enter.classList.remove('is-entering');
      delete slot.dataset.fadeTimer;
    }, DESKTOP_LOCK_DIGIT_FADE_MS + 50);
    slot.dataset.fadeTimer = String(t);
  }

  function updateDesktopLockClock() {
    let el = document.getElementById('desktop-lock-clock');
    if (!el) return;
    let now = new Date();
    let str = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    let prev = el.dataset.clockStr || '';
    let slots = el.querySelectorAll('.desktop-lock-clock-slot');

    if (!prev || slots.length === 0) {
      buildDesktopLockClockFace(el, str);
      el.dataset.clockStr = str;
      requestAnimationFrame(syncDesktopLockClockDim);
      return;
    }

    if (prev === str) return;

    let slotIdx = 0;
    for (let i = 0; i < str.length; i++) {
      if (!/\d/.test(str[i])) continue;
      let slot = slots[slotIdx++];
      if (!slot) continue;
      if (str[i] !== prev[i]) crossfadeClockDigit(slot, str[i]);
    }
    el.dataset.clockStr = str;
    requestAnimationFrame(syncDesktopLockClockDim);
  }

  function focusDesktopLockQuickCapture() {
    let cap = document.getElementById('desktop-lock-quick-capture');
    if (!cap || desktopLockRequireFull) return;
    cap.value = '';
    setTimeout(function() {
      try { cap.focus({ preventScroll: true }); } catch (e) { cap.focus(); }
    }, 50);
  }

  function showDesktopLockFullForm() {
    desktopLockRequireFull = true;
    let form = document.getElementById('desktop-lock-full-form');
    let cap = document.getElementById('desktop-lock-quick-capture');
    if (cap) cap.blur();
    if (form) form.style.display = 'flex';
    let inp = document.getElementById('desktop-lock-full-input');
    if (inp) {
      inp.value = '';
      setTimeout(function() { inp.focus(); }, 80);
    }
    let msg = document.getElementById('desktop-lock-msg');
    if (msg) { msg.textContent = ''; msg.style.color = ''; }
  }

  function resetDesktopLockUnlockUI() {
    desktopLockRequireFull = false;
    let form = document.getElementById('desktop-lock-full-form');
    if (form) form.style.display = 'none';
    let fullInp = document.getElementById('desktop-lock-full-input');
    if (fullInp) fullInp.value = '';
    let cap = document.getElementById('desktop-lock-quick-capture');
    if (cap) cap.value = '';
    let msg = document.getElementById('desktop-lock-msg');
    if (msg) { msg.textContent = ''; msg.style.color = ''; }
  }

  function finishDesktopUnlock() {
    let overlay = document.getElementById('desktop-lock-overlay');
    if (!overlay) {
      desktopLockActive = false;
      document.body.classList.remove('desktop-lock-active');
      resetDesktopLockUnlockUI();
      resetDesktopLockIdleTimer();
      return;
    }

    function teardownLock() {
      desktopLockActive = false;
      overlay.classList.remove('is-visible', 'is-leaving', 'is-mounted');
      overlay.style.display = 'none';
      overlay.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('desktop-lock-active');
      if (desktopLockClockTimer) {
        clearInterval(desktopLockClockTimer);
        desktopLockClockTimer = null;
      }
      resetDesktopLockUnlockUI();
      resetDesktopLockIdleTimer();
    }

    if (!overlay.classList.contains('is-visible')) {
      teardownLock();
      return;
    }

    overlay.classList.remove('is-visible');
    overlay.classList.add('is-leaving');
    let done = false;
    function onFadeDone() {
      if (done) return;
      done = true;
      overlay.removeEventListener('transitionend', onFadeDone);
      teardownLock();
    }
    overlay.addEventListener('transitionend', onFadeDone);
    setTimeout(onFadeDone, DESKTOP_LOCK_FADE_MS + 80);
  }

  function verifyDesktopLockOnServer(code, mode, onDone) {
    if (desktopLockVerifying) return;
    desktopLockVerifying = true;
    let crew = (typeof ACTIVE_USER_NAME !== 'undefined' && ACTIVE_USER_NAME) ? ACTIVE_USER_NAME : '';
    google.script.run
      .withSuccessHandler(function(res) {
        desktopLockVerifying = false;
        onDone(res && res.success === true);
      })
      .withFailureHandler(function() {
        desktopLockVerifying = false;
        onDone(false);
      })
      .verifyDesktopLockUnlock(crew, code, mode);
  }

  function handleQuickUnlockAttempt(prefix) {
    let expected = getDesktopLockExpectedPrefix();
    if (expected && expected.length === 2) {
      if (prefix === expected) {
        finishDesktopUnlock();
        return;
      }
      showDesktopLockFullForm();
      return;
    }
    verifyDesktopLockOnServer(prefix, 'prefix', function(ok) {
      if (ok) {
        storeLockPrefix(prefix);
        finishDesktopUnlock();
        return;
      }
      showDesktopLockFullForm();
    });
  }

  window.submitDesktopLockFullPin = function() {
    let inp = document.getElementById('desktop-lock-full-input');
    let msg = document.getElementById('desktop-lock-msg');
    if (!inp) return;
    let code = String(inp.value || '').trim();
    if (code.length < 6) {
      if (msg) { msg.textContent = 'Enter your full 6-character PIN.'; msg.style.color = '#f87171'; }
      inp.classList.add('desktop-lock-shake');
      setTimeout(function() { inp.classList.remove('desktop-lock-shake'); }, 500);
      return;
    }
    verifyDesktopLockOnServer(code, 'full', function(ok) {
      if (ok) {
        finishDesktopUnlock();
        return;
      }
      if (msg) { msg.textContent = 'Incorrect PIN.'; msg.style.color = '#f87171'; }
      inp.value = '';
      inp.classList.add('desktop-lock-shake');
      setTimeout(function() { inp.classList.remove('desktop-lock-shake'); }, 500);
      inp.focus();
    });
  };

  window.lockDesktopScreen = function() {
    if (!isDesktopLockEligible()) return;
    if (desktopLockActive) return;
    if (typeof closeModals === 'function') closeModals();
    if (typeof closePersonalHub === 'function') closePersonalHub();

    buildDesktopLockBuses();
    resetDesktopLockUnlockUI();

    let overlay = document.getElementById('desktop-lock-overlay');
    if (!overlay) return;
    overlay.classList.remove('is-leaving', 'is-visible');
    overlay.classList.add('is-mounted');
    overlay.style.display = 'flex';
    overlay.setAttribute('aria-hidden', 'false');
    document.body.classList.add('desktop-lock-active');
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        overlay.classList.add('is-visible');
      });
    });

    prefetchDesktopLockPrefix();

    updateDesktopLockClock();
    if (desktopLockClockTimer) clearInterval(desktopLockClockTimer);
    desktopLockClockTimer = setInterval(updateDesktopLockClock, 1000);
    requestAnimationFrame(function() {
      requestAnimationFrame(syncDesktopLockClockDim);
    });

    desktopLockActive = true;
    if (desktopLockIdleTimer) {
      clearTimeout(desktopLockIdleTimer);
      desktopLockIdleTimer = null;
    }
    focusDesktopLockQuickCapture();
  };

  window.lockDesktop = window.lockDesktopScreen;
  window.unlockDesktop = function(pin) {
    if (!desktopLockActive) return;
    if (pin && String(pin).length >= 6) {
      let inp = document.getElementById('desktop-lock-full-input');
      if (inp) inp.value = String(pin);
      submitDesktopLockFullPin();
    }
  };

  function resetDesktopLockIdleTimer() {
    if (desktopLockIdleTimer) {
      clearTimeout(desktopLockIdleTimer);
      desktopLockIdleTimer = null;
    }
    if (!isDesktopLockEligible() || desktopLockActive) return;
    let ms = getDesktopLockIdleMinutes() * 60 * 1000;
    desktopLockIdleTimer = setTimeout(function() {
      lockDesktopScreen();
    }, ms);
  }

  function onDesktopLockActivity() {
    if (desktopLockActive) return;
    if (!isDesktopLockEligible()) return;
    resetDesktopLockIdleTimer();
  }

  function onDesktopLockQuickInput() {
    if (!desktopLockActive || desktopLockRequireFull) return;
    let cap = document.getElementById('desktop-lock-quick-capture');
    if (!cap) return;
    let val = String(cap.value || '');
    if (val.length >= 2) {
      handleQuickUnlockAttempt(val.substring(0, 2));
      cap.value = '';
    }
  }

  window.initDesktopLockWatch = function() {
    if (!isDesktopLockEligible()) return;
    syncDesktopLockIdleSelect();
    prefetchDesktopLockPrefix();
    ['mousemove', 'mousedown', 'keydown', 'click', 'scroll', 'touchstart', 'wheel'].forEach(function(evt) {
      document.addEventListener(evt, onDesktopLockActivity, { passive: true });
    });
    let cap = document.getElementById('desktop-lock-quick-capture');
    if (cap) cap.addEventListener('input', onDesktopLockQuickInput);
    let fullInp = document.getElementById('desktop-lock-full-input');
    if (fullInp) {
      fullInp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          submitDesktopLockFullPin();
        }
      });
    }
    let overlay = document.getElementById('desktop-lock-overlay');
    if (overlay) {
      overlay.addEventListener('click', function() {
        if (!desktopLockRequireFull) focusDesktopLockQuickCapture();
      });
    }
    resetDesktopLockIdleTimer();
    window.addEventListener('resize', function() {
      if (desktopLockActive) requestAnimationFrame(syncDesktopLockClockDim);
    }, { passive: true });
  };

  document.addEventListener('DOMContentLoaded', function() {
    if (typeof initDesktopLockWatch === 'function') initDesktopLockWatch();
  });
})();
</script>
