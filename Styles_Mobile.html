.mch-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    -webkit-overflow-scrolling: touch;
}

.mch-subevents-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.mch-subevent-strip {
    background: #1a1a1e;
    border: 1px solid #333;
    border-left: 4px solid #555;
    border-radius: 8px;
    padding: 12px 14px;
}

.mch-subevent-strip--wh { border-left-color: var(--color-paint-wh, #f97316); }
.mch-subevent-strip--main { border-left-color: var(--color-paint-main, #3b82f6); }
.mch-subevent-strip--show { border-left-color: var(--color-paint-show, #10b981); }
.mch-subevent-strip--recovery { border-left-color: var(--color-paint-recovery, #a855f7); }
.mch-subevent-strip--transit { border-left-color: var(--color-paint-transit, #06b6d4); }

.mch-subevent-strip__top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
}

.mch-subevent-strip__type {
    font-size: 12px;
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

.mch-subevent-strip__dates {
    font-size: 10px;
    font-weight: 700;
    color: #71717a;
    text-align: right;
    flex-shrink: 0;
}

.mch-subevent-strip__times {
    font-size: 13px;
    font-weight: 800;
    color: #e4e4e7;
}

.mch-subevent-strip__note {
    font-size: 11px;
    color: #a1a1aa;
    margin-top: 6px;
    line-height: 1.4;
}

.mch-footer {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    border-top: 1px solid #333;
    background: #111114;
    flex-shrink: 0;
}

.mch-footer-btn {
    width: 100% !important;
    margin: 0 !important;
    padding: 14px 4px !important;
    font-size: 10px !important;
    justify-content: center !important;
    white-space: nowrap;
}

.mch-footer-btn--incomplete {
    opacity: 0.42 !important;
    border-color: #3f3f46 !important;
    color: #71717a !important;
}

.mch-footer-btn--complete.mch-footer-btn--truck {
    opacity: 1 !important;
    border-color: #3b82f6 !important;
    color: #3b82f6 !important;
}

.mch-footer-btn--complete.mch-footer-btn--areas {
    opacity: 1 !important;
    border-color: #10b981 !important;
    color: #10b981 !important;
}

.mch-footer-btn--disabled,
.mch-footer-btn--disabled:disabled {
    opacity: 0.3 !important;
    border-color: #3f3f46 !important;
    color: #52525b !important;
    pointer-events: none;
}

.mch-auto-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 900;
    background: #f97316;
    color: #000;
    padding: 1px 4px;
    border-radius: 2px;
    margin-left: 2px;
    vertical-align: middle;
    letter-spacing: 0;
}

/* Mobile weather detail popup (crew hub only) */
.mobile-weather-popup {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9000;
}

.mobile-weather-popup.open {
    display: block;
}

.mobile-weather-popup__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
}

.mobile-weather-popup__panel {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    max-height: 75vh;
    background: #18181b;
    border-top: 2px solid #3b82f6;
    border-radius: 14px 14px 0 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.mobile-weather-popup__head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.08em;
    color: #a1a1aa;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
}

.mobile-weather-popup__close {
    background: transparent;
    border: none;
    color: #a1a1aa;
    font-size: 18px;
    padding: 4px 8px;
    cursor: pointer;
}

.mobile-weather-popup__detail {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px 14px calc(16px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.mobile-weather-popup__detail .weather-widget-day {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #1a1a1e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 12px;
}

.mobile-weather-popup__detail .weather-widget-day--alert {
    border-top: 2px solid #f97316;
}

.mobile-weather-popup__detail .weather-widget-day__date {
    font-size: 11px;
    font-weight: 800;
    color: #a1a1aa;
    min-width: 52px;
}

.mobile-weather-popup__detail .weather-widget-day__cond {
    font-size: 22px;
    line-height: 1;
}

.mobile-weather-popup__detail .weather-widget-day__stats {
    flex: 1;
    font-size: 11px;
    font-weight: 700;
    color: #e4e4e7;
    display: flex;
    flex-wrap: wrap;
    gap: 8px 12px;
}

.mch-section-label {
    font-size: 10px;
    font-weight: 900;
    color: #71717a;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
}

.mch-shift-card {
    background: #1a1a1e;
    border: 1px solid #333;
    border-left: 3px solid #a855f7;
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    color: #e4e4e7;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.mch-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-top: 8px;
    border-top: 1px solid #333;
    margin-top: auto;
}

.mch-actions .btn-outline,
.mch-actions .btn-main {
    width: 100% !important;
    margin: 0 !important;
    padding: 18px !important;
    font-size: 14px !important;
    justify-content: center !important;
}

/* --- Phase Rail (deconstructed mini calendar) --- */
.mch-phase-rail-wrap {
    background: #111114;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
}

.mch-phase-rail {
    position: relative;
    height: 36px;
    background: #0a0a0c;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 8px;
}

.mch-phase-segment {
    position: absolute;
    top: 4px;
    height: 28px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    padding: 0 4px;
    box-sizing: border-box;
    border: 1px solid rgba(255,255,255,0.15);
}

.mch-phase-segment--wh { background: var(--color-paint-wh, #f97316); }
.mch-phase-segment--main { background: var(--color-paint-main, #3b82f6); }
.mch-phase-segment--show { background: var(--color-paint-show, #10b981); }
.mch-phase-segment--recovery { background: var(--color-paint-recovery, #a855f7); }
.mch-phase-segment--transit { background: var(--color-paint-transit, #06b6d4); }

.mch-phase-legend {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.mch-phase-legend-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #d4d4d8;
    padding: 6px 8px;
    background: #1a1a1e;
    border-radius: 4px;
    border-left: 3px solid #555;
}

.mch-phase-legend-row--wh { border-left-color: var(--color-paint-wh, #f97316); }
.mch-phase-legend-row--main { border-left-color: var(--color-paint-main, #3b82f6); }
.mch-phase-legend-row--show { border-left-color: var(--color-paint-show, #10b981); }
.mch-phase-legend-row--recovery { border-left-color: var(--color-paint-recovery, #a855f7); }
.mch-phase-legend-row--transit { border-left-color: var(--color-paint-transit, #06b6d4); }

.mch-phase-legend-dates { font-size: 11px; color: #71717a; font-weight: 600; }

/* --- Mobile weather strip --- */
.mch-weather-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
}

.mch-weather-day {
    flex: 0 0 auto;
    min-width: 72px;
    background: #1a1a1e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
}

.mch-weather-day--alert { border-top: 2px solid #f97316; }
.mch-weather-day__date { font-size: 9px; font-weight: 800; color: #71717a; text-transform: uppercase; }
.mch-weather-day__emoji { font-size: 20px; line-height: 1.2; margin: 4px 0; }
.mch-weather-day__temp { font-size: 11px; font-weight: 700; color: #fff; }

/* --- Mobile timeline: MY SHIFTS list + pinch-zoom grid --- */

    display: none;
    flex-shrink: 0;
    border-bottom: 1px solid #333;
    background: #111114;
}

#tt-mobile-view-bar {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    align-items: center;
}

#tt-mobile-view-bar .btn-tab {
    flex: 1;
    margin: 0 !important;
    font-size: 11px !important;
    padding: 10px 8px !important;
}

#tt-mobile-list-pane {
    display: none;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    background: #0a0a0c;
}

#shift-layer.tt-mobile-mode.tt-mobile-list-view #tt-mobile-list-pane {
    display: flex;
    flex-direction: column;
}

#shift-layer.tt-mobile-mode.tt-mobile-list-view .tt-workspace {

}

#shift-layer.tt-mobile-mode.tt-mobile-grid-view #tt-mobile-list-pane {
    display: none !important;
}

#tt-mobile-list-scroll {
    flex: 1;

.tt-mobile-list-empty {

.tt-mobile-shift-strip {

.tt-mobile-shift-strip.tt-mobile-strip--wh {

.tt-mobile-strip-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
}

.tt-mobile-strip-day {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.92;
}

.tt-mobile-strip-icons {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
}

.tt-mobile-strip-arrow {
    font-size: 14px;
    font-weight: 900;
    line-height: 1;
}

.tt-mobile-strip-moon {
    font-size: 13px;
    line-height: 1;
    filter: grayscale(100%) brightness(0%);
}

.tt-mobile-strip-time {
    font-size: 18px;
    font-weight: 900;
    line-height: 1.2;

}

.tt-mobile-strip-role {

}

.tt-mobile-strip-person {

}

.tt-mobile-strip-note {
    font-size: 11px;
    margin-top: 6px;
    opacity: 0.9;
    line-height: 1.4;
}

#shift-layer.tt-mobile-mode {
    flex-direction: column;
}

#shift-layer.tt-mobile-mode .tt-workspace {
    flex: 1;
    min-height: 0;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x pan-y;
}

.tt-mobile-pinch-host {
    display: inline-block;
    min-width: 100%;
    box-sizing: border-box;
}

#shift-layer.tt-mobile-mode .tt-canvas {
    min-width: 100%;
}

#shift-layer.tt-mobile-mode .tt-toolbar {
    padding: 6px 10px !important;
    min-height: 0 !important;
    gap: 4px !important;
}

#shift-layer.tt-mobile-mode #tt-title {
    font-size: 12px !important;
}

#shift-layer.tt-mobile-mode .tt-bottom-actions {
    flex-shrink: 0;
    padding: 6px 8px calc(6px + env(safe-area-inset-bottom)) !important;
    gap: 6px !important;
}

#shift-layer.tt-mobile-mode .tt-bottom-actions > button,
#shift-layer.tt-mobile-mode .tt-bottom-actions .btn-main,
#shift-layer.tt-mobile-mode .tt-bottom-actions .btn-outline,

}

}

#shift-layer.tt-mobile-mode .shift-handle,
#shift-layer.tt-mobile-mode .action-zone,
#shift-layer.tt-mobile-mode .shift-arrow-btn {
    display: none !important;
    pointer-events: none !important;
}

@media (max-width: 768px) and (orientation: landscape) {
    #tt-mobile-view-bar {
        padding: 6px 10px;
    }

    #tt-mobile-view-bar .btn-tab {
        padding: 7px 6px !important;
        font-size: 10px !important;
    }

    #shift-layer.tt-mobile-mode .tt-toolbar {
        padding: 4px 8px !important;
    }

    #shift-layer.tt-mobile-mode #tt-title {
        font-size: 11px !important;
    }

    #shift-layer.tt-mobile-mode .tt-bottom-actions {
        padding: 4px 6px calc(4px + env(safe-area-inset-bottom)) !important;
    }
}
