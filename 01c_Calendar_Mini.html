<script>
/**
 * 01c_Calendar_Mini.html
 * Domain: Mini Calendar (Direct Manipulation) and Context Menus.
 */

// ==========================================
// --- MINI CALENDAR (DIRECT MANIPULATION) ---
// ==========================================
// @INDEX: MINI_CALENDAR -> Mini Calendar Editor Boot
let miniClickTimer = null;
let lastMiniClickTime = 0;
let lastMiniEventClickTime = 0;
let lastMiniEventClickId = null;
let currentEditingEvent = null;
let miniCalResizeObserver = null;

function measureMiniCalendarHeight(container) {
    const wrap = container ? container.closest('.pe-mini-cal-wrap') : null;
    if (wrap && wrap.clientHeight > 100) {
        return Math.max(wrap.clientHeight - 8, 280);
    }
    const overlay = document.getElementById('edit-modal-overlay');
    if (overlay && overlay.style.display === 'flex') {
        const toolbar = overlay.querySelector('.pe-editor-toolbar-row');
        const footer = overlay.querySelector('.pe-editor-footer-row');
        const statusBar = document.getElementById('pe-checklist-status-bar');
        let used = 120;
        if (toolbar) used += toolbar.offsetHeight;
        if (footer) used += footer.offsetHeight;
        if (statusBar && statusBar.style.display !== 'none') used += statusBar.offsetHeight;
        return Math.max(window.innerHeight - used - 48, 300);
    }
    return Math.max(Math.floor(window.innerHeight * 0.45), 320);
}

function ensureMiniCalendarSize() {
    if (!miniCalendar) return;
    try {
        miniCalendar.updateSize();
    } catch (e) { /* ignore */ }
}

function attachMiniCalendarResizeObserver(container) {
    const wrap = container ? container.closest('.pe-mini-cal-wrap') : null;
    if (!wrap || typeof ResizeObserver === 'undefined') return;
    if (miniCalResizeObserver) {
        try { miniCalResizeObserver.disconnect(); } catch (e) { /* ignore */ }
    }
    miniCalResizeObserver = new ResizeObserver(function() {
        ensureMiniCalendarSize();
    });
    miniCalResizeObserver.observe(wrap);
}

function bootMiniCalendar(targetDateString, projectId) {
    const container = document.getElementById('mini-project-calendar');
    if (!container) return;

    const miniReadOnly = (typeof canPaintMiniCalendar === 'function')
      ? !canPaintMiniCalendar(projectId)
      : ((typeof isBriefingMode === 'function' && isBriefingMode(projectId))
        || (typeof canDrawPhases === 'function' && !canDrawPhases()));

    if (miniCalendar) {
        try { miniCalendar.destroy(); } catch (e) { /* ignore */ }
        miniCalendar = null;
    }
    container.innerHTML = '';

    const runBoot = function() {
        let initialDate = targetDateString;
        if (initialDate && String(initialDate).indexOf('T') > 0) {
            initialDate = String(initialDate).split('T')[0];
        }
        if (!initialDate) initialDate = new Date();

        const calHeight = measureMiniCalendarHeight(container);

        miniCalendar = new FullCalendar.Calendar(container, {
            initialView: 'dayGridMonth',
            initialDate: initialDate,
            headerToolbar: {
                left: 'title',
                right: 'prev,next'
            },
            height: calHeight,
            expandRows: true,

            selectable: false,
            editable: !miniReadOnly,
            eventDurationEditable: !miniReadOnly,
            eventResizableFromStart: !miniReadOnly,
            eventDisplay: 'block',
            eventLongPressDelay: 250,

            eventContent: function(arg) {
                let title = arg.event.title;
                let note = arg.event.extendedProps.note || '';
                let html = `<div style="position: relative; display:flex; justify-content:space-between; width:100%; height:100%; align-items:center; padding:0 2px; box-sizing: border-box; overflow: hidden;">
                               <span style="font-weight:900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: relative; z-index: 2;">${title}</span>
                               <span style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 0.85em; font-style:italic; opacity:0.9; pointer-events:none; white-space: nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 60%; text-align:center; z-index: 1;">${note}</span>
                            </div>`;
                return { html: html };
            },

            dateClick: function(info) {
                closeEventMenu();

                let now = new Date().getTime();
                if (now - lastMiniClickTime < 300) {
                    clearTimeout(miniClickTimer);

                    let phase = (typeof defaultMiniCalPhase === 'function') ? defaultMiniCalPhase() : 'main';
                    const allowed = (typeof allowedMiniCalPhases === 'function') ? allowedMiniCalPhases() : ['main', 'show', 'wh', 'recovery', 'transit'];
                    if (allowed.indexOf(phase) === -1) phase = allowed[0];

                    miniCalendar.addEvent({
                        id: 'mc_' + Date.now() + Math.random(),
                        title: PAINT_COLORS[phase].title,
                        start: info.dateStr,
                        classNames: ['paint-' + phase],
                        extendedProps: { phaseType: phase, note: '', startTime: '00:00', endTime: '23:59' },
                        allDay: true
                    });
                } else {
                    lastMiniClickTime = now;
                    miniClickTimer = setTimeout(function() {}, 300);
                }
            },

            eventClick: function(info) {
                info.jsEvent.preventDefault();
                info.jsEvent.stopPropagation();

                let now = Date.now();
                if (lastMiniEventClickId === info.event.id && now - lastMiniEventClickTime < 300) {
                    closeEventMenu();
                    openMiniNoteModal(info.event, info.el);
                    return;
                }
                lastMiniEventClickTime = now;
                lastMiniEventClickId = info.event.id;

                currentEditingEvent = info.event;

                const menu = document.getElementById('event-context-menu');
                if (typeof applyMiniPhaseMenuVisibility === 'function') applyMiniPhaseMenuVisibility();
                menu.style.display = 'block';

                menu.style.left = info.jsEvent.clientX + 'px';
                menu.style.top = (info.jsEvent.clientY + 10) + 'px';
            },

            eventDragStart: function() { closeEventMenu(); },
            eventResizeStart: function() { closeEventMenu(); },
            eventDrop: function() {
                window.isProjectDirty = true;
                closeEventMenu();
            },
            eventResize: function() {
                window.isProjectDirty = true;
                closeEventMenu();
            }
        });

        miniCalendar.render();
        attachMiniCalendarResizeObserver(container);
        ensureMiniCalendarSize();
        requestAnimationFrame(ensureMiniCalendarSize);
        setTimeout(ensureMiniCalendarSize, 80);
        setTimeout(ensureMiniCalendarSize, 250);

        if (projectId && projectId !== 'NEW' && typeof calendar !== 'undefined') {
            let projectEvent = calendar.getEventById(projectId);
            if (!projectEvent) {
                projectEvent = calendar.getEvents().find(function(e) {
                    return e.id === projectId || (e.extendedProps && e.extendedProps.rawDbData && e.extendedProps.rawDbData.id === String(projectId));
                });
            }

            if (projectEvent && projectEvent.extendedProps.rawDbData) {
                let raw = projectEvent.extendedProps.rawDbData;

                if (raw.fragments) {
                    let typeMap = { 'WAREHOUSE': 'wh', 'MAIN_EVENT': 'main', 'SHOW_DAY': 'show', 'RECOVERY': 'recovery', 'TRANSIT': 'transit' };
                    let sortedFrags = raw.fragments.sort(function(a, b) { return String(a.date || '').localeCompare(String(b.date || '')); });
                    let blocks = [];

                    sortedFrags.forEach(function(f) {
                        if (!f.date) return;
                        let uiType = typeMap[f.type] || 'main';
                        let startStr = f.date;
                        let dEnd = new Date(f.date + 'T00:00:00');
                        dEnd.setDate(dEnd.getDate() + 1);
                        let endStr = dEnd.getFullYear() + '-' + String(dEnd.getMonth() + 1).padStart(2, '0') + '-' + String(dEnd.getDate()).padStart(2, '0');

                        let lastBlock = blocks.find(function(b) { return b.type === uiType && b.endStr === startStr && b.note === (f.note || ''); });
                        if (lastBlock) lastBlock.endStr = endStr;
                        else blocks.push({ type: uiType, startStr: startStr, endStr: endStr, note: f.note || '', startTime: f.startTime || '00:00', endTime: f.endTime || '23:59' });
                    });

                    blocks.forEach(function(b) {
                        miniCalendar.addEvent({
                            id: 'mc_' + Date.now() + Math.random(),
                            title: PAINT_COLORS[b.type] ? PAINT_COLORS[b.type].title : b.type,
                            start: b.startStr,
                            end: b.endStr,
                            classNames: ['paint-' + b.type],
                            extendedProps: { phaseType: b.type, note: b.note, startTime: b.startTime, endTime: b.endTime },
                            allDay: true,
                            display: 'block'
                        });
                    });
                    ensureMiniCalendarSize();
                }
            }
        }
    };

    requestAnimationFrame(function() {
        requestAnimationFrame(runBoot);
    });
}

window.ensureMiniCalendarSize = ensureMiniCalendarSize;

// ==========================================
// --- CONTEXT MENU & KEYBOARD LOGIC ---
// ==========================================
function closeEventMenu() {
    const menu = document.getElementById('event-context-menu');
    if (menu) menu.style.display = 'none';
    setTimeout(function() { currentEditingEvent = null; }, 100);
}

window.applyMiniPhaseMenuVisibility = function() {
  const menu = document.getElementById('event-context-menu');
  if (!menu) return;
  const allowed = (typeof allowedMiniCalPhases === 'function') ? allowedMiniCalPhases() : ['main', 'show', 'wh', 'recovery', 'transit'];
  menu.querySelectorAll('[data-mini-phase]').forEach(function(btn) {
    const phase = btn.getAttribute('data-mini-phase');
    btn.style.display = (phase === 'delete' || allowed.indexOf(phase) !== -1) ? '' : 'none';
  });
};

window.updateEventTime = function(type, val) {
    window.isProjectDirty = true;
    if (!currentEditingEvent) return;
    if (type === 'start') currentEditingEvent.setExtendedProp('startTime', val);
    if (type === 'end') currentEditingEvent.setExtendedProp('endTime', val);
};

document.addEventListener('click', function(e) {
    if (!e.target.closest('.fc-event') && !e.target.closest('#event-context-menu')) {
        closeEventMenu();
    }
});

function updateEventPhase(newPhase) {
    window.isProjectDirty = true;
    if (!currentEditingEvent) return;

    const allowed = (typeof allowedMiniCalPhases === 'function') ? allowedMiniCalPhases() : ['main', 'show', 'wh', 'recovery', 'transit'];
    if (newPhase !== 'delete' && allowed.indexOf(newPhase) === -1) return;

    if (newPhase === 'delete') {
        currentEditingEvent.remove();
    } else {
        currentEditingEvent.setExtendedProp('phaseType', newPhase);
        currentEditingEvent.setProp('title', PAINT_COLORS[newPhase] ? PAINT_COLORS[newPhase].title : newPhase);
        currentEditingEvent.setProp('classNames', ['paint-' + newPhase]);
    }

    closeEventMenu();
}

document.addEventListener('keydown', function(e) {
    if ((e.key === 'Delete' || e.key === 'Backspace') && currentEditingEvent) {
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
            window.isProjectDirty = true;
            e.preventDefault();
            currentEditingEvent.remove();
            closeEventMenu();
        }
    }
});

// ==========================================
// --- INLINE MINI CALENDAR NOTE ENGINE ---
// ==========================================
function openMiniNoteModal(eventObj, el) {
    if (el.querySelector('.inline-note-input')) return;

    let currentNote = eventObj.extendedProps.note || "";
    let input = document.createElement('input');
    input.type = 'text';
    input.value = currentNote;
    input.className = 'inline-note-input';
    input.placeholder = "Enter note...";

    input.style.cssText = 'position:absolute; top:-2px; left:-2px; width:calc(100% + 4px); min-width:150px; height:calc(100% + 4px); min-height: 28px; z-index:1000; background:rgba(20,20,24,0.98); color:#fff; border:2px solid var(--accent, #a855f7); padding:0 8px; font-size:12px; box-sizing:border-box; border-radius:4px; outline:none; box-shadow: 0 8px 24px rgba(0,0,0,0.8); pointer-events: auto !important; cursor: text; transition: all 0.2s;';

    el.appendChild(input);

    setTimeout(function() {
        if (document.body.contains(input)) {
            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);
            input.addEventListener('blur', commitNote);
        }
    }, 100);

    const commitNote = function() {
        if (!document.body.contains(input)) return;
        eventObj.setExtendedProp('note', input.value.trim());
        input.remove();
    };

    input.addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter') input.blur();
        else if (ev.key === 'Escape') { input.value = currentNote; input.blur(); }
        ev.stopPropagation();
    });
}
</script>
