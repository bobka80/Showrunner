<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0c">
  <title>Showrunner — Scan QR</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0a0a0c;
      color: #f4f4f5;
      font-family: Inter, system-ui, sans-serif;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
      padding: calc(12px + env(safe-area-inset-top)) 12px calc(12px + env(safe-area-inset-bottom));
      gap: 12px;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .title {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #fb923c;
    }
    .btn-back {
      border: 1px solid #444;
      background: transparent;
      color: #a1a1aa;
      font-size: 11px;
      font-weight: 800;
      padding: 10px 12px;
      border-radius: 8px;
      touch-action: manipulation;
    }
    #qr-reader {
      flex: 1;
      min-height: 240px;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      border: 1px solid #f97316;
      position: relative;
    }
    #qr-reader video {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }
    #qr-start {
      width: 100%;
      padding: 20px 16px;
      border: 2px solid #f97316;
      border-radius: 12px;
      background: #18181b;
      color: #fb923c;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.06em;
      touch-action: manipulation;
    }
    #qr-status {
      font-size: 12px;
      color: #a1a1aa;
      text-align: center;
      min-height: 18px;
    }
    #qr-last {
      font-size: 13px;
      font-weight: 700;
      color: #10b981;
      text-align: center;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <span class="title">SHOWRUNNER SCAN</span>
      <button type="button" class="btn-back" id="btn-back">BACK</button>
    </div>
    <div id="qr-reader"></div>
    <button type="button" id="qr-start">TAP TO START CAMERA</button>
    <div id="qr-status">Point at an asset QR label.</div>
    <div id="qr-last"></div>
  </div>
  <script>
  (function() {
    var engine = null;
    var starting = false;
    var gotDecode = false;
    var HOST = 'https://sm-showrunner-97405.web.app';
    var params = new URLSearchParams(window.location.search);
    var isEmbed = params.get('embed') === '1';

    var iosNativeStream = null;
    var iosNativeVideo = null;
    var iosNativeTimer = null;
    var iosNativeDetector = null;
    var iosCamQueue = [];
    var iosCamIdx = 0;
    var iosCamSwitchTimer = null;
    var iosLastDecode = '';
    var iosLastDecodeTs = 0;

    function isIos() {
      return /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    }

    function setStatus(msg) {
      var el = document.getElementById('qr-status');
      if (el) el.textContent = msg || '';
    }

    function stopIosNative() {
      if (iosCamSwitchTimer) {
        clearTimeout(iosCamSwitchTimer);
        iosCamSwitchTimer = null;
      }
      if (iosNativeTimer) {
        clearInterval(iosNativeTimer);
        iosNativeTimer = null;
      }
      if (iosNativeStream) {
        try {
          iosNativeStream.getTracks().forEach(function(t) { t.stop(); });
        } catch (e) { /* ignore */ }
        iosNativeStream = null;
      }
      iosNativeVideo = null;
    }

    function stopEngine() {
      stopIosNative();
      try {
        if (engine) engine.stop().catch(function() {});
      } catch (e) { /* ignore */ }
      engine = null;
    }

    function goBack() {
      stopEngine();
      if (isEmbed && window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'SHOWRUNNER_SCAN_PAGE_CANCEL' }, '*');
        return;
      }
      if (window.history.length > 1) {
        window.history.back();
        return;
      }
      window.location.href = HOST + '/';
    }

    function saveAndReturn(text) {
      var raw = String(text == null ? '' : text).trim();
      if (!raw || gotDecode) return;
      var now = Date.now();
      if (raw === iosLastDecode && (now - iosLastDecodeTs) < 1500) return;
      gotDecode = true;
      iosLastDecode = raw;
      iosLastDecodeTs = now;
      stopEngine();
      if (isEmbed && window.parent && window.parent !== window) {
        setStatus('Scanned!');
        window.parent.postMessage({ type: 'SHOWRUNNER_SCAN_PAGE_QR', text: raw }, '*');
        return;
      }
      document.getElementById('qr-last').textContent = 'Scanned — returning…';
      setTimeout(function() {
        try {
          sessionStorage.setItem('sm_mobile_qr_pending', raw);
          localStorage.setItem('sm_mobile_qr_pending', raw);
          sessionStorage.setItem('sm_mobile_scan_reopen_panel', '1');
          localStorage.setItem('sm_mobile_scan_reopen_panel', '1');
        } catch (e) { /* ignore */ }
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = HOST + '/?srScan=' + encodeURIComponent(raw);
        }
      }, 200);
    }

    function onFail(err) {
      starting = false;
      setStatus(String(err && err.message ? err.message : err));
      document.getElementById('qr-start').style.display = 'block';
    }

    function cameraScore(cam) {
      var lab = String(cam.label || '').toLowerCase();
      if (lab.indexOf('ultra') !== -1) return 35;
      if (lab.indexOf('tele') !== -1) return 45;
      if (lab.indexOf('dual') !== -1 && lab.indexOf('ultra') === -1) return 8;
      if (lab === 'back camera' || (lab.indexOf('back') !== -1 && lab.indexOf('ultra') === -1)) return 0;
      if (lab.indexOf('wide') !== -1) return 15;
      if (lab.indexOf('back') !== -1 || lab.indexOf('rear') !== -1) return 10;
      return 25;
    }

    function buildRearCameraQueue(cams) {
      var rear = [];
      var i;
      for (i = 0; i < cams.length; i++) {
        var lab = String(cams[i].label || '').toLowerCase();
        if (lab.indexOf('front') !== -1 || lab.indexOf('selfie') !== -1) continue;
        rear.push(cams[i]);
      }
      if (!rear.length) return cams.slice();
      rear.sort(function(a, b) { return cameraScore(a) - cameraScore(b); });
      return rear;
    }

    function applyTrackTuning(track) {
      if (!track || typeof track.applyConstraints !== 'function') return;
      var caps = {};
      try { caps = track.getCapabilities ? track.getCapabilities() : {}; } catch (e) { /* ignore */ }
      var advanced = [];
      if (caps.zoom && typeof caps.zoom.max === 'number' && caps.zoom.max > 1) {
        advanced.push({ zoom: Math.min(2, Math.max(1.1, caps.zoom.max * 0.45)) });
      }
      var constraints = {
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        focusMode: 'continuous'
      };
      if (advanced.length) constraints.advanced = advanced;
      track.applyConstraints(constraints).catch(function() { /* ignore */ });
    }

    function scheduleIosCamSwitch() {
      if (iosCamSwitchTimer) {
        clearTimeout(iosCamSwitchTimer);
        iosCamSwitchTimer = null;
      }
      if (!isIos() || gotDecode || iosCamIdx >= iosCamQueue.length - 1) return;
      iosCamSwitchTimer = setTimeout(function() {
        if (gotDecode) return;
        iosCamIdx += 1;
        setStatus('Trying alternate lens…');
        startIosNativeStream(iosCamQueue[iosCamIdx]).then(function() {
          scheduleIosCamSwitch();
        }).catch(function() {
          scheduleIosCamSwitch();
        });
      }, 4000);
    }

    function startIosNativeDetectLoop() {
      if (!iosNativeDetector) {
        try {
          iosNativeDetector = new BarcodeDetector({ formats: ['qr_code'] });
        } catch (e) { return; }
      }
      if (iosNativeTimer) clearInterval(iosNativeTimer);
      iosNativeTimer = setInterval(function() {
        if (gotDecode || !iosNativeVideo || !iosNativeVideo.videoWidth) return;
        iosNativeDetector.detect(iosNativeVideo).then(function(codes) {
          if (!codes || !codes.length || !codes[0].rawValue) return;
          saveAndReturn(codes[0].rawValue);
        }).catch(function() { /* ignore */ });
      }, 180);
    }

    function startIosNativeStream(cam) {
      stopIosNative();
      var reader = document.getElementById('qr-reader');
      if (!reader) return Promise.reject(new Error('No reader'));
      reader.innerHTML = '';
      iosNativeVideo = document.createElement('video');
      iosNativeVideo.setAttribute('playsinline', 'true');
      iosNativeVideo.setAttribute('webkit-playsinline', 'true');
      iosNativeVideo.autoplay = true;
      iosNativeVideo.muted = true;
      iosNativeVideo.playsInline = true;
      reader.appendChild(iosNativeVideo);

      var videoConstraints = {
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        focusMode: 'continuous'
      };
      if (cam && cam.deviceId) {
        videoConstraints.deviceId = { exact: cam.deviceId };
      } else if (cam && cam.id) {
        videoConstraints.deviceId = { exact: cam.id };
      } else {
        videoConstraints.facingMode = 'environment';
      }

      return navigator.mediaDevices.getUserMedia({ audio: false, video: videoConstraints })
        .then(function(stream) {
          iosNativeStream = stream;
          iosNativeVideo.srcObject = stream;
          return iosNativeVideo.play();
        })
        .then(function() {
          var track = iosNativeStream && iosNativeStream.getVideoTracks
            ? iosNativeStream.getVideoTracks()[0] : null;
          applyTrackTuning(track);
          startIosNativeDetectLoop();
        });
    }

    function startIosNativeCamera() {
      if (starting || gotDecode) return;
      if (typeof BarcodeDetector === 'undefined' || !navigator.mediaDevices) {
        startHtml5QrcodeCamera();
        return;
      }
      starting = true;
      document.getElementById('qr-start').style.display = 'none';
      setStatus('Starting camera…');
      iosCamIdx = 0;
      iosCamQueue = [];

      function beginWithCams(cams) {
        iosCamQueue = buildRearCameraQueue(cams || []);
        var first = iosCamQueue[0] || null;
        return startIosNativeStream(first).then(function() {
          starting = false;
          setStatus('Point at QR — hold phone 15–20 cm away');
          scheduleIosCamSwitch();
        });
      }

      if (typeof Html5Qrcode !== 'undefined' && typeof Html5Qrcode.getCameras === 'function') {
        Html5Qrcode.getCameras().then(beginWithCams).catch(function() {
          return beginWithCams([]);
        }).catch(onFail);
        return;
      }
      if (navigator.mediaDevices.enumerateDevices) {
        navigator.mediaDevices.enumerateDevices().then(function(devs) {
          var cams = [];
          for (var i = 0; i < devs.length; i++) {
            if (devs[i].kind === 'videoinput') cams.push({ id: devs[i].deviceId, label: devs[i].label });
          }
          return beginWithCams(cams);
        }).catch(function() { return beginWithCams([]); }).catch(onFail);
        return;
      }
      beginWithCams([]).catch(onFail);
    }

    function startHtml5QrcodeCamera() {
      if (typeof Html5Qrcode === 'undefined') {
        onFail(new Error('Scanner failed to load.'));
        return;
      }
      if (engine || starting) return;
      starting = true;
      document.getElementById('qr-start').style.display = 'none';
      setStatus('Starting camera…');
      var ios = isIos();

      function scanCfg() {
        return {
          fps: ios ? 10 : 10,
          disableFlip: false,
          qrbox: ios
            ? function(w, h) { return { width: w, height: h }; }
            : function(w, h) {
              var edge = Math.floor(Math.min(w, h) * 0.72);
              return { width: Math.max(edge, 160), height: Math.max(edge, 160) };
            }
        };
      }

      function deviceCfgForId(id) {
        if (!id) return { facingMode: 'environment' };
        var cfg = { deviceId: { exact: id } };
        if (ios) {
          cfg.width = { ideal: 1920 };
          cfg.height = { ideal: 1080 };
          cfg.focusMode = 'continuous';
        }
        return cfg;
      }

      function startWithDevice(cam) {
        engine = new Html5Qrcode('qr-reader');
        return engine.start(
          deviceCfgForId(cam && (cam.id || cam.deviceId) ? (cam.id || cam.deviceId) : ''),
          scanCfg(),
          function(decoded) { saveAndReturn(decoded); },
          function() {}
        ).then(function() {
          if (ios && typeof engine.applyVideoConstraints === 'function') {
            engine.applyVideoConstraints({
              width: { ideal: 1920 },
              height: { ideal: 1080 },
              focusMode: 'continuous'
            }).catch(function() {});
          }
        });
      }

      if (typeof Html5Qrcode.getCameras === 'function') {
        Html5Qrcode.getCameras().then(function(cams) {
          var queue = ios ? buildRearCameraQueue(cams || []) : (cams || []);
          var pick = queue.length ? queue[0] : null;
          if (pick) return startWithDevice(pick);
          return startWithDevice(null);
        }).then(function() {
          starting = false;
          setStatus('Camera active');
        }).catch(function() {
          return startWithDevice(null).then(function() {
            starting = false;
            setStatus('Camera active');
          });
        }).catch(onFail);
        return;
      }

      startWithDevice(null).then(function() {
        starting = false;
        setStatus('Camera active');
      }).catch(onFail);
    }

    function startCamera() {
      if (isIos()) {
        startIosNativeCamera();
        return;
      }
      startHtml5QrcodeCamera();
    }

    document.getElementById('qr-start').addEventListener('click', startCamera);
    document.getElementById('qr-start').addEventListener('touchend', function(e) {
      e.preventDefault();
      startCamera();
    }, { passive: false });
    document.getElementById('btn-back').addEventListener('click', goBack);

    if (params.get('scan') === '1') {
      setStatus('Starting camera…');
      document.getElementById('qr-start').style.display = 'none';
      requestAnimationFrame(function() { startCamera(); });
    }
  })();
  </script>
</body>
</html>
