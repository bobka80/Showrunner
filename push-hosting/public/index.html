<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Showrunner">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>SM Showrunner</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a0a0c; overflow: hidden; font-family: Inter, system-ui, sans-serif; }
    #app-frame { width: 100%; height: 100%; border: none; display: block; }
    #push-enable-banner {
      position: fixed; left: 50%; top: 12px; transform: translateX(-50%); z-index: 10000;
      background: rgba(24,24,27,0.96); border: 1px solid #10b981; color: #f4f4f5;
      font-size: 12px; line-height: 1.4; padding: 12px 14px; border-radius: 8px;
      max-width: 360px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center;
    }
    #push-enable-banner p { margin: 0 0 10px 0; color: #a1a1aa; font-size: 11px; }
    #push-enable-btn {
      background: rgba(16,185,129,0.25); border: 1px solid #10b981; color: #fff;
      font-weight: 800; font-size: 11px; letter-spacing: 0.04em; padding: 10px 14px;
      border-radius: 6px; cursor: pointer; text-transform: uppercase;
    }
    #push-enable-btn:hover { background: rgba(16,185,129,0.45); }
    #push-enable-banner.hidden { display: none; }
    #push-ios-banner {
      position: fixed; left: 50%; top: 12px; transform: translateX(-50%); z-index: 10001;
      background: rgba(24,24,27,0.98); border: 1px solid #f59e0b; color: #f4f4f5;
      font-size: 12px; line-height: 1.45; padding: 14px 16px; border-radius: 8px;
      max-width: 340px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    #push-ios-banner.hidden { display: none; }
  </style>
</head>
<body>
  <div id="push-ios-banner" class="hidden">
    <div style="color:#f59e0b; font-weight:900; font-size:11px; margin-bottom:8px;">IPHONE SETUP</div>
    <p style="margin:0; color:#a1a1aa; font-size:11px;">To get schedule alerts on iPhone: in Safari tap <strong>Share</strong> → <strong>Add to Home Screen</strong>, then open the <strong>Showrunner</strong> icon and allow notifications.</p>
  </div>
  <div id="push-enable-banner" class="hidden">
    <div style="color:#10b981; font-weight:900; font-size:11px; margin-bottom:6px;">SCHEDULE ALERTS</div>
    <p>Allow notifications so you get updates when your shifts or tasks change.</p>
    <button type="button" id="push-enable-btn">Allow notifications</button>
  </div>
  <iframe id="app-frame" title="SM Showrunner" allow="clipboard-read; clipboard-write"></iframe>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
  <script src="/host-boot.js?v=286"></script>
</body>
</html>
