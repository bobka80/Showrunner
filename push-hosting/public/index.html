<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a0c">
  <link rel="manifest" href="/manifest.json">
  <title>SM Showrunner</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a0a0c; overflow: hidden; }
    #app-frame { width: 100%; height: 100%; border: none; display: block; }
    #push-status {
      position: fixed; right: 8px; bottom: 8px; z-index: 9999;
      background: rgba(24,24,27,0.92); border: 1px solid #333; color: #a1a1aa;
      font: 11px/1.3 Inter, system-ui, sans-serif; padding: 6px 8px; border-radius: 6px;
      max-width: 220px; pointer-events: none;
    }
  </style>
</head>
<body>
  <iframe id="app-frame" title="SM Showrunner" allow="clipboard-read; clipboard-write"></iframe>
  <div id="push-status">Push: starting…</div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
  <script src="/host-boot.js"></script>
</body>
</html>
