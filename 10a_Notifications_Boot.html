<script>
/**
 * 10a_Notifications_Boot.html
 * Hosting shell bridge — iframe requests save; parent Hosting page calls server via JSONP.
 */

(function() {
  if (window.__srFcmBootInstalled) return;
  window.__srFcmBootInstalled = true;

  var bridgeRegistered = false;
  var bridgeInFlight = false;

  window.isShowrunnerHostingShell = (window.self !== window.top);

  function notifyParentReady() {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'SHOWRUNNER_APP_READY' }, '*');
      }
    } catch (e) { /* ignore */ }
  }

  function onBridgeRegistered(res) {
    bridgeInFlight = false;
    if (res && res.success) {
      bridgeRegistered = true;
      window.__srFcmLastError = '';
    } else {
      window.__srFcmLastError = (res && res.message) ? res.message : 'Registration failed.';
    }
    if (typeof window.onShowrunnerFcmRegistered === 'function') {
      window.onShowrunnerFcmRegistered(res || { success: false });
    }
  }

  function waitForParentSave(ms) {
    return new Promise(function(resolve) {
      var done = false;
      function onReg(ev) {
        if (!ev.data || ev.data.type !== 'SHOWRUNNER_FCM_REGISTERED') return;
        window.removeEventListener('message', onReg);
        if (!done) {
          done = true;
          resolve(ev.data);
        }
      }
      window.addEventListener('message', onReg);
      setTimeout(function() {
        window.removeEventListener('message', onReg);
        if (!done) {
          done = true;
          resolve({ success: false, message: 'Timed out — bottom-right should say “token saved”. Click RETRY.' });
        }
      }, ms || 20000);
    });
  }

  function requestTokenFromParent() {
    return new Promise(function(resolve) {
      var done = false;
      function onMsg(ev) {
        if (!ev.data || ev.data.type !== 'SHOWRUNNER_FCM_TOKEN' || !ev.data.token) return;
        window.removeEventListener('message', onMsg);
        if (!done) {
          done = true;
          resolve(ev.data.token);
        }
      }
      window.addEventListener('message', onMsg);
      try {
        window.parent.postMessage({ type: 'SHOWRUNNER_REQUEST_FCM_TOKEN' }, '*');
      } catch (e) { /* ignore */ }
      setTimeout(function() {
        window.removeEventListener('message', onMsg);
        if (!done) {
          done = true;
          resolve(null);
        }
      }, 3000);
    });
  }

  window.startFcmBridgeRegistration = function() {
    if (!window.isShowrunnerHostingShell) {
      window.__srFcmLastError = 'Not on Hosting URL (web.app).';
      return;
    }
    if (typeof ACTIVE_USER_NAME === 'undefined' || !ACTIVE_USER_NAME) {
      return;
    }
    if (bridgeRegistered || bridgeInFlight) {
      notifyParentReady();
      return;
    }

    bridgeInFlight = true;
    google.script.run
      .withFailureHandler(function(err) {
        onBridgeRegistered({ success: false, message: (err && err.message) ? err.message : String(err) });
      })
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          onBridgeRegistered(res || { success: false, message: 'Bridge setup failed.' });
          return;
        }

        requestTokenFromParent().then(function(token) {
          if (token) {
            google.script.run
              .withFailureHandler(function(err) {
                onBridgeRegistered({ success: false, message: (err && err.message) ? err.message : String(err) });
              })
              .withSuccessHandler(function(saveRes) {
                onBridgeRegistered(saveRes);
              })
              .registerFcmTokenWithBridge(ACTIVE_USER_NAME, token, res.nonce, 'web-hosting');
            return;
          }

          try {
            window.parent.postMessage({
              type: 'SHOWRUNNER_FCM_BRIDGE',
              nonce: res.nonce,
              registerUrl: res.registerUrl,
              label: 'web-hosting'
            }, '*');
          } catch (e) { /* ignore */ }

          waitForParentSave(20000).then(onBridgeRegistered);
          pollServerRegistration(30000);
        });
      })
      .prepareFcmRegistrationBridge(ACTIVE_USER_NAME);
  };

  function pollServerRegistration(ms) {
    var elapsed = 0;
    var poll = setInterval(function() {
      if (bridgeRegistered) {
        clearInterval(poll);
        return;
      }
      elapsed += 2000;
      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.registered) {
            clearInterval(poll);
            onBridgeRegistered({ success: true });
          }
        })
        .getFcmRegistrationStatus(ACTIVE_USER_NAME);
      if (elapsed >= ms) clearInterval(poll);
    }, 2000);
  }

  window.retryShowrunnerFcmBridge = function() {
    bridgeRegistered = false;
    bridgeInFlight = false;
    window.startFcmBridgeRegistration();
  };

  window.addEventListener('message', function(ev) {
    if (!ev.data) return;
    if (ev.data.type === 'SHOWRUNNER_FCM_REGISTERED') {
      onBridgeRegistered(ev.data);
    }
  });

  function bootBridge() {
    notifyParentReady();
    window.startFcmBridgeRegistration();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootBridge);
  } else {
    setTimeout(bootBridge, 300);
  }

  var retryTimer = setInterval(function() {
    if (!bridgeRegistered && !bridgeInFlight && window.isShowrunnerHostingShell) {
      window.startFcmBridgeRegistration();
    } else if (bridgeRegistered) {
      clearInterval(retryTimer);
    }
  }, 6000);

  setTimeout(function() { clearInterval(retryTimer); }, 180000);
})();
</script>
