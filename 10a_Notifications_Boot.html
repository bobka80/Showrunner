<script>
/**
 * 10a_Notifications_Boot.html
 * Sends login reg key to hosting parent (meta tags — no google.script.run required).
 */

(function() {
  if (window.__srFcmBootInstalled) return;
  window.__srFcmBootInstalled = true;

  var pushLinked = false;
  var hostSaveInFlight = false;
  window.isShowrunnerHostingShell = (window.self !== window.top);

  function getFcmRegKey() {
    var el = document.querySelector('meta[name="fcm-reg-key"]');
    var meta = (el && el.content) ? String(el.content).trim() : '';
    if (meta) return meta;
    try {
      var stored = localStorage.getItem('sr_fcm_reg_key');
      return stored ? String(stored).trim() : '';
    } catch (e) { return ''; }
  }

  function getCrewName() {
    if (typeof ACTIVE_USER_NAME !== 'undefined' && ACTIVE_USER_NAME) {
      return String(ACTIVE_USER_NAME).trim();
    }
    var el = document.querySelector('meta[name="user-name"]');
    return (el && el.content) ? String(el.content).trim() : '';
  }

  function pushFcmAuthToParent(regKey) {
    var crew = getCrewName();
    if (!regKey || !crew) return;
    try { localStorage.setItem('sr_fcm_reg_key', regKey); } catch (e) { /* ignore */ }
    postToHosting({ type: 'SHOWRUNNER_FCM_AUTH', regKey: regKey, crewName: crew });
    postToHosting({
      type: 'SHOWRUNNER_SESSION',
      regKey: regKey,
      crewName: crew,
      loggedIn: true
    });
  }

  function notifyParentLinkError(step, message) {
    if (!window.isShowrunnerHostingShell) return;
    postToHosting({
      type: 'SHOWRUNNER_FCM_LINK_ERROR',
      step: step || 'bridge',
      message: message || 'Could not reach Showrunner server from app.'
    });
  }

  function postToHosting(payload) {
    var targets = [];
    try { if (window.parent && window.parent !== window) targets.push(window.parent); } catch (e) { /* ignore */ }
    try { if (window.top && window.top !== window) targets.push(window.top); } catch (e) { /* ignore */ }
    for (var i = 0; i < targets.length; i++) {
      try { targets[i].postMessage(payload, '*'); } catch (e) { /* ignore */ }
    }
  }

  function saveTokenFromHosting(data) {
    if (pushLinked || !data || !data.token) return;
    var crew = getCrewName();
    if (!crew) return;
    if (hostSaveInFlight) return;
    hostSaveInFlight = true;
    google.script.run
      .withFailureHandler(function(err) {
        hostSaveInFlight = false;
        notifyParentLinkError('save', (err && err.message) ? err.message : 'Save failed');
      })
      .withSuccessHandler(function(res) {
        hostSaveInFlight = false;
        if (res && res.success) {
          onHostRegistered(res);
        } else {
          notifyParentLinkError('save', (res && res.message) ? res.message : 'Save rejected');
        }
      })
      .saveMyFcmDeviceToken(crew, data.token, data.label || 'pwa-mobile', data.meta ? JSON.stringify(data.meta) : '');
  }

  function requestTokenFromHosting() {
    if (!window.isShowrunnerHostingShell || pushLinked) return;
    postToHosting({ type: 'SHOWRUNNER_REQUEST_FCM_TOKEN' });
  }

  function pushSessionToParent() {
    if (!window.isShowrunnerHostingShell) return;
    var crew = getCrewName();
    if (!crew) return;
    var regKey = getFcmRegKey();
    postToHosting({
      type: 'SHOWRUNNER_SESSION',
      regKey: regKey || '',
      crewName: crew,
      loggedIn: true
    });
    if (regKey) pushFcmAuthToParent(regKey);
  }

  function notifyParentReady() {
    if (!window.isShowrunnerHostingShell) return;
    var crew = getCrewName();
    var regKey = getFcmRegKey();
    postToHosting({
      type: 'SHOWRUNNER_APP_READY',
      crewName: crew,
      regKey: regKey
    });
    if (regKey && crew) pushFcmAuthToParent(regKey);
  }

  function pushBridgeToParent() {
    var crew = getCrewName();
    if (!window.isShowrunnerHostingShell || pushLinked || !crew) return;
    google.script.run
      .withFailureHandler(function(err) {
        notifyParentLinkError('bridge', (err && err.message) ? err.message : 'Server bridge failed');
      })
      .withSuccessHandler(function(res) {
        if (!res || !res.success || !res.nonce) {
          notifyParentLinkError('bridge', (res && res.message) ? res.message : 'Bridge rejected');
          return;
        }
        postToHosting({
          type: 'SHOWRUNNER_FCM_BRIDGE',
          nonce: res.nonce,
          label: 'pwa-mobile'
        });
      })
      .prepareFcmRegistrationBridge(crew);
  }

  function respondToParentPushRequest() {
    pushSessionToParent();
    notifyParentReady();
    var regKey = getFcmRegKey();
    if (regKey) {
      pushFcmAuthToParent(regKey);
    } else {
      google.script.run
        .withFailureHandler(function(err) {
          notifyParentLinkError('issue-key', (err && err.message) ? err.message : 'Could not issue link key');
          pushBridgeToParent();
        })
        .withSuccessHandler(function(res) {
          if (res && res.success && res.regKey) {
            pushFcmAuthToParent(res.regKey);
          } else {
            notifyParentLinkError('issue-key', (res && res.message) ? res.message : 'No link key returned');
            pushBridgeToParent();
          }
        })
        .issueFcmRegistrationKey(getCrewName());
    }
  }

  function onHostRegistered(res) {
    if (res && res.success) {
      pushLinked = true;
      updatePushStatusMirror(false, '');
      postToHosting({ type: 'SHOWRUNNER_FCM_SAVE_ACK', success: true });
    }
    if (typeof window.onShowrunnerFcmRegistered === 'function') {
      window.onShowrunnerFcmRegistered(res || { success: false });
    }
  }

  function updatePushStatusMirror(needsAttention, message) {
    if (!window.isShowrunnerHostingShell || pushLinked) {
      var gone = document.getElementById('sr-push-status-mirror');
      if (gone) gone.remove();
      return;
    }
    if (!needsAttention) {
      var el = document.getElementById('sr-push-status-mirror');
      if (el) el.remove();
      return;
    }
    var bar = document.getElementById('sr-push-status-mirror');
    if (!bar) {
      bar = document.createElement('div');
      bar.id = 'sr-push-status-mirror';
      bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999998;background:#0f172a;border-bottom:1px solid #10b981;color:#a1a1aa;padding:8px 12px;font-size:11px;line-height:1.4;text-align:center;';
      document.body.appendChild(bar);
    }
    bar.textContent = message || 'Log in below if needed — alerts link automatically after login.';
  }

  window.addEventListener('message', function(ev) {
    if (!ev.data) return;
    if (ev.data.type === 'SHOWRUNNER_FCM_TOKEN') {
      saveTokenFromHosting(ev.data);
    }
    if (ev.data.type === 'SHOWRUNNER_REQUEST_FCM_AUTH' ||
        ev.data.type === 'SHOWRUNNER_REQUEST_FCM_BRIDGE') {
      respondToParentPushRequest();
    }
    if (ev.data.type === 'SHOWRUNNER_FCM_REGISTERED') {
      onHostRegistered(ev.data);
    }
    if (ev.data.type === 'SHOWRUNNER_PUSH_STATE') {
      updatePushStatusMirror(ev.data.needsAttention, ev.data.message);
    }
  });

  function bootBridge() {
    if (!window.isShowrunnerHostingShell) return;
    respondToParentPushRequest();
    requestTokenFromHosting();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootBridge);
  } else {
    setTimeout(bootBridge, 100);
  }

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible' && !pushLinked) {
      respondToParentPushRequest();
      requestTokenFromHosting();
    }
  });

  var metaBroadcast = setInterval(function() {
    if (pushLinked || !window.isShowrunnerHostingShell) {
      clearInterval(metaBroadcast);
      return;
    }
    pushSessionToParent();
    requestTokenFromHosting();
  }, 1500);

  setTimeout(function() { clearInterval(metaBroadcast); }, 600000);

  window.retryShowrunnerFcmBridge = function() {
    pushLinked = false;
    bootBridge();
  };
})();
</script>
