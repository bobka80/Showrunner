<script>
/**
 * 10a_Notifications_Boot.html
 * Hosting shell — parent supplies FCM token, iframe saves via google.script.run + nonce bridge.
 */

(function() {
  if (window.__srFcmBootInstalled) return;
  window.__srFcmBootInstalled = true;

  var bridgeRegistered = false;
  var bridgeInFlight = false;

  window.isShowrunnerHostingShell = (window.self !== window.top);

  function notifyParentReady() {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'SHOWRUNNER_APP_READY' }, '*');
      }
    } catch (e) { /* ignore */ }
  }

  function onBridgeRegistered(res) {
    if (res && res.success) {
      bridgeRegistered = true;
      window.__srFcmLastError = '';
    } else {
      window.__srFcmLastError = (res && res.message) ? res.message : 'Registration failed.';
    }
    if (typeof window.onShowrunnerFcmRegistered === 'function') {
      window.onShowrunnerFcmRegistered(res || { success: false });
    }
  }

  function saveTokenWithBridge(nonce, token) {
    google.script.run
      .withFailureHandler(function(err) {
        bridgeInFlight = false;
        onBridgeRegistered({ success: false, message: (err && err.message) ? err.message : String(err) });
      })
      .withSuccessHandler(function(res) {
        bridgeInFlight = false;
        onBridgeRegistered(res);
      })
      .registerFcmTokenWithBridge(ACTIVE_USER_NAME, token, nonce, 'web-hosting');
  }

  function requestTokenFromParent(nonce, registerUrl) {
    return new Promise(function(resolve) {
      var done = false;
      function onMsg(ev) {
        if (!ev.data || ev.data.type !== 'SHOWRUNNER_FCM_TOKEN' || !ev.data.token) return;
        window.removeEventListener('message', onMsg);
        if (!done) {
          done = true;
          resolve(ev.data.token);
        }
      }
      window.addEventListener('message', onMsg);
      try {
        window.parent.postMessage({ type: 'SHOWRUNNER_REQUEST_FCM_TOKEN' }, '*');
      } catch (e) { /* ignore */ }
      setTimeout(function() {
        window.removeEventListener('message', onMsg);
        if (!done) {
          done = true;
          resolve(null);
        }
      }, 5000);
    }).then(function(token) {
      if (token) return token;
      try {
        window.parent.postMessage({
          type: 'SHOWRUNNER_FCM_BRIDGE',
          nonce: nonce,
          registerUrl: registerUrl,
          label: 'web-hosting'
        }, '*');
      } catch (e) { /* ignore */ }
      return null;
    });
  }

  window.startFcmBridgeRegistration = function() {
    if (!window.isShowrunnerHostingShell) {
      window.__srFcmLastError = 'Open the Hosting URL (web.app), not the direct Apps Script link.';
      return;
    }
    if (typeof ACTIVE_USER_NAME === 'undefined' || !ACTIVE_USER_NAME) {
      return;
    }
    if (bridgeRegistered || bridgeInFlight) {
      notifyParentReady();
      return;
    }

    bridgeInFlight = true;
    google.script.run
      .withFailureHandler(function(err) {
        bridgeInFlight = false;
        onBridgeRegistered({ success: false, message: (err && err.message) ? err.message : String(err) });
      })
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          bridgeInFlight = false;
          onBridgeRegistered(res || { success: false, message: 'Bridge setup failed.' });
          return;
        }
        requestTokenFromParent(res.nonce, res.registerUrl).then(function(token) {
          if (token) {
            saveTokenWithBridge(res.nonce, token);
            return;
          }
          bridgeInFlight = false;
          window.__srFcmLastError = 'Hosting shell has no token yet — wait for “token ready”, then RETRY.';
          onBridgeRegistered({ success: false, message: window.__srFcmLastError });
        });
      })
      .prepareFcmRegistrationBridge(ACTIVE_USER_NAME);
  };

  window.addEventListener('message', function(ev) {
    if (!ev.data) return;
    if (ev.data.type === 'SHOWRUNNER_FCM_REGISTERED') {
      bridgeInFlight = false;
      onBridgeRegistered(ev.data);
    }
  });

  function bootBridge() {
    notifyParentReady();
    window.startFcmBridgeRegistration();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootBridge);
  } else {
    setTimeout(bootBridge, 300);
  }

  var retryTimer = setInterval(function() {
    if (!bridgeRegistered && !bridgeInFlight && window.isShowrunnerHostingShell) {
      window.startFcmBridgeRegistration();
    } else if (bridgeRegistered) {
      clearInterval(retryTimer);
    }
  }, 5000);

  setTimeout(function() { clearInterval(retryTimer); }, 180000);
})();
</script>
