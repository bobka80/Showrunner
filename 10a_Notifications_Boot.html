<script>
/**
 * 10a_Notifications_Boot.html
 * Hosting shell bridge — auto-saves FCM token when parent posts it.
 */

(function() {
  if (window.__srFcmBootInstalled) return;
  window.__srFcmBootInstalled = true;

  var thisDeviceRegistered = false;
  var saveInFlight = false;
  var lastSavedToken = '';
  var currentDeviceToken = '';
  var currentDeviceLabel = 'web-hosting';

  window.isShowrunnerHostingShell = (window.self !== window.top);

  function getFcmRegKey() {
    var el = document.querySelector('meta[name="fcm-reg-key"]');
    return (el && el.content) ? String(el.content).trim() : '';
  }

  function notifyParentReady() {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'SHOWRUNNER_APP_READY' }, '*');
      }
    } catch (e) { /* ignore */ }
  }

  function notifyParentFcmAuth() {
    if (!window.isShowrunnerHostingShell) return;
    if (typeof ACTIVE_USER_NAME === 'undefined' || !ACTIVE_USER_NAME) return;
    var regKey = getFcmRegKey();
    if (!regKey) return;
    try {
      window.parent.postMessage({
        type: 'SHOWRUNNER_FCM_AUTH',
        regKey: regKey,
        crewName: ACTIVE_USER_NAME
      }, '*');
    } catch (e) { /* ignore */ }
  }

  function notifyParentSaved() {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'SHOWRUNNER_FCM_SAVE_ACK' }, '*');
      }
    } catch (e) { /* ignore */ }
  }

  function onSaveComplete(res) {
    saveInFlight = false;
    if (res && res.success) {
      thisDeviceRegistered = true;
      window.__srFcmLastError = '';
      notifyParentSaved();
    } else {
      window.__srFcmLastError = (res && res.message) ? res.message : 'Registration failed.';
    }
    if (typeof window.onShowrunnerFcmRegistered === 'function') {
      window.onShowrunnerFcmRegistered(res || { success: false });
    }
  }

  function checkThisDeviceRegistered() {
    if (!currentDeviceToken || typeof ACTIVE_USER_NAME === 'undefined' || !ACTIVE_USER_NAME) return;
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.registered) {
          thisDeviceRegistered = true;
          lastSavedToken = currentDeviceToken;
          window.__srFcmLastError = '';
          notifyParentSaved();
          if (typeof window.onShowrunnerFcmRegistered === 'function') {
            window.onShowrunnerFcmRegistered({ success: true });
          }
        }
      })
      .isFcmTokenRegistered(ACTIVE_USER_NAME, currentDeviceToken);
  }

  function saveTokenToServer(token, label) {
    if (!token || !window.isShowrunnerHostingShell) return;
    if (typeof ACTIVE_USER_NAME === 'undefined' || !ACTIVE_USER_NAME) return;
    currentDeviceToken = token;
    if (label) currentDeviceLabel = label;
    if (thisDeviceRegistered && token === lastSavedToken) return;
    if (saveInFlight) return;

    saveInFlight = true;
    google.script.run
      .withFailureHandler(function(err) {
        onSaveComplete({ success: false, message: (err && err.message) ? err.message : String(err) });
      })
      .withSuccessHandler(function(res) {
        if (res && res.success) {
          lastSavedToken = token;
          thisDeviceRegistered = true;
        }
        onSaveComplete(res);
      })
      .saveMyFcmDeviceToken(ACTIVE_USER_NAME, token, currentDeviceLabel);
  }

  function requestTokenFromParent(timeoutMs) {
    return new Promise(function(resolve) {
      var done = false;
      function onMsg(ev) {
        if (!ev.data || ev.data.type !== 'SHOWRUNNER_FCM_TOKEN' || !ev.data.token) return;
        window.removeEventListener('message', onMsg);
        if (!done) {
          done = true;
          resolve(ev.data);
        }
      }
      window.addEventListener('message', onMsg);
      try {
        window.parent.postMessage({ type: 'SHOWRUNNER_REQUEST_FCM_TOKEN' }, '*');
      } catch (e) { /* ignore */ }
      setTimeout(function() {
        window.removeEventListener('message', onMsg);
        if (!done) {
          done = true;
          resolve(null);
        }
      }, timeoutMs || 5000);
    });
  }

  function pollParentForToken(maxMs, intervalMs) {
    var elapsed = 0;
    var interval = intervalMs || 3000;
    var max = maxMs || 180000;

    function attempt() {
      if (thisDeviceRegistered) return;
      requestTokenFromParent(5000).then(function(payload) {
        if (payload && payload.token) {
          saveTokenToServer(payload.token, payload.label);
        }
      });
      elapsed += interval;
      if (!thisDeviceRegistered && elapsed < max) {
        setTimeout(attempt, interval);
      }
    }
    attempt();
  }

  function tryJsonpBridgeFallback() {
    if (thisDeviceRegistered || saveInFlight) return;
    if (typeof ACTIVE_USER_NAME === 'undefined' || !ACTIVE_USER_NAME) return;

    google.script.run
      .withFailureHandler(function() { /* direct save + polling handles retry */ })
      .withSuccessHandler(function(res) {
        if (!res || !res.success) return;
        requestTokenFromParent(8000).then(function(payload) {
          if (!payload || !payload.token) {
            try {
              window.parent.postMessage({
                type: 'SHOWRUNNER_FCM_BRIDGE',
                nonce: res.nonce,
                registerUrl: res.registerUrl,
                label: currentDeviceLabel
              }, '*');
            } catch (e) { /* ignore */ }
            return;
          }
          saveTokenToServer(payload.token, payload.label);
          google.script.run
            .withFailureHandler(function() { /* ignore */ })
            .withSuccessHandler(onSaveComplete)
            .registerFcmTokenWithBridge(ACTIVE_USER_NAME, payload.token, res.nonce, payload.label || currentDeviceLabel);
        });
      })
      .prepareFcmRegistrationBridge(ACTIVE_USER_NAME);
  }

  window.startFcmBridgeRegistration = function() {
    if (!window.isShowrunnerHostingShell) {
      window.__srFcmLastError = 'Not on Hosting URL (web.app).';
      return;
    }
    if (typeof ACTIVE_USER_NAME === 'undefined' || !ACTIVE_USER_NAME) {
      return;
    }
    if (thisDeviceRegistered) {
      notifyParentReady();
      return;
    }

    notifyParentReady();
    notifyParentFcmAuth();
    if (currentDeviceToken) checkThisDeviceRegistered();
    pollParentForToken(180000, 3000);
    tryJsonpBridgeFallback();
    pollThisDeviceRegistration(180000);
  };

  function pollThisDeviceRegistration(ms) {
    var elapsed = 0;
    var poll = setInterval(function() {
      if (thisDeviceRegistered) {
        clearInterval(poll);
        return;
      }
      if (!currentDeviceToken) return;
      if (typeof ACTIVE_USER_NAME === 'undefined' || !ACTIVE_USER_NAME) return;
      elapsed += 3000;
      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.registered) {
            clearInterval(poll);
            thisDeviceRegistered = true;
            lastSavedToken = currentDeviceToken;
            window.__srFcmLastError = '';
            notifyParentSaved();
            if (typeof window.onShowrunnerFcmRegistered === 'function') {
              window.onShowrunnerFcmRegistered({ success: true });
            }
          }
        })
        .isFcmTokenRegistered(ACTIVE_USER_NAME, currentDeviceToken);
      if (elapsed >= ms) clearInterval(poll);
    }, 3000);
  }

  window.retryShowrunnerFcmBridge = function() {
    thisDeviceRegistered = false;
    saveInFlight = false;
    lastSavedToken = '';
    window.startFcmBridgeRegistration();
  };

  window.addEventListener('message', function(ev) {
    if (!ev.data) return;
    if (ev.data.type === 'SHOWRUNNER_FCM_TOKEN' && ev.data.token) {
      saveTokenToServer(ev.data.token, ev.data.label);
    }
    if (ev.data.type === 'SHOWRUNNER_FCM_REGISTERED') {
      onSaveComplete(ev.data);
    }
    if (ev.data.type === 'SHOWRUNNER_PARENT_TOKEN_READY') {
      if (!thisDeviceRegistered) window.startFcmBridgeRegistration();
    }
  });

  function bootBridge() {
    notifyParentReady();
    notifyParentFcmAuth();
    window.startFcmBridgeRegistration();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootBridge);
  } else {
    setTimeout(bootBridge, 300);
  }

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible' && !thisDeviceRegistered) {
      window.startFcmBridgeRegistration();
    }
  });

  var retryTimer = setInterval(function() {
    if (!thisDeviceRegistered && !saveInFlight && window.isShowrunnerHostingShell) {
      if (typeof ACTIVE_USER_NAME !== 'undefined' && ACTIVE_USER_NAME) {
        window.startFcmBridgeRegistration();
      }
    } else if (thisDeviceRegistered) {
      clearInterval(retryTimer);
    }
  }, 10000);

  setTimeout(function() { clearInterval(retryTimer); }, 600000);
})();
</script>
