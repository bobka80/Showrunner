<script>
/**
 * 10a_Notifications_Boot.html
 * Hosting shell bridge — parent page saves FCM token via secure nonce URL.
 */

(function() {
  if (window.__srFcmBootInstalled) return;
  window.__srFcmBootInstalled = true;

  var bridgeRegistered = false;

  window.isShowrunnerHostingShell = (window.self !== window.top);

  function notifyParentReady() {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'SHOWRUNNER_APP_READY' }, '*');
      }
    } catch (e) { /* ignore */ }
  }

  window.startFcmBridgeRegistration = function() {
    if (!window.isShowrunnerHostingShell) {
      window.__srFcmLastError = 'Open the Hosting URL (web.app), not the direct Apps Script link.';
      return;
    }
    if (typeof ACTIVE_USER_NAME === 'undefined' || !ACTIVE_USER_NAME) {
      return;
    }
    if (bridgeRegistered) {
      notifyParentReady();
      return;
    }

    google.script.run
      .withFailureHandler(function(err) {
        window.__srFcmLastError = (err && err.message) ? err.message : String(err);
        if (typeof window.onShowrunnerFcmRegistered === 'function') {
          window.onShowrunnerFcmRegistered({ success: false, message: window.__srFcmLastError });
        }
      })
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          window.__srFcmLastError = (res && res.message) ? res.message : 'Bridge setup failed.';
          if (typeof window.onShowrunnerFcmRegistered === 'function') {
            window.onShowrunnerFcmRegistered({ success: false, message: window.__srFcmLastError });
          }
          return;
        }
        try {
          window.parent.postMessage({
            type: 'SHOWRUNNER_FCM_BRIDGE',
            nonce: res.nonce,
            registerUrl: res.registerUrl,
            label: 'web-hosting'
          }, '*');
        } catch (e) {
          window.__srFcmLastError = 'Could not reach Hosting shell.';
        }
      })
      .prepareFcmRegistrationBridge(ACTIVE_USER_NAME);
  };

  window.addEventListener('message', function(ev) {
    if (!ev.data) return;
    if (ev.data.type === 'SHOWRUNNER_FCM_REGISTERED') {
      if (ev.data.success) {
        bridgeRegistered = true;
        window.__srFcmLastError = '';
      } else {
        window.__srFcmLastError = ev.data.message || 'Registration failed.';
      }
      if (typeof window.onShowrunnerFcmRegistered === 'function') {
        window.onShowrunnerFcmRegistered(ev.data);
      }
    }
  });

  function bootBridge() {
    notifyParentReady();
    window.startFcmBridgeRegistration();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootBridge);
  } else {
    setTimeout(bootBridge, 300);
  }

  var retryTimer = setInterval(function() {
    if (!bridgeRegistered && window.isShowrunnerHostingShell) {
      window.startFcmBridgeRegistration();
    } else {
      clearInterval(retryTimer);
    }
  }, 4000);

  setTimeout(function() { clearInterval(retryTimer); }, 180000);
})();
</script>
