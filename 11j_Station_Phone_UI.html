<!-- @INDEX: STATION -> Phone sled shell markup -->
<div id="station-shell" aria-label="Warehouse station">
  <div class="station-shell-header">
    <div class="station-shell-brand">
      <div class="station-shell-brand__line">
        <span id="station-shell-profile-name" class="station-shell-brand__device">—</span>
        <span id="station-shell-host-inline" class="station-shell-brand__host" style="display:none;"></span>
      </div>
    </div>
    <div id="station-device-controls" aria-label="Gun controls">
      <div class="station-device-controls__row">
        <button type="button" id="station-btn-scan-panel" class="station-ctrl-scan" onclick="stationToggleScanPanel()" title="Scan panel">Scan</button>
        <button type="button" id="station-btn-settings-cog" class="station-ctrl-cog" onclick="stationOpenSettings()" title="Station setup" aria-label="Settings">&#9881;</button>
      </div>
      <div id="station-scan-panel" aria-label="RFID scan panel" aria-hidden="true">
        <div class="station-scan-panel__body">
          <div id="station-scan-feed" class="station-scan-feed" aria-label="Live RFID scans" style="display:flex;flex-direction:column;flex:1;min-height:120px;">
            <div class="station-scan-feed__label">Live RFID scans</div>
            <div id="station-scan-feed-list" class="station-scan-feed__list">
              <span class="station-scan-feed__empty">Waiting for scans…</span>
            </div>
          </div>
          <div class="station-scan-panel__last" id="station-panel-last">
            <div class="station-scan-panel__last-name" id="station-panel-last-name">Scan equipment to select</div>
            <div class="station-scan-panel__last-meta" id="station-panel-last-meta"></div>
            <div class="station-scan-panel__last-status" id="station-panel-last-status"></div>
            <textarea id="station-panel-note" class="station-scan-panel__note" rows="2" placeholder="Describe the problem (required) — e.g. gobo rotation error" style="display:none;"></textarea>
            <div class="station-scan-panel__actions" id="station-panel-actions"></div>
          </div>
        </div>
      </div>
    </div>
    <button type="button" id="station-shell-layout-pill" onclick="stationOpenSettings()" title="Station setup" style="display:none;"></button>
  </div>

  <div class="station-shell-main">
    <div id="station-shell-state-label" class="station-shell-state-label">Waiting for host</div>
    <div id="station-shell-prompt" class="station-shell-prompt">Scan your crew badge</div>
    <div id="station-shell-status" class="station-shell-status" aria-hidden="true"></div>
  </div>
  <div id="station-toast" class="station-toast" aria-live="polite" aria-atomic="true"></div>

  <div class="station-shell-footer">
    <button type="button" id="station-btn-project" class="btn-main station-nav-btn" onclick="stationOpenProject()">PROJECT</button>
    <button type="button" id="station-btn-vault" class="btn-main station-nav-btn" onclick="stationOpenVault()">VAULT</button>
    <button type="button" id="station-btn-logout-host" class="btn-close" style="display:none;" onclick="stationLogoutHost()">LOG OUT HOST</button>
  </div>
</div>

<span id="station-shell-layout-text" style="display:none;">HANDHELD</span>
