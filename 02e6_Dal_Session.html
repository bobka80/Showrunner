<!-- DAL Phase 4 — prep session UI inside Project Assets (L.O. / view_logistics) -->
<script>
window.dalSessionState = { status: 'normal', sessionType: '' };
window.dalPrepUiOpen = false;
window.dalPrepLatched = false; // once true, ignore spurious "closed" until allowClose
window.dalPrepSheetsPollGen = 0;
window.dalPrepClosing = false;
window.dalPrepSessionPollTimer = null;
window.dalPrepIgnoreCloseUntil = 0;
window.dalPrepIgnoreOpenUntil = 0;
window.dalPrepClosedPollStreak = 0;
window.dalMetaSeenOpen_ = false;
window.dalMetaCloseStreak_ = 0;
window.dalMetaConfirmedOpen_ = false; // true only after server _meta with sessionType prep
// After END PREP, Sheets can lag as "open" for a long time. Do not re-latch from Sheets
// alone — wait for a new Firestore _meta (or local START). Stops ~30s banner oscillation.
window.dalPrepSheetsOpenBlocked_ = false;
// Meta went missing — wait for Sheets committing/closed (or timeout) before killing banner/live sync.
// A lone _meta blip was closing BOTH users mid-prep → sync off → fixture desync (9 vs 1).
window.dalPrepMetaEndPending_ = false;
window.dalPrepMetaEndPendingSince_ = 0;
window.dalPrepActiveSessionUid_ = '';
// After END, refuse to reopen the *same* prep sessionUid (stale _meta / lag).
// Time-only IgnoreOpenUntil (~30s) was letting the banner return → ~1 min on/off loop.
window.dalPrepEndedSessionUid_ = '';
// Part B2 — Opening warm-up (before Live latch)
window.dalPrepOpeningUi_ = false;
window.dalPrepOpeningIsStarter_ = false;
window.dalPrepOpeningPeerFrozen_ = false;
window.dalPrepOpeningUid_ = '';
window.dalPrepOpeningBy_ = '';
window.dalPrepOpeningHangTimer_ = null;
window.dalPrepOpeningFinishInFlight_ = false;
window.dalPaEntryDeltaPending_ = false;
// Durable across Opening UI clear — used so poll/finish recovery still know who started.
window.dalPrepOpeningWasStarter_ = false;
// Part B3 — peer pull-in joining cue
window.dalPrepPullInJoining_ = false;
window.dalPrepPullInJoiningUntil_ = 0;
// Part B5 — Closing cue (local END or peer Sheets committing)
window.dalPrepClosingUi_ = false;
// Part B4 stub — set true when idle T−5 fires
window.dalPrepIdleWarn_ = false;

window.dalMarkPrepPullInJoining_ = function() {
  window.dalPrepPullInJoining_ = true;
  window.dalPrepPullInJoiningUntil_ = Date.now() + 4500;
  if (typeof window.dalUpdateRemotePendingBanner_ === 'function') {
    window.dalUpdateRemotePendingBanner_();
  }
};

window.dalClearPrepPullInJoining_ = function() {
  if (!window.dalPrepPullInJoining_) return;
  window.dalPrepPullInJoining_ = false;
  window.dalPrepPullInJoiningUntil_ = 0;
  if (typeof window.dalUpdateRemotePendingBanner_ === 'function') {
    window.dalUpdateRemotePendingBanner_();
  }
};

window.dalPrepAllowRemoteOpen_ = function(sessionUid) {
  sessionUid = String(sessionUid || '');
  var ended = String(window.dalPrepEndedSessionUid_ || '');
  if (!ended) return true;
  if (sessionUid && sessionUid === ended) return false;
  // No uid on snap but we already ended — stay closed until local START or new uid.
  if (!sessionUid && window.dalPrepSheetsOpenBlocked_) return false;
  return true;
};

window.dalPrepMarkSessionEnded_ = function(projectId) {
  var uid = '';
  try {
    if (window.dalSessionState) {
      uid = String(window.dalSessionState.sessionUid || window.dalSessionState.prepUid || '');
    }
  } catch (e0) { /* ignore */ }
  if (!uid) uid = String(window.dalPrepActiveSessionUid_ || '');
  if (uid) window.dalPrepEndedSessionUid_ = uid;
  window.dalPrepActiveSessionUid_ = '';
  window.dalPrepMetaEndPending_ = false;
  window.dalPrepMetaEndPendingSince_ = 0;
  window.dalPrepSheetsOpenBlocked_ = true;
  // Sticky block — do not rely on a 30s timer (that caused minute-scale reopen loops).
  window.dalPrepIgnoreOpenUntil = Date.now() + 24 * 60 * 60 * 1000;
  window.dalMetaConfirmedOpen_ = false;
  window.dalMetaSeenOpen_ = false;
  window.dalPrepClosingUi_ = false;
  window.dalPrepClosing = false;
  window.dalClearPrepPullInJoining_();
  if (typeof dalApplyDalPrepUiState_ === 'function') {
    dalApplyDalPrepUiState_(false, projectId, { allowClose: true });
  }
};

window.dalPrepStatusFromInfo_ = function(info) {
  if (!info) return '';
  if (info.prepStatus !== undefined && info.prepStatus !== null) {
    return String(info.prepStatus || '').toLowerCase();
  }
  if (info.prep && typeof info.prep === 'object') {
    return String(info.prep.status || '').toLowerCase();
  }
  if (String(info.sessionType || '') === 'prep') {
    return String(info.status || '').toLowerCase();
  }
  return '';
};

window.dalIsPrepOpenFromInfo_ = function(info) {
  var st = window.dalPrepStatusFromInfo_(info);
  // opening/committing = still in prep lifecycle (do not clear remote UI mid-transition)
  return st === 'open' || st === 'opening' || st === 'committing';
};

window.stopDalPrepSessionPoll_ = function() {
  if (window.dalPrepSessionPollTimer) {
    clearInterval(window.dalPrepSessionPollTimer);
    window.dalPrepSessionPollTimer = null;
  }
};

/**
 * While Project Assets is open, poll prep domain for BOTH remote START and remote END.
 * Close requires grace + two consecutive closed reads so Sheets lag cannot wipe a fresh open.
 */
window.startDalPrepSessionPoll_ = function(projectId) {
  if (!projectId || projectId === 'NEW') return;
  if (window.dalPrepSessionPollTimer) return;

  var tick = function() {
    if (window.dalPrepClosing) return;
    // Stop only when PA session watcher left this project.
    if (window.dalPaSessionWatchProjectId && window.dalPaSessionWatchProjectId !== String(projectId)) {
      window.stopDalPrepSessionPoll_();
      return;
    }
    google.script.run
      .withFailureHandler(function() { /* keep current */ })
      .withSuccessHandler(function(info) {
        if (window.dalPrepClosing) return;
        if (window.dalPaSessionWatchProjectId && window.dalPaSessionWatchProjectId !== String(projectId)) return;

        if (window.dalIsPrepOpenFromInfo_(info)) {
          var stOpen = window.dalPrepStatusFromInfo_(info);
          // Peer END: _meta already gone (pending) and/or Sheets committing.
          if (stOpen === 'committing' && (window.dalPrepUiOpen || window.dalPrepLatched || window.dalPrepMetaEndPending_)) {
            window.dalPrepClosingUi_ = true;
            if (typeof window.dalUpdateRemotePendingBanner_ === 'function') {
              window.dalUpdateRemotePendingBanner_();
            }
            if (Date.now() < (window.dalPrepIgnoreCloseUntil || 0) && !window.dalPrepMetaEndPending_) return;
            window.dalPrepClosedPollStreak = (window.dalPrepClosedPollStreak || 0) + 1;
            if (window.dalPrepClosedPollStreak < 2 && !window.dalPrepMetaEndPending_) return;
            window.dalPrepClosedPollStreak = 0;
            window.dalPrepMarkSessionEnded_(projectId);
            return;
          }
          // Meta deleted but Sheets still lagging as "open" — end after short settle (real END).
          if (window.dalPrepMetaEndPending_ && window.dalPrepMetaEndPendingSince_ &&
              (Date.now() - window.dalPrepMetaEndPendingSince_) > 8000) {
            window.dalPrepMarkSessionEnded_(projectId);
            return;
          }
          window.dalPrepClosedPollStreak = 0;
          window.dalPrepOpeningClosedStreak_ = 0;
          if (Date.now() < (window.dalPrepIgnoreOpenUntil || 0)) return;
          if (window.dalPrepSheetsOpenBlocked_) return;
          if (!window.dalPrepUiOpen && !window.dalPrepLatched) {
            if (stOpen === 'committing') return;
            if (stOpen === 'opening') {
              window.dalApplyPrepOpeningUi_(true, info);
              return;
            }
            var wasStarterLatch = !!window.dalPrepOpeningWasStarter_ || !!window.dalPrepOpeningIsStarter_;
            if (window.dalPrepOpeningUi_) window.dalApplyPrepOpeningUi_(false);
            window.dalApplyDalPrepUiState_(true, projectId, {
              invalidateCache: !wasStarterLatch,
              localOpen: wasStarterLatch
            });
            if (wasStarterLatch) {
              window.dalPaEntryDeltaPending_ = true;
              setTimeout(function() {
                if (typeof window.dalPaFlushStarterEntryDelta_ === 'function') {
                  window.dalPaFlushStarterEntryDelta_();
                }
              }, 600);
            }
          } else if (window.dalPrepOpeningUi_ && stOpen === 'open') {
            var wasStarterOpen = !!window.dalPrepOpeningWasStarter_ || !!window.dalPrepOpeningIsStarter_;
            window.dalApplyPrepOpeningUi_(false);
            if (!window.dalPrepUiOpen) {
              window.dalApplyDalPrepUiState_(true, projectId, {
                invalidateCache: !wasStarterOpen,
                localOpen: wasStarterOpen
              });
              if (wasStarterOpen) {
                window.dalPaEntryDeltaPending_ = true;
                setTimeout(function() {
                  if (typeof window.dalPaFlushStarterEntryDelta_ === 'function') {
                    window.dalPaFlushStarterEntryDelta_();
                  }
                }, 600);
              }
            }
          }
          return;
        }

        // Sheets says closed.
        if (window.dalPrepOpeningUi_) {
          window.dalPrepOpeningClosedStreak_ = (window.dalPrepOpeningClosedStreak_ || 0) + 1;
          if (window.dalPrepOpeningClosedStreak_ < 2) return;
          window.dalPrepOpeningClosedStreak_ = 0;
          window.dalApplyPrepOpeningUi_(false);
        }
        if (!window.dalPrepUiOpen && !window.dalPrepLatched) {
          window.dalPrepClosedPollStreak = 0;
          if (window.dalPrepMetaEndPending_) window.dalPrepMarkSessionEnded_(projectId);
          return;
        }
        // While Firestore _meta still confirms prep, ignore flaky Sheets "closed" (both users
        // were getting kicked out mid-prep → live sync stopped → adds never reached peer).
        if (window.dalMetaConfirmedOpen_ && !window.dalPrepMetaEndPending_) {
          window.dalPrepClosedPollStreak = 0;
          return;
        }
        if (Date.now() < (window.dalPrepIgnoreCloseUntil || 0)) return;
        window.dalPrepClosedPollStreak = (window.dalPrepClosedPollStreak || 0) + 1;
        if (window.dalPrepClosedPollStreak < 2) return;
        window.dalPrepClosedPollStreak = 0;
        window.dalPrepMarkSessionEnded_(projectId);
      })
      .getDalSessionInfo(projectId);
  };
  tick();
  window.dalPrepSessionPollTimer = setInterval(tick, 2500);
};

window.dalApplyDalPrepUiState_ = function(isPrepOpen, projectId, opts) {
  opts = opts || {};
  projectId = projectId || (document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '');
  var banner = document.getElementById('dal-session-banner');
  var startBtn = document.getElementById('dal-prep-start-btn');
  var endBtn = document.getElementById('dal-prep-end-btn');
  // Freelancers never latch onto live fork UI (stay Sheets-normal).
  if (isPrepOpen && !opts.localOpen && typeof window.dalMayJoinLiveFork_ === 'function' && !window.dalMayJoinLiveFork_()) {
    isPrepOpen = false;
  }
  var canShow = window.dalCanShowPrepButtons();
  isPrepOpen = !!isPrepOpen;

  // After remote END, block reopen from lagging Sheets / stale _meta (same sessionUid).
  // Local START: localOpen. Remote START from Firestore: fromMeta with a *new* sessionUid.
  if (isPrepOpen && !opts.localOpen && !opts.fromMeta) {
    if (window.dalPrepSheetsOpenBlocked_) return;
    if (Date.now() < (window.dalPrepIgnoreOpenUntil || 0)) return;
    if (!window.dalPrepAllowRemoteOpen_(opts.sessionUid || '')) return;
  } else if (isPrepOpen && opts.localOpen) {
    window.dalPrepEndedSessionUid_ = '';
    window.dalPrepSheetsOpenBlocked_ = false;
    window.dalPrepIgnoreOpenUntil = 0;
  } else if (isPrepOpen && opts.fromMeta) {
    if (!window.dalPrepAllowRemoteOpen_(opts.sessionUid || '')) return;
    window.dalPrepEndedSessionUid_ = '';
    window.dalPrepSheetsOpenBlocked_ = false;
    window.dalPrepIgnoreOpenUntil = 0;
  }

  // Latch: once prep is known-open, ignore spurious "closed" (Sheets lag / cache / auth blips)
  // unless this call explicitly allows close (END PREP or server-confirmed close).
  if (!isPrepOpen && window.dalPrepLatched && !opts.allowClose) {
    isPrepOpen = true;
  }

  if (!canShow) {
    if (banner) banner.style.display = 'none';
    if (startBtn) startBtn.style.display = 'none';
    if (endBtn) endBtn.style.display = 'none';
    var hidePanel = document.getElementById('pa-prep-live-panel');
    if (hidePanel) hidePanel.style.display = 'none';
    return;
  }

  if (isPrepOpen) window.dalPrepLatched = true;
  else window.dalPrepLatched = false;

  var changed = window.dalPrepUiOpen !== isPrepOpen;
  window.dalPrepUiOpen = isPrepOpen;

  // Part B3 — peer soft pull-in (already on PA, someone else opened Live).
  if (isPrepOpen && changed && !opts.localOpen) {
    opts.softPullIn = true;
    window.dalMarkPrepPullInJoining_();
  }
  if (!isPrepOpen && (changed || opts.allowClose)) {
    window.dalClearPrepPullInJoining_();
  }
  if (isPrepOpen && changed) {
    if (typeof window.dalTouchRoomIdle_ === 'function') window.dalTouchRoomIdle_('prep');
  }
  if (!isPrepOpen && (changed || opts.allowClose)) {
    if (typeof window.dalClearRoomIdle_ === 'function') window.dalClearRoomIdle_('prep');
  }

  // Top banner retired — vault orange panel is the prep status surface.
  if (banner) {
    banner.style.display = 'none';
    banner.textContent = '';
  }
  if (typeof window.dalUpdateRemotePendingBanner_ === 'function') {
    window.dalUpdateRemotePendingBanner_();
  }
  if (startBtn) {
    var mayManual = typeof window.dalMayManualStartFork_ === 'function'
      ? window.dalMayManualStartFork_('prep')
      : canShow;
    startBtn.style.display = (!isPrepOpen && mayManual) ? 'inline-flex' : 'none';
  }
  if (endBtn) endBtn.style.display = isPrepOpen ? 'inline-flex' : 'none';

  if (isPrepOpen && projectId) {
    if (changed) {
      // After a fresh open (local or remote), do not let lagging Sheets OR empty _meta
      // snaps clear the banner while snapshot/_meta write catches up.
      window.dalPrepIgnoreCloseUntil = Date.now() + 30000;
      window.dalPrepClosedPollStreak = 0;
      window.dalMetaCloseStreak_ = 0;
      window.dalPrepIgnoreOpenUntil = 0;
    }
    // Soft pull-in: stay on current PA list — do not flash-invalidate cache.
    if ((opts.invalidateCache || changed) && !opts.softPullIn) {
      if (typeof window.dalCacheInvalidatePa_ === 'function') window.dalCacheInvalidatePa_(projectId);
      else try { localStorage.removeItem('sm_pa_cache_' + projectId); } catch (e) {}
    }
    if (typeof startDalPaLiveSync_ === 'function') startDalPaLiveSync_(projectId);
    window.startDalPrepSessionPoll_(projectId);
  } else if (changed || opts.allowClose) {
    // Keep poll running while PA is open so remote START PREP can still latch this browser.
    if (typeof stopDalPaLiveSync_ === 'function') stopDalPaLiveSync_();
    window.dalPaBannerLastText_ = '';
    window.dalMetaSeenOpen_ = false;
    window.dalMetaConfirmedOpen_ = false;
    window.dalMetaCloseStreak_ = 0;
    window.dalPrepMetaEndPending_ = false;
    window.dalPrepMetaEndPendingSince_ = 0;
    // Leaving prep UI → do not let lagging Sheets "open" flip the banner back on.
    if (changed) window.dalPrepSheetsOpenBlocked_ = true;
    if (typeof window.dalUpdateRemotePendingBanner_ === 'function') {
      window.dalUpdateRemotePendingBanner_();
    }
  }
  if (changed && typeof window.refreshCalForkFlagsNow_ === 'function') {
    if (!isPrepOpen && typeof window.calOptimisticClearFork_ === 'function') {
      window.calOptimisticClearFork_(projectId, 'prep');
    }
    window.refreshCalForkFlagsNow_();
  }
};

window.dalCanShowPrepButtons = function() {
  if (typeof window.dalIsLiveForkExcluded_ === 'function' && window.dalIsLiveForkExcluded_()) return false;
  if (typeof canOpenDalPrep === 'function' && !canOpenDalPrep()) {
    // Station host can still END/START via hosted actor even if device role lacks view_logistics.
    if (!(window.IS_STATION_DEVICE && typeof window.stationHostActive_ === 'function' && window.stationHostActive_())) {
      return false;
    }
  }
  if (window.projectAssetsReadOnly) return false;
  var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
  return !!(projectId && projectId !== 'NEW');
};

window.dalPaApplyOpeningFreeze_ = function(frozen) {
  if (typeof window.dalPaApplySyncBlockedUi_ === 'function') {
    window.dalPaApplySyncBlockedUi_(!!frozen);
  }
};

window.dalClearPrepOpeningHang_ = function() {
  if (window.dalPrepOpeningHangTimer_) {
    try { clearTimeout(window.dalPrepOpeningHangTimer_); } catch (eH) { /* ignore */ }
    window.dalPrepOpeningHangTimer_ = null;
  }
};

window.dalArmPrepOpeningHang_ = function(projectId, sessionUid, actor) {
  window.dalClearPrepOpeningHang_();
  var hangMs = Number(window.DAL_OPENING_HANG_MS_ || 50000);
  window.dalPrepOpeningHangTimer_ = setTimeout(function() {
    window.dalPrepOpeningHangTimer_ = null;
    if (!window.dalPrepOpeningUi_) return;
    if (window.dalPrepUiOpen) return;
    window.dalHandlePrepOpeningHang_(projectId, sessionUid, actor);
  }, hangMs);
};

window.dalHandlePrepOpeningHang_ = function(projectId, sessionUid, actor) {
  if (!window.dalPrepOpeningUi_) return;
  if (window.dalPrepOpeningIsStarter_) {
    if (window.dalPrepOpeningFinishInFlight_) {
      alert('Snapshot is still running — wait a moment, then retry if it stays stuck.');
      window.dalArmPrepOpeningHang_(projectId, sessionUid, actor);
      return;
    }
    var retry = confirm(
      'Live session is still starting…\n\nOK = Retry snapshot\nCancel = Abort opening'
    );
    if (retry) {
      window.dalPrepFinishOpen_(projectId, sessionUid, actor, null, { auto: true });
    } else {
      window.dalAbortPrepOpening_(projectId, actor);
    }
    return;
  }
  if (typeof window.dalMayTakeOverOpening_ === 'function' && window.dalMayTakeOverOpening_('prep')) {
    if (confirm('Opening is stuck. Take over and restart live preparation?')) {
      window.openDalPrepSession({ auto: true, takeOver: true });
    }
  }
};

window.dalAbortPrepOpening_ = function(projectId, actor) {
  window.dalClearPrepOpeningHang_();
  google.script.run
    .withFailureHandler(function(err) {
      window.dalApplyPrepOpeningUi_(false);
      alert('Abort opening failed:\n\n' + dalPrepErrMsg_(err));
    })
    .withSuccessHandler(function() {
      window.dalApplyPrepOpeningUi_(false);
    })
    .closeDalSession(
      projectId,
      actor || (typeof window.dalActorName_ === 'function' ? window.dalActorName_() : 'System'),
      'prep'
    );
};

/**
 * Part B2 Opening warm-up — show "Starting live session…" without latching Live sync yet.
 * Starter stays editable; peers freeze.
 */
window.dalApplyPrepOpeningUi_ = function(active, info) {
  info = info || {};
  if (active && typeof window.dalMayJoinLiveFork_ === 'function' && !window.dalMayJoinLiveFork_()) {
    active = false;
  }
  var startBtn = document.getElementById('dal-prep-start-btn');
  var endBtn = document.getElementById('dal-prep-end-btn');
  if (!active) {
    window.dalClearPrepOpeningHang_();
    window.dalPrepOpeningUi_ = false;
    window.dalPrepOpeningIsStarter_ = false;
    window.dalPrepOpeningUid_ = '';
    window.dalPrepOpeningBy_ = '';
    if (window.dalPrepOpeningPeerFrozen_) {
      window.dalPrepOpeningPeerFrozen_ = false;
      window.dalPaApplyOpeningFreeze_(false);
    }
    if (typeof window.dalUpdateRemotePendingBanner_ === 'function') {
      window.dalUpdateRemotePendingBanner_();
    }
    return;
  }

  var openedBy = info.prepOpenedBy || info.openedBy || window.dalPrepOpeningBy_ || '';
  var uid = info.prepUid || info.sessionUid || window.dalPrepOpeningUid_ || '';
  var isStarter = typeof window.dalIsSessionStarter_ === 'function'
    ? window.dalIsSessionStarter_(openedBy)
    : false;
  // Local begin before openedBy lands on poll — treat as starter.
  if (!openedBy && window.dalPrepOpeningIsStarter_) isStarter = true;

  window.dalPrepOpeningUi_ = true;
  window.dalPrepOpeningBy_ = openedBy;
  window.dalPrepOpeningUid_ = uid;
  window.dalPrepOpeningIsStarter_ = isStarter;

  if (startBtn) startBtn.style.display = 'none';
  if (endBtn && window.dalCanShowPrepButtons()) endBtn.style.display = 'inline-flex';

  if (!isStarter) {
    if (!window.dalPrepOpeningPeerFrozen_) {
      window.dalPrepOpeningPeerFrozen_ = true;
      window.dalPaApplyOpeningFreeze_(true);
    }
  } else if (window.dalPrepOpeningPeerFrozen_) {
    window.dalPrepOpeningPeerFrozen_ = false;
    window.dalPaApplyOpeningFreeze_(false);
  }

  if (typeof window.dalUpdateRemotePendingBanner_ === 'function') {
    window.dalUpdateRemotePendingBanner_();
  }
  var projectId = document.getElementById('edit-folder-id')
    ? document.getElementById('edit-folder-id').value : '';
  if (projectId) window.startDalPrepSessionPoll_(projectId);
  // Peer hang / take-over — arm once.
  if (!isStarter && !window.dalPrepOpeningHangTimer_ && projectId) {
    var actorHang = typeof window.dalActorName_ === 'function' ? window.dalActorName_() : '';
    window.dalArmPrepOpeningHang_(projectId, uid, actorHang);
  }
};

/**
 * Sheets session check — open can latch ON; close only via allowClose paths (poll / meta / END PREP).
 */
window.refreshDalSessionBanner = function() {
  var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
  if (!window.dalCanShowPrepButtons()) {
    if (!window.dalPrepLatched) window.dalApplyDalPrepUiState_(false, projectId, { allowClose: true });
    return;
  }

  // Already open — keep UI and ensure close/open poll is running.
  if (window.dalPrepLatched || window.dalPrepUiOpen) {
    window.dalApplyDalPrepUiState_(true, projectId);
    return;
  }

  var gen = ++window.dalPrepSheetsPollGen;
  google.script.run
    .withFailureHandler(function() { /* keep current UI */ })
    .withSuccessHandler(function(info) {
      if (gen !== window.dalPrepSheetsPollGen) return;
      if (window.dalPrepClosing) return;
      window.dalSessionState = info || {};
      if (window.dalIsPrepOpenFromInfo_(info)) {
        if (window.dalPrepSheetsOpenBlocked_) return;
        if (Date.now() < (window.dalPrepIgnoreOpenUntil || 0)) return;
        var stRefresh = window.dalPrepStatusFromInfo_(info);
        if (stRefresh === 'opening') {
          window.dalApplyPrepOpeningUi_(true, info);
          return;
        }
        if (stRefresh === 'committing') return;
        if (window.dalPrepOpeningUi_) window.dalApplyPrepOpeningUi_(false);
        window.dalApplyDalPrepUiState_(true, projectId, { invalidateCache: true });
      } else if (!window.dalPrepLatched) {
        if (window.dalPrepOpeningUi_) window.dalApplyPrepOpeningUi_(false);
        window.dalApplyDalPrepUiState_(false, projectId, { allowClose: true });
      }
    })
    .getDalSessionInfo(projectId);
};

function dalPrepErrMsg_(err) {
  var msg = (err && err.message) ? String(err.message) : String(err || 'Unknown error');
  if (msg.indexOf('Database Lockout') === 0) {
    msg = msg.replace(/^Database Lockout after \d+ attempts:\s*/, '');
  }
  if (msg.indexOf('Cloud Firestore API is disabled') !== -1) return msg;
  if (msg.indexOf('Firestore') !== -1 && msg.indexOf('403') !== -1) {
    return 'Cloud Firestore API is not enabled for this Firebase project. Enable it in Google Cloud Console, then retry START PREP.';
  }
  return msg;
}

/** Sheets domain already normal / closed — last-leave & END PREP are idempotent. */
function dalPrepAlreadyClosedErr_(err) {
  var msg = dalPrepErrMsg_(err);
  return msg.indexOf('No open') !== -1 && msg.indexOf('session') !== -1;
}

function dalPrepCommitInProgressErr_(err) {
  var msg = dalPrepErrMsg_(err);
  return msg.indexOf('Commit already in progress') !== -1;
}

/** Domain finished (or never open) — not open/opening/committing. */
function dalPrepCloseDomainDone_(info) {
  var st = window.dalPrepStatusFromInfo_(info);
  return !st || st === 'normal' || (st !== 'open' && st !== 'opening' && st !== 'committing');
}

/** Prefer signed-in crew name (matches presence); station host badge is a fallback. */
function dalPrepCloseActor_() {
  if (typeof ACTIVE_USER_NAME !== 'undefined' && ACTIVE_USER_NAME) return String(ACTIVE_USER_NAME);
  if (typeof assetOpsActor === 'function') return assetOpsActor();
  return 'System';
}

/**
 * Peer/prior close still committing — poll until domain clears (~30s), then succeed.
 * Only call onStuck if still committing after the wait.
 */
function dalPrepWaitCommitThen_(projectId, onDone, onStuck) {
  var attempts = 0;
  var maxAttempts = 15;
  var tick = function() {
    google.script.run
      .withFailureHandler(function() {
        attempts++;
        if (attempts >= maxAttempts) {
          if (typeof onStuck === 'function') onStuck();
          return;
        }
        setTimeout(tick, 2000);
      })
      .withSuccessHandler(function(info) {
        var st = window.dalPrepStatusFromInfo_(info);
        if (st !== 'committing') {
          if (typeof onDone === 'function') onDone(info);
          return;
        }
        attempts++;
        if (attempts >= maxAttempts) {
          if (typeof onStuck === 'function') onStuck();
          return;
        }
        setTimeout(tick, 2000);
      })
      .getDalSessionInfo(projectId);
  };
  tick();
}

window.openDalPrepSession = function(opts) {
  opts = opts || {};
  var projectId = document.getElementById('edit-folder-id').value;
  if (!projectId || projectId === 'NEW') return alert('Save the project first.');
  if (typeof window.dalIsLiveForkExcluded_ === 'function' && window.dalIsLiveForkExcluded_()) {
    return alert('Live preparation is not available for freelancer accounts.');
  }
  if (typeof window.dalMayManualStartFork_ === 'function' && !window.dalMayManualStartFork_('prep')) {
    return alert('You cannot start preparation on this device.');
  }
  if (!opts.auto && !opts.takeOver) {
    if (!confirm('Start preparation? Equipment saves fork to Firebase until End Prep.')) return;
  }
  window.dalPrepClosing = false;
  var overlay = document.getElementById('project-assets-modal-overlay');
  if (overlay) overlay.style.cursor = 'wait';
  var actor = typeof assetOpsActor === 'function'
    ? assetOpsActor()
    : (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System');
  var beginOpts = opts.takeOver ? { takeOver: true } : {};

  google.script.run
    .withFailureHandler(function(err) {
      if (overlay) overlay.style.cursor = '';
      google.script.run
        .withFailureHandler(function() {
          alert('Start prep failed:\n\n' + dalPrepErrMsg_(err));
        })
        .withSuccessHandler(function(info) {
          var st = window.dalPrepStatusFromInfo_(info);
          if (st === 'open') {
            if (window.dalPrepOpeningUi_) window.dalApplyPrepOpeningUi_(false);
            window.dalApplyDalPrepUiState_(true, projectId, { invalidateCache: true, localOpen: true });
            if (typeof startDalPaSessionWatcher === 'function') startDalPaSessionWatcher(projectId);
            return;
          }
          if (st === 'opening') {
            // Healthy race: someone else is Opening — join frozen UI and wait.
            // Take-over only after hang (~50s), not immediately.
            window.dalApplyPrepOpeningUi_(true, info);
            return;
          }
          alert('Start prep failed:\n\n' + dalPrepErrMsg_(err));
        })
        .getDalSessionInfo(projectId);
    })
    .withSuccessHandler(function(begin) {
      if (begin && begin.joined) {
        if (overlay) overlay.style.cursor = '';
        if (window.dalPrepOpeningUi_) window.dalApplyPrepOpeningUi_(false);
        try { localStorage.removeItem('sm_pa_cache_' + projectId); } catch (e0) {}
        if (typeof window.dalCacheInvalidatePa_ === 'function') window.dalCacheInvalidatePa_(projectId);
        window.dalSessionState = { status: 'open', sessionType: 'prep', projectId: projectId, prepStatus: 'open' };
        window.dalMetaConfirmedOpen_ = false;
        window.dalMetaSeenOpen_ = false;
        window.dalMetaCloseStreak_ = 0;
        window.dalPrepMetaEndPending_ = false;
        window.dalPrepMetaEndPendingSince_ = 0;
        window.dalPrepEndedSessionUid_ = '';
        window.dalPrepIgnoreOpenUntil = 0;
        window.dalApplyDalPrepUiState_(true, projectId, { invalidateCache: true, localOpen: true });
        if (typeof startDalPaSessionWatcher === 'function') startDalPaSessionWatcher(projectId);
        if (!opts.auto) alert('Joined preparation.');
        return;
      }
      if (!begin || !begin.sessionUid) {
        if (overlay) overlay.style.cursor = '';
        alert('Start prep failed:\n\nNo session reserved.');
        return;
      }
      // Opening reserved — starter stays editable; peers freeze via poll.
      window.dalPrepOpeningIsStarter_ = true;
      window.dalPrepOpeningWasStarter_ = true;
      window.dalPrepOpeningUid_ = begin.sessionUid;
      window.dalPrepOpeningBy_ = begin.openedBy || actor;
      window.dalApplyPrepOpeningUi_(true, {
        prepStatus: 'opening',
        prepUid: begin.sessionUid,
        prepOpenedBy: begin.openedBy || actor
      });
      window.dalArmPrepOpeningHang_(projectId, begin.sessionUid, actor);
      if (overlay) overlay.style.cursor = '';
      window.dalPrepFinishOpen_(projectId, begin.sessionUid, actor, overlay, opts);
    })
    .beginDalSession(projectId, 'prep', actor, beginOpts);
};

window.dalPrepFinishOpen_ = function(projectId, sessionUid, actor, overlay, opts) {
  opts = opts || {};
  if (window.dalPrepOpeningFinishInFlight_) return;
  window.dalPrepOpeningFinishInFlight_ = true;
  if (overlay) overlay.style.cursor = 'wait';
  google.script.run
    .withFailureHandler(function(err) {
      window.dalPrepOpeningFinishInFlight_ = false;
      if (overlay) overlay.style.cursor = '';
      google.script.run
        .withFailureHandler(function() {
          alert('Start prep failed:\n\n' + dalPrepErrMsg_(err));
        })
        .withSuccessHandler(function(info) {
          var st = window.dalPrepStatusFromInfo_(info);
          if (st === 'open') {
            window.dalPrepOnOpenSuccess_(
              projectId,
              opts,
              !(window.dalPrepOpeningWasStarter_ || window.dalPrepOpeningIsStarter_)
            );
            return;
          }
          if (st === 'opening') {
            window.dalArmPrepOpeningHang_(projectId, sessionUid, actor);
            return;
          }
          window.dalApplyPrepOpeningUi_(false);
          alert('Start prep failed:\n\n' + dalPrepErrMsg_(err));
        })
        .getDalSessionInfo(projectId);
    })
    .withSuccessHandler(function(res) {
      window.dalPrepOpeningFinishInFlight_ = false;
      if (overlay) overlay.style.cursor = '';
      window.dalPrepOnOpenSuccess_(projectId, opts, !!(res && res.joined));
    })
    .finishDalSession(projectId, sessionUid, actor);
};

window.dalPrepOnOpenSuccess_ = function(projectId, opts, joined) {
  opts = opts || {};
  window.dalClearPrepOpeningHang_();
  window.dalApplyPrepOpeningUi_(false);
  try { localStorage.removeItem('sm_pa_cache_' + projectId); } catch (e) {}
  if (typeof window.dalCacheInvalidatePa_ === 'function') window.dalCacheInvalidatePa_(projectId);
  window.dalSessionState = { status: 'open', sessionType: 'prep', projectId: projectId, prepStatus: 'open' };
  window.dalMetaConfirmedOpen_ = false;
  window.dalMetaSeenOpen_ = false;
  window.dalMetaCloseStreak_ = 0;
  window.dalPrepMetaEndPending_ = false;
  window.dalPrepMetaEndPendingSince_ = 0;
  window.dalPrepEndedSessionUid_ = '';
  window.dalPrepIgnoreOpenUntil = 0;
  // Starter entry delta only when we reserved the session (not join-already-open).
  window.dalPaEntryDeltaPending_ = !joined;
  if (window.dalPaEntryDeltaPending_) {
    setTimeout(function() {
      if (typeof window.dalPaFlushStarterEntryDelta_ === 'function') {
        window.dalPaFlushStarterEntryDelta_();
      }
    }, 600);
  }
  window.dalPrepOpeningWasStarter_ = false;
  window.dalPrepOpeningIsStarter_ = false;
  window.dalApplyDalPrepUiState_(true, projectId, { invalidateCache: true, localOpen: true });
  if (typeof startDalPaSessionWatcher === 'function') startDalPaSessionWatcher(projectId);
  if (!opts.auto) alert(joined ? 'Joined preparation.' : 'Preparation started.');
};

window.closeDalPrepSession = function(opts) {
  opts = opts || {};
  var projectId = typeof window.dalResolvePrepProjectId_ === 'function'
    ? window.dalResolvePrepProjectId_(opts.projectId)
    : String(opts.projectId || (document.getElementById('edit-folder-id')
      ? document.getElementById('edit-folder-id').value : '') || '');
  if (!projectId || projectId === 'NEW') {
    if (opts.auto) {
      window.dalPrepClosing = false;
      window.dalPrepClosingUi_ = false;
      alert('Auto-close prep failed:\n\nMissing project id — End Prep cancelled (fork left intact).');
      return;
    }
    alert('End prep failed:\n\nMissing project id.');
    return;
  }
  // Keep hidden field in sync so later watchers/polls still resolve the same project.
  try {
    var fid = document.getElementById('edit-folder-id');
    if (fid && (!fid.value || fid.value === 'NEW')) fid.value = projectId;
  } catch (eFid) { /* ignore */ }
  if (window.dalPrepOpeningUi_ && !window.dalPrepUiOpen) {
    if (opts.auto) return;
    if (!confirm('Abort opening and stay on normal equipment list?')) return;
    var actorAbort = typeof assetOpsActor === 'function'
      ? assetOpsActor()
      : (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System');
    window.dalAbortPrepOpening_(projectId, actorAbort);
    return;
  }
  if (!window.dalPrepUiOpen && !opts.auto) return;
  if (!opts.auto) {
    if (!confirm('End preparation and commit equipment back to Google Sheets?')) return;
  }
  if (window.dalPrepClosing) return;
  window.dalClearRoomIdle_('prep');
  window.dalPrepClosing = true;
  window.dalPrepClosingUi_ = true;
  if (typeof window.dalUpdateRemotePendingBanner_ === 'function') {
    window.dalUpdateRemotePendingBanner_();
  }
  window.dalPrepSheetsPollGen++;
  window.dalPrepIgnoreCloseUntil = 0;
  // Local END — also block lagging Sheets from re-opening this tab during commit.
  window.dalPrepIgnoreOpenUntil = Date.now() + 30000;
  var overlay = document.getElementById('project-assets-modal-overlay');
  if (overlay) overlay.style.cursor = 'wait';

  var doneMsg_ = function() {
    // Success toast retired — ending prep is silent (errors still alert).
  };

  var failCloseAlert_ = function(errOrMsg) {
    window.dalPrepClosing = false;
    window.dalPrepClosingUi_ = false;
    if (overlay) overlay.style.cursor = '';
    if (typeof window.dalUpdateRemotePendingBanner_ === 'function') {
      window.dalUpdateRemotePendingBanner_();
    }
    if (typeof window.startDalPrepSessionPoll_ === 'function') window.startDalPrepSessionPoll_(projectId);
    var msg = (errOrMsg && errOrMsg.message) ? dalPrepErrMsg_(errOrMsg) : String(errOrMsg || 'Unknown error');
    alert(opts.auto ? ('Auto-close prep failed:\n\n' + msg) : ('End prep failed:\n\n' + msg));
  };

  var finishCloseOk_ = function() {
    if (overlay) overlay.style.cursor = '';
    window.dalPrepLeaveIntent_ = false;
    window.dalPrepLastLeavePending_ = false;
    window.dalPrepMarkSessionEnded_(projectId);
    window.dalSessionState = { status: 'normal', sessionType: '', projectId: projectId, prepStatus: '' };
    if (typeof stopDalPaSessionWatcher === 'function') stopDalPaSessionWatcher({ clearLatch: true });
    if (typeof startDalPaSessionWatcher === 'function') startDalPaSessionWatcher(projectId);
    if (typeof window.dalCacheInvalidatePa_ === 'function') window.dalCacheInvalidatePa_(projectId);
    else try { localStorage.removeItem('sm_pa_cache_' + projectId); } catch (e) {}
    window.dalPrepClosing = false;
    window.dalPrepClosingUi_ = false;
    doneMsg_();
  };

  var waitCommitOrFinish_ = function(stuckMsg) {
    dalPrepWaitCommitThen_(projectId, function(info) {
      if (dalPrepCloseDomainDone_(info) || window.dalPrepStatusFromInfo_(info) !== 'open') {
        finishCloseOk_();
        return;
      }
      // Unexpectedly back to open after wait — treat as done latch clear only if auto
      if (opts.auto) finishCloseOk_();
      else failCloseAlert_(stuckMsg || 'Commit already in progress for this prep session — wait for it to finish.');
    }, function() {
      failCloseAlert_(stuckMsg ||
        'Commit already in progress for this prep session — wait for it to finish. If stuck, wait ~5 minutes for reclaim or contact support.');
    });
  };

  /** After any close/write race: re-probe before scaring the floor. */
  var resolveCloseFailure_ = function(err) {
    if (dalPrepAlreadyClosedErr_(err)) {
      finishCloseOk_();
      return;
    }
    google.script.run
      .withFailureHandler(function() {
        if (dalPrepCommitInProgressErr_(err) || opts.auto) {
          waitCommitOrFinish_(dalPrepErrMsg_(err));
          return;
        }
        failCloseAlert_(err);
      })
      .withSuccessHandler(function(info) {
        var st = window.dalPrepStatusFromInfo_(info);
        if (dalPrepCloseDomainDone_(info)) {
          finishCloseOk_();
          return;
        }
        if (st === 'committing' || dalPrepCommitInProgressErr_(err)) {
          waitCommitOrFinish_(dalPrepErrMsg_(err));
          return;
        }
        // Still open — real failure
        failCloseAlert_(err);
      })
      .getDalSessionInfo(projectId);
  };

  var runClose_ = function() {
    google.script.run
      .withFailureHandler(function(err) {
        resolveCloseFailure_(err);
      })
      .withSuccessHandler(function() {
        finishCloseOk_();
      })
      .closeDalSession(projectId, dalPrepCloseActor_(), 'prep');
  };

  var writeThenClose_ = function() {
    // Live sync writes fixtures only — push autos too before Sheets commit.
    if (typeof window.dalWritePaForkFullToFirestore_ === 'function' && window.dalPaLiveSyncMode === 'firestore') {
      window.dalWritePaForkFullToFirestore_(projectId, function(writeErr) {
        if (writeErr) {
          // Auto: peer may already have committed — re-probe before alert.
          if (opts.auto) {
            google.script.run
              .withFailureHandler(function() {
                resolveCloseFailure_(writeErr);
              })
              .withSuccessHandler(function(info) {
                var st = window.dalPrepStatusFromInfo_(info);
                if (dalPrepCloseDomainDone_(info)) {
                  finishCloseOk_();
                  return;
                }
                if (st === 'committing') {
                  waitCommitOrFinish_();
                  return;
                }
                var msg = 'Could not sync live equipment to Firebase before commit.\n\n' +
                  (writeErr.message || writeErr) +
                  '\n\nEnd Prep cancelled — fork left intact (no Sheets wipe).';
                failCloseAlert_(msg);
              })
              .getDalSessionInfo(projectId);
            return;
          }
          var msgManual = 'Could not sync live equipment to Firebase before commit.\n\n' +
            (writeErr.message || writeErr) +
            '\n\nEnd Prep cancelled — fork left intact (no Sheets wipe).';
          failCloseAlert_(msgManual);
          return;
        }
        window.originalProjectAssets = JSON.parse(JSON.stringify(currentProjectAssets || []));
        runClose_();
      });
      return;
    }
    runClose_();
  };

  var onProbeInfo_ = function(info) {
    var st = window.dalPrepStatusFromInfo_(info);
    if (st === 'open') {
      writeThenClose_();
      return;
    }
    if (st === 'committing') {
      waitCommitOrFinish_();
      return;
    }
    // normal / empty / opening aborted elsewhere — clear local latch, no Firebase write
    finishCloseOk_();
  };

  var probeSession_ = function(retry) {
    google.script.run
      .withFailureHandler(function() {
        if (!retry) {
          setTimeout(function() { probeSession_(true); }, 800);
          return;
        }
        // Probe still failing — try close without Firebase reseed (server decides).
        runClose_();
      })
      .withSuccessHandler(onProbeInfo_)
      .getDalSessionInfo(projectId);
  };

  // Probe Sheets first — do not reseed Firebase when the domain is already closed
  // (stale latch / double last-leave after a successful peer or prior commit).
  probeSession_(false);
};
</script>
