<!-- DAL Phase 4 — prep session UI inside Project Assets (L.O. / view_logistics) -->
<script>
window.dalSessionState = { status: 'normal', sessionType: '' };
window.dalPrepUiOpen = false;
window.dalPrepSheetsPollGen = 0;
window.dalPrepClosing = false;

window.dalIsPrepOpenFromInfo_ = function(info) {
  return !!(info && String(info.status).toLowerCase() === 'open' && info.sessionType === 'prep');
};

window.dalApplyDalPrepUiState_ = function(isPrepOpen, projectId, invalidateCache) {
  projectId = projectId || (document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '');
  var banner = document.getElementById('dal-session-banner');
  var startBtn = document.getElementById('dal-prep-start-btn');
  var endBtn = document.getElementById('dal-prep-end-btn');
  var canShow = window.dalCanShowPrepButtons();
  isPrepOpen = !!isPrepOpen;

  if (!canShow) {
    if (banner) banner.style.display = 'none';
    if (startBtn) startBtn.style.display = 'none';
    if (endBtn) endBtn.style.display = 'none';
    if (window.dalPrepUiOpen && typeof stopDalPaFirestoreListener === 'function') stopDalPaFirestoreListener();
    window.dalPrepUiOpen = false;
    return;
  }

  var changed = window.dalPrepUiOpen !== isPrepOpen;
  window.dalPrepUiOpen = isPrepOpen;

  if (banner) {
    if (isPrepOpen) {
      banner.style.display = 'block';
      if (typeof window.dalUpdateRemotePendingBanner_ === 'function') window.dalUpdateRemotePendingBanner_();
      else banner.textContent = '🔒 IN PREPARATION — live sync active';
    } else {
      banner.style.display = 'none';
    }
  }
  if (startBtn) startBtn.style.display = isPrepOpen ? 'none' : 'inline-flex';
  if (endBtn) endBtn.style.display = isPrepOpen ? 'inline-flex' : 'none';

  if (isPrepOpen && projectId) {
    if (invalidateCache || changed) {
      try { localStorage.removeItem('sm_pa_cache_' + projectId); } catch (e) {}
    }
    if (typeof startDalPaFirestoreListener === 'function') startDalPaFirestoreListener(projectId);
  } else if (changed && typeof stopDalPaFirestoreListener === 'function') {
    stopDalPaFirestoreListener();
  }
};

window.dalCanShowPrepButtons = function() {
  if (typeof canOpenDalPrep === 'function' && !canOpenDalPrep()) return false;
  if (window.projectAssetsReadOnly) return false;
  var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
  return !!(projectId && projectId !== 'NEW');
};

/**
 * Sheets poll — secondary only. Never flash-hide UI before reply.
 * While Firestore _meta watcher is authoritative, do not override it.
 */
window.refreshDalSessionBanner = function(force) {
  var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
  var canShow = window.dalCanShowPrepButtons();

  if (!canShow) {
    window.dalApplyDalPrepUiState_(false, projectId);
    return;
  }

  if (!force && window.dalMetaAuthority && !window.dalPrepClosing) return;

  var gen = ++window.dalPrepSheetsPollGen;
  google.script.run
    .withFailureHandler(function() {
      if (gen !== window.dalPrepSheetsPollGen) return;
      if (!window.dalMetaAuthority) {
        var startBtn = document.getElementById('dal-prep-start-btn');
        if (startBtn && window.dalCanShowPrepButtons()) startBtn.style.display = 'inline-flex';
      }
    })
    .withSuccessHandler(function(info) {
      if (gen !== window.dalPrepSheetsPollGen) return;
      if (window.dalPrepClosing) return;
      if (window.dalMetaAuthority && !force) return;
      window.dalSessionState = info || {};
      window.dalApplyDalPrepUiState_(window.dalIsPrepOpenFromInfo_(info), projectId);
    })
    .getDalSessionInfo(projectId);
};

function dalPrepErrMsg_(err) {
  var msg = (err && err.message) ? String(err.message) : String(err || 'Unknown error');
  if (msg.indexOf('Database Lockout') === 0) {
    msg = msg.replace(/^Database Lockout after \d+ attempts:\s*/, '');
  }
  if (msg.indexOf('Cloud Firestore API is disabled') !== -1) return msg;
  if (msg.indexOf('Firestore') !== -1 && msg.indexOf('403') !== -1) {
    return 'Cloud Firestore API is not enabled for this Firebase project. Enable it in Google Cloud Console, then retry START PREP.';
  }
  return msg;
}

window.openDalPrepSession = function() {
  var projectId = document.getElementById('edit-folder-id').value;
  if (!projectId || projectId === 'NEW') return alert('Save the project first.');
  if (!confirm('Start preparation? Equipment saves fork to Firebase until End Prep.')) return;
  window.dalPrepClosing = false;
  var overlay = document.getElementById('project-assets-modal-overlay');
  if (overlay) overlay.style.cursor = 'wait';
  google.script.run
    .withFailureHandler(function(err) {
      if (overlay) overlay.style.cursor = '';
      alert('Start prep failed:\n\n' + dalPrepErrMsg_(err));
    })
    .withSuccessHandler(function() {
      if (overlay) overlay.style.cursor = '';
      try { localStorage.removeItem('sm_pa_cache_' + projectId); } catch (e) {}
      window.dalSessionState = { status: 'open', sessionType: 'prep', projectId: projectId };
      window.dalApplyDalPrepUiState_(true, projectId, true);
      if (typeof startDalPaSessionWatcher === 'function') startDalPaSessionWatcher(projectId);
      alert('Preparation started.');
    })
    .openDalSession(projectId, 'prep', typeof assetOpsActor === 'function' ? assetOpsActor() : (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System'));
};

window.closeDalPrepSession = function() {
  var projectId = document.getElementById('edit-folder-id').value;
  if (!confirm('End preparation and commit equipment back to Google Sheets?')) return;
  window.dalPrepClosing = true;
  window.dalPrepSheetsPollGen++;
  var overlay = document.getElementById('project-assets-modal-overlay');
  if (overlay) overlay.style.cursor = 'wait';
  google.script.run
    .withFailureHandler(function(err) {
      window.dalPrepClosing = false;
      if (overlay) overlay.style.cursor = '';
      alert('End prep failed:\n\n' + dalPrepErrMsg_(err));
    })
    .withSuccessHandler(function() {
      if (overlay) overlay.style.cursor = '';
      window.dalSessionState = { status: 'normal', sessionType: '', projectId: projectId };
      window.dalApplyDalPrepUiState_(false, projectId);
      if (typeof stopDalPaSessionWatcher === 'function') stopDalPaSessionWatcher();
      try { localStorage.removeItem('sm_pa_cache_' + projectId); } catch (e) {}
      window.dalPrepClosing = false;
      alert('Preparation ended — committed to Sheets.');
    })
    .closeDalSession(projectId, typeof assetOpsActor === 'function' ? assetOpsActor() : (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System'));
};
</script>
