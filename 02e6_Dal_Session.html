<!-- DAL Phase 4 — prep session UI inside Project Assets (L.O. / view_logistics) -->
<script>
window.dalSessionState = { status: 'normal', sessionType: '' };

window.dalCanShowPrepButtons = function() {
  if (typeof canOpenDalPrep === 'function' && !canOpenDalPrep()) return false;
  if (window.projectAssetsReadOnly) return false;
  var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
  return !!(projectId && projectId !== 'NEW');
};

window.refreshDalSessionBanner = function() {
  var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
  var banner = document.getElementById('dal-session-banner');
  var startBtn = document.getElementById('dal-prep-start-btn');
  var endBtn = document.getElementById('dal-prep-end-btn');
  var canShow = window.dalCanShowPrepButtons();

  if (!canShow) {
    if (banner) banner.style.display = 'none';
    if (startBtn) startBtn.style.display = 'none';
    if (endBtn) endBtn.style.display = 'none';
    return;
  }

  if (startBtn) startBtn.style.display = 'inline-flex';
  if (endBtn) endBtn.style.display = 'none';
  if (banner) banner.style.display = 'none';

  google.script.run
    .withFailureHandler(function() {
      if (startBtn && window.dalCanShowPrepButtons()) startBtn.style.display = 'inline-flex';
      if (endBtn) endBtn.style.display = 'none';
    })
    .withSuccessHandler(function(info) {
      window.dalSessionState = info || {};
      var isPrepOpen = info && String(info.status).toLowerCase() === 'open' && info.sessionType === 'prep';
      if (banner) {
        if (isPrepOpen) {
          banner.style.display = 'block';
          banner.textContent = '🔒 IN PREPARATION — saves go to Firebase until End Prep';
        } else {
          banner.style.display = 'none';
        }
      }
      if (startBtn) startBtn.style.display = isPrepOpen ? 'none' : 'inline-flex';
      if (endBtn) endBtn.style.display = isPrepOpen ? 'inline-flex' : 'none';
    })
    .getDalSessionInfo(projectId);
};

window.openDalPrepSession = function() {
  var projectId = document.getElementById('edit-folder-id').value;
  if (!projectId || projectId === 'NEW') return alert('Save the project first.');
  if (!confirm('Start preparation? Equipment saves fork to Firebase until End Prep.')) return;
  document.body.style.cursor = 'wait';
  google.script.run
    .withFailureHandler(function(err) {
      document.body.style.cursor = 'default';
      alert('Start prep failed: ' + err.message);
    })
    .withSuccessHandler(function() {
      document.body.style.cursor = 'default';
      try { localStorage.removeItem('sm_pa_cache_' + projectId); } catch (e) {}
      window.refreshDalSessionBanner();
      alert('Preparation started.');
    })
    .openDalSession(projectId, 'prep', typeof assetOpsActor === 'function' ? assetOpsActor() : (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System'));
};

window.closeDalPrepSession = function() {
  var projectId = document.getElementById('edit-folder-id').value;
  if (!confirm('End preparation and commit equipment back to Google Sheets?')) return;
  document.body.style.cursor = 'wait';
  google.script.run
    .withFailureHandler(function(err) {
      document.body.style.cursor = 'default';
      alert('End prep failed: ' + err.message);
    })
    .withSuccessHandler(function() {
      document.body.style.cursor = 'default';
      try { localStorage.removeItem('sm_pa_cache_' + projectId); } catch (e) {}
      window.refreshDalSessionBanner();
      alert('Preparation ended — committed to Sheets.');
    })
    .closeDalSession(projectId, typeof assetOpsActor === 'function' ? assetOpsActor() : (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System'));
};
</script>
