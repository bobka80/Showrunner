<!-- DAL Phase 4 — prep session UI inside Project Assets (L.O. / view_logistics) -->
<script>
window.dalSessionState = { status: 'normal', sessionType: '' };
window.dalPrepUiOpen = false;
window.dalPrepLatched = false; // once true, ignore spurious "closed" until allowClose
window.dalPrepSheetsPollGen = 0;
window.dalPrepClosing = false;
window.dalPrepSessionPollTimer = null;
window.dalPrepIgnoreCloseUntil = 0;
window.dalPrepIgnoreOpenUntil = 0;
window.dalPrepClosedPollStreak = 0;
window.dalMetaSeenOpen_ = false;
window.dalMetaCloseStreak_ = 0;
window.dalMetaConfirmedOpen_ = false; // true only after server _meta with sessionType prep
// After END PREP, Sheets can lag as "open" for a long time. Do not re-latch from Sheets
// alone — wait for a new Firestore _meta (or local START). Stops ~30s banner oscillation.
window.dalPrepSheetsOpenBlocked_ = false;
// Meta went missing — wait for Sheets committing/closed (or timeout) before killing banner/live sync.
// A lone _meta blip was closing BOTH users mid-prep → sync off → fixture desync (9 vs 1).
window.dalPrepMetaEndPending_ = false;
window.dalPrepMetaEndPendingSince_ = 0;
window.dalPrepActiveSessionUid_ = '';
// After END, refuse to reopen the *same* prep sessionUid (stale _meta / lag).
// Time-only IgnoreOpenUntil (~30s) was letting the banner return → ~1 min on/off loop.
window.dalPrepEndedSessionUid_ = '';

window.dalPrepAllowRemoteOpen_ = function(sessionUid) {
  sessionUid = String(sessionUid || '');
  var ended = String(window.dalPrepEndedSessionUid_ || '');
  if (!ended) return true;
  if (sessionUid && sessionUid === ended) return false;
  // No uid on snap but we already ended — stay closed until local START or new uid.
  if (!sessionUid && window.dalPrepSheetsOpenBlocked_) return false;
  return true;
};

window.dalPrepMarkSessionEnded_ = function(projectId) {
  var uid = '';
  try {
    if (window.dalSessionState) {
      uid = String(window.dalSessionState.sessionUid || window.dalSessionState.prepUid || '');
    }
  } catch (e0) { /* ignore */ }
  if (!uid) uid = String(window.dalPrepActiveSessionUid_ || '');
  if (uid) window.dalPrepEndedSessionUid_ = uid;
  window.dalPrepActiveSessionUid_ = '';
  window.dalPrepMetaEndPending_ = false;
  window.dalPrepMetaEndPendingSince_ = 0;
  window.dalPrepSheetsOpenBlocked_ = true;
  // Sticky block — do not rely on a 30s timer (that caused minute-scale reopen loops).
  window.dalPrepIgnoreOpenUntil = Date.now() + 24 * 60 * 60 * 1000;
  window.dalMetaConfirmedOpen_ = false;
  window.dalMetaSeenOpen_ = false;
  if (typeof dalApplyDalPrepUiState_ === 'function') {
    dalApplyDalPrepUiState_(false, projectId, { allowClose: true });
  }
};

window.dalPrepStatusFromInfo_ = function(info) {
  if (!info) return '';
  if (info.prepStatus !== undefined && info.prepStatus !== null) {
    return String(info.prepStatus || '').toLowerCase();
  }
  if (info.prep && typeof info.prep === 'object') {
    return String(info.prep.status || '').toLowerCase();
  }
  if (String(info.sessionType || '') === 'prep') {
    return String(info.status || '').toLowerCase();
  }
  return '';
};

window.dalIsPrepOpenFromInfo_ = function(info) {
  var st = window.dalPrepStatusFromInfo_(info);
  // opening/committing = still in prep lifecycle (do not clear remote UI mid-transition)
  return st === 'open' || st === 'opening' || st === 'committing';
};

window.stopDalPrepSessionPoll_ = function() {
  if (window.dalPrepSessionPollTimer) {
    clearInterval(window.dalPrepSessionPollTimer);
    window.dalPrepSessionPollTimer = null;
  }
};

/**
 * While Project Assets is open, poll prep domain for BOTH remote START and remote END.
 * Close requires grace + two consecutive closed reads so Sheets lag cannot wipe a fresh open.
 */
window.startDalPrepSessionPoll_ = function(projectId) {
  if (!projectId || projectId === 'NEW') return;
  if (window.dalPrepSessionPollTimer) return;

  var tick = function() {
    if (window.dalPrepClosing) return;
    // Stop only when PA session watcher left this project.
    if (window.dalPaSessionWatchProjectId && window.dalPaSessionWatchProjectId !== String(projectId)) {
      window.stopDalPrepSessionPoll_();
      return;
    }
    google.script.run
      .withFailureHandler(function() { /* keep current */ })
      .withSuccessHandler(function(info) {
        if (window.dalPrepClosing) return;
        if (window.dalPaSessionWatchProjectId && window.dalPaSessionWatchProjectId !== String(projectId)) return;

        if (window.dalIsPrepOpenFromInfo_(info)) {
          var stOpen = window.dalPrepStatusFromInfo_(info);
          // Peer END: _meta already gone (pending) and/or Sheets committing.
          if (stOpen === 'committing' && (window.dalPrepUiOpen || window.dalPrepLatched || window.dalPrepMetaEndPending_)) {
            if (Date.now() < (window.dalPrepIgnoreCloseUntil || 0) && !window.dalPrepMetaEndPending_) return;
            window.dalPrepClosedPollStreak = (window.dalPrepClosedPollStreak || 0) + 1;
            if (window.dalPrepClosedPollStreak < 2 && !window.dalPrepMetaEndPending_) return;
            window.dalPrepClosedPollStreak = 0;
            window.dalPrepMarkSessionEnded_(projectId);
            return;
          }
          // Meta deleted but Sheets still lagging as "open" — end after short settle (real END).
          if (window.dalPrepMetaEndPending_ && window.dalPrepMetaEndPendingSince_ &&
              (Date.now() - window.dalPrepMetaEndPendingSince_) > 8000) {
            window.dalPrepMarkSessionEnded_(projectId);
            return;
          }
          window.dalPrepClosedPollStreak = 0;
          if (Date.now() < (window.dalPrepIgnoreOpenUntil || 0)) return;
          if (window.dalPrepSheetsOpenBlocked_) return;
          if (!window.dalPrepUiOpen && !window.dalPrepLatched) {
            if (stOpen === 'committing' || stOpen === 'opening') return;
            window.dalApplyDalPrepUiState_(true, projectId, { invalidateCache: true });
          }
          return;
        }

        // Sheets says closed.
        if (!window.dalPrepUiOpen && !window.dalPrepLatched) {
          window.dalPrepClosedPollStreak = 0;
          if (window.dalPrepMetaEndPending_) window.dalPrepMarkSessionEnded_(projectId);
          return;
        }
        // While Firestore _meta still confirms prep, ignore flaky Sheets "closed" (both users
        // were getting kicked out mid-prep → live sync stopped → adds never reached peer).
        if (window.dalMetaConfirmedOpen_ && !window.dalPrepMetaEndPending_) {
          window.dalPrepClosedPollStreak = 0;
          return;
        }
        if (Date.now() < (window.dalPrepIgnoreCloseUntil || 0)) return;
        window.dalPrepClosedPollStreak = (window.dalPrepClosedPollStreak || 0) + 1;
        if (window.dalPrepClosedPollStreak < 2) return;
        window.dalPrepClosedPollStreak = 0;
        window.dalPrepMarkSessionEnded_(projectId);
      })
      .getDalSessionInfo(projectId);
  };
  tick();
  window.dalPrepSessionPollTimer = setInterval(tick, 2500);
};

window.dalApplyDalPrepUiState_ = function(isPrepOpen, projectId, opts) {
  opts = opts || {};
  projectId = projectId || (document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '');
  var banner = document.getElementById('dal-session-banner');
  var startBtn = document.getElementById('dal-prep-start-btn');
  var endBtn = document.getElementById('dal-prep-end-btn');
  // Freelancers never latch onto live fork UI (stay Sheets-normal).
  if (isPrepOpen && opts.fromMeta && typeof window.dalMayJoinLiveFork_ === 'function' && !window.dalMayJoinLiveFork_()) {
    isPrepOpen = false;
  }
  var canShow = window.dalCanShowPrepButtons();
  isPrepOpen = !!isPrepOpen;

  // After remote END, block reopen from lagging Sheets / stale _meta (same sessionUid).
  // Local START: localOpen. Remote START from Firestore: fromMeta with a *new* sessionUid.
  if (isPrepOpen && !opts.localOpen && !opts.fromMeta) {
    if (window.dalPrepSheetsOpenBlocked_) return;
    if (Date.now() < (window.dalPrepIgnoreOpenUntil || 0)) return;
    if (!window.dalPrepAllowRemoteOpen_(opts.sessionUid || '')) return;
  } else if (isPrepOpen && opts.localOpen) {
    window.dalPrepEndedSessionUid_ = '';
    window.dalPrepSheetsOpenBlocked_ = false;
    window.dalPrepIgnoreOpenUntil = 0;
  } else if (isPrepOpen && opts.fromMeta) {
    if (!window.dalPrepAllowRemoteOpen_(opts.sessionUid || '')) return;
    window.dalPrepEndedSessionUid_ = '';
    window.dalPrepSheetsOpenBlocked_ = false;
    window.dalPrepIgnoreOpenUntil = 0;
  }

  // Latch: once prep is known-open, ignore spurious "closed" (Sheets lag / cache / auth blips)
  // unless this call explicitly allows close (END PREP or server-confirmed close).
  if (!isPrepOpen && window.dalPrepLatched && !opts.allowClose) {
    isPrepOpen = true;
  }

  if (!canShow) {
    if (banner) banner.style.display = 'none';
    if (startBtn) startBtn.style.display = 'none';
    if (endBtn) endBtn.style.display = 'none';
    var hidePanel = document.getElementById('pa-prep-live-panel');
    if (hidePanel) hidePanel.style.display = 'none';
    return;
  }

  if (isPrepOpen) window.dalPrepLatched = true;
  else window.dalPrepLatched = false;

  var changed = window.dalPrepUiOpen !== isPrepOpen;
  window.dalPrepUiOpen = isPrepOpen;

  // Top banner retired — vault orange panel is the prep status surface.
  if (banner) {
    banner.style.display = 'none';
    banner.textContent = '';
  }
  if (typeof window.dalUpdateRemotePendingBanner_ === 'function') {
    window.dalUpdateRemotePendingBanner_();
  }
  if (startBtn) {
    var mayManual = typeof window.dalMayManualStartFork_ === 'function'
      ? window.dalMayManualStartFork_('prep')
      : canShow;
    startBtn.style.display = (!isPrepOpen && mayManual) ? 'inline-flex' : 'none';
  }
  if (endBtn) endBtn.style.display = isPrepOpen ? 'inline-flex' : 'none';

  if (isPrepOpen && projectId) {
    if (changed) {
      // After a fresh open (local or remote), do not let lagging Sheets OR empty _meta
      // snaps clear the banner while snapshot/_meta write catches up.
      window.dalPrepIgnoreCloseUntil = Date.now() + 30000;
      window.dalPrepClosedPollStreak = 0;
      window.dalMetaCloseStreak_ = 0;
      window.dalPrepIgnoreOpenUntil = 0;
    }
    if (opts.invalidateCache || changed) {
      if (typeof window.dalCacheInvalidatePa_ === 'function') window.dalCacheInvalidatePa_(projectId);
      else try { localStorage.removeItem('sm_pa_cache_' + projectId); } catch (e) {}
    }
    if (typeof startDalPaLiveSync_ === 'function') startDalPaLiveSync_(projectId);
    window.startDalPrepSessionPoll_(projectId);
  } else if (changed || opts.allowClose) {
    // Keep poll running while PA is open so remote START PREP can still latch this browser.
    if (typeof stopDalPaLiveSync_ === 'function') stopDalPaLiveSync_();
    window.dalPaBannerLastText_ = '';
    window.dalMetaSeenOpen_ = false;
    window.dalMetaConfirmedOpen_ = false;
    window.dalMetaCloseStreak_ = 0;
    window.dalPrepMetaEndPending_ = false;
    window.dalPrepMetaEndPendingSince_ = 0;
    // Leaving prep UI → do not let lagging Sheets "open" flip the banner back on.
    if (changed) window.dalPrepSheetsOpenBlocked_ = true;
    if (typeof window.dalUpdateRemotePendingBanner_ === 'function') {
      window.dalUpdateRemotePendingBanner_();
    }
  }
};

window.dalCanShowPrepButtons = function() {
  if (typeof window.dalIsLiveForkExcluded_ === 'function' && window.dalIsLiveForkExcluded_()) return false;
  if (typeof canOpenDalPrep === 'function' && !canOpenDalPrep()) {
    // Station host can still END/START via hosted actor even if device role lacks view_logistics.
    if (!(window.IS_STATION_DEVICE && typeof window.stationHostActive_ === 'function' && window.stationHostActive_())) {
      return false;
    }
  }
  if (window.projectAssetsReadOnly) return false;
  var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
  return !!(projectId && projectId !== 'NEW');
};

/**
 * Sheets session check — open can latch ON; close only via allowClose paths (poll / meta / END PREP).
 */
window.refreshDalSessionBanner = function() {
  var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
  if (!window.dalCanShowPrepButtons()) {
    if (!window.dalPrepLatched) window.dalApplyDalPrepUiState_(false, projectId, { allowClose: true });
    return;
  }

  // Already open — keep UI and ensure close/open poll is running.
  if (window.dalPrepLatched || window.dalPrepUiOpen) {
    window.dalApplyDalPrepUiState_(true, projectId);
    return;
  }

  var gen = ++window.dalPrepSheetsPollGen;
  google.script.run
    .withFailureHandler(function() { /* keep current UI */ })
    .withSuccessHandler(function(info) {
      if (gen !== window.dalPrepSheetsPollGen) return;
      if (window.dalPrepClosing) return;
      window.dalSessionState = info || {};
      if (window.dalIsPrepOpenFromInfo_(info)) {
        if (window.dalPrepSheetsOpenBlocked_) return;
        if (Date.now() < (window.dalPrepIgnoreOpenUntil || 0)) return;
        window.dalApplyDalPrepUiState_(true, projectId, { invalidateCache: true });
      } else if (!window.dalPrepLatched) {
        window.dalApplyDalPrepUiState_(false, projectId, { allowClose: true });
      }
    })
    .getDalSessionInfo(projectId);
};

function dalPrepErrMsg_(err) {
  var msg = (err && err.message) ? String(err.message) : String(err || 'Unknown error');
  if (msg.indexOf('Database Lockout') === 0) {
    msg = msg.replace(/^Database Lockout after \d+ attempts:\s*/, '');
  }
  if (msg.indexOf('Cloud Firestore API is disabled') !== -1) return msg;
  if (msg.indexOf('Firestore') !== -1 && msg.indexOf('403') !== -1) {
    return 'Cloud Firestore API is not enabled for this Firebase project. Enable it in Google Cloud Console, then retry START PREP.';
  }
  return msg;
}

window.openDalPrepSession = function(opts) {
  opts = opts || {};
  var projectId = document.getElementById('edit-folder-id').value;
  if (!projectId || projectId === 'NEW') return alert('Save the project first.');
  if (typeof window.dalIsLiveForkExcluded_ === 'function' && window.dalIsLiveForkExcluded_()) {
    return alert('Live preparation is not available for freelancer accounts.');
  }
  if (typeof window.dalMayManualStartFork_ === 'function' && !window.dalMayManualStartFork_('prep')) {
    return alert('You cannot start preparation on this device.');
  }
  if (!opts.auto) {
    if (!confirm('Start preparation? Equipment saves fork to Firebase until End Prep.')) return;
  }
  window.dalPrepClosing = false;
  var overlay = document.getElementById('project-assets-modal-overlay');
  if (overlay) overlay.style.cursor = 'wait';
  google.script.run
    .withFailureHandler(function(err) {
      if (overlay) overlay.style.cursor = '';
      alert('Start prep failed:\n\n' + dalPrepErrMsg_(err));
    })
    .withSuccessHandler(function() {
      if (overlay) overlay.style.cursor = '';
      try { localStorage.removeItem('sm_pa_cache_' + projectId); } catch (e) {}
      if (typeof window.dalCacheInvalidatePa_ === 'function') window.dalCacheInvalidatePa_(projectId);
      window.dalSessionState = { status: 'open', sessionType: 'prep', projectId: projectId, prepStatus: 'open' };
      // Do NOT set MetaSeenOpen/Confirmed here — _meta write is still in flight.
      // Optimistic "seen" made empty _meta snaps END prep a few seconds later.
      window.dalMetaConfirmedOpen_ = false;
      window.dalMetaSeenOpen_ = false;
      window.dalMetaCloseStreak_ = 0;
      window.dalPrepMetaEndPending_ = false;
      window.dalPrepMetaEndPendingSince_ = 0;
      window.dalPrepEndedSessionUid_ = '';
      window.dalPrepIgnoreOpenUntil = 0;
      window.dalApplyDalPrepUiState_(true, projectId, { invalidateCache: true, localOpen: true });
      if (typeof startDalPaSessionWatcher === 'function') startDalPaSessionWatcher(projectId);
      if (!opts.auto) alert('Preparation started.');
    })
    .openDalSession(projectId, 'prep', typeof assetOpsActor === 'function' ? assetOpsActor() : (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System'));
};

window.closeDalPrepSession = function() {
  var projectId = document.getElementById('edit-folder-id').value;
  if (!confirm('End preparation and commit equipment back to Google Sheets?')) return;
  window.dalPrepClosing = true;
  window.dalPrepSheetsPollGen++;
  window.dalPrepIgnoreCloseUntil = 0;
  // Local END — also block lagging Sheets from re-opening this tab during commit.
  window.dalPrepIgnoreOpenUntil = Date.now() + 30000;
  var overlay = document.getElementById('project-assets-modal-overlay');
  if (overlay) overlay.style.cursor = 'wait';

  var runClose_ = function() {
    google.script.run
      .withFailureHandler(function(err) {
        window.dalPrepClosing = false;
        if (overlay) overlay.style.cursor = '';
        if (typeof window.startDalPrepSessionPoll_ === 'function') window.startDalPrepSessionPoll_(projectId);
        alert('End prep failed:\n\n' + dalPrepErrMsg_(err));
      })
      .withSuccessHandler(function() {
        if (overlay) overlay.style.cursor = '';
        window.dalPrepMarkSessionEnded_(projectId);
        window.dalSessionState = { status: 'normal', sessionType: '', projectId: projectId, prepStatus: '' };
        if (typeof stopDalPaSessionWatcher === 'function') stopDalPaSessionWatcher({ clearLatch: true });
        if (typeof startDalPaSessionWatcher === 'function') startDalPaSessionWatcher(projectId);
        if (typeof window.dalCacheInvalidatePa_ === 'function') window.dalCacheInvalidatePa_(projectId);
        else try { localStorage.removeItem('sm_pa_cache_' + projectId); } catch (e) {}
        window.dalPrepClosing = false;
        alert('Preparation ended — committed to Sheets.');
      })
      .closeDalSession(projectId, typeof assetOpsActor === 'function' ? assetOpsActor() : (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System'), 'prep');
  };

  // Live sync writes fixtures only — push autos too before Sheets commit.
  if (typeof window.dalWritePaForkFullToFirestore_ === 'function' && window.dalPaLiveSyncMode === 'firestore') {
    window.dalWritePaForkFullToFirestore_(projectId, function(writeErr) {
      if (writeErr) {
        try { console.warn('Full PA fork sync before END PREP failed; committing anyway:', writeErr); } catch (e1) { /* ignore */ }
      } else {
        window.originalProjectAssets = JSON.parse(JSON.stringify(currentProjectAssets || []));
      }
      runClose_();
    });
    return;
  }
  runClose_();
};
</script>
