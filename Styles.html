<style>
    /* @INDEX: STYLES -> Core Theme Variables */
    /* --- 1. CORE THEME & CALENDAR --- */
    :root {
      --bg-dark: #0a0a0c;
      --bg-sidebar: #111114; --bg-cell: #1a1a1e; --bg-event: #222228;
      --bg-header: #27272f; --accent: #698b99; --text-main: #f4f4f5; --text-muted: #71717a;
      --radius-cell: 10px; --radius-event: 6px;
    }
    body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; }
    
    /* --- CUSTOM SCROLLBARS --- */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; border: 2px solid var(--bg-dark); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    ::-webkit-scrollbar-corner { background: var(--bg-dark); }

    /* --- UNIFIED BUTTON ARCHITECTURE --- */
    button, .btn-main, .btn-outline, .btn-add, .btn-blue, .btn-orange, .btn-purple, .btn-w, .fc-button-primary {
        background: rgba(63, 63, 70, 0.4) !important;
        color: #fff !important;
        border: 1px solid #52525b !important;
        box-shadow: none !important;
        transition: 0.2s !important;
        display: inline-flex;
        align-items: center !important;
        justify-content: center !important;
        font-size: 12px !important;
        font-weight: 800 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.5px !important;
        border-radius: 6px !important;
        padding: 12px 20px !important;
        cursor: pointer;
        box-sizing: border-box;
        line-height: 1.2 !important;
        white-space: nowrap !important;
    }

    button:hover, .btn-outline:hover, .btn-w:hover, .fc-button-primary:hover {
        background: rgba(63, 63, 70, 0.6) !important;
    }
    
    /* Exempt invisible structural controls */
    button[style*="border:none"], button[style*="border: none"] {
        border: none !important;
        background: transparent !important;
        padding: 0 !important;
    }

    /* --- SCALING FOR TIGHT SPACES (10px) --- */
    .btn-sm {
        font-size: 10px !important;
        padding: 8px 12px !important;
    }

    /* Mobile nav + responsive rules → Styles_Mobile.html */

    /* --- SQUARE TOGGLE BUTTON --- */
    .fc-toolbar-chunk { display: flex !important; flex-wrap: nowrap !important; align-items: center !important; gap: 4px; }
    
    .fc-customToggleStrips-button {
        width: 42px !important;
        height: 42px !important;
        padding: 0 !important;
        font-size: 9px !important;
        white-space: pre-wrap !important;
        line-height: 1.2 !important;
    }

    .fc-customToggleStrips-button.active-strips {
        background: rgba(255, 255, 255, 0.2) !important;
        color: #fff !important;
        border-color: #fff !important;
    }

    /* --- SAVE BUTTONS (GREEN) --- */
    .btn-main {
        background: rgba(16, 185, 129, 0.4) !important;
        border: 1px solid #10b981 !important;
    }
    .btn-main:hover { background: rgba(16, 185, 129, 0.6) !important; }

    /* --- ADD BUTTONS (LIGHT GRAY) --- */
    .btn-add {
        background: rgba(161, 161, 170, 0.4) !important;
        border: 1px solid #a1a1aa !important;
    }
    .btn-add:hover { background: rgba(161, 161, 170, 0.6) !important; }

    /* --- SETTINGS BUTTONS (PURPLE) --- */
    .btn-settings, .fc-customVisualSettings-button, .fc-customMiniSettings-button {
        background: transparent !important;
        border: 1px solid #a855f7 !important;
        color: #fff !important;
    }
    .btn-settings:hover, .fc-customVisualSettings-button:hover, .fc-customMiniSettings-button:hover { background: rgba(168, 85, 247, 0.2) !important; }

    /* --- CLOSE / CANCEL BUTTONS --- */
    .btn-close {
        background: rgba(239, 68, 68, 0.2) !important;
        border: 1px solid #ef4444 !important;
    }
    .btn-close:hover { background: rgba(239, 68, 68, 0.4) !important; }

    /* --- DELETE / TRASH BUTTONS --- */
    .btn-delete {
        background: rgba(239, 68, 68, 0.4) !important;
        border: 1px solid #ef4444 !important;
    }
    .btn-delete:hover { background: rgba(239, 68, 68, 0.6) !important; }

    /* --- BLUE BUTTONS --- */
    .btn-blue {
        background: rgba(59, 130, 246, 0.4) !important;
        border: 1px solid #3b82f6 !important;
    }
    .btn-blue:hover { background: rgba(59, 130, 246, 0.6) !important; }

    /* --- ORANGE BUTTONS --- */
    .btn-orange {
        background: rgba(249, 115, 22, 0.4) !important;
        border: 1px solid #f97316 !important;
    }
    .btn-orange:hover { background: rgba(249, 115, 22, 0.6) !important; }

    /* --- PURPLE BUTTONS --- */
    .btn-purple {
        background: rgba(168, 85, 247, 0.4) !important;
        border: 1px solid #a855f7 !important;
    }
    .btn-purple:hover { background: rgba(168, 85, 247, 0.6) !important; }

    /* --- OUTLINE ACCENT BUTTONS (gray fill + domain border) --- */
    .btn-outline-purple {
        background: rgba(63, 63, 70, 0.4) !important;
        border: 1px solid #a855f7 !important;
        color: #e9d5ff !important;
    }
    .btn-outline-purple:hover { background: rgba(168, 85, 247, 0.15) !important; }

    .btn-outline-orange {
        background: rgba(63, 63, 70, 0.4) !important;
        border: 1px solid #f97316 !important;
        color: #ffedd5 !important;
    }
    .btn-outline-orange:hover { background: rgba(249, 115, 22, 0.15) !important; }

    /* --- HUB TAB BUTTONS --- */
    .btn-tab {
        background: transparent !important;
        border: 1px solid transparent !important;
        color: #a1a1aa !important;
        padding: 8px 16px !important;
        font-size: 12px !important;
        font-weight: 800 !important;
        border-radius: 6px !important;
        letter-spacing: 0.5px !important;
    }
    .btn-tab:hover {
        color: #f4f4f5 !important;
        background: rgba(255, 255, 255, 0.05) !important;
    }
    .btn-tab.active {
        background: rgba(255, 255, 255, 0.12) !important;
        border-color: #52525b !important;
        color: #fff !important;
    }
    .btn-tab-database {
        border-color: #f59e0b !important;
        color: #f59e0b !important;
        font-weight: 900 !important;
        letter-spacing: 0.06em !important;
    }
    .btn-tab-database:hover {
        background: rgba(245, 158, 11, 0.1) !important;
        color: #fbbf24 !important;
        border-color: #f59e0b !important;
    }
    .btn-tab-database.active {
        background: rgba(245, 158, 11, 0.16) !important;
        border-color: #f59e0b !important;
        color: #f59e0b !important;
        box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.45);
    }

    /* --- GHOST / TEXT ACTIONS --- */
    .btn-ghost {
        background: transparent !important;
        border: none !important;
        color: #ef4444 !important;
        padding: 0 !important;
        font-size: 10px !important;
        font-weight: 800 !important;
        letter-spacing: 0.5px !important;
        text-transform: uppercase !important;
    }
    .btn-ghost:hover { opacity: 0.85 !important; }

    /* --- FULL-SCREEN VIEW HEADERS (hubs / ops chrome) --- */
    .view-header {
        height: 70px;
        min-height: 70px;
        background: var(--bg-sidebar);
        border-bottom: 1px solid #333;
        display: flex;
        align-items: center;
        padding: 0 25px;
        gap: 12px;
        flex-shrink: 0;
        box-sizing: border-box;
    }
    .view-header-title {
        color: #fff;
        font-weight: 900;
        font-size: 16px;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin: 0;
        white-space: nowrap;
    }
    .view-header-title--amber { color: #f59e0b; }
    .view-header-title--green { color: #10b981; }
    .view-header-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    /* --- MODAL / SECTION TITLES --- */
    .modal-title {
        margin: 0 0 15px 0;
        color: #fff;
        font-size: 16px;
        font-weight: 800;
        border-bottom: 1px solid #333;
        padding-bottom: 10px;
    }
    .modal-title--plain {
        border-bottom: none;
        padding-bottom: 0;
        margin-bottom: 0;
    }
    .modal-title--green { color: #10b981; }

    .logout-confirm-overlay { left: 0; width: 100vw; }
    .logout-confirm-modal { padding: 24px 22px 20px; }
    .logout-confirm-brand {
        font-size: 28px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.02em;
        color: #fff;
        margin: 0 0 16px 0;
    }
    .logout-confirm-message {
        color: #a1a1aa;
        font-size: 13px;
        line-height: 1.45;
        margin: 0 0 22px 0;
    }
    .logout-confirm-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
    }
    .logout-confirm-cancel,
    .logout-confirm-logout {
        width: auto !important;
        min-width: 110px;
        margin: 0 !important;
    }

    #push-toast-container {
        position: fixed;
        top: 14px;
        left: 70px;
        right: 14px;
        z-index: 2800;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
    }
    .push-toast {
        pointer-events: auto;
        background: #18181b;
        border: 1px solid #f43f5e;
        border-radius: 10px;
        padding: 12px 14px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.55);
        animation: pushToastIn 0.28s ease-out;
        max-width: 360px;
        margin-left: auto;
    }
    .push-toast--out {
        opacity: 0;
        transform: translateY(-8px);
        transition: opacity 0.28s ease, transform 0.28s ease;
    }
    .push-toast-brand {
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.08em;
        color: #f43f5e;
        margin-bottom: 4px;
    }
    .push-toast-title {
        font-size: 14px;
        font-weight: 800;
        color: #fff;
        line-height: 1.3;
    }
    .push-toast-body {
        font-size: 12px;
        color: #a1a1aa;
        margin-top: 4px;
    }

    .notif-card {
        position: relative;
        padding: 10px 12px 10px 10px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
    }
    .notif-card--mobile {
        padding: 14px 14px 12px 12px;
        margin-bottom: 10px;
    }
    .notif-dismiss-btn {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid #3f3f46;
        border-radius: 8px;
        color: #d4d4d8;
        cursor: pointer;
        font-size: 22px;
        font-weight: 700;
        line-height: 1;
        padding: 0;
        z-index: 2;
    }
    .notif-dismiss-btn:hover {
        background: rgba(244, 63, 94, 0.2);
        border-color: #f43f5e;
        color: #fff;
    }
    .notif-card-message {
        font-size: 13px;
        color: #fff;
        padding-right: 42px;
        margin-bottom: 6px;
        pointer-events: none;
        line-height: 1.35;
    }
    .notif-card--mobile .notif-card-message {
        font-size: 14px;
        margin-bottom: 8px;
    }
    .notif-card-date {
        font-size: 11px;
        color: #888;
        pointer-events: none;
    }
    @keyframes pushToastIn {
        from { opacity: 0; transform: translateY(-12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
        margin: 0 0 15px 0;
        color: #fff;
        font-size: 14px;
        font-weight: 800;
        border-bottom: 1px solid #333;
        padding-bottom: 10px;
        letter-spacing: 0.3px;
    }

    /* --- COMPACT TOOLBAR INPUTS (hub headers only — not modal forms) --- */
    .input-compact {
        width: auto;
        padding: 6px 12px !important;
        height: 32px !important;
        font-size: 12px !important;
        font-weight: 500 !important;
        box-sizing: border-box;
        margin: 0;
        border-radius: 6px !important;
    }
    .input-compact--narrow { width: 150px; }

    .tab-bar {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
    }
    .tab-bar--segmented {
        gap: 4px;
        background: #18181b;
        padding: 4px;
        border-radius: 6px;
        border: 1px solid #333;
    }

    /* IAM role matrix checkboxes */
    #iam-modal-overlay .crew-cb { margin: 0; justify-self: center; }

    .nav-icon-btn {
        background: transparent !important;
        border: none !important;
        color: #71717a !important; /* text-muted */
        padding: 15px 0 !important;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: color 0.2s, background 0.2s !important;
        border-left: 3px solid transparent !important;
        border-radius: 0 !important;
    }
    .nav-icon-btn:hover {
        color: #f4f4f5 !important;
        background: rgba(255,255,255,0.05) !important;
        border-left: 3px solid var(--accent) !important;
    }

    /* Sidebar: hide permission-gated icons until boot script reveals them */
    #left-nav-bar .nav-gated {
        display: none !important;
    }

    /* --- CALENDAR STRIP HOVER & TOGGLE ENGINE --- */
    /* Default Solid Color State */
    .event-custom-frame { background: var(--bg-dark) !important; border: 2px solid var(--event-border-color) !important; transition: background 0.2s !important; }
    .event-custom-frame .hover-bg, .event-custom-frame .bars-wrapper { opacity: 0; transition: opacity 0.2s; }
    .event-custom-frame .solid-bg { opacity: var(--cal-bg-intensity, 0.3); transition: opacity 0.2s; }
    .event-custom-title { color: #fff !important; text-shadow: -1px -1px 2px #000, 1px 1px 2px #000, 0px 0px 4px #000 !important; transition: color 0.2s; }

    /* Hover State (Reveals Stripes) */
    .event-custom-frame:hover .hover-bg, .event-custom-frame:hover .bars-wrapper { opacity: 1; }
    .event-custom-frame:hover .solid-bg { opacity: 0; }
    .event-custom-frame:hover .event-custom-title { color: var(--text-col) !important; }

    /* Force Hover State (Reveals Stripes) triggered via JS cross-referencing */
    .event-custom-frame.force-hover .hover-bg, .event-custom-frame.force-hover .bars-wrapper { opacity: 1 !important; }
    .event-custom-frame.force-hover .solid-bg { opacity: 0 !important; }
    .event-custom-frame.force-hover .event-custom-title { color: var(--text-col) !important; }

    /* Button Toggled State (Locks them open) */
    .show-strips .event-custom-frame .hover-bg, .show-strips .event-custom-frame .bars-wrapper { opacity: 1 !important; }
    .show-strips .event-custom-frame .solid-bg { opacity: 0 !important; }
    .show-strips .event-custom-frame .event-custom-title { color: var(--text-col) !important; }

    .dashboard { display: flex; height: 100vh; }
    #calendar-container { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; }
    #calendar { flex: 1; height: 100%; min-height: 600px; }
    
    .fc-theme-standard td, .fc-theme-standard th, .fc-theme-standard .fc-scrollgrid { border: none !important; }
    .fc-day { padding: 5px !important; }
    .fc-col-header-cell-cushion { display: block; width: 100%; background: var(--bg-header); border-radius: var(--radius-cell); color: var(--text-muted); text-transform: uppercase; font-size: 13px; font-weight: 700; padding: 14px 0 !important; text-decoration: none !important; }
    
.fc-daygrid-day-frame { background: var(--bg-cell); border-radius: var(--radius-cell); min-height: 180px !important; height: 100% !important; display: flex; flex-direction: column; border: 3px solid transparent; box-sizing: border-box; }
    
    .fc-theme-standard .fc-day-today { background: transparent !important; }
    .fc-day-today .fc-daygrid-day-frame { border: 3px solid #d4d4d8 !important; }

    .fc-daygrid-day-number { color: #55555e; font-size: 18px; font-weight: 700; padding: 10px; text-decoration: none !important; }
    
.fc-daygrid-day-events { flex-grow: 1; padding: 4px !important; margin-top: 2px !important; }
    
.fc-event { border: none !important; background: transparent !important; margin-bottom: 2px !important; cursor: pointer; }
    .fc-event:not(.fc-event-end) .event-card-inner { border-top-right-radius: 0; border-bottom-right-radius: 0; border-right: none; }
    .fc-event:not(.fc-event-start) .event-card-inner { border-top-left-radius: 0; border-bottom-left-radius: 0; border-left: none; }
    
    .event-card-inner { 
      background: var(--bg-event); border-left: 4px solid var(--accent); border-radius: var(--radius-event); 
      padding: 0 12px; height: 32px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); 
      display: flex; flex-direction: row; align-items: center; justify-content: space-between; transition: all 0.2s; box-sizing: border-box; width: 100%;
    }
    .event-card-inner:hover { transform: translateY(-2px); background: #2a2a32; }
    .event-title { font-size: 13px; font-weight: 800; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1; flex: 1; }

    /* --- VIEW BASED EVENT VISIBILITY --- */
    .fc-timeGridDay-view .event-rollup,
    .fc-timeGridWeek-view .event-rollup {
        display: none !important;
    }

    .fc-dayGridMonth-view .event-fragment,
    .fc-listWeek-view .event-fragment {
        display: none !important;
    }

    .indicator-row { display: flex; gap: 6px; align-items: center; margin-left: 10px; }
    .indicator-item { display: flex; align-items: center; font-size: 12px; font-weight: 900; color: #fff; }
    .light { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .light.red { background: #ef4444; } .light.yellow { background: #f59e0b; } .light.green { background: #10b981; } .light.grey { background: #52525b; }

    .wh-event, .wh2-event, .tidy-event { width: 50% !important; margin-left: 0 !important; }
    .wh-card, .wh2-card { background: #c2410c !important; border-left: 4px solid #f97316 !important; }
    .wh-card .event-title, .wh2-card .event-title { color: #ffedd5 !important; font-size: 12px !important;}
    
    .tidy-card { background: #4c1d95 !important; border-left: 4px solid #8b5cf6 !important; }
    .tidy-card .event-title { color: #ede9fe !important; font-size: 12px !important; }
    
    .asset-row { background: #0a0a0c; transition: background 0.1s; }
    .asset-row:not(.parent-row):hover { background: #151518; }
    .asset-row.row-selected, .theme-light .asset-row.row-selected, .theme-light .asset-row.row-selected:hover { background: rgba(16, 185, 129, 0.2) !important; }

    /* --- ASSET COLUMN RESIZER --- */
    .col-resizer {
        display: none;
        width: 14px;
        cursor: col-resize;
        position: absolute;
        right: -7px;
        top: -5px;
        bottom: -5px;
        z-index: 20;
        background: rgba(255,255,255,0.05);
        border-right: 1px dashed rgba(255,255,255,0.2);
        transition: background 0.2s, border-color 0.2s;
    }
    .editing-cols .col-resizer { display: block; }
    .editing-cols .col-resizer:hover, .editing-cols .col-resizer.active { background: rgba(168, 85, 247, 0.4); border-right: 1px solid #a855f7; }

    /* --- 2. SIDEBAR --- */
    .sidebar { width: 240px; padding: 25px; background: var(--bg-sidebar); border-left: 1px solid #1a1a1f; display: flex; flex-direction: column; }
    .btn-new { width: 100%; padding: 16px; background: var(--accent); border: none; color: white; border-radius: var(--radius-event); cursor: pointer; font-weight: 800; margin-bottom: 25px; font-size: 12px; }
    #unscheduled-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .project-card { background: var(--bg-cell); padding: 14px; border-radius: var(--radius-cell); border: 1px solid #222; cursor: pointer; transition: 0.2s; }
    .project-card:hover { border-color: var(--accent); }
    .project-card b { font-size: 15px; font-weight: 800; color: #fff; display: block; margin-bottom: 6px; line-height: 1.2;}

    /* --- 3. MODALS --- */
    .modal-overlay { display: none; position: fixed; top: 0; left: 60px; width: calc(100vw - 60px); height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; box-sizing: border-box; }
    .modal { background: #18181b; padding: 30px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 450px; box-sizing: border-box; }
    
    #create-modal-overlay .modal { width: 90vw !important; height: 90vh !important; max-width: 1200px; max-height: 800px; }
    #backup-modal-overlay { left: 0 !important; width: 100vw !important; z-index: 2147483647 !important; }
    
    input, select { width: 100%; padding: 14px; background: #27272a; border: 1px solid #333; color: white; border-radius: 6px; font-family: inherit; box-sizing: border-box; }
    
    /* Hide native ugly browser spin buttons for number inputs globally */
    input[type="number"]::-webkit-inner-spin-button, 
    input[type="number"]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      appearance: none;
      margin: 0; 
    }
    input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

    input[type="date"] {
      position: relative;
      cursor: pointer;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    .input-label { font-size: 11px; color: #888; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.3px;}
    
    .crew-cb-container { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #2a2a2f; cursor: pointer; }
    
    /* CUSTOM PROJECT THEME CHECKBOXES */
    .crew-cb { 
      appearance: none; -webkit-appearance: none; width: 18px; height: 18px; min-width: 18px; margin-right: 12px; 
      background: #18181b; border: 2px solid #52525b; border-radius: 4px; 
      cursor: pointer; position: relative; transition: 0.2s; display: inline-block;
    }
    .crew-cb:checked { background: #10b981; border-color: #10b981; }
    .crew-cb:checked::after {

    /* ==========================================

       ========================================== */
    :root.theme-light {

      --bg-sidebar: #ffffff;    
      --bg-cell: #ffffff;       
      --bg-event: #e5e7eb;

      --border-light: #d1d5db;  
      --shadow-light: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --shadow-modal: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    
    .theme-light body { background: var(--bg-dark); color: var(--text-main); }
    
    /* Scrollbars */
    .theme-light ::-webkit-scrollbar-track { background: var(--bg-dark); }
    .theme-light ::-webkit-scrollbar-thumb { background: #d1d5db; border: 2px solid var(--bg-dark); }
    .theme-light ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    .theme-light ::-webkit-scrollbar-corner { background: var(--bg-dark); }

    /* Modals, Cards & Panels */
    .theme-light .modal, .theme-light .login-card { background: var(--bg-cell) !important; border-color: var(--border-light) !important; box-shadow: var(--shadow-modal) !important; }
    .theme-light .project-card, .theme-light .wh-root-item, .theme-light .roster-item { background: var(--bg-cell) !important; border-color: var(--border-light) !important; color: var(--text-main) !important; box-shadow: var(--shadow-light) !important;}

    /* Form Inputs */
    .theme-light input:not([type="color"]):not([type="checkbox"]), .theme-light select, .theme-light textarea { background: #ffffff !important; border-color: var(--border-light) !important; color: var(--text-main) !important; box-shadow: inset 0 1px 2px rgba(0,0,0,0.02); }
    .theme-light input:focus, .theme-light select:focus, .theme-light textarea:focus { border-color: var(--accent) !important; outline: none; box-shadow: 0 0 0 3px rgba(105, 139, 153, 0.2) !important; }
    .theme-light .input-label { color: var(--text-muted) !important; font-weight: 800 !important; }
    .theme-light .crew-cb { background: #ffffff !important; border-color: var(--border-light) !important; }

    body.desktop-lock-active { overflow: hidden; }
    body.desktop-lock-active .dashboard {
        filter: blur(12px) saturate(0.9);
        -webkit-filter: blur(12px) saturate(0.9);
        transition: filter 0.5s ease, -webkit-filter 0.5s ease;
    }
    .dashboard {
        transition: filter 0.5s ease, -webkit-filter 0.5s ease;
    }
    .desktop-lock-overlay {
        position: fixed;
        inset: 0;
        z-index: 10050;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.70);
        --lock-blur: 0px;
        backdrop-filter: blur(var(--lock-blur)) saturate(0.92);
        -webkit-backdrop-filter: blur(var(--lock-blur)) saturate(0.92);
        overflow: hidden;
        user-select: none;
        opacity: 0;
        transition: opacity 0.5s ease, backdrop-filter 0.5s ease, -webkit-backdrop-filter 0.5s ease;
    }
    .desktop-lock-overlay.is-mounted {
        display: flex;
    }
    .desktop-lock-overlay.is-visible {
        opacity: 1;
        --lock-blur: 14px;
    }
    .desktop-lock-overlay.is-leaving {
        opacity: 0;
        --lock-blur: 0px;
    }
    .desktop-lock-hero {
        position: absolute;
        inset: 0;
        z-index: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        pointer-events: none;
        padding-left: 10vw;
        box-sizing: border-box;
    }
    .desktop-lock-hero-a {
        height: calc(100vh - 40px);
        height: calc(100dvh - 40px);
        width: auto;
        opacity: 0.07;
        transform-origin: center center;
        animation: desktop-lock-hero-pulse 52s ease-in-out infinite alternate;
    }
    @keyframes desktop-lock-hero-pulse {
        0% { transform: translateX(4vw) scale(1); opacity: 0.06; }
        100% { transform: translateX(4vw) scale(14); opacity: 0.10; }
    }
    .desktop-lock-bus-lanes {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 1;
    }
    .desktop-lock-bus {
        position: absolute;
        left: 0;
        white-space: nowrap;
        will-change: transform, opacity;
        opacity: 0;
    }
    .desktop-lock-bus svg {
        width: 100%;
        height: auto;
        display: block;
    }
    .desktop-lock-bus--blur svg {
        filter: blur(2px);
        -webkit-filter: blur(2px);
    }
    .desktop-lock-bus--ltr {
        animation-name: desktop-lock-bus-ltr;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
    }
    .desktop-lock-bus--rtl {
        animation-name: desktop-lock-bus-rtl;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
    }
    @keyframes desktop-lock-bus-ltr {
        0%   { transform: translateX(-110%); opacity: 0; }
        7%   { opacity: var(--bus-o, 0.15); }
        93%  { opacity: var(--bus-o, 0.15); }
        100% { transform: translateX(110vw); opacity: 0; }
    }
    @keyframes desktop-lock-bus-rtl {
        0%   { transform: translateX(110vw); opacity: 0; }
        7%   { opacity: var(--bus-o, 0.15); }
        93%  { opacity: var(--bus-o, 0.15); }
        100% { transform: translateX(-110%); opacity: 0; }
    }
    .desktop-lock-foreground {
        position: relative;
        z-index: 3;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
    }
    .desktop-lock-clock-panel {
        position: relative;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin: 0;
        isolation: isolate;
        --lock-fade-out: 50px;
    }
    /* Clock dim: rounded plateau + blur fade (follows corners uniformly) */
    .desktop-lock-clock-panel::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: var(--lock-dim-w, 420px);
        height: var(--lock-dim-h, 170px);
        background: rgba(5, 5, 8, 0.72);
        pointer-events: none;
        z-index: -1;
        border-radius: var(--lock-dim-radius, 0);
        filter: blur(var(--lock-fade-out, 50px));
        -webkit-filter: blur(var(--lock-fade-out, 50px));
    }
    .desktop-lock-clock {
        font-family: "Bahnschrift", "Segoe UI", sans-serif;
        font-size: clamp(84px, 12vw, 144px);
        font-weight: 700;
        color: #8a939f;
        letter-spacing: 2px;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 1px rgba(138, 147, 159, 0.9), 0 0 10px rgba(138, 147, 159, 0.22);
        line-height: 1;
        margin: 0;
        padding: 0;
        white-space: nowrap;
        filter: blur(0.4px);
        -webkit-filter: blur(0.4px);
    }
    .desktop-lock-clock-slot {
        position: relative;
        display: inline-block;
        width: 0.58em;
        height: 1em;
        vertical-align: top;
    }
    .desktop-lock-clock-sep {
        display: inline-block;
        text-shadow: 0 0 1px rgba(138, 147, 159, 0.85), 0 0 8px rgba(138, 147, 159, 0.2);
    }
    .desktop-lock-clock-slot--accent .desktop-lock-clock-digit {
        color: #eb1c24;
        text-shadow: 0 0 1px rgba(235, 28, 36, 0.95), 0 0 12px rgba(235, 28, 36, 0.28);
    }
    .desktop-lock-clock-digit {
        display: block;
        line-height: 1;
        width: 100%;
        text-align: center;
    }
    .desktop-lock-clock-digit.is-leaving,
    .desktop-lock-clock-digit.is-entering {
        position: absolute;
        left: 0;
        top: 0;
    }
    .desktop-lock-clock-digit.is-leaving {
        opacity: 1;
        z-index: 1;
        animation: desktop-lock-digit-out 0.6s ease forwards;
    }
    .desktop-lock-clock-digit.is-entering {
        opacity: 0;
        z-index: 2;
        animation: desktop-lock-digit-in 0.3s ease forwards;
    }
    @keyframes desktop-lock-digit-out {
        from { opacity: 1; }
        to   { opacity: 0; }
    }
    @keyframes desktop-lock-digit-in {
        from { opacity: 0; }
        to   { opacity: 1; }
    }
    .desktop-lock-hidden-capture {

        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
