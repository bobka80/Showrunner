<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script>
  (function(){ if (window.self !== window.top) { var b = document.querySelector('base'); if (b) b.target = '_self'; } })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg-dark: #0a0a0c; --bg-card: #1a1a1e; --accent: #698b99; --text-main: #f4f4f5; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-card { background: var(--bg-card); padding: 40px; border-radius: 12px; border-top: 6px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: center; width: 100%; max-width: 320px; box-sizing: border-box;}
    
    input[type="password"] { width: 100%; padding: 14px; margin: 20px 0 15px 0; background: #27272a; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; text-align: center; letter-spacing: 2px;}
    .btn-main { width: 100%; padding: 14px; background: rgba(16, 185, 129, 0.4); border: 1px solid #10b981; color: white; border-radius: 6px; font-weight: 800; cursor: pointer; transition: 0.2s; letter-spacing: 0.5px; text-transform: uppercase; font-size: 12px; box-sizing: border-box;}
    .btn-main:hover { background: rgba(16, 185, 129, 0.6); }
    #session-booting { display: none; color: #10b981; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="login-card">
    <h2 style="margin: 0 0 5px 0;">SYSTEM SECURE</h2>
    <p style="color: #71717a; font-size: 12px; margin-bottom: 20px;">Enter Command Passcode</p>
    <div id="session-booting">Opening Showrunner…</div>
    <div id="error-display" style="color: #ef4444; font-size: 12px; font-weight: bold; margin-bottom: 15px; display: none;"></div>
    
    <form id="login-form" method="post" action="<?= scriptUrl ?>" target="_self">
      <div style="text-align: left; margin-bottom: 10px;">
        <label class="input-label">Crew Name</label>
        <input type="text" name="name" id="name-input" placeholder="e.g. John Doe" required style="width: 100%; padding: 14px; margin-top: 5px; background: #27272a; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box;">
      </div>
      
      <div style="text-align: left; margin-bottom: 20px;">
        <label class="input-label">6-Character Passcode</label>
        <input type="password" name="passcode" id="pass-input" placeholder="••••••" maxlength="6" required style="width: 100%; padding: 14px; margin-top: 5px; background: #27272a; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; letter-spacing: 4px; font-size: 18px; text-align: center;">
      </div>

      <p id="stay-signed-in-note" style="font-size:11px; font-weight:700; color:#71717a; margin:0 0 20px 0; line-height:1.45;">
        Stay signed in on this device for <strong style="color:#10b981;">30 days</strong> after login.
      </p>
      <div id="stay-signed-in-reenable" style="display:none; text-align:left; margin:0 0 20px 0;">
        <label style="font-size:11px; font-weight:700; color:#71717a; display:flex; align-items:flex-start; gap:8px; cursor:pointer; line-height:1.45;">
          <input type="checkbox" id="reenable-auto-login-chk" style="margin-top:2px; flex-shrink:0;">
          <span>Stay signed in on this device for <strong style="color:#10b981;">30 days</strong> after login</span>
        </label>
      </div>

      <button type="submit" id="login-btn" class="btn-main">AUTHENTICATE</button>
    </form>

    <p style="margin: 22px 0 0; padding-top: 18px; border-top: 1px solid #27272a;">
      <a href="<?!= stationAppUrl ?>" style="font-size: 11px; font-weight: 800; color: #f97316; text-decoration: none; letter-spacing: 0.03em; text-transform: uppercase;">
        Warehouse gun — install station app
      </a>
    </p>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const nameInput = document.getElementById('name-input');
      const passInput = document.getElementById('pass-input');
      const form = document.getElementById('login-form');
      const btn = document.getElementById('login-btn');
      const bootMsg = document.getElementById('session-booting');
      const scriptUrl = <?!= JSON.stringify(scriptUrl || '') ?>;
      const clearSession = <?!= JSON.stringify(!!clearSession) ?>;
      
      const errorDisplayRaw = <?!= JSON.stringify(errorMsg || "") ?>;
      const errorDisplay = errorDisplayRaw ? errorDisplayRaw.toString() : "";
      const isError = (errorDisplay && errorDisplay.trim() !== '' && errorDisplay.trim() !== 'none');

      const SESSION_MS = 30 * 24 * 60 * 60 * 1000;

      function crewKeyFromName(name) {
        return String(name || '').toLowerCase().trim().replace(/\s+/g, '_');
      }

      function isDesktopLoginContext() {
        try { return window.matchMedia('(min-width: 769px)').matches; } catch (e) { return true; }
      }

      function isLoginAutoBootBlocked() {
        if (!isDesktopLoginContext()) return false;
        var crewKey = '';
        try {
          crewKey = crewKeyFromName(localStorage.getItem('sm_crew_name') || nameInput.value || '');
        } catch (e) { /* ignore */ }
        if (!crewKey) return false;
        try {
          return localStorage.getItem('sm_auto_login_off_' + crewKey) === '1';
        } catch (e) { return false; }
      }

      function updateStaySignedInUI() {
        var blocked = isLoginAutoBootBlocked();
        var note = document.getElementById('stay-signed-in-note');
        var reenable = document.getElementById('stay-signed-in-reenable');
        if (note) note.style.display = blocked ? 'none' : '';
        if (reenable) reenable.style.display = blocked ? 'block' : 'none';
      }

      function sessionCheckJsonp(token) {
        return new Promise(function(resolve) {
          if (!token || !scriptUrl) return resolve({ valid: false });
          var cb = '__srSessChk_' + Date.now();
          var settled = false;
          function finish(res) {
            if (settled) return;
            settled = true;
            try { delete window[cb]; } catch (e) { /* ignore */ }
            resolve(res || { valid: false });
          }
          window[cb] = function(res) {
            finish(res || { valid: false });
          };
          var s = document.createElement('script');
          s.src = scriptUrl + '?action=sessioncheck&token=' + encodeURIComponent(token) + '&callback=' + encodeURIComponent(cb);
          s.onerror = function() {
            finish({ valid: false, networkError: true });
          };
          document.head.appendChild(s);
          setTimeout(function() {
            try { if (s.parentNode) s.parentNode.removeChild(s); } catch (e) { /* ignore */ }
            finish({ valid: false, networkError: true });
          }, 8000);
        });
      }

      function showLoginForm() {
        if (form) form.style.display = '';
        if (bootMsg) bootMsg.style.display = 'none';
        updateStaySignedInUI();
      }

      function postLoginState(loggedIn, withClear) {
        if (window.parent === window) return;
        try {
          window.parent.postMessage({
            type: 'SHOWRUNNER_LOGIN_STATE',
            loggedIn: loggedIn,
            clearSession: !!withClear
          }, '*');
        } catch (e) { /* ignore */ }
      }

      function beginSessionBoot(token, crewName, expiresAt) {
        if (form) form.style.display = 'none';
        if (bootMsg) bootMsg.style.display = 'block';
        notifyParentSessionToken(token, crewName, expiresAt);
        window.location.replace(scriptUrl + '?action=sessionboot&token=' + encodeURIComponent(token));
      }

      function clearStoredSession() {
        try {
          var savedCrew = localStorage.getItem('sm_crew_name') || '';
          var crewKey = String(savedCrew).toLowerCase().trim().replace(/\s+/g, '_');
          localStorage.removeItem('sm_session_token');
          localStorage.removeItem('sm_session_expires');
          localStorage.removeItem('sm_crew_name');
          localStorage.removeItem('sm_crew_pass');
          localStorage.removeItem('sm_crew_timestamp');
          if (crewKey) {
            localStorage.removeItem('sm_lock_prefix_' + crewKey);
            sessionStorage.removeItem('sm_lock_prefix_' + crewKey);
          }
        } catch (e) { /* ignore */ }
      }

      function notifyParentSessionClear() {
        if (window.parent && window.parent !== window) {
          try {
            if (/ShowrunnerStation/i.test(navigator.userAgent || '')) {
              if (window.AndroidStation && typeof AndroidStation.getSavedSession === 'function') {
                var saved = AndroidStation.getSavedSession();
                if (saved) {
                  try {
                    var parsed = JSON.parse(saved);
                    if (parsed && parsed.token && parseInt(parsed.expiresAt, 10) > Date.now()) return;
                  } catch (e) { /* ignore */ }
                }
              }
            }
            window.parent.postMessage({ type: 'SHOWRUNNER_SESSION_CLEAR' }, '*');
          } catch (e) { /* ignore */ }
        }
      }

      function notifyParentSessionToken(token, crewName, expiresAt) {
        if (!token || window.parent === window) return;
        try {
          window.parent.postMessage({
            type: 'SHOWRUNNER_SESSION_TOKEN',
            token: token,
            crewName: crewName || '',
            expiresAt: expiresAt || (Date.now() + SESSION_MS)
          }, '*');
        } catch (e) { /* ignore */ }
      }

      if (clearSession) {
        clearStoredSession();
        notifyParentSessionClear();
      }

      if (isError) {
         document.getElementById('error-display').innerText = errorDisplay;
         document.getElementById('error-display').style.display = 'block';
         btn.innerText = 'AUTHENTICATE';
         postLoginState(false, !!clearSession);
      } else {
         try {
           const savedName = localStorage.getItem('sm_crew_name');
           if (savedName) nameInput.value = savedName;
         } catch (e) { /* ignore */ }

         updateStaySignedInUI();

         if (!isLoginAutoBootBlocked()) {
         const token = localStorage.getItem('sm_session_token');
         const exp = parseInt(localStorage.getItem('sm_session_expires') || '0', 10);
         if (token && exp > Date.now() && scriptUrl) {
           if (form) form.style.display = 'none';
           if (bootMsg) bootMsg.style.display = 'block';
           sessionCheckJsonp(token).then(function(res) {
             if (res && res.valid) {
               var crew = res.crewName || localStorage.getItem('sm_crew_name') || nameInput.value;
               var newExp = res.expiresAt || exp;
               try {
                 localStorage.setItem('sm_session_expires', String(newExp));
                 if (crew) localStorage.setItem('sm_crew_name', crew);
               } catch (e) { /* ignore */ }
               beginSessionBoot(token, crew, newExp);
               return;
             }
             if (res && res.networkError) {
               var crewNet = localStorage.getItem('sm_crew_name') || nameInput.value;
               beginSessionBoot(token, crewNet, exp);
               return;
             }
             clearStoredSession();
             notifyParentSessionClear();
             showLoginForm();
             postLoginState(false, true);
           });
           return;
         }
         if (token && exp <= Date.now()) {
           clearStoredSession();
         }
         }

         postLoginState(false, !!clearSession);
      }

      passInput.addEventListener('input', function(e) {
        this.value = this.value.replace(/[^a-zA-Z0-9]/g, '');
        if (this.value.length === 6) {
          if (btn.disabled) return;
          this.blur();
          btn.click(); 
        }
      });

      form.addEventListener('submit', function() {
        try {
          var crewKey = crewKeyFromName(nameInput.value);
          var reenable = document.getElementById('reenable-auto-login-chk');
          if (reenable && reenable.checked && crewKey) {
            localStorage.removeItem('sm_auto_login_off_' + crewKey);
          }
          localStorage.setItem('sm_crew_name', nameInput.value);
          var p = String(passInput.value || '').trim();
          if (p.length >= 2 && crewKey) {
            var prefix = p.substring(0, 2);
            localStorage.setItem('sm_lock_prefix_' + crewKey, prefix);
            sessionStorage.setItem('sm_lock_prefix_' + crewKey, prefix);
          }
        } catch (e) { /* ignore */ }
        if (window.parent && window.parent !== window) {
          try {
            var crew = String(nameInput.value || '').trim();
            if (crew) {
              window.parent.postMessage({
                type: 'SHOWRUNNER_SESSION',
                crewName: crew,
                regKey: '',
                loggedIn: true,
                pendingLogin: true
              }, '*');
            }
          } catch (e) { /* ignore */ }
        }
        btn.innerText = 'VERIFYING...';
        btn.style.opacity = '0.7';
        btn.disabled = true;
      });

    });
  </script>
</body>
</html>
