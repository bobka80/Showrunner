<!-- DAL Phase 4 — Timeline collab live sync (session + state; Firestore with GAS poll fallback) -->
<script>
window.dalTlSessionPollTimer = null;
window.dalTlStatePollTimer = null;
window.dalTlStateUnsub = null;
window.dalTlWatchProjectId = '';
window.dalTlIgnoreListenerUntil = 0;
window.dalTlLastStateSig = '';
window.dalTlRemotePending = false;
window.dalTlLiveSyncMode = ''; // 'firestore' | 'connecting' | 'blocked' | '' (legacy 'gas' = blocked)
window.dalTlStateSizeWarned_ = false;

window.dalTlStateSizeReport_ = function(shifts, phases, overrides) {
  var payload = {
    shifts: shifts || [],
    phases: phases || [],
    overrides: overrides || {}
  };
  var json = '[]';
  try { json = JSON.stringify(payload); } catch (e0) { json = '[]'; }
  var bytes = json.length;
  var count = (payload.shifts.length || 0) + (payload.phases.length || 0) +
    Object.keys(payload.overrides || {}).length;
  var warnB = window.DAL_STATE_WARN_BYTES || (512 * 1024);
  var maxB = window.DAL_STATE_MAX_BYTES || (900 * 1024);
  var warnC = window.DAL_STATE_WARN_COUNT || 1500;
  var maxC = window.DAL_STATE_MAX_COUNT || 4000;
  var overMax = bytes >= maxB || count >= maxC;
  var overWarn = !overMax && (bytes >= warnB || count >= warnC);
  return { bytes: bytes, count: count, overWarn: overWarn, overMax: overMax, ok: !overMax };
};
window.dalTlLiveSyncFailReason_ = '';
window.dalTlBlockedRetryTimer_ = null;
window.dalTlBlockedWarnAt_ = 0;
window.dalTlWasSessionOpen = false;
window.dalTlLastRemoteUpdatedAt = '';
window.dalTlLastAppliedRemoteSig_ = '';
window.dalTlHaveServerSnap_ = false;
window.dalTlApplyingRemote = false;
window.dalTlPendingRemote = null;
window.dalTlSyncBase_ = null;
window.dalTlClientId = 'tl_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
window.dalTlTouchedShifts_ = {};
window.dalTlDeletedShifts_ = {};
window.dalTlTouchedPhases_ = {};
window.dalTlDeletedPhases_ = {};
window.dalTlTouchedOverrides_ = {};
window.dalTlDeletedOverrides_ = {};
window.dalTlEntityHoldUntil_ = {}; // id -> ms — keep local strip during hold (stops A↔B yank)
window.dalTlLastWriteSeq_ = 0;
window.dalTlEntityHoldMs_ = 2000;
/** H3 — id → { sig, until } for strip LWW loss toasts (not qty-combine) */
window.dalTlLwwWatchShifts_ = window.dalTlLwwWatchShifts_ || {};
window.dalTlLwwWatchPhases_ = window.dalTlLwwWatchPhases_ || {};
window.dalTlLwwWatchOverrides_ = window.dalTlLwwWatchOverrides_ || {};
window.dalTlLwwToastAt_ = 0;

window.dalTimelineLayerOpen_ = function() {
  var layer = document.getElementById('shift-layer');
  return !!(layer && layer.style.display !== 'none' && layer.style.display !== '');
};

window.dalTlRound_ = function(n) {
  var x = Number(n);
  if (!isFinite(x)) return 0;
  return Math.round(x * 100) / 100;
};

window.dalTlNewId_ = function(prefix) {
  return String(prefix || 'x') + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
};

window.dalTlClearMutations_ = function() {
  window.dalTlTouchedShifts_ = {};
  window.dalTlDeletedShifts_ = {};
  window.dalTlTouchedPhases_ = {};
  window.dalTlDeletedPhases_ = {};
  window.dalTlTouchedOverrides_ = {};
  window.dalTlDeletedOverrides_ = {};
};

window.dalTlHasPendingMutations_ = function() {
  return !!(
    Object.keys(window.dalTlTouchedShifts_ || {}).length ||
    Object.keys(window.dalTlDeletedShifts_ || {}).length ||
    Object.keys(window.dalTlTouchedPhases_ || {}).length ||
    Object.keys(window.dalTlDeletedPhases_ || {}).length ||
    Object.keys(window.dalTlTouchedOverrides_ || {}).length ||
    Object.keys(window.dalTlDeletedOverrides_ || {}).length
  );
};

window.dalTlSnapshotMutations_ = function() {
  return {
    touchedShifts: Object.assign({}, window.dalTlTouchedShifts_ || {}),
    deletedShifts: Object.assign({}, window.dalTlDeletedShifts_ || {}),
    touchedPhases: Object.assign({}, window.dalTlTouchedPhases_ || {}),
    deletedPhases: Object.assign({}, window.dalTlDeletedPhases_ || {}),
    touchedOverrides: Object.assign({}, window.dalTlTouchedOverrides_ || {}),
    deletedOverrides: Object.assign({}, window.dalTlDeletedOverrides_ || {})
  };
};

/** Record local edits — only these entities may overwrite remote on flush. */
window.dalTlLiveWritesAllowed_ = function() {
  if (!window.dalTimelineSessionOpen) return true;
  return window.dalTlLiveSyncMode === 'firestore';
};

window.dalTlWarnBlockedOnce_ = function() {
  if (Date.now() < (window.dalTlBlockedWarnAt_ || 0)) return;
  window.dalTlBlockedWarnAt_ = Date.now() + 4000;
  var msg = 'Timeline live sync is down — edits are blocked until patch restores.';
  try {
    if (typeof showToast === 'function') showToast(msg);
    else if (typeof showNotification === 'function') showNotification(msg);
    else console.warn(msg);
  } catch (eW) { /* ignore */ }
};

window.dalTlClearBlockedRetry_ = function() {
  if (window.dalTlBlockedRetryTimer_) {
    try { clearInterval(window.dalTlBlockedRetryTimer_); } catch (eR) { /* ignore */ }
    window.dalTlBlockedRetryTimer_ = null;
  }
};

window.enterDalTlLiveSyncBlocked_ = function(projectId, reason) {
  if (!projectId || !window.dalTimelineSessionOpen) return;
  window.stopDalTimelineStateSync_();
  window.dalTlLiveSyncMode = 'blocked';
  window.dalTlLiveSyncFailReason_ = String(reason || 'live sync unavailable').slice(0, 100);
  window.dalUpdateTimelineLiveBanner_();
  window.startDalTimelineGasReadOnlyPull_(projectId);
  window.dalTlClearBlockedRetry_();
  window.dalTlBlockedRetryTimer_ = setInterval(function() {
    if (!window.dalTimelineSessionOpen) {
      window.dalTlClearBlockedRetry_();
      return;
    }
    if (window.dalTlLiveSyncMode === 'firestore' && window.dalTlStateUnsub) {
      window.dalTlClearBlockedRetry_();
      return;
    }
    try { console.log('[DAL TL] retrying Firestore live sync after block…'); } catch (eLog) { /* ignore */ }
    window.startDalTimelineFirestoreStateSync_(projectId);
  }, 8000);
};

window.dalTlNoteShiftTouch_ = function(id) {
  if (!id || !window.dalTimelineSessionOpen) return;
  if (!window.dalTlLiveWritesAllowed_()) { window.dalTlWarnBlockedOnce_(); return; }
  window.dalTlTouchedShifts_[id] = 1;
  delete window.dalTlDeletedShifts_[id];
  window.dalTlHoldEntity_(id);
  if (typeof window.dalTlArmLwwWatchFromLocal_ === 'function') {
    window.dalTlArmLwwWatchFromLocal_('shift', [id], 12000);
  }
};

window.dalTlNoteShiftDelete_ = function(id) {
  if (!id || !window.dalTimelineSessionOpen) return;
  if (!window.dalTlLiveWritesAllowed_()) { window.dalTlWarnBlockedOnce_(); return; }
  window.dalTlDeletedShifts_[id] = 1;
  delete window.dalTlTouchedShifts_[id];
  delete window.dalTlLwwWatchShifts_[id];
  window.dalTlHoldEntity_(id);
};

window.dalTlNotePhaseTouch_ = function(id) {
  if (!id || !window.dalTimelineSessionOpen) return;
  if (!window.dalTlLiveWritesAllowed_()) { window.dalTlWarnBlockedOnce_(); return; }
  window.dalTlTouchedPhases_[id] = 1;
  delete window.dalTlDeletedPhases_[id];
  window.dalTlHoldEntity_(id);
  if (typeof window.dalTlArmLwwWatchFromLocal_ === 'function') {
    window.dalTlArmLwwWatchFromLocal_('phase', [id], 12000);
  }
};

window.dalTlNotePhaseDelete_ = function(id) {
  if (!id || !window.dalTimelineSessionOpen) return;
  if (!window.dalTlLiveWritesAllowed_()) { window.dalTlWarnBlockedOnce_(); return; }
  window.dalTlDeletedPhases_[id] = 1;
  delete window.dalTlTouchedPhases_[id];
  delete window.dalTlLwwWatchPhases_[id];
  window.dalTlHoldEntity_(id);
};

window.dalTlNoteOverrideTouch_ = function(uid) {
  if (!uid || !window.dalTimelineSessionOpen) return;
  if (!window.dalTlLiveWritesAllowed_()) { window.dalTlWarnBlockedOnce_(); return; }
  window.dalTlTouchedOverrides_[uid] = 1;
  delete window.dalTlDeletedOverrides_[uid];
  window.dalTlHoldEntity_(uid);
  if (typeof window.dalTlArmLwwWatchFromLocal_ === 'function') {
    window.dalTlArmLwwWatchFromLocal_('override', [uid], 12000);
  }
};

window.dalTlHoldEntity_ = function(id) {
  if (!id) return;
  if (!window.dalTlEntityHoldUntil_) window.dalTlEntityHoldUntil_ = {};
  window.dalTlEntityHoldUntil_[id] = Date.now() + (window.dalTlEntityHoldMs_ || 2000);
};

window.dalTlClearExpiredHolds_ = function() {
  var hold = window.dalTlEntityHoldUntil_ || {};
  var now = Date.now();
  Object.keys(hold).forEach(function(id) {
    if (!hold[id] || hold[id] <= now) delete hold[id];
  });
};

window.dalTlShiftNonCombiningSig_ = function(s) {
  s = s || {};
  return [
    String(s.user_uid || s.userUid || ''),
    String(s.role || ''),
    String(s.Start != null ? s.Start : (s.start != null ? s.start : '')),
    String(s.Duration != null ? s.Duration : (s.duration != null ? s.duration : '')),
    String(s.Note != null ? s.Note : (s.note || '')),
    s.Has_Arrow || s.hasArrow ? '1' : '0'
  ].join('\t');
};

window.dalTlPhaseNonCombiningSig_ = function(p) {
  p = p || {};
  return [
    String(p.Phase_Name || p.name || ''),
    String(p.Start != null ? p.Start : (p.start != null ? p.start : '')),
    String(p.Duration != null ? p.Duration : (p.duration != null ? p.duration : '')),
    String(p.Note != null ? p.Note : (p.note || ''))
  ].join('\t');
};

window.dalTlOverrideSig_ = function(v) {
  return String(v == null ? '' : v);
};

window.dalTlArmLwwWatch_ = function(kind, ids, fromMap, ttlMs) {
  ttlMs = ttlMs || 12000;
  var until = Date.now() + ttlMs;
  var watch = kind === 'phase' ? window.dalTlLwwWatchPhases_
    : (kind === 'override' ? window.dalTlLwwWatchOverrides_ : window.dalTlLwwWatchShifts_);
  var sigFn = kind === 'phase' ? window.dalTlPhaseNonCombiningSig_
    : (kind === 'override' ? window.dalTlOverrideSig_ : window.dalTlShiftNonCombiningSig_);
  fromMap = fromMap || {};
  (ids || []).forEach(function(id) {
    if (!id) return;
    id = String(id);
    if (kind === 'override') {
      if (!Object.prototype.hasOwnProperty.call(fromMap, id)) return;
      watch[id] = { sig: sigFn(fromMap[id]), until: until };
      return;
    }
    var ent = fromMap[id];
    if (!ent) return;
    watch[id] = { sig: sigFn(ent), until: until };
  });
};

window.dalTlArmLwwWatchFromLocal_ = function(kind, ids, ttlMs) {
  var local = typeof window.dalTlCaptureLocalState_ === 'function'
    ? window.dalTlCaptureLocalState_()
    : { shifts: [], phases: [], overrides: {} };
  var by = {};
  if (kind === 'override') {
    by = local.overrides || {};
  } else {
    (kind === 'phase' ? local.phases : local.shifts).forEach(function(e) {
      if (e && e.id) by[String(e.id)] = e;
    });
  }
  window.dalTlArmLwwWatch_(kind, ids, by, ttlMs);
};

window.dalTlNotifyLwwLosses_ = function(overwriteCount, deleteCount) {
  overwriteCount = overwriteCount || 0;
  deleteCount = deleteCount || 0;
  var total = overwriteCount + deleteCount;
  if (!total) return;
  if (Date.now() < (window.dalTlLwwToastAt_ || 0)) return;
  window.dalTlLwwToastAt_ = Date.now() + 3500;
  var msg;
  if (deleteCount && !overwriteCount) {
    msg = deleteCount === 1
      ? 'Another editor removed a timeline item you just changed.'
      : ('Another editor removed ' + deleteCount + ' timeline items you just changed.');
  } else if (overwriteCount && !deleteCount) {
    msg = overwriteCount === 1
      ? 'Another editor overwrote your timeline change.'
      : ('Another editor overwrote your timeline changes (' + overwriteCount + ').');
  } else {
    msg = 'Another editor changed or removed timeline items you just edited (' + total + ').';
  }
  try {
    if (typeof showToast === 'function') showToast(msg);
    else if (typeof showNotification === 'function') showNotification(msg);
    else console.warn('[DAL TL H3]', msg);
  } catch (eT) { /* ignore */ }
};

window.dalTlCheckLwwLossesAgainstRemote_ = function(remoteState) {
  remoteState = remoteState || {};
  var now = Date.now();
  var protectedMap = {};
  Object.keys(window.dalTlTouchedShifts_ || {}).forEach(function(id) { protectedMap[id] = 1; });
  Object.keys(window.dalTlTouchedPhases_ || {}).forEach(function(id) { protectedMap[id] = 1; });
  Object.keys(window.dalTlTouchedOverrides_ || {}).forEach(function(id) { protectedMap[id] = 1; });
  Object.keys(window.dalTlDeletedShifts_ || {}).forEach(function(id) { protectedMap[id] = 1; });
  Object.keys(window.dalTlDeletedPhases_ || {}).forEach(function(id) { protectedMap[id] = 1; });
  Object.keys(window.dalTlDeletedOverrides_ || {}).forEach(function(id) { protectedMap[id] = 1; });
  Object.keys(window.dalTlEntityHoldUntil_ || {}).forEach(function(id) {
    if ((window.dalTlEntityHoldUntil_[id] || 0) > now) protectedMap[id] = 1;
  });
  var shiftBy = {};
  (remoteState.shifts || []).forEach(function(s) { if (s && s.id) shiftBy[String(s.id)] = s; });
  var phaseBy = {};
  (remoteState.phases || []).forEach(function(p) { if (p && p.id) phaseBy[String(p.id)] = p; });
  var ovBy = remoteState.overrides || {};
  var overwritten = 0;
  var deleted = 0;

  function sweep(watch, remoteBy, sigFn, isOverride) {
    Object.keys(watch || {}).forEach(function(id) {
      var w = watch[id];
      if (!w || !w.sig) return;
      if (w.until && now > w.until) { delete watch[id]; return; }
      if (protectedMap[id]) return;
      if (isOverride) {
        if (!Object.prototype.hasOwnProperty.call(remoteBy, id)) {
          delete watch[id];
          deleted++;
          return;
        }
        if (sigFn(remoteBy[id]) !== w.sig) { delete watch[id]; overwritten++; }
        return;
      }
      var remote = remoteBy[id];
      if (!remote) {
        delete watch[id];
        deleted++;
        return;
      }
      if (sigFn(remote) !== w.sig) { delete watch[id]; overwritten++; }
    });
  }

  sweep(window.dalTlLwwWatchShifts_, shiftBy, window.dalTlShiftNonCombiningSig_, false);
  sweep(window.dalTlLwwWatchPhases_, phaseBy, window.dalTlPhaseNonCombiningSig_, false);
  sweep(window.dalTlLwwWatchOverrides_, ovBy, window.dalTlOverrideSig_, true);
  window.dalTlNotifyLwwLosses_(overwritten, deleted);
};

window.dalTlArmLwwAfterFlush_ = function(mutations, localState) {
  mutations = mutations || {};
  localState = localState || { shifts: [], phases: [], overrides: {} };
  var shiftBy = {};
  (localState.shifts || []).forEach(function(s) { if (s && s.id) shiftBy[String(s.id)] = s; });
  var phaseBy = {};
  (localState.phases || []).forEach(function(p) { if (p && p.id) phaseBy[String(p.id)] = p; });
  window.dalTlArmLwwWatch_('shift', Object.keys(mutations.touchedShifts || {}), shiftBy, 14000);
  window.dalTlArmLwwWatch_('phase', Object.keys(mutations.touchedPhases || {}), phaseBy, 14000);
  window.dalTlArmLwwWatch_('override', Object.keys(mutations.touchedOverrides || {}), localState.overrides || {}, 14000);
};

/**
 * While an entity is on local hold, keep the local copy so a late/stale remote
 * cannot yank the strip back (the classic left↔right stutter).
 */
window.dalTlApplyEntityHolds_ = function(remoteState, localState) {
  window.dalTlClearExpiredHolds_();
  var hold = window.dalTlEntityHoldUntil_ || {};
  var now = Date.now();
  var localShifts = window.dalTlListToMap_(localState && localState.shifts);
  var localPhases = window.dalTlListToMap_(localState && localState.phases);
  var localOv = (localState && localState.overrides) || {};
  var remote = remoteState || { shifts: [], phases: [], overrides: {} };

  var shiftsOut = (remote.shifts || []).map(function(s) {
    if (s && s.id && hold[s.id] > now && localShifts[s.id]) return localShifts[s.id];
    return s;
  });
  var phasesOut = (remote.phases || []).map(function(p) {
    if (p && p.id && hold[p.id] > now && localPhases[p.id]) return localPhases[p.id];
    return p;
  });
  var ovOut = window.dalTlCloneOverrides_(remote.overrides);
  Object.keys(hold).forEach(function(k) {
    if (hold[k] > now && Object.prototype.hasOwnProperty.call(localOv, k)) {
      ovOut[k] = localOv[k];
    }
  });
  return { shifts: shiftsOut, phases: phasesOut, overrides: ovOut };
};

window.dalTlNormalizeHasArrow_ = function(v) {
  if (v === 'open' || v === 'Open') return 'open';
  if (v === true || v === 'true' || v === 1 || v === '1') return true;
  return false;
};

window.dalTlHasArrowSig_ = function(v) {
  var n = window.dalTlNormalizeHasArrow_(v);
  if (n === 'open') return 2;
  if (n === true) return 1;
  return 0;
};

window.dalTimelineStateSig_ = function(shifts, phases, overrides) {
  var s = (shifts || []).map(function(x) {
    return [
      x.id || '',
      x.user_uid || x.email || '',
      x.role || '',
      window.dalTlRound_(x.start),
      window.dalTlRound_(x.duration),
      window.dalTlHasArrowSig_(x.hasArrow),
      x.note || ''
    ].join(':');
  }).sort().join('|');
  var p = (phases || []).map(function(x) {
    return [
      x.id || '',
      x.type || '',
      window.dalTlRound_(x.start),
      window.dalTlRound_(x.duration),
      x.note || ''
    ].join(':');
  }).sort().join('|');
  var oKeys = Object.keys(overrides || {}).sort();
  var o = oKeys.map(function(k) { return k + '=' + (overrides[k] || ''); }).join('|');
  return s + '##' + p + '##' + o;
};

window.dalTlSanitizeShiftsForFork_ = function(list) {
  return (list || []).map(function(s) {
    // Stable id: assign once onto the live object so later sanitizes don't mint new ids.
    if (!s.id) s.id = window.dalTlNewId_('s_');
    return {
      id: s.id,
      user_uid: s.user_uid || s.email || '',
      email: s.user_uid || s.email || '',
      role: s.role || '',
      start: window.dalTlRound_(s.start),
      duration: window.dalTlRound_(s.duration),
      hasArrow: window.dalTlNormalizeHasArrow_(s.hasArrow),
      note: s.note || ''
    };
  });
};

window.dalTlSanitizePhasesForFork_ = function(list) {
  return (list || []).map(function(p) {
    if (!p.id) p.id = window.dalTlNewId_('p_');
    return {
      id: p.id,
      type: p.type || '',
      start: window.dalTlRound_(p.start),
      duration: window.dalTlRound_(p.duration),
      note: p.note || ''
    };
  });
};

window.dalTlCloneOverrides_ = function(obj) {
  try { return JSON.parse(JSON.stringify(obj && typeof obj === 'object' ? obj : {})); }
  catch (e) { return {}; }
};

window.dalTlIsLocalDragging_ = function() {
  return !!(
    (typeof dragMode !== 'undefined' && dragMode) ||
    (typeof dragPhaseMode !== 'undefined' && dragPhaseMode) ||
    (typeof dragSubEventMode !== 'undefined' && dragSubEventMode)
  );
};

window.dalTlCaptureLocalState_ = function() {
  return {
    shifts: window.dalTlSanitizeShiftsForFork_(typeof shifts !== 'undefined' ? shifts : []),
    phases: window.dalTlSanitizePhasesForFork_(typeof activePhases !== 'undefined' ? activePhases : []),
    overrides: window.dalTlCloneOverrides_(typeof localDeptOverrides !== 'undefined' ? localDeptOverrides : {})
  };
};

window.dalTlSetSyncBase_ = function(state) {
  window.dalTlSyncBase_ = {
    shifts: window.dalTlSanitizeShiftsForFork_(state && state.shifts),
    phases: window.dalTlSanitizePhasesForFork_(state && state.phases),
    overrides: window.dalTlCloneOverrides_(state && state.overrides)
  };
};

window.dalTlEntityChanged_ = function(a, b, fields) {
  if (!a || !b) return true;
  for (var i = 0; i < fields.length; i++) {
    var f = fields[i];
    if (f === 'start' || f === 'duration') {
      if (window.dalTlRound_(a[f]) !== window.dalTlRound_(b[f])) return true;
    } else if (f === 'hasArrow') {
      var na = window.dalTlNormalizeHasArrow_ ? window.dalTlNormalizeHasArrow_(a[f]) : !!a[f];
      var nb = window.dalTlNormalizeHasArrow_ ? window.dalTlNormalizeHasArrow_(b[f]) : !!b[f];
      if (na !== nb) return true;
    } else if (String(a[f] || '') !== String(b[f] || '')) {
      return true;
    }
  }
  return false;
};

window.dalTlListToMap_ = function(list) {
  var map = {};
  (list || []).forEach(function(e) { if (e && e.id) map[e.id] = e; });
  return map;
};

/**
 * Patch merge: start from REMOTE, apply only local touched/deleted entities.
 * Untouched local copies never overwrite remote — fixes stale crew-1 wipe when editing crew-2.
 */
window.dalTlPatchEntityList_ = function(remoteList, localList, touchedMap, deletedMap, fields) {
  var remoteMap = window.dalTlListToMap_(remoteList);
  var localMap = window.dalTlListToMap_(localList);
  var out = {};
  Object.keys(remoteMap).forEach(function(id) { out[id] = remoteMap[id]; });

  var touched = touchedMap || {};
  var deleted = deletedMap || {};
  var touchedKeys = Object.keys(touched);
  var deletedKeys = Object.keys(deleted);

  if (touchedKeys.length || deletedKeys.length) {
    deletedKeys.forEach(function(id) { delete out[id]; });
    touchedKeys.forEach(function(id) {
      if (localMap[id]) out[id] = localMap[id];
      else delete out[id];
    });
  }
  // No touches: keep remote as-is. Inventing "local differs → overwrite" caused A↔B stutter loops.

  return Object.keys(out).map(function(k) { return out[k]; });
};

window.dalTlPatchOverrides_ = function(remoteObj, localObj, touchedMap, deletedMap) {
  var out = window.dalTlCloneOverrides_(remoteObj);
  var local = localObj || {};
  var touched = touchedMap || {};
  var deleted = deletedMap || {};
  var touchedKeys = Object.keys(touched);
  var deletedKeys = Object.keys(deleted);
  if (touchedKeys.length || deletedKeys.length) {
    deletedKeys.forEach(function(k) { delete out[k]; });
    touchedKeys.forEach(function(k) {
      if (Object.prototype.hasOwnProperty.call(local, k)) out[k] = local[k];
      else delete out[k];
    });
  }
  // No touches: keep remote overrides (no silent local overwrite).
  return out;
};

window.dalTlPatchTimelineState_ = function(remoteState, localState, mutations) {
  var remote = remoteState || { shifts: [], phases: [], overrides: {} };
  var local = localState || { shifts: [], phases: [], overrides: {} };
  var mut = mutations || window.dalTlSnapshotMutations_();
  var shiftFields = ['user_uid', 'email', 'role', 'start', 'duration', 'hasArrow', 'note'];

/**
 * Direct browser → Firestore: transaction + PATCH merge (touched entities only).

window.dalWriteTimelineForkToFirestore_ = function(done) {
  done = done || function() {};
  if (!window.dalTimelineSessionOpen) {
    done(new Error('timeline_collab_not_open'));
    return;
  }
  if (typeof window.dalEnsureFirestoreClientAuth_ !== 'function') {
    done(new Error('firestore_auth_helper_missing'));
    return;
  }
  var projectId = document.getElementById('edit-folder-id')
    ? document.getElementById('edit-folder-id').value
    : '';
  if (!projectId) {
    done(new Error('missing_project'));
    return;
  }

  var localState = window.dalTlCaptureLocalState_();
  var mutations = window.dalTlSnapshotMutations_();
  var mode = typeof currentShiftMode !== 'undefined' ? currentShiftMode : 'main';
  var actor = typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System';
  var clientId = window.dalTlClientId;

  if (typeof window.dalTlStateSizeReport_ === 'function') {
    var tlRep = window.dalTlStateSizeReport_(localState.shifts, localState.phases, localState.overrides);
    if (tlRep.overMax) {
      done(new Error('TIMELINE_STATE_TOO_LARGE: ' + tlRep.count + ' entities / ' + tlRep.bytes + ' bytes'));
      try {
        var tlMsg = 'Timeline collab state too large for live sync. End collab or trim shifts/phases.';
        if (typeof showToast === 'function') showToast(tlMsg);
        else alert(tlMsg);
      } catch (eTl) { /* ignore */ }
      return;
    }
    if (tlRep.overWarn && !window.dalTlStateSizeWarned_) {
      window.dalTlStateSizeWarned_ = true;
      try {
        if (typeof showToast === 'function') {
          showToast('Timeline state is getting large (~' + Math.round(tlRep.bytes / 1024) + ' KB).');
        }
      } catch (eW2) { /* ignore */ }
    }
  }

  window.dalEnsureFirestoreClientAuth_(function(err, client) {
    if (err || !client) {
      done(err || new Error('firestore_client_unavailable'));
      return;
    }
    var path = 'projects/' + String(projectId) + '/timeline/state';

    // Host-shell path (preferred on web.app) — Auth + transaction run in parent.
    if (client.viaHost && typeof window.dalHostFsPatchWrite_ === 'function') {
      window.dalHostFsPatchWrite_(path, localState, mutations, {
        mode: mode,
        actor: actor,
        clientId: clientId
      }, function(writeErr, result) {
        if (writeErr) {
          done(writeErr);
          return;
        }
        var merged = (result && result.merged) || localState;
        var updatedAt = (result && result.updatedAt) || new Date().toISOString();
        var writeSeq = Number((result && result.writeSeq) || 0) || 0;
        var outSig = window.dalTimelineStateSig_(merged.shifts, merged.phases, merged.overrides);
        window.dalTlLastStateSig = outSig;
        window.dalTlLastAppliedRemoteSig_ = outSig;
        window.dalTlLastRemoteUpdatedAt = updatedAt;
        if (writeSeq > window.dalTlLastWriteSeq_) window.dalTlLastWriteSeq_ = writeSeq;
        window.dalTlSetSyncBase_(merged);
        window.dalMarkTimelineLocalSave_();
        Object.keys(mutations.touchedShifts).forEach(function(id) {
          delete window.dalTlTouchedShifts_[id];
          window.dalTlHoldEntity_(id);
        });
        Object.keys(mutations.deletedShifts).forEach(function(id) {
          delete window.dalTlDeletedShifts_[id];
          window.dalTlHoldEntity_(id);
        });
        Object.keys(mutations.touchedPhases).forEach(function(id) {
          delete window.dalTlTouchedPhases_[id];
          window.dalTlHoldEntity_(id);
        });
        Object.keys(mutations.deletedPhases).forEach(function(id) {
          delete window.dalTlDeletedPhases_[id];
          window.dalTlHoldEntity_(id);
        });
        Object.keys(mutations.touchedOverrides).forEach(function(id) {
          delete window.dalTlTouchedOverrides_[id];
          window.dalTlHoldEntity_(id);
        });
        Object.keys(mutations.deletedOverrides).forEach(function(id) {
          delete window.dalTlDeletedOverrides_[id];
          window.dalTlHoldEntity_(id);
        });
        if (typeof window.dalTlArmLwwAfterFlush_ === 'function') {
          window.dalTlArmLwwAfterFlush_(mutations, localState);
        }
        window.isTimelineDirty = window.dalTlHasPendingMutations_();
        window.dalTlPendingRemote = null;
        window.dalTlRemotePending = false;
        // Never re-install from write result — local UI already has the drag; re-install causes flicker.
        if (typeof window.dalUpdateTimelineLiveBanner_ === 'function') window.dalUpdateTimelineLiveBanner_();
        done(null, merged);
      });
      return;
    }

    if (!client.db) {
      done(new Error('firestore_client_unavailable'));
      return;
    }
    var ref = client.db.collection('projects').doc(String(projectId)).collection('timeline').doc('state');

    client.db.runTransaction(function(tx) {
      return tx.get(ref).then(function(doc) {
        var remoteState = { shifts: [], phases: [], overrides: {} };
        var prevSeq = 0;
        if (doc.exists) {
          remoteState = window.dalTlParseStateDoc_(doc.data());
          prevSeq = Number((doc.data() && doc.data().writeSeq) || remoteState.writeSeq || 0) || 0;
        }
        var merged = window.dalTlPatchTimelineState_(remoteState, localState, mutations);
        var updatedAt = new Date().toISOString();
        var writeSeq = prevSeq + 1;
        var payload = {
          mode: mode,
          shiftsJson: JSON.stringify(merged.shifts),
          phasesJson: JSON.stringify(merged.phases),
          overridesJson: JSON.stringify(merged.overrides),
          updatedAt: updatedAt,
          updatedBy: actor,
          clientId: clientId,
          writeSeq: writeSeq
        };
        tx.set(ref, payload);
        return { merged: merged, updatedAt: updatedAt, writeSeq: writeSeq };
      });
    }).then(function(result) {
      var merged = result.merged;
      var outSig = window.dalTimelineStateSig_(merged.shifts, merged.phases, merged.overrides);
      window.dalTlLastStateSig = outSig;
      window.dalTlLastAppliedRemoteSig_ = outSig;
      window.dalTlLastRemoteUpdatedAt = result.updatedAt;
      if (result.writeSeq > window.dalTlLastWriteSeq_) window.dalTlLastWriteSeq_ = result.writeSeq;
      window.dalTlSetSyncBase_(merged);
      window.dalMarkTimelineLocalSave_();
      Object.keys(mutations.touchedShifts).forEach(function(id) {
        delete window.dalTlTouchedShifts_[id];
        window.dalTlHoldEntity_(id);
      });
      Object.keys(mutations.deletedShifts).forEach(function(id) {
        delete window.dalTlDeletedShifts_[id];
        window.dalTlHoldEntity_(id);
      });
      Object.keys(mutations.touchedPhases).forEach(function(id) {
        delete window.dalTlTouchedPhases_[id];
        window.dalTlHoldEntity_(id);
      });
      Object.keys(mutations.deletedPhases).forEach(function(id) {
        delete window.dalTlDeletedPhases_[id];
        window.dalTlHoldEntity_(id);
      });
      Object.keys(mutations.touchedOverrides).forEach(function(id) {
        delete window.dalTlTouchedOverrides_[id];
        window.dalTlHoldEntity_(id);
      });
      Object.keys(mutations.deletedOverrides).forEach(function(id) {
        delete window.dalTlDeletedOverrides_[id];
        window.dalTlHoldEntity_(id);
      });
      if (typeof window.dalTlArmLwwAfterFlush_ === 'function') {
        window.dalTlArmLwwAfterFlush_(mutations, localState);
      }

      window.isTimelineDirty = window.dalTlHasPendingMutations_();
      window.dalTlPendingRemote = null;
      window.dalTlRemotePending = false;
      if (typeof window.dalUpdateTimelineLiveBanner_ === 'function') window.dalUpdateTimelineLiveBanner_();
      done(null, merged);
    }).catch(function(eWrite) {
      window.isTimelineDirty = true;
      done(eWrite);
    });
  });
};

window.dalMergeThenGasTimelineSave_ = function(done) {
  done = done || function() {};
  var projectId = document.getElementById('edit-folder-id')
    ? document.getElementById('edit-folder-id').value
    : '';
  var mode = typeof currentShiftMode !== 'undefined' ? currentShiftMode : 'main';
  if (!projectId || typeof saveAndCloseShifts !== 'function') {
    done(new Error('gas_merge_unavailable'));
    return;
  }
  var localState = window.dalTlCaptureLocalState_();
  var mutations = window.dalTlSnapshotMutations_();

  google.script.run
    .withFailureHandler(function(err) {
      try { console.warn('Timeline patch pull failed:', err); } catch (e0) { /* ignore */ }
      done(err || new Error('gas_pull_failed'));
    })
    .withSuccessHandler(function(data) {
      var remoteState = {
        shifts: window.dalTlSanitizeShiftsForFork_(data && data.shifts),
        phases: window.dalTlSanitizePhasesForFork_(data && data.phases),
        overrides: window.dalTlCloneOverrides_(data && data.overrides)
      };
      var merged = window.dalTlPatchTimelineState_(remoteState, localState, mutations);
      window.dalTlInstallMergedLocal_(merged, { forceRebuild: false });
      window.dalTlSetSyncBase_(merged);
      window.__dalTlQuietFlush = true;
      window.__dalTlMutationPayload = mutations;
      try { saveAndCloseShifts(); } finally {
        setTimeout(function() {
          window.__dalTlQuietFlush = false;
          window.__dalTlMutationPayload = null;
          Object.keys(mutations.touchedShifts).forEach(function(id) { delete window.dalTlTouchedShifts_[id]; });
          Object.keys(mutations.deletedShifts).forEach(function(id) { delete window.dalTlDeletedShifts_[id]; });
          Object.keys(mutations.touchedPhases).forEach(function(id) { delete window.dalTlTouchedPhases_[id]; });
          Object.keys(mutations.deletedPhases).forEach(function(id) { delete window.dalTlDeletedPhases_[id]; });
          Object.keys(mutations.touchedOverrides).forEach(function(id) { delete window.dalTlTouchedOverrides_[id]; });
          Object.keys(mutations.deletedOverrides).forEach(function(id) { delete window.dalTlDeletedOverrides_[id]; });
          window.isTimelineDirty = window.dalTlHasPendingMutations_();
          window.dalTlLastStateSig = window.dalTimelineStateSig_(merged.shifts, merged.phases, merged.overrides);
          done(null);
        }, 500);
      }
    })
    .getTimelineData(projectId, mode);
};

window.dalFlushTimelineIfCollabOpen_ = function() {
  if (!window.dalTimelineSessionOpen) return;
  if (!window.dalTlLiveWritesAllowed_()) {
    window.dalTlWarnBlockedOnce_();
    return;
  }
  if (typeof currentIsReadOnly !== 'undefined' && currentIsReadOnly) return;
  if (window.dalTlApplyingRemote) return;
  // Collab writes require explicit touches — dirty alone must not rewrite the whole fork.
  if (!window.dalTlHasPendingMutations_()) {
    window.isTimelineDirty = false;
    return;
  }
  if (window.dalTlFlushInFlight) {
    window.dalTlFlushAgain = true;
    return;
  }
  clearTimeout(window.dalTlFlushTimer);
  window.dalTlFlushTimer = setTimeout(function() {
    window.dalTlFlushTimer = null;
    if (!window.dalTimelineSessionOpen) return;
    if (!window.dalTlHasPendingMutations_()) {
      window.isTimelineDirty = false;
      return;
    }
    if (window.dalTlIsLocalDragging_()) {
      window.dalFlushTimelineIfCollabOpen_();
      return;
    }
    window.dalTlFlushInFlight = true;
    window.dalTlFlushAgain = false;
    window.isTimelineDirty = true;

    var finish = function() {
      window.dalTlFlushInFlight = false;
      if (window.dalTlFlushAgain || window.dalTlHasPendingMutations_()) {
        window.dalTlFlushAgain = false;
        window.dalFlushTimelineIfCollabOpen_();
        return;
      }
      window.isTimelineDirty = false;
      window.dalDrainPendingRemoteTimeline_();
    };

    if (window.dalTlLiveSyncMode === 'firestore') {
      window.dalWriteTimelineForkToFirestore_(function(writeErr) {
        if (!writeErr) {
          finish();
          return;
        }
        try { console.warn('Timeline Firestore patch failed (mutations kept for retry):', writeErr); } catch (e1) { /* ignore */ }
        finish();
      });
      return;
    }

    // H1: never GAS-merge multi-edit while collab is open without patch mode.
    finish();
  }, 40);
};

window.dalApplyRemoteTimelineState_ = function(remoteShifts, remotePhases, remoteOverrides, meta) {
  if (!window.dalTimelineLayerOpen_()) return;
  if (window.dalTlApplyingRemote) return;

  meta = meta || {};
  if (meta.hasPendingWrites) return;
  if (meta.fromCache && window.dalTlHaveServerSnap_) return;
  if (!meta.fromCache) window.dalTlHaveServerSnap_ = true;

  var writeSeq = Number(meta.writeSeq || 0) || 0;
  // Monotonic doc version — late/stale snaps cannot yank strips backward.
  if (writeSeq && window.dalTlLastWriteSeq_ && writeSeq < window.dalTlLastWriteSeq_) return;

  if (Date.now() < (window.dalTlIgnoreListenerUntil || 0) && meta.clientId === window.dalTlClientId) {
    if (writeSeq > window.dalTlLastWriteSeq_) window.dalTlLastWriteSeq_ = writeSeq;
    return;
  }

  var remoteUpdatedAt = String(meta.updatedAt || '');
  var shiftsIn = window.dalTlSanitizeShiftsForFork_(Array.isArray(remoteShifts) ? remoteShifts : []);
  var phasesIn = window.dalTlSanitizePhasesForFork_(Array.isArray(remotePhases) ? remotePhases : []);
  var overridesIn = remoteOverrides && typeof remoteOverrides === 'object' ? remoteOverrides : {};
  var remoteState = { shifts: shiftsIn, phases: phasesIn, overrides: overridesIn };
  var sig = window.dalTimelineStateSig_(shiftsIn, phasesIn, overridesIn);

  if (meta.clientId && meta.clientId === window.dalTlClientId) {
    window.dalTlLastStateSig = sig;
    window.dalTlLastAppliedRemoteSig_ = sig;
    if (remoteUpdatedAt) window.dalTlLastRemoteUpdatedAt = remoteUpdatedAt;
    if (writeSeq > window.dalTlLastWriteSeq_) window.dalTlLastWriteSeq_ = writeSeq;
    window.dalTlSetSyncBase_(remoteState);
    window.dalTlPendingRemote = null;
    window.dalTlRemotePending = false;
    window.dalUpdateTimelineLiveBanner_();
    return;
  }

  if (sig && sig === window.dalTlLastAppliedRemoteSig_) {
    if (remoteUpdatedAt) window.dalTlLastRemoteUpdatedAt = remoteUpdatedAt;
    if (writeSeq > window.dalTlLastWriteSeq_) window.dalTlLastWriteSeq_ = writeSeq;
    return;
  }

  if (remoteUpdatedAt && window.dalTlLastRemoteUpdatedAt && remoteUpdatedAt < window.dalTlLastRemoteUpdatedAt) {
    return;
  }

  if (sig === window.dalTlLastStateSig && !window.dalTlHasPendingMutations_()) {
    window.dalTlLastAppliedRemoteSig_ = sig;
    if (remoteUpdatedAt) window.dalTlLastRemoteUpdatedAt = remoteUpdatedAt;
    if (writeSeq > window.dalTlLastWriteSeq_) window.dalTlLastWriteSeq_ = writeSeq;
    window.dalTlSetSyncBase_(remoteState);
    window.dalTlPendingRemote = null;
    window.dalTlRemotePending = false;
    return;
  }

  if (window.dalTlIsLocalDragging_()) {
    window.dalStashPendingRemoteTimeline_(shiftsIn, phasesIn, overridesIn, meta);
    return;
  }

  window.dalTlApplyingRemote = true;
  try {
    if (typeof window.dalTlCheckLwwLossesAgainstRemote_ === 'function') {
      window.dalTlCheckLwwLossesAgainstRemote_(remoteState);
    }
    var localState = window.dalTlCaptureLocalState_();
    var mutations = window.dalTlSnapshotMutations_();
    var hasMut = window.dalTlHasPendingMutations_();
    var merged = hasMut
      ? window.dalTlPatchTimelineState_(remoteState, localState, mutations)
      : remoteState;
    // Always protect recently-touched local strips from stale remotes.
    merged = window.dalTlApplyEntityHolds_(merged, localState);

    var mergedSig = window.dalTimelineStateSig_(merged.shifts, merged.phases, merged.overrides);
    var localSig = window.dalTimelineStateSig_(localState.shifts, localState.phases, localState.overrides);
    if (mergedSig === localSig) {
      window.dalTlLastStateSig = sig;
      window.dalTlLastAppliedRemoteSig_ = sig;
      if (remoteUpdatedAt) window.dalTlLastRemoteUpdatedAt = remoteUpdatedAt;
      if (writeSeq > window.dalTlLastWriteSeq_) window.dalTlLastWriteSeq_ = writeSeq;
      window.dalTlSetSyncBase_(remoteState);
      window.dalTlPendingRemote = null;
      window.dalTlRemotePending = false;
      return;
    }

    if (remoteUpdatedAt) window.dalTlLastRemoteUpdatedAt = remoteUpdatedAt;
    if (writeSeq > window.dalTlLastWriteSeq_) window.dalTlLastWriteSeq_ = writeSeq;
    window.dalTlLastAppliedRemoteSig_ = sig;
    window.dalTlPendingRemote = null;
    window.dalTlRemotePending = hasMut;
    if (!hasMut) {
      window.dalTlLastStateSig = mergedSig;
      window.dalTlSetSyncBase_(merged);
    } else {
      window.dalTlSetSyncBase_(remoteState);
    }

    window.dalTlInstallMergedLocal_(merged, { forceRebuild: false });
    if (hasMut) {
      window.isTimelineDirty = true;
      if (!window.dalTlFlushInFlight && !window.dalTlFlushTimer) {
        window.dalFlushTimelineIfCollabOpen_();
      }
    }
    window.dalUpdateTimelineLiveBanner_();
  } finally {
    window.dalTlApplyingRemote = false;
  }
};

window.dalApplyTimelineSessionUi_ = function(isOpen, isOpening) {
  var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
  var banner = document.getElementById('dal-timeline-session-banner');
  var startBtn = document.getElementById('dal-timeline-start-btn');
  var endBtn = document.getElementById('dal-timeline-end-btn');
  window.dalTimelineSessionOpen = !!isOpen;
  window.dalTlOpeningUi_ = !!isOpening && !isOpen;

  if (banner) {
    banner.style.display = 'none';
    banner.textContent = '';
  }
  if (typeof window.dalUpdateTimelineLiveBanner_ === 'function') {
    window.dalUpdateTimelineLiveBanner_();
  }
  if (startBtn) {
    startBtn.style.display = (isOpen || isOpening || (typeof currentIsReadOnly !== 'undefined' && currentIsReadOnly))
      ? 'none' : 'inline-flex';
  }
  if (endBtn) endBtn.style.display = (isOpen || isOpening) ? 'inline-flex' : 'none';

  if (isOpen) {
    // Do NOT seed sync base from local — wait for first remote/snapshot.
    window.startDalTimelineStateSync_(projectId);
  } else {
    window.stopDalTimelineStateSync_();
    window.dalTlSyncBase_ = null;
    window.dalTlClearMutations_();
    if (!isOpening) {
      window.dalTlOpeningUi_ = false;
      window.dalTlSyncPanelExpanded_ = false;
      if (typeof window.dalUpdateTimelineLiveBanner_ === 'function') window.dalUpdateTimelineLiveBanner_();
    }
  }
};

window.stopDalTimelineStateSync_ = function() {
  if (window.dalTlStateUnsub) {
    try { window.dalTlStateUnsub(); } catch (e1) { /* ignore */ }
    window.dalTlStateUnsub = null;
  }
  if (window.dalTlStatePollTimer) {
    clearInterval(window.dalTlStatePollTimer);
    window.dalTlStatePollTimer = null;
  }
  window.dalTlLiveSyncMode = '';
  window.dalTlLiveSyncFailReason_ = '';
  window.dalTlClearBlockedRetry_();
  window.dalTlRemotePending = false;
  window.dalTlLastAppliedRemoteSig_ = '';
  window.dalTlHaveServerSnap_ = false;
  window.dalTlLastWriteSeq_ = 0;
  window.dalTlEntityHoldUntil_ = {};
};

/** Read-only GAS poll while blocked (H1) — does not enable multi-edit. */
window.startDalTimelineGasReadOnlyPull_ = function(projectId) {
  if (!projectId || !window.dalTimelineSessionOpen) return;
  if (window.dalTlStatePollTimer) return;

  var pull = function() {
    if (!window.dalTimelineLayerOpen_() || !window.dalTimelineSessionOpen) return;
    if (window.dalTlLiveSyncMode === 'firestore') return;
    var mode = typeof currentShiftMode !== 'undefined' ? currentShiftMode : 'main';
    google.script.run
      .withFailureHandler(function() { /* keep last */ })
      .withSuccessHandler(function(data) {
        if (!data || !window.dalTimelineSessionOpen) return;
        if (window.dalTlLiveSyncMode === 'firestore') return;
        window.dalApplyRemoteTimelineState_(data.shifts, data.phases, data.overrides, {});
      })
      .getTimelineData(projectId, mode);
  };
  pull();
  window.dalTlStatePollTimer = setInterval(pull, 1200);
};

/** @deprecated H1 — use enterDalTlLiveSyncBlocked_. */
window.startDalTimelineGasStateSync_ = function(projectId, failReason) {
  window.enterDalTlLiveSyncBlocked_(projectId, failReason || 'server fallback disabled');
};

window.startDalTimelineFirestoreStateSync_ = function(projectId) {
  if (!projectId || !window.dalTimelineSessionOpen) return;
  if (typeof window.dalEnsureFirestoreClientAuth_ !== 'function') {
    window.enterDalTlLiveSyncBlocked_(projectId, 'no auth helper');
    return;
  }
  window.dalTlConnecting_ = true;
  window.dalTlLiveSyncMode = 'connecting';
  window.dalTlLiveSyncFailReason_ = '';
  window.dalUpdateTimelineLiveBanner_();
  window.dalEnsureFirestoreClientAuth_(function(err, client) {
    window.dalTlConnecting_ = false;
    if (err || !client) {
      var msg = (err && err.message) ? err.message : 'auth failed';
      console.warn('Timeline Firestore auth failed — blocking edits (H1):', msg);
      window.enterDalTlLiveSyncBlocked_(projectId, msg);
      return;
    }
    if (!window.dalTimelineSessionOpen || !window.dalTimelineLayerOpen_()) return;

    if (window.dalTlStatePollTimer) {
      clearInterval(window.dalTlStatePollTimer);
      window.dalTlStatePollTimer = null;
    }
    window.dalTlClearBlockedRetry_();
    window.dalTlLiveSyncMode = 'firestore';
    window.dalTlLiveSyncFailReason_ = '';
    window.dalUpdateTimelineLiveBanner_();

    var path = 'projects/' + String(projectId) + '/timeline/state';
    var onSnapPayload = function(meta, d) {
      if (!window.dalTimelineSessionOpen) return;
      if (!d) return;
      var parsed = window.dalTlParseStateDoc_(d);
      window.dalApplyRemoteTimelineState_(parsed.shifts, parsed.phases, parsed.overrides, {
        hasPendingWrites: !!(meta && meta.hasPendingWrites),
        fromCache: !!(meta && meta.fromCache),
        updatedAt: parsed.updatedAt || '',
        updatedBy: parsed.updatedBy || '',
        clientId: parsed.clientId || '',
        writeSeq: parsed.writeSeq || 0
      });
    };

    if (client.viaHost && typeof window.dalHostFsListenDoc_ === 'function') {
      window.dalTlStateUnsub = window.dalHostFsListenDoc_(path, function(msg) {
        if (!msg || !msg.exists) return;
        if (msg.fromCache && !msg.data) return;
        onSnapPayload({
          hasPendingWrites: !!msg.hasPendingWrites,
          fromCache: !!msg.fromCache
        }, msg.data);
      }, function(listenErr) {
        var lmsg = (listenErr && listenErr.message) ? listenErr.message : 'host listen failed';
        console.warn('Timeline host Firestore listener error — retrying once:', lmsg);
        setTimeout(function() {
          if (!window.dalTimelineSessionOpen) return;
          if (window.dalTlLiveSyncMode === 'firestore' && window.dalTlStateUnsub) return;
          window.dalEnsureFirestoreClientAuth_(function(err2, client2) {
            if (err2 || !client2 || !client2.viaHost) {
              window.enterDalTlLiveSyncBlocked_(projectId, lmsg);
              return;
            }
            window.dalTlLiveSyncMode = 'firestore';
            window.dalTlLiveSyncFailReason_ = '';
            window.dalUpdateTimelineLiveBanner_();
            window.dalTlStateUnsub = window.dalHostFsListenDoc_(path, function(msg) {
              if (!msg || !msg.exists) return;
              if (msg.fromCache && !msg.data) return;
              onSnapPayload({
                hasPendingWrites: !!msg.hasPendingWrites,
                fromCache: !!msg.fromCache
              }, msg.data);
            }, function() {
              console.warn('Timeline host listener failed again — blocking edits (H1)');
              window.stopDalTimelineStateSync_();
              window.enterDalTlLiveSyncBlocked_(projectId, 'host listen retry failed');
            });
          });
        }, 400);
      });
      return;
    }

    if (!client.db) {
      window.enterDalTlLiveSyncBlocked_(projectId, client.viaHost ? 'host client missing db' : 'no firestore db');
      return;
    }
    var ref = client.db.collection('projects').doc(String(projectId)).collection('timeline').doc('state');
    window.dalTlStateUnsub = ref.onSnapshot(function(snap) {
      if (!window.dalTimelineSessionOpen) return;
      if (!snap.exists) return;
      if (snap.metadata && snap.metadata.fromCache && !snap.data()) return;
      onSnapPayload({
        hasPendingWrites: !!(snap.metadata && snap.metadata.hasPendingWrites),
        fromCache: !!(snap.metadata && snap.metadata.fromCache)
      }, snap.data());
    }, function(listenErr) {
      var lmsg2 = (listenErr && listenErr.message) ? listenErr.message : 'listener error';
      console.warn('Timeline Firestore listener error — blocking edits (H1):', lmsg2);
      window.stopDalTimelineStateSync_();
      window.enterDalTlLiveSyncBlocked_(projectId, lmsg2);
    });
  });
};

window.startDalTimelineStateSync_ = function(projectId) {
  if (!projectId || !window.dalTimelineSessionOpen) return;
  if (window.dalTlLiveSyncMode === 'firestore' && window.dalTlStateUnsub) return;
  if (window.dalTlLiveSyncMode === 'blocked' && window.dalTlBlockedRetryTimer_) return;
  if (window.dalTlLiveSyncMode === 'connecting') return;
  window.startDalTimelineFirestoreStateSync_(projectId);
};

window.stopDalTimelineSessionWatcher = function() {
  if (window.dalTlSessionPollTimer) {
    clearInterval(window.dalTlSessionPollTimer);
    window.dalTlSessionPollTimer = null;
  }
  window.stopDalTimelineStateSync_();
  window.dalTlWatchProjectId = '';
  window.dalTlWasSessionOpen = false;
  window.dalTlLastStateSig = '';
  window.dalTlLastRemoteUpdatedAt = '';
  window.dalTlPendingRemote = null;
  window.dalTlSyncBase_ = null;
  window.dalTlClearMutations_();
};

window.dalHandleTimelineSessionInfo_ = function(info) {
  var tl = window.dalTimelineInfoFromSession_(info);
  var st = tl ? String(tl.status).toLowerCase() : '';
  var isOpen = st === 'open';
  var isOpening = st === 'opening';
  var wasOpen = !!window.dalTlWasSessionOpen;

  window.dalApplyTimelineSessionUi_(isOpen, isOpening);

  if (wasOpen && !isOpen && !isOpening && window.dalTimelineLayerOpen_() && !window.isTimelineDirty) {
    var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
    var mode = typeof currentShiftMode !== 'undefined' ? currentShiftMode : 'main';
    if (projectId) {
      google.script.run
        .withFailureHandler(function() { /* keep view */ })
        .withSuccessHandler(function(data) {
          if (!data || window.isTimelineDirty) return;
          window.dalTlLastStateSig = '';
          window.dalTlSyncBase_ = null;
          // DAL-SYNC-MODE-ALLOW: post-END COLLAB Sheets hydrate (session already closed; not live firestore)
          window.dalApplyRemoteTimelineState_(data.shifts, data.phases, data.overrides, {});
        })
        .getTimelineData(projectId, mode);
    }
  }
  window.dalTlWasSessionOpen = isOpen;
};

window.startDalTimelineSessionWatcher = function(projectId) {
  if (!projectId || projectId === 'NEW') return;
  if (!window.dalTimelineLayerOpen_()) return;
  if (window.dalTlWatchProjectId === String(projectId) && window.dalTlSessionPollTimer) {
    google.script.run
      .withFailureHandler(function() {})
      .withSuccessHandler(window.dalHandleTimelineSessionInfo_)
      .getDalSessionInfo(projectId);
    return;
  }

  window.stopDalTimelineSessionWatcher();
  window.dalTlWatchProjectId = String(projectId);

  var tick = function() {
    if (!window.dalTimelineLayerOpen_()) {
      window.stopDalTimelineSessionWatcher();
      return;
    }
    google.script.run
      .withFailureHandler(function() { /* keep last */ })
      .withSuccessHandler(window.dalHandleTimelineSessionInfo_)
      .getDalSessionInfo(projectId);
  };
  tick();
  window.dalTlSessionPollTimer = setInterval(tick, 2500);
};
</script>
