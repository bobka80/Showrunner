<!-- DAL Phase 4 — Timeline collab live sync (session + state; Firestore with GAS poll fallback) -->
<script>
window.dalTlSessionPollTimer = null;
window.dalTlStatePollTimer = null;
window.dalTlStateUnsub = null;
window.dalTlWatchProjectId = '';
window.dalTlIgnoreListenerUntil = 0;
window.dalTlLastStateSig = '';
window.dalTlRemotePending = false;
window.dalTlLiveSyncMode = ''; // 'firestore' | 'gas' | ''
window.dalTlWasSessionOpen = false;
window.dalTlLastRemoteUpdatedAt = '';
window.dalTlApplyingRemote = false;
window.dalTlPendingRemote = null;

window.dalTimelineLayerOpen_ = function() {
  var layer = document.getElementById('shift-layer');
  return !!(layer && layer.style.display !== 'none' && layer.style.display !== '');
};

window.dalTlRound_ = function(n) {
  var x = Number(n);
  if (!isFinite(x)) return 0;
  return Math.round(x * 100) / 100;
};

window.dalTimelineStateSig_ = function(shifts, phases, overrides) {
  var s = (shifts || []).map(function(x) {
    return [
      x.id || '',
      x.user_uid || x.email || '',
      x.role || '',
      window.dalTlRound_(x.start),
      window.dalTlRound_(x.duration),
      x.hasArrow ? 1 : 0,
      x.note || ''
    ].join(':');
  }).sort().join('|');
  var p = (phases || []).map(function(x) {
    return [
      x.id || '',
      x.type || '',
      window.dalTlRound_(x.start),
      window.dalTlRound_(x.duration),
      x.note || ''
    ].join(':');
  }).sort().join('|');
  var oKeys = Object.keys(overrides || {}).sort();
  var o = oKeys.map(function(k) { return k + '=' + (overrides[k] || ''); }).join('|');
  return s + '##' + p + '##' + o;
};

/** Strip drag temps / colors so fork JSON stays stable across clients. */
window.dalTlSanitizeShiftsForFork_ = function(list) {
  return (list || []).map(function(s) {
    return {
      id: s.id,
      user_uid: s.user_uid || s.email || '',
      email: s.user_uid || s.email || '',
      role: s.role || '',
      start: window.dalTlRound_(s.start),
      duration: window.dalTlRound_(s.duration),
      hasArrow: !!s.hasArrow,
      note: s.note || ''
    };
  });
};

window.dalTlSanitizePhasesForFork_ = function(list) {
  return (list || []).map(function(p) {
    return {
      id: p.id,
      type: p.type || '',
      start: window.dalTlRound_(p.start),
      duration: window.dalTlRound_(p.duration),
      note: p.note || ''
    };
  });
};

window.dalTlIsLocalDragging_ = function() {
  return !!(
    (typeof dragMode !== 'undefined' && dragMode) ||
    (typeof dragPhaseMode !== 'undefined' && dragPhaseMode) ||
    (typeof dragSubEventMode !== 'undefined' && dragSubEventMode)
  );
};

window.dalMarkTimelineLocalSave_ = function() {
  window.dalTlIgnoreListenerUntil = Date.now() + 2500;
};

window.dalStashPendingRemoteTimeline_ = function(shiftsIn, phasesIn, overridesIn, meta) {
  window.dalTlPendingRemote = {
    shifts: shiftsIn,
    phases: phasesIn,
    overrides: overridesIn,
    meta: meta || {}
  };
  window.dalTlRemotePending = true;
  window.dalUpdateTimelineLiveBanner_();
};

/** Apply a remote snapshot that was held during drag / local dirty flush. */
window.dalDrainPendingRemoteTimeline_ = function() {
  var pending = window.dalTlPendingRemote;
  if (!pending) return;
  if (window.dalTlIsLocalDragging_() || window.isTimelineDirty || window.dalTlFlushInFlight || window.dalTlApplyingRemote) {
    return;
  }
  window.dalTlPendingRemote = null;
  window.dalApplyRemoteTimelineState_(pending.shifts, pending.phases, pending.overrides, pending.meta);
};

/**
 * Direct browser → Firestore timeline fork write (no GAS round-trip).
 * Writes FULL mode state (not checkbox-filtered) so clients share one source of truth.
 */
window.dalWriteTimelineForkToFirestore_ = function(done) {
  done = done || function() {};
  if (!window.dalTimelineSessionOpen) {
    done(new Error('timeline_collab_not_open'));
    return;
  }
  if (typeof window.dalEnsureFirestoreClientAuth_ !== 'function') {
    done(new Error('firestore_auth_helper_missing'));
    return;
  }
  var projectId = document.getElementById('edit-folder-id')
    ? document.getElementById('edit-folder-id').value
    : '';
  if (!projectId) {
    done(new Error('missing_project'));
    return;
  }

  window.dalEnsureFirestoreClientAuth_(function(err, client) {
    if (err || !client || !client.db) {
      done(err || new Error('firestore_client_unavailable'));
      return;
    }
    try {
      // Full fork state — never filter by checked crew (that caused position thrash).
      var localShifts = window.dalTlSanitizeShiftsForFork_(typeof shifts !== 'undefined' ? shifts : []);
      var localPhases = window.dalTlSanitizePhasesForFork_(typeof activePhases !== 'undefined' ? activePhases : []);
      var localOverrides = JSON.parse(JSON.stringify(typeof localDeptOverrides !== 'undefined' ? localDeptOverrides : {}));
      var mode = typeof currentShiftMode !== 'undefined' ? currentShiftMode : 'main';
      var actor = typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System';
      var updatedAt = new Date().toISOString();
      var ref = client.db.collection('projects').doc(String(projectId)).collection('timeline').doc('state');
      var payload = {
        mode: mode,
        shiftsJson: JSON.stringify(localShifts),
        phasesJson: JSON.stringify(localPhases),
        overridesJson: JSON.stringify(localOverrides),
        updatedAt: updatedAt,
        updatedBy: actor
      };
      var outSig = window.dalTimelineStateSig_(localShifts, localPhases, localOverrides);
      window.dalTlLastStateSig = outSig;
      window.dalTlLastRemoteUpdatedAt = updatedAt;
      window.dalMarkTimelineLocalSave_();
      window.isTimelineDirty = false;
      ref.set(payload).then(function() {
        window.dalTlRemotePending = false;
        if (typeof window.dalUpdateTimelineLiveBanner_ === 'function') window.dalUpdateTimelineLiveBanner_();
        done(null);
      }).catch(function(eWrite) {
        // Keep dirty so a later flush can retry.
        window.isTimelineDirty = true;
        done(eWrite);
      });
    } catch (e2) {
      done(e2);
    }
  });
};

/**
 * True live collab: while timeline fork is open, flush full state to Firebase after edits.
 * Prefers direct client Firestore write; falls back to GAS quiet save.
 */
window.dalFlushTimelineIfCollabOpen_ = function() {
  if (!window.dalTimelineSessionOpen) return;
  if (typeof currentIsReadOnly !== 'undefined' && currentIsReadOnly) return;
  if (window.dalTlApplyingRemote) return;
  if (!window.isTimelineDirty) return;
  if (window.dalTlFlushInFlight) {
    window.dalTlFlushAgain = true;
    return;
  }
  clearTimeout(window.dalTlFlushTimer);
  window.dalTlFlushTimer = setTimeout(function() {
    if (!window.dalTimelineSessionOpen || !window.isTimelineDirty) return;
    // Drag may still be clearing — reschedule instead of dropping the flush.
    if (window.dalTlIsLocalDragging_()) {
      window.dalFlushTimelineIfCollabOpen_();
      return;
    }
    window.dalTlFlushInFlight = true;
    window.dalTlFlushAgain = false;

    var finish = function() {
      window.dalTlFlushInFlight = false;
      if (window.dalTlFlushAgain) {
        window.dalTlFlushAgain = false;
        window.dalFlushTimelineIfCollabOpen_();
        return;
      }
      window.dalDrainPendingRemoteTimeline_();
    };

    // Fast path: direct client → Firestore
    if (window.dalTlLiveSyncMode === 'firestore') {
      window.dalWriteTimelineForkToFirestore_(function(writeErr) {
        if (!writeErr) {
          finish();
          return;
        }
        try { console.warn('Direct timeline Firestore write failed, falling back to GAS:', writeErr); } catch (e1) { /* ignore */ }
        if (typeof saveAndCloseShifts !== 'function') {
          finish();
          return;
        }
        window.__dalTlQuietFlush = true;
        try { saveAndCloseShifts(); } finally {
          setTimeout(function() {
            window.__dalTlQuietFlush = false;
            finish();
          }, 600);
        }
      });
      return;
    }

    if (typeof saveAndCloseShifts !== 'function') {
      finish();
      return;
    }
    window.__dalTlQuietFlush = true;
    try { saveAndCloseShifts(); } finally {
      setTimeout(function() {
        window.__dalTlQuietFlush = false;
        finish();
      }, 600);
    }
  }, 250);
};

window.dalUpdateTimelineLiveBanner_ = function() {
  var banner = document.getElementById('dal-timeline-session-banner');
  if (!banner || !window.dalTimelineSessionOpen) return;
  if (window.dalTlRemotePending) {
    banner.textContent = '👥 TIMELINE COLLAB — syncing…';
  } else if (window.dalTlLiveSyncMode === 'firestore') {
    banner.textContent = '👥 TIMELINE COLLAB — live sync (direct)';
  } else if (window.dalTlLiveSyncMode === 'gas') {
    banner.textContent = '👥 TIMELINE COLLAB — live sync (server)';
  } else {
    banner.textContent = '👥 TIMELINE COLLAB — live edits sync to Firebase';
  }
};

window.dalColorTimelineShifts_ = function(list) {
  (list || []).forEach(function(s) {
    if (typeof isTruck === 'function' && isTruck(s.user_uid || s.email)) {
      s.color = '#e5e7eb';
      s.textCol = '#18181b';
    } else if (typeof ROLE_COLORS !== 'undefined' && ROLE_COLORS && ROLE_COLORS[s.role]) {
      s.color = ROLE_COLORS[s.role].bg;
      s.textCol = ROLE_COLORS[s.role].text;
    }
  });
};

window.dalApplyRemoteTimelineState_ = function(remoteShifts, remotePhases, remoteOverrides, meta) {
  if (!window.dalTimelineLayerOpen_()) return;
  if (window.dalTlApplyingRemote) return;

  meta = meta || {};
  // Skip own in-flight writes (local cache echo).
  if (meta.hasPendingWrites) return;

  var remoteUpdatedAt = String(meta.updatedAt || '');
  if (remoteUpdatedAt && window.dalTlLastRemoteUpdatedAt && remoteUpdatedAt < window.dalTlLastRemoteUpdatedAt) {
    return; // older snapshot — ignore
  }

  var shiftsIn = window.dalTlSanitizeShiftsForFork_(Array.isArray(remoteShifts) ? remoteShifts : []);
  var phasesIn = window.dalTlSanitizePhasesForFork_(Array.isArray(remotePhases) ? remotePhases : []);
  var overridesIn = remoteOverrides && typeof remoteOverrides === 'object' ? remoteOverrides : {};
  var sig = window.dalTimelineStateSig_(shiftsIn, phasesIn, overridesIn);
  if (sig === window.dalTlLastStateSig) {
    if (remoteUpdatedAt) window.dalTlLastRemoteUpdatedAt = remoteUpdatedAt;
    window.dalTlPendingRemote = null;
    window.dalTlRemotePending = false;
    return;
  }

  if (Date.now() < (window.dalTlIgnoreListenerUntil || 0)) {
    window.dalStashPendingRemoteTimeline_(shiftsIn, phasesIn, overridesIn, meta);
    return;
  }
  if (window.dalTlIsLocalDragging_() || window.isTimelineDirty || window.dalTlFlushInFlight) {
    window.dalStashPendingRemoteTimeline_(shiftsIn, phasesIn, overridesIn, meta);
    return;
  }

  window.dalTlApplyingRemote = true;
  try {
    window.dalTlLastStateSig = sig;
    if (remoteUpdatedAt) window.dalTlLastRemoteUpdatedAt = remoteUpdatedAt;
    window.dalTlPendingRemote = null;
    window.dalTlRemotePending = false;

    shifts = JSON.parse(JSON.stringify(shiftsIn));
    window.dalColorTimelineShifts_(shifts);
    activePhases = JSON.parse(JSON.stringify(phasesIn));
    localDeptOverrides = JSON.parse(JSON.stringify(overridesIn));

    var assigned = [];
    shifts.forEach(function(s) {
      var u = s.user_uid || s.email;
      if (u && assigned.indexOf(u) === -1) assigned.push(u);
    });
    globalAssignedArr = assigned;
    // Ensure rows with shifts are visible; do not wipe extra checked empty rows mid-edit.
    document.querySelectorAll('.internal-cb').forEach(function(cb) {
      if (assigned.indexOf(cb.value) !== -1) cb.checked = true;
    });

    if (typeof rebuildTimelineGrid === 'function') rebuildTimelineGrid();
    window.dalUpdateTimelineLiveBanner_();
  } finally {
    window.dalTlApplyingRemote = false;
  }
};

window.dalApplyTimelineSessionUi_ = function(isOpen, isOpening) {
  var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
  var banner = document.getElementById('dal-timeline-session-banner');
  var startBtn = document.getElementById('dal-timeline-start-btn');
  var endBtn = document.getElementById('dal-timeline-end-btn');
  window.dalTimelineSessionOpen = !!isOpen;

  if (banner) {
    banner.style.display = (isOpen || isOpening) ? 'block' : 'none';
    if (isOpening) banner.textContent = '⏳ TIMELINE COLLAB opening… — End Collab aborts a stuck start';
    else if (isOpen) window.dalUpdateTimelineLiveBanner_();
  }
  if (startBtn) {
    startBtn.style.display = (isOpen || isOpening || (typeof currentIsReadOnly !== 'undefined' && currentIsReadOnly))
      ? 'none' : 'inline-flex';
  }
  if (endBtn) endBtn.style.display = (isOpen || isOpening) ? 'inline-flex' : 'none';

  if (isOpen) {
    window.startDalTimelineStateSync_(projectId);
  } else {
    window.stopDalTimelineStateSync_();
  }
};

window.stopDalTimelineStateSync_ = function() {
  if (window.dalTlStateUnsub) {
    try { window.dalTlStateUnsub(); } catch (e1) { /* ignore */ }
    window.dalTlStateUnsub = null;
  }
  if (window.dalTlStatePollTimer) {
    clearInterval(window.dalTlStatePollTimer);
    window.dalTlStatePollTimer = null;
  }
  window.dalTlLiveSyncMode = '';
  window.dalTlRemotePending = false;
};

window.startDalTimelineGasStateSync_ = function(projectId) {
  if (!projectId || !window.dalTimelineSessionOpen) return;
  if (window.dalTlStatePollTimer && window.dalTlLiveSyncMode === 'gas') return;

  window.stopDalTimelineStateSync_();
  window.dalTlLiveSyncMode = 'gas';
  window.dalUpdateTimelineLiveBanner_();

  var pull = function() {
    if (!window.dalTimelineLayerOpen_() || !window.dalTimelineSessionOpen) return;
    if (Date.now() < (window.dalTlIgnoreListenerUntil || 0)) return;
    var mode = typeof currentShiftMode !== 'undefined' ? currentShiftMode : 'main';
    google.script.run
      .withFailureHandler(function() { /* keep last */ })
      .withSuccessHandler(function(data) {
        if (!data || !window.dalTimelineSessionOpen) return;
        window.dalApplyRemoteTimelineState_(data.shifts, data.phases, data.overrides, {});
      })
      .getTimelineData(projectId, mode);
  };
  pull();
  window.dalTlStatePollTimer = setInterval(pull, 2500);
};

window.startDalTimelineFirestoreStateSync_ = function(projectId) {
  if (!projectId || !window.dalTimelineSessionOpen) return;
  if (typeof window.dalEnsureFirestoreClientAuth_ !== 'function') {
    window.startDalTimelineGasStateSync_(projectId);
    return;
  }
  window.dalEnsureFirestoreClientAuth_(function(err, client) {
    if (err) {
      console.warn('Timeline Firestore auth failed — using server sync:', err && err.message ? err.message : err);
      window.startDalTimelineGasStateSync_(projectId);
      return;
    }
    if (!window.dalTimelineSessionOpen || !window.dalTimelineLayerOpen_()) return;

    window.stopDalTimelineStateSync_();
    window.dalTlLiveSyncMode = 'firestore';
    window.dalUpdateTimelineLiveBanner_();

    var ref = client.db.collection('projects').doc(String(projectId)).collection('timeline').doc('state');
    window.dalTlStateUnsub = ref.onSnapshot(function(snap) {
      if (!window.dalTimelineSessionOpen) return;
      if (!snap.exists) return;
      if (snap.metadata && snap.metadata.fromCache && !snap.data()) return;
      var d = snap.data() || {};
      var remoteShifts = [];
      var remotePhases = [];
      var remoteOverrides = {};
      try { remoteShifts = JSON.parse(d.shiftsJson || '[]'); } catch (e1) { remoteShifts = []; }
      try { remotePhases = JSON.parse(d.phasesJson || '[]'); } catch (e2) { remotePhases = []; }
      try { remoteOverrides = JSON.parse(d.overridesJson || '{}'); } catch (e3) { remoteOverrides = {}; }
      window.dalApplyRemoteTimelineState_(remoteShifts, remotePhases, remoteOverrides, {
        hasPendingWrites: !!(snap.metadata && snap.metadata.hasPendingWrites),
        updatedAt: d.updatedAt || '',
        updatedBy: d.updatedBy || ''
      });
    }, function(listenErr) {
      console.warn('Timeline Firestore listener error — falling back to server sync:', listenErr);
      window.stopDalTimelineStateSync_();
      window.startDalTimelineGasStateSync_(projectId);
    });
  });
};

window.startDalTimelineStateSync_ = function(projectId) {
  if (!projectId || !window.dalTimelineSessionOpen) return;
  if (window.dalTlLiveSyncMode === 'firestore' && window.dalTlStateUnsub) return;
  if (window.dalTlLiveSyncMode === 'gas' && window.dalTlStatePollTimer) return;
  window.startDalTimelineFirestoreStateSync_(projectId);
};

window.stopDalTimelineSessionWatcher = function() {
  if (window.dalTlSessionPollTimer) {
    clearInterval(window.dalTlSessionPollTimer);
    window.dalTlSessionPollTimer = null;
  }
  window.stopDalTimelineStateSync_();
  window.dalTlWatchProjectId = '';
  window.dalTlWasSessionOpen = false;
  window.dalTlLastStateSig = '';
  window.dalTlLastRemoteUpdatedAt = '';
  window.dalTlPendingRemote = null;
};

window.dalHandleTimelineSessionInfo_ = function(info) {
  var tl = window.dalTimelineInfoFromSession_(info);
  var st = tl ? String(tl.status).toLowerCase() : '';
  var isOpen = st === 'open';
  var isOpening = st === 'opening';
  var wasOpen = !!window.dalTlWasSessionOpen;

  window.dalApplyTimelineSessionUi_(isOpen, isOpening);

  // Session just closed by someone else — reload Sheets-backed timeline if local is clean.
  if (wasOpen && !isOpen && !isOpening && window.dalTimelineLayerOpen_() && !window.isTimelineDirty) {
    var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
    var mode = typeof currentShiftMode !== 'undefined' ? currentShiftMode : 'main';
    if (projectId) {
      google.script.run
        .withFailureHandler(function() { /* keep view */ })
        .withSuccessHandler(function(data) {
          if (!data || window.isTimelineDirty) return;
          window.dalTlLastStateSig = '';
          window.dalApplyRemoteTimelineState_(data.shifts, data.phases, data.overrides, {});
        })
        .getTimelineData(projectId, mode);
    }
  }
  window.dalTlWasSessionOpen = isOpen;
};

window.startDalTimelineSessionWatcher = function(projectId) {
  if (!projectId || projectId === 'NEW') return;
  if (!window.dalTimelineLayerOpen_()) return;
  if (window.dalTlWatchProjectId === String(projectId) && window.dalTlSessionPollTimer) {
    // Already watching — still refresh once.
    google.script.run
      .withFailureHandler(function() {})
      .withSuccessHandler(window.dalHandleTimelineSessionInfo_)
      .getDalSessionInfo(projectId);
    return;
  }

  window.stopDalTimelineSessionWatcher();
  window.dalTlWatchProjectId = String(projectId);

  var tick = function() {
    if (!window.dalTimelineLayerOpen_()) {
      window.stopDalTimelineSessionWatcher();
      return;
    }
    google.script.run
      .withFailureHandler(function() { /* keep last */ })
      .withSuccessHandler(window.dalHandleTimelineSessionInfo_)
      .getDalSessionInfo(projectId);
  };
  tick();
  window.dalTlSessionPollTimer = setInterval(tick, 2500);
};
</script>
