<!-- @INDEX: STATION -> Vault equipment rollup (1/2) -->
<script>

/* ---- Vault lane: compact station equipment list (search, status, manager RFID recording) ---- */

window.stationVaultItems = [];
window.stationVaultCanRecord = false;
window.stationVaultRecord = null; // { queue:[ids], names:{id:name} } while armed

window.stationOpenVault = function() {
  const host = stationReadHostSession_();
  if (!host) {
    stationSetStatus_('Scan your badge to host a session first.', 'error');
    return;
  }
  const panel = document.getElementById('station-vault');
  if (!panel) return;
  panel.classList.add('is-open');
  const searchEl = document.getElementById('station-vault-search');
  if (searchEl) searchEl.value = '';
  // Crew tab is a ROOT-only badge-provisioning surface.
  const isRoot = (window.stationHostRbac && String(window.stationHostRbac.access || '').toUpperCase() === 'ROOT');
  const crewTabBtn = document.getElementById('station-vault-tab-btn-crew');
  if (crewTabBtn) crewTabBtn.style.display = isRoot ? 'block' : 'none';
  stationVaultCancelRecord_();
  stationVaultSwitchTab_('equip');
  stationVaultLoad_();
};

/** Toggle between the Equipment and Crew panes inside the Vault overlay. */
window.stationVaultSwitchTab_ = function(tab) {
  const paneEquip = document.getElementById('station-vault-pane-equip');
  const paneCrew = document.getElementById('station-vault-pane-crew');
  const btnEquip = document.getElementById('station-vault-tab-btn-equip');
  const btnCrew = document.getElementById('station-vault-tab-btn-crew');
  const isCrew = (tab === 'crew');
  if (paneEquip) paneEquip.style.display = isCrew ? 'none' : 'flex';
  if (paneCrew) paneCrew.style.display = isCrew ? 'flex' : 'none';
  if (btnEquip) btnEquip.classList.toggle('is-active', !isCrew);
  if (btnCrew) btnCrew.classList.toggle('is-active', isCrew);
  if (isCrew) stationVaultLoadCrew_();
};

window.stationCloseVault = function() {
  stationVaultCancelRecord_();
  if (typeof window.stationVaultCloseSheet_ === 'function') window.stationVaultCloseSheet_();
  const panel = document.getElementById('station-vault');
  if (panel) panel.classList.remove('is-open');
};

function stationVaultIsOpen_() {
  const panel = document.getElementById('station-vault');
  return !!(panel && panel.classList.contains('is-open'));
}

function stationVaultLoad_() {
  const host = stationReadHostSession_();
  const statusEl = document.getElementById('station-vault-status');
  const listEl = document.getElementById('station-vault-list');
  if (statusEl) { statusEl.style.display = 'block'; statusEl.textContent = 'Loading vault…'; }
  if (listEl) listEl.innerHTML = '';
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        if (statusEl) { statusEl.style.display = 'block'; statusEl.textContent = (res && res.error) ? res.error : 'Could not load vault.'; }
        return;
      }
      window.stationVaultItems = res.items || [];
      window.stationVaultCanRecord = !!res.canRecordRfid;
      stationVaultRenderList_();
    })
    .withFailureHandler(function(err) {
      if (statusEl) { statusEl.style.display = 'block'; statusEl.textContent = 'Error: ' + (err && err.message ? err.message : String(err)); }
    })
    .getStationVaultList(ACTIVE_USER_NAME, host ? host.name : '');
}

function stationVaultEsc_(v) {
  return String(v == null ? '' : v).replace(/[<&>"']/g, function(c) {
    return c === '<' ? '&lt;' : (c === '>' ? '&gt;' : (c === '"' ? '&quot;' : (c === "'" ? '&#39;' : '&amp;')));
  });
}

/** Same status colours the real vault uses. */
function stationVaultStatusColor_(status) {
  const s = String(status || '').toLowerCase();
  if (s.indexOf('maintenance') !== -1) return '#f59e0b';
  if (s.indexOf('damaged') !== -1) return '#eab308';
  if (s.indexOf('broken') !== -1 || s.indexOf('retired') !== -1) return '#ef4444';
  return '#10b981';
}
</script>
