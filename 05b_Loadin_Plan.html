<div id="loadin-plan-overlay" class="modal-overlay" style="z-index: 5600; display: none;">
  <div class="modal" style="width: 100% !important; max-width: 100% !important; height: 100% !important; max-height: 100% !important; border-radius: 0; border: none; box-sizing: border-box; display: flex; flex-direction: column; padding: 0; background: var(--bg-dark);">
    <div style="height: 70px; background: var(--bg-sidebar); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; flex-shrink: 0;">
        <div style="display:flex; align-items:center; gap: 15px;">
            <div style="color:#fff; font-weight:900; font-size:16px; letter-spacing: 1px;">📍 VENUE LOAD IN PLAN</div>
            <div style="width: 2px; height: 20px; background: #333; margin: 0 5px;"></div>
            <div style="display:flex; align-items:center; gap: 6px;">
                <span style="color:#888; font-size:11px; font-weight:bold;">VENUE DIMENSIONS (m):</span>
                <input type="number" id="venue-dim-w" placeholder="W" style="width: 60px; height: 28px; padding: 5px; margin: 0; text-align: center; background:#111; color:#fff; border:1px solid #333; border-radius:4px; font-size: 11px;">
                <span style="color:#555; font-size:10px;">x</span>
                <input type="number" id="venue-dim-l" placeholder="L" style="width: 60px; height: 28px; padding: 5px; margin: 0; text-align: center; background:#111; color:#fff; border:1px solid #333; border-radius:4px; font-size: 11px;">
                <button class="btn-outline btn-sm" style="margin:0; border-color:#3b82f6; color:#3b82f6; padding: 0 8px !important; height: 28px;" onclick="applyVenueDims()">SET</button>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap: 12px;">
            <button class="btn-outline btn-sm" style="margin:0; border-color:#ef4444; color:#ef4444;" onclick="addLoadinElement('stage')">+ STAGE / NO-GO</button>
            <button class="btn-outline btn-sm" style="margin:0; border-color:#a1a1aa; color:#a1a1aa;" onclick="addLoadinElement('dock')">+ LOAD IN DOCK</button>
            <button class="btn-close" style="width:auto; margin:0;" onclick="document.getElementById('loadin-plan-overlay').style.display='none'">CLOSE</button>
        </div>
    </div>
    
    <div style="flex:1; display:flex; overflow:hidden;">
        <div id="loadin-svg-container" style="flex:1; background:#0a0a0c; position:relative; overflow:hidden;">
           <!-- Infinite Panning Canvas -->
           <svg id="loadin-svg" style="width:500000px; height:500000px; transform-origin: 0 0; touch-action: none; position:absolute; top:0; left:0; overflow:visible;"></svg>
        </div>
    </div>
  </div>
</div>

<script>
/**
 * 05b_Loadin_Plan.html
 * Domain: Spatial map for venue load in with area-preserving department footprints.
 */
let loadinZoomObj = { zoom: 1, panX: 0, panY: 0, isPanning: false, startX: 0, startY: 0, disableZoom: true, disablePanX: true, disablePanY: true, cursorStyle: 'default' };
let loadinAttached = false;
let loadinRects = [];
let activeLoadinDrag = null;

function openLoadinPlanDashboard() {
    document.getElementById('loadin-plan-overlay').style.display = 'flex';
    
    if (!loadinAttached && typeof attachZoomPan === 'function') {
        attachZoomPan('#loadin-svg-container', '#loadin-svg', loadinZoomObj);
        loadinAttached = true;
    }

    let deptAreas = {};
    if (typeof currentProjectAssets !== 'undefined' && typeof globalAssets !== 'undefined') {
        currentProjectAssets.forEach(pa => {
            let asset = globalAssets.find(a => a.id === pa.assetId);
            if (asset && (asset.nestingLevel == 3 || asset.nestingLevel == 4 || asset.nestingLevel == 5 || asset.type === 'Container')) {
                let dept = pa.overrideDept || asset.department || 'Unassigned';
                let qty = parseInt(pa.qty, 10) || 1;
                
                let w = 60, l = 120;
                if (asset.dims) {
                    let pts = asset.dims.split(/[*xX]/);
                    if (pts.length >= 2) {
                        l = parseFloat(pts[0]);
                        w = parseFloat(pts[1]);
                        if (l > 0 && l < 15 && w > 0 && w < 15) { l *= 100; w *= 100; }
                    }
                }
                let areaCm2 = l * w * qty;
                if (!deptAreas[dept]) deptAreas[dept] = 0;
                deptAreas[dept] += areaCm2;
            }
        });
    }
    
    loadinRects = [];
    let startX = 500, startY = 500;
    
    Object.keys(deptAreas).forEach(deptUid => {
        let baseAreaCm2 = deptAreas[deptUid];
        let bufferedAreaCm2 = baseAreaCm2 * 1.3; 
        
        let sideCm = Math.sqrt(bufferedAreaCm2);
        let dObj = typeof getDeptObj === 'function' ? getDeptObj(deptUid) : {name: 'Unassigned', color: '#888'};
        
        loadinRects.push({
            id: 'li_' + deptUid,
            type: 'dept',
            preserveArea: true,
            deptName: dObj.name,
            color: dObj.color || '#a855f7',
            area: bufferedAreaCm2, 
            x: startX,
            y: startY,
            w: sideCm,
            h: sideCm
        });
        startX += sideCm + 100; 
    });
    
    renderLoadinPlan();
    setTimeout(autoFitVenue, 100);
}

function applyVenueDims() {
    let w = parseFloat(document.getElementById('venue-dim-w').value);
    let l = parseFloat(document.getElementById('venue-dim-l').value);
    if (!w || !l || w <= 0 || l <= 0) return alert("Enter valid venue dimensions.");
    let wCm = w * 100;
    let lCm = l * 100;
    let existing = loadinRects.find(r => r.type === 'venue');
    if (existing) {
        existing.w = wCm;
        existing.h = lCm;
    } else {
        loadinRects.push({ id: 'li_venue_' + Date.now(), type: 'venue', label: 'VENUE BOUNDARY', color: '#3b82f6', preserveArea: false, x: 0, y: 0, w: wCm, h: lCm });
    }
    renderLoadinPlan();
    setTimeout(autoFitVenue, 100);
}

function addLoadinElement(type) {
    let id = 'li_elem_' + Date.now();
    let offset = (loadinRects.filter(r => r.type === type).length * 20);
    if (type === 'stage') {
        loadinRects.push({ id, type: 'stage', label: 'STAGE / NO-GO ZONE', color: '#ef4444', preserveArea: false, x: 400 + offset, y: 200 + offset, w: 600, h: 400 });
    } else if (type === 'dock') {
        loadinRects.push({ id, type: 'dock', label: '🚛 LOAD IN DOCK', color: '#a1a1aa', preserveArea: false, x: 50 + offset, y: 350 + offset, w: 250, h: 150 });
    }
    renderLoadinPlan();
}

function deleteLoadinElement(id) {
    loadinRects = loadinRects.filter(r => r.id !== id);
    renderLoadinPlan();
}

function renderLoadinPlan() {
    let svgHtml = `
    <defs>
        <pattern id="loadinGrid" width="100" height="100" patternUnits="userSpaceOnUse">
            <rect width="100" height="100" fill="none" stroke="#333" stroke-width="0.5" />
        </pattern>
        <pattern id="diagRed" width="20" height="20" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="0" y2="20" stroke="#ef4444" stroke-width="8" opacity="0.4" />
        </pattern>
    </defs>
    <rect x="-50000" y="-50000" width="100000" height="100000" fill="url(#loadinGrid)" pointer-events="none" />
    `;
    
    loadinRects.sort((a,b) => (a.type==='venue' ? -1 : (b.type==='venue' ? 1 : 0)));

    loadinRects.forEach(r => {
        let fillStyle = r.color + "33";
        let strokeDash = "10,10";
        let label = r.label || r.deptName.toUpperCase() + " (+30% BUFFER)";

        if (r.type === 'stage') { fillStyle = "url(#diagRed)"; strokeDash = "none"; } 
        else if (r.type === 'venue') { fillStyle = "transparent"; strokeDash = "none"; } 
        else if (r.type === 'dock') { fillStyle = "rgba(161, 161, 170, 0.2)"; strokeDash = "15,15"; }

        if (r.type === 'venue') {
            svgHtml += `
            <g class="loadin-group" transform="translate(${r.x}, ${r.y})">
                <rect x="0" y="0" width="${r.w}" height="${r.h}" fill="${fillStyle}" stroke="${r.color}" stroke-width="4" stroke-dasharray="${strokeDash}" />
                <text x="${r.w/2}" y="${r.h/2}" fill="#fff" font-size="${Math.max(16, r.w/15)}" font-weight="bold" text-anchor="middle" dominant-baseline="middle" pointer-events="none">${label}</text>
                <text x="${r.w/2}" y="${r.h/2 + Math.max(16, r.w/15) + 10}" fill="#a1a1aa" font-size="${Math.max(12, r.w/25)}" font-weight="bold" text-anchor="middle" dominant-baseline="middle" pointer-events="none">${(r.w/100).toFixed(1)}m x ${(r.h/100).toFixed(1)}m</text>
            </g>`;
        } else {
            svgHtml += `
            <g class="loadin-group" transform="translate(${r.x}, ${r.y})">
                <rect x="0" y="0" width="${r.w}" height="${r.h}" fill="${fillStyle}" stroke="${r.color}" stroke-width="4" stroke-dasharray="${strokeDash}" style="cursor:move;" onmousedown="startLoadinDrag(event, '${r.id}', 'move')" ontouchstart="startLoadinDrag(event, '${r.id}', 'move')" />
                <text x="${r.w/2}" y="${r.h/2}" fill="#fff" font-size="${Math.max(16, r.w/15)}" font-weight="bold" text-anchor="middle" dominant-baseline="middle" pointer-events="none">${label}</text>
                <text x="${r.w/2}" y="${r.h/2 + Math.max(16, r.w/15) + 10}" fill="#a1a1aa" font-size="${Math.max(12, r.w/25)}" font-weight="bold" text-anchor="middle" dominant-baseline="middle" pointer-events="none">${(r.w/100).toFixed(1)}m x ${(r.h/100).toFixed(1)}m</text>
                
                <!-- Handles -->`;
                
            if (r.preserveArea) {
                svgHtml += `
                <rect x="${r.w - 15}" y="${r.h/2 - 15}" width="30" height="30" fill="${r.color}" style="cursor:ew-resize;" onmousedown="startLoadinDrag(event, '${r.id}', 'resize-e')" ontouchstart="startLoadinDrag(event, '${r.id}', 'resize-e')" />
                <rect x="${r.w/2 - 15}" y="${r.h - 15}" width="30" height="30" fill="${r.color}" style="cursor:ns-resize;" onmousedown="startLoadinDrag(event, '${r.id}', 'resize-s')" ontouchstart="startLoadinDrag(event, '${r.id}', 'resize-s')" />
                `;
            } else {
                svgHtml += `
                <rect x="${r.w - 15}" y="${r.h - 15}" width="30" height="30" fill="${r.color}" style="cursor:nwse-resize;" onmousedown="startLoadinDrag(event, '${r.id}', 'resize-se')" ontouchstart="startLoadinDrag(event, '${r.id}', 'resize-se')" />
                <g transform="translate(${r.w - 20}, 5)" style="cursor:pointer;" onclick="deleteLoadinElement('${r.id}')"><rect width="15" height="15" fill="#ef4444" rx="2" /><text x="7.5" y="8.5" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle" dominant-baseline="middle" pointer-events="none">X</text></g>
                `;
            }
            svgHtml += `</g>`;
        }
    });
    document.getElementById('loadin-svg').innerHTML = svgHtml;
}

function startLoadinDrag(e, id, mode) {
    if(e.type === 'mousedown') e.preventDefault();
    e.stopPropagation();
    let r = loadinRects.find(x => x.id === id);
    if(!r) return;
    let svg = document.getElementById('loadin-svg');
    let pt = svg.createSVGPoint(); pt.x = e.clientX || e.touches[0].clientX; pt.y = e.clientY || e.touches[0].clientY;
    let cursorPt = pt.matrixTransform(svg.getScreenCTM().inverse());
    activeLoadinDrag = { id: id, mode: mode, startX: cursorPt.x, startY: cursorPt.y, origX: r.x, origY: r.y, origW: r.w, origH: r.h, area: r.area };
    if (e.touches) { document.addEventListener('touchmove', onLoadinDrag, {passive: false}); document.addEventListener('touchend', endLoadinDrag); } 
    else { document.addEventListener('mousemove', onLoadinDrag); document.addEventListener('mouseup', endLoadinDrag); }
}

function onLoadinDrag(e) {
    if(e.touches) e.preventDefault(); if(!activeLoadinDrag) return;
    let svg = document.getElementById('loadin-svg'); let pt = svg.createSVGPoint();
    pt.x = e.clientX || e.touches[0].clientX; pt.y = e.clientY || e.touches[0].clientY;
    let cursorPt = pt.matrixTransform(svg.getScreenCTM().inverse());
    let dx = cursorPt.x - activeLoadinDrag.startX; let dy = cursorPt.y - activeLoadinDrag.startY;
    let r = loadinRects.find(x => x.id === activeLoadinDrag.id);
    if(!r) return;
    
    if (r.type === 'venue') return;
    
    if (activeLoadinDrag.mode === 'move') { r.x = activeLoadinDrag.origX + dx; r.y = activeLoadinDrag.origY + dy; } 
    else if (activeLoadinDrag.mode === 'resize-e') { let newW = activeLoadinDrag.origW + dx; if (newW < 50) newW = 50; r.w = newW; if (r.type === 'dept') r.h = activeLoadinDrag.area / newW; } 
    else if (activeLoadinDrag.mode === 'resize-s') { let newH = activeLoadinDrag.origH + dy; if (newH < 50) newH = 50; r.h = newH; if (r.type === 'dept') r.w = activeLoadinDrag.area / newH; }
    else if (activeLoadinDrag.mode === 'resize-se' && r.type !== 'dept') { let newW = activeLoadinDrag.origW + dx; let newH = activeLoadinDrag.origH + dy; if (newW < 50) newW = 50; if (newH < 50) newH = 50; r.w = newW; r.h = newH; }
    renderLoadinPlan();
}

function endLoadinDrag() { activeLoadinDrag = null; document.removeEventListener('mousemove', onLoadinDrag); document.removeEventListener('mouseup', endLoadinDrag); document.removeEventListener('touchmove', onLoadinDrag); document.removeEventListener('touchend', endLoadinDrag); }

function autoFitVenue() {
    let svgContainer = document.getElementById('loadin-svg-container');
    if (!svgContainer || svgContainer.clientWidth === 0) return;
    
    let target = loadinRects.find(r => r.type === 'venue');
    let minX = 0, maxX = 1000, minY = 0, maxY = 1000;
    if (target) {
        minX = target.x; maxX = target.x + target.w;
        minY = target.y; maxY = target.y + target.h;
    } else if (loadinRects.length > 0) {
        minX = Math.min(...loadinRects.map(r => r.x)) - 200; maxX = Math.max(...loadinRects.map(r => r.x + r.w)) + 200;
        minY = Math.min(...loadinRects.map(r => r.y)) - 200; maxY = Math.max(...loadinRects.map(r => r.y + r.h)) + 200;
    } else return;
    
    let pW = maxX - minX; let pH = maxY - minY;
    let scale = Math.min((svgContainer.clientWidth * 0.9) / pW, (svgContainer.clientHeight * 0.9) / pH);
    scale = Math.min(Math.max(0.001, scale), 10);
    
    loadinZoomObj.zoom = scale; loadinZoomObj.panX = (svgContainer.clientWidth / 2) - ((minX + maxX) / 2) * scale; loadinZoomObj.panY = (svgContainer.clientHeight / 2) - ((minY + maxY) / 2) * scale;
    document.getElementById('loadin-svg').style.transform = `translate(${loadinZoomObj.panX}px, ${loadinZoomObj.panY}px) scale(${loadinZoomObj.zoom})`;
}
</script>
