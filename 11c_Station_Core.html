<!-- @INDEX: STATION -> Core host session, RBAC (1/5) -->
<script>
/**
 * 11_Station_Shell.html
 * Warehouse gun / fixed station UI — host badge inherit first.
 * Native Chainway SDK calls: window.onStationRfidScan(epcString)
 */

window.stationShellBootstrap = null;
window.stationHostSession = null;
window.stationScanBusy = false;
window.stationHostIdleTimer = null;
window.stationHostIdleListenersBound = false;
window.stationEnrollMode = false;
window.stationRecentScans = [];

/**
 * Host-inherit RBAC. While a crew member is hosted at this station, the whole app evaluates
 * permissions as the HOST (their real tier + IAM keys) — a warehouse computer/gun is a surface,
 * not a stripped-down role. `stationHostRbac` is set in stationWriteHostSession_ from the host
 * payload and cleared on eject/logout. Guarded so a non-station page or host-less state is
 * untouched. Plus a station BASELINE: any host can check-in/out + set status even if their own
 * tier normally can't (warehouse-context grant). Design/packing add-remove stays on real creds.
 */
window.stationHostRbac = null; // { access:'MANAGER', permissions:{event_assets_window:true,...} }
var STATION_TIER_ORDER = ['CREW', 'EDITOR', 'MANAGER', 'ADMIN', 'ROOT'];
var STATION_IMPLICIT_MANAGER_KEYS = [
  'event_create_standard', 'event_create_crossrent', 'event_edit_timeline', 'event_assets_window',
  'event_view_pricing', 'task_manage_global', 'task_manage_personal'
];

function stationTierRank_(tier) {
  var i = STATION_TIER_ORDER.indexOf(String(tier || 'CREW').toUpperCase());
  return i === -1 ? 1 : i + 1;
}
window.stationHostActive_ = function() {
  return !!(window.IS_STATION_DEVICE && window.stationHostRbac);
};

(function installStationRbacOverride_() {
  if (typeof window.stationEnsureDeviceMode_ === 'function') window.stationEnsureDeviceMode_();
  if (!window.IS_STATION_DEVICE) return;
  var _userHasPerm = window.userHasPerm;
  var _effectiveHasPerm = window.effectiveHasPerm;
  var _accessTierAtLeast = window.accessTierAtLeast;

  window.userHasPerm = function(key) {
    if (window.stationHostActive_()) {
      var p = window.stationHostRbac.permissions || {};
      return p[key] === true || p[key] === 'true';
    }
    return _userHasPerm ? _userHasPerm(key) : false;
  };

  window.accessTierAtLeast = function(minTier) {
    if (window.stationHostActive_()) {
      return stationTierRank_(window.stationHostRbac.access) >= stationTierRank_(minTier);
    }
    return _accessTierAtLeast ? _accessTierAtLeast(minTier) : false;
  };

  window.effectiveHasPerm = function(key) {
    if (window.stationHostActive_()) {
      if (!key) return false;
      if (key === 'task_manage_personal') return true;
      if (String(window.stationHostRbac.access || '').toUpperCase() === 'ROOT') return true;
      if (window.userHasPerm(key)) return true;
      if (STATION_IMPLICIT_MANAGER_KEYS.indexOf(key) !== -1 && window.accessTierAtLeast('MANAGER')) return true;
      return false;
    }
    return _effectiveHasPerm ? _effectiveHasPerm(key) : false;
  };
  // NOTE: canEditAssets()/canUseAssetCheckout() intentionally follow the host's REAL credentials
  // (via the effectiveHasPerm override above) so the client and the backend
  // (assertActorCanPerformAssetOperations) agree — no misleading buttons. Equipment status changes
  // (Maintenance/Broken/Repaired) are the true any-host baseline, handled in the Vault backend.
})();

/** How many recent scans to keep in the always-on top strip. */
var STATION_SCAN_FEED_MAX = 8;

/** Auto-eject the hosted crew member after this much inactivity (device stays logged in). */
var STATION_HOST_IDLE_DEFAULT_MIN = 10;
// After an explicit log-out / idle-eject, ignore re-reads of the SAME badge for this long. One
// trigger pull emits a burst of reads for a tag; without this window a stray tail-end read arriving
// after the 1.5s scan-dedup would instantly re-host the person the operator just ejected.
var STATION_HOST_EJECT_COOLDOWN_MS = 3000;
var STATION_EJECT_STORAGE_KEY = 'sm_station_eject_min';
var STATION_EJECT_CHOICES = [1, 3, 5, 10];
// Gun idle auto-sleep (TSL desktop only — Chainway uses no-host park below).
var STATION_GUNSLEEP_STORAGE_KEY = 'sm_station_gunsleep_min';
var STATION_GUNSLEEP_CHOICES = [0, 1, 2, 3, 5, 10];
var STATION_GUNSLEEP_DEFAULT_MIN = 5;
// Chainway: grace after host leaves before parking; then optional extra delay before disconnect.
var STATION_NO_HOST_GRACE_KEY = 'sm_station_no_host_grace_min';
var STATION_NO_HOST_GRACE_CHOICES = [1, 2, 3, 5, 10, 15, 30];
var STATION_NO_HOST_GRACE_DEFAULT_MIN = 3;
var STATION_GUN_PARK_DELAY_KEY = 'sm_station_gun_park_delay_min';
var STATION_GUN_PARK_DELAY_CHOICES = [0, 1];
var STATION_GUN_PARK_DELAY_DEFAULT_MIN = 0;

/**
 * Device-local gun settings. The web setup is the source of truth (survives app
 * updates), and is pushed down to the native gun on every startup so the screen
 * and the gun never disagree.
 */
var STATION_MODE_KEY = 'sm_station_scan_mode';
var STATION_POLL_KEY = 'sm_station_poll_ms';
var STATION_POWER_KEY = 'sm_station_power';
var STATION_BEEP_KEY = 'sm_station_beep';

/**
 * Equipment RFID map (epc -> { name, unitId, unitNumber }) preloaded from the vault so the
 * live scan strip can show a human name/unit instead of the raw tag — instantly and offline.
 */
var STATION_EQUIP_MAP_KEY = 'sm_station_equip_map_v2';
var STATION_CREW_HOST_KEY = 'sm_station_crew_host_v1';
var STATION_EQUIP_MAP_REFRESH_MS = 5 * 60 * 1000;
var STATION_PRESET_STORAGE_KEY = 'sm_station_power_presets_v1';
var STATION_PRESET_HOLD_MS = 1000;
window.stationScanPanelOpen = false;
window.stationPanelSelection = null;
window.stationPanelPendingStatus = null;
window.stationEquipMap = window.stationEquipMap || {};
window.stationCrewHostRoster = window.stationCrewHostRoster || [];

/** True when two TID reads are the same chip (exact or shorter 4-word vs longer 6-word read). */
function stationRfidTidEquivalent_(a, b) {
  var x = stationNormalizeEpc_(a);
  var y = stationNormalizeEpc_(b);
  if (!x || !y) return false;
  if (x === y) return true;
  var short = x.length <= y.length ? x : y;
  var long = x.length <= y.length ? y : x;
  if (short.length >= 12 && long.indexOf(short) === 0) return true;
  return false;
}

/** Local crew host lookup — mirrors lookupCrewMemberByRfidPair_ for optimistic badge-in. */
function stationLookupCrewHostLocal_(epc, tid) {
  var needleEpc = stationNormalizeEpc_(epc);
  var needleTid = stationNormalizeEpc_(tid);
  var roster = window.stationCrewHostRoster || [];
  var tidMismatch = false;
  var tidMissing = false;

  for (var i = 0; i < roster.length; i++) {
    var row = roster[i];
    var rowEpc = stationNormalizeEpc_(row.rfidTag);
    if (!rowEpc || rowEpc !== needleEpc) continue;
    var rowTid = stationNormalizeEpc_(row.rfidTid || '');
    if (rowTid) {
      if (!needleTid) {
        tidMissing = true;
        continue;
      }
      if (!stationRfidTidEquivalent_(rowTid, needleTid)) {
        tidMismatch = true;
        continue;
      }
    }
    return {
      crew: {
        uid: row.uid || '',
        name: row.name,
        rfidTag: row.rfidTag,
        rfidTid: rowTid,
        access: row.access || 'CREW',
        permissions: row.permissions || {}
      },
      tidMismatch: false,
      tidMissing: false
    };
  }
  return { crew: null, tidMismatch: tidMismatch, tidMissing: tidMissing };
}

/** Same trim/lowercase contract the backend uses for tag matching. */
</script>
