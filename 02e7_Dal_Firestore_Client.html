<!-- DAL Phase 4 Slice C — live prep sync (Firestore client when auth works; GAS poll fallback for GAS iframe) -->
<script>
window.dalPaFirestoreUnsub = null;
window.dalPaSessionMetaUnsub = null;
window.dalPaGasSyncTimer = null;
window.dalPaSessionWatchProjectId = '';
window.dalPaIgnoreListenerUntil = 0;
window.dalPaRemotePending = false;
window.dalPaLastRemoteSig = '';
window.dalPaFirestoreListenProjectId = '';
window.dalMetaAuthority = false;
window.dalPaLiveSyncFailed = false;
window.dalPaLiveSyncMode = ''; // 'firestore' | 'gas'
window.dalPaSessionWatchStarting = false;
window.dalPaBannerLastText_ = '';
// Timeline-parity: explicit touches only (never invent full-list diffs).
window.dalPaClientId = window.dalPaClientId || ('pa_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10));
window.dalPaTouchedUids_ = window.dalPaTouchedUids_ || {};
window.dalPaDeletedUids_ = window.dalPaDeletedUids_ || {};
window.dalPaLastAppliedSeq_ = window.dalPaLastAppliedSeq_ || {};
window.dalPaLastDocWriteSeq_ = window.dalPaLastDocWriteSeq_ || 0;

window.dalPaNoteTouch_ = function(uid) {
  if (!uid || uid === '_meta' || !window.dalPrepUiOpen) return;
  uid = String(uid);
  window.dalPaTouchedUids_[uid] = 1;
  delete window.dalPaDeletedUids_[uid];
  window.dalPaHoldEntities_([uid], 3000);
};

window.dalPaNoteDelete_ = function(uid) {
  if (!uid || uid === '_meta' || !window.dalPrepUiOpen) return;
  uid = String(uid);
  window.dalPaDeletedUids_[uid] = 1;
  delete window.dalPaTouchedUids_[uid];
  window.dalPaHoldEntities_([uid], 3000);
  window.dalPaMarkDeleted_([uid], 8000);
};

window.dalPaHasPendingTouches_ = function() {
  return !!(Object.keys(window.dalPaTouchedUids_ || {}).length || Object.keys(window.dalPaDeletedUids_ || {}).length);
};

window.dalFsDocToPaAsset_ = function(docId, d) {
  if (!d || docId === '_meta') return null;
  return {
    uid: d.uid || docId,
    assetId: String(d.asset_uid || ''),
    qty: d.assigned_quantity || 1,
    location: d.location || '',
    formula: d.formula || '',
    creator: d.creator || 'System',
    containerUid: d.container_uid || '',
    scanStatus: d.scan_status || 'Assigned',
    writeSeq: Number(d.writeSeq || 0) || 0,
    clientId: d.clientId || '',
    outboundTruckUid: d.outbound_truck_uid || '',
    outboundX: d.outbound_x !== undefined && d.outbound_x !== '' ? Number(d.outbound_x) : null,
    outboundY: d.outbound_y !== undefined && d.outbound_y !== '' ? Number(d.outbound_y) : null,
    outboundZ: d.outbound_z !== undefined && d.outbound_z !== '' ? Number(d.outbound_z) : null,
    outboundRotated: d.outbound_rotated === true || d.outbound_rotated === 'true',
    outboundStaged: d.outbound_staged === true || d.outbound_staged === 'true',
    inboundTruckUid: d.inbound_truck_uid || '',
    inboundX: d.inbound_x !== undefined && d.inbound_x !== '' ? Number(d.inbound_x) : null,
    inboundY: d.inbound_y !== undefined && d.inbound_y !== '' ? Number(d.inbound_y) : null,
    inboundZ: d.inbound_z !== undefined && d.inbound_z !== '' ? Number(d.inbound_z) : null,
    inboundRotated: d.inbound_rotated === true || d.inbound_rotated === 'true',
    inboundStaged: d.inbound_staged === true || d.inbound_staged === 'true'
  };
};

window.dalProcessPaFormulas_ = function(arr, opts) {
  if (!arr) return;
  opts = opts || {};
  var exploded = [];
  // Live remote apply must NOT explode — that strips uids and mints new rows → write wars.
  if (!opts.skipExplode) {
    for (var i = arr.length - 1; i >= 0; i--) {
      var pa = arr[i];
      var vaultAsset = typeof globalAssets !== 'undefined' ? globalAssets.find(function(a) { return a.id === pa.assetId; }) : null;
      if (vaultAsset && vaultAsset.type !== 'Bulk' && vaultAsset.isConsumable !== true && vaultAsset.isConsumable !== 'true') {
        var parsedQty = parseInt(pa.qty, 10);
        if (!isNaN(parsedQty) && parsedQty > 1 && !pa.isAuto && pa.formula !== 'Auto-Container' && pa.formula !== 'Gen-Auto-Container') {
          arr.splice(i, 1);
          for (var k = 0; k < parsedQty; k++) {
            var newPa = Object.assign({}, pa, { qty: 1 });
            delete newPa.uid;
            exploded.push(newPa);
          }
        }
      }
    }
    if (exploded.length > 0) arr.push.apply(arr, exploded);
  }
  arr.forEach(function(pa) {
    if (pa.formula === 'Manual') pa.formula = 'Standalone';
    if (pa.assetId === 'DUMMY') pa.isEmptyGroup = true;
    if (pa.formula && pa.formula.indexOf('[SHORT] ') === 0) {
      pa.isShortage = true;
      pa.formula = pa.formula.substring(8);
    }
    if (pa.formula === 'Auto-Container') { pa.isAuto = true; pa.formula = 'Standalone'; }
    else if (pa.formula === 'Gen-Auto-Container') { pa.isAuto = true; pa.isGenericAuto = true; pa.formula = 'Standalone'; }
    else if (pa.formula && pa.formula.indexOf('[GEN_AUTO] ') === 0) { pa.isAuto = true; pa.isGenericAuto = true; pa.formula = pa.formula.substring(11); }
    else if (pa.formula && pa.formula.indexOf('[AUTO] ') === 0) { pa.isAuto = true; pa.formula = pa.formula.substring(7); }
  });
};

window.dalPaAssetsSig_ = function(assets) {
  return (assets || []).map(function(a) {
    return (a.uid || '') + ':' + (a.qty || 0) + ':' + (a.location || '') + ':' + (a.formula || '') + ':' + (a.assetId || '');
  }).sort().join('|');
};

/** Stable per-row content for patch compare (matches what we write to Firestore). */
window.dalPaContentSig_ = function(pa) {
  if (!pa) return '';
  return [
    String(pa.assetId || ''),
    String(parseInt(pa.qty, 10) || 0),
    String(pa.location || 'General'),
    String(window.dalPaEncodeFormulaForFs_ ? window.dalPaEncodeFormulaForFs_(pa) : (pa.formula || '')),
    String(pa.containerUid || ''),
    String(pa.scanStatus || 'Assigned'),
    String(pa.outboundTruckUid || ''),
    String(pa.outboundX != null ? pa.outboundX : ''),
    String(pa.outboundY != null ? pa.outboundY : ''),
    String(pa.outboundZ != null ? pa.outboundZ : ''),
    pa.outboundRotated ? '1' : '0',
    pa.outboundStaged ? '1' : '0',
    String(pa.inboundTruckUid || ''),
    String(pa.inboundX != null ? pa.inboundX : ''),
    String(pa.inboundY != null ? pa.inboundY : ''),
    String(pa.inboundZ != null ? pa.inboundZ : ''),
    pa.inboundRotated ? '1' : '0',
    pa.inboundStaged ? '1' : '0'
  ].join('\t');
};

window.dalPaIsAutoRow_ = function(pa) {
  if (!pa) return false;
  if (pa.isAuto || pa.isGenericAuto) return true;
  var f = String(pa.formula || '');
  return f === 'Auto-Container' || f === 'Gen-Auto-Container' ||
    f.indexOf('[AUTO] ') === 0 || f.indexOf('[GEN_AUTO] ') === 0;
};

/** Fixture-only sig — live collab ignores auto-container UID churn for equality. */
window.dalPaFixturesSig_ = function(assets) {
  return (assets || []).filter(function(a) { return !window.dalPaIsAutoRow_(a); }).map(function(a) {
    return (a.uid || '') + ':' + (a.qty || 0) + ':' + (a.location || '') + ':' +
      (a.formula || '') + ':' + (a.assetId || '') + ':' + (a.containerUid || '');
  }).sort().join('|');
};

window.dalPaHoldUntil_ = window.dalPaHoldUntil_ || {};
window.dalPaRecentlyDeleted_ = window.dalPaRecentlyDeleted_ || {};
window.dalPaSeenServerSnap_ = false;
window.dalPaApplyTimer_ = null;
window.dalPaPendingApply_ = null;
window.dalPaLastRenderSig_ = '';

window.dalPaHoldEntities_ = function(uids, ms) {
  ms = ms == null ? 3000 : ms;
  var until = Date.now() + ms;
  (uids || []).forEach(function(uid) {
    if (!uid || uid === '_meta') return;
    window.dalPaHoldUntil_[String(uid)] = until;
  });
};

window.dalPaMarkDeleted_ = function(uids, ms) {
  ms = ms == null ? 8000 : ms;
  var until = Date.now() + ms;
  (uids || []).forEach(function(uid) {
    if (!uid || uid === '_meta') return;
    window.dalPaRecentlyDeleted_[String(uid)] = until;
  });
};

window.dalPaIsHeld_ = function(uid) {
  if (!uid) return false;
  var until = window.dalPaHoldUntil_[String(uid)] || 0;
  return Date.now() < until;
};

window.dalPaIsRecentlyDeleted_ = function(uid) {
  if (!uid) return false;
  var until = window.dalPaRecentlyDeleted_[String(uid)] || 0;
  if (Date.now() >= until) {
    delete window.dalPaRecentlyDeleted_[String(uid)];
    return false;
  }
  return true;
};

window.dalPaAnyHoldActive_ = function() {
  var now = Date.now();
  var map = window.dalPaHoldUntil_ || {};
  var k;
  for (k in map) {
    if (Object.prototype.hasOwnProperty.call(map, k) && map[k] > now) return true;
  }
  return false;
};

window.dalPaDirtyUidMap_ = function() {
  var dirty = {};
  var origBy = {};
  var currBy = {};
  (window.originalProjectAssets || []).forEach(function(pa) {
    if (pa && pa.uid && !window.dalPaIsAutoRow_(pa)) origBy[String(pa.uid)] = pa;
  });
  (typeof currentProjectAssets !== 'undefined' && currentProjectAssets ? currentProjectAssets : []).forEach(function(pa) {
    if (!pa || window.dalPaIsAutoRow_(pa)) return;
    if (!pa.uid) {
      dirty['__new_' + Math.random()] = true;
      return;
    }
    currBy[String(pa.uid)] = pa;
  });
  Object.keys(currBy).forEach(function(uid) {
    var o = origBy[uid];
    if (!o || window.dalPaContentSig_(currBy[uid]) !== window.dalPaContentSig_(o)) dirty[uid] = true;
  });
  Object.keys(origBy).forEach(function(uid) {
    if (!currBy[uid]) dirty[uid] = true;
  });
  return dirty;
};

window.dalPaMapByUid_ = function(assets) {
  var map = {};
  (assets || []).forEach(function(pa) {
    if (pa && pa.uid) map[String(pa.uid)] = pa;
  });
  return map;
};

/**
 * Patch merge for prep PA fixtures only (autos are local-derived after apply).
 * NEVER resurrect a UID that is pending-delete, held-absent, or recently deleted.
 */
window.dalPaPatchMergeFromRemote_ = function(serverAssets) {
  var dirty = window.dalPaDirtyUidMap_();
  var local = Array.isArray(currentProjectAssets) ? currentProjectAssets : [];
  var localFixtures = local.filter(function(pa) { return !window.dalPaIsAutoRow_(pa); });
  var localBy = window.dalPaMapByUid_(localFixtures);
  var origBy = window.dalPaMapByUid_((window.originalProjectAssets || []).filter(function(pa) {
    return !window.dalPaIsAutoRow_(pa);
  }));
  var remoteFixtures = (serverAssets || []).filter(function(pa) { return !window.dalPaIsAutoRow_(pa); });
  var merged = [];
  var used = {};

  remoteFixtures.forEach(function(remotePa) {
    if (!remotePa) return;
    var uid = remotePa.uid ? String(remotePa.uid) : '';
    if (!uid) return;

    if (window.dalPaIsRecentlyDeleted_(uid)) return;
    if ((dirty[uid] || window.dalPaIsHeld_(uid)) && !localBy[uid] && origBy[uid]) return;
    if (window.dalPaIsHeld_(uid) && !localBy[uid]) return;

    if (window.dalPaIsHeld_(uid) || dirty[uid]) {
      if (localBy[uid]) merged.push(localBy[uid]);
      else merged.push(remotePa);
    } else {
      merged.push(remotePa);
    }
    used[uid] = true;
  });

  localFixtures.forEach(function(pa) {
    if (!pa) return;
    if (!pa.uid) {
      merged.push(pa);
      return;
    }
    var uid = String(pa.uid);
    if (used[uid]) return;
    if (dirty[uid] || window.dalPaIsHeld_(uid)) merged.push(pa);
  });

  return merged;
};


/** Timeline-parity apply for PA fixtures (writeSeq + clientId + hold + touches). */
window.dalPaApplyRemoteFixturesTimeline_ = function(remoteFixtures, localFixtures) {
  var now = Date.now();
  var localBy = window.dalPaMapByUid_(localFixtures || []);
  var out = [];
  var used = {};
  (remoteFixtures || []).forEach(function(remotePa) {
    if (!remotePa || !remotePa.uid) return;
    var uid = String(remotePa.uid);
    var seq = Number(remotePa.writeSeq || 0) || 0;
    var remoteClient = String(remotePa.clientId || '');

    if (window.dalPaClientId && remoteClient === window.dalPaClientId) {
      if (seq > (window.dalPaLastAppliedSeq_[uid] || 0)) window.dalPaLastAppliedSeq_[uid] = seq;
      if (localBy[uid]) { out.push(localBy[uid]); used[uid] = true; }
      return;
    }
    // Unstamped (seq=0) or older seq must not yank after a stamped write.
    // GAS getProjectAssets strips writeSeq — those snaps used to re-open the LWW war.
    var lastSeq = Number(window.dalPaLastAppliedSeq_[uid] || 0) || 0;
    if (lastSeq > 0 && (!seq || seq < lastSeq)) {
      if (localBy[uid]) { out.push(localBy[uid]); used[uid] = true; }
      return;
    }
    if (window.dalPaIsRecentlyDeleted_(uid) || window.dalPaDeletedUids_[uid]) return;
    if (window.dalPaIsHeld_(uid) || window.dalPaTouchedUids_[uid]) {
      if (localBy[uid]) { out.push(localBy[uid]); used[uid] = true; }
      return;
    }
    out.push(remotePa);
    used[uid] = true;
    if (seq) window.dalPaLastAppliedSeq_[uid] = seq;
  });
  Object.keys(localBy).forEach(function(uid) {
    if (used[uid]) return;
    if (window.dalPaTouchedUids_[uid] || window.dalPaIsHeld_(uid)) out.push(localBy[uid]);
  });
  return out;
};

window.dalUpdateRemotePendingBanner_ = function() {
  var banner = document.getElementById('dal-session-banner');
  if (!banner || !window.dalPrepUiOpen) return;
  var text;
  if (window.dalPaRemotePending) {
    text = '🔒 IN PREPARATION — remote updates available (save or reload to sync)';
  } else if (window.dalPaLiveSyncMode === 'firestore') {
    text = '🔒 IN PREPARATION — live sync (patch)';
  } else if (window.dalPaLiveSyncMode === 'gas') {
    text = '🔒 IN PREPARATION — live sync (server)';
  } else {
    text = '🔒 IN PREPARATION';
  }
  if (text === window.dalPaBannerLastText_) return;
  window.dalPaBannerLastText_ = text;
  banner.textContent = text;
};

/**
 * Coalesced remote apply — prevents snap storms from full-re-rendering PA (browser stutter).
 */
window.dalApplyRemotePaAssets_ = function(assets, fromCacheEmpty, snapMeta) {
  snapMeta = snapMeta || {};
  if (!window.dalPrepUiOpen) return;
  if (fromCacheEmpty) return;
  if (snapMeta.hasPendingWrites) return;
  if (snapMeta.fromCache && window.dalPaSeenServerSnap_) return;
  if (!snapMeta.fromCache) window.dalPaSeenServerSnap_ = true;

  window.dalPaPendingApply_ = {
    assets: JSON.parse(JSON.stringify(assets || [])),
    snapMeta: snapMeta
  };
  if (window.dalPaApplyTimer_) return;
  window.dalPaApplyTimer_ = setTimeout(function() {
    window.dalPaApplyTimer_ = null;
    var pending = window.dalPaPendingApply_;
    window.dalPaPendingApply_ = null;
    if (pending) window.dalApplyRemotePaAssetsNow_(pending.assets, pending.snapMeta);
  }, 300);
};

window.dalApplyRemotePaAssetsNow_ = function(assets, snapMeta) {
  snapMeta = snapMeta || {};
  if (Date.now() < (window.dalPaIgnoreListenerUntil || 0)) return;
  if (window.dalPaFlushInFlight) return;
  if (!window.dalPrepUiOpen) return;
  if (window.dalPaAnyHoldActive_()) {
    // Re-queue — do not drop the latest snap while local hold is active.
    window.dalPaPendingApply_ = { assets: JSON.parse(JSON.stringify(assets || [])), snapMeta: snapMeta };
    if (!window.dalPaApplyTimer_) {
      window.dalPaApplyTimer_ = setTimeout(function() {
        window.dalPaApplyTimer_ = null;
        var pending = window.dalPaPendingApply_;
        window.dalPaPendingApply_ = null;
        if (pending) window.dalApplyRemotePaAssetsNow_(pending.assets, pending.snapMeta);
      }, 350);
    }
    return;
  }

  var serverAssets = JSON.parse(JSON.stringify(assets || []));
  window.dalProcessPaFormulas_(serverAssets, { skipExplode: true });
  serverAssets = serverAssets.filter(function(pa) {
    return !(pa && pa.uid && window.dalPaIsRecentlyDeleted_(String(pa.uid)));
  });

  var fixtureSig = window.dalPaFixturesSig_(serverAssets);
  if (fixtureSig === window.dalPaLastRemoteSig) return;
  // After local flush, ignore lagging snaps that do not yet show our fixture state.
  if (window.dalPaFlushGuardUntil_ && Date.now() < window.dalPaFlushGuardUntil_) {
    if (window.dalPaExpectedFixtureSig_ && fixtureSig !== window.dalPaExpectedFixtureSig_) return;
  }

  var hasTouches = window.dalPaHasPendingTouches_();
  var remoteFixtures = (serverAssets || []).filter(function(pa) { return !window.dalPaIsAutoRow_(pa); });
  var localFixtures = (typeof currentProjectAssets !== 'undefined' ? currentProjectAssets : []).filter(function(pa) {
    return !window.dalPaIsAutoRow_(pa);
  });
  var mergedFixtures = window.dalPaApplyRemoteFixturesTimeline_(remoteFixtures, localFixtures);
  var mergedFixSig = window.dalPaFixturesSig_(mergedFixtures);
  var localFixSig = window.dalPaFixturesSig_(localFixtures);

  if (mergedFixSig === localFixSig) {
    window.dalPaLastRemoteSig = fixtureSig;
    window.dalPaRemotePending = !!hasTouches;
    window.dalUpdateRemotePendingBanner_();
    return;
  }

  window.dalPaLastRemoteSig = fixtureSig;
  window.dalPaRemotePending = hasTouches;
  window.dalPaApplyingRemote = true;
  try {
    currentProjectAssets = JSON.parse(JSON.stringify(mergedFixtures));
    if (typeof recalcAutoContainers === 'function') recalcAutoContainers();

    if (!hasTouches) {
      window.originalProjectAssets = JSON.parse(JSON.stringify(currentProjectAssets || []));
    } else {
      // Keep original for untouched fixtures; advance applied remotes into original for clean ones.
      var origBy = window.dalPaMapByUid_((window.originalProjectAssets || []).filter(function(pa) {
        return !window.dalPaIsAutoRow_(pa);
      }));
      var remoteBy = window.dalPaMapByUid_(mergedFixtures);
      Object.keys(remoteBy).forEach(function(uid) {
        if (!window.dalPaTouchedUids_[uid] && !window.dalPaDeletedUids_[uid] && !window.dalPaIsHeld_(uid)) {
          origBy[uid] = JSON.parse(JSON.stringify(remoteBy[uid]));
        }
      });
      Object.keys(origBy).forEach(function(uid) {
        if (!remoteBy[uid] && !window.dalPaTouchedUids_[uid] && !window.dalPaDeletedUids_[uid] && !window.dalPaIsHeld_(uid)) {
          delete origBy[uid];
        }
      });
      var autos = (currentProjectAssets || []).filter(function(pa) { return window.dalPaIsAutoRow_(pa); });
      window.originalProjectAssets = Object.keys(origBy).map(function(k) { return origBy[k]; }).concat(
        JSON.parse(JSON.stringify(autos))
      );
    }

    var renderSig = window.dalPaFixturesSig_(currentProjectAssets);
    if (renderSig !== window.dalPaLastRenderSig_) {
      window.dalPaLastRenderSig_ = renderSig;
      var overlay = document.getElementById('project-assets-modal-overlay');
      if (overlay && overlay.style.display !== 'none' && typeof renderProjectAssetsUI === 'function') {
        renderProjectAssetsUI();
      }
      if (typeof evaluatePackingReadiness === 'function') evaluatePackingReadiness(true);
    }
  } finally {
    window.dalPaApplyingRemote = false;
  }
  window.dalUpdateRemotePendingBanner_();
  // NEVER flush from apply — that was the snap→render→flush→snap browser stutter loop.
};

window.dalEnsureFirebaseSdk_ = function(done) {
  if (window.firebase && window.firebase.firestore && window.firebase.auth) {
    done(null);
    return;
  }
  var urls = [
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js'
  ];
  var idx = 0;
  function loadNext() {
    if (idx >= urls.length) {
      done(window.firebase ? null : new Error('Firebase SDK failed to load'));
      return;
    }
    var s = document.createElement('script');
    s.src = urls[idx++];
    s.onload = loadNext;
    s.onerror = function() { done(new Error('Failed to load ' + s.src)); };
    document.head.appendChild(s);
  }
  loadNext();
};

/** True when running inside hosting shell (web.app) — preferred for live Firestore. */
window.dalHostFsAvailable_ = function() {
  try {
    if (!window.parent || window.parent === window) return false;
    // Raw script.google.com bookmark has no host-boot — skip host bridge.
    try {
      var topHref = String((window.top && window.top.location && window.top.location.href) || '');
      if (topHref && /script\.google\.com/i.test(topHref) && !/web\.app/i.test(topHref)) {
        return false;
      }
    } catch (eTop) {
      // Cross-origin top (web.app embedding GAS) — cannot read href; host bridge is expected.
    }
    return true;
  } catch (e) { return false; }
};

window.dalFsReqSeq_ = 1;
window.dalFsPending_ = {};
window.dalFsListenHandlers_ = {};
window.dalFsHostAuthReady_ = false;
window.dalFsMsgBound_ = false;

window.dalFsBindHostMessages_ = function() {
  if (window.dalFsMsgBound_) return;
  window.dalFsMsgBound_ = true;
  window.addEventListener('message', function(ev) {
    var d = ev.data;
    if (!d || !d.type) return;
    if (d.type === 'SHOWRUNNER_DAL_FS_AUTH_RESULT') {
      var pend = window.dalFsPending_[d.requestId];
      if (!pend) return;
      delete window.dalFsPending_[d.requestId];
      if (d.ok) {
        window.dalFsHostAuthReady_ = true;
        window.dalFirestoreClient = { viaHost: true, ready: true };
        try { console.log('[DAL FS] host Auth OK'); } catch (eOk) { /* ignore */ }
        pend.cb(null, window.dalFirestoreClient);
      } else {
        window.dalFsHostAuthReady_ = false;
        try { console.warn('[DAL FS] host Auth fail:', d.error); } catch (eFail) { /* ignore */ }
        pend.cb(new Error(d.error || 'Host Firebase auth failed'));
      }
      return;
    }
    if (d.type === 'SHOWRUNNER_DAL_FS_SNAP') {
      var h = window.dalFsListenHandlers_[d.requestId];
      if (h && h.onSnap) h.onSnap(d);
      return;
    }
    if (d.type === 'SHOWRUNNER_DAL_FS_SNAP_ERROR') {
      var he = window.dalFsListenHandlers_[d.requestId];
      if (he && he.onErr) he.onErr(new Error(d.error || 'Host listen failed'));
      return;
    }
    if (d.type === 'SHOWRUNNER_DAL_FS_SNAP_COL') {
      var hc = window.dalFsListenHandlers_[d.requestId];
      if (hc && hc.onSnap) hc.onSnap(d);
      return;
    }
    if (d.type === 'SHOWRUNNER_DAL_FS_SNAP_COL_ERROR') {
      var hce = window.dalFsListenHandlers_[d.requestId];
      if (hce && hce.onErr) hce.onErr(new Error(d.error || 'Host collection listen failed'));
      return;
    }
    if (d.type === 'SHOWRUNNER_DAL_FS_WRITE_RESULT') {
      var pw = window.dalFsPending_[d.requestId];
      if (!pw) return;
      delete window.dalFsPending_[d.requestId];
      if (d.ok) pw.cb(null, d.result);
      else pw.cb(new Error(d.error || 'Host write failed'));
    }
  });
};

window.dalFsPostToHost_ = function(msg) {
  // Hit window.top (web.app host-boot) and every ancestor — GAS is multi-nested.
  var seen = [];
  function post(w) {
    if (!w) return;

  if (!pa.uid) pa.uid = window.dalNewUid_();
  var doc = {
    uid: String(pa.uid),
    project_uid: String(projectId || ''),
    asset_uid: String(pa.assetId || ''),
    assigned_quantity: pa.qty != null ? pa.qty : 1,
    location: pa.location || 'General',
    formula: window.dalPaEncodeFormulaForFs_(pa),
    creator: pa.creator || (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System'),
    container_uid: pa.containerUid || '',
    scan_status: pa.scanStatus || 'Assigned'
  };
  if (pa.outboundTruckUid) doc.outbound_truck_uid = pa.outboundTruckUid;
  if (pa.outboundX != null) doc.outbound_x = pa.outboundX;
  if (pa.outboundY != null) doc.outbound_y = pa.outboundY;
  if (pa.outboundZ != null) doc.outbound_z = pa.outboundZ;
  if (pa.outboundRotated) doc.outbound_rotated = true;
  if (pa.outboundStaged) doc.outbound_staged = true;
  if (pa.inboundTruckUid) doc.inbound_truck_uid = pa.inboundTruckUid;
  if (pa.inboundX != null) doc.inbound_x = pa.inboundX;
  if (pa.inboundY != null) doc.inbound_y = pa.inboundY;
  if (pa.inboundZ != null) doc.inbound_z = pa.inboundZ;
  if (pa.inboundRotated) doc.inbound_rotated = true;
  if (pa.inboundStaged) doc.inbound_staged = true;
  // writeSeq stamped on host (read-increment); clientId identifies echo.
  doc.clientId = window.dalPaClientId || '';
  return doc;
};

/**
 * Only touched/deleted PA rows — NEVER rewrite the whole collection (timeline LWW lesson).
 */
window.dalPaComputeForkPatch_ = function(projectId) {
  // Timeline discipline: ONLY explicit touches/deletes (fixtures). Never invent sibling diffs.
  var current = Array.isArray(currentProjectAssets) ? currentProjectAssets : [];
  var currentByUid = {};
  var i;
  for (i = 0; i < current.length; i++) {
    var pa = current[i];
    if (!pa || window.dalPaIsAutoRow_(pa)) continue;
    if (!pa.uid) pa.uid = window.dalNewUid_();
    currentByUid[String(pa.uid)] = pa;
  }
  var sets = [];
  var deletes = [];
  Object.keys(window.dalPaTouchedUids_ || {}).forEach(function(uid) {
    if (currentByUid[uid]) {
      sets.push({ uid: uid, doc: window.dalPaAssetToFsDoc_(currentByUid[uid], projectId) });
    }
  });
  Object.keys(window.dalPaDeletedUids_ || {}).forEach(function(uid) {
    if (uid && uid !== '_meta') deletes.push(uid);
  });
  return { sets: sets, deletes: deletes };
};

/**
 * Direct browser → Firestore PA fork write (patch only).
 * Falls back to caller if auth/client unavailable.
 */
/**
 * Full fork rewrite (fixtures + autos). Used before END PREP commit only —
 * live flush stays fixtures-only to avoid auto UID snap storms.
 */
window.dalWritePaForkFullToFirestore_ = function(projectId, done) {
  done = done || function() {};
  if (!projectId) { done(new Error('no_project')); return; }
  window.dalEnsureFirestoreClientAuth_(function(err, client) {
    if (err || !client) { done(err || new Error('firestore_client_unavailable')); return; }
    try {
      var current = Array.isArray(currentProjectAssets) ? currentProjectAssets : [];
      var currentByUid = {};
      var i;
      for (i = 0; i < current.length; i++) {
        var pa = current[i];
        if (!pa) continue;
        if (!pa.uid) pa.uid = window.dalNewUid_();
        currentByUid[String(pa.uid)] = pa;
      }
      var prev = Array.isArray(window.originalProjectAssets) ? window.originalProjectAssets : [];
      var toDelete = [];
      for (i = 0; i < prev.length; i++) {
        var oldUid = prev[i] && prev[i].uid ? String(prev[i].uid) : '';
        if (oldUid && oldUid !== '_meta' && !currentByUid[oldUid]) toDelete.push(oldUid);
      }
      var sets = Object.keys(currentByUid).map(function(uid) {
        return { uid: uid, doc: window.dalPaAssetToFsDoc_(currentByUid[uid], projectId) };
      });
      if (sets.length === 0 && toDelete.length === 0) { done(null); return; }

      // Also refresh live state doc so commit + live stay aligned.
      var finishFull_ = function(err) {
        if (err) { done(err); return; }
        var fixtures = Object.keys(currentByUid).filter(function(uid) {
          return !window.dalPaIsAutoRow_(currentByUid[uid]);
        }).map(function(uid) {
          var pa = currentByUid[uid];
          return {
            uid: String(pa.uid),
            assetId: String(pa.assetId || ''),
            qty: pa.qty != null ? pa.qty : 1,
            location: pa.location || 'General',
            formula: window.dalPaEncodeFormulaForFs_(pa),
            creator: pa.creator || 'System',
            containerUid: pa.containerUid || '',
            scanStatus: pa.scanStatus || 'Assigned'
          };
        });
        var allTouched = {};
        fixtures.forEach(function(f) { allTouched[f.uid] = 1; });
        var statePath = 'projects/' + String(projectId) + '/assets/state';
        var meta = {
          clientId: window.dalPaClientId || '',
          actor: typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System'
        };
        if (client.viaHost && typeof window.dalHostFsPaPatchWrite_ === 'function') {
          // Replace: empty remote merge with all touched = full fixture set.
          // Pass deleted for removed fixtures.
          var delMap = {};
          toDelete.forEach(function(uid) { delMap[uid] = 1; });
          window.dalHostFsPaPatchWrite_(statePath, fixtures, { touched: allTouched, deleted: delMap }, meta, function(e2) {
            done(e2 || null);
          });
          return;
        }
        done(null);
      };

      if (client.viaHost && !client.db && typeof window.dalHostFsPaBatchWrite_ === 'function') {
        window.dalHostFsPaBatchWrite_('projects/' + String(projectId) + '/assets', sets, toDelete, finishFull_);
        return;
      }
      if (!client.db) { done(new Error('firestore_client_unavailable')); return; }
      var col = client.db.collection('projects').doc(String(projectId)).collection('assets');
      var ops = [];
      sets.forEach(function(w) { ops.push({ type: 'set', ref: col.doc(w.uid), data: w.doc }); });
      toDelete.forEach(function(uid) { ops.push({ type: 'delete', ref: col.doc(uid) }); });
      function commitChunk(start) {
        if (start >= ops.length) { finishFull_(null); return; }
        var batch = client.db.batch();
        var end = Math.min(start + 450, ops.length);
        for (var j = start; j < end; j++) {
          if (ops[j].type === 'delete') batch.delete(ops[j].ref);
          else batch.set(ops[j].ref, ops[j].data, { merge: true });
        }
        batch.commit().then(function() { commitChunk(end); }).catch(function(eWrite) { done(eWrite); });
      }
      commitChunk(0);
    } catch (e2) { done(e2); }
  });
};

window.dalWritePaForkToFirestore_ = function(projectId, done) {
  done = done || function() {};
  if (!projectId || !window.dalPrepUiOpen) {
    done(new Error('prep_not_open'));
    return;
  }
  window.dalEnsureFirestoreClientAuth_(function(err, client) {
    if (err || !client) {
      done(err || new Error('firestore_client_unavailable'));
      return;
    }
    try {
      var touched = Object.assign({}, window.dalPaTouchedUids_ || {});
      var deleted = Object.assign({}, window.dalPaDeletedUids_ || {});
      if (!Object.keys(touched).length && !Object.keys(deleted).length) {
        done(null, { sets: [], deletes: [] });
        return;
      }
      var localFixtures = [];
      (Array.isArray(currentProjectAssets) ? currentProjectAssets : []).forEach(function(pa) {
        if (!pa || window.dalPaIsAutoRow_(pa)) return;
        if (!pa.uid) pa.uid = window.dalNewUid_();
        // Snapshot plain fields for state JSON (formula encoded for collection mirror).
        localFixtures.push({
          uid: String(pa.uid),
          assetId: String(pa.assetId || ''),
          qty: pa.qty != null ? pa.qty : 1,
          location: pa.location || 'General',
          formula: window.dalPaEncodeFormulaForFs_ ? window.dalPaEncodeFormulaForFs_(pa) : (pa.formula || ''),
          creator: pa.creator || (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System'),
          containerUid: pa.containerUid || '',
          scanStatus: pa.scanStatus || 'Assigned'
        });
      });

      window.dalMarkPaLocalSave_();
      var touchUids = Object.keys(touched).concat(Object.keys(deleted));
      window.dalPaHoldEntities_(touchUids, 3000);
      window.dalPaMarkDeleted_(Object.keys(deleted), 8000);

      var path = 'projects/' + String(projectId) + '/assets/state';
      var meta = {
        clientId: window.dalPaClientId || '',
        actor: typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System'
      };
      var mutations = { touched: touched, deleted: deleted };

      var afterOk_ = function(result) {
        Object.keys(window.dalPaTouchedUids_ || {}).forEach(function(uid) { delete window.dalPaTouchedUids_[uid]; });
        Object.keys(window.dalPaDeletedUids_ || {}).forEach(function(uid) { delete window.dalPaDeletedUids_[uid]; });
        var writeSeq = Number((result && result.writeSeq) || 0) || 0;
        if (writeSeq > window.dalPaLastDocWriteSeq_) window.dalPaLastDocWriteSeq_ = writeSeq;
        done(null, { mutations: mutations, result: result || null });
      };

      // Host transactional patch (preferred — true timeline parity).
      if (client.viaHost && typeof window.dalHostFsPaPatchWrite_ === 'function') {
        window.dalHostFsPaPatchWrite_(path, localFixtures, mutations, meta, function(writeErr, result) {
          if (writeErr) done(writeErr);
          else afterOk_(result);
        });
        return;
      }
      if (!client.db) {
        done(new Error('firestore_client_unavailable'));
        return;
      }

      var ref = client.db.collection('projects').doc(String(projectId)).collection('assets').doc('state');
      var col = client.db.collection('projects').doc(String(projectId)).collection('assets');
      client.db.runTransaction(function(tx) {
        return tx.get(ref).then(function(doc) {
          var remoteFixtures = [];
          var prevSeq = 0;
          if (doc.exists) {
            try { remoteFixtures = JSON.parse((doc.data() && doc.data().fixturesJson) || '[]'); } catch (eP) { remoteFixtures = []; }
            prevSeq = Number((doc.data() && doc.data().writeSeq) || 0) || 0;
          }
          var remoteMap = {};
          var localMap = {};
          (remoteFixtures || []).forEach(function(e) { if (e && e.uid) remoteMap[String(e.uid)] = e; });
          localFixtures.forEach(function(e) { if (e && e.uid) localMap[String(e.uid)] = e; });
          var out = {};
          Object.keys(remoteMap).forEach(function(id) { out[id] = remoteMap[id]; });
          Object.keys(deleted).forEach(function(id) { delete out[id]; });
          Object.keys(touched).forEach(function(id) {
            if (localMap[id]) out[id] = localMap[id];
            else delete out[id];
          });
          var merged = Object.keys(out).map(function(k) { return out[k]; });
          var updatedAt = new Date().toISOString();
          var writeSeq = prevSeq + 1;
          var clientId = window.dalPaClientId || '';
          tx.set(ref, {
            fixturesJson: JSON.stringify(merged),
            updatedAt: updatedAt,
            updatedBy: meta.actor,
            clientId: clientId,
            writeSeq: writeSeq
          });
          Object.keys(deleted).forEach(function(uid) {
            if (uid && uid !== '_meta' && uid !== 'state') tx.delete(col.doc(String(uid)));
          });
          Object.keys(touched).forEach(function(uid) {
            var pa = out[uid];
            if (!pa) return;
            tx.set(col.doc(String(uid)), window.dalPaAssetToFsDoc_({
              uid: pa.uid,
              assetId: pa.assetId,
              qty: pa.qty,
              location: pa.location,
              formula: pa.formula,
              creator: pa.creator,
              containerUid: pa.containerUid,
              scanStatus: pa.scanStatus
            }, projectId), { merge: true });
          });
          return { merged: merged, updatedAt: updatedAt, writeSeq: writeSeq };
        });
      }).then(function(result) {
        afterOk_(result);
      }).catch(function(eWrite) {
        done(eWrite);
      });
    } catch (e2) {
      done(e2);
    }
  });
};

/**
 * True live collab: while prep fork is open, flush PA to Firebase after local edits.
 * Prefers direct client Firestore write; falls back to GAS if client auth unavailable.
 */
window.dalFlushPaIfPrepOpen_ = function() {
  if (!window.dalPrepUiOpen) return;
  if (window.dalPaApplyingRemote) return;
  if (window.isBackgroundSyncing) return;
  if (window.dalPaFlushInFlight) {
    window.dalPaFlushAgain = true;
    return;
  }
  if (window.projectAssetsReadOnly) return;
  if (window.currentOperationType) return;
  if (!window.dalPaHasPendingTouches_()) return;
  var earlyProjectId = document.getElementById('edit-folder-id')
    ? document.getElementById('edit-folder-id').value
    : '';
  var earlyPatch = null;
  if (earlyProjectId && typeof window.dalPaComputeForkPatch_ === 'function') {
    try { earlyPatch = window.dalPaComputeForkPatch_(earlyProjectId); } catch (eEarly0) { earlyPatch = null; }
  }
  if (!earlyPatch || (!(earlyPatch.sets || []).length && !(earlyPatch.deletes || []).length)) {
    // No fixture patch — do not flush (avoids auto-only churn / false calculatePaDeltas).
    return;
  }
  // Arm holds immediately (before debounce/write) so lagging snaps cannot resurrect rows after minus.
  try {
    var earlyTouches = (earlyPatch.sets || []).map(function(s) { return s.uid; }).concat(earlyPatch.deletes || []);
    window.dalPaHoldEntities_(earlyTouches, 3000);
    window.dalPaMarkDeleted_(earlyPatch.deletes || [], 8000);
  } catch (eEarly) { /* ignore */ }

  clearTimeout(window.dalPaFlushTimer);
  window.dalPaFlushTimer = setTimeout(function() {
    if (!window.dalPrepUiOpen) return;
    if (window.dalPaApplyingRemote) return;
    var latePatch = typeof window.dalPaComputeForkPatch_ === 'function'
      ? window.dalPaComputeForkPatch_(earlyProjectId)
      : null;
    if (!latePatch || (!(latePatch.sets || []).length && !(latePatch.deletes || []).length)) return;
    window.dalPaFlushInFlight = true;
    window.dalPaFlushAgain = false;

    var projectId = document.getElementById('edit-folder-id')
      ? document.getElementById('edit-folder-id').value
      : '';
    var finish = function(ok) {
      window.dalPaFlushInFlight = false;
      if (ok) {
        window.originalProjectAssets = JSON.parse(JSON.stringify(currentProjectAssets || []));
        var fixSig = window.dalPaFixturesSig_(currentProjectAssets || []);
        window.dalPaLastRemoteSig = fixSig;
        window.dalPaExpectedFixtureSig_ = fixSig;
        window.dalPaFlushGuardUntil_ = Date.now() + 4000;
        window.dalPaLastRenderSig_ = fixSig;
        window.dalPaRemotePending = false;
        if (typeof window.dalUpdateRemotePendingBanner_ === 'function') window.dalUpdateRemotePendingBanner_();
        if (typeof updateMobilePaUnsavedUI === 'function') updateMobilePaUnsavedUI();
      } else {
        try { console.warn('DAL PA live flush failed — will retry or use SAVE'); } catch (e1) { /* ignore */ }
        if (window.dalPaHasPendingTouches_()) {
          setTimeout(function() {
            if (window.dalPrepUiOpen && window.dalPaHasPendingTouches_()) window.dalFlushPaIfPrepOpen_();
          }, 600);
        }
      }
      if (window.dalPaFlushAgain) {
        window.dalPaFlushAgain = false;
        window.dalFlushPaIfPrepOpen_();
      }
    };

    // Fast path: direct client → Firestore. Never fall back to GAS save during
    // firestore live mode — GAS firestoreWriteDocument_ replaces the whole doc
    // and wipes writeSeq/clientId, reopening the LWW war with the listener.
    if (projectId && window.dalPaLiveSyncMode === 'firestore') {
      window.dalWritePaForkToFirestore_(projectId, function(writeErr) {
        if (!writeErr) {
          finish(true);
          return;
        }
        try { console.warn('Direct PA Firestore write failed (touches kept for retry):', writeErr); } catch (e2) { /* ignore */ }
        finish(false);
      });
      return;
    }

    if (typeof saveProjectAssets !== 'function') {
      finish(false);
      return;
    }
    saveProjectAssets(function(ok) { finish(!!ok); }, true);
  }, 150);
};

/** Kept for prep-open call sites; flush is wired inside renderProjectAssetsUI. */
window.dalInstallPaLiveFlushHook_ = function() {
  window.__dalPaFlushHookInstalled = true;
};

window.dalPaApplyingRemote = false;
</script>
