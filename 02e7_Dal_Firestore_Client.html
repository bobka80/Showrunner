<!-- DAL Phase 4 Slice C — live prep sync (Firestore client when auth works; GAS poll fallback for GAS iframe) -->
<script>
window.dalPaFirestoreUnsub = null;
window.dalPaSessionMetaUnsub = null;
window.dalPaGasSyncTimer = null;
window.dalPaSessionWatchProjectId = '';
window.dalPaIgnoreListenerUntil = 0;
window.dalPaRemotePending = false;
window.dalPaLastRemoteSig = '';
window.dalPaFirestoreListenProjectId = '';
window.dalMetaAuthority = false;
window.dalPaLiveSyncFailed = false;
window.dalPaLiveSyncMode = ''; // 'firestore' | 'connecting' | 'blocked' | '' (legacy 'gas' treated as blocked)
window.dalPaLiveSyncFailReason_ = '';
window.dalPaSyncBlockedReadOnlyLatch_ = false;
window.dalPaReadOnlyBeforeBlock_ = false;
window.dalPaBlockedRetryTimer_ = null;
window.dalPaBlockedWarnAt_ = 0;
window.dalPaSessionWatchStarting = false;
window.dalPaBannerLastText_ = '';
// Timeline-parity: explicit touches only (never invent full-list diffs).
window.dalPaClientId = window.dalPaClientId || ('pa_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10));
window.dalPaTouchedUids_ = window.dalPaTouchedUids_ || {};
window.dalPaDeletedUids_ = window.dalPaDeletedUids_ || {};
window.dalPaLastAppliedSeq_ = window.dalPaLastAppliedSeq_ || {};
window.dalPaLastDocWriteSeq_ = window.dalPaLastDocWriteSeq_ || 0;
/** H3 — uid → { sig, until } for non-combining field LWW loss toasts */
window.dalPaLwwWatch_ = window.dalPaLwwWatch_ || {};
window.dalPaLwwToastAt_ = 0;
/** Recent local edits — peer delete toast even if LWW watch TTL already expired */
window.dalPaRecentEditUntil_ = window.dalPaRecentEditUntil_ || {};

window.dalPaMarkRecentEdit_ = function(uids, ttlMs) {
  ttlMs = ttlMs || 45000;
  var until = Date.now() + ttlMs;
  if (!window.dalPaRecentEditUntil_) window.dalPaRecentEditUntil_ = {};
  (uids || []).forEach(function(uid) {
    if (!uid || uid === '_meta') return;
    window.dalPaRecentEditUntil_[String(uid)] = until;
  });
};

window.dalPaNonCombiningSig_ = function(pa) {
  pa = pa || {};
  var short = (pa.isShortage === true || pa.isShortage === 'true' ||
    String(pa.formula || '').indexOf('[SHORT] ') === 0) ? '1' : '0';
  return [
    String(pa.assetId || ''),
    String(pa.location || 'General'),
    String(pa.formula || 'Standalone').replace(/^\[SHORT\]\s*/, ''),
    short,
    String(pa.overrideDept || ''),
    String(pa.containerUid || '')
  ].join('\t');
};

window.dalPaArmLwwWatch_ = function(uids, ttlMs) {
  ttlMs = ttlMs || 45000;
  var until = Date.now() + ttlMs;
  var byUid = {};
  (typeof currentProjectAssets !== 'undefined' ? currentProjectAssets : []).forEach(function(pa) {
    if (pa && pa.uid) byUid[String(pa.uid)] = pa;
  });
  (uids || []).forEach(function(uid) {
    if (!uid) return;
    uid = String(uid);
    var pa = byUid[uid];
    if (!pa || window.dalPaIsAutoRow_(pa)) return;
    window.dalPaLwwWatch_[uid] = { sig: window.dalPaNonCombiningSig_(pa), until: until };
  });
  window.dalPaMarkRecentEdit_(uids, ttlMs);
};

window.dalPaDescribePaUids_ = function(uids, localFixtures) {
  uids = uids || [];
  var by = {};
  (localFixtures || []).forEach(function(pa) {
    if (pa && pa.uid) by[String(pa.uid)] = pa;
  });
  if (!Object.keys(by).length && typeof currentProjectAssets !== 'undefined') {
    (currentProjectAssets || []).forEach(function(pa) {
      if (pa && pa.uid) by[String(pa.uid)] = pa;
    });
  }
  var labels = [];
  uids.forEach(function(uid) {
    var pa = by[String(uid)];
    if (!pa) return;
    var name = '';
    try {
      if (typeof globalAssets !== 'undefined' && globalAssets && pa.assetId) {
        var asset = globalAssets.find(function(a) { return a && a.id === pa.assetId; });
        if (asset && asset.name) name = String(asset.name);
      }
    } catch (eA) { /* ignore */ }
    if (!name) name = String(pa.assetId || 'item');
    var qty = pa.qty != null ? pa.qty : 1;
    var loc = pa.location || 'General';
    labels.push(qty + '× ' + name + ' (' + loc + ')');
  });
  if (!labels.length) return '';
  if (labels.length <= 3) return labels.join(', ');
  return labels.slice(0, 3).join(', ') + ' +' + (labels.length - 3) + ' more';
};

window.dalPaShowConflictToast_ = function(/* title, body */) {
  // Conflicts stay in the SYNC strip only — no mid-screen toast.
  try {
    var oldBan = document.getElementById('dal-pa-conflict-banner');
    if (oldBan) oldBan.style.display = 'none';
    var t = document.getElementById('dal-pa-center-toast');
    if (t) t.style.display = 'none';
  } catch (eHide) { /* ignore */ }
};

/** Per-peer operation log for SYNC hover (newest first). */
window.dalPaPeerOpsLog_ = window.dalPaPeerOpsLog_ || {};
window.dalPaPeerRosterNotes_ = window.dalPaPeerRosterNotes_ || {};
window.dalPaSyncHoverWho_ = '';

window.dalPaAppendPeerOp_ = function(who, text) {
  who = String(who || 'Another editor').trim() || 'Another editor';
  text = String(text || '').trim();
  if (!text) return;
  window.dalPaPeerOpsLog_ = window.dalPaPeerOpsLog_ || {};
  if (!window.dalPaPeerOpsLog_[who]) window.dalPaPeerOpsLog_[who] = [];
  window.dalPaPeerOpsLog_[who].unshift({ text: text, at: Date.now() });
  if (window.dalPaPeerOpsLog_[who].length > 25) {
    window.dalPaPeerOpsLog_[who] = window.dalPaPeerOpsLog_[who].slice(0, 25);
  }
  // Latest one-liner for the roster row (no auto-expand, no toast).
  window.dalPaPeerRosterNotes_ = window.dalPaPeerRosterNotes_ || {};
  window.dalPaPeerRosterNotes_[who] = { text: text, at: Date.now() };
  if (typeof window.dalUpdateRemotePendingBanner_ === 'function') {
    window.dalUpdateRemotePendingBanner_();
  }
};

window.dalPaSetPeerRosterNote_ = function(who, text) {
  window.dalPaAppendPeerOp_(who, text);
};

window.dalPaClearPeerRosterNotes_ = function() {
  window.dalPaPeerRosterNotes_ = {};
  window.dalPaPeerOpsLog_ = {};
  window.dalPaSyncHoverWho_ = '';
};

window.dalPaPeerOpsFor_ = function(who) {
  who = String(who || '').trim();
  var log = window.dalPaPeerOpsLog_ || {};
  if (log[who] && log[who].length) return log[who];
  var keys = Object.keys(log);
  for (var i = 0; i < keys.length; i++) {
    if (String(keys[i]).toLowerCase() === who.toLowerCase()) return log[keys[i]] || [];
  }
  return [];
};

window.dalPaHidePeerOpsPopover_ = function() {
  window.dalPaSyncHoverWho_ = '';
  var pop = document.getElementById('pa-prep-peer-ops');
  if (pop) pop.style.display = 'none';
};

window.dalPaShowPeerOpsPopover_ = function(who, anchorEl) {
  who = String(who || '').trim();
  if (!who) return;
  window.dalPaSyncHoverWho_ = who;
  var panel = document.getElementById('pa-prep-live-panel');
  if (!panel) return;
  var pop = document.getElementById('pa-prep-peer-ops');
  if (!pop) {
    pop = document.createElement('div');
    pop.id = 'pa-prep-peer-ops';
    pop.style.cssText = [
      'display:none', 'position:absolute', 'left:8px', 'right:8px', 'bottom:100%',
      'margin-bottom:6px', 'z-index:30', 'max-height:220px', 'overflow-y:auto',
      'background:#18181b', 'border:1px solid #fb7185', 'border-radius:8px',
      'padding:8px 10px', 'box-shadow:0 -8px 24px rgba(0,0,0,0.55)',
      'font-size:11px', 'line-height:1.45', 'color:#e4e4e7'
    ].join(';');
    pop.addEventListener('mouseenter', function() {
      clearTimeout(window.dalPaPeerOpsHideTimer_);
    });
    pop.addEventListener('mouseleave', function() {
      window.dalPaScheduleHidePeerOps_();
    });
    panel.appendChild(pop);
  }
  var ops = window.dalPaPeerOpsFor_(who);
  var safeWho = (typeof escapeHTML === 'function') ? escapeHTML(who) : String(who).replace(/</g, '&lt;');
  var body;
  if (!ops.length) {
    body = '<div style="color:#71717a; font-style:italic;">No recent operations logged.</div>';
  } else {
    body = ops.map(function(op) {
      var t = (typeof escapeHTML === 'function') ? escapeHTML(op.text) : String(op.text).replace(/</g, '&lt;');
      var when = '';
      try {
        when = new Date(op.at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      } catch (eT) { when = ''; }
      return '<div style="padding:5px 0; border-bottom:1px solid #27272a;">' +
        '<div style="font-size:9px; color:#71717a; font-weight:700;">' + when + '</div>' +
        '<div style="color:#fb7185; font-weight:700;">' + t + '</div></div>';
    }).join('');
  }
  pop.innerHTML =
    '<div style="font-size:10px; font-weight:900; letter-spacing:0.06em; color:#fda4af; margin-bottom:6px;">' +
    safeWho + ' — OPERATIONS</div>' + body;
  pop.style.display = 'block';
  if (anchorEl && anchorEl.scrollIntoView) {
    try { anchorEl.scrollIntoView({ block: 'nearest' }); } catch (eS) { /* ignore */ }
  }
};

window.dalPaScheduleHidePeerOps_ = function() {
  clearTimeout(window.dalPaPeerOpsHideTimer_);
  window.dalPaPeerOpsHideTimer_ = setTimeout(function() {
    window.dalPaHidePeerOpsPopover_();
  }, 180);
};

window.dalPaNotifyConflict_ = function(overwritten, deleted, actorOpt, detailText) {
  overwritten = overwritten || [];
  deleted = deleted || [];
  var all = overwritten.concat(deleted);
  if (!all.length) return;
  if (Date.now() < (window.dalPaLwwToastAt_ || 0)) return;
  window.dalPaLwwToastAt_ = Date.now() + 3500;
  all.forEach(function(uid) {
    delete window.dalPaLwwWatch_[uid];
    if (window.dalPaRecentEditUntil_) delete window.dalPaRecentEditUntil_[uid];
  });

  var me = (typeof ACTIVE_USER_NAME !== 'undefined' && ACTIVE_USER_NAME) ? String(ACTIVE_USER_NAME) : '';
  var actor = String(actorOpt || window.dalPaLastRemoteActor_ || '').trim() || 'Another editor';
  if (me && actor === me) return; // own echo / self — no peer cue

  detailText = String(detailText || '').trim();
  var rosterText;
  if (deleted.length && !overwritten.length) {
    rosterText = deleted.length === 1
      ? ('removed: ' + (detailText || '1 item'))
      : ('removed ' + deleted.length + ': ' + (detailText || 'items'));
  } else if (overwritten.length && !deleted.length) {
    rosterText = overwritten.length === 1
      ? ('overwrote: ' + (detailText || '1 item'))
      : ('overwrote ' + overwritten.length + ': ' + (detailText || 'items'));
  } else {
    rosterText = 'changed/removed: ' + (detailText || (all.length + ' items'));
  }

  if (typeof window.dalPaAppendPeerOp_ === 'function') {
    window.dalPaAppendPeerOp_(actor, rosterText);
  }
};

/**
 * Peer delete cue: known local uid missing from remote (not our own delete).
 * Toast for any known peer delete during prep — not only "just edited" rows.
 */
window.dalPaNotifyPeerDeletesVsLocal_ = function(remoteFixtures, localFixtures) {
  var remoteBy = {};
  (remoteFixtures || []).forEach(function(pa) {
    if (pa && pa.uid) remoteBy[String(pa.uid)] = pa;
  });
  var origBy = window.dalPaMapByUid_
    ? window.dalPaMapByUid_((window.originalProjectAssets || []).filter(function(pa) {
      return !window.dalPaIsAutoRow_(pa);
    }))
    : {};
  var gone = [];
  var gonePas = [];
  (localFixtures || []).forEach(function(pa) {
    if (!pa || !pa.uid || window.dalPaIsAutoRow_(pa)) return;
    var uid = String(pa.uid);
    if (remoteBy[uid]) return;
    if (window.dalPaDeletedUids_[uid]) return;
    if (typeof window.dalPaIsRecentlyDeleted_ === 'function' && window.dalPaIsRecentlyDeleted_(uid)) return;
    var known = (Number(window.dalPaLastAppliedSeq_[uid] || 0) || 0) > 0 ||
      !!origBy[uid] ||
      (Number(pa.writeSeq || 0) || 0) > 0;
    if (!known) return; // pending local insert — not a peer delete
    gone.push(uid);
    gonePas.push(pa);
  });
  if (!gone.length) return;
  var detail = typeof window.dalPaDescribePaUids_ === 'function'
    ? window.dalPaDescribePaUids_(gone, gonePas)
    : '';
  window.dalPaNotifyConflict_([], gone, null, detail);
};

window.dalPaCheckLwwLossesAgainstRemote_ = function(remoteFixtures) {
  var watch = window.dalPaLwwWatch_ || {};
  var recent = window.dalPaRecentEditUntil_ || {};
  var now = Date.now();
  var remoteBy = {};
  (remoteFixtures || []).forEach(function(pa) {
    if (pa && pa.uid) remoteBy[String(pa.uid)] = pa;
  });

  var ownDelete = {};
  Object.keys(window.dalPaDeletedUids_ || {}).forEach(function(u) { ownDelete[u] = 1; });
  if (typeof window.dalPaIsRecentlyDeleted_ === 'function') {
    Object.keys(watch).forEach(function(uid) {
      if (window.dalPaIsRecentlyDeleted_(uid)) ownDelete[uid] = 1;
    });
    Object.keys(recent).forEach(function(uid) {
      if (window.dalPaIsRecentlyDeleted_(uid)) ownDelete[uid] = 1;
    });
  }

  var fieldProtected = {};
  Object.keys(window.dalPaTouchedUids_ || {}).forEach(function(u) { fieldProtected[u] = 1; });
  Object.keys(window.dalPaHoldUntil_ || {}).forEach(function(u) {
    if ((window.dalPaHoldUntil_[u] || 0) > now) fieldProtected[u] = 1;
  });

  var candidates = {};
  Object.keys(watch).forEach(function(uid) {
    var w = watch[uid];
    if (!w) return;
    if (w.until && now > w.until) { delete watch[uid]; return; }
    candidates[uid] = w;
  });
  Object.keys(recent).forEach(function(uid) {
    if ((recent[uid] || 0) <= now) { delete recent[uid]; return; }
    if (!candidates[uid]) candidates[uid] = { sig: '', until: recent[uid], recentOnly: true };
  });
  if (!Object.keys(candidates).length) return;

  var overwritten = [];
  var deleted = [];
  Object.keys(candidates).forEach(function(uid) {
    if (ownDelete[uid]) return;
    var remote = remoteBy[uid];
    if (!remote) {
      deleted.push(uid);
      return;
    }
    var w = candidates[uid];
    if (!w || !w.sig || w.recentOnly) return;
    if (fieldProtected[uid]) return;
    if (window.dalPaNonCombiningSig_(remote) !== w.sig) overwritten.push(uid);
  });
  var detailUids = overwritten.concat(deleted);
  var detail = (detailUids.length && typeof window.dalPaDescribePaUids_ === 'function')
    ? window.dalPaDescribePaUids_(detailUids, typeof currentProjectAssets !== 'undefined' ? currentProjectAssets : [])
    : '';
  window.dalPaNotifyConflict_(overwritten, deleted, null, detail);
};

/** H4 — keep aligned with scripts/lib/dal-state-size-mirror-core.js / Dal_Firebase.js */
window.DAL_STATE_WARN_BYTES = 512 * 1024;
window.DAL_STATE_MAX_BYTES = 900 * 1024;
window.DAL_STATE_WARN_COUNT = 1500;
window.DAL_STATE_MAX_COUNT = 4000;
window.dalPaStateSizeWarned_ = false;

window.dalPaStateSizeReport_ = function(fixtures) {
  var list = (fixtures || []).filter(function(pa) {
    return pa && pa.uid && !(pa.isAuto || pa.isGenericAuto);
  });
  var json = '[]';
  try { json = JSON.stringify(list); } catch (e0) { json = '[]'; }
  var bytes = json.length;
  var count = list.length;
  var overMax = bytes >= window.DAL_STATE_MAX_BYTES || count >= window.DAL_STATE_MAX_COUNT;
  var overWarn = !overMax && (bytes >= window.DAL_STATE_WARN_BYTES || count >= window.DAL_STATE_WARN_COUNT);
  return { bytes: bytes, count: count, overWarn: overWarn, overMax: overMax, ok: !overMax };
};

window.dalPaWarnStateSizeOnce_ = function(report) {
  if (!report || !report.overWarn || window.dalPaStateSizeWarned_) return;
  window.dalPaStateSizeWarned_ = true;
  var msg = 'Prep list is getting large (' + report.count + ' rows / ~' +
    Math.round(report.bytes / 1024) + ' KB). Near the live-sync size limit — consider ending prep soon.';
  try {
    if (typeof showToast === 'function') showToast(msg);
    else if (typeof window.showMobilePaToast === 'function') window.showMobilePaToast('Large prep list', msg);
    else console.warn(msg);
  } catch (eW) { /* ignore */ }
};

/** H1: live prep writes only while Firestore patch mode is healthy. */
window.dalPaLiveWritesAllowed_ = function() {
  if (!window.dalPrepUiOpen) return true;
  return window.dalPaLiveSyncMode === 'firestore';
};

window.dalPaWarnBlockedOnce_ = function() {
  if (Date.now() < (window.dalPaBlockedWarnAt_ || 0)) return;
  window.dalPaBlockedWarnAt_ = Date.now() + 4000;
  var msg = 'Live sync is down — fixture edits are blocked until patch restores.';
  try {
    if (typeof showToast === 'function') showToast(msg);
    else if (typeof showNotification === 'function') showNotification(msg);
    else console.warn(msg);
  } catch (eW) { /* ignore */ }
};

window.dalPaApplySyncBlockedUi_ = function(blocked) {
  var overlay = document.getElementById('project-assets-modal-overlay');
  if (overlay) overlay.classList.toggle('pa-sync-blocked-mode', !!blocked);
  if (blocked) {
    if (!window.dalPaSyncBlockedReadOnlyLatch_) {
      window.dalPaReadOnlyBeforeBlock_ = !!window.projectAssetsReadOnly;
      window.dalPaSyncBlockedReadOnlyLatch_ = true;
      if (typeof applyProjectAssetsReadOnly === 'function') applyProjectAssetsReadOnly(true);
    }
  } else if (window.dalPaSyncBlockedReadOnlyLatch_) {
    window.dalPaSyncBlockedReadOnlyLatch_ = false;
    if (typeof applyProjectAssetsReadOnly === 'function') {
      applyProjectAssetsReadOnly(!!window.dalPaReadOnlyBeforeBlock_);
    }
  }
};

window.dalPaClearBlockedRetry_ = function() {
  if (window.dalPaBlockedRetryTimer_) {
    try { clearInterval(window.dalPaBlockedRetryTimer_); } catch (eR) { /* ignore */ }
    window.dalPaBlockedRetryTimer_ = null;
  }
};

/**
 * H1 fail-closed: Auth/listen failure must NOT open silent GAS multi-edit.
 * Read-only GAS poll may continue so the list can still refresh; writes stay blocked.
 */
window.enterDalPaLiveSyncBlocked_ = function(projectId, reason) {
  if (!projectId || !window.dalPrepUiOpen) return;
  window.stopDalPaFirestoreListener();
  window.dalPaLiveSyncMode = 'blocked';
  window.dalPaLiveSyncFailed = true;
  window.dalPaLiveSyncFailReason_ = String(reason || 'live sync unavailable').slice(0, 100);
  window.dalPaApplySyncBlockedUi_(true);
  window.dalUpdateRemotePendingBanner_();
  // Read-only awareness pull (does not enable writes — mode stays blocked).
  window.startDalPaGasReadOnlyPull_(projectId);
  window.dalPaClearBlockedRetry_();
  window.dalPaBlockedRetryTimer_ = setInterval(function() {
    if (!window.dalPrepUiOpen) {
      window.dalPaClearBlockedRetry_();
      return;
    }
    if (window.dalPaLiveSyncMode === 'firestore' && window.dalPaFirestoreUnsub) {
      window.dalPaClearBlockedRetry_();
      return;
    }
    try { console.log('[DAL PA] retrying Firestore live sync after block…'); } catch (eLog) { /* ignore */ }
    window.startDalPaFirestoreListener(projectId);
  }, 8000);
};

window.dalPaClearBlockedStateIfHealthy_ = function() {
  if (window.dalPaLiveSyncMode !== 'firestore') return;
  window.dalPaLiveSyncFailed = false;
  window.dalPaLiveSyncFailReason_ = '';
  window.dalPaClearBlockedRetry_();
  window.stopDalPaGasSync_();
  window.dalPaApplySyncBlockedUi_(false);
};

window.dalPaNoteTouch_ = function(uid) {
  if (!uid || uid === '_meta' || !window.dalPrepUiOpen) return;
  if (!window.dalPaLiveWritesAllowed_()) {
    window.dalPaWarnBlockedOnce_();
    return;
  }
  uid = String(uid);
  window.dalPaTouchedUids_[uid] = 1;
  delete window.dalPaDeletedUids_[uid];
  window.dalPaHoldEntities_([uid], 3000);
  if (typeof window.dalPaArmLwwWatch_ === 'function') window.dalPaArmLwwWatch_([uid], 12000);
};

window.dalPaNoteDelete_ = function(uid) {
  if (!uid || uid === '_meta' || !window.dalPrepUiOpen) return;
  if (!window.dalPaLiveWritesAllowed_()) {
    window.dalPaWarnBlockedOnce_();
    return;
  }
  uid = String(uid);
  window.dalPaDeletedUids_[uid] = 1;
  delete window.dalPaTouchedUids_[uid];
  delete window.dalPaLwwWatch_[uid];
  if (window.dalPaRecentEditUntil_) delete window.dalPaRecentEditUntil_[uid];
  window.dalPaHoldEntities_([uid], 3000);
  window.dalPaMarkDeleted_([uid], 8000);
};

window.dalPaHasPendingTouches_ = function() {
  return !!(Object.keys(window.dalPaTouchedUids_ || {}).length || Object.keys(window.dalPaDeletedUids_ || {}).length);
};

window.dalFsDocToPaAsset_ = function(docId, d) {
  if (!d || docId === '_meta') return null;
  return {
    uid: d.uid || docId,
    assetId: String(d.asset_uid || ''),
    qty: d.assigned_quantity || 1,
    location: d.location || '',
    formula: d.formula || '',
    creator: d.creator || 'System',
    overrideDept: d.override_dept || d.overrideDept || '',
    containerUid: d.container_uid || '',
    scanStatus: d.scan_status || 'Assigned',
    writeSeq: Number(d.writeSeq || 0) || 0,
    clientId: d.clientId || '',
    outboundTruckUid: d.outbound_truck_uid || '',
    outboundX: d.outbound_x !== undefined && d.outbound_x !== '' ? Number(d.outbound_x) : null,
    outboundY: d.outbound_y !== undefined && d.outbound_y !== '' ? Number(d.outbound_y) : null,
    outboundZ: d.outbound_z !== undefined && d.outbound_z !== '' ? Number(d.outbound_z) : null,
    outboundRotated: d.outbound_rotated === true || d.outbound_rotated === 'true',
    outboundStaged: d.outbound_staged === true || d.outbound_staged === 'true',
    inboundTruckUid: d.inbound_truck_uid || '',
    inboundX: d.inbound_x !== undefined && d.inbound_x !== '' ? Number(d.inbound_x) : null,
    inboundY: d.inbound_y !== undefined && d.inbound_y !== '' ? Number(d.inbound_y) : null,
    inboundZ: d.inbound_z !== undefined && d.inbound_z !== '' ? Number(d.inbound_z) : null,
    inboundRotated: d.inbound_rotated === true || d.inbound_rotated === 'true',
    inboundStaged: d.inbound_staged === true || d.inbound_staged === 'true'
  };
};

window.dalProcessPaFormulas_ = function(arr, opts) {
  if (!arr) return;
  opts = opts || {};
  var exploded = [];
  // Live remote apply must NOT explode — that strips uids and mints new rows → write wars.
  if (!opts.skipExplode) {
    for (var i = arr.length - 1; i >= 0; i--) {
      var pa = arr[i];
      var vaultAsset = typeof globalAssets !== 'undefined' ? globalAssets.find(function(a) { return a.id === pa.assetId; }) : null;
      if (vaultAsset && vaultAsset.type !== 'Bulk' && vaultAsset.isConsumable !== true && vaultAsset.isConsumable !== 'true') {
        var parsedQty = parseInt(pa.qty, 10);
        if (!isNaN(parsedQty) && parsedQty > 1 && !pa.isAuto && pa.formula !== 'Auto-Container' && pa.formula !== 'Gen-Auto-Container') {
          arr.splice(i, 1);
          for (var k = 0; k < parsedQty; k++) {
            var newPa = Object.assign({}, pa, { qty: 1 });
            delete newPa.uid;
            exploded.push(newPa);
          }
        }
      }
    }
    if (exploded.length > 0) arr.push.apply(arr, exploded);
  }
  arr.forEach(function(pa) {
    if (pa.formula === 'Manual') pa.formula = 'Standalone';
    if (pa.assetId === 'DUMMY') pa.isEmptyGroup = true;
    // Prefer explicit isShortage boolean (live state doc). [SHORT] prefix is Sheets/col encoding.

/**
 * H2 pass condition: qty-only diffs on ≤ max(3, 5% of rows) use DOM qty patch (no full PA rebuild).
 * Structural / formula-group / larger diffs → full renderProjectAssetsUI.
 */
window.dalPaDiffFixtures_ = function(before, after) {
  var beforeBy = {};
  var afterBy = {};
  (before || []).forEach(function(pa) {
    if (pa && pa.uid) beforeBy[String(pa.uid)] = pa;
  });
  (after || []).forEach(function(pa) {
    if (pa && pa.uid) afterBy[String(pa.uid)] = pa;
  });
  var added = [];
  var deleted = [];
  var changed = [];
  var qtyOnlyChanged = [];
  var structural = false;
  var hasFormulaGroupMembers = false;
  Object.keys(afterBy).forEach(function(uid) {
    if (!beforeBy[uid]) {
      added.push(uid);
      structural = true;
      if (window.dalPaIsFormulaGrouped_(afterBy[uid])) hasFormulaGroupMembers = true;
    }
  });
  Object.keys(beforeBy).forEach(function(uid) {
    if (!afterBy[uid]) {
      deleted.push(uid);
      structural = true;
      if (window.dalPaIsFormulaGrouped_(beforeBy[uid])) hasFormulaGroupMembers = true;
      return;
    }
    var b = beforeBy[uid];
    var a = afterBy[uid];
    if (window.dalPaStructuralKey_(b) !== window.dalPaStructuralKey_(a)) {
      changed.push(uid);
      structural = true;
      if (window.dalPaIsFormulaGrouped_(b) || window.dalPaIsFormulaGrouped_(a)) hasFormulaGroupMembers = true;
      return;
    }
    var bQty = Number(b.qty != null ? b.qty : 1);
    var aQty = Number(a.qty != null ? a.qty : 1);
    var bScan = Number(b.scannedQty || 0) || 0;
    var aScan = Number(a.scannedQty || 0) || 0;
    if (bQty !== aQty || bScan !== aScan) {
      changed.push(uid);
      qtyOnlyChanged.push(uid);
      if (window.dalPaIsFormulaGrouped_(b) || window.dalPaIsFormulaGrouped_(a)) hasFormulaGroupMembers = true;
    }
  });
  var totalTouched = added.length + deleted.length + changed.length;
  var n = Math.max(Object.keys(beforeBy).length, 1);
  var patchThreshold = Math.max(3, Math.ceil(n * 0.05));
  var canPatchQty = !structural &&
    qtyOnlyChanged.length > 0 &&
    qtyOnlyChanged.length === changed.length &&
    !hasFormulaGroupMembers &&
    totalTouched <= patchThreshold;
  return {
    added: added,
    deleted: deleted,
    changed: changed,
    qtyOnlyChanged: qtyOnlyChanged,
    structural: structural,
    hasFormulaGroupMembers: hasFormulaGroupMembers,
    totalTouched: totalTouched,
    canPatchQty: canPatchQty,
    patchThreshold: patchThreshold,
    renderMode: canPatchQty ? 'patchQty' : 'full'
  };
};

/**
 * Patch merge for prep PA fixtures only (autos are local-derived after apply).
 * NEVER resurrect a UID that is pending-delete, held-absent, or recently deleted.
 */
window.dalPaPatchMergeFromRemote_ = function(serverAssets) {
  var dirty = window.dalPaDirtyUidMap_();
  var local = Array.isArray(currentProjectAssets) ? currentProjectAssets : [];
  var localFixtures = local.filter(function(pa) { return !window.dalPaIsAutoRow_(pa); });
  var localBy = window.dalPaMapByUid_(localFixtures);
  var origBy = window.dalPaMapByUid_((window.originalProjectAssets || []).filter(function(pa) {
    return !window.dalPaIsAutoRow_(pa);
  }));
  var remoteFixtures = (serverAssets || []).filter(function(pa) { return !window.dalPaIsAutoRow_(pa); });
  var merged = [];
  var used = {};

  remoteFixtures.forEach(function(remotePa) {
    if (!remotePa) return;
    var uid = remotePa.uid ? String(remotePa.uid) : '';
    if (!uid) return;

    if (window.dalPaIsRecentlyDeleted_(uid)) return;
    if ((dirty[uid] || window.dalPaIsHeld_(uid)) && !localBy[uid] && origBy[uid]) return;
    if (window.dalPaIsHeld_(uid) && !localBy[uid]) return;

    if (window.dalPaIsHeld_(uid) || dirty[uid]) {
      if (localBy[uid]) merged.push(localBy[uid]);
      else merged.push(remotePa);
    } else {
      merged.push(remotePa);
    }
    used[uid] = true;
  });

  localFixtures.forEach(function(pa) {
    if (!pa) return;
    if (!pa.uid) {
      merged.push(pa);
      return;
    }
    var uid = String(pa.uid);
    if (used[uid]) return;
    if (dirty[uid] || window.dalPaIsHeld_(uid)) merged.push(pa);
  });

  return merged;
};


/** Timeline-parity apply for PA fixtures (writeSeq + clientId + hold + touches). */
window.dalPaApplyRemoteFixturesTimeline_ = function(remoteFixtures, localFixtures, opts) {
  opts = opts || {};
  var forceApply = !!opts.forceApply;
  var now = Date.now();
  var localBy = window.dalPaMapByUid_(localFixtures || []);
  var out = [];
  var used = {};
  (remoteFixtures || []).forEach(function(remotePa) {
    if (!remotePa || !remotePa.uid) return;
    var uid = String(remotePa.uid);
    var seq = Number(remotePa.writeSeq || 0) || 0;
    var remoteClient = String(remotePa.clientId || '');

    if (!forceApply && window.dalPaClientId && remoteClient === window.dalPaClientId) {
      if (seq > (window.dalPaLastAppliedSeq_[uid] || 0)) window.dalPaLastAppliedSeq_[uid] = seq;
      if (localBy[uid]) { out.push(localBy[uid]); used[uid] = true; }
      return;
    }
    // Unstamped (seq=0) or older seq must not yank after a stamped write.
    var lastSeq = Number(window.dalPaLastAppliedSeq_[uid] || 0) || 0;
    if (!forceApply && lastSeq > 0 && (!seq || seq < lastSeq)) {
      if (localBy[uid]) { out.push(localBy[uid]); used[uid] = true; }
      return;
    }
    if (window.dalPaIsRecentlyDeleted_(uid) || window.dalPaDeletedUids_[uid]) return;
    // forceApply (own write merged / heal tick): take remote except pending local touches
    if (!forceApply && (window.dalPaIsHeld_(uid) || window.dalPaTouchedUids_[uid])) {
      if (localBy[uid]) { out.push(localBy[uid]); used[uid] = true; }
      return;
    }
    if (forceApply && window.dalPaTouchedUids_[uid] && localBy[uid]) {
      out.push(localBy[uid]);
      used[uid] = true;
      return;
    }
    out.push(remotePa);
    used[uid] = true;
    if (seq) window.dalPaLastAppliedSeq_[uid] = seq;
  });
  Object.keys(localBy).forEach(function(uid) {
    if (used[uid]) return;
    var pendingLocal = !!(window.dalPaTouchedUids_[uid] || (!forceApply && window.dalPaIsHeld_(uid)));
    if (!pendingLocal) return;
    // Peer deleted a known row: pierce hold/touch so dept-move flush cannot keep a ghost.
    var known = (Number(window.dalPaLastAppliedSeq_[uid] || 0) || 0) > 0 ||
      !!(window.dalPaMapByUid_((window.originalProjectAssets || []).filter(function(pa) {
        return !window.dalPaIsAutoRow_(pa);
      }))[uid]) ||
      (localBy[uid] && (Number(localBy[uid].writeSeq || 0) || 0) > 0);
    if (known) {
      delete window.dalPaTouchedUids_[uid];
      if (window.dalPaHoldUntil_) delete window.dalPaHoldUntil_[uid];
      return;
    }
    out.push(localBy[uid]);
  });
  return out;
};

/**
 * Coalesced remote apply — prevents snap storms from full-re-rendering PA (browser stutter).
 */
window.dalApplyRemotePaAssets_ = function(assets, fromCacheEmpty, snapMeta) {
  snapMeta = snapMeta || {};
  if (!window.dalPrepUiOpen) return;
  if (fromCacheEmpty) return;
  // Metadata-only / local-pending snap — wait for the next server snap (do not requeue loop).
  if (snapMeta.hasPendingWrites) return;
  if (snapMeta.fromCache && window.dalPaSeenServerSnap_) return;
  if (!snapMeta.fromCache) window.dalPaSeenServerSnap_ = true;

  window.dalPaPendingApply_ = {
    assets: JSON.parse(JSON.stringify(assets || [])),
    snapMeta: snapMeta
  };
  if (window.dalPaApplyTimer_) return;
  window.dalPaApplyTimer_ = setTimeout(function() {
    window.dalPaApplyTimer_ = null;
    var pending = window.dalPaPendingApply_;
    window.dalPaPendingApply_ = null;
    if (pending) window.dalApplyRemotePaAssetsNow_(pending.assets, pending.snapMeta);
  }, 300);
};

/** Never drop a peer snap — re-queue until hold / flush / ignore window clears. */
window.dalPaRequeueRemoteApply_ = function(assets, snapMeta, delayMs) {
  window.dalPaPendingApply_ = {
    assets: JSON.parse(JSON.stringify(assets || [])),
    snapMeta: snapMeta || {}
  };
  if (window.dalPaApplyTimer_) return;
  var wait = Math.max(50, Number(delayMs) || 350);
  window.dalPaApplyTimer_ = setTimeout(function() {
    window.dalPaApplyTimer_ = null;
    var pending = window.dalPaPendingApply_;
    window.dalPaPendingApply_ = null;
    if (pending) window.dalApplyRemotePaAssetsNow_(pending.assets, pending.snapMeta);
  }, wait);
};

window.dalApplyRemotePaAssetsNow_ = function(assets, snapMeta) {
  snapMeta = snapMeta || {};
  var forceApply = !!snapMeta.forceApply;
  if (snapMeta.updatedBy) window.dalPaLastRemoteActor_ = String(snapMeta.updatedBy);
  if (!forceApply && Date.now() < (window.dalPaIgnoreListenerUntil || 0)) {
    window.dalPaRequeueRemoteApply_(assets, snapMeta, (window.dalPaIgnoreListenerUntil - Date.now()) + 50);
    return;
  }
  if (!forceApply && window.dalPaFlushInFlight) {
    window.dalPaRequeueRemoteApply_(assets, snapMeta, 200);
    return;
  }
  if (!window.dalPrepUiOpen) return;
  // Per-UID hold/touch in the merge protects local rows (no global anyHold gate).

  var serverAssets = JSON.parse(JSON.stringify(assets || []));
  // State-doc authority: fixtures may lack per-row writeSeq (older writes). Stamp the
  // doc writeSeq so unstamped rows still lose to a newer doc (heal missed applies).
  var docSeq = Number(snapMeta.docWriteSeq || 0) || 0;
  if (docSeq) {
    serverAssets.forEach(function(pa) {
      if (!pa) return;
      if (!Number(pa.writeSeq || 0)) pa.writeSeq = docSeq;
    });
  }
  window.dalProcessPaFormulas_(serverAssets, { skipExplode: true });
  serverAssets = serverAssets.filter(function(pa) {
    return !(pa && pa.uid && window.dalPaIsRecentlyDeleted_(String(pa.uid)));
  });

  var fixtureSig = window.dalPaFixturesSig_(serverAssets);
  if (!forceApply && fixtureSig === window.dalPaLastRemoteSig) return;
  // Always drop older doc seq (requeued snaps after a newer flush). Fall-through
  // when local ≠ older sig caused flash-then-revert after batch adds.
  var remoteSeqGate = Number(snapMeta.docWriteSeq || 0) || 0;
  var lastSeqGate = Number(window.dalPaLastDocWriteSeq_ || 0) || 0;
  if (!forceApply && remoteSeqGate && lastSeqGate && remoteSeqGate < lastSeqGate) return;

  var hasTouches = window.dalPaHasPendingTouches_();
  var remoteFixtures = (serverAssets || []).filter(function(pa) { return !window.dalPaIsAutoRow_(pa); });
  var localFixtures = (typeof currentProjectAssets !== 'undefined' ? currentProjectAssets : []).filter(function(pa) {
    return !window.dalPaIsAutoRow_(pa);
  });
  var mergedFixtures = window.dalPaApplyRemoteFixturesTimeline_(remoteFixtures, localFixtures, {
    forceApply: forceApply
  });
  var mergedFixSig = window.dalPaFixturesSig_(mergedFixtures);
  var localFixSig = window.dalPaFixturesSig_(localFixtures);

  if (mergedFixSig === localFixSig) {
    // Remote differs but merge kept locals (holds/touches). NEVER ack lastRemoteSig —
    // that made the peer edit "forgotten" until hard refresh.
    if (fixtureSig !== localFixSig) {
      if (typeof window.dalPaNotifyPeerDeletesVsLocal_ === 'function') {
        window.dalPaNotifyPeerDeletesVsLocal_(remoteFixtures, localFixtures);
      } else if (typeof window.dalPaCheckLwwLossesAgainstRemote_ === 'function') {
        window.dalPaCheckLwwLossesAgainstRemote_(remoteFixtures);
      }
      window.dalPaRemotePending = true;
      window.dalUpdateRemotePendingBanner_();
      if (!forceApply) window.dalPaRequeueRemoteApply_(assets, snapMeta, 450);
      return;
    }
    window.dalPaLastRemoteSig = fixtureSig;
    window.dalPaRemotePending = !!hasTouches;
    window.dalUpdateRemotePendingBanner_();
    return;
  }

  window.dalPaLastRemoteSig = fixtureSig;
  window.dalPaRemotePending = hasTouches;
  window.dalPaApplyingRemote = true;
  try {
    if (typeof window.dalPaNotifyPeerDeletesVsLocal_ === 'function') {
      window.dalPaNotifyPeerDeletesVsLocal_(remoteFixtures, localFixtures);
    }
    if (typeof window.dalPaCheckLwwLossesAgainstRemote_ === 'function') {
      window.dalPaCheckLwwLossesAgainstRemote_(remoteFixtures);
    }
    currentProjectAssets = JSON.parse(JSON.stringify(mergedFixtures));
    if (typeof window.dalPaNormalizeAssetsOverrideDept_ === 'function') {
      window.dalPaNormalizeAssetsOverrideDept_(currentProjectAssets);
    }
    if (typeof recalcAutoContainers === 'function') recalcAutoContainers();

    if (forceApply || !hasTouches) {
      // forceApply with mid-flight touches: do NOT stamp pending edits into originals
      // (that zeroed the next delta / lost batch clicks). Partial advance only.
      if (forceApply && hasTouches) {
        var origByFa = window.dalPaMapByUid_((window.originalProjectAssets || []).filter(function(pa) {
          return !window.dalPaIsAutoRow_(pa);
        }));
        var remoteByFa = window.dalPaMapByUid_(mergedFixtures);
        Object.keys(remoteByFa).forEach(function(uid) {
          if (!window.dalPaTouchedUids_[uid] && !window.dalPaDeletedUids_[uid] && !window.dalPaIsHeld_(uid)) {
            origByFa[uid] = JSON.parse(JSON.stringify(remoteByFa[uid]));
          }
        });
        Object.keys(origByFa).forEach(function(uid) {
          if (!remoteByFa[uid] && !window.dalPaTouchedUids_[uid] && !window.dalPaDeletedUids_[uid] && !window.dalPaIsHeld_(uid)) {
            delete origByFa[uid];
          }
        });
        var autosFa = (currentProjectAssets || []).filter(function(pa) { return window.dalPaIsAutoRow_(pa); });
        window.originalProjectAssets = Object.keys(origByFa).map(function(k) { return origByFa[k]; }).concat(
          JSON.parse(JSON.stringify(autosFa))
        );
      } else {
        window.originalProjectAssets = JSON.parse(JSON.stringify(currentProjectAssets || []));
      }
    } else {
      // Keep original for untouched fixtures; advance applied remotes into original for clean ones.
      var origBy = window.dalPaMapByUid_((window.originalProjectAssets || []).filter(function(pa) {
        return !window.dalPaIsAutoRow_(pa);
      }));
      var remoteBy = window.dalPaMapByUid_(mergedFixtures);
      Object.keys(remoteBy).forEach(function(uid) {
        if (!window.dalPaTouchedUids_[uid] && !window.dalPaDeletedUids_[uid] && !window.dalPaIsHeld_(uid)) {
          origBy[uid] = JSON.parse(JSON.stringify(remoteBy[uid]));
        }
      });
      Object.keys(origBy).forEach(function(uid) {
        if (!remoteBy[uid] && !window.dalPaTouchedUids_[uid] && !window.dalPaDeletedUids_[uid] && !window.dalPaIsHeld_(uid)) {
          delete origBy[uid];
        }
      });
      var autos = (currentProjectAssets || []).filter(function(pa) { return window.dalPaIsAutoRow_(pa); });
      window.originalProjectAssets = Object.keys(origBy).map(function(k) { return origBy[k]; }).concat(
        JSON.parse(JSON.stringify(autos))
      );
    }

    // Ack the *post-recalc* UI sig so heal ticker does not loop on formula/auto diffs.
    window.dalPaLastRemoteSig = window.dalPaFixturesSig_(currentProjectAssets);

    var renderSig = window.dalPaFixturesSig_(currentProjectAssets);
    if (renderSig !== window.dalPaLastRenderSig_) {
      var overlay = document.getElementById('project-assets-modal-overlay');
      if (overlay && overlay.style.display !== 'none') {
        var diff = typeof window.dalPaDiffFixtures_ === 'function'
          ? window.dalPaDiffFixtures_(localFixtures, mergedFixtures)
          : { canPatchQty: false, qtyOnlyChanged: [] };
        var usedPatch = false;
        if (diff.canPatchQty && typeof window.dalPaPatchQtyDom_ === 'function') {
          var byUid = window.dalPaMapByUid_
            ? window.dalPaMapByUid_((currentProjectAssets || []).filter(function(pa) {
              return !window.dalPaIsAutoRow_(pa);
            }))
            : {};
          usedPatch = window.dalPaPatchQtyDom_(diff.qtyOnlyChanged, byUid);
        }
        if (usedPatch) {
          window.dalPaLastRenderSig_ = renderSig;
          window.dalPaRemoteRenderStats_.patchQty = (window.dalPaRemoteRenderStats_.patchQty || 0) + 1;
          if (typeof evaluatePackingReadiness === 'function') evaluatePackingReadiness(true);
        } else if (typeof renderProjectAssetsUI === 'function') {
          // Preserve scroll across full rebuild (less flash even when patch cannot run).
          var assignedEl = document.getElementById('pa-view-logistics');
          var vaultEl = document.getElementById('pa-vault-list');
          var scrollA = assignedEl ? assignedEl.scrollTop : 0;
          var scrollV = vaultEl ? vaultEl.scrollTop : 0;
          window.dalPaLastRenderSig_ = renderSig;
          window.dalPaRemoteRenderStats_.full = (window.dalPaRemoteRenderStats_.full || 0) + 1;
          renderProjectAssetsUI();
          if (assignedEl) assignedEl.scrollTop = scrollA;
          if (vaultEl) vaultEl.scrollTop = scrollV;
          if (typeof evaluatePackingReadiness === 'function') evaluatePackingReadiness(true);
        }
      } else if (typeof evaluatePackingReadiness === 'function') {
        evaluatePackingReadiness(true);
      }
    } else {
      window.dalPaRemoteRenderStats_.skip = (window.dalPaRemoteRenderStats_.skip || 0) + 1;
    }
    if (typeof window.dalPaUpdateLocalCache_ === 'function') window.dalPaUpdateLocalCache_();
  } finally {
    window.dalPaApplyingRemote = false;
  }
  window.dalUpdateRemotePendingBanner_();
  // NEVER flush from apply — that was the snap→render→flush→snap browser stutter loop.
};

/**
 * After our PA_PATCH txn succeeds, apply the host-merged fixture list.
 * The txn may have absorbed peer edits that our UI never saw (concurrent flush race).

window.dalPaApplyOwnWriteMerged_ = function(merged, writeSeq) {
  if (!window.dalPrepUiOpen) return;

  window.dalPaLastServerFixtures_ = JSON.parse(JSON.stringify(merged));
  window.dalPaLastServerWriteSeq_ = Number(writeSeq || 0) || window.dalPaLastServerWriteSeq_ || 0;
  // Clear holds so force apply can take server qty (pending touches still win).
  window.dalPaHoldUntil_ = {};
  window.dalApplyRemotePaAssetsNow_(merged, {
    docWriteSeq: Number(writeSeq || 0) || 0,
    fromCache: false,
    hasPendingWrites: false,
    forceApply: true
  });
};

/** If local UI drifts from last applied remote sig (and no pending edits), force-apply. */
window.dalPaHealTick_ = function() {
  if (!window.dalPrepUiOpen) return;
  if (window.dalPaLiveSyncMode !== 'firestore') return;
  if (window.dalPaFlushInFlight || window.dalPaApplyingRemote) return;
  if (window.dalPaHasPendingTouches_ && window.dalPaHasPendingTouches_()) return;
  var remote = window.dalPaLastServerFixtures_;
  if (!remote || !remote.length) return;
  var local = (typeof currentProjectAssets !== 'undefined' ? currentProjectAssets : []).filter(function(pa) {
    return pa && !window.dalPaIsAutoRow_(pa);
  });
  var localSig = window.dalPaFixturesSig_(local);
  // Compare to last *applied* UI sig (post-recalc), not raw wire fixtures.
  if (localSig && localSig === window.dalPaLastRemoteSig) return;
  try { console.log('[DAL PA] heal tick — local lagged server, force apply'); } catch (eH) { /* ignore */ }
  var healSeq = Number(window.dalPaLastServerWriteSeq_ || 0) || 0;
  var lastDoc = Number(window.dalPaLastDocWriteSeq_ || 0) || 0;
  if (healSeq && lastDoc && healSeq < lastDoc) return;
  window.dalApplyRemotePaAssetsNow_(remote, {
    docWriteSeq: healSeq,
    forceApply: true
  });
};

window.dalPaStartHealTicker_ = function() {

    window.dalPaHealTick_();

};

window.dalPaStopHealTicker_ = function() {

    window.dalPaHealTimer_ = null;

window.dalEnsureFirebaseSdk_ = function(done) {
  if (window.firebase && window.firebase.firestore && window.firebase.auth) {
    done(null);
    return;
  }
  var urls = [
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js'
  ];
  var idx = 0;
  function loadNext() {
    if (idx >= urls.length) {
      done(window.firebase ? null : new Error('Firebase SDK failed to load'));
      return;
    }
    var s = document.createElement('script');
    s.src = urls[idx++];
    s.onload = loadNext;
    s.onerror = function() { done(new Error('Failed to load ' + s.src)); };
    document.head.appendChild(s);
  }
  loadNext();
};

/** True when running inside hosting shell (web.app) — preferred for live Firestore. */
window.dalHostFsAvailable_ = function() {
  try {
    if (!window.parent || window.parent === window) return false;
    // Raw script.google.com bookmark has no host-boot — skip host bridge.
    try {
      var topHref = String((window.top && window.top.location && window.top.location.href) || '');
      if (topHref && /script\.google\.com/i.test(topHref) && !/web\.app/i.test(topHref)) {
        return false;
      }
    } catch (eTop) {
      // Cross-origin top (web.app embedding GAS) — cannot read href; host bridge is expected.
    }
    return true;
  } catch (e) { return false; }
};

window.dalFsReqSeq_ = 1;
window.dalFsPending_ = {};
window.dalFsListenHandlers_ = {};
window.dalFsHostAuthReady_ = false;
window.dalFsMsgBound_ = false;

window.dalFsBindHostMessages_ = function() {
  if (window.dalFsMsgBound_) return;
  window.dalFsMsgBound_ = true;
  window.addEventListener('message', function(ev) {
    var d = ev.data;
    if (!d || !d.type) return;
    if (d.type === 'SHOWRUNNER_DAL_FS_AUTH_RESULT') {
      var pend = window.dalFsPending_[d.requestId];
      if (!pend) return;
      delete window.dalFsPending_[d.requestId];
      if (d.ok) {
        window.dalFsHostAuthReady_ = true;
        window.dalFirestoreClient = { viaHost: true, ready: true };
        try { console.log('[DAL FS] host Auth OK'); } catch (eOk) { /* ignore */ }
        pend.cb(null, window.dalFirestoreClient);
      } else {
        window.dalFsHostAuthReady_ = false;
        try { console.warn('[DAL FS] host Auth fail:', d.error); } catch (eFail) { /* ignore */ }
        pend.cb(new Error(d.error || 'Host Firebase auth failed'));
      }
      return;
    }
    if (d.type === 'SHOWRUNNER_DAL_FS_SNAP') {
      var h = window.dalFsListenHandlers_[d.requestId];
      if (h && h.onSnap) h.onSnap(d);
      return;
    }
    if (d.type === 'SHOWRUNNER_DAL_FS_SNAP_ERROR') {
      var he = window.dalFsListenHandlers_[d.requestId];
      if (he && he.onErr) he.onErr(new Error(d.error || 'Host listen failed'));
      return;
    }
    if (d.type === 'SHOWRUNNER_DAL_FS_SNAP_COL') {
      var hc = window.dalFsListenHandlers_[d.requestId];
      if (hc && hc.onSnap) hc.onSnap(d);
      return;
    }
    if (d.type === 'SHOWRUNNER_DAL_FS_SNAP_COL_ERROR') {
      var hce = window.dalFsListenHandlers_[d.requestId];
      if (hce && hce.onErr) hce.onErr(new Error(d.error || 'Host collection listen failed'));
      return;
    }
    if (d.type === 'SHOWRUNNER_DAL_FS_WRITE_RESULT') {
      var pw = window.dalFsPending_[d.requestId];
      if (!pw) return;
      delete window.dalFsPending_[d.requestId];
      if (d.ok) pw.cb(null, d.result);
      else pw.cb(new Error(d.error || 'Host write failed'));
    }
  });
};

window.dalFsPostToHost_ = function(msg) {
  // Hit window.top (web.app host-boot) and every ancestor — GAS is multi-nested.
  var seen = [];
  function post(w) {
    if (!w) return;
    for (var i = 0; i < seen.length; i++) { if (seen[i] === w) return; }
    seen.push(w);
    try { w.postMessage(msg, '*'); } catch (e) { /* ignore */ }
  }
  try { post(window.top); } catch (e0) { /* ignore */ }
  try {
    var w = window;
    for (var n = 0; n < 8; n++) {
      if (!w.parent || w.parent === w) break;
      w = w.parent;
      post(w);
    }
  } catch (e1) { /* ignore */ }
};

/**
 * Prefer host-shell Firebase Auth (first-party web.app). Falls back to in-iframe Auth.
 */
window.dalEnsureFirestoreClientAuth_ = function(cb) {
  if (window.dalFirestoreClient && window.dalFirestoreClient.ready) {
    cb(null, window.dalFirestoreClient);
    return;
  }
  window.dalFsBindHostMessages_();
  var actor = typeof assetOpsActor === 'function' ? assetOpsActor() : (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : '');

  var finishWithIframeAuth_ = function() {
    google.script.run
      .withFailureHandler(function(err) {
        if (window.__dalFsLastHostFail_ && (!err || !err.message)) {
          cb(new Error(window.__dalFsLastHostFail_));
          return;
        }
        if (window.__dalFsLastHostFail_) {
          cb(new Error(window.__dalFsLastHostFail_ + '; iframe: ' + ((err && err.message) || String(err || 'fail'))));
          return;
        }
        cb(err);
      })
      .withSuccessHandler(function(res) {
        window.dalEnsureFirebaseSdk_(function(sdkErr) {
          if (sdkErr) {
            cb(window.__dalFsLastHostFail_
              ? new Error(window.__dalFsLastHostFail_ + '; iframe sdk: ' + (sdkErr.message || sdkErr))
              : sdkErr);
            return;
          }
          try {
            if (!window.dalFirestoreClient || window.dalFirestoreClient.appName !== res.config.projectId) {
              if (window.dalFirestoreClient && window.dalFirestoreClient.app) {
                try { window.dalFirestoreClient.app.delete(); } catch (e) { /* ignore */ }
              }
              var app = firebase.apps.length ? firebase.app() : firebase.initializeApp({
                apiKey: res.config.apiKey,
                authDomain: res.config.authDomain,
                projectId: res.config.projectId,
                storageBucket: res.config.storageBucket,
                messagingSenderId: res.config.messagingSenderId,
                appId: res.config.appId
              });
              window.dalFirestoreClient = {
                app: app,
                appName: res.config.projectId,
                auth: firebase.auth(app),
                db: firebase.firestore(app),
                ready: false,
                viaHost: false
              };
            }
            window.dalFirestoreClient.auth.signInWithCustomToken(res.customToken)
              .then(function() {
                window.dalFirestoreClient.ready = true;
                window.__dalFsLastHostFail_ = '';
                cb(null, window.dalFirestoreClient);
              })
              .catch(function(e) {
                cb(window.__dalFsLastHostFail_
                  ? new Error(window.__dalFsLastHostFail_ + '; iframe auth: ' + (e.message || e))
                  : e);
              });
          } catch (e) {
            cb(window.__dalFsLastHostFail_
              ? new Error(window.__dalFsLastHostFail_ + '; iframe: ' + (e.message || e))
              : e);
          }
        });
      })
      .getDalFirebaseClientAuth(actor);
  };

  if (!window.dalHostFsAvailable_()) {
    finishWithIframeAuth_();
    return;
  }

  google.script.run
    .withFailureHandler(function(err) {
      // Token mint failed — try iframe path anyway.
      try { console.warn('Host DAL auth token mint failed, trying iframe:', err); } catch (e0) { /* ignore */ }
      finishWithIframeAuth_();
    })
    .withSuccessHandler(function(res) {
      var requestId = 'A' + (window.dalFsReqSeq_++);
      var settled = false;
      var timer = setTimeout(function() {
        if (settled) return;
        settled = true;
        delete window.dalFsPending_[requestId];
        try { console.warn('Host DAL auth timed out — trying iframe Auth'); } catch (e1) { /* ignore */ }
        // Pass a clear error through iframe path; if iframe also fails, banner shows this.
        window.__dalFsLastHostFail_ = 'host auth timed out (no AUTH_RESULT)';
        finishWithIframeAuth_();
      }, 8000);
      window.dalFsPending_[requestId] = {
        cb: function(err, client) {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          if (err) {
            try { console.warn('Host DAL auth failed, trying iframe:', err && err.message ? err.message : err); } catch (e2) { /* ignore */ }
            finishWithIframeAuth_();
            return;
          }
          cb(null, client);
        }
      };
      try { console.log('[DAL FS] posting AUTH to host', requestId); } catch (ePost) { /* ignore */ }
      window.dalFsPostToHost_({
        type: 'SHOWRUNNER_DAL_FS_AUTH',
        requestId: requestId,
        config: res.config,
        customToken: res.customToken
      });
    })
    .getDalFirebaseClientAuth(actor);
};

window.dalHostFsListenDoc_ = function(path, onSnap, onErr) {

window.dalApplyRemotePaStateDoc_ = function(data, snapMeta) {
  snapMeta = snapMeta || {};
  if (!window.dalPrepUiOpen) return;
  // Wait for server snap (hasPendingWrites false) — Firestore fires again.
  if (snapMeta.hasPendingWrites) return;
  if (snapMeta.fromCache && window.dalPaSeenServerSnap_) return;
  if (!snapMeta.fromCache) window.dalPaSeenServerSnap_ = true;
  if (!data) return;

  var writeSeq = Number(data.writeSeq || 0) || 0;
  var remoteClient = String(data.clientId || '');
  var fixtures = [];
  try { fixtures = JSON.parse(data.fixturesJson || '[]'); } catch (e0) { fixtures = []; }
  if (!Array.isArray(fixtures)) fixtures = [];
  if (typeof window.dalPaStateSizeReport_ === 'function') {
    window.dalPaWarnStateSizeOnce_(window.dalPaStateSizeReport_(fixtures));
  }

  var localSeed = (typeof currentProjectAssets !== 'undefined' ? currentProjectAssets : []).filter(function(pa) {
    return pa && !window.dalPaIsAutoRow_(pa);
  });
  var haveRemoteAuthority = writeSeq > 0 || Number(window.dalPaLastDocWriteSeq_ || 0) > 0;

  // Empty/missing state: seed from local ONLY once before any remote writeSeq exists.
  // Never re-seed after peers have written (puts deleted rows back).
  if (!data.fixturesJson || fixtures.length === 0) {
    if (!haveRemoteAuthority && localSeed.length) {
      window.dalPaSeedStateFromLocal_();
      return;
    }
    if (!haveRemoteAuthority && !window.paLoadedForProject) return;
    // Lagging empty snap (writeSeq 0) after we already saw real seq — ignore.
    if (Number(window.dalPaLastDocWriteSeq_ || 0) > 0 && writeSeq === 0) return;
    // Intentionally empty after load / after authoritative empty — apply below.
  }

  if (writeSeq && window.dalPaLastDocWriteSeq_ && writeSeq < window.dalPaLastDocWriteSeq_) return;

  // Own write echo: still apply when local UI lags the txn-merged doc (peer edits
  // absorbed into our write). Skipping here + FlushGuard on older peer snaps = forgotten UI.
  if (window.dalPaClientId && remoteClient === window.dalPaClientId) {
    if (writeSeq > window.dalPaLastDocWriteSeq_) window.dalPaLastDocWriteSeq_ = writeSeq;
    var echoLocalSig = window.dalPaFixturesSig_(localSeed);
    var echoRemoteSig = window.dalPaFixturesSig_(fixtures);
    if (echoRemoteSig === echoLocalSig) return;
    // fall through — apply absorbed peer rows
  }

  // Empty with authority: apply empty (do not seed). Unloaded UI: wait for hydrate.
  if (fixtures.length === 0 && localSeed.length === 0 && !window.paLoadedForProject) return;

  window.dalApplyRemotePaAssets_(fixtures, false, {
    fromCache: !!snapMeta.fromCache,
    hasPendingWrites: !!snapMeta.hasPendingWrites,
    docWriteSeq: writeSeq,
    updatedBy: String(data.updatedBy || data.updated_by || ''),
    clientId: remoteClient
  });
  window.dalPaLastRemoteActor_ = String(data.updatedBy || data.updated_by || '') || window.dalPaLastRemoteActor_ || '';
  if (writeSeq > window.dalPaLastDocWriteSeq_) window.dalPaLastDocWriteSeq_ = writeSeq;
  // Remember last authoritative server list for heal ticker (stuck-UI recovery).
  window.dalPaLastServerFixtures_ = JSON.parse(JSON.stringify(fixtures));
  window.dalPaLastServerWriteSeq_ = writeSeq;
  if (typeof window.dalPaFlushStarterEntryDelta_ === 'function') {
    window.dalPaFlushStarterEntryDelta_();
  }
};

/** Part B2 — after Sheets snapshot, push starter's local pending as the entry delta. */
window.dalPaFlushStarterEntryDelta_ = function() {
  if (!window.dalPaEntryDeltaPending_ || !window.dalPrepUiOpen) return;
  if (window.dalPaLiveSyncMode !== 'firestore') return;
  if (!Number(window.dalPaLastDocWriteSeq_ || 0)) return;
  window.dalPaEntryDeltaPending_ = false;

  var remote = window.dalPaLastServerFixtures_ || [];
  var remoteBy = {};
  (remote || []).forEach(function(pa) {
    if (pa && pa.uid) remoteBy[String(pa.uid)] = pa;
  });
  var local = (typeof currentProjectAssets !== 'undefined' ? currentProjectAssets : []).filter(function(pa) {
    return pa && !window.dalPaIsAutoRow_(pa) && pa.uid;
  });
  var remoteSig = window.dalPaFixturesSig_(remote);
  var localSig = window.dalPaFixturesSig_(local);
  if (remoteSig && localSig && remoteSig === localSig) return;

  var localBy = {};
  local.forEach(function(pa) {
    localBy[String(pa.uid)] = pa;
    var r = remoteBy[String(pa.uid)];
    if (!r || window.dalPaFixturesSig_([pa]) !== window.dalPaFixturesSig_([r])) {
      if (typeof window.dalPaNoteTouch_ === 'function') window.dalPaNoteTouch_(pa.uid);
    }
  });
  Object.keys(remoteBy).forEach(function(uid) {
    if (!localBy[uid] && typeof window.dalPaNoteDelete_ === 'function') {
      window.dalPaNoteDelete_(uid);
    }
  });
  if (typeof window.dalFlushPaIfPrepOpen_ === 'function') window.dalFlushPaIfPrepOpen_();
};

window.startDalPaFirestoreListener = function(projectId) {
  if (!projectId) return;

  window.dalUpdateRemotePendingBanner_();

      return;

    window.stopDalPaGasSync_();
    window.stopDalPaFirestoreListener();
    window.dalPaFirestoreListenProjectId = String(projectId);
    window.dalPaLiveSyncMode = 'firestore';

    if (!Number(window.dalPaLastDocWriteSeq_ || 0)) window.dalPaStateSeeded_ = false;
    window.dalUpdateRemotePendingBanner_();
    window.dalPaStartHealTicker_();

    var statePath = 'projects/' + String(projectId) + '/assets/state';

    if (client.viaHost && !client.db) {

        window.enterDalPaLiveSyncBlocked_(projectId, 'host listen unavailable');
        return;
      }

        if (gotHostPaSnap_) return;

        console.warn('DAL host PA state listen timed out — blocking edits (H1)');
        window.stopDalPaFirestoreListener();
        window.enterDalPaLiveSyncBlocked_(projectId, 'host listen timeout');
      }, 4000);
      var rawUnsub_ = window.dalHostFsListenDoc_(statePath, function(d) {
        gotHostPaSnap_ = true;
        try { clearTimeout(hostPaWatchTimer_); } catch (eT) { /* ignore */ }
        if (!d || !d.exists) {
          // No state yet — seed from local once.
          window.dalApplyRemotePaStateDoc_({ fixturesJson: '[]', writeSeq: 0, clientId: '' }, {
            fromCache: !!(d && d.fromCache),
            hasPendingWrites: !!(d && d.hasPendingWrites)
          });
          return;
        }
        window.dalApplyRemotePaStateDoc_(d.data || {}, {
          fromCache: !!d.fromCache,
          hasPendingWrites: !!d.hasPendingWrites
        });
      }, function(listenErr) {
        try { clearTimeout(hostPaWatchTimer_); } catch (eT2) { /* ignore */ }
        console.warn('DAL host PA state listen error — blocking edits (H1):', listenErr);
        window.stopDalPaFirestoreListener();
        window.enterDalPaLiveSyncBlocked_(projectId, 'host listen failed');
      });
      window.dalPaFirestoreUnsub = function() {
        try { clearTimeout(hostPaWatchTimer_); } catch (eT3) { /* ignore */ }
        if (typeof rawUnsub_ === 'function') rawUnsub_();
      };
      return;
    }
    if (!client.db) {
      window.enterDalPaLiveSyncBlocked_(projectId, 'no firestore db');
      return;
    }

    var ref = client.db.collection('projects').doc(String(projectId)).collection('assets').doc('state');
    window.dalPaFirestoreUnsub = ref.onSnapshot(function(snap) {
      var fromCache = !!(snap.metadata && snap.metadata.fromCache);
      var hasPendingWrites = !!(snap.metadata && snap.metadata.hasPendingWrites);
      if (!snap.exists) {
        window.dalApplyRemotePaStateDoc_({ fixturesJson: '[]', writeSeq: 0, clientId: '' }, {
          fromCache: fromCache,
          hasPendingWrites: hasPendingWrites
        });
        return;
      }
      window.dalApplyRemotePaStateDoc_(snap.data() || {}, {
        fromCache: fromCache,
        hasPendingWrites: hasPendingWrites
      });
    }, function(listenErr) {
      console.warn('DAL Firestore PA state listener error — blocking edits (H1):', listenErr);
      window.stopDalPaFirestoreListener();
      window.enterDalPaLiveSyncBlocked_(projectId, 'listener error');
    });
  });

window.startDalPaSessionWatcher = function(projectId) {
  if (!projectId || projectId === 'NEW') return;

  if (window.dalPaSessionWatchProjectId === String(projectId) && window.dalPaSessionMetaUnsub) {
    if (window.dalPrepUiOpen) window.startDalPaLiveSync_(projectId);
    if (typeof window.startDalPrepSessionPoll_ === 'function') window.startDalPrepSessionPoll_(projectId);
    return;
  }
  if (window.dalPaSessionWatchProjectId === String(projectId) && window.dalPaSessionWatchStarting) {
    if (typeof window.startDalPrepSessionPoll_ === 'function') window.startDalPrepSessionPoll_(projectId);
    return;
  }

  window.stopDalPaSessionWatcher();
  window.dalPaSessionWatchProjectId = String(projectId);
  window.dalPaSessionWatchStarting = true;
  window.dalMetaAuthority = false;

  // One Sheets read to latch prep ON for joiners — close detection uses poll + meta.
  if (typeof refreshDalSessionBanner === 'function') refreshDalSessionBanner();
  if (typeof window.startDalPrepSessionPoll_ === 'function') window.startDalPrepSessionPoll_(projectId);

  // Firestore _meta confirms close across users (poll is the fallback).
  window.dalEnsureFirestoreClientAuth_(function(err, client) {
    window.dalPaSessionWatchStarting = false;
    if (err) {
      console.warn('DAL meta watcher auth failed (OK — latch + Sheets poll used):', err && err.message ? err.message : err);
      if (window.dalPrepUiOpen) window.startDalPaLiveSync_(projectId);
      return;

            window.dalPrepSheetsOpenBlocked_ && !sid) return;
        window.dalPrepMetaEndPending_ = false;
        window.dalPrepMetaEndPendingSince_ = 0;
        window.dalMetaSeenOpen_ = true;
        window.dalMetaConfirmedOpen_ = true;
        window.dalMetaCloseStreak_ = 0;

          sessionType: 'prep',

          if (typeof window.dalMayJoinLiveFork_ === 'function' && !window.dalMayJoinLiveFork_()) return;

            invalidateCache: true,
            fromMeta: true,

      if (!window.dalMetaConfirmedOpen_) return;
