<!-- DAL Phase 4 Slice C — live prep sync (Firestore client when auth works; GAS poll fallback for GAS iframe) -->
<script>
window.dalPaFirestoreUnsub = null;
window.dalPaSessionMetaUnsub = null;
window.dalPaGasSyncTimer = null;
window.dalPaSessionWatchProjectId = '';
window.dalPaIgnoreListenerUntil = 0;
window.dalPaRemotePending = false;
window.dalPaLastRemoteSig = '';
window.dalPaFirestoreListenProjectId = '';
window.dalMetaAuthority = false;
window.dalPaLiveSyncFailed = false;
window.dalPaLiveSyncMode = ''; // 'firestore' | 'gas'
window.dalPaSessionWatchStarting = false;

window.dalFsDocToPaAsset_ = function(docId, d) {
  if (!d || docId === '_meta') return null;
  return {
    uid: d.uid || docId,
    assetId: String(d.asset_uid || ''),
    qty: d.assigned_quantity || 1,
    location: d.location || '',
    formula: d.formula || '',
    creator: d.creator || 'System',
    containerUid: d.container_uid || '',
    scanStatus: d.scan_status || 'Assigned',
    outboundTruckUid: d.outbound_truck_uid || '',
    outboundX: d.outbound_x !== undefined && d.outbound_x !== '' ? Number(d.outbound_x) : null,
    outboundY: d.outbound_y !== undefined && d.outbound_y !== '' ? Number(d.outbound_y) : null,
    outboundZ: d.outbound_z !== undefined && d.outbound_z !== '' ? Number(d.outbound_z) : null,
    outboundRotated: d.outbound_rotated === true || d.outbound_rotated === 'true',
    outboundStaged: d.outbound_staged === true || d.outbound_staged === 'true',
    inboundTruckUid: d.inbound_truck_uid || '',
    inboundX: d.inbound_x !== undefined && d.inbound_x !== '' ? Number(d.inbound_x) : null,
    inboundY: d.inbound_y !== undefined && d.inbound_y !== '' ? Number(d.inbound_y) : null,
    inboundZ: d.inbound_z !== undefined && d.inbound_z !== '' ? Number(d.inbound_z) : null,
    inboundRotated: d.inbound_rotated === true || d.inbound_rotated === 'true',
    inboundStaged: d.inbound_staged === true || d.inbound_staged === 'true'
  };
};

window.dalProcessPaFormulas_ = function(arr) {
  if (!arr) return;
  var exploded = [];
  for (var i = arr.length - 1; i >= 0; i--) {
    var pa = arr[i];
    var vaultAsset = typeof globalAssets !== 'undefined' ? globalAssets.find(function(a) { return a.id === pa.assetId; }) : null;
    if (vaultAsset && vaultAsset.type !== 'Bulk' && vaultAsset.isConsumable !== true && vaultAsset.isConsumable !== 'true') {
      var parsedQty = parseInt(pa.qty, 10);
      if (!isNaN(parsedQty) && parsedQty > 1 && !pa.isAuto && pa.formula !== 'Auto-Container' && pa.formula !== 'Gen-Auto-Container') {
        arr.splice(i, 1);
        for (var k = 0; k < parsedQty; k++) {
          var newPa = Object.assign({}, pa, { qty: 1 });
          delete newPa.uid;
          exploded.push(newPa);
        }
      }
    }
  }
  if (exploded.length > 0) arr.push.apply(arr, exploded);
  arr.forEach(function(pa) {
    if (pa.formula === 'Manual') pa.formula = 'Standalone';
    if (pa.assetId === 'DUMMY') pa.isEmptyGroup = true;
    if (pa.formula && pa.formula.indexOf('[SHORT] ') === 0) {
      pa.isShortage = true;
      pa.formula = pa.formula.substring(8);
    }
    if (pa.formula === 'Auto-Container') { pa.isAuto = true; pa.formula = 'Standalone'; }
    else if (pa.formula === 'Gen-Auto-Container') { pa.isAuto = true; pa.isGenericAuto = true; pa.formula = 'Standalone'; }
    else if (pa.formula && pa.formula.indexOf('[GEN_AUTO] ') === 0) { pa.isAuto = true; pa.isGenericAuto = true; pa.formula = pa.formula.substring(11); }
    else if (pa.formula && pa.formula.indexOf('[AUTO] ') === 0) { pa.isAuto = true; pa.formula = pa.formula.substring(7); }
  });
};

window.dalPaAssetsSig_ = function(assets) {
  return (assets || []).map(function(a) {
    return (a.uid || '') + ':' + (a.qty || 0) + ':' + (a.location || '') + ':' + (a.formula || '') + ':' + (a.assetId || '');
  }).sort().join('|');
};

window.dalUpdateRemotePendingBanner_ = function() {
  var banner = document.getElementById('dal-session-banner');
  if (!banner || !window.dalPrepUiOpen) return;
  if (window.dalPaRemotePending) {
    banner.textContent = '🔒 IN PREPARATION — remote updates available (save or reload to sync)';
  } else if (window.dalPaLiveSyncMode === 'firestore') {
    banner.textContent = '🔒 IN PREPARATION — live sync (direct)';
  } else if (window.dalPaLiveSyncMode === 'gas') {
    banner.textContent = '🔒 IN PREPARATION — live sync (server)';
  } else {
    banner.textContent = '🔒 IN PREPARATION';
  }
};

window.dalApplyRemotePaAssets_ = function(assets, fromCacheEmpty) {
  if (Date.now() < (window.dalPaIgnoreListenerUntil || 0)) return;
  if (!window.dalPrepUiOpen) return;
  if (fromCacheEmpty) return;

  var serverAssets = JSON.parse(JSON.stringify(assets || []));
  window.dalProcessPaFormulas_(serverAssets);
  var sig = window.dalPaAssetsSig_(serverAssets);
  if (sig === window.dalPaLastRemoteSig) return;

  if (typeof calculatePaDeltas === 'function' && calculatePaDeltas().length > 0) {
    window.dalPaRemotePending = true;
    // Do not advance lastSig — after local flush, next snapshot must still apply.
    window.dalUpdateRemotePendingBanner_();
    return;
  }

  window.dalPaLastRemoteSig = sig;
  window.dalPaRemotePending = false;
  window.dalPaApplyingRemote = true;
  try {
    currentProjectAssets = JSON.parse(JSON.stringify(serverAssets));
    window.originalProjectAssets = JSON.parse(JSON.stringify(serverAssets));

    var overlay = document.getElementById('project-assets-modal-overlay');
    if (overlay && overlay.style.display !== 'none' && typeof renderProjectAssetsUI === 'function') {
      renderProjectAssetsUI();
    }
    if (typeof evaluatePackingReadiness === 'function') evaluatePackingReadiness(true);
  } finally {
    window.dalPaApplyingRemote = false;
  }
  window.dalUpdateRemotePendingBanner_();
};

window.dalEnsureFirebaseSdk_ = function(done) {
  if (window.firebase && window.firebase.firestore && window.firebase.auth) {
    done(null);
    return;
  }
  var urls = [
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js'
  ];
  var idx = 0;
  function loadNext() {
    if (idx >= urls.length) {
      done(window.firebase ? null : new Error('Firebase SDK failed to load'));
      return;
    }
    var s = document.createElement('script');
    s.src = urls[idx++];
    s.onload = loadNext;
    s.onerror = function() { done(new Error('Failed to load ' + s.src)); };
    document.head.appendChild(s);
  }
  loadNext();
};

/** True when running inside hosting shell (web.app) — preferred for live Firestore. */
window.dalHostFsAvailable_ = function() {
  try {
    if (!window.parent || window.parent === window) return false;
    // Raw script.google.com bookmark has no host-boot — skip host bridge.
    try {
      var topHref = String((window.top && window.top.location && window.top.location.href) || '');
      if (topHref && /script\.google\.com/i.test(topHref) && !/web\.app/i.test(topHref)) {
        return false;
      }
    } catch (eTop) {
      // Cross-origin top (web.app embedding GAS) — cannot read href; host bridge is expected.
    }
    return true;
  } catch (e) { return false; }
};

window.dalFsReqSeq_ = 1;
window.dalFsPending_ = {};
window.dalFsListenHandlers_ = {};
window.dalFsHostAuthReady_ = false;
window.dalFsMsgBound_ = false;

window.dalFsBindHostMessages_ = function() {
  if (window.dalFsMsgBound_) return;
  window.dalFsMsgBound_ = true;
  window.addEventListener('message', function(ev) {
    var d = ev.data;
    if (!d || !d.type) return;
    if (d.type === 'SHOWRUNNER_DAL_FS_AUTH_RESULT') {
      var pend = window.dalFsPending_[d.requestId];
      if (!pend) return;
      delete window.dalFsPending_[d.requestId];
      if (d.ok) {
        window.dalFsHostAuthReady_ = true;
        window.dalFirestoreClient = { viaHost: true, ready: true };
        try { console.log('[DAL FS] host Auth OK'); } catch (eOk) { /* ignore */ }
        pend.cb(null, window.dalFirestoreClient);
      } else {
        window.dalFsHostAuthReady_ = false;
        try { console.warn('[DAL FS] host Auth fail:', d.error); } catch (eFail) { /* ignore */ }
        pend.cb(new Error(d.error || 'Host Firebase auth failed'));
      }
      return;
    }
    if (d.type === 'SHOWRUNNER_DAL_FS_SNAP') {
      var h = window.dalFsListenHandlers_[d.requestId];
      if (h && h.onSnap) h.onSnap(d);
      return;
    }
    if (d.type === 'SHOWRUNNER_DAL_FS_SNAP_ERROR') {
      var he = window.dalFsListenHandlers_[d.requestId];
      if (he && he.onErr) he.onErr(new Error(d.error || 'Host listen failed'));
      return;
    }
    if (d.type === 'SHOWRUNNER_DAL_FS_WRITE_RESULT') {
      var pw = window.dalFsPending_[d.requestId];
      if (!pw) return;
      delete window.dalFsPending_[d.requestId];
      if (d.ok) pw.cb(null, d.result);
      else pw.cb(new Error(d.error || 'Host write failed'));
    }
  });
};

window.dalFsPostToHost_ = function(msg) {
  // Hit window.top (web.app host-boot) and every ancestor — GAS is multi-nested.
  var seen = [];
  function post(w) {
    if (!w) return;
    for (var i = 0; i < seen.length; i++) { if (seen[i] === w) return; }
    seen.push(w);
    try { w.postMessage(msg, '*'); } catch (e) { /* ignore */ }
  }
  try { post(window.top); } catch (e0) { /* ignore */ }
  try {
    var w = window;
    for (var n = 0; n < 8; n++) {
      if (!w.parent || w.parent === w) break;
      w = w.parent;
      post(w);
    }
  } catch (e1) { /* ignore */ }
};

/**
 * Prefer host-shell Firebase Auth (first-party web.app). Falls back to in-iframe Auth.
 */
window.dalEnsureFirestoreClientAuth_ = function(cb) {
  if (window.dalFirestoreClient && window.dalFirestoreClient.ready) {
    cb(null, window.dalFirestoreClient);
    return;
  }
  window.dalFsBindHostMessages_();
  var actor = typeof assetOpsActor === 'function' ? assetOpsActor() : (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : '');

  var finishWithIframeAuth_ = function() {
    google.script.run
      .withFailureHandler(function(err) {
        if (window.__dalFsLastHostFail_ && (!err || !err.message)) {
          cb(new Error(window.__dalFsLastHostFail_));
          return;
        }
        if (window.__dalFsLastHostFail_) {
          cb(new Error(window.__dalFsLastHostFail_ + '; iframe: ' + ((err && err.message) || String(err || 'fail'))));
          return;
        }
        cb(err);
      })
      .withSuccessHandler(function(res) {
        window.dalEnsureFirebaseSdk_(function(sdkErr) {
          if (sdkErr) {
            cb(window.__dalFsLastHostFail_
              ? new Error(window.__dalFsLastHostFail_ + '; iframe sdk: ' + (sdkErr.message || sdkErr))
              : sdkErr);
            return;
          }
          try {
            if (!window.dalFirestoreClient || window.dalFirestoreClient.appName !== res.config.projectId) {
              if (window.dalFirestoreClient && window.dalFirestoreClient.app) {
                try { window.dalFirestoreClient.app.delete(); } catch (e) { /* ignore */ }
              }
              var app = firebase.apps.length ? firebase.app() : firebase.initializeApp({
                apiKey: res.config.apiKey,
                authDomain: res.config.authDomain,
                projectId: res.config.projectId,
                storageBucket: res.config.storageBucket,
                messagingSenderId: res.config.messagingSenderId,
                appId: res.config.appId
              });
              window.dalFirestoreClient = {
                app: app,
                appName: res.config.projectId,
                auth: firebase.auth(app),
                db: firebase.firestore(app),
                ready: false,
                viaHost: false
              };
            }
            window.dalFirestoreClient.auth.signInWithCustomToken(res.customToken)
              .then(function() {
                window.dalFirestoreClient.ready = true;
                window.__dalFsLastHostFail_ = '';
                cb(null, window.dalFirestoreClient);
              })
              .catch(function(e) {
                cb(window.__dalFsLastHostFail_
                  ? new Error(window.__dalFsLastHostFail_ + '; iframe auth: ' + (e.message || e))
                  : e);
              });
          } catch (e) {
            cb(window.__dalFsLastHostFail_
              ? new Error(window.__dalFsLastHostFail_ + '; iframe: ' + (e.message || e))
              : e);
          }
        });
      })
      .getDalFirebaseClientAuth(actor);
  };

  if (!window.dalHostFsAvailable_()) {
    finishWithIframeAuth_();
    return;
  }

  google.script.run
    .withFailureHandler(function(err) {
      // Token mint failed — try iframe path anyway.
      try { console.warn('Host DAL auth token mint failed, trying iframe:', err); } catch (e0) { /* ignore */ }
      finishWithIframeAuth_();
    })
    .withSuccessHandler(function(res) {
      var requestId = 'A' + (window.dalFsReqSeq_++);
      var settled = false;
      var timer = setTimeout(function() {
        if (settled) return;
        settled = true;
        delete window.dalFsPending_[requestId];
        try { console.warn('Host DAL auth timed out — trying iframe Auth'); } catch (e1) { /* ignore */ }
        // Pass a clear error through iframe path; if iframe also fails, banner shows this.
        window.__dalFsLastHostFail_ = 'host auth timed out (no AUTH_RESULT)';
        finishWithIframeAuth_();
      }, 8000);
      window.dalFsPending_[requestId] = {
        cb: function(err, client) {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          if (err) {
            try { console.warn('Host DAL auth failed, trying iframe:', err && err.message ? err.message : err); } catch (e2) { /* ignore */ }
            finishWithIframeAuth_();
            return;
          }
          cb(null, client);
        }
      };
      try { console.log('[DAL FS] posting AUTH to host', requestId); } catch (ePost) { /* ignore */ }
      window.dalFsPostToHost_({
        type: 'SHOWRUNNER_DAL_FS_AUTH',
        requestId: requestId,
        config: res.config,
        customToken: res.customToken
      });
    })
    .getDalFirebaseClientAuth(actor);
};

window.dalHostFsListenDoc_ = function(path, onSnap, onErr) {
  window.dalFsBindHostMessages_();
  var requestId = 'L' + (window.dalFsReqSeq_++);
  window.dalFsListenHandlers_[requestId] = { onSnap: onSnap, onErr: onErr };
  window.dalFsPostToHost_({ type: 'SHOWRUNNER_DAL_FS_LISTEN', requestId: requestId, path: path });
  return function() {
    delete window.dalFsListenHandlers_[requestId];
    window.dalFsPostToHost_({ type: 'SHOWRUNNER_DAL_FS_UNLISTEN', requestId: requestId });
  };
};

window.dalHostFsPatchWrite_ = function(path, localState, mutations, meta, done) {
  done = done || function() {};
  window.dalFsBindHostMessages_();
  var requestId = 'W' + (window.dalFsReqSeq_++);
  window.dalFsPending_[requestId] = { cb: done };
  window.dalFsPostToHost_({
    type: 'SHOWRUNNER_DAL_FS_PATCH_WRITE',
    requestId: requestId,
    path: path,
    localState: localState,
    mutations: mutations,
    meta: meta || {}
  });
};

window.stopDalPaFirestoreListener = function() {
  if (window.dalPaFirestoreUnsub) {
    try { window.dalPaFirestoreUnsub(); } catch (e) { /* ignore */ }
    window.dalPaFirestoreUnsub = null;
  }
  window.dalPaFirestoreListenProjectId = '';
};

window.stopDalPaGasSync_ = function() {
  if (window.dalPaGasSyncTimer) {
    clearInterval(window.dalPaGasSyncTimer);
    window.dalPaGasSyncTimer = null;
  }
};

window.stopDalPaLiveSync_ = function() {
  window.stopDalPaFirestoreListener();
  window.stopDalPaGasSync_();
  window.dalPaLiveSyncMode = '';
  window.dalPaRemotePending = false;
  window.dalPaLastRemoteSig = '';
};

/** GAS-backed sync — works inside Apps Script iframe without Firebase Auth authorized domains. */
window.startDalPaGasSync_ = function(projectId) {
  if (!projectId) return;
  if (window.dalPaGasSyncTimer && window.dalPaLiveSyncMode === 'gas') return;

  window.stopDalPaGasSync_();
  window.dalPaLiveSyncMode = 'gas';
  window.dalPaLiveSyncFailed = false;
  window.dalUpdateRemotePendingBanner_();

  var pull = function() {
    var overlay = document.getElementById('project-assets-modal-overlay');
    if (!overlay || overlay.style.display === 'none' || !window.dalPrepUiOpen) return;
    if (Date.now() < (window.dalPaIgnoreListenerUntil || 0)) return;

    var sDate = document.getElementById('edit-proj-date') ? document.getElementById('edit-proj-date').value : '';
    var eDate = document.getElementById('edit-proj-end-date') ? document.getElementById('edit-proj-end-date').value : '';
    google.script.run
      .withFailureHandler(function() { /* keep last good view */ })
      .withSuccessHandler(function(res) {
        if (!window.dalPrepUiOpen) return;
        window.overlappingAllocations = (res && res.overlapping) || window.overlappingAllocations || {};
        window.dalApplyRemotePaAssets_((res && res.current) || [], false);
      })
      .getProjectAssets(projectId, sDate, eDate);
  };

  pull();
  window.dalPaGasSyncTimer = setInterval(pull, 2500);
};

window.startDalPaFirestoreListener = function(projectId) {
  if (!projectId) return;
  if (window.dalPaFirestoreUnsub && window.dalPaFirestoreListenProjectId === String(projectId)) return;

  window.dalEnsureFirestoreClientAuth_(function(err, client) {
    if (err) {
      console.warn('DAL Firestore client auth failed — using server sync:', err && err.message ? err.message : err);
      window.dalPaLiveSyncFailed = true;
      window.startDalPaGasSync_(projectId);
      return;
    }
    if (window.dalPaFirestoreListenProjectId === String(projectId) && window.dalPaFirestoreUnsub) return;

    window.stopDalPaGasSync_();
    window.stopDalPaFirestoreListener();
    window.dalPaFirestoreListenProjectId = String(projectId);
    window.dalPaLiveSyncMode = 'firestore';
    window.dalPaLiveSyncFailed = false;
    window.dalUpdateRemotePendingBanner_();

    // Host bridge client has no in-iframe db — PA stays on GAS poll until collection listen is bridged.
    if (client.viaHost && !client.db) {
      window.startDalPaGasSync_(projectId);
      return;
    }
    if (!client.db) {
      window.startDalPaGasSync_(projectId);
      return;
    }

    var col = client.db.collection('projects').doc(String(projectId)).collection('assets');
    window.dalPaFirestoreUnsub = col.onSnapshot(function(snap) {
      var docs = [];
      snap.forEach(function(doc) {
        docs.push({ id: doc.id, data: doc.data() || {} });
      });
      var fromCache = !!(snap.metadata && snap.metadata.fromCache);
      var assets = [];
      docs.forEach(function(entry) {
        var a = window.dalFsDocToPaAsset_(entry.id, entry.data);
        if (a) assets.push(a);
      });
      window.dalApplyRemotePaAssets_(assets, fromCache && assets.length === 0);
    }, function(listenErr) {
      console.warn('DAL Firestore listener error — falling back to server sync:', listenErr);
      window.stopDalPaFirestoreListener();
      window.startDalPaGasSync_(projectId);
    });
  });
};

window.startDalPaLiveSync_ = function(projectId) {
  if (!projectId || !window.dalPrepUiOpen) return;
  if (typeof window.dalInstallPaLiveFlushHook_ === 'function') window.dalInstallPaLiveFlushHook_();
  // Prefer Firestore; auth/domain failure auto-falls back to GAS poll.
  if (window.dalPaLiveSyncMode === 'firestore' && window.dalPaFirestoreUnsub) return;
  if (window.dalPaLiveSyncMode === 'gas' && window.dalPaGasSyncTimer) return;
  window.startDalPaFirestoreListener(projectId);
};

window.stopDalPaSessionWatcher = function(opts) {
  opts = opts || {};
  window.stopDalPaLiveSync_();
  if (typeof window.stopDalPrepSessionPoll_ === 'function') window.stopDalPrepSessionPoll_();
  if (window.dalPaSessionMetaUnsub) {
    try { window.dalPaSessionMetaUnsub(); } catch (e) { /* ignore */ }
    window.dalPaSessionMetaUnsub = null;
  }
  window.dalPaSessionWatchProjectId = '';
  window.dalMetaAuthority = false;
  window.dalPaSessionWatchStarting = false;
  // Clear latch only when leaving PA / ending prep — not when re-attaching the watcher.
  if (opts.clearLatch && !window.dalPrepClosing) {
    window.dalPrepLatched = false;
    window.dalPrepUiOpen = false;
  }
};

window.startDalPaSessionWatcher = function(projectId) {
  if (!projectId || projectId === 'NEW') return;
  // Only skip re-attach when meta listener is already live for this project.
  if (window.dalPaSessionWatchProjectId === String(projectId) && window.dalPaSessionMetaUnsub) {
    if (window.dalPrepUiOpen) window.startDalPaLiveSync_(projectId);
    if (typeof window.startDalPrepSessionPoll_ === 'function') window.startDalPrepSessionPoll_(projectId);
    return;
  }
  if (window.dalPaSessionWatchProjectId === String(projectId) && window.dalPaSessionWatchStarting) {
    if (typeof window.startDalPrepSessionPoll_ === 'function') window.startDalPrepSessionPoll_(projectId);
    return;
  }

  window.stopDalPaSessionWatcher();
  window.dalPaSessionWatchProjectId = String(projectId);
  window.dalPaSessionWatchStarting = true;
  window.dalMetaAuthority = false;

  // One Sheets read to latch prep ON for joiners — close detection uses poll + meta.
  if (typeof refreshDalSessionBanner === 'function') refreshDalSessionBanner();
  if (typeof window.startDalPrepSessionPoll_ === 'function') window.startDalPrepSessionPoll_(projectId);

  // Firestore _meta confirms close across users (poll is the fallback).
  window.dalEnsureFirestoreClientAuth_(function(err, client) {
    window.dalPaSessionWatchStarting = false;
    if (err) {
      console.warn('DAL meta watcher auth failed (OK — latch + Sheets poll used):', err && err.message ? err.message : err);
      if (window.dalPrepUiOpen) window.startDalPaLiveSync_(projectId);
      return;
    }
    if (!client || !client.db) {
      // Host-only client has no in-iframe Firestore — Sheets poll covers close detection.
      if (window.dalPrepUiOpen) window.startDalPaLiveSync_(projectId);
      return;
    }
    var metaRef = client.db.collection('projects').doc(String(projectId)).collection('assets').doc('_meta');
    window.dalPaSessionMetaUnsub = metaRef.onSnapshot(function(snap) {
      if (window.dalPrepClosing) return;
      if (!snap.exists && snap.metadata && snap.metadata.fromCache) return;

      var data = snap.exists ? (snap.data() || {}) : null;
      var isPrepOpen = !!(data && String(data.sessionType || '') === 'prep');
      window.dalMetaAuthority = true;

      if (isPrepOpen) {
        window.dalSessionState = {
          status: 'open',
          sessionType: 'prep',
          sessionUid: data.sessionUid || '',
          prepStatus: 'open'
        };
        if (typeof dalApplyDalPrepUiState_ === 'function') {
          dalApplyDalPrepUiState_(true, projectId, { invalidateCache: !window.dalPrepUiOpen });
        }
      } else if (snap.exists === false && !(snap.metadata && snap.metadata.fromCache)) {
        // Server-confirmed close — clear latch on remote browsers.
        if (typeof dalApplyDalPrepUiState_ === 'function') {
          dalApplyDalPrepUiState_(false, projectId, { allowClose: true });
        }
      }
    }, function(watchErr) {
      console.warn('DAL meta listener error (OK — latch + Sheets poll used):', watchErr);
      window.dalMetaAuthority = false;
      if (window.dalPrepUiOpen) window.startDalPaLiveSync_(projectId);
    });

    if (window.dalPrepUiOpen) window.startDalPaLiveSync_(projectId);
  });
};

window.dalMarkPaLocalSave_ = function() {
  window.dalPaIgnoreListenerUntil = Date.now() + 800;
};

window.dalNewUid_ = function() {
  try {
    if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID();
  } catch (e1) { /* ignore */ }
  return 'pa_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
};

window.dalPaEncodeFormulaForFs_ = function(pa) {
  var pForm = pa.formula || 'Standalone';
  if (pa.isShortage) pForm = '[SHORT] ' + pForm;
  if (pa.isGenericAuto && pa.formula !== 'Standalone') pForm = '[GEN_AUTO] ' + pForm;
  else if (pa.isGenericAuto) pForm = 'Gen-Auto-Container';
  else if (pa.isAuto && pa.formula !== 'Standalone') pForm = '[AUTO] ' + pForm;
  else if (pa.isAuto) pForm = 'Auto-Container';
  return pForm;
};

/** Client asset → Firestore fork document (sheet-column field names). */
window.dalPaAssetToFsDoc_ = function(pa, projectId) {
  if (!pa.uid) pa.uid = window.dalNewUid_();
  var doc = {
    uid: String(pa.uid),
    project_uid: String(projectId || ''),
    asset_uid: String(pa.assetId || ''),
    assigned_quantity: pa.qty != null ? pa.qty : 1,
    location: pa.location || 'General',
    formula: window.dalPaEncodeFormulaForFs_(pa),
    creator: pa.creator || (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System'),
    container_uid: pa.containerUid || '',
    scan_status: pa.scanStatus || 'Assigned'
  };
  if (pa.outboundTruckUid) doc.outbound_truck_uid = pa.outboundTruckUid;
  if (pa.outboundX != null) doc.outbound_x = pa.outboundX;
  if (pa.outboundY != null) doc.outbound_y = pa.outboundY;
  if (pa.outboundZ != null) doc.outbound_z = pa.outboundZ;
  if (pa.outboundRotated) doc.outbound_rotated = true;
  if (pa.outboundStaged) doc.outbound_staged = true;
  if (pa.inboundTruckUid) doc.inbound_truck_uid = pa.inboundTruckUid;
  if (pa.inboundX != null) doc.inbound_x = pa.inboundX;
  if (pa.inboundY != null) doc.inbound_y = pa.inboundY;
  if (pa.inboundZ != null) doc.inbound_z = pa.inboundZ;
  if (pa.inboundRotated) doc.inbound_rotated = true;
  if (pa.inboundStaged) doc.inbound_staged = true;
  return doc;
};

/**
 * Direct browser → Firestore PA fork write (no GAS round-trip).
 * Falls back to caller if auth/client unavailable.
 */
window.dalWritePaForkToFirestore_ = function(projectId, done) {
  done = done || function() {};
  if (!projectId || !window.dalPrepUiOpen) {
    done(new Error('prep_not_open'));
    return;
  }
  window.dalEnsureFirestoreClientAuth_(function(err, client) {
    if (err || !client || !client.db) {
      done(err || new Error('firestore_client_unavailable'));
      return;
    }
    try {
      var col = client.db.collection('projects').doc(String(projectId)).collection('assets');
      var current = Array.isArray(currentProjectAssets) ? currentProjectAssets : [];
      var currentByUid = {};
      var i;
      for (i = 0; i < current.length; i++) {
        var pa = current[i];
        if (!pa) continue;
        if (!pa.uid) pa.uid = window.dalNewUid_();
        currentByUid[String(pa.uid)] = pa;
      }
      var prev = Array.isArray(window.originalProjectAssets) ? window.originalProjectAssets : [];
      var toDelete = [];
      for (i = 0; i < prev.length; i++) {
        var oldUid = prev[i] && prev[i].uid ? String(prev[i].uid) : '';
        if (oldUid && !currentByUid[oldUid]) toDelete.push(oldUid);
      }

      var writes = Object.keys(currentByUid).map(function(uid) {
        return { uid: uid, doc: window.dalPaAssetToFsDoc_(currentByUid[uid], projectId) };
      });

      // Firestore batches max 500 ops
      var ops = [];
      writes.forEach(function(w) {
        ops.push({ type: 'set', ref: col.doc(w.uid), data: w.doc });
      });
      toDelete.forEach(function(uid) {
        if (uid === '_meta') return;
        ops.push({ type: 'delete', ref: col.doc(uid) });
      });

      function commitChunk(start) {
        if (start >= ops.length) {
          done(null);
          return;
        }
        var batch = client.db.batch();
        var end = Math.min(start + 450, ops.length);
        var j;
        for (j = start; j < end; j++) {
          if (ops[j].type === 'delete') batch.delete(ops[j].ref);
          else batch.set(ops[j].ref, ops[j].data, { merge: true });
        }
        batch.commit().then(function() {
          commitChunk(end);
        }).catch(function(eWrite) {
          done(eWrite);
        });
      }

      if (ops.length === 0) {
        done(null);
        return;
      }
      window.dalMarkPaLocalSave_();
      commitChunk(0);
    } catch (e2) {
      done(e2);
    }
  });
};

/**
 * True live collab: while prep fork is open, flush PA to Firebase after local edits.
 * Prefers direct client Firestore write; falls back to GAS if client auth unavailable.
 */
window.dalFlushPaIfPrepOpen_ = function() {
  if (!window.dalPrepUiOpen) return;
  if (window.dalPaApplyingRemote) return;
  if (window.isBackgroundSyncing) return;
  if (window.dalPaFlushInFlight) {
    window.dalPaFlushAgain = true;
    return;
  }
  if (window.projectAssetsReadOnly) return;
  if (window.currentOperationType) return;
  if (typeof calculatePaDeltas !== 'function') return;
  if (calculatePaDeltas().length === 0) return;

  clearTimeout(window.dalPaFlushTimer);
  window.dalPaFlushTimer = setTimeout(function() {
    if (!window.dalPrepUiOpen) return;
    if (window.dalPaApplyingRemote) return;
    if (typeof calculatePaDeltas !== 'function' || calculatePaDeltas().length === 0) return;
    window.dalPaFlushInFlight = true;
    window.dalPaFlushAgain = false;

    var projectId = document.getElementById('edit-folder-id')
      ? document.getElementById('edit-folder-id').value
      : '';
    var finish = function(ok) {
      window.dalPaFlushInFlight = false;
      if (ok) {
        window.originalProjectAssets = JSON.parse(JSON.stringify(currentProjectAssets || []));
        window.dalPaRemotePending = false;
        if (typeof window.dalUpdateRemotePendingBanner_ === 'function') window.dalUpdateRemotePendingBanner_();
        if (typeof updateMobilePaUnsavedUI === 'function') updateMobilePaUnsavedUI();
      } else {
        try { console.warn('DAL PA live flush failed — will retry or use SAVE'); } catch (e1) { /* ignore */ }
        var banner = document.getElementById('dal-session-banner');
        if (banner && window.dalPrepUiOpen) banner.textContent = '🔒 IN PREPARATION — live sync retry…';
      }
      if (window.dalPaFlushAgain) {
        window.dalPaFlushAgain = false;
        window.dalFlushPaIfPrepOpen_();
      }
    };

    // Fast path: direct client → Firestore
    if (projectId && window.dalPaLiveSyncMode === 'firestore') {
      window.dalWritePaForkToFirestore_(projectId, function(writeErr) {
        if (!writeErr) {
          finish(true);
          return;
        }
        try { console.warn('Direct PA Firestore write failed, falling back to GAS:', writeErr); } catch (e2) { /* ignore */ }
        // Fall through to GAS
        if (typeof saveProjectAssets !== 'function') {
          finish(false);
          return;
        }
        saveProjectAssets(function(ok) { finish(!!ok); }, true);
      });
      return;
    }

    if (typeof saveProjectAssets !== 'function') {
      finish(false);
      return;
    }
    saveProjectAssets(function(ok) { finish(!!ok); }, true);
  }, 150);
};

/** Kept for prep-open call sites; flush is wired inside renderProjectAssetsUI. */
window.dalInstallPaLiveFlushHook_ = function() {
  window.__dalPaFlushHookInstalled = true;
};

window.dalPaApplyingRemote = false;
</script>
