<!-- DAL Phase 4 Slice C — live prep sync (Firestore client when auth works; GAS poll fallback for GAS iframe) -->
<script>
window.dalPaFirestoreUnsub = null;
window.dalPaSessionMetaUnsub = null;
window.dalPaGasSyncTimer = null;
window.dalPaSessionWatchProjectId = '';
window.dalPaIgnoreListenerUntil = 0;
window.dalPaRemotePending = false;
window.dalPaLastRemoteSig = '';
window.dalPaFirestoreListenProjectId = '';
window.dalMetaAuthority = false;
window.dalPaLiveSyncFailed = false;
window.dalPaLiveSyncMode = ''; // 'firestore' | 'gas'
window.dalPaSessionWatchStarting = false;

window.dalFsDocToPaAsset_ = function(docId, d) {
  if (!d || docId === '_meta') return null;
  return {
    uid: d.uid || docId,
    assetId: String(d.asset_uid || ''),
    qty: d.assigned_quantity || 1,
    location: d.location || '',
    formula: d.formula || '',
    creator: d.creator || 'System',
    containerUid: d.container_uid || '',
    scanStatus: d.scan_status || 'Assigned',
    outboundTruckUid: d.outbound_truck_uid || '',
    outboundX: d.outbound_x !== undefined && d.outbound_x !== '' ? Number(d.outbound_x) : null,
    outboundY: d.outbound_y !== undefined && d.outbound_y !== '' ? Number(d.outbound_y) : null,
    outboundZ: d.outbound_z !== undefined && d.outbound_z !== '' ? Number(d.outbound_z) : null,
    outboundRotated: d.outbound_rotated === true || d.outbound_rotated === 'true',
    outboundStaged: d.outbound_staged === true || d.outbound_staged === 'true',
    inboundTruckUid: d.inbound_truck_uid || '',
    inboundX: d.inbound_x !== undefined && d.inbound_x !== '' ? Number(d.inbound_x) : null,
    inboundY: d.inbound_y !== undefined && d.inbound_y !== '' ? Number(d.inbound_y) : null,
    inboundZ: d.inbound_z !== undefined && d.inbound_z !== '' ? Number(d.inbound_z) : null,
    inboundRotated: d.inbound_rotated === true || d.inbound_rotated === 'true',
    inboundStaged: d.inbound_staged === true || d.inbound_staged === 'true'
  };
};

window.dalProcessPaFormulas_ = function(arr) {
  if (!arr) return;
  var exploded = [];
  for (var i = arr.length - 1; i >= 0; i--) {
    var pa = arr[i];
    var vaultAsset = typeof globalAssets !== 'undefined' ? globalAssets.find(function(a) { return a.id === pa.assetId; }) : null;
    if (vaultAsset && vaultAsset.type !== 'Bulk' && vaultAsset.isConsumable !== true && vaultAsset.isConsumable !== 'true') {
      var parsedQty = parseInt(pa.qty, 10);
      if (!isNaN(parsedQty) && parsedQty > 1 && !pa.isAuto && pa.formula !== 'Auto-Container' && pa.formula !== 'Gen-Auto-Container') {
        arr.splice(i, 1);
        for (var k = 0; k < parsedQty; k++) {
          var newPa = Object.assign({}, pa, { qty: 1 });
          delete newPa.uid;
          exploded.push(newPa);
        }
      }
    }
  }
  if (exploded.length > 0) arr.push.apply(arr, exploded);
  arr.forEach(function(pa) {
    if (pa.formula === 'Manual') pa.formula = 'Standalone';
    if (pa.assetId === 'DUMMY') pa.isEmptyGroup = true;
    if (pa.formula && pa.formula.indexOf('[SHORT] ') === 0) {
      pa.isShortage = true;
      pa.formula = pa.formula.substring(8);
    }
    if (pa.formula === 'Auto-Container') { pa.isAuto = true; pa.formula = 'Standalone'; }
    else if (pa.formula === 'Gen-Auto-Container') { pa.isAuto = true; pa.isGenericAuto = true; pa.formula = 'Standalone'; }
    else if (pa.formula && pa.formula.indexOf('[GEN_AUTO] ') === 0) { pa.isAuto = true; pa.isGenericAuto = true; pa.formula = pa.formula.substring(11); }
    else if (pa.formula && pa.formula.indexOf('[AUTO] ') === 0) { pa.isAuto = true; pa.formula = pa.formula.substring(7); }
  });
};

window.dalPaAssetsSig_ = function(assets) {
  return (assets || []).map(function(a) {
    return (a.uid || '') + ':' + (a.qty || 0) + ':' + (a.location || '') + ':' + (a.formula || '') + ':' + (a.assetId || '');
  }).sort().join('|');
};

window.dalUpdateRemotePendingBanner_ = function() {
  var banner = document.getElementById('dal-session-banner');
  if (!banner || !window.dalPrepUiOpen) return;
  if (window.dalPaRemotePending) {
    banner.textContent = '🔒 IN PREPARATION — remote updates available (save or reload to sync)';
  } else if (window.dalPaLiveSyncMode === 'firestore') {
    banner.textContent = '🔒 IN PREPARATION — live sync active';
  } else if (window.dalPaLiveSyncMode === 'gas') {
    banner.textContent = '🔒 IN PREPARATION — live sync (server)';
  } else {
    banner.textContent = '🔒 IN PREPARATION';
  }
};

window.dalApplyRemotePaAssets_ = function(assets, fromCacheEmpty) {
  if (Date.now() < (window.dalPaIgnoreListenerUntil || 0)) return;
  if (!window.dalPrepUiOpen) return;
  if (fromCacheEmpty) return;

  var serverAssets = JSON.parse(JSON.stringify(assets || []));
  window.dalProcessPaFormulas_(serverAssets);
  var sig = window.dalPaAssetsSig_(serverAssets);
  if (sig === window.dalPaLastRemoteSig) return;

  if (typeof calculatePaDeltas === 'function' && calculatePaDeltas().length > 0) {
    window.dalPaRemotePending = true;
    window.dalPaLastRemoteSig = sig; // remember remote version even if deferred
    window.dalUpdateRemotePendingBanner_();
    return;
  }

  window.dalPaLastRemoteSig = sig;
  window.dalPaRemotePending = false;
  currentProjectAssets = JSON.parse(JSON.stringify(serverAssets));
  window.originalProjectAssets = JSON.parse(JSON.stringify(serverAssets));

  var overlay = document.getElementById('project-assets-modal-overlay');
  if (overlay && overlay.style.display !== 'none' && typeof renderProjectAssetsUI === 'function') {
    renderProjectAssetsUI();
  }
  if (typeof evaluatePackingReadiness === 'function') evaluatePackingReadiness(true);
  window.dalUpdateRemotePendingBanner_();
};

window.dalEnsureFirebaseSdk_ = function(done) {
  if (window.firebase && window.firebase.firestore && window.firebase.auth) {
    done(null);
    return;
  }
  var urls = [
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js'
  ];
  var idx = 0;
  function loadNext() {
    if (idx >= urls.length) {
      done(window.firebase ? null : new Error('Firebase SDK failed to load'));
      return;
    }
    var s = document.createElement('script');
    s.src = urls[idx++];
    s.onload = loadNext;
    s.onerror = function() { done(new Error('Failed to load ' + s.src)); };
    document.head.appendChild(s);
  }
  loadNext();
};

window.dalEnsureFirestoreClientAuth_ = function(cb) {
  if (window.dalFirestoreClient && window.dalFirestoreClient.ready) {
    cb(null, window.dalFirestoreClient);
    return;
  }
  var actor = typeof assetOpsActor === 'function' ? assetOpsActor() : (typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : '');
  google.script.run
    .withFailureHandler(function(err) { cb(err); })
    .withSuccessHandler(function(res) {
      window.dalEnsureFirebaseSdk_(function(sdkErr) {
        if (sdkErr) { cb(sdkErr); return; }
        try {
          if (!window.dalFirestoreClient || window.dalFirestoreClient.appName !== res.config.projectId) {
            if (window.dalFirestoreClient && window.dalFirestoreClient.app) {
              try { window.dalFirestoreClient.app.delete(); } catch (e) { /* ignore */ }
            }
            var app = firebase.apps.length ? firebase.app() : firebase.initializeApp({
              apiKey: res.config.apiKey,
              authDomain: res.config.authDomain,
              projectId: res.config.projectId,
              storageBucket: res.config.storageBucket,
              messagingSenderId: res.config.messagingSenderId,
              appId: res.config.appId
            });
            window.dalFirestoreClient = {
              app: app,
              appName: res.config.projectId,
              auth: firebase.auth(app),
              db: firebase.firestore(app),
              ready: false
            };
          }
          window.dalFirestoreClient.auth.signInWithCustomToken(res.customToken)
            .then(function() {
              window.dalFirestoreClient.ready = true;
              cb(null, window.dalFirestoreClient);
            })
            .catch(function(e) { cb(e); });
        } catch (e) { cb(e); }
      });
    })
    .getDalFirebaseClientAuth(actor);
};

window.stopDalPaFirestoreListener = function() {
  if (window.dalPaFirestoreUnsub) {
    try { window.dalPaFirestoreUnsub(); } catch (e) { /* ignore */ }
    window.dalPaFirestoreUnsub = null;
  }
  window.dalPaFirestoreListenProjectId = '';
};

window.stopDalPaGasSync_ = function() {
  if (window.dalPaGasSyncTimer) {
    clearInterval(window.dalPaGasSyncTimer);
    window.dalPaGasSyncTimer = null;
  }
};

window.stopDalPaLiveSync_ = function() {
  window.stopDalPaFirestoreListener();
  window.stopDalPaGasSync_();
  window.dalPaLiveSyncMode = '';
  window.dalPaRemotePending = false;
  window.dalPaLastRemoteSig = '';
};

/** GAS-backed sync — works inside Apps Script iframe without Firebase Auth authorized domains. */
window.startDalPaGasSync_ = function(projectId) {
  if (!projectId) return;
  if (window.dalPaGasSyncTimer && window.dalPaLiveSyncMode === 'gas') return;

  window.stopDalPaGasSync_();
  window.dalPaLiveSyncMode = 'gas';
  window.dalPaLiveSyncFailed = false;
  window.dalUpdateRemotePendingBanner_();

  var pull = function() {
    var overlay = document.getElementById('project-assets-modal-overlay');
    if (!overlay || overlay.style.display === 'none' || !window.dalPrepUiOpen) return;
    if (Date.now() < (window.dalPaIgnoreListenerUntil || 0)) return;

    var sDate = document.getElementById('edit-proj-date') ? document.getElementById('edit-proj-date').value : '';
    var eDate = document.getElementById('edit-proj-end-date') ? document.getElementById('edit-proj-end-date').value : '';
    google.script.run
      .withFailureHandler(function() { /* keep last good view */ })
      .withSuccessHandler(function(res) {
        if (!window.dalPrepUiOpen) return;
        window.overlappingAllocations = (res && res.overlapping) || window.overlappingAllocations || {};
        window.dalApplyRemotePaAssets_((res && res.current) || [], false);
      })
      .getProjectAssets(projectId, sDate, eDate);
  };

  pull();
  window.dalPaGasSyncTimer = setInterval(pull, 2500);
};

window.startDalPaFirestoreListener = function(projectId) {
  if (!projectId) return;
  if (window.dalPaFirestoreUnsub && window.dalPaFirestoreListenProjectId === String(projectId)) return;

  window.dalEnsureFirestoreClientAuth_(function(err, client) {
    if (err) {
      console.warn('DAL Firestore client auth failed — using server sync:', err && err.message ? err.message : err);
      window.dalPaLiveSyncFailed = true;
      window.startDalPaGasSync_(projectId);
      return;
    }
    if (window.dalPaFirestoreListenProjectId === String(projectId) && window.dalPaFirestoreUnsub) return;

    window.stopDalPaGasSync_();
    window.stopDalPaFirestoreListener();
    window.dalPaFirestoreListenProjectId = String(projectId);
    window.dalPaLiveSyncMode = 'firestore';
    window.dalPaLiveSyncFailed = false;
    window.dalUpdateRemotePendingBanner_();

    var col = client.db.collection('projects').doc(String(projectId)).collection('assets');
    window.dalPaFirestoreUnsub = col.onSnapshot(function(snap) {
      var docs = [];
      snap.forEach(function(doc) {
        docs.push({ id: doc.id, data: doc.data() || {} });
      });
      var fromCache = !!(snap.metadata && snap.metadata.fromCache);
      var assets = [];
      docs.forEach(function(entry) {
        var a = window.dalFsDocToPaAsset_(entry.id, entry.data);
        if (a) assets.push(a);
      });
      window.dalApplyRemotePaAssets_(assets, fromCache && assets.length === 0);
    }, function(listenErr) {
      console.warn('DAL Firestore listener error — falling back to server sync:', listenErr);
      window.stopDalPaFirestoreListener();
      window.startDalPaGasSync_(projectId);
    });
  });
};

window.startDalPaLiveSync_ = function(projectId) {
  if (!projectId || !window.dalPrepUiOpen) return;
  // Prefer Firestore; auth/domain failure auto-falls back to GAS poll.
  if (window.dalPaLiveSyncMode === 'firestore' && window.dalPaFirestoreUnsub) return;
  if (window.dalPaLiveSyncMode === 'gas' && window.dalPaGasSyncTimer) return;
  window.startDalPaFirestoreListener(projectId);
};

window.stopDalPaSessionWatcher = function() {
  window.stopDalPaLiveSync_();
  if (window.dalPaSessionMetaUnsub) {
    try { window.dalPaSessionMetaUnsub(); } catch (e) { /* ignore */ }
    window.dalPaSessionMetaUnsub = null;
  }
  window.dalPaSessionWatchProjectId = '';
  window.dalMetaAuthority = false;
  window.dalPaSessionWatchStarting = false;
  // Clear latch on leave so reopen re-reads Sheets (other user may have ended prep).
  if (!window.dalPrepClosing) {
    window.dalPrepLatched = false;
    window.dalPrepUiOpen = false;
  }
};

window.startDalPaSessionWatcher = function(projectId) {
  if (!projectId || projectId === 'NEW') return;
  if (window.dalPaSessionWatchProjectId === String(projectId) && (window.dalPaSessionMetaUnsub || window.dalPaSessionWatchStarting || window.dalPrepLatched)) {
    if (window.dalPrepUiOpen) window.startDalPaLiveSync_(projectId);
    return;
  }

  window.stopDalPaSessionWatcher();
  window.dalPaSessionWatchProjectId = String(projectId);
  window.dalPaSessionWatchStarting = true;
  window.dalMetaAuthority = false;

  // One Sheets read to latch prep ON for joiners — never polls in a loop.
  if (typeof refreshDalSessionBanner === 'function') refreshDalSessionBanner();

  // Optional: Firestore _meta confirms close across users (also fails open to latch).
  window.dalEnsureFirestoreClientAuth_(function(err, client) {
    window.dalPaSessionWatchStarting = false;
    if (err) {
      console.warn('DAL meta watcher auth failed (OK — latch + server sync used):', err && err.message ? err.message : err);
      if (window.dalPrepUiOpen) window.startDalPaLiveSync_(projectId);
      return;
    }
    var metaRef = client.db.collection('projects').doc(String(projectId)).collection('assets').doc('_meta');
    window.dalPaSessionMetaUnsub = metaRef.onSnapshot(function(snap) {
      if (window.dalPrepClosing) return;
      if (!snap.exists && snap.metadata && snap.metadata.fromCache) return;

      var data = snap.exists ? (snap.data() || {}) : null;
      var isPrepOpen = !!(data && String(data.sessionType || '') === 'prep');
      window.dalMetaAuthority = true;

      if (isPrepOpen) {
        window.dalSessionState = {
          status: 'open',
          sessionType: 'prep',
          sessionUid: data.sessionUid || ''
        };
        if (typeof dalApplyDalPrepUiState_ === 'function') {
          dalApplyDalPrepUiState_(true, projectId, { invalidateCache: !window.dalPrepUiOpen });
        }
      } else if (snap.exists === false && !(snap.metadata && snap.metadata.fromCache)) {
        // Server-confirmed close — only place meta is allowed to clear the latch.
        if (typeof dalApplyDalPrepUiState_ === 'function') {
          dalApplyDalPrepUiState_(false, projectId, { allowClose: true });
        }
      }
    }, function(watchErr) {
      console.warn('DAL meta listener error (OK — latch + server sync used):', watchErr);
      window.dalMetaAuthority = false;
      if (window.dalPrepUiOpen) window.startDalPaLiveSync_(projectId);
    });

    if (window.dalPrepUiOpen) window.startDalPaLiveSync_(projectId);
  });
};

window.dalMarkPaLocalSave_ = function() {
  window.dalPaIgnoreListenerUntil = Date.now() + 1500;
};
</script>
