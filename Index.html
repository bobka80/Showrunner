<script>
  console.log("🔥 APP BOOT VERSION: 2026-06-25 RBAC-Phase1");
  const ACCESS_TIER_ORDER = ['CREW', 'EDITOR', 'MANAGER', 'ADMIN', 'ROOT'];

  function normalizeAccessTier(tier) {
    if (tier == null || tier === '') return 'CREW';
    const raw = tier.toString().trim();
    const upper = raw.toUpperCase();
    if (ACCESS_TIER_ORDER.indexOf(upper) !== -1) return upper;
    const titled = raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase();
    const titleMap = { Crew: 'CREW', Editor: 'EDITOR', Manager: 'MANAGER', Admin: 'ADMIN', Root: 'ROOT' };
    if (titleMap[titled]) return titleMap[titled];
    return 'CREW';
  }

  function accessTierRank(tier) {
    const idx = ACCESS_TIER_ORDER.indexOf(normalizeAccessTier(tier));
    return idx === -1 ? 1 : idx + 1;
  }

  window.normalizeAccessTier = normalizeAccessTier;
  window.accessTierAtLeast = function(minTier) {
    return accessTierRank(USER_ACCESS) >= accessTierRank(minTier);
  };

  const USER_ACCESS = normalizeAccessTier(document.querySelector('meta[name="user-access"]').content);
  const ACTIVE_USER_NAME = document.querySelector('meta[name="user-name"]').content;
  const ACTIVE_USER_UID = (document.querySelector('meta[name="user-uid"]') || {}).content || '';
  const ACTIVE_USER_EMAIL = (document.querySelector('meta[name="user-email"]') || {}).content || '';
  window.ACTIVE_USER_UID = ACTIVE_USER_UID;
  window.ACTIVE_USER_EMAIL = ACTIVE_USER_EMAIL;
  
  let USER_PERMISSIONS = {};
  try {
      const b64Data = document.querySelector('meta[name="user-permissions"]').content;
      if (b64Data) {
          USER_PERMISSIONS = JSON.parse(atob(b64Data));
      }
  } catch(e) {
      console.error("Failed to parse user permissions", e);
  }
  
  if (USER_ACCESS === 'ROOT') document.body.classList.add('perm-root');
  document.body.classList.add('perm-task_manage_personal');
  for (const [key, value] of Object.entries(USER_PERMISSIONS)) {
     if (value === true || value === "true") document.body.classList.add('perm-' + key);
  }

  window.userHasPerm = function(key) {
    const v = USER_PERMISSIONS[key];
    return v === true || v === 'true';
  };

  window.canCreateOnCalendar = function() {
    if (USER_ACCESS === 'ROOT') return true;
    if (userHasPerm('event_create_standard') || userHasPerm('event_create_crossrent')) return true;
    if (accessTierAtLeast('MANAGER')) return true;
    return false;
  };

  window.canFullEditProject = function(projectId) {
    if (projectId === 'NEW') return canCreateOnCalendar();
    if (userHasPerm('event_create_standard') || userHasPerm('event_create_crossrent')) return true;
    if (accessTierAtLeast('MANAGER')) return true;
    return false;
  };

  // Evaluate Access Tiers (canonical ALL-CAPS via normalizeAccessTier)
  const isRoot = (USER_ACCESS === 'ROOT');
  const isAdmin = accessTierAtLeast('ADMIN');
  const isManagerOrAbove = accessTierAtLeast('MANAGER');
  
  // Financials: Manager+ tier only; Managers need a finance checkbox, Admin/Root always see it
  const hasFinPerm = userHasPerm('fin_view_roi') || userHasPerm('fin_view_internal') || userHasPerm('hr_view_rates');
  const showFinancials = isManagerOrAbove && (isAdmin || hasFinPerm);

  // Master Settings: Admin/Root or any database-view checkbox
  const hasDbPerm = userHasPerm('db_view_assets') || userHasPerm('db_view_vehicles') || userHasPerm('db_view_warehouses') || userHasPerm('db_view_clients');
  const showMaster = isAdmin || hasDbPerm;

  // Reveal sidebar icons the user is allowed to see (all others stay hidden via .nav-gated)
  function revealNavItem(el) {
    if (!el) return;
    el.classList.remove('nav-gated');
  }

  if (isManagerOrAbove) {
    revealNavItem(document.getElementById('nav-btn-manager'));
    document.body.classList.add('perm-manager-tier');
  }
  if (userHasPerm('view_logistics')) {
    revealNavItem(document.getElementById('asset-conflict-container'));
  }
  if (userHasPerm('view_month_roster')) {
    revealNavItem(document.getElementById('crew-conflict-container'));
  }
  if (showFinancials) revealNavItem(document.getElementById('nav-btn-financials'));
  if (showMaster) revealNavItem(document.getElementById('nav-btn-master'));
  if (isAdmin) revealNavItem(document.getElementById('nav-settings-container'));

  document.getElementById('left-nav-bar')?.classList.add('nav-perms-ready');
