<script>
/**
 * 06d_Admin_Fleet.html
 * Domain: Fleet Database, Vehicle Logic.
 */

// @INDEX: FLEET -> Render Vehicle Database
function loadVehicles() {
    const container = document.getElementById('vehicle-list-container');
    
    let needsFetch = false;
    let isCachedRendered = false;

    if (!globalVehicles || globalVehicles.length === 0) {
        needsFetch = true;
        try {
            let cached = (typeof dalCacheGetFleet_ === 'function') ? dalCacheGetFleet_() : null;
            if (!cached) {
                let cachedRaw = localStorage.getItem('sm_fleet_cache');
                if (cachedRaw) cached = JSON.parse(cachedRaw);
            }
            if (cached) {
                globalVehicles = cached || [];
                if (globalVehicles.length > 0) {
                    renderVehicles();
                    if (typeof populateTruckSelector === 'function') populateTruckSelector();
                    isCachedRendered = true;
                }
            }
        } catch(e) {}
    }

    if (needsFetch) {
        if (!isCachedRendered) {
            container.innerHTML = '<div style="text-align:center; padding: 40px; color: #10b981; font-weight:bold;">Decrypting Fleet Data...</div>';
        }
        google.script.run.withSuccessHandler(res => {
            globalVehicles = res || [];
            try {
                if (typeof dalCacheSetFleet_ === 'function') dalCacheSetFleet_(globalVehicles);
                else localStorage.setItem('sm_fleet_cache', JSON.stringify(globalVehicles));
            } catch(e) {}
            renderVehicles();
            if (typeof populateTruckSelector === 'function') populateTruckSelector();
        }).getVehiclesVault();
    } else {
        renderVehicles();
    }
}

function renderVehicles() {
    const container = document.getElementById('vehicle-list-container');
    if (!globalVehicles || globalVehicles.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding: 40px; color: #888;">No vehicles found. Click "ADD NEW VEHICLE" to start.</div>';
        return;
    }
    
    let html = '';
    globalVehicles.forEach(v => {
        let isGen = (v.isGeneric === true || v.isGeneric === "true");
        let plateHtml = isGen ? `<span style="background:rgba(245,158,11,0.1); color:#f59e0b; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:bold; border:1px dashed #f59e0b;">GENERIC / RANDOM</span>` 
                              : `<span style="color:#a1a1aa; font-family:monospace; background:#111; padding:2px 6px; border-radius:4px; border:1px solid #333;">${v.plate || 'No Plate'}</span>`;
                              
        html += `
        <div style="background:#1a1a1e; border:1px solid #333; padding:15px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; transition:0.2s;" onmouseover="this.style.borderColor='#3b82f6'" onmouseout="this.style.borderColor='#333'">
            <div>
                <div style="color:#fff; font-weight:900; font-size:15px; margin-bottom:4px; display:flex; align-items:center; gap:10px;">
                    <span>🚛 ${v.name}</span>
                    ${plateHtml}
                </div>
                <div style="color:#888; font-size:11px; display:flex; gap:15px;">
                    <span><b>Vendor:</b> ${v.vendor || 'Internal'}</span>
                    <span><b>Dims:</b> ${v.l || 0}m x ${v.w || 0}m x ${v.h || 0}m</span>
                    <span><b>Payload:</b> ${v.kg || 0}kg</span>
                    <span><b>Vol:</b> ${v.vol || 0}m³</span>
                    ${v.lift ? `<span style="color:#10b981;"><b>Lift:</b> ${v.lift}kg</span>` : ''}
                </div>
            </div>
            <button class="btn-outline btn-sm" style="margin:0; border-color:#3b82f6; color:#3b82f6;" onclick="openVehicleModal('${v.id}')">EDIT</button>
        </div>`;
    });
    container.innerHTML = html;
}

function openVehicleModal(id = null) {
    document.querySelectorAll('#vehicle-modal-overlay input').forEach(i => { if (i.type !== 'checkbox') i.value = ''; });
    document.getElementById('veh-generic').checked = false;
    
    if (id) {
        let v = globalVehicles.find(x => x.id === id);
        if (v) {
            document.getElementById('veh-id').value = v.id;
            document.getElementById('veh-name').value = v.name;
            document.getElementById('veh-generic').checked = (v.isGeneric === true || v.isGeneric === "true");
            document.getElementById('veh-plate').value = v.plate || '';
            document.getElementById('veh-model').value = v.model || '';
            document.getElementById('veh-vendor').value = v.vendor || '';
            document.getElementById('veh-l').value = v.l || '';
            document.getElementById('veh-w').value = v.w || '';
            document.getElementById('veh-h').value = v.h || '';
            document.getElementById('veh-kg').value = v.kg || '';
            document.getElementById('veh-vol').value = v.vol || '';
            document.getElementById('veh-lift').value = v.lift || '';
        }
        document.getElementById('veh-modal-title').innerText = "🚛 Edit Vehicle";
        document.getElementById('btn-del-veh').style.display = "block";
    } else {
        document.getElementById('veh-modal-title').innerText = "🚛 Provision Vehicle";
        document.getElementById('btn-del-veh').style.display = "none";
    }
    
    toggleGenericVehicle();
    document.getElementById('vehicle-modal-overlay').style.display = 'flex';
}

function toggleGenericVehicle() {
    let isGen = document.getElementById('veh-generic').checked;
    document.getElementById('veh-specific-fields').style.display = isGen ? 'none' : 'flex';
}

function calcVehicleVolume() {
    let l = parseFloat(document.getElementById('veh-l').value) || 0;
    let w = parseFloat(document.getElementById('veh-w').value) || 0;
    let h = parseFloat(document.getElementById('veh-h').value) || 0;
    if (l > 0 && w > 0 && h > 0) {
        document.getElementById('veh-vol').value = (l * w * h).toFixed(2);
    }
}

function saveVehicle() {
    let name = document.getElementById('veh-name').value.trim();
    if (!name) return alert("Vehicle name is required.");
    
    let btn = document.getElementById('btn-save-veh');
    let origText = btn.innerText;
    btn.innerText = "SAVING..."; btn.disabled = true;
    
    let payload = {
        id: document.getElementById('veh-id').value,
        name: name,
        isGeneric: document.getElementById('veh-generic').checked,
        plate: document.getElementById('veh-plate').value.trim(),
        model: document.getElementById('veh-model').value.trim(),
        vendor: document.getElementById('veh-vendor').value.trim(),
        l: document.getElementById('veh-l').value,
        w: document.getElementById('veh-w').value,
        h: document.getElementById('veh-h').value,
        kg: document.getElementById('veh-kg').value,
        vol: document.getElementById('veh-vol').value,
        lift: document.getElementById('veh-lift').value
    };
    
    google.script.run.withSuccessHandler(res => {
        btn.innerText = origText; btn.disabled = false;
        document.getElementById('vehicle-modal-overlay').style.display = 'none';
        loadVehicles();
    }).withFailureHandler(err => {
        btn.innerText = origText; btn.disabled = false;
        alert("Error: " + err.message);
    }).saveVehicleVault(payload, ACTIVE_USER_NAME);
}

function deleteVehicle() {
    let id = document.getElementById('veh-id').value;
    if (!id) return;
    if (!confirm("Are you sure you want to delete this vehicle?")) return;
    
    let btn = document.getElementById('btn-del-veh');
    let origText = btn.innerText;
    btn.innerText = "DELETING..."; btn.disabled = true;
    
    google.script.run.withSuccessHandler(() => {
        btn.innerText = origText; btn.disabled = false;
        document.getElementById('vehicle-modal-overlay').style.display = 'none';
        loadVehicles();
    }).deleteVehicleVault(id, ACTIVE_USER_NAME);
}
</script>
