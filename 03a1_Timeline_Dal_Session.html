<!-- DAL Phase 4 Slice C — Timeline collab session UI (open/close + banner; live multi-drag later) -->
<script>
window.dalTimelineSessionOpen = false;

window.dalTimelineInfoFromSession_ = function(info) {
  if (!info) return { status: '', sessionType: 'timelineCollab', sessionUid: '' };
  // Prefer flat dual-domain fields (reliable when prep + timeline both open).
  if (info.timelineStatus !== undefined && info.timelineStatus !== null) {
    return {
      status: String(info.timelineStatus || ''),
      sessionUid: String(info.timelineUid || ''),
      openedAt: info.timelineOpenedAt || '',
      openedBy: info.timelineOpenedBy || '',
      sessionType: 'timelineCollab'
    };
  }
  if (info.timeline && typeof info.timeline === 'object') {
    return {
      status: String(info.timeline.status || ''),
      sessionUid: String(info.timeline.sessionUid || ''),
      openedAt: info.timeline.openedAt || '',
      openedBy: info.timeline.openedBy || '',
      sessionType: 'timelineCollab'
    };
  }
  // Single-domain legacy only when flat session is timelineCollab (not prep).
  if (String(info.sessionType || '') === 'timelineCollab') {
    return {
      status: String(info.status || ''),
      sessionUid: String(info.sessionUid || ''),
      openedAt: info.openedAt || '',
      openedBy: info.openedBy || '',
      sessionType: 'timelineCollab'
    };
  }
  return { status: '', sessionType: 'timelineCollab', sessionUid: '' };
};

window.refreshTimelineDalBanner = function() {
  var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
  var banner = document.getElementById('dal-timeline-session-banner');
  var startBtn = document.getElementById('dal-timeline-start-btn');
  var endBtn = document.getElementById('dal-timeline-end-btn');
  if (!projectId || projectId === 'NEW') {
    if (banner) banner.style.display = 'none';
    if (startBtn) startBtn.style.display = 'none';
    if (endBtn) endBtn.style.display = 'none';
    var panel = document.getElementById('tl-sync-panel');
    if (panel) panel.style.display = 'none';
    return;
  }
  if (typeof canDrawPhases === 'function' && !canDrawPhases()) {
    if (startBtn) startBtn.style.display = 'none';
    if (endBtn) endBtn.style.display = 'none';
  }

  google.script.run
    .withFailureHandler(function() { /* keep current */ })
    .withSuccessHandler(function(info) {
      if (typeof window.dalHandleTimelineSessionInfo_ === 'function') {
        window.dalHandleTimelineSessionInfo_(info);
        return;
      }
      var tl = window.dalTimelineInfoFromSession_(info);
      var st = tl ? String(tl.status).toLowerCase() : '';
      var isOpen = st === 'open';
      var isOpening = st === 'opening';
      if (typeof window.dalApplyTimelineSessionUi_ === 'function') {
        window.dalApplyTimelineSessionUi_(isOpen, isOpening);
        return;
      }
      window.dalTimelineSessionOpen = !!isOpen;
      if (banner) banner.style.display = 'none';
      if (startBtn) startBtn.style.display = (isOpen || isOpening || (typeof currentIsReadOnly !== 'undefined' && currentIsReadOnly)) ? 'none' : 'inline-flex';
      if (endBtn) endBtn.style.display = (isOpen || isOpening) ? 'inline-flex' : 'none';
    })
    .getDalSessionInfo(projectId);
};

function dalTimelineErrMsg_(err) {
  var msg = (err && err.message) ? String(err.message) : String(err || 'Unknown error');
  if (msg.indexOf('Database Lockout') === 0) {
    msg = msg.replace(/^Database Lockout after \d+ attempts:\s*/, '');
  }
  if (msg.indexOf('Error: ') === 0) msg = msg.slice(7);
  if (/timed out|Timeout|timeout/i.test(msg)) {
    return msg + '\n\nWait a few seconds and click START COLLAB again — a stuck open clears automatically after ~90s.';
  }
  return msg;
}

function dalTimelineCollabStarted_(joined) {
  window.dalTimelineSessionOpen = true;
  window.dalTlWasSessionOpen = true;
  if (typeof window.dalApplyTimelineSessionUi_ === 'function') {
    window.dalApplyTimelineSessionUi_(true, false);
  } else {
    window.refreshTimelineDalBanner();
  }
  var projectId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '';
  if (projectId && typeof window.startDalTimelineStateSync_ === 'function') {
    window.startDalTimelineStateSync_(projectId);
  }
  alert(joined
    ? 'Joined timeline collaboration — edits sync live to Firebase (SAVE optional).'
    : 'Timeline collaboration started — edits sync live to Firebase (SAVE optional).');
}

function dalTimelineFinishOpen_(projectId, sessionUid, actor, layer) {
  google.script.run
    .withFailureHandler(function(err) {
      if (layer) layer.style.cursor = '';
      // finish may still succeed after client timeout — poll once
      google.script.run
        .withFailureHandler(function() {
          alert('Start timeline collab failed:\n\n' + dalTimelineErrMsg_(err));
        })
        .withSuccessHandler(function(info) {
          var tl = window.dalTimelineInfoFromSession_(info);
          if (String(tl.status).toLowerCase() === 'open') {
            dalTimelineCollabStarted_(true);
            return;
          }
          if (String(tl.status).toLowerCase() === 'opening') {
            alert('Timeline collab is still opening. Wait ~10 seconds, then click START COLLAB again.');
            return;
          }
          alert('Start timeline collab failed:\n\n' + dalTimelineErrMsg_(err));
        })
        .getDalSessionInfo(projectId);
    })
    .withSuccessHandler(function(res) {
      if (layer) layer.style.cursor = '';
      dalTimelineCollabStarted_(!!(res && res.joined));
    })
    .finishDalSession(projectId, sessionUid, actor);
}

window.openDalTimelineCollabSession = function(opts) {
  opts = opts || {};
  var projectId = document.getElementById('edit-folder-id').value;
  if (!projectId || projectId === 'NEW') return alert('Save the project first.');
  if (typeof window.dalIsLiveForkExcluded_ === 'function' && window.dalIsLiveForkExcluded_()) {
    return alert('Live timeline collaboration is not available for freelancer accounts.');
  }
  if (typeof window.dalMayManualStartFork_ === 'function' && !window.dalMayManualStartFork_('timeline')) {
    return alert('You cannot start timeline collaboration on this device.');
  }
  if (!opts.auto) {
    if (!confirm('Start timeline collaboration? Timeline saves fork to Firebase until End Collab.')) return;
  }
  var layer = document.getElementById('shift-layer');
  if (layer) layer.style.cursor = 'wait';
  var actor = typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System';

  // Split begin/finish so each google.script.run stays under the ~30s client limit.
  google.script.run
    .withFailureHandler(function(err) {
      if (layer) layer.style.cursor = '';
      // Already-open often surfaces as failure only if begin threw — re-check join.
      google.script.run
        .withFailureHandler(function() {
          alert('Start timeline collab failed:\n\n' + dalTimelineErrMsg_(err));
        })
        .withSuccessHandler(function(info) {
          var tl = window.dalTimelineInfoFromSession_(info);
          if (String(tl.status).toLowerCase() === 'open') {
            dalTimelineCollabStarted_(true);
            return;
          }
          alert('Start timeline collab failed:\n\n' + dalTimelineErrMsg_(err));
        })
        .getDalSessionInfo(projectId);
    })
    .withSuccessHandler(function(begin) {
      if (begin && begin.joined) {
        if (layer) layer.style.cursor = '';
        dalTimelineCollabStarted_(true);
        return;
      }
      if (!begin || !begin.sessionUid) {
        if (layer) layer.style.cursor = '';
        alert('Start timeline collab failed:\n\nNo session reserved.');
        return;
      }
      dalTimelineFinishOpen_(projectId, begin.sessionUid, actor, layer);
    })
    .beginDalSession(projectId, 'timelineCollab', actor);
};

window.closeDalTimelineCollabSession = function() {
  var projectId = document.getElementById('edit-folder-id').value;
  if (!confirm('End timeline collaboration and commit shifts/phases back to Google Sheets?')) return;
  var layer = document.getElementById('shift-layer');
  if (layer) layer.style.cursor = 'wait';
  var actor = typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System';
  google.script.run
    .withFailureHandler(function(err) {
      if (layer) layer.style.cursor = '';
      google.script.run
        .withFailureHandler(function() {
          alert('End timeline collab failed:\n\n' + dalTimelineErrMsg_(err));
        })
        .withSuccessHandler(function(info) {
          var tl = window.dalTimelineInfoFromSession_(info);
          var status = tl ? String(tl.status).toLowerCase() : '';
          if (!status || status === 'normal' || status === '') {
            window.dalTimelineSessionOpen = false;
            window.refreshTimelineDalBanner();
            alert('Timeline collaboration ended (server finished after the client wait).');
            return;
          }
          alert('End timeline collab failed:\n\n' + dalTimelineErrMsg_(err));
        })
        .getDalSessionInfo(projectId);
    })
    .withSuccessHandler(function() {
      if (layer) layer.style.cursor = '';
      window.dalTimelineSessionOpen = false;
      window.dalTlWasSessionOpen = false;
      if (typeof window.stopDalTimelineStateSync_ === 'function') window.stopDalTimelineStateSync_();
      if (typeof window.dalCacheInvalidateTimeline_ === 'function') window.dalCacheInvalidateTimeline_(projectId);
      window.refreshTimelineDalBanner();
      alert('Timeline collaboration ended — committed to Sheets.');
    })
    .closeDalSession(projectId, actor, 'timelineCollab');
};
</script>
