<!-- @INDEX: STATION -> Vault record RFID (2/2) -->
<script>

/**
 * Logical-parent rollup: identical unique units (same name|manufacturer|length) collapse under
 * one folder line — mirrors renderAssetRegistry in the real vault (06b1). Bulk rows stay standalone
 * (keyed by id) because they can't carry per-piece RFID. Returns [{ key, items:[...] }].
 */
function stationVaultBuildGroups_(items) {
  const map = {};
  const groups = [];
  (items || []).forEach(function(a) {
    let key = (a.name || 'Unnamed') + '|' + (a.manufacturer || '') + '|' + (a.length || '');
    if (a.isBulk) key += '|' + a.id;
    if (!map[key]) { map[key] = { key: key, items: [] }; groups.push(map[key]); }
    map[key].items.push(a);
  });
  return groups;
}

/** Which unit ids inside a group still need a tag (drives untagged-only cascade recording). */
function stationVaultUntaggedIds_(group) {
  return (group.items || []).filter(function(x) { return !x.isBulk && !String(x.rfidTag || '').trim(); }).map(function(x) { return String(x.id); });
}

function stationVaultRowHtml_(it, isChild) {
  const statusLabel = it.status || 'Active';
  const color = stationVaultStatusColor_(statusLabel);
  const idAttr = stationVaultEsc_(it.id);
  return '<div class="station-vault-row' + (isChild ? ' is-child' : '') + '" onclick="stationVaultOpenSheet_(\'' + idAttr + '\')">'
    + '<span class="station-vault-row__name">' + stationVaultEsc_(it.name || 'Unnamed') + '</span>'
    + (it.unitNumber ? '<span class="station-vault-row__unit">#' + stationVaultEsc_(it.unitNumber) + '</span>' : '')
    + '<span class="station-vault-row__status" style="color:' + color + '; border-color:' + color + ';">' + stationVaultEsc_(statusLabel) + '</span>'
    + '</div>';
}

function stationVaultRenderList_() {
  const listEl = document.getElementById('station-vault-list');
  const statusEl = document.getElementById('station-vault-status');
  if (!listEl) return;
  const q = (document.getElementById('station-vault-search') || {}).value || '';
  const needle = q.trim().toLowerCase();
  let items = window.stationVaultItems || [];
  if (needle) {
    items = items.filter(function(it) {
      return (String(it.name || '') + ' ' + String(it.unitNumber || '') + ' ' + String(it.rfidTag || '')).toLowerCase().indexOf(needle) !== -1;
    });
  }
  if (!items.length) {
    if (statusEl) { statusEl.style.display = 'block'; statusEl.textContent = (window.stationVaultItems || []).length ? 'No matches.' : 'Vault is empty.'; }
    listEl.innerHTML = '';
    window.stationVaultGroups = [];
    return;
  }
  if (statusEl) statusEl.style.display = 'none';

  let groups = stationVaultBuildGroups_(items).slice(0, 250);
  window.stationVaultGroups = groups;
  if (!window.stationVaultExpanded) window.stationVaultExpanded = {};
  const expanded = window.stationVaultExpanded;

  let html = '';
  groups.forEach(function(g, gi) {
    if (g.items.length === 1) {
      html += stationVaultRowHtml_(g.items[0], false);
      return;
    }
    // Folder line: identical units collapsed under a logical parent (▶ triangle expands).
    const a = g.items[0];
    const mixedStatus = !g.items.every(function(x) { return x.status === a.status; });
    const statusLabel = mixedStatus ? 'Mixed' : (a.status || 'Active');
    const color = mixedStatus ? '#888' : stationVaultStatusColor_(statusLabel);
    const isOpen = needle ? true : !!expanded[g.key];
    html += '<div class="station-vault-row is-group" onclick="stationVaultOpenGroupSheet_(' + gi + ')">'
      + '<span class="station-vault-row__caret' + (isOpen ? ' is-open' : '') + '" onclick="event.stopPropagation(); stationVaultToggleGroup_(' + gi + ')">&#9654;</span>'
      + '<span class="station-vault-row__name">' + stationVaultEsc_(a.name || 'Unnamed') + '</span>'
      + '<span class="station-vault-row__count">' + g.items.length + '</span>'
      + '<span class="station-vault-row__status" style="color:' + color + '; border-color:' + color + ';">' + stationVaultEsc_(statusLabel) + '</span>'
      + '</div>';
    html += '<div class="station-vault-children" id="station-vault-grp-' + gi + '" style="display:' + (isOpen ? 'block' : 'none') + ';">';
    g.items.forEach(function(child) { html += stationVaultRowHtml_(child, true); });
    html += '</div>';
  });
  listEl.innerHTML = html;
}

window.stationVaultToggleGroup_ = function(gi) {
  const groups = window.stationVaultGroups || [];
  const g = groups[gi];
  if (!g) return;
  if (!window.stationVaultExpanded) window.stationVaultExpanded = {};
  const nowOpen = !window.stationVaultExpanded[g.key];
  window.stationVaultExpanded[g.key] = nowOpen;
  const box = document.getElementById('station-vault-grp-' + gi);
  if (box) box.style.display = nowOpen ? 'block' : 'none';
  const row = box && box.previousElementSibling;
  const caret = row && row.querySelector('.station-vault-row__caret');
  if (caret) caret.classList.toggle('is-open', nowOpen);
};

/* ---- Vault action sheet (tap a line or a folder) ---- */
// { type:'unit'|'group', unitIds:[...], name:'', canRecord:bool }
window.stationVaultActive = null;

/** Tap a single unit line. */
window.stationVaultOpenSheet_ = function(assetId) {
  const it = (window.stationVaultItems || []).find(function(x) { return String(x.id) === String(assetId); });
  if (!it) return;
  const canRec = window.stationVaultCanRecord && !it.isBulk;
  window.stationVaultActive = { type: 'unit', unitIds: [String(assetId)], name: it.name || 'Unnamed', canRecord: canRec };
  const bits = [];
  if (it.unitNumber) bits.push('Unit #' + it.unitNumber);
  bits.push('Status: ' + (it.status || 'Active'));
  if (it.statusNote) bits.push('Problem: ' + it.statusNote);
  bits.push(it.rfidTag ? ('Tag: ' + it.rfidTag) : (it.isBulk ? 'Bulk — no per-piece tag' : 'No tag yet'));
  stationVaultShowSheet_(it.name || 'Unnamed', bits.join('  ·  '), canRec ? 'Record RFID' : '');
};

/** Tap a collapsed folder (logical parent of identical units). */
window.stationVaultOpenGroupSheet_ = function(gi) {
  const g = (window.stationVaultGroups || [])[gi];
  if (!g) return;
  const a = g.items[0];
  const unitIds = g.items.filter(function(x) { return !x.isBulk; }).map(function(x) { return String(x.id); });
  const untagged = stationVaultUntaggedIds_(g);
  const canRec = window.stationVaultCanRecord && untagged.length > 0;
  window.stationVaultActive = { type: 'group', unitIds: unitIds, untaggedIds: untagged, name: a.name || 'Unnamed', canRecord: canRec };
  const bits = [g.items.length + ' identical units', (g.items.length - untagged.length) + ' tagged', untagged.length + ' untagged'];
  const recLabel = untagged.length ? ('Record RFID · ' + untagged.length + ' to tag') : '';
  stationVaultShowSheet_(a.name || 'Unnamed', bits.join('  ·  '), recLabel);
};

function stationVaultShowSheet_(title, meta, recordLabel) {
  const titleEl = document.getElementById('station-vault-sheet-title');
  const metaEl = document.getElementById('station-vault-sheet-meta');
  const recBtn = document.getElementById('station-vault-act-record');
  const noteEl = document.getElementById('station-vault-sheet-note');
  window.stationVaultPendingDamaged = false;
  if (titleEl) titleEl.textContent = title;
  if (metaEl) metaEl.textContent = meta;
  if (noteEl) { noteEl.style.display = 'none'; noteEl.value = ''; }
  if (recBtn) {
    recBtn.style.display = recordLabel ? 'block' : 'none';
    recBtn.textContent = recordLabel || 'Record RFID';
  }
  const sheet = document.getElementById('station-vault-sheet');
  if (sheet) sheet.classList.add('is-open');
}

window.stationVaultCloseSheet_ = function() {
  window.stationVaultActive = null;
  const sheet = document.getElementById('station-vault-sheet');
  if (sheet) sheet.classList.remove('is-open');
};

window.stationVaultSheetStatus_ = function(status) {
  const act = window.stationVaultActive;
  if (!act || !act.unitIds.length) return;
  if (status === 'Damaged') {
    const noteEl = document.getElementById('station-vault-sheet-note');
    if (!window.stationVaultPendingDamaged) {
      window.stationVaultPendingDamaged = true;
      if (noteEl) {
        noteEl.style.display = 'block';
        const first = (window.stationVaultItems || []).find(function(x) { return String(x.id) === String(act.unitIds[0]); });
        noteEl.value = (first && first.statusNote) ? first.statusNote : '';
        noteEl.focus();
      }
      stationSetStatus_('Describe the problem, then tap Damaged again to save.', '');
      return;
    }
    const note = noteEl ? noteEl.value.trim() : '';
    if (!note) { alert('Describe what is wrong (e.g. gobo rotation error).'); if (noteEl) noteEl.focus(); return; }
    window.stationVaultPendingDamaged = false;
    stationVaultCloseSheet_();
    stationVaultSetStatusMany_(act.unitIds, status, note);
    return;
  }
  window.stationVaultPendingDamaged = false;
  stationVaultCloseSheet_();
  stationVaultSetStatusMany_(act.unitIds, status);
};

window.stationVaultSheetRecord_ = function() {
  const act = window.stationVaultActive;
  if (!act) return;
  stationVaultCloseSheet_();
  // Groups cascade through the still-untagged units; a single unit records just itself.
  const ids = act.type === 'group' ? (act.untaggedIds || []) : act.unitIds;
  stationVaultStartRecord_(ids);
};

/** Apply a status to one or many units sequentially, then re-render once. */
window.stationVaultSetStatusMany_ = function(ids, status, note) {
  const host = stationReadHostSession_();
  if (!host) { stationCloseVault(); stationSetStatus_('Scan your badge first.', 'error'); return; }
  stationResetHostIdleTimer_();
  const queue = (ids || []).slice();
  let failed = 0;
  function next() {
    if (!queue.length) {
      stationVaultRenderList_();
      if (failed) alert(failed + ' unit(s) could not be updated.');
      stationRefreshEquipMap_();
      return;
    }
    const assetId = queue.shift();
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.success) {
          const it = (window.stationVaultItems || []).find(function(x) { return String(x.id) === String(assetId); });
          if (it) {
            it.status = res.status;
            it.statusNote = res.statusNote || '';
          }
          stationPanelUpdateEquipEntry_(assetId, res.status, res.statusNote);
        } else { failed++; }
        next();
      })
      .withFailureHandler(function() { failed++; next(); })
      .setStationAssetStatus(ACTIVE_USER_NAME, host.name, assetId, status, note || '');
  }
  next();
};

/** Arm record mode with a queue of unit ids (cascade). */
window.stationVaultStartRecord_ = function(ids) {
  if (!window.stationVaultCanRecord) { alert('Only managers can record equipment RFIDs.'); return; }
  const host = stationReadHostSession_();
  if (!host) { stationCloseVault(); stationSetStatus_('Scan your badge first.', 'error'); return; }
  const list = (ids || []).map(String);
  if (!list.length) { alert('Nothing to tag — every unit already has a tag.'); return; }
  const names = {};
  list.forEach(function(id) {
    const it = (window.stationVaultItems || []).find(function(x) { return String(x.id) === id; });
    names[id] = it ? ((it.name || id) + (it.unitNumber ? ' #' + it.unitNumber : '')) : id;
  });
  window.stationVaultRecord = { queue: list, names: names };
  stationVaultRenderRecordBar_();
};

function stationVaultRenderRecordBar_() {
  const bar = document.getElementById('station-vault-record-bar');
  const txt = document.getElementById('station-vault-record-text');
  const rec = window.stationVaultRecord;
  if (!bar) return;
  if (!rec || !rec.queue.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  const id = rec.queue[0];
  const remain = rec.queue.length > 1 ? (' · ' + (rec.queue.length - 1) + ' more after') : '';
  if (txt) txt.textContent = 'Pull the trigger on the tag for: ' + (rec.names[id] || id) + remain;
}

window.stationVaultCancelRecord_ = function() {
  window.stationVaultRecord = null;
  window.stationCrewRecord = null;
  window.stationPendingOverwrite_ = null;
  const ow = document.getElementById('station-vault-record-overwrite');
  if (ow) ow.style.display = 'none';
  stationVaultRenderRecordBar_();
};

/**
 * A scanned tag came back already-owned. Reconfigure the record bar into an Overwrite / Cancel
 * confirm, stashing the retry (which re-issues the same write with force=true = steal the tag).
 */
function stationShowOverwritePrompt_(owner, retryFn) {
  window.stationPendingOverwrite_ = retryFn;
  const bar = document.getElementById('station-vault-record-bar');
  const txt = document.getElementById('station-vault-record-text');
  const ow = document.getElementById('station-vault-record-overwrite');
  if (bar) bar.style.display = 'flex';
  if (txt) txt.textContent = 'Tag already on ' + (owner.kind === 'crew' ? 'crew: ' : '') + (owner.name || 'another record') + '. Overwrite (move it here) or Cancel?';
  if (ow) ow.style.display = 'inline-block';
}

window.stationVaultConfirmOverwrite_ = function() {
  const fn = window.stationPendingOverwrite_;
  window.stationPendingOverwrite_ = null;
  const ow = document.getElementById('station-vault-record-overwrite');
  if (ow) ow.style.display = 'none';
  if (typeof fn === 'function') fn();
};

/** Consume a scan into the current record target. Returns true if the scan was used. */
function stationVaultConsumeScan_(tag) {
  const rec = window.stationVaultRecord;
  if (!rec || !rec.queue.length) return false;
  if (window.stationVaultRecordBusy) return true; // swallow scans while a save is in flight
  const host = stationReadHostSession_();
  if (!host) { stationVaultCancelRecord_(); return true; }
  const assetId = rec.queue[0];
  stationVaultRecordCall_(assetId, tag, false);
  return true;
}

/** The actual record write, split out so the Overwrite button can re-issue it with force=true. */
function stationVaultRecordCall_(assetId, tag, force) {
  const host = stationReadHostSession_();
  if (!host) { stationVaultCancelRecord_(); return; }
  window.stationVaultRecordBusy = true;
  stationResetHostIdleTimer_();
  const rec = window.stationVaultRecord;
  const label = (rec && rec.names && rec.names[assetId]) ? rec.names[assetId] : assetId;
  const txt = document.getElementById('station-vault-record-text');
  if (txt) txt.textContent = (force ? 'Overwriting tag for ' : 'Saving tag for ') + label + '…';
  google.script.run
    .withSuccessHandler(function(res) {
      window.stationVaultRecordBusy = false;
      if (res && res.duplicate) {
        stationShowOverwritePrompt_(res.duplicate, function() { stationVaultRecordCall_(assetId, tag, true); });
        return;
      }
      if (!res || !res.success) {
        if (txt) txt.textContent = ((res && res.error) ? res.error : 'Record failed.') + ' Try again or Cancel.';
        return;
      }
      const it = (window.stationVaultItems || []).find(function(x) { return String(x.id) === String(assetId); });
      if (it) it.rfidTag = res.rfidTag;
      // Refresh the live-strip resolver so the new tag shows a name immediately.
      stationRefreshEquipMap_();
      const cur = window.stationVaultRecord;
      if (cur && cur.queue.length) cur.queue.shift();
      stationVaultRenderList_();
      window.stationVaultRecord = (cur && cur.queue.length) ? cur : null;
      stationVaultRenderRecordBar_();
    })
    .withFailureHandler(function(err) {
      window.stationVaultRecordBusy = false;
      if (txt) txt.textContent = 'Error: ' + (err && err.message ? err.message : String(err)) + ' — Cancel to stop.';
    })
    .recordStationAssetRfid(ACTIVE_USER_NAME, host.name, assetId, tag, !!force);
}

/* ==========================================================================
   VAULT → CREW TAB (ROOT only): assign / overwrite crew badge RFIDs
   ========================================================================== */
window.stationVaultCrew = null;   // cached crew list [{uid,name,rfidTag}]
window.stationCrewRecord = null;  // { ref, name } while armed for a crew badge scan

</script>
