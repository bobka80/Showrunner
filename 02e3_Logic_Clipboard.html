<script>
/**
 * 02e3_Logic_Clipboard.html
 * Domain: Cut, Copy, and Paste Engine for bulk asset manipulation.
 */

window.dalPaMarkGroupCutCopy_ = function(flag, qtyField) {
    if (!window.selectedPaGroups || window.selectedPaGroups.size === 0) return false;
    var any = false;
    window.selectedPaGroups.forEach(function(key) {
        var g = window.dalPaParseGroupKey_(key);
        currentProjectAssets.forEach(function(pa) {
            var pLoc = pa.location || 'General';
            var pForm = pa.formula || 'Standalone';
            if (pLoc === g.location && pForm === g.formula) {
                pa[flag] = true;
                delete pa[qtyField];
                any = true;
            }
        });
    });
    window.selectedPaGroups.clear();
    return any;
};

// @INDEX: PA_LOGIC -> Cut/Copy/Paste Engine
window.cutSelectedPa = function() {
    try {
    let anyCut = false;
    currentProjectAssets.forEach(pa => { pa.isCopied = false; pa.isCut = false; delete pa.cutQty; delete pa.copiedQty; });

    // Header-selected sublists: cut every fixture in those groups.
    if (typeof window.dalPaMarkGroupCutCopy_ === 'function') {
        if (window.dalPaMarkGroupCutCopy_('isCut', 'cutQty')) anyCut = true;
    }

    if (window.selectedPaIndices.size > 0) {
        let indices = Array.from(window.selectedPaIndices);
        for (let idx of indices) {
            if (currentProjectAssets[idx]) {
                let pa = currentProjectAssets[idx];
                let maxQ = parseInt(pa.qty, 10);
                let qToCut = maxQ;
                if (indices.length === 1 && maxQ > 1 && window.selectedSummedIds.size === 0) {
                    let input = prompt(`How many units to CUT? (1 - ${maxQ})`, maxQ);
                    if (input === null) { currentProjectAssets.forEach(p => p.isCut = false); return; }
                    qToCut = parseInt(input, 10);
                    if (isNaN(qToCut) || qToCut <= 0 || qToCut > maxQ) return alert("Invalid quantity.");
                }
                pa.isCut = true;
                if (qToCut < maxQ) pa.cutQty = qToCut;
                anyCut = true;
            }
        }
        window.selectedPaIndices.clear();
    }
    if (window.selectedSummedIds.size > 0) {
        let ids = Array.from(window.selectedSummedIds);
        for (let id of ids) {
            let matchingPas = currentProjectAssets.filter(pa => pa.assetId === id && pa.formula === "Standalone");
            let totalQ = matchingPas.reduce((sum, p) => sum + parseInt(p.qty, 10), 0);
            let qToCut = totalQ;
            if (ids.length === 1 && totalQ > 1 && window.selectedPaIndices.size === 0) {
                let input = prompt(`How many units to CUT? (1 - ${totalQ})`, totalQ);
                if (input === null) { currentProjectAssets.forEach(p => p.isCut = false); return; }
                qToCut = parseInt(input, 10);
                if (isNaN(qToCut) || qToCut <= 0 || qToCut > totalQ) return alert("Invalid quantity.");
            }
            let rem = qToCut;
            matchingPas.forEach(pa => {
                if (rem <= 0) return;
                let pq = parseInt(pa.qty, 10);
                pa.isCut = true;
                if (pq > rem) { pa.cutQty = rem; rem = 0; }
                else { rem -= pq; }
            });
            anyCut = true;
        }
        window.selectedSummedIds.clear();
    }
    window.lastSelectedPaIndex = null;
    window.lastSelectedSummedId = null;
    window.paPasteSublistTarget = null;
    if (anyCut) renderProjectAssetsUI();
    } catch(err) { console.error("cutSelectedPa Error:", err); alert("Error cutting items: " + err.message); }
}

window.copySelectedPa = function() {
    try {
    let anyCopied = false;
    currentProjectAssets.forEach(pa => { pa.isCut = false; pa.isCopied = false; delete pa.cutQty; delete pa.copiedQty; });

    if (typeof window.dalPaMarkGroupCutCopy_ === 'function') {
        if (window.dalPaMarkGroupCutCopy_('isCopied', 'copiedQty')) anyCopied = true;
    }

    if (window.selectedPaIndices.size > 0) {
        let indices = Array.from(window.selectedPaIndices);
        for (let idx of indices) {
            if (currentProjectAssets[idx]) {
                let pa = currentProjectAssets[idx];
                let maxQ = parseInt(pa.qty, 10);
                let qToCopy = maxQ;
                if (indices.length === 1 && maxQ > 1 && window.selectedSummedIds.size === 0) {
                    let input = prompt(`How many units to COPY? (1 - ${maxQ})`, maxQ);
                    if (input === null) { currentProjectAssets.forEach(p => p.isCopied = false); return; }
                    qToCopy = parseInt(input, 10);
                    if (isNaN(qToCopy) || qToCopy <= 0 || qToCopy > maxQ) return alert("Invalid quantity.");
                }
                pa.isCopied = true;
                if (qToCopy < maxQ) pa.copiedQty = qToCopy;
                anyCopied = true;
            }
        }
        window.selectedPaIndices.clear();
    }
    if (window.selectedSummedIds.size > 0) {
        let ids = Array.from(window.selectedSummedIds);
        for (let id of ids) {
            let matchingPas = currentProjectAssets.filter(pa => pa.assetId === id && pa.formula === "Standalone");
            let totalQ = matchingPas.reduce((sum, p) => sum + parseInt(p.qty, 10), 0);
            let qToCopy = totalQ;
            if (ids.length === 1 && totalQ > 1 && window.selectedPaIndices.size === 0) {
                let input = prompt(`How many units to COPY? (1 - ${totalQ})`, totalQ);
                if (input === null) { currentProjectAssets.forEach(p => p.isCopied = false); return; }
                qToCopy = parseInt(input, 10);
                if (isNaN(qToCopy) || qToCopy <= 0 || qToCopy > totalQ) return alert("Invalid quantity.");
            }
            let rem = qToCopy;
            matchingPas.forEach(pa => {
                if (rem <= 0) return;
                let pq = parseInt(pa.qty, 10);
                pa.isCopied = true;
                if (pq > rem) { pa.copiedQty = rem; rem = 0; }
                else { rem -= pq; }
            });
            anyCopied = true;
        }
        window.selectedSummedIds.clear();
    }
    window.lastSelectedPaIndex = null;
    window.lastSelectedSummedId = null;
    window.paPasteSublistTarget = null;
    if (anyCopied) renderProjectAssetsUI();
    } catch(err) { console.error("copySelectedPa Error:", err); alert("Error copying items: " + err.message); }
}

window.dalPaResolvePasteDest_ = function() {
    if (window.paPasteSublistTarget && window.paPasteSublistTarget.location != null) {
        return {
            location: window.paPasteSublistTarget.location || 'General',
            formula: window.paPasteSublistTarget.formula || 'Standalone'
        };
    }
    if (window.activePaTarget) {
        return {
            location: window.activePaTarget.location || 'General',
            formula: window.activePaTarget.formula || 'Standalone'
        };
    }
    return null;
};

window.dalPaResolvePasteDept_ = function(dest) {
    if (window.paSelectedDept) return window.paSelectedDept;
    if (dest) {
        var sample = (currentProjectAssets || []).find(function(pa) {
            return (pa.location || 'General') === dest.location &&
                (pa.formula || 'Standalone') === dest.formula &&
                pa.overrideDept;
        });
        if (sample) return sample.overrideDept;
    }
    if (typeof window.dalPaEnsureWorkingDept_ === 'function') return window.dalPaEnsureWorkingDept_();
    return '';
};

window.pasteClipboardPa = function() {
    try {
    let toPasteCuts = currentProjectAssets.filter(pa => pa.isCut);
    let toPasteCopies = currentProjectAssets.filter(pa => pa.isCopied);
    let toPaste = [...toPasteCuts, ...toPasteCopies];
    if (toPaste.length === 0) return;

    let dest = typeof window.dalPaResolvePasteDest_ === 'function' ? window.dalPaResolvePasteDest_() : null;
    let pasteDept = typeof window.dalPaResolvePasteDept_ === 'function' ? window.dalPaResolvePasteDept_(dest) : (window.paSelectedDept || '');

    // Need a place to land: sublist/item click, EDIT target, or green department (dept-only move).
    if (!dest && !window.paSelectedDept) {
        if (typeof window.showMobilePaToast === 'function') {
            window.showMobilePaToast('Pick paste destination', 'Click a sublist header or item, or a green department header.');
        } else {
            alert('Pick a paste destination — click a sublist header/item, or a department header (green).');
        }
        return;
    }

    let remainingAssets = currentProjectAssets.filter(pa => !pa.isCut || (pa.isCut && pa.cutQty && pa.cutQty < pa.qty));
    let itemsToInsert = [];
    
    toPasteCuts.forEach(pa => {
        if (pa.cutQty && pa.cutQty < pa.qty) {
            let splitClone = JSON.parse(JSON.stringify(pa));
            splitClone.qty = pa.cutQty;
            splitClone.isCut = false;
            delete splitClone.cutQty;
            splitClone._dalDeptCut = 1;
            pa.qty = parseInt(pa.qty, 10) - parseInt(pa.cutQty, 10);
            pa.isCut = false;
            delete pa.cutQty;
            if (typeof window.dalPaNoteTouch_ === 'function' && pa.uid && !pa.isAuto && !pa.isGenericAuto) {
                window.dalPaNoteTouch_(pa.uid);
            }
            itemsToInsert.push(splitClone);
        } else {
            pa.isCut = false;
            delete pa.cutQty;
            pa._dalDeptCut = 1;
            itemsToInsert.push(pa);
        }
    });

    toPasteCopies.forEach(pa => {
        let clone = JSON.parse(JSON.stringify(pa));
        clone.isCopied = false;
        if (clone.copiedQty) clone.qty = clone.copiedQty;
        delete clone.copiedQty;
        delete clone.uid;
        pa.isCopied = false;
        delete pa.copiedQty;
        itemsToInsert.push(clone);
    });

    itemsToInsert.forEach(pa => {
        if (pasteDept) pa.overrideDept = pasteDept;
        if (!pa.uid && typeof window.dalNewUid_ === 'function') pa.uid = window.dalNewUid_();
        if (typeof window.dalPaNoteTouch_ === 'function' && pa.uid && !pa.isAuto && !pa.isGenericAuto) {
            window.dalPaNoteTouch_(pa.uid);
        }
    });

    if (dest) {
        itemsToInsert.forEach(pa => {
            pa.location = dest.location;
            pa.formula = dest.formula;
        });
        remainingAssets.push(...itemsToInsert);
    } else { // Dept-only move (green header)
        // CUT into another dept with the same loc/form as leftovers in the source dept
        // creates "twin" General buckets (Lighting+Audio). DEL used to wipe both.
        // Give cut groups a unique location — same approach copy already uses.
        if (toPasteCuts.length > 0 && pasteDept) {
            let cutGroups = {};
            itemsToInsert.forEach(item => {
                if (!item || !item._dalDeptCut) return;
                let key = (item.location || 'General') + '|||' + (item.formula || 'Standalone');
                if (!cutGroups[key]) cutGroups[key] = [];
                cutGroups[key].push(item);
            });
            Object.keys(cutGroups).forEach(function(key) {
                let groupItems = cutGroups[key];
                let baseLoc = groupItems[0].location || 'General';
                let counter = 1;
                let match;
                if ((match = String(baseLoc).match(/^(.*)\s*\((\d+)\)$/))) {
                    baseLoc = match[1].trim();
                    counter = parseInt(match[2], 10) + 1;
                }
                let newLoc = baseLoc + ' (' + counter + ')';
                while (
                    currentProjectAssets.some(p => p && p.location === newLoc) ||
                    remainingAssets.some(p => p && p.location === newLoc) ||
                    itemsToInsert.some(p => p && p.location === newLoc && !p._dalDeptCut)
                ) {
                    counter++;
                    newLoc = baseLoc + ' (' + counter + ')';
                }
                // Avoid colliding with other cut groups already renamed in this paste
                while (Object.keys(cutGroups).some(function(k2) {
                    if (k2 === key) return false;
                    return cutGroups[k2].some(function(p) { return p.location === newLoc; });
                })) {
                    counter++;
                    newLoc = baseLoc + ' (' + counter + ')';
                }
                let newForm = newLoc + ' Formula';
                groupItems.forEach(function(item) {
                    item.location = newLoc;
                    if (!item.isShortage) item.formula = newForm;
                    else item.formula = newLoc + ' Subrent Formula';
                    delete item._dalDeptCut;
                    if (typeof window.dalPaNoteTouch_ === 'function' && item.uid && !item.isAuto && !item.isGenericAuto) {
                        window.dalPaNoteTouch_(item.uid);
                    }
                });
            });
        }

        let isCopyOperation = toPasteCopies.length > 0;

        if (isCopyOperation) {
            let regularPasteItems = [];
            let shortagePasteItems = [];
            
            let copiedGroups = {};
            itemsToInsert.filter(item => toPasteCopies.some(c => c.assetId === item.assetId && c.location === item.location && c.formula === item.formula))
                         .forEach(item => {
                let key = item.location + "|||" + item.formula;
                if (!copiedGroups[key]) copiedGroups[key] = [];
                copiedGroups[key].push(item);
            });

            for (const key in copiedGroups) {
                let groupItems = copiedGroups[key];
                let originalLocation = groupItems[0].location;

                let baseLoc = originalLocation;
                let counter = 1;
                let match;
                if ((match = baseLoc.match(/^(.*)\s*\((\d+)\)$/))) {
                    baseLoc = match[1].trim();
                    counter = parseInt(match[2], 10) + 1;
                }
                let newLoc = `${baseLoc} (${counter})`;
                while (currentProjectAssets.some(p => p.location === newLoc) || regularPasteItems.some(p => p.location === newLoc)) {
                    counter++;
                    newLoc = `${baseLoc} (${counter})`;
                }
                let newForm = newLoc + " Formula";
                
                let newShortageLoc = newLoc;
                let newShortageForm = newLoc + " Subrent Formula";

                groupItems.forEach(item => {
                    let asset = globalAssets.find(a => a.id === item.assetId);
                    if (!asset) return;
                    let requestedQty = parseInt(item.qty, 10);
                    let maxQty = asset.type === 'Bulk' ? (parseInt(asset.totalQuantity, 10) || 1) : 1;
                    let alreadyAssigned = currentProjectAssets.filter(p => p.assetId === asset.id && !p.isShortage).reduce((sum, p) => sum + parseInt(p.qty, 10), 0);
                    let overlappingQty = window.overlappingAllocations ? (window.overlappingAllocations[asset.id] || 0) : 0;
                    let availableQty = Math.max(0, maxQty - alreadyAssigned - overlappingQty);
                    let qtyToPaste = Math.min(requestedQty, availableQty);
                    let shortQty = requestedQty - qtyToPaste;

                    if (qtyToPaste > 0) {
                        let clone = JSON.parse(JSON.stringify(item));
                        clone.qty = qtyToPaste; clone.location = newLoc; clone.formula = newForm;
                        if (pasteDept) clone.overrideDept = pasteDept;
                        regularPasteItems.push(clone);
                    }
                    if (shortQty > 0) {
                        let shortClone = JSON.parse(JSON.stringify(item));
                        shortClone.qty = shortQty; shortClone.location = newShortageLoc; shortClone.formula = newShortageForm; shortClone.isShortage = true;
                        if (pasteDept) shortClone.overrideDept = pasteDept;
                        shortagePasteItems.push(shortClone);
                    }
                });
            }
            itemsToInsert = itemsToInsert.filter(item => !toPasteCopies.some(c => c.assetId === item.assetId && c.location === item.location && c.formula === item.formula));
            itemsToInsert.push(...regularPasteItems, ...shortagePasteItems);
        }
        
        let targetIdx = remainingAssets.length;
        if (window.selectedPaIndices.size > 0) {
            let minSelIdx = Math.min(...Array.from(window.selectedPaIndices));
            let targetObj = currentProjectAssets[minSelIdx];
            let remIdx = remainingAssets.indexOf(targetObj);
            if (remIdx !== -1) targetIdx = remIdx;
        }
        remainingAssets.splice(targetIdx, 0, ...itemsToInsert);
    }

    let merged = [];
    remainingAssets.forEach(pa => {
        let existing = merged.find(m => m.assetId === pa.assetId && m.location === pa.location && m.formula === pa.formula && m.isAuto === pa.isAuto && m.isShortage === pa.isShortage && String(m.overrideDept || '') === String(pa.overrideDept || ''));
        if (existing && existing !== pa) {
            existing.qty = parseInt(existing.qty, 10) + parseInt(pa.qty, 10);
            if (typeof window.dalPaNoteTouch_ === 'function' && existing.uid && !existing.isAuto && !existing.isGenericAuto) {
                window.dalPaNoteTouch_(existing.uid);
            }
        } else if (!merged.includes(pa)) {
            merged.push(pa);
        }
    });
    currentProjectAssets = merged;
    
    currentProjectAssets.forEach(pa => {
        pa.isCopied = false;
        delete pa._dalDeptCut;
    });

    window.selectedPaIndices.clear();
    window.selectedSummedIds.clear();
    if (window.selectedPaGroups) window.selectedPaGroups.clear();
    if (typeof recalcAutoContainers === 'function') recalcAutoContainers();
    if (typeof window.dalPaUpdateLocalCache_ === 'function') window.dalPaUpdateLocalCache_();
    renderProjectAssetsUI();
    } catch(err) { console.error("pasteClipboardPa Error:", err); alert("Error pasting items: " + err.message); }
}

window.cancelCutPa = function() {
    currentProjectAssets.forEach(pa => {
        pa.isCut = false;
        pa.isCopied = false;
            delete pa.cutQty;
            delete pa.copiedQty;
    });
    window.selectedPaIndices.clear();
    window.selectedSummedIds.clear();
    if (window.selectedPaGroups) window.selectedPaGroups.clear();
    renderProjectAssetsUI();
};
</script>
