<script>
/**
 * 10c_Notifications_Admin.html
 * ROOT push console — VAPID, device list, per-device test, manual token modal.
 */

var SHOWRUNNER_HOSTING_URL = 'https://sm-showrunner-97405.web.app';
var FIREBASE_VAPID_CONSOLE_URL = 'https://console.firebase.google.com/project/sm-showrunner-97405/settings/cloudmessaging';

function renderPushAdminPanel(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.style.height = '100%';
  el.style.minHeight = '0';
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
  if (typeof accessTierAtLeast !== 'function' || !accessTierAtLeast('ROOT')) {
    el.innerHTML = '';
    return;
  }

  el.innerHTML =
    '<div id="push-admin-root" style="display:flex; flex-direction:column; height:100%; min-height:0; gap:10px;">'

    + '<div style="flex-shrink:0; padding:10px; border:1px solid #333; border-radius:6px; background:#121214;">'
    + '<div style="color:#f59e0b; font-size:11px; font-weight:800; margin-bottom:6px; letter-spacing:0.05em;">VAPID KEY (Web Push certificate)</div>'
    + '<div style="color:#71717a; font-size:11px; line-height:1.4; margin-bottom:8px;">'
    + 'Firebase Console → Cloud Messaging → <strong>Web Push certificates</strong> → public key (~88 chars, starts with B). '
    + '<a href="' + FIREBASE_VAPID_CONSOLE_URL + '" target="_blank" rel="noopener" style="color:#10b981;">Open settings</a>'
    + '</div>'
    + '<input id="push-vapid-input" type="text" placeholder="Paste Web Push public key (not AIza API key)" style="width:100%; box-sizing:border-box; padding:8px; background:#27272a; border:1px solid #444; color:#fff; border-radius:4px; font-size:11px; margin-bottom:8px;">'
    + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#698b99; color:#698b99;" onclick="saveShowrunnerVapidKey()">SAVE VAPID KEY</button>'
    + '<span id="push-vapid-status" style="display:block; color:#71717a; font-size:11px; margin-top:6px;"></span>'
    + '<div id="push-vapid-active" style="color:#71717a; font-size:11px; margin-top:4px;"></div>'
    + '</div>'

    + '<div style="flex:1; min-height:0; display:flex; flex-direction:column; padding:10px; border:1px solid #333; border-radius:6px; background:#121214;">'
    + '<div style="flex-shrink:0; display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:8px;">'
    + '<div style="color:#10b981; font-size:11px; font-weight:800; letter-spacing:0.05em;">REGISTERED DEVICES (ALL CREW)</div>'
    + '<div style="display:flex; flex-wrap:wrap; gap:6px;">'
    + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="openPushTokenModal()">SAVE TOKEN…</button>'
    + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#f59e0b; color:#f59e0b;" onclick="cleanupShowrunnerFcmDevices()">CLEAN STALE</button>'
    + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="runShowrunnerTestPush()">TEST ALL</button>'
    + '</div></div>'
    + '<div id="push-device-list" style="flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; gap:6px;">'
    + '<div style="color:#52525b; font-size:11px;">Loading devices…</div>'
    + '</div>'
    + '</div>'

    + '<div id="push-admin-footer" style="flex-shrink:0; display:flex; flex-direction:column; gap:8px;">'
    + '<div style="display:flex; flex-wrap:wrap; gap:6px; align-items:center;">'
    + '<a href="' + SHOWRUNNER_HOSTING_URL + '" target="_blank" rel="noopener" class="btn-outline btn-sm" style="margin:0; border-color:#698b99; color:#698b99; text-decoration:none;">OPEN HOSTING URL</a>'
    + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="retryShowrunnerFcmRegistration()">RETRY AUTO-REGISTER</button>'
    + '</div>'
    + '<div id="push-admin-status" style="color:#71717a; font-size:11px; line-height:1.5; word-break:break-word;"></div>'
    + '</div>'
    + '</div>';

  if (!document.getElementById('push-token-modal-overlay')) {
    var modal = document.createElement('div');
    modal.id = 'push-token-modal-overlay';
    modal.className = 'modal-overlay';
    modal.style.cssText = 'z-index:8000; display:none;';
    modal.innerHTML =
      '<div class="modal" style="max-width:520px; width:95%;">'
      + '<h3 class="modal-title" style="color:#10b981;">Save device token</h3>'
      + '<p style="color:#a1a1aa; font-size:11px; line-height:1.45; margin:0 0 12px 0;">'
      + 'Use when auto-register fails. Open <strong>web.app</strong> on the device, allow notifications, then fetch the token from the hosting shell or paste it manually.'
      + '</p>'
      + '<textarea id="push-device-token-input" rows="4" placeholder="Paste FCM device token here…" style="width:100%; box-sizing:border-box; padding:10px; background:#27272a; border:1px solid #444; color:#fff; border-radius:6px; font-size:10px; margin-bottom:10px; resize:vertical; font-family:monospace;"></textarea>'
      + '<div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;">'
      + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="fetchDeviceTokenFromHosting()">GET TOKEN FROM HOSTING</button>'
      + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="saveShowrunnerDeviceToken()">SAVE TO MY ACCOUNT</button>'
      + '</div>'
      + '<span id="push-device-token-status" style="display:block; color:#71717a; font-size:10px; margin-bottom:12px; line-height:1.4;"></span>'
      + '<div style="display:flex; justify-content:flex-end; gap:8px;">'
      + '<button type="button" class="btn-close" style="width:auto; margin:0;" onclick="closePushTokenModal()">CLOSE</button>'
      + '</div></div>';
    document.body.appendChild(modal);
  }

  if (typeof window.onShowrunnerFcmRegistered !== 'function') {
    window.onShowrunnerFcmRegistered = function() {
      setTimeout(refreshPushAdminStatus, 300);
    };
  }

  refreshPushAdminStatus();
}

function openPushTokenModal() {
  var modal = document.getElementById('push-token-modal-overlay');
  var note = document.getElementById('push-device-token-status');
  if (note) note.textContent = '';
  if (modal) modal.style.display = 'flex';
}

function closePushTokenModal() {
  var modal = document.getElementById('push-token-modal-overlay');
  if (modal) modal.style.display = 'none';
}

function escapePushHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
}

function escapePushJs(s) {
  return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function renderPushDeviceList(devices) {
  var list = document.getElementById('push-device-list');
  if (!list) return;
  var rowFont = 'font-size:11px; line-height:1.35;';
  if (!devices || !devices.length) {
    list.innerHTML = '<div style="color:#52525b; ' + rowFont + ' padding:8px 0;">No devices registered. Open <strong>web.app</strong> on phone → allow notifications → log in.</div>';
    return;
  }
  var html = '';
  devices.forEach(function(d) {
    var when = d.updatedAt ? d.updatedAt.slice(0, 16).replace('T', ' ') : '—';
    var summary = escapePushHtml(d.displaySummary || d.label || 'Device');
    var hint = escapePushHtml(d.tokenHint || d.tokenKey || '');
    var key = escapePushHtml(d.tokenKey || '');
    var owner = escapePushJs(d.ownerCrewName || d.crewName || '');
    html += '<div style="display:flex; align-items:center; gap:10px; padding:10px 12px; min-height:44px; background:#1a1a1e; border:1px solid #333; border-radius:6px;">'
      + '<div style="flex:1; min-width:0; display:flex; align-items:center; gap:12px; overflow:hidden;">'
      + '<span style="flex:1; min-width:0; color:#fff; font-weight:800; ' + rowFont + ' white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="' + summary + '">' + summary + '</span>'
      + '<span style="color:#71717a; ' + rowFont + ' white-space:nowrap; flex-shrink:0;">' + when + '</span>'
      + '<span style="color:#52525b; font-size:10px; font-family:monospace; white-space:nowrap; flex-shrink:0;">' + hint + '</span>'
      + '</div>'
      + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981; white-space:nowrap; flex-shrink:0;" onclick="runShowrunnerTestPushDevice(\'' + key + '\', \'' + owner + '\')">TEST</button>'
      + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#ef4444; color:#ef4444; white-space:nowrap; flex-shrink:0;" onclick="revokeShowrunnerDevice(\'' + key + '\', \'' + owner + '\')">REVOKE</button>'
      + '</div>';
  });
  list.innerHTML = html;
}

function setPushAdminStatus(html, isError) {
  var status = document.getElementById('push-admin-status');
  if (!status) return;
  status.innerHTML = html;
}

function saveShowrunnerVapidKey() {
  var input = document.getElementById('push-vapid-input');
  var note = document.getElementById('push-vapid-status');
  if (!input || !input.value.trim()) {
    if (note) note.innerHTML = '<span style="color:#ef4444;">Paste the Web Push public key first.</span>';
    return;
  }
  if (note) note.textContent = 'Saving…';
  google.script.run
    .withFailureHandler(function(err) {
      if (note) note.innerHTML = '<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>';
    })
    .withSuccessHandler(function(res) {
      if (!note) return;
      if (res && res.success) {
        note.innerHTML = '<span style="color:#10b981;">' + escapePushHtml(res.message) + '</span>';
        input.value = '';
      } else {
        note.innerHTML = '<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Save failed') + '</span>';
      }
      refreshPushAdminStatus();
    })
    .saveFirebaseVapidKey(ACTIVE_USER_NAME, input.value.trim());
}

function fetchDeviceTokenFromHosting() {
  var note = document.getElementById('push-device-token-status');
  var input = document.getElementById('push-device-token-input');
  openPushTokenModal();
  if (window.self === window.top) {
    if (note) note.innerHTML = '<span style="color:#ef4444;">Open ' + SHOWRUNNER_HOSTING_URL + ' in this shell first.</span>';
    return;
  }
  if (note) note.textContent = 'Fetching token from hosting shell…';
  var done = false;
  function onMsg(ev) {
    if (!ev.data || ev.data.type !== 'SHOWRUNNER_FCM_TOKEN' || !ev.data.token) return;
    window.removeEventListener('message', onMsg);
    if (done) return;
    done = true;
    if (input) input.value = ev.data.token;
    if (note) note.innerHTML = '<span style="color:#10b981;">Token received — review and click SAVE TO MY ACCOUNT.</span>';
  }
  window.addEventListener('message', onMsg);
  try {
    window.parent.postMessage({ type: 'SHOWRUNNER_REQUEST_FCM_TOKEN' }, '*');
  } catch (e) { /* ignore */ }
  setTimeout(function() {
    window.removeEventListener('message', onMsg);
    if (!done && note) {
      note.innerHTML = '<span style="color:#f59e0b;">No token yet — on phone tap Set up shift alerts until Step 1 says token OK.</span>';
    }
  }, 10000);
}

function saveShowrunnerDeviceToken() {
  var input = document.getElementById('push-device-token-input');
  var note = document.getElementById('push-device-token-status');
  openPushTokenModal();
  if (!input || !input.value.trim()) {
    if (note) note.innerHTML = '<span style="color:#ef4444;">Paste or fetch a device token first.</span>';
    return;
  }
  if (note) note.textContent = 'Saving…';
  google.script.run
    .withFailureHandler(function(err) {
      if (note) note.innerHTML = '<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>';
    })
    .withSuccessHandler(function(res) {
      if (!note) return;
      if (res && res.success) {
        note.innerHTML = '<span style="color:#10b981;">Device token saved.</span>';
        input.value = '';
        setTimeout(closePushTokenModal, 1200);
      } else {
        note.innerHTML = '<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Save failed') + '</span>';
      }
      refreshPushAdminStatus();
    })
    .saveFcmDeviceToken(ACTIVE_USER_NAME, input.value.trim());
}

function refreshPushAdminStatus() {
  var inShell = (window.self !== window.top);
  if (!inShell) {
    setPushAdminStatus('<span style="color:#ef4444;">Open <a href="' + SHOWRUNNER_HOSTING_URL + '" target="_blank" style="color:#10b981;">' + SHOWRUNNER_HOSTING_URL + '</a> for device registration.</span>');
    return;
  }

  google.script.run
    .withFailureHandler(function(err) {
      setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>');
    })
    .withSuccessHandler(function(setup) {
      if (!setup || !setup.success) {
        setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml((setup && setup.message) || 'Setup check failed') + '</span>');
        return;
      }

      var vapidActive = document.getElementById('push-vapid-active');
      if (vapidActive) {
        if (!setup.vapidKeyValid) {
          vapidActive.innerHTML = '<span style="color:#ef4444;">VAPID missing or invalid — paste key above.</span>';
        } else if (setup.vapidKeyPrefix) {
          vapidActive.innerHTML = 'Server VAPID: <strong>' + escapePushHtml(setup.vapidKeyPrefix) + '…</strong> (' + setup.vapidKeyLength + ' chars)';
        }
      }

      google.script.run
        .withFailureHandler(function(err) {
          renderPushDeviceList([]);
          setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>');
        })
        .withSuccessHandler(function(res) {
          if (res && res.success) {
            renderPushDeviceList(res.devices || []);
            var n = (res.devices || []).length;
            var crews = res.crewCount || 0;
            setPushAdminStatus(n
              ? '<span style="color:#10b981;">' + n + ' fleet device(s) · ' + crews + ' crew with alerts · TEST per row or TEST ALL</span>'
              : '<span style="color:#f59e0b;">No fleet devices yet — crew opens web.app, logs in, allows notifications</span>');
          } else {
            renderPushDeviceList([]);
            setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Could not load devices') + '</span>');
          }
        })
        .getFcmDevicesFleetAdminDetail(ACTIVE_USER_NAME);
    })
    .getFirebasePushSetupStatus(ACTIVE_USER_NAME);
}

function retryShowrunnerFcmRegistration() {
  setPushAdminStatus('<span style="color:#a1a1aa;">Retrying auto-register…</span>');
  if (window.self === window.top) {
    setPushAdminStatus('<span style="color:#ef4444;">Open ' + SHOWRUNNER_HOSTING_URL + ' first.</span>');
    return;
  }
  if (typeof window.retryShowrunnerFcmBridge === 'function') {
    window.retryShowrunnerFcmBridge();
    setTimeout(refreshPushAdminStatus, 3000);
  }
}

function cleanupShowrunnerFcmDevices() {
  setPushAdminStatus('<span style="color:#a1a1aa;">Cleaning stale devices…</span>');
  google.script.run
    .withFailureHandler(function(err) {
      setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>');
    })
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        setPushAdminStatus('<span style="color:#10b981;">' + escapePushHtml(res.message) + '</span>');
      } else {
        setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Cleanup failed') + '</span>');
      }
      setTimeout(refreshPushAdminStatus, 400);
    })
    .cleanupFcmDevicesForUser(ACTIVE_USER_NAME);
}

function runShowrunnerTestPushDevice(tokenKey, deviceOwnerCrewName) {
  if (!tokenKey) return;
  setPushAdminStatus('<span style="color:#a1a1aa;">Sending test to device…</span>');
  google.script.run
    .withFailureHandler(function(err) {
      setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>');
    })
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        setPushAdminStatus('<span style="color:#10b981;">' + escapePushHtml(res.message) + '</span>');
      } else {
        setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Failed') + '</span>');
      }
      setTimeout(refreshPushAdminStatus, 500);
    })
    .sendTestPushToDevice(ACTIVE_USER_NAME, tokenKey, deviceOwnerCrewName || ACTIVE_USER_NAME);
}

function revokeShowrunnerDevice(tokenKey, deviceOwnerCrewName) {
  if (!tokenKey) return;
  var owner = deviceOwnerCrewName || ACTIVE_USER_NAME;
  if (!confirm('Remove this device from push registry?\n\n' + owner + ' will stop receiving alerts until re-registered from web.app.')) return;
  setPushAdminStatus('<span style="color:#a1a1aa;">Revoking device…</span>');
  google.script.run
    .withFailureHandler(function(err) {
      setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>');
    })
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        setPushAdminStatus('<span style="color:#10b981;">' + escapePushHtml(res.message) + '</span>');
      } else {
        setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Revoke failed') + '</span>');
      }
      setTimeout(refreshPushAdminStatus, 400);
    })
    .revokeFcmDeviceByTokenKey(ACTIVE_USER_NAME, tokenKey, owner);
}

function runShowrunnerTestPush() {
  setPushAdminStatus('<span style="color:#a1a1aa;">Sending test to all devices…</span>');
  google.script.run
    .withFailureHandler(function(err) {
      setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>');
    })
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        var color = res.partial ? '#f59e0b' : '#10b981';
        setPushAdminStatus('<span style="color:' + color + ';">' + escapePushHtml(res.message) + '</span>');
      } else {
        setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Failed') + '</span>');
      }
      setTimeout(refreshPushAdminStatus, 500);
    })
    .sendTestPushNotification(ACTIVE_USER_NAME);
}
</script>
