<script>
/**
 * 10c_Notifications_Admin.html
 * ROOT tools — test push notification (Phase 1).
 */

var SHOWRUNNER_HOSTING_URL = 'https://sm-showrunner-97405.web.app';
var FIREBASE_VAPID_CONSOLE_URL = 'https://console.firebase.google.com/project/sm-showrunner-97405/settings/cloudmessaging';

function renderPushAdminPanel(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (typeof accessTierAtLeast !== 'function' || !accessTierAtLeast('ROOT')) {
    el.innerHTML = '';
    return;
  }

  el.innerHTML =
    '<div style="background:#18181b; border:1px solid #333; border-radius:8px; padding:14px; margin-top:12px;">' +
      '<div style="color:#f59e0b; font-size:11px; font-weight:900; letter-spacing:0.05em; margin-bottom:8px;">PUSH NOTIFICATIONS (PHASE 1)</div>' +
      '<div style="color:#a1a1aa; font-size:11px; line-height:1.45; margin-bottom:10px;">' +
        'Push only works from the <strong>Hosting URL</strong>. Android: Chrome OK. iPhone: <strong>Safari</strong> + Add to Home Screen.' +
      '</div>' +
      '<div style="margin-bottom:10px; padding:10px; border:1px solid #333; border-radius:6px; background:#121214;">' +
        '<div style="color:#888; font-size:10px; font-weight:800; margin-bottom:6px;">VAPID KEY (Web Push certificate)</div>' +
        '<div style="color:#71717a; font-size:10px; line-height:1.4; margin-bottom:8px;">' +
          'Firebase Console → Project settings → Cloud Messaging → <strong>Web Push certificates</strong> → copy the <strong>public key</strong> (~88 chars, starts with B). ' +
          '<a href="' + FIREBASE_VAPID_CONSOLE_URL + '" target="_blank" style="color:#10b981;">Open Cloud Messaging settings</a>' +
        '</div>' +
        '<input id="push-vapid-input" type="text" placeholder="Paste Web Push public key here (not AIza API key)" style="width:100%; box-sizing:border-box; padding:8px; background:#27272a; border:1px solid #444; color:#fff; border-radius:4px; font-size:11px; margin-bottom:8px;">' +
        '<button class="btn-outline btn-sm" style="margin:0; border-color:#698b99; color:#698b99;" onclick="saveShowrunnerVapidKey()">SAVE VAPID KEY</button>' +
        '<span id="push-vapid-status" style="display:block; color:#71717a; font-size:10px; margin-top:6px;"></span>' +
        '<div id="push-vapid-active" style="color:#71717a; font-size:10px; margin-top:6px;"></div>' +
      '</div>' +
      '<div style="margin-bottom:10px; padding:10px; border:1px solid #333; border-radius:6px; background:#121214; position:relative; z-index:5;">' +
        '<div style="color:#888; font-size:10px; font-weight:800; margin-bottom:6px;">DEVICE REGISTRATION</div>' +
        '<div style="color:#71717a; font-size:10px; line-height:1.4; margin-bottom:8px;">' +
          'Crew devices register automatically when they open the Hosting URL and allow notifications. Use the tools below only if auto-save fails.' +
        '</div>' +
        '<textarea id="push-device-token-input" rows="3" placeholder="Emergency: paste device token" style="width:100%; box-sizing:border-box; padding:8px; background:#27272a; border:1px solid #444; color:#fff; border-radius:4px; font-size:10px; margin-bottom:8px; resize:vertical; display:none;"></textarea>' +
        '<button type="button" class="btn-outline btn-sm" style="margin:0 8px 8px 0; border-color:#10b981; color:#10b981; position:relative; z-index:6; pointer-events:auto; display:none;" id="push-fetch-hosting-btn" onclick="fetchDeviceTokenFromHosting()">GET TOKEN FROM HOSTING</button>' +
        '<button type="button" class="btn-outline btn-sm" style="margin:0 0 8px 0; border-color:#10b981; color:#10b981; position:relative; z-index:6; pointer-events:auto; display:none;" id="push-save-token-btn" onclick="saveShowrunnerDeviceToken()">SAVE DEVICE TOKEN</button>' +
        '<span id="push-device-token-status" style="display:block; color:#71717a; font-size:10px; margin-top:6px;"></span>' +
      '</div>' +
      '<a href="' + SHOWRUNNER_HOSTING_URL + '" target="_blank" rel="noopener" class="btn-outline btn-sm" style="display:inline-block; margin:0 8px 8px 0; border-color:#698b99; color:#698b99; text-decoration:none;">OPEN HOSTING URL</a>' +
      '<button class="btn-outline btn-sm" style="margin:0 8px 8px 0; border-color:#10b981; color:#10b981;" onclick="retryShowrunnerFcmRegistration()">RETRY DEVICE REGISTER</button>' +
      '<button class="btn-outline btn-sm" style="margin:0 8px 8px 0; border-color:#f59e0b; color:#f59e0b;" onclick="cleanupShowrunnerFcmDevices()">CLEAN STALE DEVICES</button>' +
      '<button class="btn-outline btn-sm" style="margin:0 0 8px 0; border-color:#10b981; color:#10b981;" onclick="runShowrunnerTestPush()">SEND TEST PUSH TO ME</button>' +
      '<div id="push-admin-status" style="color:#71717a; font-size:11px; margin-top:8px; line-height:1.5; word-break:break-word; min-height:2.5em;">Checking push setup…</div>' +
    '</div>';

  if (typeof window.onShowrunnerFcmRegistered !== 'function') {
    window.onShowrunnerFcmRegistered = function() {
      setTimeout(refreshPushAdminStatus, 300);
    };
  }

  refreshPushAdminStatus();
}

function saveShowrunnerVapidKey() {
  var input = document.getElementById('push-vapid-input');
  var note = document.getElementById('push-vapid-status');
  if (!input || !input.value.trim()) {
    if (note) note.innerHTML = '<span style="color:#ef4444;">Paste the Web Push public key first.</span>';
    return;
  }
  if (note) note.textContent = 'Saving…';
  google.script.run
    .withFailureHandler(function(err) {
      if (note) note.innerHTML = '<span style="color:#ef4444;">' + (err.message || err) + '</span>';
    })
    .withSuccessHandler(function(res) {
      if (!note) return;
      if (res && res.success) {
        note.innerHTML = '<span style="color:#10b981;">' + res.message + '</span>';
        input.value = '';
      } else {
        note.innerHTML = '<span style="color:#ef4444;">' + ((res && res.message) || 'Save failed') + '</span>';
      }
      refreshPushAdminStatus();
    })
    .saveFirebaseVapidKey(ACTIVE_USER_NAME, input.value.trim());
}

function fetchDeviceTokenFromHosting() {
  var note = document.getElementById('push-device-token-status');
  var input = document.getElementById('push-device-token-input');
  if (window.self === window.top) {
    if (note) note.innerHTML = '<span style="color:#ef4444;">Open ' + SHOWRUNNER_HOSTING_URL + ' first.</span>';
    return;
  }
  if (note) note.textContent = 'Fetching token from Hosting shell…';
  var done = false;
  function onMsg(ev) {
    if (!ev.data || ev.data.type !== 'SHOWRUNNER_FCM_TOKEN' || !ev.data.token) return;
    window.removeEventListener('message', onMsg);
    if (done) return;
    done = true;
    if (input) input.value = ev.data.token;
    saveShowrunnerDeviceToken();
  }
  window.addEventListener('message', onMsg);
  try {
    window.parent.postMessage({ type: 'SHOWRUNNER_REQUEST_FCM_TOKEN' }, '*');
  } catch (e) { /* ignore */ }
  setTimeout(function() {
    window.removeEventListener('message', onMsg);
    if (!done && note) {
      note.innerHTML = '<span style="color:#f59e0b;">No token yet — bottom-right must say “token ready”, or click Copy push token there.</span>';
    }
  }, 8000);
}

function saveShowrunnerDeviceToken() {
  var input = document.getElementById('push-device-token-input');
  var note = document.getElementById('push-device-token-status');
  if (!input || !input.value.trim()) {
    if (note) note.innerHTML = '<span style="color:#ef4444;">Paste the device token first (Copy push token on Hosting page).</span>';
    return;
  }
  if (note) note.textContent = 'Saving…';
  google.script.run
    .withFailureHandler(function(err) {
      if (note) note.innerHTML = '<span style="color:#ef4444;">' + (err.message || err) + '</span>';
    })
    .withSuccessHandler(function(res) {
      if (!note) return;
      if (res && res.success) {
        note.innerHTML = '<span style="color:#10b981;">Device token saved. Try SEND TEST PUSH TO ME.</span>';
        input.value = '';
      } else {
        note.innerHTML = '<span style="color:#ef4444;">' + ((res && res.message) || 'Save failed') + '</span>';
      }
      refreshPushAdminStatus();
    })
    .saveFcmDeviceToken(ACTIVE_USER_NAME, input.value.trim());
}

function refreshPushAdminStatus() {
  const status = document.getElementById('push-admin-status');
  if (!status) return;

  var inShell = (window.self !== window.top);
  if (!inShell) {
    status.innerHTML = '<span style="color:#ef4444;">Wrong entry point — open <a href="' + SHOWRUNNER_HOSTING_URL + '" target="_blank" style="color:#10b981;">' + SHOWRUNNER_HOSTING_URL + '</a> first.</span>';
    return;
  }

  google.script.run
    .withFailureHandler(function(err) {
      status.innerHTML = '<span style="color:#ef4444;">' + (err.message || err) + '</span>';
    })
    .withSuccessHandler(function(setup) {
      if (!setup || !setup.success) {
        status.innerHTML = '<span style="color:#ef4444;">' + ((setup && setup.message) || 'Setup check failed') + '</span>';
        return;
      }

      if (!setup.vapidKeyValid) {
        var vapidHint = setup.vapidLooksLikeApiKey
          ? 'VAPID key looks like an API key (AIza…). Paste the Web Push public key from Cloud Messaging instead.'
          : 'VAPID key missing or invalid. Paste the Web Push public key above and click SAVE VAPID KEY.';
        status.innerHTML = '<span style="color:#ef4444;">' + vapidHint + '</span>';
        return;
      }

      var vapidActive = document.getElementById('push-vapid-active');
      if (vapidActive && setup.vapidKeyPrefix) {
        vapidActive.innerHTML = 'Server VAPID starts with <strong>' + setup.vapidKeyPrefix + '…</strong> (' + setup.vapidKeyLength + ' chars) — compare to Firebase <em>Current pair</em>.';
      }

      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.registered) {
            var when = res.updatedAt ? (' · ' + res.updatedAt.slice(0, 16).replace('T', ' ')) : '';
            var count = res.deviceCount > 1 ? (res.deviceCount + ' devices') : '1 device';
            var detail = '';
            if (res.devices && res.devices.length) {
              detail = '<br><span style="color:#888;">' + res.devices.map(function(d) {
                var when = d.updatedAt ? d.updatedAt.slice(0, 16).replace('T', ' ') : '';
                return (d.label || 'web') + (when ? (' · ' + when) : '');
              }).join('<br>') + '</span>';
            }
            status.innerHTML = '<span style="color:#10b981;">VAPID OK · ' + count + ' registered' + when + '</span>' + detail;
            if (res.deviceCount < 2) {
              status.innerHTML += '<br><span style="color:#71717a;">Phone: open web.app in Chrome → Allow notifications → log in. Expect web-mobile in list above.</span>';
            }
            return;
          }
          var regHint = window.__srFcmLastError
            ? ('Save error: ' + window.__srFcmLastError)
            : 'Registering this device automatically — allow notifications when prompted.';
          status.innerHTML = '<span style="color:#f59e0b;">' + regHint + '</span>';
        })
        .getFcmRegistrationStatus(ACTIVE_USER_NAME);
    })
    .getFirebasePushSetupStatus(ACTIVE_USER_NAME);
}

function retryShowrunnerFcmRegistration() {
  const status = document.getElementById('push-admin-status');
  if (status) status.textContent = 'Saving device token…';
  if (window.self === window.top) {
    if (status) status.innerHTML = '<span style="color:#ef4444;">Open ' + SHOWRUNNER_HOSTING_URL + ' first.</span>';
    return;
  }
  if (typeof window.retryShowrunnerFcmBridge === 'function') {
    window.retryShowrunnerFcmBridge();
    setTimeout(refreshPushAdminStatus, 3000);
    return;
  }
  if (typeof window.startFcmBridgeRegistration === 'function') {
    window.startFcmBridgeRegistration();
    setTimeout(refreshPushAdminStatus, 3000);
  }
}

function cleanupShowrunnerFcmDevices() {
  const status = document.getElementById('push-admin-status');
  if (status) status.textContent = 'Cleaning stale devices…';
  google.script.run
    .withFailureHandler(function(err) {
      if (status) status.innerHTML = '<span style="color:#ef4444;">' + (err.message || err) + '</span>';
    })
    .withSuccessHandler(function(res) {
      if (!status) return;
      if (res && res.success) {
        status.innerHTML = '<span style="color:#10b981;">' + res.message + '</span>';
      } else {
        status.innerHTML = '<span style="color:#ef4444;">' + ((res && res.message) || 'Cleanup failed') + '</span>';
      }
      setTimeout(refreshPushAdminStatus, 500);
    })
    .cleanupFcmDevicesForUser(ACTIVE_USER_NAME);
}

function runShowrunnerTestPush() {
  const status = document.getElementById('push-admin-status');
  if (status) status.textContent = 'Sending...';
  google.script.run
    .withFailureHandler(function(err) {
      if (status) status.innerHTML = '<span style="color:#ef4444;">' + (err.message || err) + '</span>';
    })
    .withSuccessHandler(function(res) {
      if (!status) return;
      if (res && res.success) {
        var color = res.partial ? '#f59e0b' : '#10b981';
        status.innerHTML = '<span style="color:' + color + ';">' + res.message + '</span>';
      } else {
        status.innerHTML = '<span style="color:#ef4444;">' + ((res && res.message) || 'Failed') + '</span>';
      }
      setTimeout(refreshPushAdminStatus, 500);
    })
    .sendTestPushNotification(ACTIVE_USER_NAME);
}
</script>
