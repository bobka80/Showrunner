<script>
/**
 * 10c_Notifications_Admin.html
 * ROOT push console — VAPID, device list, per-device test, manual token modal.
 */

var SHOWRUNNER_HOSTING_URL = 'https://sm-showrunner-97405.web.app';
var FIREBASE_VAPID_CONSOLE_URL = 'https://console.firebase.google.com/project/sm-showrunner-97405/settings/cloudmessaging';

function ensurePushDeviceListStyles() {
  var style = document.getElementById('push-device-list-styles');
  if (!style) {
    style = document.createElement('style');
    style.id = 'push-device-list-styles';
    document.head.appendChild(style);
  }
  style.textContent = ''
    + '#push-device-list .push-dev-table { width:100%; min-width:0; }'
    + '#push-device-list .push-dev-grid { display:grid; grid-template-columns:140px 72px 92px 92px 72px 124px 88px minmax(120px,auto); gap:6px 8px; align-items:center; width:100%; box-sizing:border-box; padding-left:12px; padding-right:12px; }'
    + '#push-device-list .push-dev-head { padding-top:8px; padding-bottom:6px; border-bottom:1px solid #333; color:#71717a; font-size:10px; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; }'
    + '#push-device-list .push-dev-head span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }'
    + '#push-device-list .push-dev-row { padding-top:8px; padding-bottom:8px; min-height:44px; max-height:44px; background:#1a1a1e; border:1px solid #333; border-radius:6px; font-size:15px; line-height:1.35; margin-bottom:4px; }'
    + '#push-device-list .push-dev-row > span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }'
    + '#push-device-list .push-dev-token-wrap { display:block; min-width:0; cursor:default; }'
    + '#push-device-list .push-dev-token-hint { color:#52525b; font-size:11px; font-family:monospace; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; }'
    + '#push-device-list .push-dev-token-wrap:hover .push-dev-token-hint { color:#a1a1aa; }'
    + '#push-device-list .push-dev-actions { display:flex; gap:6px; justify-content:flex-end; flex-wrap:nowrap; }'
    + '#push-device-list .push-dev-actions .btn-sm { font-size:11px !important; padding:6px 10px !important; }'
    + '.push-token-peek-pop { display:none; position:fixed; z-index:20000; width:min(360px,calc(100vw - 24px)); background:#18181b; border:1px solid #10b981; border-radius:8px; padding:10px 12px; box-shadow:0 12px 40px rgba(0,0,0,0.75); box-sizing:border-box; }'
    + '.push-token-peek-pop.visible { display:block; }'
    + '.push-token-peek-pop .push-token-peek-label { color:#71717a; font-size:9px; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:6px; }'
    + '.push-token-peek-pop .push-token-peek-text { color:#fff; font-size:10px; font-family:monospace; line-height:1.45; word-break:break-all; max-height:120px; overflow-y:auto; margin-bottom:8px; }'
    + '.push-token-peek-pop .push-token-peek-copy { background:#10b981; border:none; color:#fff; font-weight:800; font-size:10px; padding:6px 12px; border-radius:4px; cursor:pointer; }'
    + '@media (max-width:900px) { #push-device-list .push-dev-grid { grid-template-columns:120px 64px 80px 80px 64px 108px 72px minmax(100px,auto); font-size:14px; } }';
}

function renderPushAdminPanel(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  ensurePushDeviceListStyles();
  el.style.height = '100%';
  el.style.minHeight = '0';
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
  if (typeof accessTierAtLeast !== 'function' || !accessTierAtLeast('ROOT')) {
    el.innerHTML = '';
    return;
  }

  el.innerHTML =
    '<div id="push-admin-root" style="display:flex; flex-direction:column; height:100%; min-height:0; gap:10px;">'

    + '<div style="flex-shrink:0; padding:10px; border:1px solid #333; border-radius:6px; background:#121214;">'
    + '<div style="color:#f59e0b; font-size:11px; font-weight:800; margin-bottom:6px; letter-spacing:0.05em;">VAPID KEY (Web Push certificate)</div>'
    + '<div style="color:#71717a; font-size:11px; line-height:1.4; margin-bottom:8px;">'
    + 'Firebase Console → Cloud Messaging → <strong>Web Push certificates</strong> → public key (~88 chars, starts with B). '
    + '<a href="' + FIREBASE_VAPID_CONSOLE_URL + '" target="_blank" rel="noopener" style="color:#10b981;">Open settings</a>'
    + '</div>'
    + '<input id="push-vapid-input" type="text" placeholder="Paste Web Push public key (not AIza API key)" style="width:100%; box-sizing:border-box; padding:8px; background:#27272a; border:1px solid #444; color:#fff; border-radius:4px; font-size:11px; margin-bottom:8px;">'
    + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#698b99; color:#698b99;" onclick="saveShowrunnerVapidKey()">SAVE VAPID KEY</button>'
    + '<span id="push-vapid-status" style="display:block; color:#71717a; font-size:11px; margin-top:6px;"></span>'
    + '<div id="push-vapid-active" style="color:#71717a; font-size:11px; margin-top:4px;"></div>'
    + '</div>'

    + '<div style="flex:1; min-height:0; display:flex; flex-direction:column; padding:10px; border:1px solid #333; border-radius:6px; background:#121214;">'
    + '<div style="flex-shrink:0; display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:8px;">'
    + '<div style="color:#10b981; font-size:11px; font-weight:800; letter-spacing:0.05em;">REGISTERED DEVICES (ALL CREW)</div>'
    + '<div style="display:flex; flex-wrap:wrap; gap:6px;">'
    + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="openPushTokenModal()">SAVE TOKEN…</button>'
    + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#f59e0b; color:#f59e0b;" onclick="cleanupShowrunnerFcmDevices()">CLEAN STALE</button>'
    + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="runShowrunnerTestPush()">TEST ALL</button>'
    + '</div></div>'
    + '<div id="push-device-list" style="flex:1; min-height:0; overflow:auto; display:flex; flex-direction:column; gap:4px;">'
    + '<div style="color:#52525b; font-size:11px;">Loading devices…</div>'
    + '</div>'
    + '</div>'

    + '<div id="push-admin-footer" style="flex-shrink:0; display:flex; flex-direction:column; gap:8px;">'
    + '<div style="display:flex; flex-wrap:wrap; gap:6px; align-items:center;">'
    + '<a href="' + SHOWRUNNER_HOSTING_URL + '" target="_blank" rel="noopener" class="btn-outline btn-sm" style="margin:0; border-color:#698b99; color:#698b99; text-decoration:none;">OPEN HOSTING URL</a>'
    + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="retryShowrunnerFcmRegistration()">RETRY AUTO-REGISTER</button>'
    + '</div>'
    + '<div id="push-admin-status" style="color:#71717a; font-size:11px; line-height:1.5; word-break:break-word;"></div>'
    + '</div>'
    + '</div>';

  if (!document.getElementById('push-token-modal-overlay')) {
    var modal = document.createElement('div');
    modal.id = 'push-token-modal-overlay';
    modal.className = 'modal-overlay';
    modal.style.cssText = 'z-index:8000; display:none;';
    modal.innerHTML =
      '<div class="modal" style="max-width:520px; width:95%;">'
      + '<h3 class="modal-title" style="color:#10b981;">Save device token</h3>'
      + '<p style="color:#a1a1aa; font-size:11px; line-height:1.45; margin:0 0 12px 0;">'
      + 'Use when auto-register fails. Open <strong>web.app</strong> on the device, allow notifications, then fetch the token from the hosting shell or paste it manually.'
      + '</p>'
      + '<textarea id="push-device-token-input" rows="4" placeholder="Paste FCM device token here…" style="width:100%; box-sizing:border-box; padding:10px; background:#27272a; border:1px solid #444; color:#fff; border-radius:6px; font-size:10px; margin-bottom:10px; resize:vertical; font-family:monospace;"></textarea>'
      + '<div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;">'
      + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="fetchDeviceTokenFromHosting()">GET TOKEN FROM HOSTING</button>'
      + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981;" onclick="saveShowrunnerDeviceToken()">SAVE TO MY ACCOUNT</button>'
      + '</div>'
      + '<span id="push-device-token-status" style="display:block; color:#71717a; font-size:10px; margin-bottom:12px; line-height:1.4;"></span>'
      + '<div style="display:flex; justify-content:flex-end; gap:8px;">'
      + '<button type="button" class="btn-close" style="width:auto; margin:0;" onclick="closePushTokenModal()">CLOSE</button>'
      + '</div></div>';
    document.body.appendChild(modal);
  }

  if (typeof window.onShowrunnerFcmRegistered !== 'function') {
    window.onShowrunnerFcmRegistered = function() {
      setTimeout(refreshPushAdminStatus, 300);
    };
  }

  setTimeout(refreshPushAdminStatus, 50);
}

function openPushTokenModal() {
  var modal = document.getElementById('push-token-modal-overlay');
  var note = document.getElementById('push-device-token-status');
  if (note) note.textContent = '';
  if (modal) modal.style.display = 'flex';
}

function closePushTokenModal() {
  var modal = document.getElementById('push-token-modal-overlay');
  if (modal) modal.style.display = 'none';
}

function escapePushHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
}

function escapePushJs(s) {
  return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function pushColorTag(label, color) {
  return '<span style="color:' + color + '; font-weight:800;">' + escapePushHtml(label) + '</span>';
}

var PUSH_COLOR_DESKTOP = '#c084fc';
var PUSH_COLOR_MOBILE = '#38bdf8';
var PUSH_COLOR_OS_APPLE = '#fb923c';
var PUSH_COLOR_OS_CHROME = '#4ade80';
var PUSH_COLOR_MUTED = '#52525b';

function colorForFormFactor(d) {
  var ff = String(d.formFactor || '').toLowerCase();
  if (ff === 'mobile') return PUSH_COLOR_MOBILE;
  if (ff === 'desktop') return PUSH_COLOR_DESKTOP;
  var lab = String(d.label || '').toLowerCase();
  if (lab.indexOf('mobile') !== -1 || lab.indexOf('pwa-mobile') !== -1) return PUSH_COLOR_MOBILE;
  return PUSH_COLOR_DESKTOP;
}

function colorForPlatform(platform) {
  var p = String(platform || '').toLowerCase();
  if (!p || p === 'mobile' || p === 'desktop' || p === 'phone' || p === 'unknown') return '';
  if (p.indexOf('iphone') !== -1 || p.indexOf('ipad') !== -1 || p.indexOf('mac') !== -1 || p.indexOf('ios') !== -1) {
    return PUSH_COLOR_OS_APPLE;
  }
  if (p.indexOf('android') !== -1 || p.indexOf('windows') !== -1 || p.indexOf('win') !== -1) {
    return PUSH_COLOR_OS_CHROME;
  }
  if (p.indexOf('chrome os') !== -1 || p.indexOf('cros') !== -1) return PUSH_COLOR_OS_CHROME;
  return '#a1a1aa';
}

function colorForBrowser(browser) {
  var b = String(browser || '').toLowerCase();
  if (b.indexOf('chrome') !== -1 || b === 'crios') return PUSH_COLOR_OS_CHROME;
  if (b.indexOf('safari') !== -1) return PUSH_COLOR_OS_APPLE;
  if (b.indexOf('edge') !== -1 || b.indexOf('samsung') !== -1 || b.indexOf('opera') !== -1) {
    return PUSH_COLOR_OS_CHROME;
  }
  if (b.indexOf('firefox') !== -1) return '#f87171';
  return PUSH_COLOR_DESKTOP;
}

function colorForDelivery(delivery) {
  var d = String(delivery || '').toLowerCase();
  if (d === 'pwa') return PUSH_COLOR_MOBILE;
  if (d === 'browser') return PUSH_COLOR_DESKTOP;
  return '#a1a1aa';
}

function resolveDevicePlatformLabel(d, factor) {
  var platform = String(d.platform || '').trim();
  if (platform && platform !== 'Mobile' && platform !== 'Desktop') return platform;
  if (factor === 'Mobile') return 'Phone';
  return platform || '—';
}

function renderDeviceInfoColumns(d) {
  var name = escapePushHtml(d.ownerCrewName || d.crewName || 'Unknown');

  var factor = '';
  if (d.formFactor === 'mobile') factor = 'Mobile';
  else if (d.formFactor === 'desktop') factor = 'Desktop';
  else {
    var lab = String(d.label || '').toLowerCase();
    if (lab.indexOf('mobile') !== -1) factor = 'Mobile';
    else if (lab.indexOf('desktop') !== -1) factor = 'Desktop';
  }
  var factorHtml = factor
    ? pushColorTag(factor, colorForFormFactor(d))
    : '<span style="color:' + PUSH_COLOR_MUTED + ';">—</span>';

  var platformLabel = resolveDevicePlatformLabel(d, factor);
  var platformHtml;
  if (platformLabel === '—') {
    platformHtml = '<span style="color:' + PUSH_COLOR_MUTED + ';">—</span>';
  } else {
    var platformColor = colorForPlatform(platformLabel) || '#a1a1aa';
    platformHtml = pushColorTag(platformLabel, platformColor);
  }

  var browser = d.browser
    ? pushColorTag(d.browser, colorForBrowser(d.browser))
    : '<span style="color:' + PUSH_COLOR_MUTED + ';">—</span>';

  var delivery = d.delivery
    ? pushColorTag(d.delivery, colorForDelivery(d.delivery))
    : '<span style="color:' + PUSH_COLOR_MUTED + ';">—</span>';

  return {
    name: '<span style="color:#fff; font-weight:800;" title="' + name + '">' + name + '</span>',
    factor: factorHtml,
    platform: platformHtml,
    browser: browser,
    delivery: delivery
  };
}

function formatPushTokenHint(d) {
  if (d && d.tokenHint) return String(d.tokenHint);
  var t = String((d && d.token) || '').trim();
  if (t.length > 20) return t.slice(0, 8) + '…' + t.slice(-6);
  if (t) return t;
  return String((d && d.tokenKey) || '—');
}

var _pushTokenPeekTimer = null;

function ensurePushTokenPeekPopover() {
  var pop = document.getElementById('push-token-peek-pop');
  if (pop) return pop;
  pop = document.createElement('div');
  pop.id = 'push-token-peek-pop';
  pop.className = 'push-token-peek-pop';
  pop.innerHTML = ''
    + '<div class="push-token-peek-label">FCM device token</div>'
    + '<div class="push-token-peek-text"></div>'
    + '<button type="button" class="push-token-peek-copy" onclick="copyPeekPushToken()">COPY</button>';
  pop.addEventListener('mouseenter', function() {
    if (_pushTokenPeekTimer) clearTimeout(_pushTokenPeekTimer);
  });
  pop.addEventListener('mouseleave', function() {
    scheduleClosePushTokenPeek();
  });
  document.body.appendChild(pop);
  return pop;
}

function openPushTokenPeek(ev, tokenKey) {
  if (_pushTokenPeekTimer) clearTimeout(_pushTokenPeekTimer);
  var full = (window.__srPushTokenPeek || {})[tokenKey] || '';
  if (!full) return;
  var pop = ensurePushTokenPeekPopover();
  var textEl = pop.querySelector('.push-token-peek-text');
  if (textEl) textEl.textContent = full;
  pop.dataset.tokenKey = tokenKey;
  var copyBtn = pop.querySelector('.push-token-peek-copy');
  if (copyBtn) copyBtn.textContent = 'COPY';
  var r = (ev.currentTarget || ev.target).getBoundingClientRect();
  pop.style.left = Math.max(8, Math.min(r.left, window.innerWidth - 372)) + 'px';
  pop.style.top = (r.bottom + 6) + 'px';
  pop.classList.add('visible');
}

function scheduleClosePushTokenPeek() {
  if (_pushTokenPeekTimer) clearTimeout(_pushTokenPeekTimer);
  _pushTokenPeekTimer = setTimeout(function() {
    var pop = document.getElementById('push-token-peek-pop');
    if (pop) pop.classList.remove('visible');
  }, 180);
}

function copyPeekPushToken() {
  var pop = document.getElementById('push-token-peek-pop');
  if (!pop) return;
  var key = pop.dataset.tokenKey || '';
  var full = (window.__srPushTokenPeek || {})[key] || '';
  if (!full) return;
  var btn = pop.querySelector('.push-token-peek-copy');
  function doneOk() {
    if (btn) {
      btn.textContent = 'Copied!';
      setTimeout(function() { if (btn) btn.textContent = 'COPY'; }, 1200);
    }
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(full).then(doneOk).catch(function() {
      window.prompt('Copy token:', full);
    });
  } else {
    window.prompt('Copy token:', full);
  }
}

function renderPushDeviceList(devices) {
  var list = document.getElementById('push-device-list');
  if (!list) return;
  try {
  if (!devices || !devices.length) {
    list.innerHTML = '<div style="color:#52525b; font-size:14px; line-height:1.45; padding:8px 0;">No devices registered. Open <strong>web.app</strong> on phone → allow notifications → log in.</div>';
    return;
  }
  var html = '<div class="push-dev-table">'
    + '<div class="push-dev-grid push-dev-head">'
    + '<span>Name</span><span>Type</span><span>OS</span><span>Browser</span><span>Delivery</span><span>Last seen</span><span>Token</span><span></span>'
    + '</div>';
  window.__srPushTokenPeek = {};
  devices.forEach(function(d) {
    var when = d.updatedAt ? d.updatedAt.slice(0, 16).replace('T', ' ') : '—';
    var cols = renderDeviceInfoColumns(d);
    var key = String(d.tokenKey || '');
    var tokenFull = String(d.token || '').trim();
    if (key && tokenFull) window.__srPushTokenPeek[key] = tokenFull;
    var hint = escapePushHtml(formatPushTokenHint(d));
    var keyEsc = escapePushHtml(key);
    var owner = escapePushJs(d.ownerCrewName || d.crewName || '');
    var peekAttrs = key && tokenFull
      ? ' onmouseenter="openPushTokenPeek(event, \'' + escapePushJs(key) + '\')" onmouseleave="scheduleClosePushTokenPeek()"'
      : '';
    html += '<div class="push-dev-grid push-dev-row">'
      + '<span>' + cols.name + '</span>'
      + '<span>' + cols.factor + '</span>'
      + '<span>' + cols.platform + '</span>'
      + '<span>' + cols.browser + '</span>'
      + '<span>' + cols.delivery + '</span>'
      + '<span style="color:#71717a; font-size:13px;">' + escapePushHtml(when) + '</span>'
      + '<span class="push-dev-token-wrap"' + peekAttrs + '><span class="push-dev-token-hint">' + hint + '</span></span>'
      + '<span class="push-dev-actions">'
      + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#10b981; color:#10b981; white-space:nowrap;" onclick="runShowrunnerTestPushDevice(\'' + keyEsc + '\', \'' + owner + '\')">TEST</button>'
      + '<button type="button" class="btn-outline btn-sm" style="margin:0; border-color:#ef4444; color:#ef4444; white-space:nowrap;" onclick="revokeShowrunnerDevice(\'' + keyEsc + '\', \'' + owner + '\')">REVOKE</button>'
      + '</span>'
      + '</div>';
  });
  html += '</div>';
  list.innerHTML = html;
  } catch (err) {
    list.innerHTML = '<div style="color:#ef4444; font-size:12px; padding:8px 0;">Could not render device list: ' + escapePushHtml((err && err.message) ? err.message : String(err)) + '</div>';
  }
}

function setPushAdminStatus(html, isError) {
  var status = document.getElementById('push-admin-status');
  if (!status) return;
  status.innerHTML = html;
}

function saveShowrunnerVapidKey() {
  var input = document.getElementById('push-vapid-input');
  var note = document.getElementById('push-vapid-status');
  if (!input || !input.value.trim()) {
    if (note) note.innerHTML = '<span style="color:#ef4444;">Paste the Web Push public key first.</span>';
    return;
  }
  if (note) note.textContent = 'Saving…';
  google.script.run
    .withFailureHandler(function(err) {
      if (note) note.innerHTML = '<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>';
    })
    .withSuccessHandler(function(res) {
      if (!note) return;
      if (res && res.success) {
        note.innerHTML = '<span style="color:#10b981;">' + escapePushHtml(res.message) + '</span>';
        input.value = '';
      } else {
        note.innerHTML = '<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Save failed') + '</span>';
      }
      refreshPushAdminStatus();
    })
    .saveFirebaseVapidKey(ACTIVE_USER_NAME, input.value.trim());
}

function fetchDeviceTokenFromHosting() {
  var note = document.getElementById('push-device-token-status');
  var input = document.getElementById('push-device-token-input');
  openPushTokenModal();
  if (window.self === window.top) {
    if (note) note.innerHTML = '<span style="color:#ef4444;">Open ' + SHOWRUNNER_HOSTING_URL + ' in this shell first.</span>';
    return;
  }
  if (note) note.textContent = 'Fetching token from hosting shell…';
  var done = false;
  function onMsg(ev) {
    if (!ev.data || ev.data.type !== 'SHOWRUNNER_FCM_TOKEN' || !ev.data.token) return;
    window.removeEventListener('message', onMsg);
    if (done) return;
    done = true;
    if (input) input.value = ev.data.token;
    if (note) note.innerHTML = '<span style="color:#10b981;">Token received — review and click SAVE TO MY ACCOUNT.</span>';
  }
  window.addEventListener('message', onMsg);
  try {
    window.parent.postMessage({ type: 'SHOWRUNNER_REQUEST_FCM_TOKEN' }, '*');
  } catch (e) { /* ignore */ }
  setTimeout(function() {
    window.removeEventListener('message', onMsg);
    if (!done && note) {
      note.innerHTML = '<span style="color:#f59e0b;">No token yet — on phone tap Set up shift alerts until Step 1 says token OK.</span>';
    }
  }, 10000);
}

function saveShowrunnerDeviceToken() {
  var input = document.getElementById('push-device-token-input');
  var note = document.getElementById('push-device-token-status');
  openPushTokenModal();
  if (!input || !input.value.trim()) {
    if (note) note.innerHTML = '<span style="color:#ef4444;">Paste or fetch a device token first.</span>';
    return;
  }
  if (note) note.textContent = 'Saving…';
  google.script.run
    .withFailureHandler(function(err) {
      if (note) note.innerHTML = '<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>';
    })
    .withSuccessHandler(function(res) {
      if (!note) return;
      if (res && res.success) {
        note.innerHTML = '<span style="color:#10b981;">Device token saved.</span>';
        input.value = '';
        setTimeout(closePushTokenModal, 1200);
      } else {
        note.innerHTML = '<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Save failed') + '</span>';
      }
      refreshPushAdminStatus();
    })
    .saveFcmDeviceToken(ACTIVE_USER_NAME, input.value.trim());
}

function refreshPushAdminStatus() {
  var inShell = (window.self !== window.top);
  if (!inShell) {
    setPushAdminStatus('<span style="color:#ef4444;">Open <a href="' + SHOWRUNNER_HOSTING_URL + '" target="_blank" style="color:#10b981;">' + SHOWRUNNER_HOSTING_URL + '</a> for device registration.</span>');
    return;
  }

  google.script.run
    .withFailureHandler(function(err) {
      setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>');
    })
    .withSuccessHandler(function(setup) {
      if (!setup || !setup.success) {
        setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml((setup && setup.message) || 'Setup check failed') + '</span>');
        return;
      }

      var vapidActive = document.getElementById('push-vapid-active');
      if (vapidActive) {
        if (!setup.vapidKeyValid) {
          vapidActive.innerHTML = '<span style="color:#ef4444;">VAPID missing or invalid — paste key above.</span>';
        } else if (setup.vapidKeyPrefix) {
          vapidActive.innerHTML = 'Server VAPID: <strong>' + escapePushHtml(setup.vapidKeyPrefix) + '…</strong> (' + setup.vapidKeyLength + ' chars)';
        }
      }

      google.script.run
        .withFailureHandler(function(err) {
          renderPushDeviceList([]);
          setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>');
        })
        .withSuccessHandler(function(res) {
          if (res && res.success) {
            renderPushDeviceList(res.devices || []);
            var n = (res.devices || []).length;
            var crews = res.crewCount || 0;
            var statusMsg = n
              ? '<span style="color:#10b981;">' + n + ' fleet device(s) · ' + crews + ' crew with alerts · TEST per row or TEST ALL</span>'
              : '<span style="color:#f59e0b;">No fleet devices yet — crew opens web.app, logs in, allows notifications</span>';
            if (res.truncated) {
              statusMsg += ' <span style="color:#f59e0b;">(showing newest 40)</span>';
            }
            setPushAdminStatus(statusMsg);
          } else {
            renderPushDeviceList([]);
            setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Could not load devices') + '</span>');
          }
        })
        .getFcmDevicesFleetAdminDetail(ACTIVE_USER_NAME);
    })
    .getFirebasePushSetupStatus(ACTIVE_USER_NAME);
}

function retryShowrunnerFcmRegistration() {
  setPushAdminStatus('<span style="color:#a1a1aa;">Retrying auto-register…</span>');
  if (window.self === window.top) {
    setPushAdminStatus('<span style="color:#ef4444;">Open ' + SHOWRUNNER_HOSTING_URL + ' first.</span>');
    return;
  }
  if (typeof window.retryShowrunnerFcmBridge === 'function') {
    window.retryShowrunnerFcmBridge();
    setTimeout(refreshPushAdminStatus, 3000);
  }
}

function cleanupShowrunnerFcmDevices() {
  setPushAdminStatus('<span style="color:#a1a1aa;">Cleaning stale devices…</span>');
  google.script.run
    .withFailureHandler(function(err) {
      setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>');
    })
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        setPushAdminStatus('<span style="color:#10b981;">' + escapePushHtml(res.message) + '</span>');
      } else {
        setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Cleanup failed') + '</span>');
      }
      setTimeout(refreshPushAdminStatus, 400);
    })
    .cleanupFcmDevicesForUser(ACTIVE_USER_NAME);
}

function runShowrunnerTestPushDevice(tokenKey, deviceOwnerCrewName) {
  if (!tokenKey) return;
  setPushAdminStatus('<span style="color:#a1a1aa;">Sending test to device…</span>');
  google.script.run
    .withFailureHandler(function(err) {
      setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>');
    })
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        setPushAdminStatus('<span style="color:#10b981;">' + escapePushHtml(res.message) + '</span>');
      } else {
        setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Failed') + '</span>');
      }
      setTimeout(refreshPushAdminStatus, 500);
    })
    .sendTestPushToDevice(ACTIVE_USER_NAME, tokenKey, deviceOwnerCrewName || ACTIVE_USER_NAME);
}

function revokeShowrunnerDevice(tokenKey, deviceOwnerCrewName) {
  if (!tokenKey) return;
  var owner = deviceOwnerCrewName || ACTIVE_USER_NAME;
  if (!confirm('Remove this device from push registry?\n\n' + owner + ' will stop receiving alerts until re-registered from web.app.')) return;
  setPushAdminStatus('<span style="color:#a1a1aa;">Revoking device…</span>');
  google.script.run
    .withFailureHandler(function(err) {
      setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>');
    })
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        setPushAdminStatus('<span style="color:#10b981;">' + escapePushHtml(res.message) + '</span>');
      } else {
        setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Revoke failed') + '</span>');
      }
      setTimeout(refreshPushAdminStatus, 400);
    })
    .revokeFcmDeviceByTokenKey(ACTIVE_USER_NAME, tokenKey, owner);
}

function runShowrunnerTestPush() {
  setPushAdminStatus('<span style="color:#a1a1aa;">Sending test to all devices…</span>');
  google.script.run
    .withFailureHandler(function(err) {
      setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml(err.message || err) + '</span>');
    })
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        var color = res.partial ? '#f59e0b' : '#10b981';
        setPushAdminStatus('<span style="color:' + color + ';">' + escapePushHtml(res.message) + '</span>');
      } else {
        setPushAdminStatus('<span style="color:#ef4444;">' + escapePushHtml((res && res.message) || 'Failed') + '</span>');
      }
      setTimeout(refreshPushAdminStatus, 500);
    })
    .sendTestPushNotification(ACTIVE_USER_NAME);
}
</script>
