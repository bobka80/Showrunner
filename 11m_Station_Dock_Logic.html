<!-- @INDEX: STATION -> Dock panel navigation + layout glue (desktop only) -->
<script>
(function stationDockLogicInit_() {
  if (!window.IS_STATION_DEVICE) return;

  function dockSkin_() {
    return (typeof window.stationActiveUiSkin_ === 'function' && window.stationActiveUiSkin_() === 'dock_panel');
  }

  function esc_(v) {
    return String(v == null ? '' : v).replace(/[<&>"]/g, function(c) {
      return c === '<' ? '&lt;' : (c === '>' ? '&gt;' : (c === '"' ? '&quot;' : '&amp;'));
    });
  }

  var DOCK_WEATHER_SCROLL_SEC_PER_DAY = 14;
  var dockWeatherHoverTimer_ = null;
  var dockWeatherHoverActiveId_ = null;

  function stationDockWeatherEmoji_(cond) {
    if (typeof weatherCondEmoji === 'function') return weatherCondEmoji(cond);
    return '☀️';
  }

  function stationDockWeatherCreditsHtml_(days) {
    if (!days || !days.length) {
      return '<div class="station-dock-ss-credit-line station-dock-ss-credit-line--muted">No forecast for project dates</div>';
    }
    return days.map(function(d) {
      var dayName = d.dObj.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', timeZone: 'UTC' });
      var alert = d.maxT > 35 || d.minT < 5 || d.wind > 40 || d.rainProb > 50;
      return '<div class="station-dock-ss-credit-line' + (alert ? ' station-dock-ss-credit-line--alert' : '') + '">' +
        '<div class="station-dock-ss-credit-head">' +
        '<span class="station-dock-ss-credit-day">' + dayName + '</span>' +
        '<span class="station-dock-ss-credit-emoji" aria-hidden="true">' + stationDockWeatherEmoji_(d.cond) + '</span>' +
        '</div>' +
        '<span class="station-dock-ss-credit-stats">' + Math.round(d.maxT) + '° / ' + Math.round(d.minT) + '° · ' +
        Math.round(d.wind) + ' km/h · ' + d.rainProb + '% rain</span></div>';
    }).join('');
  }

  function stationDockWeatherScrollRestart_(track, dayCount) {
    if (!track) return;
    var count = Math.max(1, dayCount || 1);
    var sec = Math.max(90, count * DOCK_WEATHER_SCROLL_SEC_PER_DAY);
    track.style.setProperty('--ss-scroll-duration', sec + 's');
    track.style.animation = 'none';
    void track.offsetHeight;
    requestAnimationFrame(function() {
      track.style.animation = 'station-dock-ss-credits-scroll var(--ss-scroll-duration, 168s) linear infinite';
    });
  }

  function stationDockCancelWeatherHoverClose_() {
    if (dockWeatherHoverTimer_) {
      clearTimeout(dockWeatherHoverTimer_);
      dockWeatherHoverTimer_ = null;
    }
  }

  function stationDockPositionWeatherHover_(anchorEl) {
    var pop = document.getElementById('station-dock-weather-hover');
    if (!pop || !anchorEl) return;
    var rect = anchorEl.getBoundingClientRect();
    var popW = pop.offsetWidth || 280;
    var left = rect.right + 6;
    if (left + popW > window.innerWidth - 8) left = Math.max(8, rect.left - popW - 6);
    pop.style.left = Math.round(left) + 'px';
    pop.style.top = Math.round(rect.top + rect.height / 2) + 'px';
    pop.style.transform = 'translateY(-50%)';
  }

  function stationDockCloseWeatherHover_(delayMs) {
    stationDockCancelWeatherHoverClose_();
    dockWeatherHoverTimer_ = setTimeout(function() {
      dockWeatherHoverTimer_ = null;
      dockWeatherHoverActiveId_ = null;
      var pop = document.getElementById('station-dock-weather-hover');
      if (!pop) return;
      var track = pop.querySelector('.station-dock-weather-hover__track');
      if (track) {
        track.style.animation = 'none';
        track.innerHTML = '';
      }
      pop.classList.remove('is-open');
      pop.style.display = 'none';
      pop.setAttribute('aria-hidden', 'true');
    }, delayMs || 140);
  }

  function stationDockOpenWeatherHover_(hostEl, proj) {
    var pop = document.getElementById('station-dock-weather-hover');
    if (!pop || !hostEl || !proj) return;
    stationDockCancelWeatherHoverClose_();
    dockWeatherHoverActiveId_ = proj.id;
    var track = pop.querySelector('.station-dock-weather-hover__track');
    var title = pop.querySelector('.station-dock-weather-hover__title');
    if (title) title.textContent = proj.title || proj.name || 'Forecast';
    pop.style.display = 'flex';
    pop.classList.add('is-open');
    pop.setAttribute('aria-hidden', 'false');
    stationDockPositionWeatherHover_(hostEl);
    if (track) track.innerHTML = '<div class="station-dock-ss-credit-line station-dock-ss-credit-line--muted">Loading…</div>';
    if (typeof fetchMobileWeatherDaysForProject !== 'function') {
      if (track) track.innerHTML = stationDockWeatherCreditsHtml_([]);
      return;
    }
    fetchMobileWeatherDaysForProject(proj).then(function(result) {
      if (dockWeatherHoverActiveId_ !== proj.id) return;
      var days = (result && result.days) ? result.days : [];
      if (!track) return;
      var block = stationDockWeatherCreditsHtml_(days);
      track.innerHTML = days.length ? (block + block) : block;
      stationDockWeatherScrollRestart_(track, days.length);
    });
  }

  function stationDockBindWeatherHover_(hostEl, proj) {
    if (!hostEl || hostEl.__srDockWeatherHover) return;
    hostEl.__srDockWeatherHover = true;
    hostEl.style.pointerEvents = 'auto';
    hostEl.addEventListener('click', function(ev) { ev.stopPropagation(); });
    hostEl.addEventListener('mousedown', function(ev) { ev.stopPropagation(); });
    hostEl.addEventListener('mouseenter', function() {
      stationDockOpenWeatherHover_(hostEl, proj);
    });
    hostEl.addEventListener('mouseleave', function() {
      stationDockCloseWeatherHover_(160);
    });
  }

  function stationDockInitWeatherHover_() {
    var pop = document.getElementById('station-dock-weather-hover');
    if (!pop || pop.__srDockHoverRoot) return;
    pop.__srDockHoverRoot = true;
    pop.addEventListener('mouseenter', stationDockCancelWeatherHoverClose_);
    pop.addEventListener('mouseleave', function() { stationDockCloseWeatherHover_(160); });
  }

  function stationDockApplyWeatherBadges_(projects) {
    if (typeof renderMobileWeatherSummaryBadge !== 'function') return;
    var isOutdoor = typeof stationProjectIsOutdoor_ === 'function'
      ? stationProjectIsOutdoor_
      : (typeof projectIsOutdoorMobile === 'function' ? projectIsOutdoorMobile : function() { return false; });
    (projects || []).forEach(function(p) {
      if (!isOutdoor(p)) return;
      var host = document.getElementById('dock-weather-' + p.id);
      if (!host) return;
      renderMobileWeatherSummaryBadge(host, p, { interactive: false });
      host.style.pointerEvents = 'auto';
      stationDockBindWeatherHover_(host, p);
    });
  }

  window.stationInitDockUi_ = function() {
    if (!dockSkin_()) return;
    document.documentElement.classList.add('station-dock-root');
    document.documentElement.classList.remove('station-device-root');
    var phoneShell = document.getElementById('station-shell');
    if (phoneShell) phoneShell.style.display = 'none';
    var dockShell = document.getElementById('station-dock-shell');
    if (dockShell) dockShell.style.display = 'flex';
    stationDockMountScanRail_();
    stationDockInitWeatherHover_();
    stationDockSyncWorkspace_();
    if (typeof stationPreloadWarehouseProjects_ === 'function') stationPreloadWarehouseProjects_();
    if (typeof stationPreloadVaultForPa_ === 'function') stationPreloadVaultForPa_();
  };

  window.stationRefreshDockUiSkin_ = function() {
    if (dockSkin_()) window.stationInitDockUi_();
  };

  function stationDockMountScanRail_() {
    if (window.__srDockScanMounted) return;
    var headRight = document.getElementById('station-dock-head-right');
    var railBody = document.getElementById('station-dock-rail-body');
    var railActions = document.getElementById('station-dock-rail-actions');
    var railFoot = document.getElementById('station-dock-rail-foot');
    if (!headRight || !railBody || !railFoot) return;

    var brand = document.querySelector('.station-shell-brand');
    var panel = document.getElementById('station-scan-panel');
    var logoutBtn = document.getElementById('station-btn-logout-host');
    var scanBtn = document.getElementById('station-btn-scan-panel');
    var gunCog = document.getElementById('station-btn-settings-cog');
    var exitBtn = document.getElementById('station-dock-exit-app');
    var panelActions = document.getElementById('station-panel-actions');
    var panelNote = document.getElementById('station-panel-note');

    if (brand) {
      if (exitBtn) headRight.insertBefore(brand, exitBtn);
      else headRight.appendChild(brand);
    }
    if (gunCog) {
      if (exitBtn) headRight.insertBefore(gunCog, exitBtn);
      else headRight.appendChild(gunCog);
    }
    if (scanBtn) scanBtn.style.display = 'none';
    if (panel) {
      panel.classList.add('is-open');
      panel.setAttribute('aria-hidden', 'false');
      railBody.appendChild(panel);
    }
    if (panelActions && railActions) railActions.appendChild(panelActions);
    if (panelNote && railActions) railActions.appendChild(panelNote);
    if (logoutBtn) railFoot.appendChild(logoutBtn);

    if (typeof window.stationDockApplyAllZoom_ === 'function') window.stationDockApplyAllZoom_();

    window.__srDockScanMounted = true;
  }

  window.stationDockSyncPaHeader_ = function() {
    if (!dockSkin_()) return;
    var nav = document.getElementById('station-dock-head-left-nav');
    var paOpen = document.body.classList.contains('station-dock-pa-open');
    if (nav) nav.style.display = paOpen ? 'flex' : 'none';
    var consoleBtn = document.getElementById('station-dock-pa-console');
    var master = document.getElementById('btn-master-operation');
    if (consoleBtn) {
      if (!paOpen || !master) {
        consoleBtn.style.display = 'none';
      } else {
        var masterVisible = master.style.display !== 'none';
        consoleBtn.style.display = masterVisible ? 'inline-flex' : 'none';
        consoleBtn.textContent = (master.textContent || 'CHECK-OUT').trim();
      }
    }
  };

  window.stationDockPaConsole_ = function() {
    var master = document.getElementById('btn-master-operation');
    if (master && master.style.display !== 'none') {
      master.click();
      return;
    }
    if (typeof window.startOperationUI === 'function') {
      try { window.startOperationUI('CHECK-OUT', null); } catch (e) { /* ignore */ }
    }
  };

  window.stationDockExitApp_ = function() {
    if (!confirm('Exit Showrunner Station?')) return;
    if (typeof stationInvokeGunNative_ === 'function') {
      stationInvokeGunNative_('exitApp');
      return;
    }
    try {
      if (window.chrome && window.chrome.webview && window.chrome.webview.postMessage) {
        window.chrome.webview.postMessage(JSON.stringify({ type: 'SR_STATION_GUN', method: 'exitApp', args: [] }));
      }
    } catch (e) { /* ignore */ }
  };

  function stationDockSyncWorkspace_() {
    var host = (typeof stationReadHostSession_ === 'function') ? stationReadHostSession_() : null;
    var prompt = document.getElementById('station-dock-host-prompt');
    var home = document.getElementById('station-dock-home');
    var title = document.getElementById('station-dock-workspace-title');
    var paOpen = document.body.classList.contains('station-dock-pa-open');

    if (paOpen) {
      window.stationDockSyncPaHeader_();
      return;
    }
    window.stationDockSyncPaHeader_();

    if (prompt) prompt.style.display = 'none';
    if (home) home.style.display = 'flex';
    if (!host) {
      if (title) title.textContent = 'Projects';
      stationDockLoadProjects_();
      return;
    }
    if (title) title.textContent = 'Projects';
    stationDockLoadProjects_();
  }

  window.stationDockLoadProjects_ = function() {
    var statusEl = document.getElementById('station-dock-project-status');
    var listEl = document.getElementById('station-dock-project-list');
    if (!listEl) return;

    var cached = (window.stationProjectsFor === '__warehouse__' && window.stationProjectsCache && window.stationProjectsCache.length)
      ? window.stationProjectsCache : null;
    if (cached) {
      stationDockRenderProjectList_(cached);
    } else if (statusEl) {
      statusEl.style.display = 'none';
    }

    if (typeof stationPreloadWarehouseProjects_ === 'function') stationPreloadWarehouseProjects_();
  };

  window.stationDockShowProjectsError_ = function(msg) {
    var statusEl = document.getElementById('station-dock-project-status');
    var listEl = document.getElementById('station-dock-project-list');
    if (statusEl) {
      statusEl.style.display = 'block';
      statusEl.textContent = 'Could not load projects' + (msg ? ': ' + msg : '') + '. Tap to retry.';
      statusEl.onclick = function() {
        window.stationProjectsCache = null;
        window.stationProjectsFor = null;
        window.__stationWarehouseFetchPending = null;
        window.__stationProjectsFetchHost = null;
        stationDockLoadProjects_();
      };
    }
    if (listEl && !listEl.children.length) {
      listEl.innerHTML = '';
    }
  };

  window.stationDockRenderProjectList_ = function(projects) {
    var statusEl = document.getElementById('station-dock-project-status');
    var listEl = document.getElementById('station-dock-project-list');
    if (!listEl) return;

    if (statusEl) {
      statusEl.onclick = null;
      statusEl.style.cursor = '';
    }

    var sorted = (projects || []).slice().sort(function(a, b) {
      var d1 = a.start ? new Date(a.start) : new Date(8640000000000000);
      var d2 = b.start ? new Date(b.start) : new Date(8640000000000000);
      return d1 - d2;
    });

    var html = '';
    sorted.forEach(function(p) {
      var rawStatus = String(p.status || 'Draft').toUpperCase();
      if (rawStatus === 'TRASHED') return;
      var statusColor = '#a1a1aa';
      if (rawStatus === 'APPROVED') statusColor = '#10b981';
      else if (rawStatus === 'NOT APPROVED') statusColor = '#f97316';
      else if (rawStatus === 'CANCELLED') statusColor = '#ef4444';
      var dateStr = p.start ? new Date(p.start).toLocaleDateString() : 'No Date';
      var isOutdoor = typeof stationProjectIsOutdoor_ === 'function'
        ? stationProjectIsOutdoor_(p)
        : (typeof projectIsOutdoorMobile === 'function' ? projectIsOutdoorMobile(p) : false);
      var weatherSlot = isOutdoor
        ? '<div id="dock-weather-' + esc_(p.id) + '" class="mob-event-weather-badge"></div>'
        : '';
      html += '<button type="button" class="station-dock-project-card" style="border-left:4px solid ' + statusColor + ';" '
        + 'onclick="stationDockPickProject_(' + JSON.stringify(String(p.id)) + ')">'
        + '<div class="station-dock-project-card__row">'
        + '<div class="station-dock-project-card__main">'
        + '<div class="station-dock-project-card__title">' + esc_(p.title || p.name || 'Untitled') + '</div>'
        + '<div class="station-dock-project-card__meta">'
        + '<span>📅 ' + esc_(dateStr) + '</span>'
        + '<span style="color:' + statusColor + ';font-weight:700;">' + esc_(rawStatus) + '</span>'
        + '</div></div>'
        + weatherSlot
        + '</div></button>';
    });

    if (!html) html = '<div class="station-dock-project-empty">No upcoming events.</div>';
    listEl.innerHTML = html;
    listEl.scrollTop = 0;
    requestAnimationFrame(function() { listEl.scrollTop = 0; });
    if (statusEl) statusEl.style.display = 'none';
    if (typeof stationDockApplyWeatherBadges_ === 'function') {
      stationDockApplyWeatherBadges_(sorted);
    }
  };

  window.stationDockPickProject_ = function(pId) {
    stationDockCloseWeatherHover_(0);
    if (typeof window.openMobileProjectAssets !== 'function') {
      if (typeof stationSetStatus_ === 'function') stationSetStatus_('Project view unavailable on this build.', 'error');
      return;
    }

    var proj = (window.stationProjectsCache || []).find(function(p) { return String(p.id) === String(pId); });
    if (!proj) {
      try {
        var ph = JSON.parse(localStorage.getItem('sm_phantom_payload') || '{}');
        if (ph && ph.projects) proj = ph.projects.find(function(p) { return String(p.id) === String(pId); });
      } catch (e) { /* ignore */ }
    }
    if (!proj) {
      if (typeof stationSetStatus_ === 'function') stationSetStatus_('Could not open: project data missing.', 'error');
      window.stationProjectsCache = null;
      window.stationProjectsFor = null;
      return;
    }

    window.mobileCrewHubProject = proj;
    window.mobileCrewHubProjectId = pId;
    window.isProjectDirty = false;
    if (typeof window.syncProjectEditorHiddenFields === 'function') {
      try { window.syncProjectEditorHiddenFields(proj, pId); } catch (e) { /* ignore */ }
    } else {
      var fid = document.getElementById('edit-folder-id');
      if (fid) fid.value = pId;
    }

    document.body.classList.add('station-dock-pa-open', 'mobile-pa-compact');
    var home = document.getElementById('station-dock-home');
    var prompt = document.getElementById('station-dock-host-prompt');
    var title = document.getElementById('station-dock-workspace-title');
    if (home) home.style.display = 'none';
    if (prompt) prompt.style.display = 'none';
    if (title) title.textContent = proj.title || proj.name || 'Project';
    window.stationDockSyncPaHeader_();

    if (typeof stationSetStatus_ === 'function') {
      stationSetStatus_('Opening ' + (proj.title || proj.name || 'project') + '…', '');
    }

    if (typeof stationPreloadVaultForPa_ === 'function') stationPreloadVaultForPa_();

    try {
      var phantom = JSON.parse(localStorage.getItem('sm_phantom_payload') || '{}');
      if (phantom && phantom.projects) {
        var idx = phantom.projects.findIndex(function(p) { return String(p.id) === String(pId); });
        if (idx >= 0) phantom.projects[idx] = proj;
        else phantom.projects.push(proj);
        localStorage.setItem('sm_phantom_payload', JSON.stringify(phantom));
      }
    } catch (e) { /* ignore */ }

    try {
      window.openMobileProjectAssets(pId);
    } catch (e) {
      stationDockBackToProjects_();
      if (typeof stationSetStatus_ === 'function') {
        stationSetStatus_('Could not open project: ' + (e && e.message ? e.message : String(e)), 'error');
      }
      return;
    }

    setTimeout(function() {
      var ov = document.getElementById('project-assets-modal-overlay');
      var opened = ov && ov.style.display !== 'none';
      if (opened) {
        window.stationDockSyncPaHeader_();
        stationDockWatchPaExit_();
      } else {
        stationDockBackToProjects_();
        if (typeof stationSetStatus_ === 'function') {
          stationSetStatus_('Project didn’t open. Try again.', 'error');
        }
      }
    }, 250);
  };

  window.stationDockBackToProjects_ = function() {
    document.body.classList.remove('station-dock-pa-open', 'mobile-pa-compact');
    window.mobilePaCompactActive = false;
    var ov = document.getElementById('project-assets-modal-overlay');
    if (ov) ov.style.display = 'none';
    if (typeof window.closeMobilePaChoiceSheet === 'function') {
      try { window.closeMobilePaChoiceSheet(); } catch (e) { /* ignore */ }
    }
    stationDockSyncWorkspace_();
  };

  function stationDockWatchPaExit_() {
    if (window.stationDockPaWatchTimer) return;
    window.stationDockPaWatchTimer = setInterval(function() {
      var ov = document.getElementById('project-assets-modal-overlay');
      var closed = !ov || ov.style.display === 'none';
      if (closed || !document.body.classList.contains('mobile-pa-compact')) {
        clearInterval(window.stationDockPaWatchTimer);
        window.stationDockPaWatchTimer = null;
        stationDockBackToProjects_();
      }
    }, 400);
  }

  var origRender = window.stationRenderShellState_;
  if (typeof origRender === 'function' && !window.__srDockRenderWrapped) {
    window.__srDockRenderWrapped = true;
    window.stationRenderShellState_ = function() {
      origRender.apply(this, arguments);
      if (!dockSkin_()) return;
      var host = (typeof stationReadHostSession_ === 'function') ? stationReadHostSession_() : null;
      if (!host) {
        var stateLabel = document.getElementById('station-shell-state-label');
        var prompt = document.getElementById('station-shell-prompt');
        if (stateLabel) stateLabel.textContent = 'Ready';
        if (prompt) {
          prompt.style.display = 'none';
          prompt.textContent = '';
        }
        if (typeof stationSetStatus_ === 'function') stationSetStatus_('Ready.', 'ok');
      }
      stationDockSyncWorkspace_();
    };
  }

  var origBootstrap = window.stationApplyBootstrap_;
  if (typeof origBootstrap === 'function' && !window.__srDockBootstrapWrapped) {
    window.__srDockBootstrapWrapped = true;
    window.stationApplyBootstrap_ = function(data) {
      origBootstrap(data);
      if (dockSkin_()) window.stationInitDockUi_();
    };
  }

  document.addEventListener('DOMContentLoaded', function() {
    if (dockSkin_()) window.stationInitDockUi_();
  });
})();
</script>
