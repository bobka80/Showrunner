<!-- @INDEX: STATION -> RFID helpers (1/3) -->
<script>
function stationNormalizeEpc_(epc) {
  return String(epc == null ? '' : epc).trim().toLowerCase();
}

function stationParseScanPayload_(raw, tidOpt) {
  if (raw != null && typeof raw === 'object') {
    return {
      epc: String(raw.epc || raw.tag || '').trim(),
      tid: String(raw.tid || '').trim()
    };
  }
  return {
    epc: String(raw == null ? '' : raw).trim(),
    tid: String(tidOpt || '').trim()
  };
}

function stationResolveEpc_(epc) {
  var key = stationNormalizeEpc_(epc);
  if (!key) return null;
  var m = window.stationEquipMap || {};
  return m[key] || null;
}
window.stationResolveEpc = stationResolveEpc_;
window.stationNormalizeEpc = stationNormalizeEpc_;

function stationScanFeedStatusHtml_(hit, esc) {
  if (!hit || !hit.status || String(hit.status).toLowerCase() === 'active') return '';
  var st = String(hit.status);
  var note = hit.statusNote ? (' · ' + String(hit.statusNote).substring(0, 36)) : '';
  var cls = 'station-scan-feed__status';
  var low = st.toLowerCase();
  if (low.indexOf('damage') !== -1) cls += ' is-damaged';
  else if (low.indexOf('broken') !== -1) cls += ' is-broken';
  else if (low.indexOf('maintenance') !== -1) cls += ' is-maintenance';
  return '<span class="' + cls + '">' + esc(st + note) + '</span>';
}

function stationPaOperationActive_() {
  var overlay = document.getElementById('project-assets-modal-overlay');
  if (!overlay || overlay.style.display === 'none') return false;
  return document.body.classList.contains('mobile-pa-mode-operation');
}

/** Forward a gun scan into the open Project Assets checkout/check-in session. */
function stationForwardCheckoutScan_(tag) {
  if (!stationPaOperationActive_()) return false;
  var projectEl = document.getElementById('edit-folder-id');
  var input = document.getElementById('pa-rfid-scanner');
  if (!projectEl || !projectEl.value || !input) return false;

  var hit = stationResolveEpc_(tag);
  if (hit && hit.unitId && hit.kind !== 'crew' && typeof executeManualScanCall === 'function') {
    var assetId = hit.unitId;
    if (typeof currentProjectAssets !== 'undefined') {
      var onProj = currentProjectAssets.some(function(p) { return String(p.assetId) === String(assetId); });
      if (!onProj) return false;
    } else if (typeof globalAssets !== 'undefined' && globalAssets.length) {
      var ga = globalAssets.find(function(a) { return String(a.id) === String(assetId); });
      if (!ga) return false;
      assetId = ga.id;
    }

    var st = String(hit.status || 'Active').toLowerCase();
    if (st.indexOf('damage') !== -1 && typeof window.showMobilePaToast === 'function') {
      var dmgNote = hit.statusNote ? (' — ' + hit.statusNote) : '';
      window.showMobilePaToast('Damaged unit', (hit.name || 'Asset') + dmgNote + ' — still OK to check out.');
    } else if (st.indexOf('broken') !== -1 && typeof window.showMobilePaToast === 'function') {
      window.showMobilePaToast('Broken unit', (hit.name || 'Asset') + ' is marked Broken — still scanning.');
    }

    executeManualScanCall(projectEl.value, assetId, input, 1);
    stationSetStatus_('Checkout: ' + (hit.name || assetId), 'ok');
    return true;
  }

  if (typeof handleRfidScan === 'function') {
    input.value = stationNormalizeEpc_(tag);
    handleRfidScan();
    stationSetStatus_('Checkout scan…', '');
    return true;
  }
  return false;
}

function stationLoadEquipMapCache_() {
  try {
    var raw = localStorage.getItem(STATION_EQUIP_MAP_KEY);
    if (!raw) return;
    var parsed = JSON.parse(raw);
    if (parsed && parsed.map) window.stationEquipMap = parsed.map;
  } catch (e) { /* ignore */ }
  try {
    var crewRaw = localStorage.getItem(STATION_CREW_HOST_KEY);
    if (!crewRaw) return;
    var crewParsed = JSON.parse(crewRaw);
    if (crewParsed && crewParsed.roster) window.stationCrewHostRoster = crewParsed.roster;
  } catch (e2) { /* ignore */ }
}

function stationStoreCrewHostRoster_(roster) {
  if (!roster || !roster.length) return;
  window.stationCrewHostRoster = roster;
  try {
    localStorage.setItem(STATION_CREW_HOST_KEY, JSON.stringify({ roster: roster, ts: Date.now() }));
  } catch (e) { /* ignore */ }
}

function stationRefreshEquipMap_() {
  if (!window.IS_STATION_DEVICE) return;
  try {
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success || !res.map) return;
        window.stationEquipMap = res.map;
        try { localStorage.setItem(STATION_EQUIP_MAP_KEY, JSON.stringify({ map: res.map, ts: Date.now() })); } catch (e) { /* ignore */ }
        if (res.crewHostRoster) stationStoreCrewHostRoster_(res.crewHostRoster);
        stationDebug_('equip map: ' + (res.count || 0) + ' crew roster: ' + ((res.crewHostRoster && res.crewHostRoster.length) || 0));
        stationRenderScanFeed_();
      })
      .withFailureHandler(function(err) { stationDebug_('equip map ERR'); })
      .getStationEquipmentRfidMap(ACTIVE_USER_NAME);
  } catch (e) { /* ignore */ }
}

</script>
