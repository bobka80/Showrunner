<!-- @INDEX: MOBILE -> Assets Detail Sheet -->
<div id="mobile-pa-detail-sheet">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="font-weight:900;color:#fff;font-size:14px;" id="mobile-pa-detail-title">DETAIL</div>
        <button class="btn-close" style="width:auto;margin:0;padding:8px 14px !important;" onclick="closeMobilePaDetail()">CLOSE</button>
    </div>
    <div id="mobile-pa-detail-body" style="font-size:13px;color:#d4d4d8;line-height:1.5;"></div>
</div>

<div id="mobile-pa-vault-sheet">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;">
        <div style="font-weight:900;color:#10b981;font-size:13px;letter-spacing:0.5px;">ADD TO GENERAL</div>
        <button class="btn-close" style="width:auto;margin:0;padding:8px 14px !important;flex-shrink:0;" onclick="closeMobilePaVaultSearch()">CLOSE</button>
    </div>
    <input type="text" id="mobile-pa-vault-search" placeholder="Search vault by name…" autocomplete="off"
        style="width:100%;padding:12px;background:#0a0a0c;border:1px solid #10b981;color:#fff;border-radius:6px;font-size:14px;box-sizing:border-box;margin-bottom:12px;outline:none;"
        oninput="renderMobilePaVaultResults()">
    <div id="mobile-pa-vault-results" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;min-height:0;"></div>
</div>

<script>
/**
 * 01h_Mobile_Assets.html
 * Compact Project Assets on phone — assigned list, pack/checkout, vault search, small save.
 * @INDEX: MOBILE -> Project Assets
 */

window.mobilePaCompactActive = false;
window._mobilePaDomRestore = {};

window.isPaContainerRow = function(pa, asset) {
    if (!asset && pa && pa.assetId && typeof globalAssets !== 'undefined') {
        asset = globalAssets.find(function(a) { return a.id === pa.assetId; });
    }
    if (!asset) return false;
    return !!(pa.isAuto || asset.nestingLevel == 3 || asset.nestingLevel == 4 || asset.nestingLevel == 5 || asset.type === 'Container');
};

window.evaluateMobileLogisticsStatus = function() {
    const assets = (typeof currentProjectAssets !== 'undefined' && currentProjectAssets) ? currentProjectAssets : [];
    const gA = (typeof globalAssets !== 'undefined' && globalAssets) ? globalAssets : [];
    const rs = window.currentReadinessState || {};
    const containerPas = [];
    assets.forEach(function(pa) {
        const a = gA.find(function(x) { return x.id === pa.assetId; });
        if (isPaContainerRow(pa, a)) containerPas.push(pa);
    });
    const hasContainers = containerPas.length > 0;
    let truckDone = false;
    if (hasContainers) {
        truckDone = containerPas.every(function(pa) {
            if (pa.outboundStaged) return false;
            return !!(pa.outboundTruckUid && pa.outboundX != null && pa.outboundX !== '');
        });
    }
    const truckAuto = truckDone && (rs.truck === 'arranged_auto' || !!window._truckArrangeUsedAuto);
    const areasDone = !!(rs.loadin === 'done' || rs.loadin === 'complete');
    return { hasContainers: hasContainers, truckDone: truckDone, truckAuto: truckAuto, areasDone: areasDone, areasEnabled: truckDone };
};

window.ensureMobilePaCache = function(projectId, cb) {
    if (typeof currentProjectAssets !== 'undefined' && currentProjectAssets && currentProjectAssets.length) {
        if (cb) cb();
        return;
    }
    try {
        const cached = localStorage.getItem('sm_pa_cache_' + projectId);
        if (cached) {
            const parsed = JSON.parse(cached);
            if (parsed && parsed.current && parsed.current.length) {
                currentProjectAssets = parsed.current;
                if (cb) cb();
                return;
            }
        }
    } catch (e) { /* ignore */ }
    if (cb) cb();
};

window.updateMobileCrewLogisticsButtons = function() {
    const truckBtn = document.getElementById('mch-btn-truck');
    const areasBtn = document.getElementById('mch-btn-areas');
    if (!truckBtn && !areasBtn) return;
    const st = evaluateMobileLogisticsStatus();
    if (truckBtn) {
        let label = '🚛 TRUCK';
        if (st.truckAuto) label += ' <span class="mch-auto-badge">A</span>';
        truckBtn.innerHTML = label;
        truckBtn.classList.toggle('mch-footer-btn--complete', st.truckDone);
        truckBtn.classList.toggle('mch-footer-btn--incomplete', !st.truckDone);
        truckBtn.disabled = !st.hasContainers;
    }
    if (areasBtn) {
        areasBtn.classList.toggle('mch-footer-btn--complete', st.areasDone);
        areasBtn.classList.toggle('mch-footer-btn--incomplete', !st.areasDone);
        areasBtn.classList.toggle('mch-footer-btn--disabled', !st.areasEnabled);
        areasBtn.disabled = !st.areasEnabled;
    }
};

window.mobileCrewOpenTruck = function() {
    const pId = window.mobileCrewHubProjectId;
    if (!pId) return;
    syncProjectEditorHiddenFields(window.mobileCrewHubProject, pId);
    document.getElementById('mobile-crew-hub-overlay').style.display = 'none';
    ensureMobilePaCache(pId, function() {
        if (typeof openTruckArrangementDashboard === 'function') openTruckArrangementDashboard();
        else alert('Truck arrangement is not available.');
    });
};

window.mobileCrewOpenAreas = function() {
    const pId = window.mobileCrewHubProjectId;
    if (!pId) return;
    const st = evaluateMobileLogisticsStatus();
    if (!st.areasEnabled) return alert('Finish truck loading before opening venue areas.');
    syncProjectEditorHiddenFields(window.mobileCrewHubProject, pId);
    document.getElementById('mobile-crew-hub-overlay').style.display = 'none';
    ensureMobilePaCache(pId, function() {
        if (typeof openLoadinPlanDashboard === 'function') openLoadinPlanDashboard();
        else alert('Venue load-in plan is not available.');
    });
};

window.refreshMobileProjectAssetsCache = function(projectId, cb) {
    try { localStorage.removeItem('sm_pa_cache_' + projectId); } catch (e) { /* ignore */ }
    const sDate = document.getElementById('edit-proj-date') ? document.getElementById('edit-proj-date').value : '';
    const eDate = document.getElementById('edit-proj-end-date') ? document.getElementById('edit-proj-end-date').value : '';
    google.script.run
        .withSuccessHandler(function(res) {
            currentProjectAssets = (res && res.current) ? res.current : [];
            try {
                localStorage.setItem('sm_pa_cache_' + projectId, JSON.stringify({
                    sDate: sDate,
                    eDate: eDate,
                    current: res.current,
                    overlapping: res.overlapping || {}
                }));
            } catch (e) { /* ignore */ }
            if (cb) cb();
        })
        .withFailureHandler(function() { if (cb) cb(); })
        .getProjectAssets(projectId, sDate, eDate);
};

window.finishMobileLogisticsModal = function() {
    const hub = document.getElementById('mobile-crew-hub-overlay');
    if (window.mobileCrewHubProjectId && hub) {
        hub.style.display = 'flex';
        if (typeof updateMobileCrewLogisticsButtons === 'function') updateMobileCrewLogisticsButtons();
    }
};

window.persistMobileReadinessState = function() {
    const pId = document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : null;
    if (!pId || !window.currentReadinessState) return;
    if (window.mobileCrewHubProject) window.mobileCrewHubProject.readinessState = window.currentReadinessState;
    if (typeof calendar !== 'undefined' && calendar) {
        const ev = calendar.getEventById(pId);
        if (ev && ev.extendedProps && ev.extendedProps.rawDbData) {
            const raw = ev.extendedProps.rawDbData;
            raw.readinessState = window.currentReadinessState;
            ev.setExtendedProp('rawDbData', raw);
        }
    }
    google.script.run.updateProjectReadiness(
        pId,
        JSON.stringify(window.currentReadinessState),
        typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'System UI'
    );
};

function stashMobilePaEl(id) {
    const el = document.getElementById(id);
    const bar = document.getElementById('pa-mobile-mode-bar');
    if (!el || !bar || el.parentElement === bar) return;
    if (!window._mobilePaDomRestore[id]) {
        window._mobilePaDomRestore[id] = { parent: el.parentElement, next: el.nextSibling };
    }
    bar.appendChild(el);
}

function restoreMobilePaDom() {
    Object.keys(window._mobilePaDomRestore).forEach(function(id) {
        const el = document.getElementById(id);
        const stash = window._mobilePaDomRestore[id];
        if (!el || !stash || !stash.parent) return;
        if (stash.next && stash.next.parentNode === stash.parent) stash.parent.insertBefore(el, stash.next);
        else stash.parent.appendChild(el);
    });
    window._mobilePaDomRestore = {};
    const bar = document.getElementById('pa-mobile-mode-bar');
    if (bar) bar.style.display = 'none';
};

window.openMobileProjectAssets = function(projectId) {
    const pId = projectId || window.mobileCrewHubProjectId;
    const p = resolveMobileProject(pId) || window.mobileCrewHubProject;
    if (!pId || !p) return alert('Could not open equipment for this project.');

    syncProjectEditorHiddenFields(p, pId);
    document.body.classList.add('mobile-pa-compact');
    window.mobilePaCompactActive = true;
    window.activePaTarget = null;

    document.getElementById('mobile-crew-hub-overlay').style.display = 'none';

    if (typeof openProjectAssetsModal === 'function') {
        openProjectAssetsModal();
    }
    if (typeof switchPaView === 'function') switchPaView('logistics');
    applyMobilePaChrome();
};

window.applyMobilePaChrome = function() {
    if (!window.mobilePaCompactActive) return;
    const saveM = document.getElementById('btn-save-pa-mobile');
    const searchM = document.getElementById('btn-mobile-pa-search');
    const closeX = document.getElementById('btn-pa-close-x');
    const ro = !!window.projectAssetsReadOnly;
    if (saveM) saveM.style.display = ro ? 'none' : 'inline-flex';
    if (searchM) searchM.style.display = ro ? 'none' : 'inline-flex';
    if (closeX) closeX.style.display = 'inline-flex';
    stashMobilePaEl('mode-toggle-btn');
    stashMobilePaEl('pa-packing-filters');
    const modeBar = document.getElementById('pa-mobile-mode-bar');
    if (modeBar) modeBar.style.display = 'flex';
    if (typeof evalOperationButtons === 'function') evalOperationButtons();
    const opBtn = document.getElementById('btn-master-operation');
    if (opBtn && window.currentPaMode === 'packing') {
        stashMobilePaEl('btn-master-operation');
        opBtn.style.display = '';
    } else if (opBtn && modeBar && opBtn.parentElement === modeBar) {
        opBtn.style.display = 'none';
    }
};

window.exitMobilePaCompactMode = function() {
    document.body.classList.remove('mobile-pa-compact');
    window.mobilePaCompactActive = false;
    closeMobilePaDetail();
    closeMobilePaVaultSearch();
    restoreMobilePaDom();
    const saveM = document.getElementById('btn-save-pa-mobile');
    const searchM = document.getElementById('btn-mobile-pa-search');
    const closeX = document.getElementById('btn-pa-close-x');
    if (saveM) saveM.style.display = 'none';
    if (searchM) searchM.style.display = 'none';
    if (closeX) closeX.style.display = 'none';
    if (typeof updateMobileCrewLogisticsButtons === 'function') updateMobileCrewLogisticsButtons();
};

window.closeMobilePaDetail = function() {
    const sheet = document.getElementById('mobile-pa-detail-sheet');
    if (sheet) sheet.classList.remove('open');
};

window.closeMobilePaVaultSearch = function() {
    const sheet = document.getElementById('mobile-pa-vault-sheet');
    if (sheet) sheet.classList.remove('open');
    const inp = document.getElementById('mobile-pa-vault-search');
    if (inp) inp.value = '';
    const res = document.getElementById('mobile-pa-vault-results');
    if (res) res.innerHTML = '';
};

window.openMobilePaVaultSearch = function() {
    if (window.projectAssetsReadOnly) return alert('Read-only — cannot add equipment.');
    const sheet = document.getElementById('mobile-pa-vault-sheet');
    if (!sheet) return;
    sheet.classList.add('open');
    renderMobilePaVaultResults();
    setTimeout(function() {
        const inp = document.getElementById('mobile-pa-vault-search');
        if (inp) inp.focus();
    }, 100);
};

window.renderMobilePaVaultResults = function() {
    const box = document.getElementById('mobile-pa-vault-results');
    const inp = document.getElementById('mobile-pa-vault-search');
    if (!box) return;
    const q = (inp && inp.value ? inp.value : '').trim().toLowerCase();
    const assets = (typeof globalAssets !== 'undefined' && globalAssets) ? globalAssets : [];
    if (!assets.length) {
        box.innerHTML = '<div style="padding:16px;text-align:center;color:#888;">Vault not loaded yet.</div>';
        return;
    }
    let list = assets.filter(function(a) {
        if (!a || !a.name) return false;
        if (a.type === 'Category' || a.type === 'Department') return false;
        if (!q) return true;
        const hay = (a.name + ' ' + (a.manufacturer || '') + ' ' + (a.model || '')).toLowerCase();
        return hay.indexOf(q) !== -1;
    });
    list.sort(function(a, b) { return String(a.name).localeCompare(String(b.name)); });
    list = list.slice(0, 80);
    if (!list.length) {
        box.innerHTML = '<div style="padding:16px;text-align:center;color:#888;">No matches.</div>';
        return;
    }
    let html = '';
    list.forEach(function(a) {
        const esc = typeof escapeHTML === 'function' ? escapeHTML : function(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); };
        const sub = [a.manufacturer, a.model].filter(Boolean).join(' ');
        html += '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;background:#1a1a1e;border:1px solid #333;border-radius:6px;">' +
            '<div style="min-width:0;flex:1;"><div style="color:#fff;font-weight:bold;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(a.name) + '</div>' +
            (sub ? '<div style="color:#71717a;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(sub) + '</div>' : '') +
            '</div>' +
            '<button class="btn-main btn-sm" style="margin:0;flex-shrink:0;padding:8px 14px !important;" onclick="mobileAddVaultAsset(\'' + String(a.id).replace(/'/g, "\\'") + '\')">+ ADD</button></div>';
    });
    box.innerHTML = html;
};

window.mobileAddVaultAsset = function(assetId) {
    if (window.projectAssetsReadOnly) return;
    const prevTarget = window.activePaTarget;
    window.activePaTarget = null;
    if (typeof addPa === 'function') addPa(assetId, 1);
    window.activePaTarget = prevTarget;
    if (typeof renderProjectAssetsUI === 'function') renderProjectAssetsUI();
};

window.showMobilePaDetail = function(title, bodyHtml) {
    const sheet = document.getElementById('mobile-pa-detail-sheet');
    const t = document.getElementById('mobile-pa-detail-title');
    const b = document.getElementById('mobile-pa-detail-body');
    if (!sheet || !t || !b) return;
    t.innerText = title || 'DETAIL';
    b.innerHTML = bodyHtml || '';
    sheet.classList.add('open');
};

(function patchMobilePaCancel() {
    const orig = window.cancelProjectAssetsModal;
    if (typeof orig !== 'function') return;
    window.cancelProjectAssetsModal = function() {
        const wasMobile = window.mobilePaCompactActive;
        orig.apply(this, arguments);
        if (wasMobile) {
            exitMobilePaCompactMode();
            if (window.mobileCrewHubProjectId) {
                document.getElementById('mobile-crew-hub-overlay').style.display = 'flex';
                if (typeof updateMobileCrewLogisticsButtons === 'function') updateMobileCrewLogisticsButtons();
            }
        }
    };
})();

document.addEventListener('click', function(e) {
    if (!window.mobilePaCompactActive) return;
    const row = e.target.closest('#pa-assigned-list [id^="fg_"] > div:first-child');
    if (!row || e.target.closest('button')) return;
    const formulaDiv = row.querySelector('div[title="Formula String"]');
    const locInput = row.querySelector('input[type="text"]');
    const locSpan = row.querySelector('span[style*="text-transform:uppercase"]');
    const loc = locInput ? locInput.value : (locSpan ? locSpan.innerText.replace(/\s*RENT\s*$/,'').trim() : '');
    let formula = 'Standalone gear';
    if (formulaDiv) formula = formulaDiv.innerText || formulaDiv.innerHTML;
    showMobilePaDetail(loc || 'Equipment group', '<div style="font-family:monospace;color:#d8b4fe;word-break:break-word;">' + formula + '</div>');
}, true);

</script>
