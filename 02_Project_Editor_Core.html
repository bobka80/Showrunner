<script>
/**
 * 02_Project_Editor_Core.html
 * Domain: Project Editor, Settings, and Mini-Calendar Editor.
 */

window.isProjectDirty = false;

// ==========================================
// --- PRESENCE ENGINE (UI HEARTBEAT) ---
// ==========================================
// @INDEX: PRESENCE -> Presence Engine & Heartbeat
let presenceTimer = null;
let activePresenceProject = null;
window.activePresenceModule = 'main'; // Tracks if user is in 'main', 'timeline', etc.
window.activePresencePaMode = '';     // design | packing | operation (when module === assets)
window.isTimelineOccupiedBy = null;   // Legacy: first other user in timeline (informational only — no door lock)
window.timelineOccupants = [];        // Other users currently in timeline module
window.paPrepOccupants = [];          // Other users in assets module during prep [{name, mode}]
window.peForkPrepActive_ = false;     // Project editor chrome: prep fork on Firebase
window.peForkTimelineActive_ = false; // Project editor chrome: timeline fork on Firebase

/** Paint OPEN TIMELINE / PROJECT ASSETS chrome from fork + presence flags (never disables click). */
window.paintProjectEditorModuleBtns_ = function() {
  var tlBtn = document.getElementById('master-timeline-btn');
  var paBtn = document.getElementById('master-assets-btn');
  var occupants = window.timelineOccupants || [];
  var tlFork = !!window.peForkTimelineActive_;
  var paFork = !!window.peForkPrepActive_;

  if (tlBtn) {
    tlBtn.disabled = false;
    tlBtn.style.borderColor = '';
    tlBtn.style.color = '';
    if (occupants.length > 0) {
      var n = occupants.length;
      tlBtn.innerText = n === 1
        ? ('👥 ' + String(occupants[0]).toUpperCase() + ' IN TIMELINE')
        : ('👥 ' + n + ' IN TIMELINE');
      tlBtn.className = 'btn-outline btn-outline-blue';
      tlBtn.title = 'Open timeline — others already inside: ' + occupants.join(', ');
    } else if (tlFork) {
      tlBtn.innerText = 'OPEN TIMELINE';
      tlBtn.className = 'btn-outline btn-outline-blue';
      tlBtn.title = 'Timeline fork is on Firebase';
    } else {
      tlBtn.innerText = 'OPEN TIMELINE';
      tlBtn.className = 'btn-outline';
      tlBtn.title = '';
    }
  }

  if (paBtn) {
    paBtn.disabled = false;
    paBtn.style.borderColor = '';
    paBtn.style.color = '';
    if (paFork) {
      paBtn.className = 'btn-outline btn-outline-orange';
      paBtn.title = 'Project Assets fork is on Firebase';
    } else {
      paBtn.className = 'btn-outline';
      paBtn.title = '';
    }
  }
};

window.refreshProjectEditorForkChrome_ = function(projectId) {
  projectId = projectId || activePresenceProject ||
    (document.getElementById('edit-folder-id') ? document.getElementById('edit-folder-id').value : '');
  if (!projectId || projectId === 'NEW') {
    window.peForkPrepActive_ = false;
    window.peForkTimelineActive_ = false;
    if (typeof window.paintProjectEditorModuleBtns_ === 'function') window.paintProjectEditorModuleBtns_();
    return;
  }
  if (typeof google === 'undefined' || !google.script || !google.script.run) return;
  google.script.run
    .withFailureHandler(function() { /* keep last chrome */ })
    .withSuccessHandler(function(info) {
      var prepOpen = (typeof window.dalIsPrepOpenFromInfo_ === 'function')
        ? window.dalIsPrepOpenFromInfo_(info)
        : false;
      var tl = (typeof window.dalTimelineInfoFromSession_ === 'function')
        ? window.dalTimelineInfoFromSession_(info)
        : null;
      var tlSt = tl ? String(tl.status || '').toLowerCase() : '';
      var tlOpen = (tlSt === 'open' || tlSt === 'opening' || tlSt === 'committing');
      window.peForkPrepActive_ = !!prepOpen;
      window.peForkTimelineActive_ = !!tlOpen;
      if (typeof window.paintProjectEditorModuleBtns_ === 'function') window.paintProjectEditorModuleBtns_();
    })
    .getDalSessionInfo(projectId);
};

window.dalPaPresenceModeLabel_ = function(mode, opType) {
  mode = String(mode || '').toLowerCase();
  if (mode === 'packing') return 'Packing';
  if (mode === 'operation') {
    var op = String(opType || window.currentOperationType || 'CHECK-OUT').toUpperCase();
    if (op.indexOf('IN') >= 0) return 'Check-in';
    return 'Check-out';
  }
  return 'Editing';
};

window.dalPaSyncPresencePaMode_ = function() {
  if (window.activePresenceModule !== 'assets') {
    window.activePresencePaMode = '';
    return;
  }
  if (window.currentOperationType || window.currentPaMode === 'operation') {
    window.activePresencePaMode = 'operation';
  } else if (window.currentPaMode === 'packing') {
    window.activePresencePaMode = 'packing';
  } else {
    window.activePresencePaMode = 'design';
  }
};

function startPresencePing(projectId) {
    stopPresencePing();
    if (!projectId || projectId === 'NEW') return;
    activePresenceProject = projectId;

    // Clickable immediately — presence + fork chrome refresh in background.
    window.timelineOccupants = [];
    window.isTimelineOccupiedBy = null;
    window.paPrepOccupants = [];
    window.peForkPrepActive_ = false;
    window.peForkTimelineActive_ = false;
    if (typeof window.paintProjectEditorModuleBtns_ === 'function') window.paintProjectEditorModuleBtns_();
    if (typeof window.refreshProjectEditorForkChrome_ === 'function') {
      window.refreshProjectEditorForkChrome_(projectId);
    }

    const ping = () => {
        if (!activePresenceProject) return;
        let userAlias = typeof ACTIVE_USER_NAME !== 'undefined' ? ACTIVE_USER_NAME : 'Unknown';
        if (typeof window.dalPaSyncPresencePaMode_ === 'function') window.dalPaSyncPresencePaMode_();
        if (typeof window.refreshProjectEditorForkChrome_ === 'function') {
          window.refreshProjectEditorForkChrome_(activePresenceProject);
        }
        google.script.run
        .withFailureHandler(function() {
            // Keep last known chrome; never leave the button disabled.
            if (typeof window.paintProjectEditorModuleBtns_ === 'function') window.paintProjectEditorModuleBtns_();
        })
        .withSuccessHandler(othersObj => {
            // null = presence lock miss — keep last known roster (do not pretend room emptied).
            if (othersObj == null) {
              if (typeof window.paintProjectEditorModuleBtns_ === 'function') window.paintProjectEditorModuleBtns_();
              return;
            }
            window.isTimelineOccupiedBy = null;
            window.timelineOccupants = [];
            window.paPrepOccupants = [];
            othersObj = othersObj || {};
            for (let name in othersObj) {
                if (!othersObj[name]) continue;
                if (othersObj[name].module === 'timeline') {
                    window.timelineOccupants.push(name);
                    if (!window.isTimelineOccupiedBy) window.isTimelineOccupiedBy = name;
                }
                if (othersObj[name].module === 'assets') {
                    window.paPrepOccupants.push({
                        name: name,
                        mode: othersObj[name].subMode || 'design'
                    });
                }
            }

            // Presence is informational only — never blocks opening (timeline collab).
            if (typeof window.paintProjectEditorModuleBtns_ === 'function') window.paintProjectEditorModuleBtns_();
            if (typeof window.dalUpdateRemotePendingBanner_ === 'function') window.dalUpdateRemotePendingBanner_();
            if (typeof window.dalUpdateTimelineLiveBanner_ === 'function') window.dalUpdateTimelineLiveBanner_();
            // Part B4 — peers in the live room reset idle (room not empty).
            if (window.dalPrepUiOpen && (window.paPrepOccupants || []).length > 0 &&
                typeof window.dalTouchRoomIdle_ === 'function') {
              window.dalTouchRoomIdle_('prep');
            }
            if (window.dalTimelineSessionOpen && (window.timelineOccupants || []).length > 0 &&
                typeof window.dalTouchRoomIdle_ === 'function') {
              window.dalTouchRoomIdle_('timeline');
            }
            // Empty live module + fork still open → commit (covers refresh/crash orphans).
            if (typeof window.dalMaybeReclaimEmptyLiveForks_ === 'function') {
              window.dalMaybeReclaimEmptyLiveForks_(othersObj);
            }
        }).reportProjectPresence(
          activePresenceProject,
          userAlias,
          'ping',
          window.activePresenceModule,
          (function() {
            var sub = window.activePresencePaMode || '';
            if (window.IS_STATION_DEVICE) {
              sub = sub ? (sub + '|station') : 'station';
            }
            return sub;
          })()
        );
    };
    
    ping(); 
    var pingMs = (typeof window.DAL_PRESENCE_PING_MS_ === 'number' && window.DAL_PRESENCE_PING_MS_ > 0)
      ? window.DAL_PRESENCE_PING_MS_
      : 45000;
    presenceTimer = setInterval(ping, pingMs); 
}

function stopPresencePing() {
    if (presenceTimer) { clearInterval(presenceTimer); presenceTimer = null; }
    if (activePresenceProject) { google.script.run.reportProjectPresence(activePresenceProject, ACTIVE_USER_NAME, 'leave'); activePresenceProject = null; }
    window.peForkPrepActive_ = false;
    window.peForkTimelineActive_ = false;
    window.timelineOccupants = [];
    window.isTimelineOccupiedBy = null;
    window.paPrepOccupants = [];
    if (typeof window.paintProjectEditorModuleBtns_ === 'function') window.paintProjectEditorModuleBtns_();
}

function triggerPrint() {
  const id = document.getElementById('edit-folder-id').value;
  if(!id) return;
  const btn = document.getElementById('print-eq-btn');
  const origText = btn.innerText;
  btn.innerText = "GENERATING...";
  btn.disabled = true;
  
  google.script.run.withSuccessHandler(res => {
    btn.innerText = origText;
    btn.disabled = false;
    if(res.startsWith("Error")) alert(res);
    else { window.open(res, '_blank'); refreshData(); }
  }).printEquipmentList(id);
}

window.applyProjectDistanceFieldVisibility = function() {
    const inSofiaEl = document.getElementById('edit-proj-in-sofia');
    const inSofia = inSofiaEl ? inSofiaEl.checked : true;
    const distCont = document.getElementById('edit-proj-distance-container');
    const locCol = document.querySelector('.pe-location-col');
    if (distCont) {
        distCont.style.display = inSofia ? 'none' : 'flex';
    }
    if (locCol) {
        locCol.classList.toggle('pe-location-col--in-sofia', inSofia);
    }
};

window.toggleDistanceInput = function() {
    window.applyProjectDistanceFieldVisibility();
};

// @INDEX: PROJECT_CRUD -> Schedule Save & Sync
function runSchedule() {
    const folderId = document.getElementById('edit-folder-id').value;
    if (typeof isBriefingMode === 'function' && isBriefingMode(folderId)) {
        return alert('🛑 Read-only briefing view — you cannot save project changes.');
    }
    if (typeof canCreateOnCalendar === 'function' && folderId === 'NEW' && !canCreateOnCalendar()) {
        return alert('🛑 Permission Denied: You cannot create new events.');
    }
    const btn = document.getElementById('update-btn'); 
    const id = folderId; 
    const newT = document.getElementById('edit-proj-name').value; 
    
    if (!newT) return alert("⚠️ A Project Title is required!");
    if (!miniCalendar) return alert("⚠️ The Calendar Engine is offline.");
    
    const paintedEvents = miniCalendar.getEvents();
    if (paintedEvents.length === 0) {
        return alert("⚠️ You must paint at least one phase on the calendar before saving!");
    }

    if (window.guardDatabaseBackupLock && window.guardDatabaseBackupLock('project save')) return;

    btn.disabled = true; 
    btn.innerText = "SAVING...";
    
    let safetyTimer = setTimeout(() => {
        btn.disabled = false; 
        btn.innerText = "SAVE & SYNC CALENDAR"; 
        alert("Network Timeout: The server took too long to respond. Please check your connection.");
    }, 20000);
    
    let activeState = window.currentReadinessState || {};
    activeState.isOutdoor = document.getElementById('edit-proj-outdoor').checked;
    activeState.inSofia = document.getElementById('edit-proj-in-sofia').checked;
    const zoneEl = document.getElementById('edit-proj-region-zone');
    activeState.regionZone = zoneEl ? zoneEl.value : (activeState.inSofia ? 'sofia' : 'outside_sofia');
    activeState.distanceKm = parseFloat(document.getElementById('edit-proj-distance').value) || 0;
    let lat = document.getElementById('edit-proj-lat').value; let lng = document.getElementById('edit-proj-lng').value;
    if (lat && lng) activeState.coords = { lat: lat, lng: lng };

    const projectData = {
        Project_ID: (id === 'NEW') ? '' : id,
        Project_Name: newT,
        Status: document.getElementById('display-event-status').innerText,
        Type: document.getElementById('edit-proj-type').value,
        Client: document.getElementById('edit-proj-client') ? document.getElementById('edit-proj-client').value : '',
        Location_URL: document.getElementById('edit-proj-location') ? document.getElementById('edit-proj-location').value : '',
        Last_Updated: document.getElementById('edit-proj-version').value,
        Difficulty_Multiplier: document.getElementById('edit-proj-multiplier') ? parseFloat(document.getElementById('edit-proj-multiplier').value) : 1.0,
        Readiness_State: JSON.stringify(activeState)
    };

    const timelines = [];
    const phaseMap = { 'wh': 'WAREHOUSE', 'main': 'MAIN_EVENT', 'show': 'SHOW_DAY', 'recovery': 'RECOVERY', 'transit': 'TRANSIT' };

    paintedEvents.forEach(ev => {
        let phaseCode = ev.extendedProps.phaseType;
        let note = ev.extendedProps.note || '';
        let sTime = ev.extendedProps.startTime || '';
        let eTime = ev.extendedProps.endTime || '';
        let backendType = phaseMap[phaseCode] || phaseCode;
        if (!backendType) return; 
        
        let startD = ev.start;
        let endD = ev.end ? ev.end : new Date(startD.getTime() + 86400000); 
        if (endD <= startD) endD = new Date(startD.getTime() + 86400000);
        
        let currentD = new Date(startD);
        while (currentD < endD) {
            let isoDay = currentD.getFullYear() + "-" + 
                         String(currentD.getMonth() + 1).padStart(2, '0') + "-" + 
                         String(currentD.getDate()).padStart(2, '0');
            timelines.push({ uid: (ev.extendedProps.uidsByDate && ev.extendedProps.uidsByDate[isoDay]) || ev.extendedProps.uid || '', Sub_Event_Type: backendType, Event_Date: isoDay, Start_Time: sTime, End_Time: eTime, Note: note });
            currentD.setDate(currentD.getDate() + 1);
        }
    });
    
    google.script.run
        .withFailureHandler(err => { 
            clearTimeout(safetyTimer);
            if (err.message.includes("COLLISION_DETECTED")) {
                alert("SAVE FAILED: This project was modified by someone else while you were editing. Please close this window, refresh the main dashboard, and re-apply your changes.");
            } else {
                alert("Database Error: " + err.message); 
            }
            btn.disabled = false; 
            btn.innerText = "SAVE & SYNC CALENDAR"; 
        })
        .withSuccessHandler(res => { 
            clearTimeout(safetyTimer);
            btn.disabled = false; 

            if (res && res.toString().startsWith("Error")) {
                alert(res);
                btn.innerText = "SAVE & SYNC CALENDAR";
                return;
            }

            btn.innerText = "SAVED";
            window.isProjectDirty = false;
            setTimeout(() => { btn.innerText = "SAVE & SYNC CALENDAR"; }, 2000);
            
            let resObj = { id: res };
            try { if (typeof res === 'string' && res.startsWith('{')) resObj = JSON.parse(res); } catch(e){}
            
            let finalId = resObj.id || res;

            if (finalId && finalId !== "Success") {
                if (id === 'NEW') document.getElementById('edit-folder-id').value = finalId;

                google.script.run
                    .withFailureHandler(err => {
                        console.error("Folder generation failed:", err);
                        alert("Project saved, but Drive folder sync failed: " + err.message);
                    })
                    .withSuccessHandler(folderUrl => {
                        if (folderUrl && typeof refreshData === 'function') refreshData();
                    })
                    .generateProjectFolders(ACTIVE_USER_NAME, finalId, newT, timelines);

                if (id === 'NEW' && typeof startPresencePing === 'function') startPresencePing(finalId);
            }
            
            if (resObj.timestamp) {
                document.getElementById('edit-proj-version').value = resObj.timestamp;
            }

            refreshData(); 
            
        }).saveEventFromUI(projectData, timelines, ACTIVE_USER_NAME); 
}

function openDriveFolder() {
  const id = document.getElementById('edit-folder-id').value;
  if(id) window.open('https://drive.google.com/drive/folders/' + id, '_blank');
}

function toggleTrashMenu() {
  if (typeof canManageProjectLifecycle === 'function' && !canManageProjectLifecycle()) return;
  const menu = document.getElementById('trash-dropdown');
  if (menu) menu.style.display = (menu.style.display === 'none' || menu.style.display === '') ? 'block' : 'none';
}

function toggleTypeMenu() {
  if (typeof isCrossRentOnlyCreator === 'function' && isCrossRentOnlyCreator()) return;
  if (typeof canEditEventType === 'function' && !canEditEventType()) return;
  const m = document.getElementById('type-dropdown');
  if (!m) return;
  m.style.display = (m.style.display === 'none' || m.style.display === '') ? 'block' : 'none';
  const sd = document.getElementById('status-dropdown');
  if (sd) sd.style.display = 'none';
}

function toggleStatusMenu() {
  if (typeof canManageProjectLifecycle === 'function' && !canManageProjectLifecycle()) return;
  const m = document.getElementById('status-dropdown');
  if (!m) return;
  m.style.display = (m.style.display === 'none' || m.style.display === '') ? 'block' : 'none';
  const td = document.getElementById('type-dropdown');
  if (td) td.style.display = 'none';
}

function setEventType(type) {
  if (typeof canEditEventType === 'function' && !canEditEventType()) return;
  if (typeof isCrossRentOnlyCreator === 'function' && isCrossRentOnlyCreator()) return;
  window.isProjectDirty = true;
  document.getElementById('edit-proj-type').value = type;
  document.getElementById('display-event-type').innerText = type.toUpperCase();
  document.getElementById('type-dropdown').style.display = 'none';
}

function runSetStatus(status) {
  if (typeof canManageProjectLifecycle === 'function' && !canManageProjectLifecycle()) {
    return alert('🛑 Permission Denied: Only managers can change project status.');
  }
  const id = document.getElementById('edit-folder-id').value;
  
  if(document.getElementById('trash-dropdown')) document.getElementById('trash-dropdown').style.display = 'none';
  if(document.getElementById('status-dropdown')) document.getElementById('status-dropdown').style.display = 'none';
  
  if (!id || id === 'NEW') {
     document.getElementById('display-event-status').innerText = status.toUpperCase();
     return;
  }
  
  if (status === 'Trashed' || status === 'Cancelled') {
      if (!confirm(`Are you sure you want to mark this project as ${status}?`)) return;
  }
  
  document.getElementById('display-event-status').innerText = status.toUpperCase();
  window.isProjectDirty = true;
  
  google.script.run
      .withFailureHandler(err => alert("Failed to update status: " + err.message))
      .withSuccessHandler(() => {
         if (status === 'Trashed') { 
             window.activeProjectContext = null;
             closeModals(); 
             let isList = document.getElementById('desktop-event-list') && document.getElementById('desktop-event-list').style.display === 'flex';
             if (typeof setDashboardIcon === 'function') setDashboardIcon(isList ? 'list' : 'calendar');
             refreshData(); 
         } else { 
             refreshData(); 
         }
      }).setProjectStatus(id, status, ACTIVE_USER_NAME);
}

function runRestoreProject() {
  if (typeof canManageProjectLifecycle === 'function' && !canManageProjectLifecycle()) {
    return alert('🛑 Permission Denied: Only managers can restore projects.');
  }
  const id = document.getElementById('edit-folder-id').value;
  if (!id || id === 'NEW') return;
  if (!confirm(`Restore this project? Overlapping shifts with active projects will be removed.`)) return;
  
  document.getElementById('trash-dropdown').style.display = 'none';
  google.script.run
      .withFailureHandler(err => alert("Failed to restore project: " + err.message))
      .withSuccessHandler((res) => {
         alert(res);
         closeModals(); refreshData();
      }).restoreProjectWithConflictCheck(id, ACTIVE_USER_NAME);
}

function runFullDelete() {
  if (typeof canManageProjectLifecycle === 'function' && !canManageProjectLifecycle()) {
    return alert('🛑 Permission Denied: Only managers can permanently delete projects.');
  }
  const id = document.getElementById('edit-folder-id').value;
  const title = document.getElementById('edit-orig-title').innerText.replace("Project: ", "");
  const oldDate = document.getElementById('edit-old-date').value;
  if (confirm("PERMANENT WARNING: Wipe this project entirely from the database?")) {
      document.getElementById('trash-dropdown').style.display = 'none';
      google.script.run
          .withFailureHandler(err => alert("Failed to delete project: " + err.message))
          .withSuccessHandler(() => { 
              window.activeProjectContext = null;
              closeModals(); 
              let isList = document.getElementById('desktop-event-list') && document.getElementById('desktop-event-list').style.display === 'flex';
              if (typeof setDashboardIcon === 'function') setDashboardIcon(isList ? 'list' : 'calendar');
              refreshData(); 
          }).deleteProjectFull(id, title, oldDate, ACTIVE_USER_NAME); 
  }
}

function openUnscheduledModal(pId, title, fullTitle) {
    window.isProjectDirty = false;
    window.activeProjectContext = pId;
    if (typeof setDashboardIcon === 'function') setDashboardIcon('project');
    document.getElementById('edit-modal-overlay').style.display = 'flex';
    document.getElementById('edit-folder-id').value = pId; 
    document.getElementById('edit-proj-version').value = ''; 
    document.getElementById('edit-proj-name').value = title; 
    document.getElementById('edit-orig-title').innerText = "Project: " + fullTitle;
    if(document.getElementById('trash-dropdown')) document.getElementById('trash-dropdown').style.display = 'none';
    if(document.getElementById('status-dropdown')) document.getElementById('status-dropdown').style.display = 'none';
    if(document.getElementById('type-dropdown')) document.getElementById('type-dropdown').style.display = 'none';
    
    let isOutdoor = false;
    if (typeof calendar !== 'undefined' && calendar) {
        let ev = calendar.getEventById(pId);
        if (ev && ev.extendedProps && ev.extendedProps.rawDbData && ev.extendedProps.rawDbData.readinessState) {
            window.currentReadinessState = ev.extendedProps.rawDbData.readinessState;
            let cState = window.currentReadinessState;
            if (cState.isOutdoor) isOutdoor = true;
            if (cState.coords) { document.getElementById('edit-proj-lat').value = cState.coords.lat; document.getElementById('edit-proj-lng').value = cState.coords.lng; }
        }
    }
    document.getElementById('edit-proj-outdoor').checked = isOutdoor;
    if (window.updateLiveWeatherWidget) window.updateLiveWeatherWidget();
    
    let cState = window.currentReadinessState || {};
    document.getElementById('edit-proj-in-sofia').checked = cState.inSofia !== false;
    document.getElementById('edit-proj-distance').value = cState.distanceKm || "";
    const zoneEl = document.getElementById('edit-proj-region-zone');
    if (zoneEl) zoneEl.value = cState.regionZone || (cState.inSofia !== false ? 'sofia' : 'outside_sofia');
    if(typeof window.toggleDistanceInput === 'function') window.toggleDistanceInput();
    
    document.getElementById('display-event-status').innerText = 'DRAFT';
    document.getElementById('edit-proj-type').value = 'Event';
    document.getElementById('display-event-type').innerText = 'EVENT';
    if(document.getElementById('edit-proj-client')) document.getElementById('edit-proj-client').value = '';
    if(document.getElementById('edit-proj-location')) document.getElementById('edit-proj-location').value = '';
    
    document.getElementById('restore-project-btn').style.display = 'block';
    
    let todayStr = new Date().toISOString().split('T')[0];
    bootMiniCalendar(todayStr, pId);
    if (typeof startPresencePing === 'function') startPresencePing(pId);
    if (typeof fetchEntitySummary === 'function') fetchEntitySummary(pId, 'project-history-btn');
}

window.cancelProjectEditor = function() {
    if (window.isProjectDirty) {
        if (!confirm("⚠️ You have unsaved event changes. Are you sure you want to discard them and leave?")) {
            return false;
        }
    }
    window.isProjectDirty = false;
    window.activeProjectContext = null;
    
    document.getElementById('edit-folder-id').value = '';
    document.getElementById('edit-proj-version').value = '';
    if (typeof stopPresencePing === 'function') stopPresencePing();
    window.activePresenceModule = 'main';
    
    document.getElementById('edit-modal-overlay').style.display = 'none';
    document.getElementById('edit-modal-overlay').classList.remove('editor-briefing-mode');
    window.projectEditorBriefing = false;
    
    if (typeof setDashboardIcon === 'function') {
        let isList = document.getElementById('desktop-event-list') && document.getElementById('desktop-event-list').style.display === 'flex';
        setDashboardIcon(isList ? 'list' : 'calendar');
    }
    return true;
};

function closeModals() { 
    if (window.currentOperationType) {
        alert("⚠️ Please PAUSE the active operation before navigating away.");
        return false;
    }

    document.querySelectorAll('.modal-overlay').forEach(m => { 
        if (m.id !== 'backup-modal-overlay' && m.id !== 'task-modal-overlay' && m.id !== 'task-crew-modal-overlay') {
            m.style.display='none'; 
        }
    }); 
    
    ['shift-layer', 'master-settings-overlay', 'manager-settings-overlay', 'month-roster-layer', 'availability-modal-overlay', 'audit-studio-overlay', 'crew-manager-modal', 'financials-hub-overlay'].forEach(id => {
        let el = document.getElementById(id);
        if (el) {
            el.style.display = 'none';
        }
    });
    
    if (typeof updateActiveNav === 'function') updateActiveNav('nav-btn-dashboard');
    
    return true;
}

function sendManualCrewEmailUI() {
  const folderId = document.getElementById('edit-folder-id').value;
  const title = document.getElementById('edit-orig-title').innerText.replace("Project: ", "");
  const startDate = document.getElementById('edit-proj-date').value;
  const endDate = document.getElementById('edit-proj-end-date').value;
  const whDate = document.getElementById('edit-proj-wh-date').value;
  const wh2Date = document.getElementById('edit-proj-wh2-date').value;
  const tidyDate = document.getElementById('edit-proj-recovery-date').value;

  if(!folderId) return alert("Please save the project first.");
  
  const btn = document.getElementById('manual-crew-email-btn');
  const origText = btn.innerText;
  btn.innerText = "SENDING...";
  btn.disabled = true;

  google.script.run
      .withFailureHandler(err => {
          btn.innerText = "ERROR";
          alert(err.message);
          setTimeout(() => { btn.innerText = origText; btn.disabled = false; }, 2000);
      })
      .withSuccessHandler(res => {
          if(res === "Success") {
              btn.innerText = "SENT";
          } else {
              btn.innerText = "ERROR";
              alert(res);
          }
          setTimeout(() => { btn.innerText = origText; btn.disabled = false; }, 2000);
      }).triggerManualCrewEmail(folderId, title, startDate, endDate, whDate, wh2Date, tidyDate, ACTIVE_USER_NAME);
}
