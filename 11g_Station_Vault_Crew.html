<!-- @INDEX: STATION -> Vault crew tab ROOT badge enroll -->
<script>

/* ==========================================================================
   VAULT → CREW TAB (ROOT only): assign / overwrite crew badge RFIDs
   ========================================================================== */
window.stationVaultCrew = null;   // cached crew list [{uid,name,rfidTag}]
window.stationCrewRecord = null;  // { ref, name } while armed for a crew badge scan

function stationVaultLoadCrew_() {
  const host = stationReadHostSession_();
  const statusEl = document.getElementById('station-vault-crew-status');
  const listEl = document.getElementById('station-vault-crew-list');
  if (statusEl) { statusEl.style.display = 'block'; statusEl.textContent = 'Loading crew…'; }
  if (listEl) listEl.innerHTML = '';
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        if (statusEl) { statusEl.style.display = 'block'; statusEl.textContent = (res && res.error) ? res.error : 'Could not load crew.'; }
        return;
      }
      window.stationVaultCrew = res.crew || [];
      stationVaultRenderCrew_();
    })
    .withFailureHandler(function(err) {
      if (statusEl) { statusEl.style.display = 'block'; statusEl.textContent = 'Error: ' + (err && err.message ? err.message : String(err)); }
    })
    .getStationCrewRfidList(ACTIVE_USER_NAME, host ? host.name : '');
}

window.stationVaultRenderCrew_ = function() {
  const listEl = document.getElementById('station-vault-crew-list');
  const statusEl = document.getElementById('station-vault-crew-status');
  if (!listEl) return;
  const all = window.stationVaultCrew || [];
  const q = (document.getElementById('station-vault-crew-search') || {}).value || '';
  const needle = q.toLowerCase().trim();
  const rows = needle ? all.filter(function(c) { return String(c.name).toLowerCase().indexOf(needle) !== -1; }) : all;
  if (statusEl) statusEl.style.display = 'none';
  if (!rows.length) {
    listEl.innerHTML = '<div class="station-shell-status" style="text-align:center;padding:20px;">No crew match.</div>';
    return;
  }
  listEl.innerHTML = rows.map(function(c) {
    const ref = stationVaultEsc_(c.uid || c.name);
    const nm = stationVaultEsc_(c.name);
    const tag = c.rfidTag
      ? '<span class="station-vault-crew-row__tag has-tag">' + stationVaultEsc_(c.rfidTag) + '</span>'
      : '<span class="station-vault-crew-row__tag no-tag">no badge</span>';
    return '<div class="station-vault-crew-row" onclick="stationVaultStartCrewRecord_(\'' + ref + '\',\'' + nm.replace(/'/g, "\\'") + '\')">'
      + '<span class="station-vault-crew-row__name">' + nm + '</span>' + tag + '</div>';
  }).join('');
};

window.stationVaultStartCrewRecord_ = function(ref, name) {
  const host = stationReadHostSession_();
  if (!host) { stationSetStatus_('Scan your badge first.', 'error'); return; }
  window.stationVaultRecord = null; // never mix with equipment recording
  window.stationCrewRecord = { ref: ref, name: name };
  const bar = document.getElementById('station-vault-record-bar');
  const txt = document.getElementById('station-vault-record-text');
  if (bar) bar.style.display = 'flex';
  if (txt) txt.textContent = 'Pull the trigger on ' + name + '’s badge…';
  stationResetHostIdleTimer_();
};

/** Consume a scan onto the armed crew member. Returns true if used. */
function stationCrewConsumeScan_(tag, tid) {
  const rec = window.stationCrewRecord;
  if (!rec) return false;
  if (window.stationCrewRecordBusy) return true;
  const host = stationReadHostSession_();
  if (!host) { stationVaultCancelRecord_(); return true; }
  stationCrewRecordCall_(rec, tag, tid, false);
  return true;
}

/** Crew enroll write, split out so the Overwrite button can re-issue it with force=true. */
function stationCrewRecordCall_(rec, tag, tid, force) {
  const host = stationReadHostSession_();
  if (!host) { stationVaultCancelRecord_(); return; }
  window.stationCrewRecordBusy = true;
  stationResetHostIdleTimer_();
  const txt = document.getElementById('station-vault-record-text');
  if (txt) txt.textContent = (force ? 'Overwriting badge for ' : 'Linking badge to ') + rec.name + '…';
  google.script.run
    .withSuccessHandler(function(res) {
      window.stationCrewRecordBusy = false;
      if (res && res.duplicate) {
        stationShowOverwritePrompt_(res.duplicate, function() { stationCrewRecordCall_(rec, tag, tid, true); });
        return;
      }
      if (!res || !res.success) {
        if (txt) txt.textContent = ((res && res.error) ? res.error : 'Enrollment failed.') + ' Try again or Cancel.';
        return;
      }
      // Reflect the new tag in the cached crew row + refresh the live-strip resolver.
      const c = (window.stationVaultCrew || []).find(function(x) { return String(x.uid || x.name) === String(rec.ref) || String(x.name) === String(rec.name); });
      if (c) {
        c.rfidTag = tag;
        c.rfidTid = tid || '';
      }
      stationVaultRenderCrew_();
      stationRefreshEquipMap_();
      window.stationCrewRecord = null;
      stationVaultRenderRecordBar_();
      stationSetStatus_('Badge linked to ' + rec.name + (tid ? ' (TID ok)' : ''), 'ok');
    })
    .withFailureHandler(function(err) {
      window.stationCrewRecordBusy = false;
      if (txt) txt.textContent = 'Error: ' + (err && err.message ? err.message : String(err)) + ' — Cancel to stop.';
    })
    .enrollStationCrewRfidTag(ACTIVE_USER_NAME, host.name, rec.ref, tag, !!force, tid || '');
}
</script>
